body:
  text: 欽定四庫全書大學纂箋卷二元詹道𫝊撰或問大學之道吾子以為大人之學何也曰此對小子之學言之也曰敢問其為小子之學何也曰愚於序文已略陳之而古法之宜於今者亦既輯而為書矣學者不可以不之考也邵武李氏曰孝宗淳熙十四年丁未先生年五十八編次小學書成内篇三立教明倫敬身外篇二取古人之嘉言以廣之善行以實之凡三百八十五章云曰吾聞君子務其逺者大者小人務其近者小者今子方將語音御人以大學之道而又欲其考乎小學之書何也曰學之大小固有不同然其為道則一而已是以方其幼也不習之於小學則無以收其放心養其德性而為大學之基本及其長上聲下同也不進之於大學則無以察夫音扶義理措諸事業而收小學之成功是則學之大小所以不同特以少去聲長所習之異宜而有髙下淺深先後緩急之殊非若古今之辨義利之分判然如薫蕕音猶冰炭之相反而不可以相入也今使幼學之士必先有以自盡乎灑上去上聲掃去聲應對進退之間禮樂射御書數之習俟其既長而進乎明德新民以止於至善是乃次第之當然又何為而不可哉曰幼學之士以子之言而得循序漸進以免於躐等陵節四字出學記之病則誠幸矣若其年之既長而不及乎此者欲反從事於小學則恐其不免於扞胡半反格胡客反不勝平聲勤苦難成之患此句亦出學記欲直從事於大學則又恐其失序無本而不能以自達也則如之何曰是其歳月之已逝者則固不可得而復扶又反下同追矣若其工夫之次第條目則豈遂不可得而復補邪蓋吾聞之敬之一字聖學之所以成始而成終者也為小學者不由乎此固無以涵養本原而謹夫音扶下同灑掃應對進退之節與夫六藝之教為大學者不由乎此亦無以開𤼵聰明進德修業而致夫明德新民之功也是以程子𤼵明格物之道而必以是為說焉不幸過時而後學者誠能用力於此以進乎大而不害兼補乎其小則其所以進者將不患於無本而不能以自達矣其或摧頽已甚而不足以有所兼則其所以固其肌膚之會筋音斤骸之束見禮運而養其良知良能之本者亦可以得之於此而不患其失之於前也顧以七年之病而求三年之艾非百倍其功不足以致之若徒歸咎於既往而所以補之於後者又不能以自力則吾見其扞格勤苦日有甚焉而身心顛倒眩瞀迷惑終無以為致知力行之地矣況欲有以及乎天下國家也哉曰然則所謂敬者又若何而用力邪曰程子於此嘗以主一無適言之矣嘗以整齊嚴肅言之矣至其門人謝氏之說則又有所謂常惺惺法者焉尹氏之説則又有所謂其心收斂不容一物者焉觀是數說足以見其用力之方矣曰敬之所以為學之始者然矣其所以為學之終也奈何曰敬者一心之主宰而萬事之本根也知其所以用力之方則知小學之不能無賴於此以為始知小學之賴此以始則夫音扶大學之不能無賴乎此以為終者可以一以貫之而無疑矣蓋此心既立由是格物致知以盡事物之理則所謂尊德性而道問學由是誠意正心以修其身則所謂先立其大者而小者不能奪由是齊家治國以及乎天下則所謂修已以安百姓篤恭而天下平是皆未始一日而離去聲乎敬也然則敬之一字豈非聖學始終之要也哉曰然則此篇所謂在明明德在新民在止於至善者亦可得而聞其說之詳乎曰天道流行𤼵育萬物其所以為造化者隂陽五行而已而所謂隂陽五行者又必有是理而後有是氣及其生物則又必因是氣之聚而後有是形故人物之生必得是理然後有以為健順仁義禮智之性必得是氣然後有以為魂魄五臟百骸之身周子所謂無極之真二五之精妙合而凝者正謂是也然以其理而言之則萬物一原同無人物貴賤之殊以其氣而言之則得其正且通者為人得其偏且塞先則反者為物是以或貴或賤而不能齊也彼賤而為物者既梏于毒反於形氣之偏塞而無以充其本體之全矣唯人之生乃得其氣之正且通者而其性為最貴故其方寸之間虛靈洞徹萬理咸備蓋其所以異於禽獸者正在於此而其所以可為堯舜而能參天地以賛化育者亦不外焉是則所謂明德者也然其通也或不能無清濁之異其正也或不能無美惡之殊故其所賦之質清者智而濁者愚美者賢而惡者不肖又有不能同者必其上智大賢之資乃能全其本體而無少不明其有不及乎此則其所謂明德者已不能無蔽而失其全矣況乎又以氣質有蔽之心接乎事物無窮之變則其目之欲色耳之欲聲口之欲味鼻之欲臭四肢之欲安佚所以害乎其德者又豈可勝平聲言也哉二者相因反覆深固是以此德之明日益昬昧而此心之靈其所知者不過情欲利害之私而已是則雖曰有人之形而實何以逺於禽獸雖曰可以為堯舜而參天地而亦不能有以自充矣然而本明之體得之於天終有不可得而昧者是以雖其昬蔽之極而介音戛然之頃一有覺焉則即此空去聲隙乞逆反之中而其本體已洞然矣是以聖人施敎既已養之於小學之中而復扶又反開之以大學之道其必先之以格物致知之說者所以使之即其所養之中而因其所𤼵以啓其明之之端也繼之以誠意正心修身之目者則又所以使之因其已明之端而反之於身以致其明之之實也夫音扶既有以啟其明之之端而又有以致其明之之實則吾之所得於天而未嘗不明者豈不超然無有氣質物欲之累而復得其本體之全哉是則所謂明明德者而非有所作為於性分去聲之外也然其所謂明德者又人人之所同得而非有我之得私也向也俱為物欲之所蔽則其賢愚之分固無以大相逺者今吾既幸有以自明矣則視彼衆人之同得乎此而不能自明者方且甘心迷惑沒溺於卑汚音汙茍賤之中而不自知也豈不為去聲之惻然而思有以救之哉故必推吾之所自明者以及之始於齊家中於治國而終及於平天下使彼有是明德而不能自明者亦皆有以自明而去上聲其舊染之汚焉是則所謂新民者而亦非有付畀必至反増益之也然德之在已而當明與其在民而當新者則又皆非人力之所為而吾之所以明而新之者又非可以私意茍且而為也是其所以得之於天而見形甸反於目用之間者固已莫不各有本然一定之則程子所謂以其義理精微之極有不可得而名者故姑以至善目之而𫝊去聲所謂君之仁臣之敬子之孝父之慈與人交之信乃其目之大者也衆人之心固莫不有是而或不能知學者雖或知之而亦鮮上聲能必至於是而不去此為大學之敎者所以慮其禮雖粗復而有不純已雖粗克而有不盡且將無以盡夫音扶修己治人之道故必指是而言以為明德新明之標的也欲明徳而新民者誠能求必至是而不容其少有過不及之差焉則其所以去上聲人欲而復天理者無毫髪之遺恨矣大抵大學一篇之指總而言之不出乎八事而八事之要總而言之又不出乎此三者此愚所以斷都玩切然以為大學之綱領而無疑也然自孟子沒而道學不得其𫝊世之君子各以其意之所便者為學於是乃有不務明其明德而徒以政敎法度為足以新民者又有愛身獨善自謂足以明其明徳而不屑乎新民者又有略知二者之當務顧乃安於小成狃女九反於近利而不求止於至善之所在者是皆不考乎此篇之過其能成已成物而不謬者鮮上聲矣曰程子之改親為新也何所據子之從之又何所考而必其然邪且以已意輕改經文恐非𫝊如字疑之義奈何春秋穀梁𫝊云信以𫝊信疑以𫝊疑𫝊疑二字本此曰若無所考而輒改之則誠若吾子之譏矣今親民云者以文義推之則無理新民云者以𫝊去聲文考之則有據程子於此其所以處上聲之者亦已審矣矧未嘗去上聲其本文而但曰某當作某是乃漢儒釋經不得已之變例而亦何害於𫝊疑邪若必以不改為是則世蓋有承誤踵訛心知非是而故為穿鑿附會以求其說之必通者矣其侮聖言而誤後學也益甚亦何足取以為法邪曰知止而后有定定而后能靜慮而后能得何也曰此推本上文之意言明德新民所以止於至善之由也蓋明德新民固皆欲其止於至善然非先有以知夫音扶下同至善之所在則不能有以得其所當止者而止之如射者固欲其中去聲下同夫正音征鵠音谷然不先有以知其正鵠之所在則不能有以得其所當中者而中之也知止云者物格知至而於天下之事皆有以知其至善之所在是則吾所當止之地也能知所止則方寸之間事事物物皆有定理矣理既有定則無以動其心而能靜矣心既能靜則無所擇於地而能安矣能安則日用之閒從七從反容閒音閑暇事至物來有以揆之而能慮矣能慮則隨事觀理極深研㡬平聲無不各得其所止之地而止之矣然既真知所止則其必得所止固已不甚相逺其間四節蓋亦推言其所以然之故有此四者非如孔子之志學以至從心孟子之善信以至聖神實有等級之相懸為終身經歴之次序也曰物有本末事有終始知所先後則近道矣何也曰此結上文兩節之意也明德新民兩物而内外相對故曰本末知止能得一事而首尾相因故曰終始誠知先其本而後其末先其始而後其終也則其進為有序而至於道也不逺矣曰古之欲明明德於天下者先治其國云云致知在格物何也曰此言大學之序其詳如此蓋綱領之條目也格物致知誠意正心修身者明明德之事也齊家治國平天平者新民之事也格物致知所以求知至善之所在自誠意以至於平天下所以求得夫至善而止之也所謂明明德於天下者自明其明德而推以新民使天下之人皆有以明其明德也人皆有以明其明德則各誠其意各正其心各修其身各親其親各長上聲其長而天下無不平矣然天下之本在國故欲平天下者必先有以治其國國之本在家故欲治國者必先有以齊其家家之本在身故欲齊家者必先有以修其身至於身之主則心也一有不得其本然之正則身無所主雖欲勉强上聲下同以修之亦不可得而修矣故欲修身者必先有以正其心而心之𤼵則意也一有私欲雜乎其中而為善去上聲惡或有未實則心為所累雖欲勉强以正之亦不可得而正矣故欲正心者必先有以誠其意若夫音扶知則心之神明妙衆理而宰萬物者也人莫不有而或不能使其表裏洞然無所不盡則隱微之閒真妄錯雜雖欲勉强以誠之亦不可得而誠矣故欲誠意者必先有以致其知致者推致之謂如喪致乎哀之致言推之而至於盡也至於天下之物則必各有所以然之故與其所當然之則所謂理也人莫不知而或不能使其精粗隱顯究極無餘則理所未窮知必有蔽雖欲勉强以致之亦不可得而致矣故致知之道在乎即事觀理以格夫音扶物格者極至之謂如格于文祖之格言窮之而至其極也此大學之條目聖賢相𫝊所以教人為學之次第至為纎悉然漢魏以來諸儒之論未聞有及之者至唐韓子名愈字退之乃能援音袁以為說而見形甸反於原道之篇則庶㡬其有聞矣然其言極於正心誠意而無曰致知格物云者則是不探音貪其端而驟語其次亦未免於擇焉不精語焉不詳之病矣何乃以是而議荀揚哉韓文集荀與揚也擇焉而不精語焉而不詳荀子名況字卿戰國時趙人也揚子名雄字子雲西漢成都人也各有所著書今傳於世曰物格而后知至云云國治而后天下平何也曰此覆說上文之意也物格者事物之理各有以詣其極而無餘之謂也理之在物者既詣其極而無餘則知之在我者亦隨所詣而無不盡矣知無不盡則心之所𤼵能一於理而無自欺矣意不自欺則心之本體物不能動而無不正矣心得其正則身之所處上聲不至陷於所偏而無不修矣身無不修則推之天下國家亦舉而措之耳豈外此而求之智謀功利之末哉曰篇首之言明明德以新民為對則固専以自明為言矣後段於平天下者復扶又反以明明德言之則似新民之事亦在其中何其言之不一而辨之不明邪曰篇首三言者大學之綱領也而以其賔主對待先後次第言之則明明德者又三言之綱領也至此後段然後極其體用之全而一言以舉之以見形甸反夫音扶天下雖大而吾心之體無不該事物雖多而吾心之用無不貫蓋必析之有以極其精而不亂然後合之有以盡其大而無餘此又言之序也曰自天子至於庶人云云未之有也何也曰此結上文兩節之意也以身對天下國家而言則身為本而天下國家為末以家對國與天下而言則其理雖未嘗不一然其厚薄之分去聲亦不容無等差楚加反矣故不能格物致知以誠意正心而修其身則本必亂而末不可治不親其親不長上聲下同其長則所厚者薄而無以及人之親長此皆必然之理也孟子所謂於所厚者薄無所不薄其言蓋亦本於此云曰治國平天下者天子諸侯之事也卿大夫以下蓋無與音預焉今大學之敎乃例以明明德於天下為言豈不為思出其位犯非其分去聲而何以得為為下去聲已之學哉曰天之明命有生之所同得非有我之得私也是以君子之心豁然大公其視天下無一物而非吾心之所當愛無一事而非吾職之所當為雖或勢在匹夫之賤而所以堯舜其君堯舜其民者亦未嘗不在其分去聲内也又況大學之敎乃為去聲天子之元子衆子公侯卿大夫士之適音的子與國之俊選去聲而設是皆将有天下國家之責而不可辭者則其所以素敎而預養之者安得不以天下國家為已事之當然而預求有以正其本清其源哉後世敎學不明為人君父者慮不足以及此而茍循於目前是以天下之治去聲日常少亂日常多而敗國之君亡家之主常接迹於當世亦可悲矣論者不此之監而反以聖法為疑亦獨何哉大抵以學者而視天下之事以為已事之所當然而為之則雖甲兵錢穀籩豆有司之事皆為去聲已也以其可以求知於世而為之則雖割股廬墓弊車羸力為反馬亦為去聲人耳善乎張子敬夫之言曰張子名栻字敬夫號南軒廣漢人乃朱子同志之友也為已者無所為而然者也此其語意之深切蓋有前賢所未𤼵者學者以是而日自省悉井反焉則有以察乎善利之間而無毫釐之差矣曰子謂正經蓋夫子之言而曾子述之其𫝊去聲則曾子之意而門人記之何以知其然也曰正經辭約而理備言近而指逺非聖人不能及也然以其無他左驗且意其或出於古昔先民之言也故疑之而不敢質至於𫝊文或引曾子之言而又多與中庸孟子者合則知其成於曾氏門人之手而子思以授孟子無疑也蓋中庸之所謂明善即格物致知之功其曰誠身即誠意正心修身之效也孟子之所謂知性者物格也盡心者知至也存心養性修身者誠意正心修身也其他如謹獨之云不慊口簟口刼二反之說義利之分恒言之序亦無不脗武粉反又音泯合焉者故程子以為孔氏之遺書學者之先務而論孟猶處上聲其次焉亦可見矣曰程子之先是書而後論孟又且不及乎中庸何也曰是書垂世立敎之大典通為去聲天下後世而言者也論孟應機接物之微言或因一時一事而𤼵者也是以是書之規模雖大然其首尾該備而綱領可尋節目分明而工夫有序無非切於學者之日用論孟之為去聲人雖切然而問者非一人記者非一手或先後深淺之無序或抑揚進退之不齊其問蓋有非初學日用之所及者此程子所以先是書後論孟蓋以其難易去聲下同緩急言之而非以聖人之言為有優劣也至於中庸則又聖門𫝊授極致之言尤非後學之所易得而聞者故程子之敎未遽及之豈不又以為論孟既通然後可以及此乎蓋不先乎大學無以提挈綱領而盡論孟之精微不參之論孟無以融貫㑹通而極中庸之歸趣然不㑹其極於中庸則又何以建立大本經綸大經而讀天下之書論天下之事哉以是觀之則務講學者固不可不急於四書而讀四書者又不可不先於大學亦已明矣今之敎者乃或棄此不務而反以他說先焉其不溺於虛空流於功利而得罪於聖門者㡬希矣或問一章而下以至三章之半鄭本元在没世不忘之下而程子乃以次於此謂知之至也之文子獨何以知其不然而遂以為𫝊之首章也曰以經統𫝊以𫝊附經則其次第可知而二說之不然審矣曰然則其曰克明德者何也曰此言文王能明其徳也蓋人莫不知德之當明而欲明之然氣稟拘之於前物欲蔽之於後是以雖欲明之而有不克也文王之心渾然天理亦無待於克之而自明矣然猶云爾者亦見其獨能明之而他人不能又以見夫音扶未能明者之不可不致其克之之功也曰顧諟天之明命何也曰人受天地之中以生故人之明德非他也即天之所以命我而至善之所存也是其全體大用蓋無時而不𤼵見形甸反於日用之閒人惟不察於此是以汩音骨於人欲而不知所以自明常目在之而真若見其參於前倚於衡也則成性存存而道義出矣曰克明峻德何也曰言堯能明其大德也曰是三者固皆自明之事也然其言之亦有序乎曰康誥通言明徳而已太甲則明天之未始不為人而人之未始不為天也帝典則専言成德之事而極其大焉其言之淺深亦略有序矣或問盤之有銘何也曰盤者常用之器銘者自警之辭也古之聖賢兢兢業業固無時而不戒謹恐懼然猶恐其有所怠忽而或忘之也是以於其常用之器各因其事而刻銘以致戒焉欲其常接乎目每警乎心而不至於忽忘也曰然則沐浴之盤而其所刻之辭如此何也曰人之有是德猶其有是身也德之本明猶其身之本潔也德之明而利欲昬之猶身之潔而塵垢音苟汚音烏又去聲之也一旦存養省悉井反察之功真有以去上聲下同其前日利欲之昬而日新焉則亦猶其疏平聲瀹音藥澡音蚤雪而有以去其前日塵垢之汚也然既新矣而所以新之之功不繼則利欲之交將復扶又反下同有如前日之昬猶既潔矣而所以潔之之功不繼則塵垢之集將復有如前日之汚也故必因其已新而日日新之又日新之使其存養省察之功無少間斷間去聲㫁徒玩反則明德常明而不復為利欲之昬亦如人之一日沐浴而日日沐浴又無日而不沐浴使其疏瀹澡雪之功無少間斷則身常潔清而不復為舊染之汚也昔成湯所以反之而至於聖者正惟有得於此故稱其德者有曰不邇聲色不殖貨利又曰以義制事以禮制心有曰從諫弗咈音佛改過不吝又曰與人不求備檢身若不及此皆足以見其日新之實至於所謂聖敬日躋牋西反云者則其言愈約而意愈切矣然本湯之所以得此又其學於伊尹而有𤼵焉故伊尹自謂與湯咸有一德而於復如字政太甲之初復扶又反下同以終始惟一時乃日新為丁寧之戒蓋於是時太甲方且自怨自艾音乂於桐處上聲仁遷義而歸是亦所謂苟日新者故復推其嘗以告于湯者告之欲其日進乎此無所間斷而有以繼其烈祖之成德也其意亦深切矣其後周之武王踐阼存故反之初受師尚父丹書之戒曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶退而於其几席觴豆刀劒戸牖莫不銘焉蓋聞湯之風而興起者今其遺語尚幸頗見形甸反於禮書願治去聲之君志學之士皆不可以莫之考也大戴禮武王踐祚篇武王踐祚三日召師尚父而問焉曰黄帝顓帝之道可得而見與曰在丹書王欲聞之則齊矣王齊三日師尚父奉書而入道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶凡事不强則枉弗敬則不正枉者滅廢敬者萬世王聞書之言惕若恐懼而為戒書於席四端為銘焉銘曰安樂必敬無行可悔一反一側亦不可不志殷監不逺視爾所代几銘曰皇皇惟敬口生㖃口戕口鑑銘曰見爾前慮爾後盤銘曰與其溺于人也寕溺于淵溺于淵猶可游也溺于人不可捄也楹銘曰毋曰胡殘其禍将然毋曰胡害其禍将大毋曰胡傷其禍将長杖銘曰於乎危於忿疐於乎失道於嗜欲於乎相忘於富貴帶銘曰火滅修容慎戒必共共則夀屨銘曰慎之勞勞則富觴豆銘曰食自杖食自杖戒之驕驕則逸户銘曰夫名難得而易失無勤弗志而曰我知之乎無勤弗及而曰我知之乎擾阻以泥之若風将至先揺揺雖有聖人不能為謀牗銘曰隨天之時以地之財敬祀皇天敬以先時劒銘曰帶之以為服動必行德行德則興倍徳則崩弓銘曰屈伸之義廢興之行無忘息過矛銘曰造矛造矛少間弗忍終身之羞余一人所聞以戒萬世子孫曰此言新民其引此何也曰此自其本而言之蓋以是為自新之至而新民之端也曰康誥之言作新民何也曰武王之封康叔也以商之餘民染紂汚俗而失其本心也故作康誥之書而告之以此欲其有以鼓舞而作興之使之振奮踴躍以去去聲其惡而遷於善舍上聲其舊而進乎新也然此豈聲色號令之所及哉亦自新而已矣曰孔氏小序以康誥為成王周公之書而子以武王言之何也曰此五峰胡氏之說也胡氏名宏字仁仲建安人文定公安國之子也其說見皇王大紀蓋嘗因而考之其曰朕弟寡兄云者皆為武王之自言乃得事理之實而其他證亦多小序之言不足深信於此可見然非此書大義所關故不暇於致詳當别為去聲讀書者言之耳曰詩之言周雖舊邦其命維新何也曰言周之有邦自后稷以來千有餘年至于文王聖德日新而民亦丕變故天命之以有天下是其邦雖舊而命則新也蓋民之視效在君而天之視聴在民君德既新則民德必新民德既新則天命之新亦不旋日矣曰所謂君子無所不用其極者何也曰此結上文詩書之意也蓋盤銘言自新也康誥言新民也文王之詩自新新民之極也故曰君子無所不用其極極即至善之云也用其極者求其止於是而已矣或問此引𤣥鳥之詩何也曰此以民之止於邦畿而明物之各有所止也曰引緜蠻之詩而系以孔子之言孔子何以有是言也曰此夫子說詩之辭也蓋曰鳥於其欲止之時猶知其當止之處豈可人為萬物之靈而反不如鳥之能知所止而止之乎其所以𤼵明人當知止之義亦深切矣曰引文王之詩而繼以君臣父子與國人交之所止何也曰此因聖人之止以明至善之所在也蓋天生烝民有物有則是以萬物庶事莫不各有當止之所但所居之位不同則所止之善不一故為人君則其所當止者在於仁為人臣則其所當止者在於敬為人子則其所當止者在於孝為人父則其所當止者在於慈與國人文則其所當止者在於信是皆天理人倫之極致𤼵於人心之不容已者而文王之所以為法於天下可𫝊於後世者亦不能加毫末於是焉但衆人類為氣稟物欲之所昬故不能常敬而失其所止唯聖人之心表裏洞然無有一毫之蔽故連續光明自無不敬而所止者莫非至善不待知所止而後得所止也故𫝊引此詩而歴陳所止之實使天下後世得以取法焉學者於此誠有以見其發於本心之不容己者而緝熙之使其連續光明無少間斷則其敬止之功是亦文王而已矣詩所謂上天之載無聲無臭儀刑文王萬邦作孚正此意也曰子之說詩既以敬止之止為語助之辭而於此書又以為所止之義何也曰古人引詩斷音短章或姑借其辭以明己意未必皆取本文之義也曰五者之目詞約而義該矣子之說乃復扶又反有所謂究其精微之藴而推類以通之者何其言之衍廷面反而不切邪曰舉其德之要而總名之則一言足矣論其所以為是一言者則其始終本末豈一言之所能盡哉得其名而不得其所以名則仁或流於姑息敬或墮於阿䛕孝或陷父而慈或敗子且其為信亦未必不為尾生白公之為也荘子云尼生與女子期於梁下女子不來水至不去抱梁柱而死左哀十六年鄭人殺子木其子勝在呉子西召之使處吳竟為白公曰楚邑公邑宰十六年請伐鄭子西許之未起師晉人伐鄭楚救之勝怒曰鄭人在此讎不逺矣勝自厲劒子期之子平見之曰王孫何自属也曰勝以直聞不告女音汝庸為直乎将以殺爾父遂作亂殺子西子期于朝又況𫝊之所陳姑以見形甸反物各有止之凡例其於大倫之目猶且闕其二焉苟不推類以通之則亦何以盡天下之理哉曰復扶又反引淇澳之詩何也曰上言止於至善之理備矣然其所以求之之方與其得之之驗則未之及故又引此詩以𤼵明之也夫音扶如切如磋言其所以講於學者巳精而益求其精也如琢如磨言其所以修於身者已密而益求其密也此其所以擇善固執日就月將而得止於至善之由也恂慄者嚴敬之存乎中也威儀者輝光之著乎外也此其所以睟雖萃反面盎背施於四體而為止於至善之驗也盛德至善民不能忘蓋人心之所同然聖人既先得之而其充盛宣著又如此是以民皆仰之而不能忘也盛德以身之所得而言也至善以理之所極而言也切磋琢磨求其止於是而已矣曰切磋琢磨何以為學問自修之别彼列反也曰骨角脈理可尋而切磋之功易去聲所謂始條理之事也玉石渾全堅確克角反而琢磨之功難所謂終條理之事也曰引烈文之詩而言前王之没世不忘何也曰賢其賢者聞而知之仰其德業之盛也親其親者子孫保之思其覆敷救反育之恩也樂其樂者含哺蒲故反鼔腹而安其樂也利其利者耕田鑿井而享其利也此皆先王盛德至善之餘澤故雖己没世而人猶思之愈久而不能忘也上文之引淇澳以明明德之得所止言之而𤼵新民之端也此引烈文以新民之得所止言之而著明明德之效也曰淇澳烈文二節鄭本元在誠意章後而程子置之卒章之中子獨何以知其不然而屬音燭下同之此也曰二家所繫文意不屬故有不得而從者且以所謂道盛德至善没世不忘者推之則知其當屬乎此也或問聴訟一章鄭本元在止於信之後正心修身之前程子又進而寘之經文之下此謂知之至也之上子不之從而寘之於此何也曰以𫝊之結語考之則其為釋本末之義可知矣以經之本文乘之則其當屬音燭於此可見矣二家之說有未安者故不得而從也曰然則聴訟無訟於明德新民之義何所當去聲也曰聖人德盛仁熟所以自明者皆極天下之至善故能大有以畏服其民之心志而使之不敢盡其無實之辭是以雖其聴訟無以異於衆人而自無訟之可聴蓋已德既明而民德自新則得其本之明效也或不能然而欲區區於分爭辨訟之間以求新民之效其亦末矣此𫝊者釋經之意也曰然則其不論夫終始者何也曰古人釋經取其大略未必如是之屑屑也且此章之下有闕文焉又安知其非本有而并失之也邪或問此謂知本其一為聴訟章之結語則聞命矣其一鄭本元在經文之後此謂知之至也之前而程子以為衍文何也曰以其複音福出而他無所繫也曰此謂知之至也鄭本元隨此謂知本繫於經文之後而下屬音燭下同誠意之前程子則去上聲其上句之複而附此句於聽訟知本之章以屬明德之上是必皆有說矣子獨何據以知其皆不盡然而有所取舍上聲於其間邪曰此無以他求為也考之經文初無再論知本知至之云者則知屬之經後者之不然矣觀於聽訟之章既以知本結之而其中間又無知至之說則知再結聴訟者之不然矣且其下文所屬明德之章自當為𫝊文之首又安得以此而先之乎故愚於此皆有所不能無疑者獨程子上句之所刪鄭氏下文之所屬則以經𫝊之次求之而有合焉是以不得而異也曰然則子何以知其為釋知至之結語而又知其上之當有闕文也曰以文義與下文推之而知其釋知至也以句法推之而知其為結語也以𫝊之例推之而知其有闕文也曰此經之序自誠意以下其義明而𫝊悉矣獨其所謂格物致知者字義不明而𫝊復扶又反下同闕焉且為最初用力之地而無復上文語緒之可尋也子乃自謂取程子之意以補之則程子之言何以見其必合於經意而子之言又似不盡出於程子何邪曰或問於程子曰學何為而可以有覺也程子曰學莫先於致知能致其知則思日益明至於久而後有覺爾書所謂思曰睿睿作聖董子所謂勉强上聲下同學問則聞見博而智益明出漢武建元元年賢良策正謂此也學而無覺則亦何以學為也哉或問忠信則可勉矣而致知為難奈何程子曰誠敬固不可以不勉然天下之理不先知之亦未有能勉以行之者也故大學之序先致知而後誠意其等有不可躐者苟無聖人之聰明睿智而徒欲勉焉以踐其行去聲事之迹則亦安能如彼之動容周旋無不中去聲禮也哉惟其燭理之明乃能不待勉强而自樂音洛下同循理爾夫音扶下同人之性本無不善偱理而行宜無難者惟其知之不至而但欲以力為之是以苦其難而不知其樂耳知之而至則循理為樂不循理為不樂何苦而不循理以害吾樂邪昔嘗見有談虎傷人者衆莫不聞而其間一人神色獨變問其所以乃嘗傷於虎者也夫虎能傷人人孰不知然聞之有懼有不懼者知之有真有不真也學者之知道必如此人之知虎然後為至耳若曰知不善之不可為而猶或為之則亦未嘗真知而已矣此兩條者皆言格物致知所以當先而不可後之意也又有問進修之術何先者程子曰莫先於正心誠意然欲誠意必先致知而欲致知又在格物致盡也格至也凡有一物必有一理窮而至之所謂格物者也然而格物亦非一端如或讀書講明道義或論古今人物而别彼列反其是非或應接事物而處上聲其當去聲否皆窮理也曰格物者必物物而格之邪将止格一物而萬理皆通邪曰一物格而萬理通雖顔子亦未至此惟今日而格一物焉明日又格一物焉積習既多然後脫然有貫通處耳又曰自一身之中以至萬物之理理㑹得多自當豁然有箇覺處又曰窮理者非謂必盡窮天下之理又非謂止窮得一理便到但積累魯水反多後自當脫然有悟處又曰格物非欲盡窮天下之物但於一事上窮盡其他可以類推至於言孝則當求其所以為孝者如何若一事上窮不得且别窮一事或先其易去聲者或先其難者各隨人淺深譬如干蹊萬徑皆可以適國但得一道而入則可以推類而通其餘矣葢萬物各具一理而萬理同出一原此所以可推而無不通也又曰物必有理皆所當窮若天地之所以髙深鬼神之所以幽顯是也若曰天吾知其髙而已矣地吾知其深而已矣鬼神吾知其幽且顯而已矣則是已然之詞又何理之可窮哉又曰如欲為孝則當知所以為孝之道如何而為奉養去聲之宜如何而為温凊七性反之節莫不窮究然後能之非獨守夫音扶孝之一字而可得也或問觀物察已者豈因見物而反求諸已乎曰不必然也物我一理纔明彼即曉此此合内外之道也語其大天地之所以髙厚語其小至一物之所以然皆學者所宜致思也曰然則先求之四端可乎曰求之性情固切於身然一草一木亦皆有理不可不察又曰致知之要當知至善之所在如父止於慈子止於孝之類若不務此而徒欲汎然以觀萬物之理則吾恐其如大軍之遊騎奇去聲出太逺而無所歸也又曰格物莫若察之於身其得之尤切此九條者皆言格物致知所當用力之地與其次第工程也又曰格物窮理但立誠意以格之其遲速則在乎人之明暗耳又曰入道莫如敬未有能致知而不在敬者又曰涵養須用敬進學則在致知又曰致知在乎所養養知莫過於寡欲又曰格物者適道之始思欲格物則固已近道矣是何也以收其心而不放也此五條者又言涵養本原之功所以為格物致知之本者也凡程子之為說者不過如此其於格物致知之𫝊詳矣今也尋其義理既無可疑考其字義亦皆有據至以他書論之則文言所謂學聚問辨中庸所謂明善擇善孟子所謂知性知天又皆在乎固守力行之先而可以驗夫音扶大學始敎之功為有在乎此也愚嘗反覆考之而有以信其必然是以竊取其意以補𫝊文之闕不然則又安敢犯不韙音偉之罪為無證之言以自託於聖經賢𫝊之間乎曰然則吾子之意亦可得而悉聞之乎曰吾聞之也天道流行造化𤼵育凡有聲色貌象而盈於天地之閒者皆物也既有是物則其所以為是物者莫不各有當然之則而自不容已是皆得於天之所賦而非人之所能為也今且以其至切而近者言之則心之為物實主於身其體則有仁義禮智之性其用則有惻隱羞惡恭敬是非之情渾然在中隨感而應各有攸主而不可亂也次而及於身之所具則有口鼻耳目四肢之用又次而及於身之所接則有君臣父子夫婦長幼朋友之常是皆必有當然之則而自不容已所謂理也外而至於人則人之理不異於已也逺而至於物則物之理不異於人也極其大則天地之運古今之變不能外也盡於小則一塵之微一息之頃不能遺也是乃上帝所降之衷書湯誥篇烝民所秉之彞詩烝民篇劉子所謂天地之中左成十三年劉康公成肅公會晉侯伐秦成子受脤于社不敬劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍夫子所謂性與天道子思所謂天命之性孟子所謂仁義之心程子所謂天然自有之中張子所謂萬物之一原張子名載字子厚家於鳯翔府邵縣横渠鎮世號横渠先生正蒙書誠明篇曰性者萬物之一原非有我之得私也邵子所謂道之形體者邵子名雍字堯夫諡康節河南人性者道之形體見擊壤集序但其氣質有清濁偏正之殊物欲有淺深厚薄之異是以人之與物賢之與愚相與懸絶而不能同耳以其理之同故以一人之心而於天下萬物之理無不能知以其稟之異故於其理或有所不能窮也理有未窮故其知有不盡知有不盡則其心之所𤼵必不能純於義理而無雜乎物欲之私此其所以意有不誠心有不正身有不修而天下國家不可得而治也昔者聖人蓋有憂之是以於其始敎為之小學而使之習於誠敬則所以收其放心養其德性者已無所不用其至矣及其進乎大學則又使之即夫音扶事物之中因其所知之理推而究之以各到乎其極則吾之知識亦得以周徧精切而無不盡也若其用力之方則或考之事為之著或察之念慮之微或求之文字之中或索山客反之講論之際使於身心性情之德人倫日用之常以至天地鬼神之變鳥獸草木之宜自其一物之中莫不有以見其所當然而不容已與其所以然而不可易者必其表裏精粗無所不盡而又益推其類以通之至於一日豁然而貫通焉則於天下之物皆有以究其義理精微之所極而吾之聰明睿智亦皆有以極其心之本體而無不盡矣此愚之所以補乎本𫝊闕文之意雖不能盡用程子之言然其指趣要歸則不合者鮮上聲矣讀者其亦深考而實識之哉曰然則子之為學不求諸心而求諸迹不求之内而求之外吾恐聖賢之學不如是之淺近而支離也曰人之所以為學心與理而已矣心雖主乎一身而其體之虛靈足以管乎天下之理理雖散在萬物而其用之微妙實不外乎一人之心初不可以内外精粗而論也然或不知此心之靈而無以存之則昬昧雜擾而無以窮衆理之妙不知衆理之妙而無以窮之則偏一作褊狹固滯而無以盡此心之全此其理勢之相須蓋亦有必然者是以聖人設敎使人黙識此心之靈而存之於端莊靜一之中以為窮理之本使人知有衆理之妙而窮之於學問思辨之際以致盡心之功巨細相涵動靜交養初未嘗有内外精粗之擇及其真積力乆而豁然貫通焉則亦有以知其渾然一致而果無内外精粗之可言矣今必以是為淺近支離而欲藏形匿影别為一種上聲幽深恍惚艱難阻絶之論務使學者莽模黨反然措其心於文字言語之外而曰道必如此然後可以得之則是近世佛學詖淫邪遁之尤者而欲移之以亂古人明徳新民之實學其亦誤矣曰近世大儒有為格物致知之說者曰格猶扞音汗也禦也能扞禦外物而後能知至道也此司馬公之說又有推其說者曰人生而靜其性本無不善而有為不善者外物誘音酉之也所謂格物以致其知者亦曰扞去上聲外物之誘而本然之善自明耳孔周翰說是其為說不亦善乎曰天生烝民有物有則則物之與道固未始相離去聲也今曰禦外物而後可以知至道則是絶父子而後可以知孝慈離如字君臣而後可以知仁敬也是安有此理哉若曰所謂外物者不善之誘耳非指君臣父子而言也則夫音外物之誘人莫甚於飲食男女之欲然推其本則固亦莫非人之所當有而不能無者也但於其間自有天理人欲之辨而不可以毫釐力之反正作氂差耳惟其徒有是物而不能察於吾之所以行乎其間者孰為天理孰為人欲是以無以致其克復之功而物之誘於外者得以奪乎天理之本然也今不即物以窮其原而徒惡去聲物之誘乎已乃欲一切扞而去上聲之則是必閉口枵虛驕反腹然後可以得飲食之正絶滅種上聲類然後可以全夫婦之别筆列反也是雖裔以制反戎無君無父之敎有不能充其說者況乎聖人大中至正之道而得以此亂之哉曰自程子以格物為窮理而其學者𫝊之見形甸反於文字多矣是亦有以𤼵其師說而有助於後學者邪曰程子之說切於已而不遺於物本於行去聲事之實而不廢文字之功極其大而不略其小究其精而不忽其粗學者循是而用力焉則既不務博而陷於支離亦不徑約而流於狂妄既不舍上聲其積累之漸而其所謂豁然貫通者又非見聞思慮之可及也是於說經之意入德之方其亦可謂反復芳服反亦作覆詳備而無俟於𤼵明矣若其門人雖曰祖其師說然以愚考之則恐其皆未足以及此也蓋有以必窮萬物之理同出於一為格物知萬物同出乎一理為知至如合内外之道則天人物我為一通晝夜之道則死生幽明為一達哀樂音洛好惡並去聲之情則人與鳥獸魚龞為一求屈伸消長之變則天地山川草木為一者似矣吕與叔說然其欲必窮萬物之理而専指外物則於理之在已者有不明矣但求衆物比類之同而不究一物性情之異則於理之精微者有不察矣不欲其異而不免乎四說之異必欲其同而未極乎一原之同則徒有牽合之勞而不睹貫通之妙矣其於程子之說何如哉又有以為窮理只是尋箇是處然必以恕為本而又先其大者則一處理通而觸處皆通者謝顯道說其曰尋箇是處者則得矣而曰以恕為本則是求仁之方而非窮理之務也又曰先其大者則不若先其近者之切也又曰一處通而一切通則又顔子之所不能及程子之所不敢言非若類推積累之可以循序而必至也又有以為天下之物不可勝平聲窮然皆備於我而非從外得也所謂格物亦曰反身而誠則天下之物無不在我者是亦似矣楊中立說然反身而誠乃為物格知至以後之事言其窮理之至無所不盡故凡天下之理反求諸身皆有以見其如目視耳聽手持足行之畢具於此而無毫髪之不實耳固非以是方為格物之事亦不謂但務反求諸身而天下之理自然無不誠也中庸之言明善即物格知至之事其言誠身即意誠心正之功故不明乎善則有反諸身而不誠者其功夫地位固有序而不可誣矣今為格物之說又安得遽以是而為言哉又有以今日格一物明日格一物為非程子之言者尹彦明說則諸家所記程子之明此類非一不容皆誤且其為說正中庸學問思辨弗得弗措之事無所咈音佛於理者不知何所病而疑之也豈其習於持敬之約而厭夫音扶下同觀理之煩邪抑直以己所未聞而不信他人之所聞也夫持敬觀理不可偏廢程子固已言之若以已偶未聞而遂不之信則以有子之似聖人而速貧速朽之論猶不能無待於子游而後定今又安得遽以一人之所未聞而盡廢衆人之所共聞者哉禮記檀弓上有子問於曾子曰聞喪於夫子乎曰聞之矣喪欲速貧死欲速朽有子曰是非君子之言也曾子曰參也與子游聞之有子曰然然則夫子有為言之也曾子以斯言告於子游子游曰甚哉有子之言似夫子也昔者夫子居於宋見桓司馬自為石槨三年而不成夫子曰若是其靡也死不如速朽之愈也死之欲速朽為桓司馬言之也南宮敬叔反必載寳而朝夫子曰若是其貨也喪不如速貧之愈也喪之欲速貧為敬叔言之也曾子以子游之言告於有子有子曰然吾固曰非夫子之言也又有以為物物致察而宛轉歸已如察天行以自强察地勢以厚德者亦似矣胡安國説然其曰物物致察則是不察程子所謂不必盡窮天下之物也又曰宛轉歸已則是不察程子所謂物我一理纔明彼即曉此之意也又曰察天行以自强察地勢以厚德則是但欲因其己定之名擬其已著之迹而未嘗如程子所謂求其所以然與其所以為者之妙也獨有所謂即事即物不厭不棄而身親格之以精其知者為得致字向裏之意而其曰格之之道必立志以定其本居敬以持其志志立乎事物之表敬行乎事物之内而知乃可精者胡仁仲說又有以合乎所謂未有致知而不在敬者之指但其語意頗傷急迫既不能盡其全體規模之大又無以見其從七恭反容潛玩積久貫通之功耳嗚呼程子之言其答問反復之詳且明也如彼而其門人之所以為說者乃如此雖或僅有一二之合焉而不免於猶有所未盡也是亦不待七十子喪去聲而大義已乖矣出家語尚何望其能有所𤼵而有助於後學哉間獨惟念昔聞延平先生之敎先生姓李氏諱通字愿中受學於豫章羅仲素仲素即龜山楊文靖之髙弟也文靖倡道東南從游者衆然語其潛思力行任重詣極則羅公一人而已羅公授道於延平延平授道於朱子以為為學之初且當常存此心勿為他事所勝凡遇一事即當且就此事反復推尋以究其理待此一事融釋脫落然後循序少進而别窮一事如此既久積累之多胷中自當有灑然處非文字言語之所及也詳味此言雖其規模之大條理之密若不逮於程子然其功夫之漸次意味之深切則有非他說所能及者惟嘗實用力於此者為能有以識之未易去聲以口舌爭也曰然則所謂格物致知之學與世之所謂博物洽聞者奚以異曰此以反身窮理為主而必究其本末是非之極摯與至同彼以徇外誇多為務而不覈下革反其表裏真妄之實然必究其極是以知愈博而心愈明不覈其實是以識愈多而心愈窒陟力反此正為去聲下同已為人之所以分不可不察也或問六章之指其詳猶有可得而言者邪曰天下之道二善與惡而已矣然揆厥所元而循其次第則善者天命所賦之本然惡者物欲所生之邪穢也是以人之常性莫不有善而無惡其本心莫不好去聲下並同善而惡惡上去聲然既有是形體之累而又為氣稟之拘是以物欲之私得以蔽之而天命之本然者不得而著其於事物之理固有瞢莫中反然不知其善惡之所在者亦有僅識其粗而不能真知其可好可惡之極者夫音扶下同不知善之真可好則其好善也雖曰好之而未能無不好者以拒之於内不知惡之真可惡則其惡惡也雖曰惡之而未能無不惡者以挽音晚之於中是以不免於茍焉以自欺而意之所𤼵有不誠者夫好善而不誠則非唯不足以為善而反有以賊乎其善惡惡而不誠則非唯不足以去上聲惡而適所以長上聲乎其惡是則其為害也徒有甚焉而何益之有哉聖人于此蓋有憂之故為大學之敎而必首之以格物致知之目以開明其心術使既有以識夫善惡之所在與其可好可惡之必然矣至此而復扶又反進之以必誠其意之說焉則又欲其謹之於幽獨隠微之奥以禁止其苟且自欺之萌而凡其心之所𤼵如曰好善則必由中及外無一毫之不好也如曰惡惡則必由中及外無一毫之不惡也夫好善而中無不好則是其好之也如好好色之真欲以快乎已之目初非為去聲人而好之也惡惡而中無不惡則是其惡之也如惡惡臭之真欲以足乎已之鼻初非為人而惡之也所𤼵之實既如此矣而須㬰之頃纎芥之微念念相承又無敢有少間㫁焉則庶乎内外昭融表裏澄澈而心無不正身無不修矣若彼小人幽隱之間實為不善而猶欲外託於善以自蓋則亦不可謂其全然不知善惡之所在但以不知其真可好惡而又不能謹之於獨以禁止其苟且自欺之萌是以淪陷至於如此而不自知耳此章之說其詳如此是固宜為自修之先務矣然非有以開其知識之真則不能有以致其好惡之實故必曰欲誠其意者先致其知又曰知至而后意誠然猶不敢恃其知之已至而聴其所自為也故又曰必誠其意必謹其獨而毋自欺焉則大學工夫次弟相承首尾為一而不假他術以雜乎其間亦可見矣後此皆然今不復扶又反重平聲出也曰然則慊之為義或以為少又以為恨與此不同何也曰慊之為字有作嗛口簟反者而字書以為口銜物也然則慊亦但為心有所銜之義而其為快為足為恨為少則以所銜之異而别筆列反下同之耳孟子所謂慊於心樂毅所謂慊於志則以銜其快與足之意而言者也史記列傳樂毅遺燕惠王書曰自五伯以來功未有及於先王者也先王以為慊於志孟子所謂吾何慊漢書所謂嗛栗姬則以銜其恨與少之意而言者也西漢外戚𫝊景帝立齊栗姬男為大子王夫人男為膠東王長公主嫖有女欲與大子為妃栗姬謝不許長公主欲與王夫人夫人許之會薄皇后廢長公主日譖栗姬短景帝嘗屬諸姬曰吾百歳後善視之栗姬怒不肯應言不遜景帝心銜之而未𤼵也長公主日譽王夫人男之美帝亦自賢之王夫人知嗛栗姬又陰使人趣大臣立栗姬為皇后大行奏事文曰子以母貴母以子貴今大子母宜號為皇后帝怒曰是乃所當言邪遂案誅大行而廢大子為臨江王栗姬以憂死卒立王夫人為皇后男為大子讀者各隨所指而觀之則既並行而不悖矣字書又以其訓快與足者讀與愜同則義愈明而音又異尤不患於無别也或問人之有心本以應物而此章之𫝊以為有所喜怒憂懼便為不得其正然則其為心也必如槁木之不復扶又反下同生死灰之不復然乃為得其正邪曰人之一心湛大減反然虛明如鑑之空如衡之平以為一身之主者固其真體之本然而喜怒憂懼隨感而應妍蚩充之反俯仰因物賦形者亦其用之所不能無者也故其未感之時至虛至靜所謂鑑空衡平之體雖鬼神有不得窺其際者固無得失之可議及其感物之際而所應者又皆中去聲節則其鑑空衡平之用流行不滯正大光明是乃所以為天下之達道亦何不得其正之有哉唯其事物之來有所不察應之既或不能無失且又不能不與俱往則其喜怒憂懼必有動乎中者而此心之用始有不得其正者耳𫝊者之意固非以心之應物便為不得其正而必如枯木死灰然後乃為得其正也惟是此心之靈既曰一身之主茍得其正而無不在是則耳目鼻口四肢百骸莫不有所聽命以供其事而其動靜語黙出入起居唯吾所使而無不合於理如其不然則身在於此而心馳於彼血肉之軀無所管攝其不為仰面貪看鳥回頭錯應人者㡬希矣孔子所謂操則存舍則亡孟子所謂求其放心從其大體者蓋皆謂此學者可不深念而屢省悉井反之哉或問八章之辟舊讀為譬而今讀為僻何也曰舊音舊説以上章例之而不合也以下文逆之而不通也是以間者竊以類例文意求之而得其說如此蓋曰人之常情於此五者一有所向則失其好去聲下同惡去聲之平而陷於一偏是以身有不修不能齊其家耳葢偏於愛則溺焉而不知其惡矣偏於惡則阻焉而不知其善矣是其身之所接好惡取舍上聲之間將無一當去聲於理者而況於閨門之内恩常掩義亦何以勝其情愛暱尼質反比音鼻之私而能有以齊之哉曰凡是五者皆身與物接所不能無而亦既有當然之則矣今曰一有所向便為偏倚而身不修則是必其接物之際此心漠然都無親踈之等貴賤之别筆列反然後得免於偏也且心既正矣則宜其身之無不修今乃猶有若是之偏何哉曰不然也此章之義實承上章其立文命意大抵相似蓋以為身與事接而後或有所偏非以為一與事接而必有所偏所謂心正而后身修亦曰心得其正乃能修身非謂此心一正則身不待檢而自修也曰親愛賤惡畏敬哀矜固人心之所宜有若夫音扶敖惰則凶德也曾謂本心而有如是之則哉曰敖之為凶徳也正以其先有是心不度待洛反所施而無所不敖爾若因人之可敖而敖之則是常情所宜有而事理之當然也今有人焉其親且舊未至於可親而愛也其位與德未至於可畏而敬也其窮未至於可哀而其惡未至於可賤也其言無足去上聲取而其行去聲無足是非也則視之泛然如塗之人而已爾又其下者則夫子之取瑟而歌孟子之隱去聲几而卧蓋亦因其有以自取而非吾故有敖之之意亦安得而遽謂之凶德哉又況此章之㫖乃為去聲慮其因有所重而陷於一偏者𤼵其言雖曰有所敖惰而其意則正欲人之於此更加詳審雖曰所當敖惰而猶不敢肆其敖惰之心也亦何病哉或問如保赤子何也曰程子有言赤子未能自言其意而為之母者慈愛之心出於至誠則凡所以求其意者雖或不中去聲而不至於大相逺矣豈待學而後能哉若民則非如赤子之不能自言矣而使之者反不能無失於其心則以本無慈愛之實而於此有不察耳傳之言此葢以明夫音扶使衆之道不過自其慈幼者而推之而慈幼之心又非外鑠式約反而有待於强上聲為也事君之孝事長之弟亦何以異於此哉既舉其細則大者可知矣曰仁讓言家貪戾言人何也曰善必積而後成惡雖小而可懼古人之深戒也書所謂爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗亦是意爾曰此章本言上行下效有不期然而然者今曰有諸已而后求諸人無諸已而后非諸人則是猶有待於勸勉程督音篤而后化且内適自修而遽欲望人之皆有已方僅免而遂欲責人以必無也曰此為去聲治其國者言之則推吾所有與民共由其條教法令之施賞善罰惡之政固有理所當然而不可已者但以所令反其所好則民不從故又推本言之欲其先成於已而有以責人固非謂其専務修己都不治人而拱手以俟其自化亦非謂其矜已之長愧人之短而脅之以必從也故先君子之言曰文公父名松字喬年號韋齋先生有諸已不必求諸人以為求諸人而無諸已則不可也無諸己不必非諸人以為非諸人而有諸已則不可也正此意也曰然則未能有善而遂不求人之善未能去上聲惡而遂不非人之惡斯不亦恕而終身可行乎哉曰恕字之㫖以如心為義葢曰如治已之心以治人如愛已之心以愛人而非苟然姑息之謂也然人之為心必嘗窮理以正之使其所以治已愛己者皆出於正然後可以即是推之以及於人而恕之為道有可言者故大學之𫝊最後兩章始及於此則其用力之序亦可見矣至即此章而論之則欲如治已之心以治人者又不過以强上聲下同於自治為本蓋能强於自治至於有善而可以求人之善無惡而可以非人之惡然後推己及人使之亦如我之所以自治而自治焉則表端景正景即影字古只作景至晉葛洪始加彡源潔流清而治已治人無不盡其道矣所以終身力此而無不可行之時也今乃不然而直欲以其不肖之身為標準視吾治敎所當及者一以姑息待之不相訓誥不相禁戒将使天下之人皆如己之不肖而淪胥以陷焉是乃大亂之道而豈所謂終身可行之恕哉近世名卿之言有曰范純仁字堯夫諡忠宣公人雖至愚責人則明雖有聰明恕已則昬茍能以責人之心責己恕己之心恕人則不患不至於聖賢矣此言近厚世亦多稱之者但恕字之義本以如心而得故可以施之於人而不可以施之於己今曰恕己則昬則是己知其如此矣而又曰以恕己之心恕人則是既不知自治其昬而遂推以及人使其亦將如我之昬而後己也乃欲由此以入聖賢之域豈不誤哉藉令平聲其意但為欲反此心以施於人則亦止可以言下章愛人之事而於此章治人之意與夫音扶中庸以人治人之說則皆有未合者蓋其為恕雖同而一以及人為主一以自治為主則二者之間毫釐之異正學者所當深察而明辨也若漢之光武亦賢君也一旦以無罪黜其妻其臣郅音質惲委粉反不能力陳大義以救其失而姑為緩辭以慰解之後漢郅惲𫝊郭皇后廢惲乃言於帝曰臣聞夫婦之好父不能得之於子況臣能得之於君乎是臣所不敢言雖然願陛下念具可否之計無令天下有議社稷而已帝曰惲善恕己量主知我必不有所左右而輕天下也是乃所謂不能三年而緦功是察放飯流歠而齒決是憚者光武乃謂惲為善恕己量主則其失又甚逺而大啟為人臣者不肯責難陳善以賊其君之罪一字之義有所不明而其禍乃至於此可不謹哉曰既結上文而復扶又反引詩者三何也曰古人言必引詩葢取其嗟嘆咏歌優游厭飫依據反有以感𤼵人之善心非徒取彼之文證此之義而己也夫音扶以此章所論齊家治國之事文具而意足矣復三引詩非能於其所論之外别有所𤼵明也然嘗試讀之則反復吟咏之間意味深長義理通暢使人心融神會有不知手舞而足蹈者是則引詩之助與音預為多焉葢不獨此他凡引詩云者皆以是求之則引者之意可見而詩之為用亦得矣曰三詩亦有序乎曰首言家人次言兄弟終言四國亦刑于寡妻至于兄弟以御于家邦之意也或問上章論齊家治國之道既以孝弟慈為言矣此論治國平天下之道而復扶又反以是為言何也曰三者人道之大端衆心之所同得者也自家以及國自國以及天下雖有大小之殊然其道不過如此而已但前章専以己推而人化為言此章又申言之以見形甸反人心之所同而不能已者如此是以君子不惟有以化之而又有以處上聲下同之也蓋人之所以為心者雖曰未嘗不同然貴賤殊勢賢愚異稟茍非在上之君子真知實蹈有以倡尺亮反之則下之有是心者亦無所感而興起矣幸其有以倡焉而興起矣然上之人乃或不能察彼之心而失其所以處之之道則彼其所興起者或不得遂而反有不均之歎是以君子察其心之所同而得夫音扶絜矩之道然後有以處此而遂其興起之善端也曰何以言絜之為度待洛反下同也曰此莊子所謂絜之百圍賈子所謂度長絜大者也莊子人間世篇匠石之齊至于曲轅見社櫟樹其大蔽牛絜之百圍賈子過秦論試使山東之國與陳涉度長絜大比量權力則不可同年而語矣前此諸儒蓋莫之省悉井反而强上聲訓以挈口結反殊無意謂先友太史范公名如圭文公父韋齋之友乃獨推此以言之而後其理可得而通也蓋絜度也矩所以為方也以己之心度人之心知人之所惡去聲下同者不異乎己則不敢以己之所惡者施之於人使吾之身一處乎此則上下四方物我之際各得其分去聲不相侵越而各就其中校音敎其所占之地則其廣狹長短又皆平均如一截然方正而無有餘不足之處去聲是則所謂絜矩者也夫音扶為天下國家而所以處心制事者一出於此則天地之間将無一物不得其所而凡天下之欲為孝弟不倍者皆得以自盡其心而無不均之歎矣天下其有不平者乎然君子之所以有此亦豈自外至而强上聲為之哉亦曰物格知至故有以通天下之志而知千萬人之心即一人之心意誠心正故有以勝一己之私而能以一人之心為千萬人之心其如此而已矣一有私意存乎其間則一膜音莫之外便為胡越雖欲絜矩亦将有所隔礙牛代反而不能通矣若趙由之為守則易去聲尉而為尉則陵守王肅之方於事上而好去聲人佞己推其所由蓋出於此而充其類則雖桀紂盜跖音隻之所為亦將何所不至哉史記酷吏𫝊周陽由者其父趙兼以淮南王舅父侯周陽故因姓周陽氏由為郎事孝文及景帝景帝時為郡守武帝即位吏治尚循謹甚然由居二千石中最為酷暴驕恣所居郡必夷其豪為守視都尉如令為令必陵太守奪之治由後為河東都尉時與其守勝屠公相告言罪勝屠公當抵罪義不受刑自殺而由棄市魏志王肅傳肅太和中拜散騎常侍肅字子雍東海郡人史評曰劉寔以為肅方事上而好下佞已此一反也性嗜榮貴而不求苟合二反也吝惜財物而治身不穢此三反也曾子曰所惡於上毋以使下止此之謂絜矩之道嗚呼肅豈知是哉曰然則絜矩之云是則所謂恕者己乎曰此固前章所謂如愛己之心以愛人者也夫子所謂終身可行程子所謂充拓音托得去則天地變化而草木蕃音煩充拓不去則天地閉而賢人隱皆以其可以推之而無不通耳然必自其窮理正心者而推之則吾之愛惡取舍上聲皆得其正而其所推以及人者亦無不得其正是以上下四方以此度音鐸之而莫不截然各得其分去聲若於理有未明而心有未正則吾之所欲者未必其所當欲吾之所惡者未必其所當惡乃不察此而遽欲以是為施於人之準則則其意雖公而事則私是将見其物我相侵彼此交病而雖庭除之内跬丘弭反步之間亦且參商參音森參商二星名矛盾盾食允反而不可行矣尚何終身之望哉是以聖賢凡言恕者又必以忠為本而程子亦言忠恕兩言如形與影欲去上聲其一而不可得蓋惟忠而後所如之心始得其正是亦此篇先後本末之意也然則君子之學可不謹其序哉曰自身而家自家而國自國而天下均為推己及人之事而傳之所以釋之者一事自為一說若有不能相通焉者何也曰此以勢之逺邇事之先後而所施有不同耳實非有異事也蓋必審於接物好惡不偏然後有以正倫理篤恩義而齊其家其家已齊事皆可法然後有以立標準胥教誨而治其國其國已治去聲民知興起然後可以推己度音鐸物舉此加彼而平天下此以其逺近先後而施有不同者也然自國以上上聲則治於内者嚴密而精詳自國以下則治於外者廣博而周遍亦可見其本末實一物首尾實一身矣何名為異說哉曰所謂民之父母者何也曰君子有絜矩之道故能以己之好惡知民之好惡又能以民之好惡為己之好惡也夫音扶好其所好而與之聚之惡其所惡而不以施焉則上之愛下真猶父母之愛其子矣彼民之親其上豈不亦猶子之愛其父母哉曰此所引節南山之詩何也曰言在尊位者人所觀仰不可不謹若人君恣己徇私不與天下同其好惡則為天下僇如桀紂幽厲也曰得衆得國失衆失國何也曰言能絜矩則民父母之而得衆得國矣不能絜矩則為天下僇而失衆失國矣曰所謂先慎乎德何也曰上言有國者不可不謹此言其所謹而當先者尤在於德也德即所謂明德所以謹之亦曰格物致知誠意正心以修其身而已矣曰此其深言務財用而失民何也曰有德而有人有土則因天分地不患乎無財用矣然不知本末而無絜矩之心則未有不爭鬭其民而施之以刼奪之敎者也易大傳曰何以聚人曰財春秋外傳曰王人者將以導利而布之上下者也故財聚於上則民散於下矣財散於下則民歸於上矣言悖而出者亦悖而入貨悖而入者亦悖而出鄭氏以為君有逆命則民有逆辭上貪於利則下人侵畔得其㫖矣曰前既言命之不易矣此又言命之不常何也曰以天命之重而致其丁寧之意亦承上文而言之也蓋善則得之者有德而有人之謂也不善則失之者悖入而悖出之謂也然則命之不常乃人之所自為耳可不謹哉曰其引秦誓何也曰言好善之利及其子孫不好善之害流於後世亦由絜矩與否之異也曰媢疾之人誠可惡矣然仁人惡之之深至於如此得無疾之已甚之亂邪曰小人為惡如字千條萬端其可惡者不但媢疾一事而已仁人不深惡乎彼而獨深惡乎此者以其有害於善人使民不得被其澤而其流禍之長及於後世而未已也然非殺人于貨之盜則罪不至死故亦放流之而已然又念夫音扶彼此之勢雖殊而苦樂音洛之情則一今此惡人放而不逺則其為害雖得不施於此而彼所放之地其民復扶又反何罪焉故不敢以己之所惡施之於人而必逺而置之無人之境以禦魑抽知反魅音媚而後已蓋不惟保安善人使不蒙其害亦所以禁伏凶人使不得稔其惡雖因彼之善惡而有好惡之殊然所以仁之之意亦未嘗不行乎其間也此其為禦亂之術至矣而何致亂之有曰迸之為屏必郢反何也曰古字之通用者多矣漢石刻詞有引尊五美屏四惡者而以尊為遵以屏為迸則其證也漢蔡邕本傳漢靈帝時校書東觀以經籍去聖久逺俗學穿鑿疑誤後學與堂谿典等奏求正定六經文字帝許之邕乃自書丹於碑鑴刻立於太學門外於是晩學咸取正焉曰仁人之能愛人能惡人何也曰仁人者私欲不萌而天下之公在我是以是非不謬靡幼反而舉措得宜也曰命之為慢與其為怠也孰得曰大凡疑義所以決之不過乎義理文勢事證三者而已今此二字欲以義理文勢決之則皆通欲以事證決之則無考蓋不可以深求矣若使其於義理事實之大者有所鄉許亮反背音佩而不可以不究猶當視其緩急以為先後況於此等字既兩通而於事義無大得失則亦何必苦心極力以求之徒費日而無所益乎以是而推他亦皆可見矣曰好善惡惡如字人之性然也有拂人之性者何哉曰不仁之人阿黨媢疾有以陷溺其心是以其所好惡戾於常性如此與民之父母能好惡人者正相反使其能勝私而絜矩則不至於是矣曰忠信驕泰之所以為得失者何也曰忠信者盡己之心而不違於物絜矩之本也驕泰則恣己徇私以人從欲不得與人同好惡矣曰上文深陳財用之失民矣此復扶又反言生財之道何也曰此所謂有土而有財者也夫音扶洪範八政食貨為先見尚書洪範篇三八政疇子貢問政而夫子告之亦以足食為首蓋生民之道不可一日而無者聖人豈輕之哉特以為國者以利為利則必至於剥民以自奉而有悖出之禍故深言其害以為戒耳至於崇本節用有國之常政所以厚下而足民者則固未嘗廢也吕氏之說得其㫖矣有子曰百姓足君孰與不足孟子曰無政事則財用不足正此意也然孟子所謂政事則所以告齊梁之君使之制民之産者是已豈若後世頭會古外反箕斂力驗反厲民自養之云哉漢陳餘傳秦為亂政外内騷動百姓罷敝頭㑹箕斂以供軍費財匱力盡曰仁者以財𤼵身不仁者以身𤼵財何也曰仁者不私其有故財散民聚而身尊不仁者惟利是圖故捐身賈音古禍以崇貨也然亦即財貨而以其效言之爾非謂仁者真有以財𤼵身之意也曰未有府庫財非其財者何也曰上好去聲下同仁則下好義矣下好義則事有終矣事有終則為君者安富尊榮而府庫之財可長保矣此以財𤼵身之效也上不好仁則下不好義下不好義則其事不終是将為天下僇之不暇而況府庫之財又豈得為吾之財乎若商紂以自焚而起鉅橋鹿臺之財德宗以出走而豐瓊林大盈之積皆以身𤼵財之效也史記紂使師涓作新淫聲北里之舞靡靡之樂厚賦稅以實鹿臺之財而盈鉅橋之粟以酒為池縣肉為林為長夜之飲百姓怨望而諸侯有畔者周武王於是遂率諸侯伐紂紂亦𤼵兵距之牧野甲子日紂兵敗紂走登鹿臺衣其寳玉衣自焚而死又書武成篇乃反商政政由舊散鹿臺之財𤼵鉅橋之粟大賚于四海而萬姓恱服唐書陸贄傳始帝播遷府藏委棄至是天下貢奉稍至乃於行在夾廡署瓊林大盈二庫别藏貢物贄諫以為今師旅方殷瘡痛呻吟之聲未息遽以珍貢私别庫恐羣下有所觖望不滿所望請悉出以賜有功給軍賞帝悟即撤其署曰其引孟獻子之言何也曰雞豚牛羊民之所畜許六反養以為利者也既已食君之祿而享民之奉矣則不當復扶又反與之爭此公儀子所以拔園葵去上聲下同織婦而董子因有與之齒者去其角傅之翼者兩其足之喻皆絜矩之義也史記公儀休為魯相食茹而美拔其園葵而棄之見其家織布好而疾出其家婦燔其機云欲令農夫工女安所售其貨乎西漢書董仲舒以賢良對策曰夫天亦有所分予上聲予之齒者去其角傅之翼者兩其足是所受大者不得取小也占之所予禄者不食於力不動於末是亦受大者不得取小與天同意者也按角音䘵鳥觜也聚斂之臣剥民之膏血以奉上而民被其殃盜臣竊君之府庫以自私而禍不及下仁者之心至誠惻怛當葛反寧亡己之財而不忍傷民之力所以與其有聚斂之臣寧有盜臣亦絜矩之義也昔孔子以臧文仲之妾織蒲而直斥其不仁以冉求聚斂於季氏而欲鳴鼓以聲其罪以聖人之宏大兼容温良博愛而所以責二子者疾痛深切不少假借如此其意亦可見矣曰國不以利為利以義為利何也曰以利為利則上下交征不奪不饜以義為利則不遺其親不後其君蓋惟義之安而自無所不利矣程子曰聖人以義為利義之所安即利之所在正謂此也孟子分别筆列反義利拔本塞原之意其傳蓋亦出於此云曰此其言菑害並至無如之何何也曰怨己結於民心則非一朝一夕之可解矣聖賢深探其實而極言之欲人有以審於未然而不為無及於事之悔也以此為防人猶有用桑羊孔僅宇文融楊矜陳京裴延齡之徒以敗其國者桑𢎞羊楊慎矜朱子以在宋避諱故各去一字桑𢎞羊洛陽賈人之子漢武帝朝為治粟都尉領大司農盡管天下鹽鐡後為御史大夫昭帝朝與燕王旦謀反坐誅孔僅漢武帝朝為大農丞領鹽鐵事後為大農令宇文融辨洽多詐唐𤣥宗朝為覆田勸農使擢兵部員外郎兼侍御史又兼租地安輯户口使拜御史中丞有司劾融交不逞作威福貶平樂尉司農𤼵融在汴州紿隱官息錢巨萬給事中馮紹烈深文推證詔流嵓州道廣州惶恐而卒楊慎矜唐𤣥宗朝為御史知雜事後授御史中丞以蓄䜟緯妖言賜死陳京事唐德宗帝討李希烈財用屈京為紿事中與户部侍郎趙賛請税民屋間架籍賈人資力以率貸之後以事罷為秘書少監卒裴延齡唐德宗朝為司農少卿領度支取宿姦老吏與謀以固帝幸延齡資苛刻専剥下附上肆騁譎怪時人側目及死人語以相安惟帝悼不已故陸宣公之言曰陸公名贄字敬輿蘇州嘉興人事唐德宗諡曰宣民者邦之本財者民之心其心傷則其本傷其本傷則枝榦凋瘁秦醉反而根柢蹷其月反拔矣吕正獻公之言曰吕公名公著字晦叔諡正獻河南人小人聚斂以佐人主之欲人主不悟以為有利於國而不知其終為害也賞其納忠而不知其大不忠也嘉其任怨而不知其怨歸於上也嗚呼若二公之言則可謂深得此章之㫖者矣有國家者可不監哉曰此章之文程子多所更平聲下同定而子獨以舊文為正者何也曰此章之義博故傳言之詳然其實則不過好惡義利之兩端而已但以欲致其詳故所言已足而復扶又反更端以廣其意是以二義相循間去聲見形甸反層出有似於易置而錯陳耳然徐而考之則其端緒接續脈絡貫通而丁寜反復為去聲人深切之意又自别見於言外不可易也必欲二說中判以類相從自始至終畫為兩節則其界辨雖若有餘而意味或反不足此不可不察也大學纂箋卷二
