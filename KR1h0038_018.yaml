body:
  text: 欽定四庫全書孟子纂箋卷四元詹道傳撰公孫丑下凡十四章自第二章以下記孟子出處上聲行去聲實未詳孟子曰天時不如地利地利不如人和天時謂時日支干孤虛王相並去聲之屬也此本趙岐注正義云干支所以配時日而用之也史記注六甲孤虛法甲子旬戌亥為孤辰巳為虛後五甲倣此如今人以甲子旬無戌亥為空亡是以空亡為孤也辰巳與戌亥對辰巳為虛劉歆七略有風后孤虛二十卷王相如東方木長生於亥相於寅王於卯之類饒氏曰此大概以五行衰旺言之五行有孤虛時有旺相時春屬木甲乙木生丙丁火便是木旺而火相旺字即是王字相王之次也金到這裏衰所以孤孤者無輔助之意如今説四廢然水為母木為子子實則母虛水到此所以虛或問此説時日或是方所曰二者一般一箇是橫一箇是直所以天德月德日亦有天德月德方大意如此其間又自有細密處地利險阻城池之固也人和得民心之和也三里之城七里之郭環而攻之而不勝夫環而攻之必有得天時者矣然而不勝者是天時不如地利也夫音扶三里七里城郭之小者郭外城環圍也言四面攻圍曠日持久必有值天時之善者城非不髙也池非不深也兵革非不堅利也米粟非不多也委而去之是地利不如人和也革甲也粟穀也委棄也言不得民心民不為去聲守也故曰域民不以封疆之界固國不以山溪之險威天下不以兵革之利得道者多助失道者寡助寡助之至親戚畔之多助之至天下順之域界限也以天下之所順攻親戚之所畔故君子有不戰戰必勝矣言不戰則已戰則必勝尹氏曰言得天下者凡以得民心而已孟子將朝王王使人來曰寡人如就見者也有寒疾不可以風朝將視朝不識可使寡人得見乎對曰不幸而有疾不能造朝章內朝並音潮唯朝將之朝如字造七到反下同王齊王也孟子本將朝王王不知而託疾以召孟子故孟子亦以疾辭也明日出弔於東郭氏公孫丑曰昔者辭以病今日弔或者不可乎曰昔者疾今日愈如之何不弔東郭氏齊大夫家也齊大夫有車郭氏名偃名書名賈者見於春秋亦有北郭氏南郭氏皆齊大夫古疏云齊國之東地號曰東郭經云東郭墦間是也氏者未詳其人以理測之孟子之所弔必賢大夫也昔者昨日也或者疑辭辭疾而出弔與孔子不見孺悲取瑟而歌同意王使人問疾醫來孟仲子對曰昔者有王命有采薪之憂不能造朝今病小愈趨造於朝我不識能至否乎使數人要於路曰請必無歸而造於朝要平聲孟仲子趙氏以為孟子之從去聲昆弟學於孟子者也采薪之憂言病不能采薪謙辭也仲子權辭以對又使人要孟子令平聲勿歸而造朝以實已言不得已而之景丑氏宿焉景子曰內則父子外則君臣人之大倫也父子主恩君臣主敬丑見王之敬子也未見所以敬王也曰惡是何言也齊人無以仁義與王言者豈以仁義為不美也其心曰是何足與言仁義也云爾則不敬莫大乎是我非堯舜之道不敢以陳於王前故齊人莫如我敬王也惡平聲景丑氏齊大夫家也景子景丑也惡歎辭也景丑所言敬之小者也孟子所言敬之大者也景子曰否非此之謂也禮曰父召無諾君命召不俟駕固將朝也聞王命而遂不果宜與夫禮若不相似然夫音扶下同禮曰父命呼唯以水反而不諾又曰君命召在官不俟屨在外不俟車並出記玉藻篇言孟子本欲朝王而聞命中止似與此禮之意不同也曰豈謂是與曾子曰晉楚之富不可及也彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉夫豈不義而曾子言之是或一道也天下有達尊三爵一齒一德一朝廷莫如爵鄉黨莫如齒輔世長民莫如德惡得有其一以慢其二哉與平聲慊口簟反長上聲慊恨也少也或作嗛字書以為口銜物也然則慊亦但為心有所銜之義其為快為足為恨為少則因其事而所銜有不同耳孟子言我之意非如景子之所言者因引曾子之言而云夫此豈是不義而曾子肯以為言是或别有一種上聲道理也達通也蓋通天下之所尊有此三者曾子之説蓋以德言之也今齊王但有爵耳安得以此慢於齒德乎故將大有為之君必有所不召之臣欲有謀焉則就之其尊德樂道不如是不足與有為也樂音洛大有為之君大有作為非常之君也程子曰古之人所以必待人君致敬盡禮而後往者非欲自為尊大也為去聲是故耳故湯之於伊尹學焉而後臣之故不勞而王桓公之於管仲學焉而後臣之故不勞而霸先從後學師之也後以為臣任之也今天下地醜德齊莫能相尚無他好臣其所教而不好臣其所受教好去聲醜類也尚過也所教謂聽從於己可役使者也所受教謂已之所從學者也湯之於伊尹桓公之於管仲則不敢召管仲且猶不可召而況不為管仲者乎不為管仲孟子自謂也范氏曰孟子之於齊處上聲賔師之位非當仕有官職者故其言如此此章見賔師不以趨走承順為恭而以責難陳善為敬人君不以崇髙富貴為重而以貴德尊士為賢則上下交而德業成矣陳臻問曰前日於齊王餽兼金一百而不受於宋餽七十鎰而受於薛餽五十鎰而受前日之不受是則今日之受非也今日之受是則前日之不受非也夫子必居一於此矣陳臻孟子弟子兼金好金也其價兼倍於常者一百百鎰音逸也國語二十四兩為鎰禮云朝一溢米注同趙岐孟康皆曰二十兩鄭玄曰三十兩凡三説金氏曰按前注二十兩為鎰則一鎰巳是一斤四兩七十鎰是九十八斤古者以黃金為上幣白金為中幣青金為下幣古今稱輕重不同且以漢稱較之漢之一斤當今四兩三錢強孟子曰皆是也皆適於義也當在宋也豫將有逺行行者必以贐辭曰餽贐豫何為不受贐徐刃反贐送行之禮也當在薛也豫有戒心辭曰聞戒故為兵餽之豫何為不受為兵之為去聲時人有欲害孟子者孟子設兵以戒備之薛君以金餽孟子為兵備辭曰聞子之有戒心也若於齊則未有處也無處而餽之是貨之也焉有君子而可以貨取乎焉於虔反無逺行戒心之事是未有所處上聲也取猶致也尹氏曰言君子之辭受取豫通作與唯當去聲於理而已孟子之平陸謂其大夫曰子之持戟之士一日而三失伍則去之否乎曰不待三去上聲平陸齊下邑也大夫邑宰也戟有枝兵也周禮考工記殳長尋有四尺車戟常崇於殳四尺八尺曰尋倍曰常是長丈六尺廣寸有半雙枝為戟單枝為戈士戰士也伍行音杭列也去之殺之也金氏曰去之謂殺之本古注按持戟止是階前庭下執戟之人庶人之在官者去止是廢棄之然則子之失伍也亦多矣凶年飢歲子之民老羸轉於溝壑壯者散而之四方者幾千人矣曰此非距心之所得為也幾上聲子之失伍言其失職猶士之失伍也距心大夫名對言此乃王之失政使然非我所得專為也曰今有受人之牛羊而為之牧之者則必為之求牧與芻矣求牧與芻而不得則反諸其人乎抑亦立而視其死與曰此則距心之罪也為去聲死與之與平聲牧之養之也牧牧地也芻草也孟子言若不得自專何不致其事而去他日見於王曰王之為都者臣知五人焉知其罪者惟孔距心為王誦之王曰此則寡人之罪也見音現為王之為去聲為都治邑也邑有先君之廟曰都左莊二十八年築郿非都也凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城周禮四縣為都四井為邑然宗廟所在雖邑曰都尊之也孔大夫姓也為王誦其語欲以風去聲曉王也陳氏名暘字晉臣三山人曰孟子一言而齊之君臣舉知其罪固足以興邦矣然而齊卒不得為善國者豈非説音悅而不繹從而不改故邪孟子謂蚳蛙曰子之辭靈丘而請士師似也為其可以言也今既數月矣未可以言與蚳音遲蛙烏花反為去聲與平聲蚳蛙齊大夫也靈丘齊下邑似也言所為近似有理可以言謂士師近王得以諫刑罰之不中去聲者蚳蛙諫於王而不用致為臣而去致猶還也齊人曰所以為蚳蛙則善矣所以自為則吾不知也為去聲譏孟子道不行而不能去也公都子以告公都子孟子弟子也曰吾聞之也有官守者不得其職則去有言責者不得其言則去我無官守我無言責也則吾進退豈不綽綽然有餘裕哉官守以官為守者言責以言為責者綽綽寬貌裕寬意也孟子居賔師之位未嘗受祿故其進退之際寬裕如此尹氏曰進退久速當去聲於理而已孟子為卿於齊出弔於滕王使蓋大夫王歡為輔行王歡朝暮見反齊滕之路未嘗與之言行事也蓋古盍反見音現蓋齊下邑也王歡王嬖臣也輔行副使去聲下同也反往而還也行事使事也公孫丑曰齊卿之位不為小矣齊滕之路不為近矣反之而未嘗與言行事何也曰夫既或治之豫何言哉夫音扶王歡蓋攝卿以行故曰齊卿孔頴達曰春秋有使大夫攝卿之法如文七年傳稱晉使先蔑如秦逆公子雍荀林父謂蔑曰攝卿以往可也何必子夫既或治之言有司已治之矣孟子之待小人不惡而嚴如此此句出易遁卦大象傳文孟子自齊葬於魯反於齊止於嬴充虞請曰前日不知虞之不肖使虞敦匠事嚴虞不敢請今願竊有請也木若以美然孟子仕於齊喪去聲母歸葬於魯嬴齊南邑今泰山嬴縣充虞孟子弟子嘗董治作棺之事者也嚴急也木棺木也以已通以美太美也曰古者棺椁無度中古棺七寸椁稱之自天子達於庶人非直為觀美也然後盡於人心稱去聲度厚薄尺寸也中古周公制禮時也椁稱之與棺相稱也記檀弓夫子制於中都四寸之棺五寸之椁而喪大記云君之棺八寸上大夫棺八寸下大夫棺六寸士棺六寸注云皆周制舍此未見有七寸之文此章舊注云天子至庶人厚薄皆然乃未詳欲其堅厚久逺非特為人觀視之美而已不得不可以為悅無財不可以為悅得之為有財古之人皆用之吾何為獨不然不得謂法制所不當得得之為有財言得之而又為有財也或曰為當作而且比化者無使土親膚於人心獨無恔乎比必二反恔音效比猶為去聲下同也化者死者也恔快也言為死者不使土親近其肌膚於人子之心豈不快然無所恨乎吾聞之也君子不以天下儉其親送終之禮所當得為而不自盡是為去聲天下愛惜此物而薄於吾親也沈同以其私問曰燕可伐與孟子曰可子噲不得與人燕子之不得受燕於子噲有仕於此而子悅之不告於王而私與之吾子之祿爵夫士也亦無王命而私受之於子則可乎何以異於是伐與之與平聲下伐與殺與同夫音扶沈同齊臣以私問非王命也子噲子之事見形甸反前篇諸侯土地人民受之天子傳之先君私以與人則與者受者皆有罪也仕為官也士即從仕之人也齊人伐燕或問曰勸齊伐燕有諸曰未也沈同問燕可伐與吾應之曰可彼然而伐之也彼如曰孰可以伐之則將應之曰為天吏則可以伐之今有殺人者或問之曰人可殺與則將應之曰可彼如曰孰可以殺之則將應之曰為士師則可以殺之今以燕伐燕何為勸之哉天吏解見上篇言齊無道與燕無異如以燕伐燕也史記亦謂孟子勸齊伐燕見燕世家蓋傳聞此説之誤楊氏曰燕固可伐矣故孟子曰可使齊王能誅其君弔其民何不可之有乃殺其父兄虜其子弟而後燕人畔之乃以是歸咎孟子之言則誤矣燕人畔王曰吾甚慙於孟子齊破燕後二年燕人共立太子平為王陳賈曰王無患焉王自以為與周公孰仁且智王曰惡是何言也曰周公使管叔監殷管叔以殷畔知而使之是不仁也不知而使之是不智也仁智周公未之盡也而況於王乎賈請見而解之惡監皆平聲陳賈齊大夫也管叔名鮮武王弟周公兄也武王勝商殺紂立紂子武庚而使管叔與弟蔡叔霍叔監其國武王崩成王幼周公攝政管叔與武庚畔周公討而誅之史記管蔡世家武王同母兄弟十人母曰太姒管叔鮮武王弟周公兄蔡叔度周公弟武王克商封叔鮮于管在滎陽封叔度于上蔡二人相紂子武庚治殷遺民武王崩成王少二叔流言周公不利於孺子乃挾武庚作亂周公承王命誅武庚殺管叔而放蔡叔與車七乘徒七十人從而分殷餘民為二其一封微子啓於宋以續殷祀其一封康叔為衛君見孟子問曰周公何人也曰古聖人也曰使管叔監殷管叔以殷畔也有諸曰然曰周公知其將畔而使之與曰不知也然則聖人且有過與曰周公弟也管叔兄也周公之過不亦宜乎言周公乃管叔之弟管叔乃周公之兄然則周公不知管叔之將畔而使之其過有所不免矣或曰周公之處上聲下同管叔不知舜之處象何也遊氏曰象之惡已著而其志不過富貴而已故舜得以是而全之若管叔之惡則未著而其志其才皆非象比也周公詎忍逆探平聲其兄之惡而棄之邪周公愛兄宜無不盡者管叔之事聖人之不幸也舜誠信而喜象周公誠信而任管叔此天理人倫之至其用心一也且古之君子過則改之今之君子過則順之古之君子其過也如日月之食民皆見之及其更也民皆仰之今之君子豈徒順之又從為之辭更平聲順猶遂也更改也辭辨也更之則無損於明故民仰之順而為之辭則其過愈深矣責賈不能勉其君以遷善改過而教之以遂非文去聲過也林氏曰齊王慙於孟子蓋羞惡去聲之心有不能自己者使其臣有能因是心而將順之則義不可勝平聲用矣而陳賈鄙夫方且為去聲之曲為辨説而沮在吕反其遷善改過之心長上聲其飾非拒諫之惡故孟子深責之然此書記事散出而無先後之次故其説必參考而後通若以第二篇十章齊人伐燕勝之章十一章齊人伐燕取之章置之前章之後此章之前則孟子之意不待論説而自明矣孟子致為臣而歸孟子久於齊而道不行故去也王就見孟子曰前日願見而不可得得侍同朝甚喜今又棄寡人而歸不識可以繼此而得見乎對曰不敢請耳固所願也朝音潮他日王謂時子曰我欲中國而授孟子室養弟子以萬鍾使諸大夫國人皆有所矜式子盍為我言之為去聲時子齊臣也中國當國之中也萬鍾榖祿之數也鍾量去聲名受六斛四斗矜敬也式法也盍何不也時子因陳子而以告孟子陳子以時子之言告孟子陳子即陳臻也孟子曰然夫時子惡知其不可也如使豫欲富辭十萬而受萬是為欲富乎夫音扶惡平聲孟子既以道不行而去則其義不可以復扶又反留而時子不知則又有難顯言者故但言設使我欲富則我前日為卿嘗辭十萬之祿今乃受此萬鍾之饋是我雖欲富亦不為此也季孫曰異哉子叔疑使己為政不用則亦已矣又使其子弟為卿人亦孰不欲富貴而獨於富貴之中有私龍斷焉龍音壟此孟子引季孫之語也季孫子叔疑不知何時人龍斷徒玩反岡壟之斷而髙也義見下文蓋子叔疑者嘗不用而使其子弟為卿季孫議其既不得於此而又欲求得於彼如下文賤丈夫登龍斷者之所為也孟子引此以明道既不行復扶又反受其祿則無以異此矣古之為市者以其所有易其所無者有司者治之耳有賤丈夫焉必求龍斷而登之以左右望而罔市利人皆以為賤故從而征之征商自此賤丈夫始矣孟子釋龍斷之説如此治之謂治其爭訟左右望者欲得此而又取彼也罔謂罔羅取之也從而征之謂人惡去聲其專利故就征其稅後世緣此遂征商人也程子曰齊王所以處上聲孟子者未為不可孟子亦非不肯為國人矜式者但齊王實非欲尊孟子乃欲以利誘之故孟子拒而不受孟子去齊宿於晝晝如字或曰當作畫音獲下同晝齊西南近邑也按通鑑周赧王三十一年燕樂毅伐齊聞晝邑人王燭賢令軍中環晝三十里無入釋文云齊西南邑疑此即晝邑也故又引或曰云云有欲為王留行者坐而言不應隱几而卧為去聲下同隱於靳反隱憑也客坐而言孟子不應而卧也客不悅曰弟子齊宿而後敢言夫子卧而不聽請勿復敢見矣曰坐我明語子昔者魯繆公無人乎子思之側則不能安子思泄桞申詳無人乎繆公之側則不能安其身齊側皆反復扶又反語去聲齊宿齊戒越宿也繆音穆公尊禮子思常使人候伺音笥道去聲達誠意於其側乃能安而留之也泄栁魯人申詳子張之子也見檀弓鄭注云子張子繆公尊之不如子思然二子義不苟容非有賢者在其君之左右維持調護之則亦不能安其身矣子為長者慮而不及子思子絶長者乎長者絶子乎長上聲長者孟子自稱也言齊王不使子來而子自欲為去聲下以為同王留我是所以為我謀者不及繆公留子思之事而先絶我也我之卧而不應豈為先絶子乎孟子去齊尹士語人曰不識王之不可以為湯武則是不明也識其不可然且至則是干澤也千里而見王不遇故去三宿而後出晝是何濡滯也士則兹不悅尹士齊人也干求也澤恩澤也濡滯遲留也髙子以告髙子亦齊人孟子弟子也曰夫尹士惡知豫哉千里而見王是豫所欲也不遇故去豈豫所欲哉豫不得已也夫音扶下同惡平聲見王欲以行道也今道不行故不得已而去非本欲如此也豫三宿而出晝於豫心猶以為速王庶幾改之王如改諸則必反豫所改必指一事而言然今不可考矣夫出晝而王不豫追也豫然後浩然有歸志豫雖然豈舍王哉王由足用為善王如用豫則豈徒齊民安天下之民舉安王庶幾改之豫日望之浩然如水之流不可止也楊氏曰齊王天資朴實如好勇好貨好色好世俗之樂皆以直告而不隱於孟子故足以為善若乃其心不然而謬為大言以欺人是人終不可與入堯舜之道矣何善之能為豫豈若是小丈夫然哉諫於其君而不受則怒悻悻然見於其面去則窮日之力而後宿哉悻形頂反見音現悻悻怒意也窮盡也尹士聞之曰士誠小人也此章見聖賢行道濟時汲汲之本心愛君澤民惓惓音權之餘意李氏昭武人名郁字光祖學於龜山楊公曰於此見君子憂則違之之情而荷蕢者所以為果也孟子去齊充虞路問曰夫子若有不豫色然前日虞聞諸夫子曰君子不怨天不尤人路問於路中問也豫悅也尤過也此二句實孔子之言蓋孟子嘗稱之以教人耳曰彼一時此一時也彼前日此今日五百年必有王者興其間必有名世者自堯舜至湯自湯至文武皆五百餘年而聖人出通鑑外紀堯在位九十八年舜在位五十年大禹至履癸共十七王合四百三十二年而為商是堯舜至湯共五百八十年殷紀成湯至紂共三十王合六百二十八年而周興下文由周而來七百有餘歲箋見篇首名世謂其人德業聞去聲望可名於一世者為之輔佐若臯陶稷契私列反伊尹萊朱太公望散素亶反宜生之屬由周而來七百有餘歲矣以其數則過矣以其時考之則可矣周謂文武之間數謂五百年之期時謂亂極思治去聲可以有為之日於是而不得一有所為此孟子所以不能無不豫也夫天未欲平治天下也如欲平治天下當今之世舍我其誰也吾何為不豫哉夫音扶舍上聲言當此之時而使我不遇於齊是天未欲平治天下也然天意未可知而其具又在我我何為不豫哉然則孟子雖若有不豫然者而實未嘗不豫也蓋聖賢憂世之志樂音洛天之誠有並行而不悖者於此見矣孟子去齊居休公孫丑問曰仕而不受祿古之道乎休地名曰非也於崇吾得見王退而有去志不欲變故不受也崇亦地名孟子始見齊王必有所不合故有去志變謂變其去志繼而有師命不可以請久於齊非我志也師命師旅之命也國既被兵難請去也孔氏曰仕而受祿禮也不受齊祿義也義之所在禮有時而變公孫丑欲以一端裁之不亦誤乎孟子纂箋卷四
