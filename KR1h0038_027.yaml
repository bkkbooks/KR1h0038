body:
  text: 欽定四庫全書孟子纂箋卷十三元詹道傳撰盡心章句上凡四十六章孟子曰盡其心者知其性也知其性則知天矣心者人之神明所以具衆理而應萬事者也性則心之所具之理而天又理之所從以出者也人有是心莫非全體然不窮理則有所蔽而無以盡乎此心之量去聲故能極其心之全體而無不盡者必其能窮夫音扶理而無不知者也既知其理則其所從出亦不外是矣以大學之序言之知性則物格之謂盡心則知至之謂也存其心養其性所以事天也存謂操平聲而不舍上聲養謂順而不害事則奉承而不違也夭夀不二修身以俟之所以立命也夭夀命之短長也二疑也不二者知天之至修身以俟死則事天以終身也立命謂全其天之所付不以人為害之程子曰心也性也天也一理也自理而言謂之天自稟受而言謂之性自存諸人而言謂之心張子曰由太虛有天之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名愚謂盡心知性而知天所以造七到反其理也存心養性以事天所以履其事也不知其理固不能履其事然徒造其理而不履其事則亦無以有諸已矣知天而不以夭夀二其心智之盡也事天而能修身以俟死仁之至也智有不盡固不知所以為仁然智而不仁則亦將流蕩不法而不足以為智矣孟子曰莫非命也順受其正人物之生吉凶禍福皆天所命然惟莫之致而至者乃為正命故君子修身以俟之所以順受乎此也是故知命者不立乎巖牆之下命謂正命巖牆牆之將覆音福者知正命則不處上聲危地以取覆壓之禍盡其道而死者正命也盡其道則所值之吉凶皆莫之致而至者矣桎梏死者非正命也桎梏所以拘罪人者桎音質足械也梏沽沃反手械也言犯罪而死與立巖牆之下者同皆人所取非天所為也此章與上章蓋一時之言所以發其末句未盡之意孟子曰求則得之舍則失之是求有益於得也求在我者也舍上聲在我者謂仁義禮智凡性之所有者求之有道得之有命是求無益於得也求在外者也有道言不可妄求有命則不可必得在外者謂富貴利達凡外物皆是趙氏曰言為仁由已富貴在天如不可求從吾所好孟子曰萬物皆備於我矣此言理之本然也大則君臣父子小則事物細微其當然之理無一不具於性分去聲之內也反身而誠樂莫大焉樂音洛誠實也言反諸身而所備之理皆如惡去聲惡臭好去聲好色之實然則其行之不待勉强上聲而無不利矣其為樂孰大於是强恕而行求仁莫近焉强上聲强勉强也恕推己以及人也反身而誠則仁矣其有未誠則是猶有私意之隔而理未純也故當凡事勉强推己及人庶幾平聲心公理得而仁不逺也此章言萬物之理具於吾身體之而實則道在我而樂音洛有餘行之以恕則私不容而仁可得孟子曰行之而不著焉習矣而不察焉終身由之而不知其道者衆也著者知之明察者識之精言方行之而不能明其所當然既習矣而猶不識其所以然所以終身由之而不知其道者多也孟子曰人不可以無恥無恥之恥無恥矣趙氏曰人能恥已之無所恥是能改行去聲從善之人終身無復扶又反有恥辱之纍矣孟子曰恥之於人大矣恥者吾所固有羞惡去聲之心也存之則進於聖賢失之則入於禽獸故所繫為甚大為機變之巧者無所用恥焉為機械下戒反變詐之巧者所為之事皆人所深恥而彼方且自以為得計故無所用其愧恥之心也不恥不若人何若人有但無恥一事不如人則事事不如人矣或曰不恥其不如人則何能有如人之事其義亦通或問人有恥不能之心如何程子曰恥其不能而為之可也恥其不能而掩藏之不可也孟子曰古之賢王好善而忘勢古之賢士何獨不然樂其道而忘人之勢故王公不致敬盡禮則不得亟見之見且猶不得亟而況得而臣之乎好去聲樂音洛亟去吏反言君當屈已以下去聲賢士不枉道而求利二者勢若相反而實則相成蓋亦各盡其道而已孟子謂宋句踐曰子好遊乎吾語子遊句音鉤好語皆去聲宋姓句踐名遊遊說音稅也人知之亦囂囂人不知亦囂囂趙氏曰囂囂五高許驕二反自得無欲之貌曰何如斯可以囂囂矣曰尊德樂義則可以囂囂矣樂音洛德謂所得之善尊之則有以自重而不慕乎人爵之榮義謂所守之正樂之則有以自安而不徇乎外物之誘矣故士窮不失義達不離道離力智反言不以貧賤而移不以富貴而淫此尊德樂義見於行事之實也窮不失義故士得已焉達不離道故民不失望焉得已言不失己也民不失望言人素望其興道致治去聲而今果如所望也古之人得志澤加於民不得志修身見於世窮則獨善其身達則兼善天下見音現見謂名實之顯著也此又言士得已民不失望之實此章言內重而外輕則無往而不善孟子曰待文王而後興者凡民也若夫豪傑之士雖無文王猶興夫音扶興者感動奮發之意凡民庸常之人也豪傑有過人之才智者也蓋降衷秉彝人所同得惟上智之資無物欲之蔽為能無待於教而自能感發以有為也孟子曰附之以韓魏之家如其自視欿然則過人逺矣欿音坎附益也韓魏晉卿富家也欿然不自滿之意尹氏曰言有過人之識則不以富貴為事孟子曰以佚道使民雖勞不怨以生道殺民雖死不怨殺者程子曰似佚道使民謂本欲佚之也播榖乘屋之類是也以生道殺民謂本欲生之也除害去上聲惡之類是也蓋不得已而為其所當為則雖咈符勿反民之欲而民不怨其不然者反是孟子曰霸者之民歡虞如也王者之民皡皡如也皡胡老反歡虞與歡娛同皡皡廣大自得之貌程子曰歡虞有所造為而然豈能久也耕田鑿井帝力何有於我帝王通厯帝堯之時有老人擊壤於路曰吾日出而作日入而息鑿井而飲耕田而食帝力於我何哉如天之自然乃王者之政楊氏曰所以致人歡虞必有違道干譽之事若王者則如天亦不令力呈反下同人喜亦不令人怒殺之而不怨利之而不庸民日遷善而不知為之者此所謂皡皡如也庸功也豐氏曰名積字相之四明人因民之所惡去聲而去上聲之非有心於殺之也何怨之有因民之所利而利之非有心於利之也何庸之有輔其性之自然使自得之故民日遷善而不知誰之所為也夫君子所過者化所存者神上下與天地同流豈曰小補之哉夫音扶君子聖人之通稱也所過者化身所經歷之處即人無不化如舜之耕歷山而田者讓畔陶河濵而器不苦窳也舜事箋見公孫丑上史記正義曰苦讀如盬音古粗也窳音庾病也所存者神心所存主處便神妙不測如孔子之立斯立道去聲斯行綏斯來動斯和莫知其所以然而然也是其德業之盛乃與天地之化同運並行舉一世而甄吉廷反陶之非如霸者但小小補塞先則反其罅虛訝反漏而已此則王道之所以為大而學者所當盡心也孟子曰仁言不如仁聲之入人深也程子曰仁言謂以仁厚之言加於民仁聲謂仁聞去聲謂有仁之實而為衆所稱道者也此尤見仁德之昭著故其感人尤深也善政不如善教之得民也政謂法度禁令所以制其外也教謂道去聲德齊禮所以格其心也善政民畏之善教民愛之善政得民財善教得民心得民財者百姓足而君無不足也得民心者不遺其親不後其君也孟子曰人之所不學而能者其良能也所不慮而知者其良知也良者本然之善也程子曰良知良能皆無所由乃出於天不係於人孩提之童無不知愛其親也及其長也無不知敬其兄也長上聲下同孩提二三嵗之間知孩笑可提抱者也愛親敬長所謂良知良能者也親親仁也敬長義也無他達之天下也言親親敬長雖一人之私然達之天下無不同者所以為仁義也孟子曰舜之居深山之中與木石居與鹿豕遊其所以異於深山之野人者幾希及其聞一善言見一善行若決江河沛然莫之能禦也行去聲居深山謂耕歷山時也蓋聖人之心至虛至明渾然之中萬理畢具一有感觸則其應甚速而無所不通非孟子造七到反道之深不能形容至此也孟子曰無為其所不為無欲其所不欲如此而已矣李氏曰有所不為不欲人皆有是心也至於私意一萌而不能以禮義制之則為所不為欲所不欲者多矣能反是心則所謂擴充其羞惡去聲之心者而義不可勝平聲用矣故曰如此而已矣孟子曰人之有德慧術知者恆存乎疢疾知去聲疢丑刃反德慧者德之慧術知者術之知疢疾猶災患也左襄二十三年臧武仲曰季孫之愛我美疢也疢之美其毒滋多獨孤臣孽子其操心也危其慮患也深故達孤臣逺臣孽子庶子皆不得於君親而常有疢疾者也達謂達於事理即所謂德慧術知也孟子曰有事君人者事是君則為容悅者也阿徇以為容逢迎以為悅此鄙夫之事妾婦之道也有安社稷臣者以安社稷為悅者也言大臣之計安社稷如小人之務悅其君眷眷於此而不忘也有天民者達可行於天下而後行之者也民者無位之稱以其全盡天理乃天之民故謂之天民必其道可行於天下然後行之不然則寧沒世不見知而不悔不肯小用其道以徇於人也張子曰必功覆敷救反斯民然後出如伊呂之徒有大人者正已而物正者也大人德盛而上下化之所謂見形甸反龍在田天下文明者見易乾卦此章言人品不同略有四等容悅佞臣不足言安社稷則忠矣然猶一國之士也天民則非一國之士矣然猶有意也無意無必唯其所在而物無不化惟聖者能之孟子曰君子有三樂而王天下不與存焉父母俱存兄弟無故一樂也樂音洛王與皆去聲下並同此人所深願而不可必得者今既得之其樂可知仰不愧於天俯不怍於人二樂也程子曰人能克己則仰不愧俯不怍心廣體胖其樂可知有息則餒矣得天下英才而教育之三樂也盡得一世明睿俞例反之才而以所樂乎己者教而養之則斯道之傳得之者衆而天下後世將無不被其澤矣聖人之心所願欲者莫大於此今既得之其樂為如何哉君子有三樂而王天下不與存焉林氏曰此三樂者一係於天一係於人其可以自致者惟不愧不怍而已學者可不勉哉孟子曰廣土衆民君子欲之所樂不存焉樂音洛下同地闢民聚澤可逺施去聲故君子欲之然未足以為樂也中天下而立定四海之民君子樂之所性不存焉其道大行無一夫不被其澤故君子樂之然其所得於天者則不在是也君子所性雖大行不加焉雖窮居不損焉分定故也分去聲分者所得於天之全體故不以窮達而有異君子所性仁義禮智根於心其生色也睟然見於面盎於背施於四體四體不言而喻睟音粹見音現盎烏浪反上言所性之分與所欲所樂不同此乃言其藴委粉反又去聲也仁義禮智性之四德也根本也生發見形甸反下同也睟然清和潤澤之貌盎豐厚盈溢之意施於四體謂見於動作威儀之間也喻曉也四體不言而喻言四體不待吾言而自能曉吾意也蓋氣禀清明無物欲之纍則性之四德根本於心其積之盛則發而著見於外者不待言而無不順也程子曰睟面盎背皆積盛致然四體不言而喻唯有德者能之此章言君子固欲其道之大行然其所得於天者則不以是而有所加損也孟子曰伯夷辟紂居北海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者大公辟紂居東海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者天下有善養老則仁人以為己歸矣辟去聲下同大他蓋反已歸謂已之所歸餘見前篇五畝之宅樹牆下以桑匹婦蠶之則老者足以衣帛矣五母雞二母彘無失其時老者足以無失肉矣百畝之田匹夫耕之八口之家可以無飢矣衣去聲此文王之政也一家養母雞五母彘二也餘見前篇所謂西伯善養老者制其田里教之樹畜導其妻子使養其老五十非帛不暖七十非肉不飽不暖不飽謂之凍餒文王之民無凍餒之老者此之謂也田謂百畝之田里謂五畝之宅樹謂耕桑畜許六反謂雞彘也趙氏曰善養老者教導之使可以養其老耳非家賜而人益之也孟子曰易其田疇薄其稅斂民可使富也易斂皆去聲易治也疇耕治之田也食之以時用之以禮財不可勝用也勝音升教民節儉則財用足也民非水火不生活昏暮叩人之門戶求水火無弗與者至足矣聖人治天下使有菽粟如水火菽粟如水火而民焉有不仁者乎焉於䖍反水火民之所急宜其愛之而反不愛者多故也尹氏曰言禮義生於富足民無常産則無常心矣孟子曰孔子登東山而小魯登太山而小天下故觀於海者難為水遊於聖人之門者難為言此言聖人之道大也東山蓋魯城東之高山而太山則又高矣此言所處上聲益高則其視下益小所見既大則其小者不足觀也難為水難為言猶仁不可為衆之意觀水有術必觀其瀾日月有明容光必照焉此言道之有本也瀾水之湍急處也明者光之體光者明之用也觀水之瀾則知其源之有本矣觀日月於容光之隙無不照則知其明之有本矣流水之為物也不盈科不行君子之志於道也不成章不達言學當以漸乃能至也成章所積者厚而文章外見形甸反也達者足於此而通於彼也此章言聖人之道大而有本學之者必以其漸乃能至也孟子曰雞鳴而起孳孳為善者舜之徒也孳孳孶與孜同勤勉之意言雖未至於聖人亦是聖人之徒也雞鳴而起孳孳為利者跖之徒也跖盜跖也欲知舜與跖之分無他利與善之間也程子曰言間者謂相去不逺所爭毫末耳善與利公私而已矣才出於善便以利言也楊氏曰舜跖之相去逺矣而其分乃在利善之間而已是豈可以不謹然講之不熟見之不明未有不以利為義者又學者所當深察也或問雞鳴而起若未接物如何為善程子曰只主於敬便是為善孟子曰楊子取為我拔一毛而利天下不為也為我之為去聲楊子名朱取者僅足之意取為我者僅足於為我而已不及為亦去聲人也列子稱其言曰伯成子高不以一毫利物是也列子楊朱篇楊子曰伯成子高不以一毫利物舍國而隱古之人損一毫利天下不與也悉天下奉一身不取也人人不損一毫人人不利天下天下治矣墨子兼愛摩頂放踵利天下為之放上聲墨子名翟兼愛無所不愛也摩頂摩突其頂也突陀沒反放至也子莫執中執中為近之執中無權猶執一也子莫魯之賢者也知楊墨之失中也故度待洛反於二者之間而執其中近近道也權稱去聲錘直為反也所以稱平聲物之輕重而取中也執中而無權則膠於一定之中而不知變是亦執一而已矣程子曰中字最難識須是默識如字心通且試言一㕔則中央為中一家則㕔非中而堂為中一國則堂非中而國之中為中推此類可見矣又曰中不可執也識得則事事物物皆有自然之中不待安排安排著直略反則不中矣所惡執一者為其賊道也舉一而廢百也惡為皆去聲賊害也為我害仁兼愛害義執中者害於時中皆舉一而廢百者也此章言道之所貴者中中之所貴者權楊氏曰禹稷三過其門而不入苟不當其可則與墨子無異顔子在陋巷不改其樂苟不當其可則與楊氏無異子莫執為我兼愛之中而無權鄉鄰有鬭而不知閉户同室有鬭而不知救之是亦猶執一耳故孟子以為賊道禹稷顔回易地則皆然以其有權也不然則是亦楊墨而已矣孟子曰飢者甘食渴者甘飲是未得飲食之正也飢渴害之也豈惟口腹有飢渴之害人心亦皆有害口腹為飢渴所害故於飲食不暇擇而失其正味人心為貧賤所害故於富貴不暇擇而失其正理人能無以飢渴之害為心害則不及人不為憂矣人能不以貧賤之故而動其心則過人逺矣孟子曰栁下惠不以三公易其介介有分辨之意栁下惠進不隱賢必以其道遺佚不怨厄窮不憫直道事人至於三黜是其介也此章言栁下惠和而不流與孔子論夷齊不念舊惡意正相類皆聖賢微顯闡齒淺反幽之意也四字本杜預左氏傳序孟子曰有為者辟若掘井掘井九軔而不及泉猶為棄井也辟讀作譬軔音刃與仞同八尺曰仞缺曰集注於缺夫子之牆數仞云七尺曰仞今按周書為山九仞孔安國云八尺曰仞鄭𤣥云七尺曰仞集注兩存其說歟蔡氏傳從孔說愚證之周禮匠人為溝洫廣四尺深四尺謂之溝廣八尺深八尺謂之洫廣二尋深二仞謂之澮蓋其為溝洫澮是加一倍之數尋八尺也仞亦八尺也以此觀之則孔說為是言鑿井雖深然未及泉而止猶為自棄其井也呂侍講曰名希哲字原明河南人仁不如堯孝不如舜學不如孔子終未入於聖人之域終未至於天道未免為半塗而廢自棄前功也孟子曰堯舜性之也湯武身之也五霸假之也堯舜天性渾全不假修習湯武修身體道以復其性五霸則假借仁義之名以求濟其貪欲之私耳久假而不歸惡知其非有也惡平聲歸還也有實有也言竊其名以終身而不自知其非真有或曰蓋歎世人莫覺其僞者亦通舊說久假不歸即為真有則誤矣尹氏曰性之者與道一也身之者履之也及其成功則一也五霸則假之而已是以功烈如彼其卑也公孫丑曰伊尹曰豫不狎於不順放太甲于桐民大悅太甲賢又反之民大悅豫不狎于不順太甲篇文狎習見也不順言太甲所為不順義理也餘見前篇賢者之為人臣也其君不賢則固可放與與平聲孟子曰有伊尹之志則可無伊尹之志則篡也伊尹之志公天下以為心而無一毫之私者也公孫丑曰詩曰不素餐兮君子之不耕而食何也孟子曰君子居是國也其君用之則安富尊榮其子弟從之則孝弟忠信不素餐兮孰大於是餐七丹反詩魏國風伐檀之篇素空也無功而食祿謂之素餐此與告陳相彭更之意同王子墊問曰士何事墊丁念反墊齊王之子也上則公卿大夫下則農工商賈音古皆有所事而士居其間獨無所事故王子問之也孟子曰尚志尚高尚也志者心之所之也士既未得行公卿大夫之道又不當為農工商賈之業則高尚其志而已曰何謂尚志曰仁義而已矣殺一無罪非仁也非其有而取之非義也居惡在仁是也路惡在義是也居仁由義大人之事備矣惡平聲非仁非義之事雖小不為而所居所由無不在於仁義此士所以尚其志也大人謂公卿大夫言士雖未得大人之位而其志如此則大人之事體用已全若小人之事則固非所當為也孟子曰仲子不義與之齊國而弗受人皆信之是舍簞食豆羮之義也人莫大焉亡親戚君臣上下以其小者信其大者奚可哉舍音捨食音嗣仲子陳仲子也言仲子設若非義而與之齊國必不肯受齊人皆信其賢然此但小廉耳其辟兄離母不食君祿無人道之大倫罪莫大焉豈可以小廉信其大節而遂以為賢哉桃應問曰舜為天子臯陶為士瞽瞍殺人則如之何桃應孟子弟子也其意以為舜雖愛父而不可以私害公臯陶雖執法而不可以刑天子之父故設此問以觀聖賢用心之所極非以為真有此事也孟子曰執之而已矣言臯陶之心知有法而已不知有天子之父也然則舜不禁與與平聲桃應問也曰夫舜惡得而禁之夫有所受之也夫音扶惡平聲言臯陶之法有所傳受非所敢私雖天子之命亦不得而廢之也然則舜如之何桃應問也曰舜視棄天下猶棄敝屣也竊負而逃遵海濵而處終身欣然樂而忘天下屣音徙欣與欣同樂音洛屣韻書音所爾反又所蟹反草履也遵循也言舜之心知有父而已不知有天下也孟子嘗言舜視天下猶草芥而惟順於父母可以解憂與此意互相發此章言為士者但知有法而不知天子父之為尊為子者但知有父而不知天下之為大蓋其所以為心者莫非天理之極人倫之至學者察此而有得焉則不待較計論量而天下無難處上聲之事矣孟子自范之齊望見齊王之子喟然歎曰居移氣養移體大哉居乎夫非盡人之子與夫音扶與平聲范齊邑居謂所處上聲下同之位養奉養去聲也言人之居處所繫甚大王子亦人子耳特以所居不同故所養不同而其氣體有異也孟子曰張鄒張敬夫鄒志完皆云羡延面反文也王子宫室車馬衣服多與人同而王子若彼者其居使之然也況居天下之廣居者乎廣居見前篇尹氏曰睟音粹然見於面盎於背居天下之廣居者然也魯君之宋呼於垤澤之門守者曰此非吾君也何其聲之似我君也此無他居相似也呼去聲垤澤宋城門名也孟子又引此事為證孟子曰食而弗愛豕交之也愛而不敬獸畜之也食音嗣畜許六反交接也畜養也獸謂犬馬之屬恭敬者幣之未將者也將猶奉也詩曰承筐是將小雅鹿鳴篇程子曰恭敬雖因威儀幣帛而後發見形甸反然幣之未將時已有此恭敬之心非因幣帛而後有也恭敬而無實君子不可虛拘此言當時諸侯之待賢者特以幣帛為恭敬而無其實也拘留也孟子曰形色天性也惟聖人然後可以踐形人之有形有色無不客有自然之理所謂天性也踐如踐言之踐記曲禮修身踐言謂之善行蓋衆人有是形而不能盡其理故無以踐其形惟聖人有是形而又能盡其理然後可以踐其形而無歉苦忝反也程子曰此言聖人盡得人道而能充其形也蓋人得天地之正氣而生與萬物不同既為人須盡得人理然後稱去聲其名衆人有之而不知賢人踐之而未盡能充其形惟聖人也楊氏曰天生蒸民有物有則物者形色也則者性也各盡其則則可以踐形矣齊宣王欲短喪公孫丑曰為朞之喪猶愈於己乎已猶止也孟子曰是猶或紾其兄之臂子謂之姑徐徐云爾亦教之孝弟而已矣紾之忍反紾戾也教之以孝弟之道則彼當自知兄之不可戾而喪之不可短矣孔子曰子生三年然後免於父母之懷豫也有三年之愛於其父母乎所謂教之以孝弟者如此蓋示之以至情之不能己者非强上聲之也王子有其母死者其傅為之請數月之喪公孫丑曰若此者何如也為去聲陳氏曰王子所生之母死厭一甲反於嫡母而不敢終喪其傅為請於王欲使得行數月之喪也時又適有此事丑問如此者是非何如按儀禮公子為去聲其母練冠麻衣縓七絹反緣俞絹反既葬除之按儀禮喪服章注公子君之庶子也疑當時此禮已廢或既葬而未忍即除故請之也曰是欲終之而不可得也雖加一日愈於已謂夫莫之禁而弗為者也夫音扶言王子欲終喪而不可得其傅為請雖止得加一日猶勝不加我前所譏乃謂夫莫之禁而自不為者耳此章言三年通喪天經地義不容私意有所短長示之至情則不肖者有以企去智反而及之矣孟子曰君子之所以教者五下文五者蓋因人品高下或相去逺近先後之不同有如時雨化之者時雨及時之雨也草木之生播種封植丞職反人力已至而未能自化所少者雨露之滋耳及此時而雨之則其化速矣教人之妙亦猶是也若孔子之於顔曾是已有成德者有達財者財與材同此各因其所長而教之者也成德如孔子之於冉閔達財如孔子之於由賜有答問者就所問而答之若孔孟之於樊遲萬章也有私淑艾者艾音乂私竊也淑善也艾治也人或不能及門受業但聞君子之道於人而竊以善治其身是亦君子教誨之所及若孔孟之於陳亢夷之是也孟子亦曰豫未得為孔子徒也豫私淑諸人也此五者君子之所以教也聖賢施教各因其材小以成小大以成大無棄人也公孫丑曰道則高矣美矣宜若登天然似不可及也何不使彼為可幾及而日孳孳也幾音機孟子曰大匠不為拙工改廢繩墨羿不為拙射變其彀率為去聲彀古候反率音律彀率彎弓之限也言教人者皆有不可易之法不容自貶悲檢反以徇學者之不能也君子引而不發躍如也中道而立能者從之引引弓也發發矢也躍如如踴躍而出也因上文彀率而言君子教人但受以學之之法而不告以得之之妙如射者之引弓而不發矢然其所不告者已如踴躍而見於前矣中者無過不及之謂中道而立言其非難非易去聲能者從之言學者當自勉也此章言道有定體教有成法卑不可抗高不可貶語不能顯默不能藏孟子曰天下有道以道殉身天下無道以身殉道殉如殉葬之殉以死隨物之名也身出則道在必行道屈則身在必退以死相從而不離也未聞以道殉乎人者也以道從人妾婦之道公都子曰滕更之在門也若在所禮而不答何也更平聲趙氏曰滕更滕君之弟來學者也孟子曰挾貴而問挾賢而問挾長而問挾有勳勞而問挾故而問皆所不答也滕更有二焉長上聲趙氏曰二謂挾貴挾賢也尹氏曰有所挾則受道之心不專所以不答也此言君子雖誨人不倦又惡去聲夫音扶意之不誠者孟子曰於不可已而己者無所不已於所厚者薄無所不薄也已止也不可止謂所不得不為者也所厚所當厚者也此言不及者之弊其進鋭者其退速進鋭者用心太過其氣易去聲衰故退速三者之弊理勢必然雖過不及之不同然卒同歸於廢弛施紙反孟子曰君子之於物也愛之而弗仁於民也仁之而弗親親親而仁民仁民而愛物物謂禽獸草木愛謂取之有時用之有節程子曰仁推己及人如老吾老以及人之老於民則可於物則不可統而言之則皆仁分而言之則有序楊氏曰其分去聲下同不同故所施不能無差楚宜反等所謂理一而分殊者也尹氏曰何以有是差等一本故也無僞也孟子曰知者無不知也當務之為急仁者無不愛也急親賢之為務堯舜之知而不遍物急先務也堯舜之仁不遍愛人急親賢也知者之知並去聲知者固無不知然常以所當務者為急則事無不治去聲而其為知也大矣仁者固無不愛然常急於親賢則恩無不洽而其為仁也博矣不能三年之喪而緦小功之察放飯流啜而問無齒決是之謂不知務飯扶晚反啜昌悅反三年之喪服之重者也緦麻三月小功五月服之輕者也察致詳也放飯大飯流啜長啜不敬之大者也齒決齧吾結反斷乾音干肉不敬之小者也曲禮曰毋放飯毋流啜又曰濡肉齒決乾肉不齒決注乾堅肉宜用手問講求之意此章言君子之於道識其全體則心不狹知所先後則事有序豐氏曰智不急於先務雖遍知人之所知遍能人之所能徒弊精神而無益於天下之治去聲矣仁不急於親賢雖有仁民愛物之心小人在位無由下達聰明日蔽於上而惡政日加於下此孟子所謂不知務也孟子纂箋卷十三
