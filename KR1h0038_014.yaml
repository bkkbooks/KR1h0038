body:
  text: 欽定四庫全書論語纂箋卷十元詹道傳撰子張第十九此篇皆記弟子之言而子夏為多子貢次之蓋孔門自顔子以下頴悟莫若子貢自曽子以下篤實無若子夏故特記之詳焉凡二十五章子張曰士見危致命見得思義祭思敬喪思哀其可已矣致命謂委致其命猶言授命也四者立身之大節一有不至則餘無足觀故言士能如此則庶乎其可矣子張曰執德不𢎞信道不篤焉能為有焉能為亡焉於虔反亡讀作無下同有所得而守之太狹則德孤二字本易坤文言敬義立而德不孤有所聞而信之不篤則道廢焉能為有亡猶言不足為輕重子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢與於人何所不容我之不賢與人將拒我如之何其拒人也賢與之與平聲子夏之言迫狹子張譏之是也但其所言亦有過髙之弊蓋大賢雖無所不容然大故亦所當絶不賢固不可以拒人然損友亦所當逺去聲學者不可不察子夏曰雖小道必有可觀者焉致逺恐泥是以君子不為也泥去聲小道如農圃醫卜之屬金氏曰農如許行為神農之言漢書藝文志農家者流諸書圃如種樹之書畜牧之方醫如方脈諸書卜則龜書周禮三兆今亡史記龜䇿傳略存一二泥不通也楊氏曰百家衆技猶耳目鼻口皆有所明而不能相通莊子天下篇曰天下大亂賢聖不明道法不一天下多得一察焉以自好譬如耳目鼻口皆有所明不能相通猶百家衆技也皆有所長時有所用雖然不該不遍一曲之士也非無可觀也致逺則泥矣故君子不為也子夏曰日知其所亡月無忘其所能可謂好學也已矣亡讀作無好去聲亡無也謂已之所未有尹氏曰好學者日新而不失子夏曰博學而篤志切問而近思仁在其中矣四者皆學問思辨之事耳未及乎力行而為仁也然從事於此則心不外馳而所存自熟故曰仁在其中矣程子曰博學而篤志切問而近思何以言仁在其中矣學者要思得之了此便是徹上徹下之道又曰學不博則不能守約志不篤則不能力行切問近思在己者則仁在其中矣又曰近思者以類而推蘇氏曰博學而志不篤則大而無成泛問逺思則勞而無功子夏曰百工居肆以成其事君子學以致其道肆謂官府造作之處致極也工不居肆則遷於異物而業不精君子不學則奪於外誘而志不篤尹氏曰學所以致其道也百工居肆必務成其事君子之於學可不知所務哉愚按二説相須其義始備子夏曰小人之過也必文文去聲文飾之也小人憚於改過而不憚於自欺故必文以重其過子夏曰君子有三變望之儼然即之也溫聽其言也厲儼然者貌之莊溫者色之和厲者辭之確程子曰他人儼然則不溫溫則不厲惟孔子全之謝氏曰此非有意於變蓋並行而不相悖也如良玉溫潤而栗然記聘義昔者君子比德於玉焉溫潤而澤仁也縝密以栗知也子夏曰君子信而後勞其民未信則以為厲已也信而後諫未信則以為謗已也信謂誠意惻怛而人信之也厲猶病也事上使下皆必誠意交孚而後可以有為子夏曰大德不踰間小德出入可也大德小德猶言大節小節間闌也所以止物之出入言人能先立乎其大者則小節雖或未盡合理亦無害也吳氏曰此章之言不能無弊學者詳之子遊曰子夏之門人小子當灑掃應對進退則可矣抑末也本之則無如之何灑色賣反掃素報反子遊譏子夏弟子於威儀容節之間則可矣然此小學之末耳推其本如大學正心誠意之事則無有子夏聞之曰噫言遊過矣君子之道孰先傳焉孰後倦焉譬諸草木區以别矣君子之道焉可誣也有始有卒者其惟聖人乎别彼列反焉於虔反倦如誨人不倦之倦區猶類也言君子之道非以其末為先而傳之非以其本為後而倦教但學者所至自有淺深如草木之有大小其類固有别矣若不量其淺深不問其生熟而槩以髙且逺者強上聲而語音御之則是誣之而已君子之道豈可如此若夫音扶始終本末一以貫之則惟聖人為然豈可責之門人小子乎程子曰君子教人有序先傳以小者近者而後教以大者逺者非是先傳以近小而後不教以逺大也又曰灑掃應對便是形而上者理無大小故也故君子只在謹獨集注引程子慎獨凡三章仲弓問仁章云惟慎獨便是守之之法子在川上章云其要只在慎獨及此章為三又曰聖人之道更無精粗從灑掃應對與精義入神易下繫云精義入神以致用也貫通只一理雖灑掃應對只看所以然如何又曰凡物有本末不可分本末為兩假事灑掃應對是其然必有所以然又曰自灑掃應對上便可到聖人事愚按程子第一條説此章文意最為詳盡其後四條皆以明精粗本末其分扶問反雖殊而理則一學者當循序而漸進不可厭末而求本蓋與第一條之意實相表裏非謂末即是本但學其末而本便在此也子夏曰仕而優則學學而優則仕優有餘力也仕與學理同而事異故當其事者必先有以盡其事而後可及其餘然仕而學則所以資其仕者益深學而仕則所以驗其學者益廣子遊曰喪致乎哀而止致極其哀不尚文飾也楊氏曰喪與其易也寧戚不若禮不足而哀有餘之意愚按而止二字亦微有過於髙逺而簡略細微之弊學者詳之子遊曰吾反張也為難能也然而未仁子張行去聲過髙而少誠實惻怛之意曽子曰堂堂乎張也雞與並為仁矣堂堂容貌之盛言其務外自髙不可輔而為仁亦不能有以輔人之仁也范氏曰子張外有餘而內不足故門人皆不與其為仁子曰剛毅木訥近仁寧外不足而內有餘庶可以為仁矣曽子曰吾聞諸夫子人未有自致者也必也親喪乎致盡其極也蓋人之真情所不能自己者尹氏曰親喪固所自盡也孟子語於此不用其誠惡乎用其誠曽子曰吾聞諸夫子孟莊子之孝也其他可能也其不改父之臣與父之政是難能也孟莊子魯大夫名速其父獻子名蔑獻子有賢德而莊子能用其臣守其政故其他孝行去聲雖有可稱而皆不若此事之為難孟氏使陽膚為士師問於曽子曽子曰上失其道民散久矣如得其情則哀矜而勿喜陽膚曽子弟子民散謂情義乖離不相維繫謝氏曰民之散也以使之無道教之無素故其犯法也非迫於不得已則陷於不知也故得其情則哀矜而勿喜子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉惡居之惡去聲下流地形卑下之處衆流之所歸喻人身有汙賤之實亦惡名之所聚也子貢言此欲人常自警省悉井反不可一置其身於不善之地非謂紂本無罪而虛被惡名也子貢曰君子之過也如日月之食焉過也人皆見之更也人皆仰之更平聲衛公孫朝問於子貢曰仲尼焉學朝音潮焉於虔反公孫朝衛大夫子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學而亦何常師之有識音志下焉字於虔反文武之道謂文王武王之謨訓功烈與凡周之禮樂文章皆是也在人言人有能記之者識記也叔孫武叔語大夫於朝曰子貢賢於仲尼語去聲朝音潮武叔魯大夫名州仇子服景伯以告子貢子貢曰譬諸宮牆賜之牆也及肩窺見室家之好牆卑室淺夫子之牆數仭不得其門而入不見宗廟之美百官之富七尺曰仞不入其門則不見其中之所有言牆髙而宫廣也得其門者或寡矣夫子之云不亦宜乎此夫子指武叔叔孫武叔毁仲尼子貢曰無以為也仲尼不可毁也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉人雖欲自絶其何傷於日月乎多見其不知量也量去聲無以為猶言無用為此土髙曰丘大阜曰陵日月喻其至髙自絶謂以謗毁自絶於孔子多與祗同適也不知量謂不自知其分扶問反量陳子禽謂子貢曰子為恭也仲尼豈賢於子乎為恭謂為恭敬推吐雷反遜其師也子貢曰君子一言以為知一言以為不知言不可不慎也知去聲責子禽不謹言夫子之不可及也猶天之不可階而升也階梯也大可為也化不可為也故曰不可階而升也夫子之得邦家者所謂立之斯立道之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也道去聲立之謂植其生也道引也謂教之也行從也綏安也來歸附也動謂鼓舞之也和所謂於音烏變時雍言其感應之妙神速如此榮謂莫不尊親哀則如喪如字考妣程子曰此聖人之神化上下與天地同流者也謝氏曰觀子貢稱聖人語乃知晚年進德蓋極於髙逺也夫子之得邦家者其鼓舞羣動捷於桴鼓影響記明堂位土鼓蕢桴音浮左傳成公二年右援枹而鼓枹鼓槌音浮本作桴漢書枹鼓之枹音桴風無反則此桴字不音孚若音孚者乃乘桴浮海之桴筏也人雖見其變化而莫窺其所以變化也蓋不離去聲於聖而有不可知者存焉此殆難以思勉及也堯曰第二十凡三章堯曰咨爾舜天之歷數在爾躬允執其中四海困窮天祿永終此堯命舜而禪時戰反以帝位之辭咨嗟歎聲歷數帝王相繼之次第猶嵗時節氣之先後也允信也中者無過不及之名四海之人困窮則君祿亦永絶矣戒之也舜亦以命禹舜後遜位於禹亦以此辭命之今見於虞書大禹謨比此加詳曰豫小子履敢用玄牡敢昭告于皇皇后帝有罪不敢赦帝臣不蔽簡在帝心朕躬有罪無以萬方萬方有罪罪在朕躬此引啇書湯誥之辭蓋湯既放桀而告諸侯也與書文大同小異曰上當有湯字履蓋湯名疏世本云湯名天乙孔安國云至為王改名履用玄牡夏尚黑見記檀弓上未變其禮也簡閲也言桀有罪已不敢赦而天下賢人皆上帝之臣已不敢蔽簡在帝心惟帝所命此述其初請命而伐桀之詞也又言君有罪非民所致民有罪實君所為見其厚於責已薄於責人之意此其告諸侯之辭也周有大賚善人是富賚來代反此以下述武王事賚豫通作與也武王克商大賚于四海見周書武成篇此言其所富者皆善人也詩序曰賚所以錫豫善人詩周頌賚大封於廟也賚豫也言所以錫豫善人也蓋本於此雖有周親不如仁人百姓有過在豫一人此周書泰誓之辭孔氏曰孔氏名安國西漢曲阜人周至也言紂至親雖多不如周家之多仁人謹權量審法度修廢官四方之政行焉權稱去聲錘直垂反也量去聲斗斛也古注引漢律歷志云權者銖兩斤鈞石也所以稱物平施知輕重也本起黃鍾之重一籥容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石五權謹矣量者籥合升斗斛也所以量多少也本起於黃鍾之籥用度數審其容以子穀秬黍中者千有二百實其籥合籥為合十合為升十升為斗十斗為斛五量嘉矣又云度者分寸尺丈引也所以度長短也本起黃鍾之長以子穀秬黍中者一黍之廣為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣而此不言度者從可知也法度禮樂制度皆是也興滅國繼絶世舉逸民天下之民歸心焉興滅繼絶謂封黃帝堯舜夏商之後舉逸民謂釋箕子之囚復商容之位三者皆人心之所欲也樂記武王克殷反商未及下車而封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於把投殷之後於宋封王子比干之墓釋箕子之囚使之行商容而復其位所重民食喪祭武成曰重民五教惟食喪祭寬則得衆信則民任焉敏則有功公則説説音恱此於武王之事無所見恐或泛言帝王之道也楊氏曰論語之書皆聖人微言而其徒傳守之以明斯道者也故於終篇具載堯舜咨命之言湯武誓師之意與夫音扶施諸政事者以明聖學之所傳者一於是而已所以著明二十篇之大旨也孟子於終篇亦歷敘堯舜湯文孔子相承之次皆此意也子張問於孔子曰何如斯可以從政矣子曰尊五美屏四惡斯可以從政矣子張曰何謂五美子曰君子惠而不費勞而不怨欲而不貪泰而不驕威而不猛費芳味反子張曰何謂惠而不費子曰因民之所利而利之斯不亦惠而不費乎擇可勞而勞之又誰怨欲仁而得仁又焉貪君子無衆寡無小大無敢慢斯不亦泰而不驕乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎焉於虔反子張曰何謂四惡子曰不教而殺謂之虐不戒視成謂之暴慢令致期謂之賊猶之與人也出納之吝謂之有司出去按韻書屏字上聲者注云蔽聲也去聲者注云除也屏四惡之屏當去聲讀而舊音丙可疑虐謂殘酷不仁暴謂卒倉沒反遽無漸致期刻期也賊者切金氏曰當作竊害之意緩於前而急於後以誤其民而必刑之是賊害之也猶之猶言均之也均之以物與人而於其出納之際乃或吝而不果則是有司之事而非為政之體言掌財之官收支俟命不敢自専者此有司之職非人君為政之體也所與雖多人亦不懷其惠矣項羽使人有功當封刻印刓吾官反忍弗能豫通作與卒以取敗亦其驗也見通鑑漢髙祖元年韓信云云尹氏曰告問政者多矣未有如此之備者也故記之以繼帝王之治去聲則夫子之為政可知也子曰不知命無以為君子也程子曰知命者知有命而信之也人不知命則見害必避見利必趨何以為君子不知禮無以立也不知禮則耳目無所加手足無所措不知言無以知人也言之得失可以知人之邪正尹氏曰知斯三者則君子之事備矣弟子記此以終篇得無意乎學者少去聲而讀之老而不知一言為可用不幾平聲於侮聖言者乎夫子之罪人也可不念哉論語纂箋卷十
