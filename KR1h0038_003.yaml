body:
  text: 欽定四庫全書中庸纂箋卷一元詹道傳撰中者不偏不倚無過不及之名庸平常也子程子曰不偏之謂中不易之謂庸中者天下之正道庸者天下之定理此篇乃孔門傳授心法子思恐其久而差也故筆之於書以授孟子其書始言一理中散為萬事末復合為一理放之則彌六合卷之則退藏於密其味無窮皆實學也善讀者玩索色窄反而有得焉則終身用之有不能盡者矣天命之謂性率性之謂道修道之謂教命猶令也性即理也天以隂陽五行化生萬物氣以成形而理亦賦焉猶命令也於是人物之生因各得其所賦之理以為健順五常之德所謂性也率循也道猶路也人物各循其性之自然則其日用事物之間莫不各有當行之路是則所謂道也修品節之也性道雖同而氣稟或異故不能無過不及之差聖人因人物之所當行者而品節之以為法於天下則謂之教若禮樂刑政之屬是也蓋人知己之有性而不知其出於天知事之有道而不知其由於性知聖人之有教而不知其因吾之所固有者裁之也故子思於此首發明之而董子所謂道之大原出於天亦此意也道也者不可須臾離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞離去聲道者日用事物當行之理皆性之德而具於心無物不不有無時不然所以不可須臾離也若其可離則為外物而非道矣是以君子之心常存敬畏雖不見聞亦不敢忽所以存天理之本然而不使離於須臾之頃也莫見乎隱莫顯乎微故君子慎其獨也見音現隱暗處也微細事也獨者人所不知而己所獨知之地也言幽暗之中細微之事迹雖未形而幾平聲則己動人雖不知而己獨知之則是天下之事無有著見明顯而過於此者是以君子既常戒懼而於此尤加謹焉所以遏人欲於將萌而不使其潛滋暗長上聲於隱微之中以至離道之逺也喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之逹道也樂音洛中節之中去聲喜怒哀樂情也其未發則性也無所偏倚故謂之中發皆中節情之正也無所乖戾故謂之和大本者天命之性天下之理皆由此出道之體也達道者循性之謂天下古今之所共由道之用也此言性情之德以明道不可離之意致中和天地位焉萬物育焉致推而極之也位者安其所也育者遂其生也自戒懼而約之以至於至靜之中無少偏倚而其守不失則極其中而天地位矣自謹獨而精之以至於應物之處無少差謬靡幼反而無適不然則極其和而萬物育矣蓋天地萬物本吾一體吾之心正則天地之心亦正矣吾之氣順則天地之氣亦順矣故其效驗至於如此此學問之極功聖人之能事初非有待於外而修道之教亦在其中矣是其一體一用雖有動靜之殊然必其體立而後用有以行則其實亦非有兩事也故於此合而言之以結上文之意右第一章子思述所傳之意以立言首明道之本原出於天而不可易其實體備於己而不可離次言存養省悉井反察之要終言聖神功化之極蓋欲學者於此反求諸身而自得之以去上聲夫音扶外誘之私而充其本然之善楊氏所謂一篇之體要是也其下十章蓋子思引夫子之言以終此章之義仲尼曰君子中庸小人反中庸中庸者不偏不倚無過不及而平常之理乃天命所當然精微之極致也唯與惟通君子為能體之小人反是君子之中庸也君子而時中小人之中庸也小人而無忌憚也王肅本作小人之反中庸也按孔疏引唐陸氏曰云云程子亦以為然今從之君子之所以為中庸者以其有君子之德而又能隨時以處上聲中也小人之所以反中庸者以其有小人之心而又無所忌憚徒案反也蓋中無定體隨時而在是乃平常之理也君子知其在我故能戒謹不睹恐懼不聞而無時不中小人不知有此則肆欲妄行而無所忌憚矣右第二章此下十章皆論中庸以釋首章之義文雖不屬音燭而意實相承也變和言行者遊氏曰以性情言之則曰中和以德行去聲言之則曰中庸是也然中庸之中實兼中和之義子曰中庸其至矣乎民鮮能久矣鮮上聲下同過則失中不及則未至故惟中庸之德為至然亦人所同得初無難事但世教衰民不興行去聲故鮮能之今已久矣論語無能字右第三章子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也知者之知去聲道者天理之當然中而已矣知愚賢不肖之過不及則生稟之異而失其中也知者知之過既以道為不足行愚者不及知又不知所以行此道之所以常不行也賢者行之過既以道為不足知不肖者不及行又不求所以知此道之所以常不明也人莫不飲食也鮮能知味也道不可離人自不察是以有過不及之弊右第四章子曰道其不行矣夫音扶由不明故不行右第五章此章承上章而舉其不行之端以起下章之意子曰舜其大知也與舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以為舜乎知去聲與平聲好去聲舜之所以為大知者以其不自用而取諸人也邇言者淺近之言猶必察焉其無遺善可知然於其言之未善者則隱而不宣其善者則播而不匿其廣大光明又如此則人孰不樂音洛告以善哉兩端謂衆論不同之極致蓋凡物皆有兩端如小大厚薄之類於善之中又執其兩端而量度徒洛反以取中然後用之則其擇之審而行之至矣然非在我之權度精切不差何以與音預此此知如字之所以無過不及而道之所以行也右第六章子曰人皆曰豫知驅而納諸罟擭陷阱之中而莫之知辟也人皆曰豫知擇乎中庸而不能期月守也豫知之知去聲罟音古擭胡化反阱才性反辟避同期居之反罟網也擭機檻也陷阱坑坎也皆所以掩取禽獸者也擇乎中庸辨别彼列反衆理以求所謂中庸即上章好去聲問用中之事也期月匝作答反一月也言知禍而不知辟以况能擇而不能守皆不得為知也右第七章承上章大知而言又舉不明之端以起下章也子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣回孔子弟子顔淵名拳拳奉上聲持之貌服猶著陟略反也膺胸也奉持而著之心胸之間言能守也顔子蓋真知之故能擇能守如此此行之所以無過不及而道之所以明也右第八章子曰天下國家可均也爵祿可辭也白刃可蹈也中庸不可能也均平治也三者亦知仁勇之事天下之至難也然皆倚於一偏故資之近而力能勉者皆足以能之至於中庸雖若易去聲下同能然非義精仁熟而無一毫人欲之私者不能及也三者難而易中庸易而難此民之所以鮮上聲能也右第九章亦承上章以起下章子路問強子路孔子弟子仲由也子路好去聲勇故問強子曰南方之強與北方之強與抑而強與與平聲抑語辭而汝也寬柔以教不報無道南方之強也君子居之寬柔以教謂含容巽順以誨人之不及也不報無道謂橫去聲逆之來直受之而不報也南方風氣柔弱故以含忍之力勝人為強君子之道也衽金革死而不厭北方之強也而強者居之衽而審反席也記內則將衽注衽卧席也金戈兵之屬革甲胄直又反之屬北方風氣剛徑故以果敢之力勝人為強強者之事也故君子和而不流強哉矯中立而不倚強哉矯國有道不變塞焉強哉矯國無道至死不變強哉矯此四者汝之所當強也矯強貌詩曰矯矯虎臣是也詩泮水篇倚偏著直略反也塞悉則反未達也國有道不變未達之所守國無道不變平生之所守也此則所謂中庸之不可能者非有以自勝其人欲之私不能擇而守也君子之強孰大於是夫子以是告子路者所以抑其血氣之剛而進之以德義之勇也右第十章子曰素隱行怪後世有述焉吾弗為之矣素按漢書當作索山各反蓋字之誤也前漢藝文志引此全文素作索顔師古注索隱求索隱暗之事真氏曰三國志方技傳亦作索隱索隱行怪言深求隱僻之理而過為詭古委反異之行去聲也然以其足以欺世而盜名故後世或有稱述之者此知之過而不擇乎善行之過而不用其中不當強而強者也聖人豈為之哉君子遵道而行半塗而廢吾弗能已矣遵道而行則能擇乎善矣半塗而廢則力之不足也此其知雖足以及之而行有不逮當強而不強者也巳止也聖人於此非勉焉而不敢廢蓋至誠無息自有所不能止也君子依乎中庸遁世不見知而不悔唯聖者能之不為索隱行怪則依乎中庸而已不能半塗而廢是以遁世不見知而不悔也此中庸之成德知去聲之盡仁之至不賴勇而裕如者正吾夫子之事而猶不自居也故曰唯與惟通後倣此聖者能之而已右第十一章子思所引夫子之言以明首章之義者止此蓋此篇大旨以知去聲下同仁勇三達德為入道之門故於篇首即以大舜顔淵子路之事明之舜知也顔淵仁也子路勇也三者廢其一則無以造七到反道而成德矣餘見第十二章君子之道費而隱費符味反費用之廣也隱體之微也夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉與去聲君子之道近自夫婦居室之間逺而至於聖人天地之所不能盡其大無外其小無內莊子終篇至大無內謂之大一至小無內謂之小一又楚詞逺遊篇道可受而不可傳其大無外兮其小無垠可謂費矣然其理之所以然則隱而莫之見也蓋可知可能者道中之一事及其至而聖人不知不能則舉全體而言聖人固有所不能盡也侯氏曰聖人所不知如孔子問禮問官之類家語觀周篇孔子謂南宫敬叔曰吾聞老𥅆博古知今通禮樂之原明道德之歸則吾師也今將往矣敬叔與俱至周問禮於老𥅆左傳昭十七年郯子來朝公與之宴昭子問焉曰少昊氏鳥名官何故也郯子曰吾祖也吾知之云云仲尼聞之見於郯子而學之既而告人曰吾聞之天子太官學在四夷猶信所不能如孔子不得位堯舜病博施去聲之類愚謂人所憾胡暗反於天地如覆敷救反載生成之偏及寒暑災祥之不得其正者詩云鳶飛戾天魚躍于淵言其上下察也鳶余専反詩大雅旱麓音鹿之篇鳶鴟處脂反類戾至也察著也子思引此詩以明化育流行上下昭著莫非此理之用所謂費也然其所以然者則非見聞所及所謂隱也故程子曰此一節子思喫緊居忍反為去聲人處活潑潑普活反地讀者其致思焉君子之道造端乎夫婦及其至也察乎天地結上文右第十二章子思之言蓋以申明首章道不可離之意也其下八章雜引孔子之言以明之子曰道不逺人人之為道而逺人不可以為道道者率性而已固衆人之所能知能行者也故常不逺於人若為道者厭其卑近以為不足為而反務為髙逺難行之事則非所以為道矣詩云伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺故君子以人治人改而止睨研計反詩豳悲巾反風伐柯音哥之篇柯斧柄則法也睨邪視也言人執柯伐木以為柯者彼柯長短之法在此柯耳然猶有彼此之别彼列反下同故伐者視之猶以為逺也若以人治人則所以為人之道各在當去聲人之身初無彼此之别故君子之治人也即以其人之道還治其人之身其人能改即止不治蓋責之以其所能知能行非欲其逺人以為道也張子所謂以衆人望人則易去聲從是也忠恕違道不逺施諸己而不願亦勿施於人盡己之心為忠推己及人為恕違去也如春秋傳齊師違穀七里之違言自此至彼相去不逺非背音佩而去之之謂也左哀二十七年晉伐鄭齊師救鄭及留舒違穀七里穀人不知杜注留舒齊地違去也道即其不逺人者是也施諸己而不願亦勿施於人忠恕之事也以己之心度徒洛反人之心未嘗不同則道之不逺於人者可見故己之所不欲則勿以施於人亦不逺人以為道之事張子所謂以愛己之心愛人則盡仁是也君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸德之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行並去聲顧言君子胡不慥慥爾子臣弟友四字絶句求猶責也道不逺人凡己之所以責人者皆道之所當然也故反之以自責而自修焉庸平常也行者踐其實謹者擇其可德不足而勉則行益力言有餘而訒則謹益至謹之至則言顧行矣行之力則行顧言矣慥慥篤實貌言君子之言行如此豈不慥慥乎贊美之也凡此皆不逺人以為道之事張子所謂以責人之心責己則盡道是也右第十三章道不逺人者夫婦所能丘未能一者聖人所不能皆費也而其所以然者則至隱存焉下章放此君子素其位而行不願乎其外素猶見形甸反在也言君子但因見在所居之位而為其所當為無慕乎其外之心也素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉難去聲此言素其位而行也在上位不陵下在下位不援上正己而不求於人則無怨上不怨天下不尤人援平聲此言不願乎其外也故君子居易以俟命小人行險以徼幸易去聲易平地也居易素位而行也俟命不願乎外也徼堅堯反求也幸謂所不當得而得者子曰射有似乎君子失諸正鵠反求諸其身正音征鵠工喜反畫胡卦反布曰正棲皮曰鵠二語射義注皆侯之中射之的也詩傳侯張布而射之者也正設的於侯中而射之者也大射則張皮侯而設鵠賔射則張布侯而設正按朱子曰周禮梓人有皮侯采侯獸侯皮侯則設鵠乃大射之侯箋見論語第三篇采侯則設正賔射之侯也正之方外如鵠亦三分其侯而居一中二尺畫朱其外次白次蒼次黃次黑充其尺寸使大如鵠其旁畫以雲氣亦如正之數五正者天子也諸侯則三正去玄黃孤大夫二正去青白直以朱緑也若獸侯則燕射之侯鄉射記云天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕蓋用布而畫獸頭於正鵠之處天子諸侯則以白土赤土塗其布為質士則用布而不塗其側所畫雲采亦如采侯之差等又按叢説云射有三天子至大夫皆有之士則無大射而有賔射燕射也又按三禮辨云天子九十步侯諸侯七十步侯大夫五十步侯步近者鵠差小取其巧也步逺者鵠差大取其力也子思引此孔子之言以結上文之意右第十四章子思之言也凡章首無子曰字者放此君子之道辟如行逺必自邇辟如登髙必自卑辟與譬同詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻帑好去聲耽詩作湛亦音耽樂音洛詩小雅常棣之篇鼓瑟琴和也翕亦合也耽亦樂也帑與孥通子孫也孔疏古者謂子孫為帑甘誓言豫則帑戮汝子曰父母其順矣乎夫子誦此詩而贊之曰人能和於妻子宜於兄弟如此則父母其安樂音洛之矣子思引詩及此語以明行逺自邇登髙自卑之意右第十五章子曰鬼神之為德其盛矣乎程子曰鬼神天地之功用而造化之迹也張子曰鬼神者二氣之良能也愚謂以二氣言則鬼者隂之靈也神者陽之靈也以一氣言則至而伸者為神反而歸者為鬼其實一物而已為德猶言性情功效視之而弗見聽之而弗聞體物而不可遺鬼神無形與聲然物之終始莫非隂陽合散之所為是其為物之體而物之所不能遺也其言體物猶易所謂幹事乾坤文言貞者事之幹也朱子本義云言事之所依以立蓋正而能固萬物依此而立幹如木之幹事如木之葉使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右齊側皆反齊音齊下其齊同之為言齊也所以齊不齊而致其齊也二句出禮記祭統篇明猶潔也洋洋流動充滿之意能使人畏敬奉承而發見形甸反下同昭著如此乃其體物而不可遺之驗也孔子曰其氣發揚於上為昭明焄音熏蒿悽愴初亮反此百物之精也神之著也正謂此爾章句所引乃禮記祭義宰我問鬼神孔子答之云云疏言人生時形體與氣合共為生其死則形與氣分其氣之精魂發揚升於上為昭明者神靈光明也焄謂香臭也蒿謂氣蒸出貌言百物之氣或香或臭蒸而上出其氣蒿然也悽愴者謂此等之氣人聞之情有悽愴百物之精者人氣揚於上為昭明百物之氣為焄蒿悽愴人氣發揚於上為昭明此神之著也朱子曰人死時自有一般光景焄蒿是其氣升騰悽愴是使人慘栗感傷之意何北山曰祭義所言謂人隂陽乍離之際有此聲氣若中庸章句乃是借來形容祭祀來格洋洋如在之氣象此是感召已散而復伸之氣也詩曰神之格思不可度思矧可射思度待洛反射音亦詩作斁詩大雅抑之篇格來也矧况也射厭也言厭怠而不敬也思語辭夫微之顯誠之不可掩如此夫夫音扶誠者真實無妄之謂隂陽合散無非實者故其發見之不可掩如此右第十六章不見不聞隱也體物如在則亦費矣此前三章以其費之小者而言此後三章以其費之大者而言此一章兼費隱包大小而言子曰舜其大孝也與德為聖人尊為天子富有四海之內宗廟饗之子孫保之輿平聲子孫謂虞思陳胡公之屬史記索隱夏后之時猶封虞思虞遂至周武王克殷乃復求舜後得媯滿封之於陳滿諡胡公陳世家自胡公至桓公十二世入春秋始終春秋凡十二公當哀公十七年楚滅之陳滅而陳恆得政於齊至周威烈王田和列為諸侯秦始皇二十六年齊王建降國亡二世元年齊王族田儋及從弟榮弟橫皆豪傑宗強儋略定齊地自立為王漢髙祖召田橫自剄而舜祀始絶故大德必得其位必得其祿必得其名必得其壽舜年百有十歲書舜典舜生三十徽庸三十在位五十載陟方乃死故天之生物必因其材而篤焉故栽者培之傾者覆之材質也篤厚也栽植也氣至而滋息為培氣反而遊散則覆詩曰嘉樂君子憲憲令德宜民宜人受祿於天保佑命之自天申之詩大雅假樂音洛之篇假當依此作嘉憲當依詩作顯申重也故大德者必受命受命者受天命為天子也右第十七章此由庸行去聲之常推之以極其至見道之用廣也而其所以然者則為體微矣後二章亦此意子曰無憂者其惟文王乎以王季為父以武王為子父作之子述之此言文王之事書言王季其勤王家蓋其所作亦積功纍魯水反仁之事也武王纘太王王季文王之緒一戎衣而有天下身不失天下之顯名尊為天子富有四海之內宗廟饗之子孫保之大音泰下同此言武王之事纘作管反繼也大王王季之父也書云大王肇基王迹書武成篇王若曰惟先王建邦啓土公劉克篤前烈至于大王肇基王迹王季其勤王家我文考文王克成厥勳詩云至于大王實始翦商詩閟宫篇后稷之孫實維大王居岐之陽實始翦商至于文武纘大王之緒致天之屆于牧之野緒業也戎衣甲胄之屬一戎衣武成文言一著陟路反戎衣以伐紂也武王末受命周公成文武之德追王太王王季上祀先公以天子之禮斯禮也達乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫期之喪達乎大夫三年之喪達乎天子父母之喪無貴賤一也追王之王去聲此言周公之事末猶老也追王蓋推文武之意以及乎王迹之所起也先公組音祖紺古暗反以上至后稷也史記周本紀后稷别姓姬氏后稷卒子不窋立卒子鞠陶立卒子公劉立卒子慶節立國於豳慶節卒子皇僕立卒子差弗立卒子毁隃立卒子公非立卒子髙圉立卒子亞圉立卒子公叔祖類立卒子古公亶父立組紺即公叔祖類上祀先公以天子之禮又推大王王季之意以及於無窮也制為禮法以及天下使葬用死者之爵祭用生者之祿喪服自期居之反以下諸侯絶大夫降吕氏曰期之喪有二正統之期為祖父母也旁親之期為叔伯父母衆子昆弟昆弟之子也正統之期雖天子諸侯莫降旁親之期天子諸侯絶服而大夫降服大功所謂尊不同故或絶或降也如旁親之期亦為大夫則大夫亦不降所謂尊同則服其親之服也諸侯雖絶服旁親尊同亦不降所不臣者猶服之如始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟是也而父母之喪上下同之推己以及人也右第十八章子曰武王周公其達孝矣乎達通也承上章而言武王周公之孝乃天下之人通謂之孝猶孟子之言達尊也夫孝者善繼人之志善述人之事者也上章言武王纘大王王季文王之緒以有天下而周公成文武之德以追崇其先祖此繼志述事之大者也下文又以其所制祭祀之禮通於上下者言之春秋修其祖廟陳其宗器設其裳衣薦其時食祖廟天子七諸侯五大夫三適音的士二官師一見禮記祭法篇又王制天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三廟一昭一穆與太祖之廟而三士一廟庶人祭於寢宗器先世所藏之重器若周之赤刀大訓天球音求河圖之屬也書顧命越玉五重陳寶赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圖在東序裳衣先祖之遺衣服祭則設之以授尸也時食四時之食各有其物如春行羔豚膳膏香之類是也按周禮天官庖人凡用禽獸春行羔豚膳膏香夏行腒鱐膳膏臊秋行犢麛膳膏腥冬行鮮音鮮羽膳膏膻注行用也羔稚羊豚稚豕膳調和肉味膏香牛脂也牛屬司徒土也木克土春用之腒音渠乾雉鱐音搜乾魚膏燥犬膏也犬屬司冦金也火克金夏用之犢牛麛鹿也膏腥雞膏也雞屬宗伯木也金克木秋用之鮮音鮮生魚羽鴈也膏膻羊脂也羊屬司馬火也水克火冬用之羔豚物生而肥犢麛物成而充腒鱐暵熱而乾魚鴈水涸而性定此八者得四時之氣尤盛為人食之弗勝是以用休廢之膏煎和膳之節其氣也宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也昭如字為去聲宗廟之次左為昭右為穆而子孫亦以為序有事於太廟則子姓兄弟羣昭羣穆咸在而不失其倫焉此祭統文爵公侯卿大夫也事宗祝有司之職事也宗宗伯宗人之屬祝大祝小祝也有司如宫正執燭天府沃盥陳寶器司几筵設筵几凡有職者皆是旅衆也酬𨗳飲也旅酬之禮賔弟子兄弟之子各舉觶音至於其長上聲下同而衆相酬蓋宗廟之中以有事為榮故逮及賤者使亦得以申其敬也許曰凡祭必立尸必擇賔賔一人衆賔無算衆賔者賔之黨也其位在堂下西階之西祭則子姓兄弟皆會兄弟者主人之黨也其位在堂下阼階之東有司羣執事皆北面而立迎尸既入主人初獻主婦亞獻賔三獻及尸主兄弟各相獻酢畢然後行旅酬凡主人酌酒奉尸賔曰獻尸賔酌以答主人曰酢主人酌酒先自飲再酌以獻賔者謂之酬先自飲謂引𨗳之飲也旅衆也主人舉觶酌酒自西階酬賔先自飲再酌以進賔受之奠而未飲兄弟之少者舉觶於兄弟之最長者於阼階亦先𨗳飲而長兄弟亦奠而未飲賔取所奠觶於阼階酬長兄弟長兄弟西階前酬賓衆賔及衆兄弟交錯以遍以及執事者無不遍卒飲者實爵于篚此旅酬之大略也又賔弟子兄弟弟子各舉觶於其長亦先自飲如旅酬所謂下為上也賔取觶酬兄弟之黨長兄弟取觶酬賔之黨亦交錯以遍其次第之數謂之無算爵所以逮賤者如此燕毛祭畢而燕則以毛髮之色别彼列反長幼為坐次也齒年數也許曰祭畢而燕今不知其儀楚茨之詩謂禮儀既備皇尸載起神保韋歸廢徹不遲然後言諸父兄弟備言燕私鄭箋謂祭祀畢歸賔客之俎同姓則留與之燕所以尊賔客親骨肉也其下章曰樂具入奏説者謂祭時在廟燕當在寢故祭時之樂皆入奏於寢也其可知之倣佛若此踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也踐猶履也其指先王也所尊所親先王之祖考子孫臣庶也始死謂之死既葬則曰反而亡焉皆指先王也此結上文兩節皆繼志述事之意也郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如示諸掌乎郊祀天社祭地不言后土者省文也按胡五峯曰古者祭地於社猶祀天於郊也故泰誓曰郊社不修而周公祀於新邑亦先用二牛於郊後用太牢於社也記曰天子將出類于上帝宜于社又曰郊所以明天道社所以神地道周禮以禋祀祀昊天上帝以血祭祭社稷而别無祭地之文四圭有邸舞雲門以祀天兩圭有邸舞咸池以祀地而别無祭社之説則以郊對社明矣後世既立社又立北郊失之矣朱子謂此説有據禘天子宗廟之大祭追祭大祖之所自出於太廟而以大祖配之也禮喪服小記王者禘其祖之所自出以其祖配之嘗秋祭也四時皆祭舉其一耳按周禮春官大宗伯以祠禴嘗蒸為春夏秋冬享先王之禮如王制祭統所記春礿夏禘郊特牲祭義所記春禘秋嘗者趙伯循曰此蓋漢儒見春秋惟兩書禘一春一夏而誤也以礿為春祭亦誤禮必有義對舉之互文也示與視同視諸掌言易去聲見也此與論語文意大同小異記有詳略耳右第十九章哀公問政哀公魯君名蔣子曰文武之政布在方策其人存則其政舉其人亡則其政息方版也策簡也叢説春秋傳序大事書於䇿小事簡牘而已正義云簡容一行字數行者書於方方所不容書於策蓋古未有紙削竹為簡長二尺短者半之字少者書於簡稍多則書於木版又多則以韋編聨諸簡謂之䇿而書之今但訓䇿為簡從古注也息猶滅也有是君有是臣則有是政矣人道敏政地道敏樹夫政也者蒲盧也夫音扶敏速也蒲盧沈括以為蒲葦是也沈括字存中吳興人仕宋神宗之世其説見筆談蒲葦蒲栁蘆葦也以一尺之條一寸之根置之土中莫不即生以人立政猶以地種樹其成速矣而蒲葦又易去聲下同生之物其成尤速也言人存政舉其易如此故為政在人取人以身修身以道修道以仁此承上文人道敏政而言也為政在人家語作為政在於得人語意尤備人謂賢臣身指君身道者天下之達道仁者天地生物之心而人得以生者所謂元者善之長上聲也言人君為政在於得人而取人之則又在修身能仁其身則有君有臣而政無不舉矣仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也殺去聲人指人身而言具此生理自然便有惻怛當葛反慈愛之意深體味之可見宜者分别彼列反事理各有所宜也禮則節文斯二者而已在下位不獲乎上民不可得而治矣鄭氏曰此句在下誤重平聲在此故君子不可以不修身思修身不可以不事親思事親不可以不知人思知人不可以不知天為政在人取人以身故不可以不修身修身以道修道以仁故思修身不可以不事親欲盡親親之仁必由尊賢之義故又當知人親親之殺尊賢之等皆天理也故又當知天天下之達道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也知仁勇三者天下之達德也所以行之者一也知去聲達道者天下古今所共由之路即書所謂五典孟子所謂父子有親君臣有義夫婦有别彼列反長去聲幼有序朋友有信是也知所以知如字此也仁所以體此也勇所以強此也謂之達德者天下古今所同得之理也一則誠而已矣達道雖人所共由然無是三德則無以行之達德雖人所同得然一有不誠則人欲間去聲之而德非其德矣程子曰所謂誠者止是誠實此三者三者之外更别無誠或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉強而行之及其成功一也強上聲知之者之所知行之者之所行謂達道也以其分扶問反而言則所以知者知去聲下知也同也所以行者仁也所以至於知之成功而一者勇也以其等而言則生知安行者知也學知利行者仁也困知勉行者勇也蓋人性雖無不善而氣稟有不同者故聞道有蚤莫與早暮同行道有難易去聲然能自強如字不息則其致一也呂氏曰所入之塗雖異而所至之域則同此所以為中庸若乃企生知安行之資為不可幾平聲及輕困知勉行謂不能有成此道之所以不明不行也子曰好學近乎知力行近乎仁知恥近乎勇好近乎知之知並去聲子曰二字衍文此言未及乎達德而求以入德之事通上文三知為知去聲下非知同三行為仁則此三近者勇之次也吕氏曰愚者自是而不求自私者徇人欲而忘返懦奴卧奴亂二反者甘為人下而不辭故好學非知然足以破愚力行非仁然足以忘私知恥非勇然足以起懦知斯三者則知所以修身知所以修身則知所以治人知所以治人則知所以治天下國家矣斯三者指三近而言人者對己之稱天下國家則盡乎人矣言此以結上文修身之意起下文九經之端也凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔逺人也懷諸侯也經常也體謂設以身處上聲其地而察其心也子如父母之愛其子也柔逺人所謂無忘賔旅者也此列九經之目也吕氏曰天下國家之本在身故修身為九經之本然必親師取友然後修身之道進故尊賢次之道之所進莫先其家故親親次之由家以及朝音潮廷故敬大臣體羣臣次之由朝廷以及其國故子庶民來百工次之由其國以及天下故柔逺人懷諸侯次之此九經之序也視羣臣猶吾四體視百姓猶吾子此視臣視民之别彼列反也修身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔逺人則四方歸之懷諸侯則天下畏之此言九經之效也道立謂道成於己而可為民表所謂皇建其有極是也書洪範五皇極皇建其有極不惑謂不疑於理不眩音縣謂不迷於事敬大臣則信任專而小臣不得以間去聲之故臨事而不眩也來百工則通功易事孟子注謂通人之功而交易其事也農末相資故財用足柔逺人則天下之旅皆悅而願出於其塗故四方歸懷諸侯則德之所施去聲者博而威之所制者廣矣故曰天下畏之齊明盛服非禮不動所以修身也去讒逺色賤貨而貴德所以勸賢也尊其位重其祿同其好惡所以勸親親也官盛任使所以勸大臣也忠信重祿所以勸士也時使薄斂所以勸百姓也日省月試既稟稱事所以勸百工也送往迎來嘉善而矜不能所以柔逺人也繼絶世舉廢國治亂持危朝聘以時厚往而薄來所以懷諸侯也齊側皆反去上聲逺好惡斂並去聲既許氣反稟彼錦力錦二反稱去聲朝音潮省悉井反此言九經之事也官盛任使謂官屬衆盛足任使令平聲也如周禮太宰之屬有旅下士三十二人蓋大臣不當親細事故所以優之者如此忠信重祿謂待之誠而養之厚蓋以身體之而知其所賴乎上者如此也既讀曰餼餼稟稍去聲食也此皆鄭注孔疏謂飲食糧廪也稍食謂稍稍給之故周禮月終均其稍食是也按周禮地官廪人掌九穀之數以待國之匪頒賙賜稍食注稍食祿廪也稱事如周禮稿古老反人職曰考其弓弩以上下其食是也夏官稿人職主弓弩箭矢春獻素秋獻成書其等以饗工乘其事考其弓弩以上下其食而誅賞乃入功于司弓矢及繕人往則為平聲之授節以送之按周禮地官比長各掌其比之治五家相親睦有罪則相及有不便其居或自國中徙郊或由郊徙國中則從而授之授者付所處之吏明無罪惡若徙别鄉則為旌以行之若無授無節則治其罪又掌節者各不同門關用符節貨財用璽節道路用旌節以授四方商賈及賔客皆有期以反節凡有節為信以傳輔之司關注云傳如今移過所文書來則豐其委去聲積子賜反以迎之委積畜聚也周禮地官遺人掌邦之委積以待施惠鄉里之委積以待恤民之困乏門關之委積以養老孤郊里之委積以待賔客野鄙之委積以待羈旅縣都之委積以待凶荒凡賔客會同師旅掌其道路之委積十里有廬廬有飲食三十里有路室路室有委五十里有候館候館有積注委積者廪人倉人計九穀之數足國用皆以餘財供之少曰委多曰積朝謂諸侯見形甸反於天子聘謂諸侯使大夫來獻王制比毗至反年一小聘三年一大聘五年一朝王制疏比年每年也小聘曰問大夫三介大聘卿五介朝則君自行然此禮晉文霸時所制也若虞夏之制諸侯歲朝周之制侯甸男采衛要服六者各以服數來朝曽以德曰春秋傳昭三年鄭子大叔曰文襄之霸也令諸侯三歲聘五歲朝則此乃霸者令諸侯以事已爾記以為諸侯之事天子則誤矣厚往薄來謂燕賜厚而納貢薄凡為天下國家有九經所以行之者一也一者誠也一有不誠則是九者皆為虛文矣此九經之實也凡事豫則立不豫則廢言前定則不跲事前定則不困行前定則不疚道前定則不窮跲其劫反行去聲凡事指達道達德九經之屬豫素定也跲躓音致也疚病也此承上文言凡事皆欲先立乎誠如下文所推是也在下位不獲乎上民不可得而治矣獲乎上有道不信乎朋友不獲乎上矣信乎朋友有道不順乎親不信乎朋友矣順乎親有道反諸身不誠不順乎親矣誠身有道不明乎善不誠乎身矣此又以在下位者推言素定之意反諸身不誠謂反求諸身而所存所發未能真實而無妄也不明乎善謂未能察於人心天命之本然而真知至善之所在也誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人也誠之者擇善而固執之者也中並去聲從七容反此承上文誠身而言誠者真實無妄之謂天理之本然也誠之者未能真實無妄而欲其真實無妄之謂人事之當然也聖人之德渾然天理真實無妄不待思勉而從容中道則亦天之道也未至於聖則不能無人欲之私而其為德不能皆實故未能不思而得則必擇善然後可以明善未能不勉而中則必固執然後可以誠身此則所謂人之道也不思而得生知也不勉而中安行也擇善學知以下之事固執利行以下之事也博學之審問之慎思之明辨之篤行之此誠之之目也學問思辨所以擇善而為知去聲學而知如字也篤行所以固執而為仁利而行也程子曰五者廢其一非學也有弗學學之弗能弗措也有弗問問之弗知弗措也有弗思思之弗得弗措也有弗辨辨之弗明弗措也有弗行行之弗篤弗措也人一能之已百之人十能之已千之君子之學不為則已為則必要平聲其成故常百倍其功此困而知勉而行者也勇之事也果能此道矣雖愚必明雖柔必強明者擇善之功強者固執之效吕氏曰君子所以學者為去聲能變化氣質而已德勝氣質則愚者可進於明柔者可進於強不能勝之則雖有志於學亦愚不能明柔不能立而已矣蓋均善而無惡者性也人所同也昏明強弱之稟不齊者才也人所異也誠之者所以反其同而變其異也夫音扶以不美之質求變而美非百倍其功不足以致之今以鹵音魯莽莫古莫後二反滅裂之學莊子則陽篇君為政焉勿鹵莽治民焉勿滅裂昔豫為禾耕而鹵莽之則其實亦鹵莽而報豫耘而滅裂之其實亦滅裂而報豫鹵莽不用心也滅裂輕薄也或作或輟以變其不美之質及不能變則曰天質不美非學所能變是果於自棄其為不仁甚矣右第二十章此引孔子之言以繼大舜文武周公之緒明其所傳之一致舉而措之亦猶是耳蓋包費隱兼小大以終十二章之意章內語誠始詳而所謂誠者實此篇之樞紐女九反也又按孔子家語亦載此章而其文尤詳成功一也之下有公曰子之言美矣至矣寡人實固不足以成之也故其下復以子曰起答辭今無此問辭而猶有子曰二字蓋子思刪其繁文以附于篇而所刪有不盡者今當為衍文也博學之以下家語無之意彼有闕文抑此或子思所補也歟自誠明謂之性自明誠謂之教誠則明矣明則誠矣自由也德無不實而明無不照者聖人之德所性而有者也天道也先明乎善而後能實其善者賢人之學由教而入者也人道也誠則無不明矣明則可以至於誠矣右第二十一章子思承上章夫子天道人道之意而立言也自此以下十二章皆子思之言以反覆推明此章之意唯天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以贊天地之化育則可以與天地參矣天下至誠謂聖人之德之實天下莫能加也盡其性者德無不實故無人欲之私而天命之在我者察之由之巨細精粗無毫髮之不盡也人物之性亦我之性但以所賦形氣不同而有異耳能盡之者謂知之無不明而處上聲之無不當去聲也贊猶助也與天地參謂與天地並立為三也此自誠而明者之事也右第二十二章言天道也其次致曲曲能有誠誠則形形則著著則明明則動動則變變則化唯天下至誠為能化其次通大賢以下凡誠有未至者而言也致推致也曲一偏也形者積中而發外著則又加顯矣明則又有光輝發越之盛也動者誠能動物變者物從而變化則有不知其所以然者蓋人之性無不同而氣則有異故惟聖人能舉其性之全體而盡之其次則必自其善端發見之偏而悉推致之以各造七到反其極也曲無不致則德無不實而形著動變之功自不能已積而至於能化則其至誠之妙亦不異於聖人矣右第二十三章言人道也至誠之道可以前知國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體禍福將至善必先知之不善必先知之故至誠如神見音現禎祥者福之兆妖孽者禍之萌妖亦作襖孽魚列反蓍所以筮龜所以卜四體謂動作威儀之間如執玉髙卑其容俯仰之類左定十四年邾隱公來朝邾子執玉髙其容仰公受玉卑其容俯子貢曰以禮觀之二君皆有死亡焉是年定公薨哀公七年魯伐邾以邾子益來凡此皆理之先見形甸反者也然唯誠之至極而無一毫私偽留於心目之間者乃能有以察其幾平聲焉神謂鬼神右第二十四章言天道也誠者自成也而道自道也道也之道音導言誠者物之所以自成而道者人之所當自行也誠以心言本也道以理言用也誠者物之終始不誠無物是故君子誠之為貴天下之物皆實理之所為故必得是理然後有是物所得之理既盡則是物亦盡而無有矣故人之心一有不實則雖有所為亦如無有而君子必以誠為貴也蓋人之心能無不實乃為有以自成而道之在我者亦無不行矣誠者非自成己而已也所以成物也成己仁也成物知也性之德也合內外之道也故時措之宜也知去聲誠雖所以成己然既有以自成則自然及物而道亦行於彼矣仁者體之存知者用之發是皆吾性之固有而無內外之殊既得於己則見形甸反於是者以時措之而皆得其宜也右第二十五章言人道也故至誠無息既無虛假自無間去聲斷徒玩反不息則久久則徵久常於中也徵知盈反驗於外也徵則悠逺悠逺則博厚博厚則髙明此皆以其驗於外者言之鄭氏所謂至誠之德著於四方者是也存諸中者既久則驗於外者益悠逺而無窮矣悠逺故其積也廣博而深厚博厚故其發也髙大而光明博厚所以載物也髙明所以覆物也悠久所以成物也悠久即悠逺兼內外而言之也本以悠逺致髙厚而髙厚又悠久也此言聖人與天地同用博厚配地髙明配天悠久無疆此言聖人與天地同體如此者不見而章不動而變無為而成見音現見猶示也不見而章以配地而言也不動而變以配天而言也無為而成以無疆而言也天地之道可一言而盡也其為物不二則其生物不測此以下復扶又反以天地明至誠無息之功用天地之道可一言而盡不過曰誠而已不二所以誠也誠故不息而生物之多有莫知其所以然者天地之道博也厚也髙也明也悠也久也言天地之道誠一不二故能各極其盛而有下文生物之功今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉今夫地一撮土之多及其廣厚載華嶽而不重振河海而不泄私列反萬物載焉今夫山一卷石之多及其廣大草木生之禽獸居之寶藏興焉今夫水一勺之多及其不測黿元鼉湯河反蛟龍魚龞生焉貨財殖焉夫音扶華藏並去聲卷平聲勺市若反昭昭猶耿耿小明也此指其一處而言之及其無窮猶十二章及其至也之意蓋舉全體而言也振收也卷區也此四條皆以發明由其不二不息以致盛大而能生物之意然天地山川實非由積纍魯水反而後大讀者不以辭害意可也詩云維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也純亦不已於音烏乎音呼詩周頌維天之命篇於歎辭穆深逺也不顯猶言豈不顯也純純一不雜也引此以明至誠無息之意程子曰天道不已文王純於天道亦不已純則無二無雜不已則無間斷先後右第二十六章言天道也大哉聖人之道包下文兩節而言洋洋乎發育萬物峻極於天峻髙大也此言道之極於至大而無外也優優大哉禮儀三百威儀三千優優充足有餘之意禮儀經禮也威儀曲禮也禮器云經禮三百曲禮三千此言道之入於至小而無間去聲也待其人而後行總結上兩節故曰苟不至德至道不凝焉至德謂其人至道指上兩節而言也凝聚也成也故君子尊德性而道問學致廣大而盡精微極髙明而道中庸溫故而知新敦厚以崇禮尊者恭敬奉上聲持之意按字書尊本酒器上從八從酉象器之盈下從廾象兩手奉持惟恐傾失故曰恭敬奉持之意德性者吾所受於天之正理道由也溫猶燖似亷似林二反溫之溫左哀十二年公會吳于槖臯吳太宰嚭請尋盟子貢對曰若可尋也亦可寒也賈逵注尋溫也謂故學之矣復扶又反時習之也敦加厚也尊德性所以存心而極乎道體之大也道問學所以致知而盡乎道體之細也二者修德凝道之大端也不以一毫私意自蔽不以一毫私欲自纍去聲涵泳乎其所已知敦篤乎其所已能此皆存心之屬也析理則不使有毫釐之差處上聲事則不使有過不及之謬理義則日知其所未知節文則日謹其所未謹此皆致知之屬也蓋非存心無以致知而存心者又不可以不致知故此五句大小相資首尾相應聖賢所示入德之方莫詳於此學者宜盡心焉是故居上不驕為下不倍國有道其言足以興國無道其默足以容詩曰既明且哲以保其身其此之謂與倍與背同與平聲興謂興起在位也詩大雅蒸民之篇右第二十七章言人道也子曰愚而好自用賤而好自專生乎今之世反古之道如此者災及其身者也好去聲災古災字以上孔子之言子思引之反復如字也非天子不議禮不制度不考文此以下子思之言禮親疏貴賤相接之體也度品制文書名文者六書也周禮秋官大行人九歲屬瞽史諭書名聽聲音鄭注書名書之字也又外史掌達書名于四方疏正其字使四方知而讀之古者謂字為名儀禮百名以上書之䇿是也叢説書名書即字也名則其字之聲也考者欲正其字形及讀之音聲今天下車同軌書同文行同倫行去聲今子思自謂當時也軌轍迹之度孝經序必騁殊軌轍疏云兩轍之間為軌車輪所轢為轍周制兩輪之軌皆廣六尺六寸倫次序之體三者皆同言天下一統也雖有其位苟無其德不敢作禮樂焉雖有其德苟無其位亦不敢作禮樂焉鄭氏曰言作禮樂者必聖人在天子之位子曰吾説夏禮杞不足徵也吾學殷禮有宋存焉吾學周禮今用之吾從周此又引孔子之言杞夏之後徵證也宋殷之後三代之禮孔子皆嘗學之而能言其意但夏禮既不可考證殷禮雖存又非當世之法惟周禮乃時王之制今日所用孔子既不得位則從周而已右第二十八章承上章為下不倍而言亦人道也王天下有三重焉其寡過矣乎王去聲吕氏曰三重謂議禮制度考文惟天子得以行之則國不異政家不殊俗而人得寡過矣上焉者雖善無徵無徵不信不信民弗從下焉者雖善不尊不尊不信不信民弗從上焉者謂時王以前如夏商之禮雖善而皆不可考下焉者謂聖人在下如孔子雖善於禮而不在尊位也故君子之道本諸身徵諸庶民考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑此君子指王天下者而言其道即議禮制度考文之事也本諸身有其德也徵諸庶民驗其所信從也建立也立於此而參於彼也天地者道也鬼神者造化之迹也百世以俟聖人而不惑所謂聖人復扶又反起不易吾言者也質諸鬼神而無疑知天也百世以俟聖人而不惑知人也知天知人知其理也是故君子動而世為天下道行而世為天下法言而世為天下則逺之則有望近之則不厭動兼言行而言道兼法則而言法法度也則凖則也詩曰在彼無惡在此無射庶幾夙夜以永終譽君子未有不如此而蚤有譽於天下者也惡去聲射音妬詩作斁詩周頌振鷺之篇射厭也所謂此者指本諸身以下六事而言右第二十九章承上章居上不驕而言亦人道也仲尼祖述堯舜憲章文武上律天時下襲水土祖述者逺宗其道憲章者近守其法律天時者法其自然之運襲水土者因其一定之理皆兼內外該本末而言也辟如天地之無不持載無不覆幬辟如四時之錯行如日月之代明辟音譬幬徒報反錯猶迭也此言聖人之德萬物並育而不相害道並行而不相悖小德川流大德敦化此天地之所以為大也悖猶背音佩也天覆地載萬物並育於其間而不相害四時日月錯行代明而不相悖所以不害不悖者小德之川流所以並育並行者大德之敦化小德者全體之分大德者萬殊之本川流者如川之流脈絡分明而往不息也敦化者敦厚其化根本盛大而出無窮也此言天地之大以見上文取譬之意也右第三十章言天道也唯天下至聖為能聰明睿知足以有臨也寬裕溫柔足以有容也發強剛毅足以有執也齊莊中正足以有敬也文理密察足以有别也知去聲齊側皆反别彼列反聰明睿知生知如字之質臨謂居上而臨下也其下四者乃仁義禮智之德文文章也理條理也密詳細也察明辨也溥博淵泉而時出之溥博周遍而廣闊也淵泉靜深而有本也出發見形甸反下同也言五者之德充積於中而以時發見於外也溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不説見形甸反説音悅言其充積極其盛而發見當其可也是以聲名洋溢乎中國施及蠻貃舟車所至人力所通天之所覆地之所載日月所照霜露所隊凡有血氣者莫不尊親故曰配天施去聲隊音墜舟車所至以下蓋極言之配天言其德之所及廣大如天也右第三十一章承上章而言小德之川流亦天道也唯天下至誠為能經綸天下之大經立天下之大本知天地之化育夫焉有所倚夫音扶焉於虔反經綸皆治絲之事經者理其緒而分之綸者比毗至反其類而合之也經常也大經者五品之人倫大本者所性之全體也唯聖人之德極誠無妄故於人倫各盡其當然之實而皆可以為天下後世法所謂經綸之也其於所性之全體無一毫人欲之偽以雜之而天下之道千變萬化皆由此出所謂立之也其於天地之化育則亦其極誠無妄者有默契焉非但聞見之知而已此皆至誠無妄自然之功用夫音扶豈有所倚著直略反於物而後能哉肫肫其仁淵淵其淵浩浩其天肫之純反肫肫懇至貌以經綸而言也淵淵靜深貌以立本而言也浩浩廣大貌以知化而言也其淵其天則非特如之而已苟不固聰明聖知達天德者其孰能知之聖知之知去聲固猶實也鄭氏曰唯聖人能知聖人也右第三十二章承上章而言大德之敦化亦天道也前章言至聖之德此章言至誠之道然至誠之道非至聖不能知至聖之德非至誠不能為則亦非二物矣此章言聖人天道之極致至此而無以加矣詩曰衣錦尚絅惡其文之著也故君子之道暗然而日章小人之道的然而日亡君子之道淡而不厭簡而文溫而理知逺之近知風之自知微之顯可與入德矣衣去聲絅口迥反惡去聲暗於感反前章言聖人之德極其盛矣此復扶又反自下學立心之始言之而下文又推之以至其極也詩國風衛碩人鄭之丰皆作衣錦褧衣褧絅同禪衣也語録禪字與單字同沈括謂絅與檾同是用檾麻織疏布為之尚加也古之學者為去聲已故其立心如此尚絅故暗然衣錦故有日章之實淡簡溫絅之襲於外也不厭而文且理焉錦之美在中也小人反是則暴於外而無實以繼之是以的然而日亡也逺之近見形甸反於彼者由於此也風之自著乎外者本乎內也微之顯有諸內者形諸外也有為己之心而又知此三者則知所謹而可入德矣故下文引詩言謹獨之事詩云潛雖伏矣亦孔之昭故君子內省悉井反不疚無惡於志君子之所不可及者其唯人之所不見乎惡去聲詩小雅正月之篇承上文言莫見乎隱莫顯乎微也疚病也無惡於志猶言無愧於心此君子謹獨之事也詩云相在爾室尚不愧於屋漏故君子不動而敬不言而信相去聲詩大雅抑之篇相視也屋漏室西北隅也爾雅釋宫文云室西北隅謂之屋漏西南隅為奧東北隅為宧東南隅為窔宧音頥東北陽氣始起育養萬物為飲食之所窔音杳深也承上文又言君子之戒謹恐懼無時不然不待言動而後敬信則其為己之功益加密矣故下文引詩并去聲言其效詩曰奏假無言時靡有爭是故君子不賞而民勸不怒而民威於鈇鉞假格同鈇方無反詩商頌烈祖之篇奏進也承上文而遂及其效言進而感格於神明之際極其誠敬無有言説而人自化之也威畏也鈇莝音銼斫刀也鉞斧也詩曰不顯惟德百辟其刑之是故君子篤恭而天下平詩周頌烈文之篇不顯説見二十六章此借引以為幽深玄逺之意承上文言天子有不顯之德而諸侯法之則其德愈深而效愈逺矣篤厚也篤恭言不顯其敬也篤恭而天下平乃聖人至德淵微自然之應中庸之極功也詩云豫懷明德不大聲以色子曰聲色之於以化民末也詩曰德輶如毛毛猶有倫上天之載無聲無臭至矣輶由酉二音詩大雅皇矣之篇引之以明上文所謂不顯之德者正以其不大聲與色也古以與字通又引孔子之言以為聲色乃化民之末務今但言不大之而已則猶有聲色者存是未足以形容不顯之妙不若蒸民之詩所言德輶如毛則庶乎可以形容矣而又自以為謂之毛則猶有可比者是亦未盡其妙不若文王之詩所言上天之載無聲無臭然後乃為不顯之至耳蓋聲臭有氣無形在物最為微妙而猶曰無之故唯此可以形容不顯篤恭之妙非此德之外又别有是三等然後為至也右第三十三章子思因前章極致之言反求其本復扶又反自下學為已謹獨之事推而言之以馴致乎篤恭而天下平之盛又贊其妙至於無聲無臭而後已焉蓋舉一篇之要而約言之其反復芳復反丁寧示人之意至深切矣學者其可不盡心乎中庸纂箋卷一
