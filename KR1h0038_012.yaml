body:
  text: 欽定四庫全書論語纂箋卷八元詹道傳撰衛靈公第十五凡四十一章衛靈公問陳於孔子孔子對曰俎豆之事則嘗聞之矣軍旅之事未之學也明日遂行陳去聲陳謂軍師行音杭伍之列爼豆禮器尹氏曰衛靈公無道之君也復扶又反有志於戰伐之事故答以未學而去之史記世家孔子適衛主蘧伯玉家他日靈公問兵陳于孔子云云明日與孔子語見蜚鴈仰視之色不在孔子遂行復如陳是嵗魯哀公三年孔子年六十矣在陳絶糧從者病莫能興從去聲孔子去衛適陳興起也子路愠見曰君子亦有窮乎子曰君子固窮小人窮斯濫矣見賢遍反何氏曰濫溢也言君子固有窮時不若小人窮則放溢為非程子曰固窮者固守其窮亦通愚謂聖人當行而行無所顧慮處上聲困而亨無所怨悔於此可見學者宜深味之子曰賜也女以予為多學而識之者與女音汝識音志與平聲下同子貢之學多而能識矣夫子欲其知所本也故問以𤼵之對曰然非與方信而忽疑葢其積學功至而亦將有得也曰非也予一以貫之說見第四篇然彼以行言而此以知言也謝氏曰聖人之道大矣人不能徧觀而盡識如字宜其以為多學而識之也然聖人豈務博者哉如天之於衆形匪物物刻而雕之也故曰予一以貫之徳輶如毛毛猶有倫上天之載無聲無臭至矣尹氏曰孔子之於曽子不待其問而直告之以此曽子復扶又反深喻之曰唯若子貢則先𤼵其疑而後告之而子貢終亦不能如曽子之唯也二子所學之淺深於此可見愚按夫子之於子貢婁音屢有以𤼵之而他人不與音預焉則顔曽以下諸子所學之淺深又可見矣子曰由知徳者鮮矣鮮上聲由呼子路之名而告之也徳謂義理之得於己者非已有之不能知其意味之實也自第一章至此疑皆一時之言此章蓋為去聲愠見𤼵也子曰無為而治者其舜也與夫何為哉恭已正南面而已矣與平聲夫音扶無為而治去聲者聖人徳盛而民化不待其有所作為也獨稱舜者紹堯之後而又得人以任衆職故尤不見其有為之迹也恭已者聖人敬徳之容既無所為則人之所見如此而已子張問行猶問達之意也子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉行篤行不之行去聲貊亡百反子張意在得行於外故夫子反於身而言之猶答干禄問達之意也篤厚也蠻南蠻貊北狄周禮夏官職方氏四夷八蠻七閩九貉五戎六狄鄭司農註東方曰夷南方曰蠻西方曰戎北方曰貉狄二千五百家為州箋見第六篇立則見其參於前也在輿則見其倚於衡也夫然後行參七南反夫音扶其者指忠信篤敬而言參讀如毋往參焉之參記曲禮離坐離立毋往參焉言與我相參也衡軶音厄也言其於忠信篤敬念念不忘隨其所在常若有見雖欲頃刻離去聲下同之而不可得然後一言一行去聲自然不離於忠信篤敬而蠻貊可行也子張書諸紳紳大帶之垂者書之欲其不忘也程子曰學要鞭辟近裏著直路反己而已金氏曰辟音闢如行辟人之辟謂猶前驅者以鞭攔約人使開而一邊也博學而篤志切問而近思言忠信行篤敬立則見其參於前在輿則見其倚於衡即此是學質美者明得盡查滓壯里反便渾化却與天地同體其次惟莊敬以持養之及其至則一也子曰直哉史魚邦有道如矢邦無道如矢史官名魚衛大夫名鰌音秋如矢言直也史魚自以不能進賢退不肖既死猶以尸諫故夫子稱其直事見家語家語困誓篇史魚病將卒命其子曰吾在衛朝不能進蘧伯玉退子瑕是吾生不能正君死無以成禮我死汝置尸牗下於我畢矣禮飯於牖下小斂於户内大斂於阼殯於客位也其子從之靈公吊而問焉其子以父言告公公曰是寡人之過也於是命之殯於客位進蘧伯玉退彌子瑕孔子聞之曰死而尸諫可不謂直也君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之伯玉出處上聲合於聖人之道故曰君子卷古轉反收也懷蔵也如於孫林父音甫寗殖常職反放弑之謀不對而出亦其事也左襄十四年衛獻公與孫文子寗惠子有隙文子告蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將若之何對曰君制其國臣敢奸之雖奸之庸知愈乎遂行從近關出公出奔齊衛人立公孫剽孫林父寗殖相之二十年寗惠子卒二十六年衛獻公求復謂寗喜曰苟反政由寗氏祭則寡人寗喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行五月寗喜攻孫氏克之殺衛侯剽楊氏曰史魚之直未盡君子之道若蘧伯玉然後可免於亂世若史魚之如矢則雖欲卷而懷之有不可得也子曰可與言而不與之言失人不可與言而與之言失言知者不失人亦不失言知去聲子曰志士仁人無求生以害仁有殺身以成仁志士有志之士仁人則成徳之人也理當死而求生則於其心有不安矣是害其心之徳也當死而死則心安而徳全矣程子曰實理得之於心自别實理者實見得是實見得非也古人有捐軀隕羽敏反命者若不實見得惡音烏能如此須是實見得生不重於義生不安於死也故有殺身以成仁者只是成就一箇是而已子貢問為仁子曰工欲善其事必先利其器居是邦也事其大夫之賢者友其士之仁者賢以事言仁以徳言夫子嘗謂子貢恱不若已者故以是告之欲其有所嚴憚切磋以成其徳也家語孔子曰吾死之後則商也日益賜也日損曽子曰何謂也子曰商也好與賢已者處賜也好與不若已者處云云程子曰子貢問為仁非問仁也故孔子告之以為仁之資而已顔淵問為邦顔子王佐之才故問治天下之道曰為邦者謙辭子曰行夏之時夏時謂以斗柄初昏建寅之月為嵗首也金氏曰此古厯也沈括云今正月斗柄指丑矣葢嵗差也但以冬為亥子丑舂為寅夘辰不必因斗建也天開於子地闢於丑人生於寅故斗柄建此三辰之月皆可以為嵗首而三代迭用之夏以寅為人正商以丑為地正周以子為天正也語録邵子皇極經世書以元統㑹十二㑹為一元一萬八百年為一㑹以㑹統運以運統世三十年為一世十二世為一運三十運為一㑹初開一萬八百年而天始開又一萬八百年而地始成又一萬八百年而人始生邵子於寅上方註一開物字葢初開未有物只是氣塞及天開些子後便有一塊查滓在其中漸漸凝結而成地初則溶軟後漸堅實今山形自髙而下便如水漾沙之勢以此知必是先有天方有地有天地交感方始生人物出來子丑寅皆天地人之始故三代建以為正夫子以寅月人可施功故從其時叢說又詳經世書戌㑹閉物而消地亥㑹消地而消天至子又生天然時以作事四字出左氏傳則歳月自當以人為紀故孔子嘗曰吾得夏時焉而說者以為謂夏小正之屬記禮運子曰我欲觀夏道是故之杞而不足徵也吾得夏時焉夏小正夏時書名今存戴徳註葢取其時之正與其令之善而於此又以告顔子也乘殷之輅輅音路亦作路商輅木輅也輅者大車之名古者以木為車而已至商而有輅之名葢始異其制也明堂位曰大輅殷輅也鄭註木輅也漢祭天乘殷之輅今謂之桑根車者是也路大也君之所在以大為號門曰路門寢曰路寢車曰路車周人飾以金玉則過侈而易去聲敗金氏曰周人尚輿一器而工聚焉者車為多一曰玉路二曰金路葢飾以全玉者不若商輅之朴素渾堅而等威已辨為質而得其中也服周之冕周冕有五祭服之冠也冠上有覆敷救反前後有旒音流黃帝以來葢已有之而制度儀等至周始備何晏註曰世本云黄帝作冕周禮弁師掌王五冕其制葢以木為幹以布衣之上𤣥下朱取天地之色阮諶三禮圖云長尺六寸廣八寸天子以下皆同前圎後方前垂四寸後垂三寸鄭云天子之衮冕十二旒鷩冕九旒毳冕七旒希冕五旒𤣥冕三旒旈各十二玉公之衮冕九旒九玉侯伯七旒七玉子男五旒五玉孤三旒三玉大夫二旒二玉士以弁庶人以冠又按叢說天子之冕旒用十二及九七五三而玉皆十二諸侯而下各隨其命數九命則九旒九玉八命則八旒八玉上可兼下下不得僣上然其為物小而加於衆體之上故雖華而不為靡雖費而不及奢夫子取之葢亦以為文而得其中也樂則韶舞取其盡善盡美放鄭聲逺佞人鄭聲淫佞人殆逺去聲放謂禁絶之鄭聲鄭國之音佞人卑諂辨給之人殆危也程子曰問政多矣惟顔淵告之以此葢三代之制皆因時損益及其久也不能無弊周衰聖人不作故孔子斟酌先王之禮立萬世常行之道𤼵此以為之兆耳由是求之則餘皆可考也張子曰禮樂治去聲下同之法也放鄭聲逺佞人法外意也一日不謹則法壞矣虞夏君臣更平聲相戒飭音勅意葢如此又曰法立而能守則徳可久業可大鄭聲佞人能使人喪去聲其所守故放逺之尹氏曰此所謂百王不易之大法孔子之作春秋葢此意也孔顔雖不得行之於時然其為治之法可得而見矣子曰人無逺慮必有近憂蘇氏曰人之所履者容足之外皆為無用之地而不可廢也故慮不在千里之外則患在几席之下矣子曰已矣乎吾未見好徳如好色者也好去聲已矣乎歎其終不得而見之也子曰臧文仲其竊位者與知栁下恵之賢而不與立也者與之與平聲竊位言不稱去聲其位而有愧於心如盜得而隂據之也栁下恵魯大夫展獲字禽食邑柳下諡曰惠古注是其人氏展名獲字禽栁下是其所食之邑名謚曰恵又淮南子展禽之家有栁樹身行恵德號曰栁下恵與立謂與之並立於朝音潮范氏曰臧文仲為政於魯若不知賢是不明也知而不舉是蔽賢也不明之罪小蔽賢之罪大故孔子以為不仁又以為竊位子曰躬自厚而薄責於人則逺怨矣逺去聲責已厚故身益修責人薄故人易去聲從所以人不得而怨之子曰不曰如之何如之何者吾未如之何也已矣如之何如之何者熟思而審處上聲之辭也不如是而妄行雖聖人亦無如之何矣子曰羣居終日言不及義好行小慧難矣哉好去聲小慧私智也言不及義則放辟僻同邪侈之心滋好行小慧則行險僥倖之機熟難矣哉者言其無以入徳而將有患害也子曰君子義以為質禮以行之孫以出之信以成之君子哉孫去聲義者制事之本故以為質榦而行之必有節文出之必以退遜成之必在誠實乃君子之道也程子曰義以為質如質榦然禮行此孫出此信成此此四句只是一事以義為本又曰敬以直内則義以方外易文言義以為質則禮以行之孫以出之信以成之子曰君子病無能焉不病人之不已知也子曰君子疾沒世而名不稱焉范氏曰君子學以為去聲已不求人知然没世而名不稱焉則無為善之實可知矣子曰君子求諸已小人求諸人謝氏曰君子無不反求諸已小人反是此君子小人所以分也楊氏曰君子雖不病人之不已知然亦疾沒世而名不稱也雖疾沒世而名不稱然所以求者亦反諸已而已小人求諸人故違道干譽無所不至三者文不相蒙而義實相足亦記言者之意子曰君子矜而不爭羣而不黨莊以持已曰矜然無乖戾之心故不爭和以處上聲衆曰羣然無阿比毗至反之意故不黨子曰君子不以言舉人不以人廢言子貢問曰有一言而可以終身行之者乎子曰其恕乎已所不欲勿施於人推已及物其施不窮故可以終身行之尹氏曰學貴於知要子貢之問可謂知要矣孔子告以求仁之方也推而極之雖聖人之無我不出乎此終身行之不亦宜乎子曰吾之於人也誰毁誰譽如有所譽者其有所試矣與平聲毁者稱人之惡而損其真譽者揚人之善而過其實夫子無是也然或有所譽者則必嘗有以試之而知其將然矣聖人善善之速而無所苟如此若其惡惡則已緩矣是以雖有以前知其惡而終無所毁也斯民也三代之所以直道而行也斯民者今此之人也三代夏商周也直道無私曲也言吾之所以無所毁譽者葢以此民即三代之時所以善其善惡其惡而無所私曲之民故我今亦不得而枉其是非之實也尹氏曰孔子之於人也豈有意於毁譽之哉其所以譽之者葢試而知其美故也斯民也三代所以直道而行豈得容私於其閒哉子曰吾猶及史之闕文也有馬者借人乘平聲之今亡亡無通矣夫夫音扶楊氏曰史闕文馬借人此二事孔子猶及見之今亡矣夫悼時之益偷也愚謂此必有為去聲而言葢雖細故而時變之大者可知矣胡氏曰此章義疑不可强上聲解子曰巧言亂徳小不忍則亂大謀巧言變亂是非聽之使人喪去聲其所守小不忍如婦人之仁匹夫之勇皆是子曰衆惡之必察焉衆好之必察焉好惡並去聲楊氏曰惟仁者能好惡人衆好惡之而不察則或蔽於私矣子曰人能𢎞道非道𢎞人𢎞廓苦郭反而大之也人外無道道外無人然人心有覺而道體無為故人能大其道道不能大其人也張子曰心能盡性人能𢎞道也性不知檢其心非道𢎞人也子曰過而不改是謂過矣過而能改則復於無過唯不改則其過遂成而將不及改矣子曰吾嘗終日不食終夜不寢以思句無益句不如學也此為去聲思而不學者言之葢勞心以必求不如遜志而自得也李氏曰夫子非思而不學者特垂語以敎人爾子曰君子謀道不謀食耕也餒在其中矣學也祿在其中失君子憂道不憂貧餒奴罪反耕所以謀食而未必得食學所以謀道而祿在其中然其學也憂不得乎道而已非為去聲憂貧之故而欲為是以得祿也尹氏曰君子治其本而不卹其末豈以自外至者為憂樂音洛哉子曰知及之仁不能守之雖得之必失之知去聲知足以知如字此理而私欲閒去聲下同之則無以有之於身矣知及之仁能守之不莊以涖之則民不敬涖臨也謂臨民也知此理而無私欲以閒之則所知者在我而不失矣然猶有不莊者葢氣習之偏或有厚於内而不嚴於外者是以民不見其可畏而慢易去聲之下句放此知及之仁能守之莊以涖之動之不以禮未善也動之動民也猶曰鼓舞而作興之云爾禮謂義理之節文愚謂學至於仁則善有諸己而大本立矣涖之不莊動之不以禮乃其氣稟學問之小疵然亦非盡善之道也故夫子歴言之使知徳愈全則責愈備不可以為小節而忽之也子曰君子不可小知而可大受也小人不可大受而可小知也此言觀人之法知我知之也受彼所受也葢君子於細事未必可觀而材徳足以任重小人雖器量去聲淺狹而未必無一長可取子曰民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也民之於水火所賴以生不可一日無其於仁也亦然但水火外物而仁在己無水火不過害人之身而不仁則失其心是仁有甚於水火而尤不可一日無者也况水火或有時而殺人仁則未嘗殺人亦何憚而不為哉李氏曰此夫子勉人為仁之語下章放上聲此子曰當仁不譲於師當仁以仁為已任也雖師亦無所遜言當勇往而必為也葢仁者人所自有而自為之非有爭也何遜之有程子曰為仁在己無所與遜若善名在外則不可不遜子曰君子貞而不諒貞正而固也諒則不擇是非而必於信子曰事君敬其事而後其食後與後獲之後同食祿也君子之仕也有官守者修其職有言責者盡其忠皆以敬吾之事而已不可先有求禄之心也子曰有敎無類人性皆善而其類有善惡之殊者氣習之染也故君子有教則人皆可以復如字於善而不當復扶又反論其類之惡矣子曰道不同不相為謀為去聲不同如善惡邪正之類子曰辭達而已矣辭取達意而止不以富麗為工師冕見反階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯見賢徧反師樂師瞽者冕名再言某在斯歴舉在坐之人以詔之師冕出子張問曰與師言之道與與平聲聖門學者於夫子之一言一動無不存心省悉井反察如此子曰然固相師之道也相去聲相助也古者瞽必有相其道如此周禮春官大師下大夫二人少師上士四人瞽矇三百人眡瞭三百人眡瞭掌大師之縣凡樂事相瞽葢聖人於此非作意而為之但盡其道而已尹氏曰聖人處上聲已為去聲人其心一致無不盡其誠故也有志於學者求聖人之心於斯亦可見矣范氏曰聖人不侮鰥寡不虐無告可見於此推之天下無一物不得其所矣季氏第十六洪氏曰此篇或以為齊論凡十四章胡氏曰疑為齊論以皆稱孔子曰且三友三樂九思等條例與上下篇不同然亦無他左驗季氏將伐顓臾顓臾國名魯附庸也春秋傳曰顓臾風姓也實司大皡與有濟之祀註云伏羲之後在泰山南武陽縣之東北魯頌曰乃命魯公俾侯于東錫之山川土田附庸項氏曰王莽封諸侯置附城則漢人葢以城解庸也庸即墉古文也不成國謂之附城猶今言支郡為屬城也冉有季路見於孔子曰季氏將有事於顓臾見賢徧反按左傳史記二子仕季氏不同時此云爾者疑子路嘗從孔子自衛反魯再仕季氏不久而復扶又反之衛也左傳定公十二年仲由為季氏宰將墮三都史記作十三年左哀十一年冉有與齊戰有功史記世家哀三年季桓子病遺言康子必召孔子其臣止之康子乃召冉求哀七年與齊戰於郎克之鐵峯曰二子仕季氏大略相去十五年然左傳史載二子事嵗月不同當以左傳為据趙氏曰魯哀公十年孔子自楚反乎衛十一年魯以幣召之乃歸子路從孔子反魯當在此時十四年小邾射來奔曰使季路要我吾無盟矣使子路子路辭則子路尚在魯也必是此年後之衛次年死於孔悝之難孔子曰求無乃爾是過與與平聲冉求為去聲季氏聚斂去聲尤用事故夫子獨責之夫顓臾昔者先王以為東蒙主且在邦域之中矣是社稷之臣也何以伐為夫音扶東蒙山名趙氏曰蒙山在泰山郡蒙隂縣西南今沂州費縣是也先王封顓㬰於此山之下使主其祭在魯地七百里之中王制孟子為三等之地公侯皆方百里伯七十里子男五十里周禮諸公方五百里諸侯方四百里諸伯方三百里諸子方二百里諸男方一百里明堂位云周公致政於成王成王封周公於曲阜地方七百里當詳之社稷猶云公家是時四分魯國季氏取其二孟孫叔孫各有其一魯自㐮公十一年初作三軍十二分其國民三家得七公得其五國民不盡屬公矣昭五年舍中軍則四分公室季氏獨取其二孟孫叔孫各得其一皆盡征之而貢于公獨附庸之國尚為公臣季氏又欲取以自益故孔子言顓臾乃先王封國則不可伐在邦域之中則不必伐是社稷之臣則非季氏所當伐也此事理之至當去聲不易之定體而一言盡其曲折如此非聖人不能也冉有曰夫子欲之吾二臣者皆不欲也夫子指季孫冉有實與去聲下同謀以夫子非之故歸咎於季氏孔子曰求周任有言曰陳力就列不能者止危而不持顛而不扶則將焉用彼相矣任平聲焉於䖍反相去聲下同周任古之良史陳布也列位也相瞽者之相也言二子不欲則當諫諌而不聽則當去也且爾言過矣虎兕出於柙龜玉毁於櫝中是誰之過與兕徐履反柙戸甲反櫝音獨與平聲兕野牛也柙檻也櫝匱也言在柙而逸在櫝而毁典守者不得辭其過明二子居其位而不去則季氏之惡己音紀不得不任其責也冉有曰今夫顓㬰固而近於費今不取後世必為子孫憂夫音扶固謂城郭完固費音祕季氏之私邑此則冉求之飾辭然亦可見其實與季氏之謀矣孔子曰求君子疾夫舎曰欲之而必為之辭夫音扶舎上聲欲之謂貪其利丘也聞有國有家者不患寡而患不均不患貧而患不安葢均無貧和無寡安無傾寡謂民少貧謂財乏均謂各得其分去聲安謂上下相安季氏之欲取顓㬰患寡與貧耳然是時季氏據國而魯君無民則不均矣君弱臣强互生嫌隙乞逆反則不安矣均則不患於貧而和和則不患於寡而安安則不相疑忌而無傾覆之患夫如是故逺人不服則修文徳以來之既來之則安之夫音扶内治去聲修然後逺人服有不服則修徳以來之亦不當勤兵於逺今由與求也相夫子逺人不服而不能來也邦分崩離析而不能守也子路雖不與謀而素不能輔之以義亦不得為無罪故并責之逺人謂顓㬰分崩離析謂四分公室家臣屢叛左定五年陽虎囚季桓子八年季寤公鉏極公山不狃皆不得志於季氏叔孫輒無寵於叔孫氏叔仲志不得志於魯故五人囚陽虎陽虎欲去三桓以季寤代季氏以叔孫輒更叔孫氏已更孟氏十月虎刼公於武叔以伐孟氏公斂處父帥成人自上東門入與楊氏戰楊氏敗楊虎脫甲如公宫取寶玉大弓以出入于讙陽關以叛而謀動干戈於邦内吾恐季孫之憂不在顓㬰而在蕭牆之内也干楯也楯垂尹反正作盾戈㦸也蕭牆屏音丙也語錄問蕭牆曰據鄭註云諸侯至屏内當有肅敬之意未如是否鄭氏曰蕭肅也牆謂屏也臣之見君至屏而加肅故曰蕭牆言不均不和内變將作其後哀公果欲以越伐魯而去上聲季氏左哀二十七年公患三桓之侈也欲以諸侯去之三桓亦患公之妄也故君臣多間公欲以越伐魯而去三桓秋八月公如公孫有陘氏因孫于邾乃遂如越謝氏曰當是時三家强公室弱冉求又欲伐顓㬰以附益之夫子所以深罪之為去聲其瘠魯以肥三家也洪氏曰二子仕於季氏凡季氏所欲為必以告於夫子則因夫子之言而救止者宜亦多矣伐顓㬰之事不見於經傳去聲其以夫子之言而止也與孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出葢十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣先王之制諸侯不得變禮樂専征伐禮記王制變禮易樂者為不從不從者君流放也革制度衣服者為畔畔者君討誅也有功徳於民者加地進律諸侯賜弓矢然後征賜鉄鉞然後殺陪臣家臣也逆理愈甚則其失之愈速大約世數不過如此天下有道則政不在大夫言不得専政天下有道則庶人不議上無失政則下無私議非箝其廉反其口使不敢言也此章通論天下之勢孔子曰祿之去公室五世矣政逮於大夫四世矣故夫三桓之子孫㣲矣夫音扶魯自文公薨公子遂殺子赤立宣公而君失其政箋見第六篇倪氏曰春秋是年書冬十月子卒左氏以為惡公羊以為赤集註曰子赤本公羊傳也厯成㐮昭定凡五公逮反也自季武子始専國政厯悼平桓子凡四世而為家臣陽虎所執見前章家臣屢叛下三桓三家皆桓公之後箋見第三篇此以前章之說推之而知其當然也此章専論魯事疑與前章皆定公時語蘇氏曰禮樂征伐自諸侯出宜諸侯之强也而魯以失政政逮於大夫宜大夫之强也而三桓以㣲何也强生於安安生於上下之分扶問反定今諸侯大夫皆陵其上則無以令其下矣故皆不久而失之也孔子曰益者三友損者三友友直友諒友多聞益矣友便辟友善柔友便佞損矣便平聲辟婢亦反友直則聞其過友諒則進於誠友多聞則進於明便習熟也便辟謂習於威儀而不直善柔謂工於媚恱而不諒便佞謂習於口語而無聞見之實三者損益正相反也尹氏曰自天子以至於庶人未有不須友以成者而其損益有如是者可不謹哉孔子曰益者三樂損者三樂樂節禮樂樂道人之善樂多賢友益矣樂驕樂樂佚遊樂宴樂損矣樂五教反禮樂之樂音岳驕樂宴樂之樂音洛節謂辨其制度聲容之節驕樂則侈肆而不知節佚遊則惰慢而惡烏故反聞善宴樂則淫溺而狎小人三者損益亦相反也尹氏曰君子之於好樂並去聲可不謹哉孔子曰侍於君子有三愆言未及之而言謂之躁音竈言及之而不言謂之隠未見顔色而言謂之瞽君子有徳位之通稱愆過也瞽無目不能察言觀色尹氏曰時然後言則無三者之過矣孔子曰君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在鬭及其老也血氣既衰戒之在得血氣形之所待以生者血隂而氣陽也得貪得也隨時知戒以理勝之則不為血氣所使也范氏曰聖人同於人者血氣也異於人者志氣也血氣有時而衰志氣則無時而衰也少未定壯而剛老而衰者血氣也戒於色戒於鬬戒於得者志氣也君子養其志氣故不為血氣所動是以年彌髙而徳彌邵也此句出揚子法言孔子曰君子有三畏畏天命畏大人畏聖人之言畏者嚴憚之意也天命者天所賦之正理也知其可畏則其戒謹恐懼自有不能己者而付畀之重可以不失矣大人聖言皆天命所當畏知畏天命則不得不畏之矣小人不知天命而不畏也狎大人侮聖人之言侮戲玩也不知天命故不識義理而無所忌憚如此尹氏曰三畏者修己之誠當然也小人不務修身誠己則何畏之有孔子曰生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣困謂有所不通言人之氣質不同大約有此四等楊氏曰生知學知以至困學雖其質不同然及其知之一也故君子惟學之為貴困而不學然後為下孔子曰君子有九思視思明聽思聰色思温貌思恭言思忠事思敬疑思問忿思難見得思義難去聲視無所蔽則明無不見聽無所壅音擁則聰無不聞色見形甸反於面者貌舉身而言思問則疑不蓄思難則忿必懲思義則得不苟程子曰九思各専其一謝氏曰未至於從七恭反容中道無時而不自省悉井反察也雖有不存焉者寡矣此之謂思誠孔子曰見善如不及見不善如探湯吾見其人矣吾聞其語矣探吐南反真知善惡而誠好惡並去聲之顔曽閔冉之徒葢能之矣語葢古語也隠居以求其志行義以達其道吾聞其語矣未見其人也求其志守其所達之道也達其道行其所求之志也葢惟伊尹太公之流可以當之當時若顔子亦庶乎此然隱而未見形甸反又不幸而蚤死故夫子云然齊景公有馬千駟死之日民無徳而稱焉伯夷叔齊餓于首陽之下民到于今稱之駟四馬也一車之用兩服兩驂晏子春秋齊景公好馬疑公以好馬故致多如此首陽山名胡氏曰在河束蒲坂縣其斯之謂與與平聲胡氏曰程子以為第十二篇錯簡誠不以富亦祇以異當在此章之首今詳文勢似當在此句之上言人之所稱不在於富而在於異也愚謂此說近是而章首當有孔子曰字葢闕文耳大抵此書後十篇多闕誤陳亢問於伯魚曰子亦有異聞乎亢音剛亢以私意窺聖人疑必隂厚其子對曰未也嘗獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩事理通達而心氣和平故能言他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮品節詳明而徳性堅定故能立聞斯二者當獨立之時所聞不過如此其無異聞可知陳亢退而喜曰問一得三聞詩聞禮又聞君子之逺其子也逺去聲尹氏曰孔子之敎其子無異於門人故陳亢以為逺其子邦君之妻君稱之曰夫人夫人自稱曰小童邦人稱之曰君夫人稱諸異邦曰寡小君異邦人稱之亦曰君夫人寡寡徳謙辭王文憲曰天地之閒男貴女賤女子貴者方得比於男子故夫人自稱小童比於小男子也大夫之妻曰孺人亦比小男子也公侯之妻曰夫人則比男子矣至為天子之妻始曰后則在男之上而比於繼體之君矣吳氏曰凡語中所載如此類者不知何謂或古有之或夫子嘗言之不可考也論語纂箋卷八
