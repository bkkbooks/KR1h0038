body:
  text: 欽定四庫全書孟子纂箋卷十四元詹道傳撰盡心章句下凡三十八章孟子曰不仁哉梁惠王也仁者以其所愛及其所不愛不仁者以其所不愛及其所愛親親而仁民仁民而愛物所謂以其所愛及其所不愛也公孫丑曰何謂也梁惠王以土地之故糜爛其民而戰之大敗將復之恐不能勝故驅其所愛子弟以殉之是之謂以其所不愛及其所愛也梁惠王以下孟子答辭也糜爛其民使之戰鬭糜爛其血肉也復扶又反之復戰也子弟謂太子申也箋見前篇以土地之故及其民以民之故及其子皆以其所不愛及其所愛也此承前篇之末三章之意言仁人之恩自內及外不仁之禍由疏與疏同逮親孟子曰春秋無義戰彼善於此則有之矣春秋每書諸侯戰伐之事必加譏貶以著其擅時戰反興之罪無有以為合於義而許之者但就中彼善於此者則有之如召音邵陵之師之類是也春秋僖四年齊侯伐楚楚屈完來盟于師盟于召陵公羊傳盟子召陵喜服楚也胡傳序桓績也楊子亦曰春秋美召陵征者上伐下也敵國不相征也征所以正人也諸侯有罪則天子討而正之此春秋所以無義戰也孟子曰盡信書則不如無書程子曰載事之辭容有重稱而過其實者學者當識其義而已苟執於辭則時或有害於義不如無書之愈也吾於武成取二三策而已矣武成周書篇名武王伐紂歸而記事之書也策竹簡也取其二三策之言其餘不可盡信也程子曰取其奉天伐暴之意反政施仁之法而已仁人無敵於天下以至仁伐至不仁而何其血之流杵也杵舂杵也或作鹵與櫓同音魯楯也楯豎尹反兵器所以蔽身者武成言武王伐紂紂之前徒倒戈攻于後以北血流漂杵孟子言此則其不可信者然書本意乃謂商人自相殺非謂武王殺之也孟子之設是言懼後世之惑且長上聲不仁之心耳孟子曰有人曰我善為陳我善為戰大罪也陳去聲制行者杭伍曰陳交兵曰戰國君好仁天下無敵焉南面而征北狄怨東面而征西夷怨曰奚為後我好去聲此引湯之事以明之解見前篇武王之伐殷也革車三百兩虎賁三千人兩去聲賁音奔又以武王之事明之也兩車數一車兩如字輪也千書序作百按出車之法一車甲士三人在車上步卒七十二人隨之則三百兩計二萬二千五百人孔安國云虎賁勇士皆百夫長也王曰無畏寧爾也非敵百姓也若崩厥角稽首書泰誓文與此小異孟子之意當云王謂商人曰無畏我也我來伐紂本為去聲安寧汝非敵商之百姓也於是商人稽首至地如角之崩也征之為言正也各欲正己也焉用戰焉於虔反民為暴君所虐皆欲仁者來正己之國也孟子曰梓匠輪輿能與人規矩不能使人巧尹氏曰規矩法度可告者也巧則在其人雖大匠亦末如之何也已蓋下學可以言傳上達必由心悟莊周所論斫輪之意蓋如此莊子天道篇桓公讀書於堂上輪扁斫輪於堂下釋椎鑿而上問桓公曰敢問公之所讀者何言邪公曰聖人之言也曰聖人在乎公曰已死矣曰然則君之所讀者古人之糟魄普各反己夫桓公曰寡人讀書輪人安得議乎有説則可無説則死輪扁曰臣也以臣之事觀之斫輪徐則目而不固疾則苦而不入不徐不疾得之於手而應之於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斫輪古之人與其不可傳也死矣然則君子所讀者古人之糟魄己夫孟子曰舜之飯糗茹草也若將終身焉及其為天子也被袗衣鼓琴二女果若固有之飯上聲糗去久反茹音汝袗之忍反果説又作婐烏果反飯食也糗乾音干糒音備也茹亦食也袗畫俗作畫衣也二女堯二女也果女侍也語録趙氏以果為侍廣韻從女從果者亦曰侍言聖人之心不以貧賤而有慕於外不以富貴而有動於中隨遇而安無預於己所性分去聲定故也孟子曰吾今而後知殺人親之重也殺人之父人亦殺其父殺人之兄人亦殺其兄然則非自殺之也一間耳間去聲言吾今而後知者必有所為去聲而感發也一間者我往彼來間一人耳其實與自害其親無異也范氏曰知此則愛敬人之親人亦愛敬其親矣孟子曰古之為關也將以禦暴譏察非常今之為關也將以為暴征稅出入范氏曰古之耕者什一後世或收大半之稅此以賦斂力驗反為暴也文王之囿與民同之齊宣王之囿為阱國中此以園囿為暴也後世為暴不止於關若使孟子用於諸侯必行文王之政凡此之類皆不終日而改也孟子曰身不行道不行於妻子使人不以道不能行於妻子身不行道者以行去聲言之不行者道不行也使人不以道者以事言之不能行者令不行也孟子曰周于利者凶年不能殺周于德者邪世不能亂周足也言積之厚則用有餘孟子曰好名之人能讓千乘之國苟非其人簞食豆羮見於色好乘食皆去聲見音現好名之人矯情干譽是以能讓千乘之國然若本非能輕富貴之人則於得失之小者反不覺其真情之發見矣蓋觀人不於其所勉而於其所忽然後可以見其所安之實也孟子曰不信仁賢則國空虛空虛言若無人然無禮義則上下亂禮義所以辨上下定民志無政事則財用不足生之無道取之無度用之無節故也尹氏曰三者以仁賢為本無仁賢則禮義政事處上聲之皆不以其道矣孟子曰不仁而得國者有之矣不仁而得天下未之有也言不仁之人騁丑井反其私智可以盜千乘之國而不可以得丘民之心鄒氏曰自秦以來不仁而得天下者有矣然皆一再傳而失之猶不得也所謂得天下者必如三代而後可孟子曰民為貴社稷次之君為輕社土神稷榖神建國則立壇壝以水反又維季反以祀之周禮大司徒設其社稷之壝各以其野之所宜木名其社與其野封人掌設王之社壝為幾封而樹之聚土曰封壝謂壇及堳埓也白虎通曰天子社壇方五丈取五方五色土封之諸侯半之各以其所守之方一色士封之皆冒以黃土周禮圖社稷壇相並社壇在東稷壇在西各三級壝在四隅如矩曲方蓋國以民為本社稷亦為去聲民而立而君之尊又係於二者之存亡故其輕重如此是故得乎丘民而為天子得乎天子為諸侯得乎諸侯為大夫丘民田野之民趙岐注丘十六井也天下丘民皆樂其政則為天子至微賤也然得其心則天下歸之天子至尊貴也而得其心者不過為諸侯耳是民為重也諸侯危社稷則變置諸侯無道將使社稷為人所滅則當更平聲立賢君是君輕於社稷也犧牲既成粢盛既潔祭祀以時然而旱乾水溢則變置社稷盛音成祭祀不失禮而土榖之神不能為去聲民禦災捍音汗患則毁其壇壝而更平聲置之亦年不順成八蠟助駕反不通之意記郊特牲天子大蠟八伊耆氏始為蠟蠟也者索音色也嵗十二月合聚萬物而索饗之也蠟有八者先嗇一也若神農也司嗇二也后稷是也農三也若田畯也郵表畷四也郵表畷謂田畯之官督約百姓於井閭之處貓虎五也迎貓為其食田鼠也迎虎為其食田豕也迎其神而祭之也坊六也水庸七也坊與水庸土反其宅水歸其壑也昆蟲八也昆蟲暑生寒死螟螽之屬為害者也八蠟以記四方四方年不順成八蠟不通謂不缺孟子曰聖人百世之師也伯夷栁下惠是也故聞伯夷之風者頑夫廉懦夫有立志聞栁下惠之風者薄夫敦鄙夫寬奮乎百世之上句百世之下聞者莫不興起也非聖人而能若是乎而況於親炙之者乎興起感動奮發也親炙親近而熏炙之也餘見前篇孟子曰仁也者人也合而言之道也仁者人之所以為人之理也然仁理也人物也以仁之理合於人之身而言之乃所謂道者也程子曰中庸所謂率性之謂道是也或曰外國本人也之下有義也者宜也禮也者履也智也者知也信也者實也凡二十字今按如此則理極分明然未詳其是否也外國本舊傳高麗有寫本如此禮記祭義云仁者仁此者也禮者履此者也義者宜此者也信者信此者也以此文證之外國本或是孟子曰孔子之去魯曰遲遲吾行也去父母國之道也去齊接淅而行去他國之道也重平聲出孟子曰君子之厄於陳蔡之間無上下之交也君子孔子也厄與厄同君臣皆惡無所與交也貉稽曰稽大不理於口貉音陌趙氏曰貉姓稽名為衆口所訕所晏反理賴也今按漢書無俚音里方言亦訓賴前漢季布贊賢者誠重其死夫婢妾賤人感槩而自殺非能勇也其盡無俚之至耳晉灼曰楊雄方言曰俚聊也許慎曰賴也孟子曰無傷也士憎兹多口趙氏曰為士者益多為衆口所訕按此則憎當從土今本皆從心蓋傳寫之誤詩云憂心悄悄愠于羣小孔子也肆不殄厥愠亦不隕厥問文王也詩邶蒲昧反風柏舟及大雅綿之篇也悄悄憂貌愠怒也本言衛之仁人見怒於羣小孟子以為孔子之事可以當之肆發語辭隕墜也問聲問也本言太王事昆夷雖不能殄絶其愠怒亦不自墜其聲問之美孟子以為文王之事可以當之尹氏曰言人顧自處如何盡其在我者而已孟子曰賢者以其昭昭使人昭昭今以其昏昏使人昭昭昭昭明也昏昏暗與暗同也尹氏曰大學之道在自昭明德而施於天下國家其有不順者寡矣孟子謂高子曰山徑之蹊間句介然用之而成路句為間不用則茅塞之矣今茅塞子之心矣介音戛徑小路也蹊人行處也介然倐然之頃也用由也路大路也為間少頃也茅塞茅草生而塞之也言理義之心不可少有間去聲斷徒玩反也高子曰禹之聲尚文王之聲尚髙尚也豐氏曰言禹之樂過於文王之樂孟子曰何以言之曰以追蠡追音堆蠡音禮豐氏曰追鍾紐女九反也周禮所謂旋蟲是也趙氏曰按周禮考工記鍾縣平聲謂之旋旋蟲謂之幹蓋懸鍾之紐也其形如環環有盤旋之義於旋之上為蟲形以飾之自漢以來鍾旋之上以銅篆作蹲熊及盤龍諸獸狀名辟邪皆旋蟲之類也蠡者齧木蟲也言禹時鍾在者鍾紐如蟲齧而欲絶蓋用之者多而文王之鍾不然是以知禹之樂過於文王之樂也曰是奚足哉城門之軌兩馬之力與與平聲豐氏曰奚足言此何足以知之也軌車轍迹也兩馬一車所駕也車之駕馬其數不同中兩馬謂之服服旁兩馬謂之驂夫子脫驂即此也古者為大夫方許駕四馬天子用六馬驂旁兩馬謂之騑城中之塗與途通容九軌周禮冬官下匠人營國方九里旁三門國中九經九緯經塗九軌國中城內也經緯謂塗也經緯之塗皆容方九軌凡八尺為軌廣九軌積七十二尺則此塗十二步也車可散行故其轍迹淺城門惟容一車車皆由之故其轍迹深蓋日久車多所致非一車兩馬之力能使之然也言禹在文王前千餘年故鍾久而紐絶文王之鍾則未久而紐全不可以此而議優劣也此章文義本不可曉舊説相承如此而豐氏差明白故今存之亦未知其是否也齊飢陳臻曰國人皆以夫子將復為發棠殆不可復復扶又反先時齊國嘗飢孟子勸王發棠邑之倉以賑貧窮至此又飢陳臻問言齊人望孟子復勸王發棠而又自言恐其不可也孟子曰是為馮婦也晉人有馮婦者善搏虎卒為善士則之野有衆逐虎虎負嵎莫之敢攖望見馮婦趨而迎之馮婦攘臂下車衆皆悅之其為士者笑之手執曰搏卒為善士後能改行去聲為善也之適也負依也山曲曰嵎攖觸也笑之笑其不知止也疑此時齊王已不能用孟子而孟子亦將去矣故其言如此趙岐注馮姓婦名也孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四肢之於安佚也性也有命焉君子不謂性也程子曰五者之欲性也然有分去聲不能皆如其願則是命也不可謂我性之所有而求必得之也愚按不能皆如其願不止為貧賤蓋雖富貴之極亦有品節限制則是亦有命也仁之於父子也義之於君臣也禮之於賔主也智之於賢者也聖人之於天道也命也有性焉君子不謂命也程子曰仁義禮智天道在人則賦於命者所稟有厚薄清濁然而性善可學而盡故不謂之命也張子曰晏嬰智矣而不知仲尼是非命邪史記孔子適齊景公欲以尼溪之田封孔子晏嬰進曰孔子盛容飾繁登降之禮趨詳之節纍世不能殫其學當年不能究其禮君欲用之以移齊俗非所以先細民也愚按所稟者厚而清則其仁之於父子也至義之於君臣也盡禮之於賔主也恭智之於賢否也哲聖人之於天道也無不吻武粉反一音泯合而純亦不已焉薄而濁則反是是皆所謂命也或曰者當作否人衍字更詳之愚聞之師曰此二條者皆性之所有而命於天者也然世之人以前五者為性雖有不得而必欲求之以後五者為命一有不至則不復扶又反致力故孟子各就其重處言之以伸此而抑彼也張子所謂養則付命於天道則責成於己其言約而盡矣浩生不害問曰樂正子何人也孟子曰善人也信人也趙氏曰浩生姓不害名齊人也何謂善何謂信不害問也曰可欲之為善天下之理其善者必可欲其惡者必可惡去聲下同其為人也可欲而不可惡則可謂善人矣有諸已之謂信凡所謂善皆實有之如惡去聲惡臭如好去聲好色是則可謂信人矣張子曰志仁無惡之謂善誠善於身之謂信充實之謂美力行其善至於充滿而積實則美在其中而無待於外矣充實而有光輝之謂大和順積中而英華發外引記樂記語美在其中而暢於四支發於事業引易坤對文言則德業至盛而不可加矣大而化之之謂聖大而能化使其大者泯然無復扶又反可見之迹則不思不勉從七容反容中去聲道而非人力之所能為矣張子曰大可為也化不可為也在熟之而已矣聖而不可知之之謂神程子曰聖不可知謂聖之至妙人所不能測非聖人之上又有一等神人也樂正子二之中四之下也蓋在善信之間觀其從於子敖則其有諸己者或未實也張子曰顔淵樂正子皆知好去聲下同仁矣樂正子志仁無惡而不致於學所以但為善人信人而已顔子好學不倦合仁與智具體聖人獨未至聖人之止耳程子曰士之所難者在有諸己而已能有諸己則居之安資之深而美且大可以馴音旬致矣徒知可欲之善而若存若亡而已則能不受變於俗者鮮上聲矣尹氏曰自可欲之善至於聖而不可知之神上下一理擴充而至於神則不可得而名矣孟子曰逃墨必歸於楊逃楊必歸於儒歸斯受之而已矣墨氏務外而不情楊氏太簡而近實故其反正之漸大略如此歸斯受之者憫其陷溺之久而取其悔悟之新也今之與楊墨辨者如追放豚既入其苙又從而招之放豚放逸之豕豚也苙闌也招罥扃縣反也羇其足也言彼既來歸而又追咎其既往之失也此章見聖賢之於異端距之甚嚴而於其來歸待之甚恕距之嚴故人知彼説之為邪待之恕故人知此道之可反仁之至義之盡也孟子曰有布縷之征粟米之征力役之征君子用其一緩其二用其二而民有殍用其三而父子離征賦之法嵗有常數然布縷取之於夏粟米取之於秋力役取之於冬按記月令孟夏蠶事畢后妃獻繭乃收繭稅故民間之布縷必取於夏孟秋之月農乃登縠仲秋乃令有司趣民收斂季秋乃命冢宰農事備收舉五榖之要注云定其租稅之簿故粟米取之於秋古者三時不害於農豳詩云我稼既同上入執公宫故力役取之於冬又按周禮小司徒凡起徒役無過家一人若田獵追寇賊則盡行又豐年則公用三日中年則二日無年則一日而已凶札則不用之當各以時若并去聲取之則民力有所不堪矣今兩稅三限之法亦此意也近思録晦翁云有田者納米有地者納絹此兩稅也絹取於夏米取於秋不足者又寬之以冬此三限也尹氏曰言民為邦本取之無度則其國危矣孟子曰諸侯之寶三土地人民政事寶珠玉者殃必及身尹氏曰言寶得其寶者安寶失其寶者危盆成括仕於齊孟子曰死矣盆成括盆成括見殺門人問曰夫子何以知其將見殺曰其為人也小有才未聞君子之大道也則足以殺其軀而已矣盆成姓括名也恃才妄作所以取禍徐氏曰君子道其常而已括有死之道焉設使幸而獲免孟子之言猶信也孟子之滕館於上宫有業屨於牗上館人求之弗得館舍也上宫别宫名業屨織之有次業而未成者蓋館人所作置之牗上而失之也或問之曰若是乎從者之廋也曰子以是為竊屨來與曰殆非也夫子之設科也往者不追來者不拒苟以是心至斯受之而已矣從為去聲與平聲夫子如字舊讀為扶余者非或問之者問於孟子也廋與叟同匿也言子之從者乃匿人之物如此乎孟子答之而或人自悟其失因言此從者固不為去聲竊屨而來但夫子設置科條以待學者苟以向道之心而來則受之耳雖夫子亦不能保其往也門人取其言有合於聖賢之指故記之孟子曰人皆有所不忍達之於其所忍仁也人皆有所不為達之於其所為義也惻隱羞惡之心人皆有之故莫不有所不忍不為此仁義之端也然以氣質之偏物欲之蔽則於他事或有不能者但推所能達之於所不能則無非仁義矣人能充無欲害人之心而仁不可勝用也人能充無穿踰之心而義不可勝用也勝平聲充滿也穿穿穴踰踰牆皆為盜之事也能推所不忍以達於所忍則能滿其無欲害人之心而無不仁矣能推其所不為以達於所為則能滿其無穿踰之心而無不義矣人能充無受爾汝之實無所往而不為義也此申説上文充無穿窬之心之意也蓋爾汝人所輕賤之稱人雖或有所貪昧隱忍而甘受之者然其中心必有慚忿而不肯受之之實人能即此而推之使其充滿無所虧缺則無適而非義矣士未可以言而言是以言餂之也可以言而不言是以不言餂之也是皆穿踰之類也餂音忝餂探取之也今人以舌取物曰餂即此意也便平聲佞隱默皆有意探取於人是亦穿踰之類然其事隱微人所忽易去聲故特舉以見例明必推無穿踰之心以達於此而悉去上聲之然後為能充其無穿踰之心也孟子曰言近而指逺者善言也守約而施博者善道也君子之言也不下帶而道存焉施去聲古人視不下於帶記曲禮下天子視不上於祫音劫不下於帶凡視上於面則傲下於帶則憂傾則姦則帶之上乃目前常見至近之處也舉目前之近事而至理存焉所以為言近而指逺也君子之守修其身而天下平此所謂守約而施博也人病舍其田而藝人之田所求於人者重而所以自任者輕舍音捨此言不守約而務博施之病孟子曰堯舜性者也湯武反之也性者得全於天無所汚壞不假修為聖之至也反之者修為以復其性而至於聖人也程子曰性之反之古未有此語蓋自孟子發之吕氏曰無意而安行性也有意利行而至於無意復性者也堯舜不失其性湯武善反其性及其成功則一也動容周旋中禮者盛德之至也哭死而哀非為生者也經德不回非以干祿也言語必信非以正行也中為行並去聲細微曲折無不中禮乃其盛德之至自然而中而非有意於中也經常也回曲也三者亦皆自然而然非有意而為之也皆聖人之事性之之德也君子行法以俟命而已矣法者天理之當然者也君子行之而吉凶禍福有所不計蓋雖未至於自然而已非有所為去聲而為矣此反之之事董子所謂正其義不謀其利明其道不計其功見史記本傳江都王好勇嘗謂仲舒曰孔子稱殷有三仁粵句踐范蠡大夫種謀伐吳遂滅之寡人以為粵有三仁對曰粵本無一仁夫仁者云云正此意也程子曰動容周旋中禮者盛德之至行法以俟命者朝聞道夕死可矣之意也呂氏曰法由此立命由此出聖人也行法以俟命君子也聖人性之君子所以復其性也孟子曰説大人則藐之勿視其巍巍然説音稅藐音眇趙氏曰大人當時尊貴者也藐輕之也巍巍富貴高顯之貌藐焉而不畏之則志意舒展言語得盡也堂高數仞榱題數尺我得志弗為也食前方丈侍妾數百人我得志弗為也般樂飲酒驅騁田獵後車千乘我得志弗為也在彼者皆我所不為也在我者皆古之制也吾何畏彼哉榱楚危反般音盤樂音洛乘去聲榱桷也題頭也食前方丈饌食列於前者方一丈也此皆其所謂巍巍然者我雖得志有所不為而所守者皆古聖賢之法則彼之巍巍者何足道哉楊氏曰孟子此章以已之長方人之短猶有此等氣象在孔子則無此矣孟子曰養心莫善於寡欲其為人也寡欲雖有不存焉者寡矣其為人也多欲雖有存焉者寡矣欲如口鼻耳目四支之欲雖人之所不能無然多而不節未有不失其本心者學者所當深戒也程子曰所欲不必沈溺只有所向便是欲曾晳嗜羊棗而曾子不忍食羊棗羊棗實小黑而圓又謂之羊矢棗爾雅羊棗俗呼為羊矢棗又名遵曾子以父嗜之父沒之後食必思親故不忍食也公孫丑問曰膾炙與羊棗孰美孟子曰膾炙哉公孫丑曰然則曾子何為食膾炙而不食羊棗曰膾炙所同也羊棗所獨也諱名不諱姓姓所同也名所獨也肉聶而切之為膾聶之涉反箋見論語鄉黨篇炙之夜反炙音隻肉也萬章問曰孔子在陳曰盍歸乎來吾黨之士狂簡進取不忘其初孔子在陳何思魯之狂士盍何不也狂簡謂志大而略於事進取謂求望髙逺不忘其初謂不能改其舊也此語與論語小異孟子曰孔子不得中道而與之必也狂狷乎狂者進取狷者有所不為也孔子豈不欲中道哉不可必得故思其次也狷音絹不得中道至有所不為據論語亦孔子之言然則孔子字下嘗有曰字論語道作行狷作狷有所不為者知恥自好去聲不為不善之人也孔子豈不欲中道以下孟子言也敢問何如斯可謂狂矣萬章問曰如琴張曾晳牧皮者孔子之所謂狂矣琴張名牢字子張子桑戶死琴張臨其喪而歌事見莊子莊子太宗師篇子桑户孟子反子琴張相與為友子桑戶死孔子使子貢往待事焉或編曲或鼓琴相和而歌曰嗟來桑户乎嗟來桑户乎而已反其真而我猶為人猗子貢趨而進曰敢問臨喪而歌禮乎二人相視而笑曰是惡知禮意雖未必盡然要必有近似者曾晳見前篇季武子死曽晳倚其門而歌事見檀弓記檀弓下季武子寢疾及其喪也曽點倚門而歌又言志異乎三子者之撰事見論語牧皮未詳何以謂之狂也萬章問曰其志嘐嘐然曰古之人古之人夷考其行而不掩焉者也嘐火交反行去聲嘐嘐志大言大也重平聲言古之人見其動輒稱之不一稱而已也夷平也掩覆敷救反也言平考其行則不能覆其言也程子曰曾晳言志而夫子與之蓋與聖人之志同便是堯舜氣象也特行有不掩焉耳此所謂狂也狂者又不可得欲得不屑不潔之士而與之是狷也是又其次也此因上文所引遂解所以思得狷者之意狂有志者也狷有守者也有志者能進於道有守者不失其身屑潔也孔子曰過我門而不入我室我不憾焉者其惟鄉原乎鄉原德之賊也曰何如斯可謂之鄉原矣鄉原非有識者原與願同荀子原慤克角反字皆讀作願謂謹願之人也荀子榮辱篇孝悌原慤以敦比其事業又見富國及正論等篇故鄉里所謂願人謂之鄉原孔子以其似德而非德故以為德之賊過門不入而不恨之以其不見親就為幸深惡去聲而痛絶之也萬章又引孔子之言而問也曰何以是嘐嘐也言不顧行行不顧言則曰古之人古之人行何為踽踽涼涼生斯世也為斯世也善斯可矣閹然媚於世也者是鄉原也行去聲踽其禹反閹音奄踽踽獨行不進之貌涼涼薄也不見親厚於人也鄉原譏狂者曰何用如此嘐嘐然行不掩其言而徒每事必稱古人邪又譏狷者曰何必如此踽踽涼涼無所親厚哉人既生於此世則但當為此世之人使當世之人皆以為善則可矣此鄉原之志也閹如奄人之奄閉藏之意也周禮春官守祧奄八人奄如今之宦者媚求悅於人也孟子言此深自閉藏以求親媚於世是鄉原之行去聲也萬章曰一鄉皆稱原人焉無所往而不為原人孔子以為德之賊何哉原亦謹厚之稱而孔子以為德之賊故萬章疑之曰非之無舉也刺之無刺也同乎流俗合乎汙世居之似忠信行之似廉潔衆皆悅之自以為是而不可與入堯舜之道故曰德之賊也呂侍講曰言此等之人欲非之則無可舉欲刺之則無可刺也流俗者風俗頽徒回反靡如水之下流衆莫不然也汙濁也非忠信而似忠信非廉潔而似廉潔孔子曰惡似而非者惡莠恐其亂苗也惡佞恐其亂義也惡利口恐其亂信也惡鄭聲恐其亂樂也惡紫恐其亂朱也惡鄉原恐其亂德也惡去聲莠音有孟子又引孔子之言以明之莠似苗之草也佞才智之稱其言似義而非義也利口多言而不實者也鄭聲淫樂也樂正樂也紫間去聲色朱正色也鄉原不狂不狷人皆以為善有似乎中道而實非也故恐其亂德君子反經而已矣經正則庶民興庶民興斯無邪慝矣反復也經常也萬世不易之常道也興興起於善也邪慝如鄉原之屬是也世衰道微大經不正故人人得為異説以濟其私而邪慝並起不可勝去聲正君子於此亦復其常道而已常道既復則民興於善而是非明白無所回互雖有邪慝不足以惑之矣尹氏曰君子取夫音扶狂狷者蓋以狂者志大而可與進道狷者有所不為而可與有為也所惡去聲於鄉原而欲痛絶之者為去聲其似是而非惑人之深也絶之之術無他焉亦曰反經而已矣孟子曰由堯舜至於湯五百有餘嵗若禹臯陶音遙則見而知之若湯則聞而知之趙氏曰五百嵗而聖人出天道之常然亦有遲速不能正五百年故言有餘也尹氏曰知謂知其道也由湯至於文王五百有餘嵗若伊尹萊朱則見而知之若文王則聞而知之趙氏曰萊朱湯賢臣或曰即仲虺許偉反也為湯左相去聲由文王至於孔子五百有餘嵗若太公望散冝生則見而知之若孔子則聞而知之散素亶反散氏冝生名文王賢臣也子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學此所謂聞而知之也由孔子而來至於今百有餘嵗去聖人之世若此其未逺也近聖人之居若此其甚也然而無有乎爾則亦無有乎爾林氏曰孟子言孔子至今時未逺孟子之生雖不可知然哀十六年孔子卒又十年而悼公立凡四十年元公二十一年穆公三十三年共公二十二年康公九年景公二十九年共一百六十四年而魯平公繼立由孔子而來至於今百有餘嵗則孟子必生於穆共之間以梁惠王見之而稱叟則其年先後可槩見矣鄒魯相去又近然而已無有見而知之者矣則五百餘嵗之後又豈復扶又反下同有聞而知之者乎愚按此言雖若不敢自謂已得其傳而憂後世遂失其傳然乃所以自見其有不得辭者而又以見夫音扶下同天理民彝不可泯滅百世之下必將有神會而心得之者耳故於篇終歷序羣聖之統而終之以此所以明其傳之有在而又以俟後聖於無窮也其指深哉有宋元豐八年河南程皓伯淳卒潞公文彥博題其墓曰明道先生而其弟頤正叔序之曰周公沒聖人之道不行孟軻死聖人之學不傳道不行百世無善治去聲學不傳千載無真儒無善治士猶得以明夫善治之道以淑諸人以傳諸後無真儒則天下貿貿焉莫知所之人欲肆而天理滅矣先生生乎千四百年之後得不傳之學於遺經以興起斯文為己任辨異端闢邪説使聖人之道煥然復明於世蓋自孟子之後一人而已然學者於道不知所向則孰知斯人之為功不知所至則孰知斯名之稱去聲情也哉孟子纂箋卷十四
