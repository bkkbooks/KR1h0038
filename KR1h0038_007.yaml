body:
  text: 欽定四庫全書論語纂箋卷三元詹道傳撰公冶長第五此篇皆論古今人物賢否得失盖格物窮理之一端也凡二十七章胡氏以為疑多子貢之徒所記云子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之妻去聲下同縲力追反絏息列反公治長孔子弟子弟子傳名萇字子長齊人家語魯人妻為之妻如字也縲黒索也絏攣間縁反也古者獄中以黒索拘攣罪人長之為人無所考而夫子稱其可妻其必有以取之矣又言其人雖嘗䧟於縲絏之中而非其罪則固無害於可妻也夫音扶有罪無罪在我而已豈以自外至者為榮辱哉子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之南容孔子弟子居南宫名縚音滔又名适字子容諡神至反敬叔孟懿子之兄也魯人不廢言必見用也以其謹於言行去聲故能見用於治去聲朝音潮免禍於亂世也事又見第十一篇或曰公冶長之賢不及南容故聖人以其子妻長而以兄子妻容家語孔子年十九娶於宋之上官氏女孔聖世紀云开官氏一歲而生伯魚公冶長所娶必伯魚之弟也又家語叔梁紇娶魯之施氏生九女其妾生孟皮後字伯尼有足病即孔子之兄也故叔梁紇又娶顔氏女名徵在生孔子也孟皮之女妻南宫檀弓南宫縚之妻之姑之喪夫子誨之髽云云盖厚於兄而薄於己也程子曰此以己之私心窺聖人也凡人避嫌者皆内不足也聖人自至公何避嫌之有况嫁女必量其才而求配尤不當有所避也若孔子之事則其年之長幼時之先後皆不可知惟以為避嫌則大不可避嫌之事賢者且不為况聖人乎子謂子賤君子哉若人魯無君子者斯焉取斯焉於䖍反子賤孔子弟子姓宓考之韻書此字音密子賤之姓當作虙音伏家語宓音密史記宓與伏通濟南伏生即其後名不齊魯人上斯斯此人下斯斯此徳子賤盖能尊賢取友以成其徳者說苑云子賤宰單父所父事者三人兄事者五人友十一人故夫子既歎其賢而又言若魯無君子則此人何所取以成此徳乎因以見魯之多賢也蘇氏曰稱人之善必本其父兄師友厚之至也子貢問曰賜也何如子曰女器也曰何器也曰瑚璉也女音汝瑚音胡璉力展反器者有用之成材夏曰瑚商曰璉周曰簠簋音甫鬼此爾雅釋器文然明堂位曰夏后氏之璉殷之六瑚周之八簋則又是商瑚而夏璉未詳孰是外方内圓曰簠外圓内方曰簋皆宗廟盛平聲黍稷之器而飾以玉器之貴重而華美者也子貢見孔子以君子許子賤故以己為問而孔子告之以此然則子貢雖未至於不器其亦器之貴者歟或曰雍也仁而不佞雍孔子弟子姓冉字仲弓魯人佞口才也仲弓為人重厚簡黙而時人以佞為賢故美其優于德而病其短於才也子曰焉用佞禦人以口給屢憎於人不知其仁焉用佞焉於䖍反禦當也猶應答也給辦也憎惡去聲下同也言何用佞乎佞人所以應答人者但以口取辦而無情實徒多為人所憎惡爾我雖未知仲弓之仁然其不佞乃所以為賢不足以為病也再言焉用佞所以深曉之或疑仲弓之賢而夫子不許其仁何也曰仁道至大非全體而不息者不足以當之如顔子亞聖猶不能無違於三月之後况仲弓雖賢未及顔子聖人固不得而輕許之也子使漆雕開仕對曰吾斯之未能信子說說音恱漆雕開孔子弟子字子若家語字子若蔡人史記云字子開魯人斯指此理而言信謂真知其如此而無毫髮之疑也開自言未能如此未可以治人故夫子說其篤志程子曰漆雕開已見大意故夫子說之又曰古人見道分明故其言如此謝氏曰開之學無可考然聖人使之仕必其材可以仕矣至於心術之微則一毫不自得不害其為未信此聖人所不能知而開自知之其材可以仕而其器不安於小成他日所就其可量乎夫子所以說之也子曰道不行乗桴浮於海從我者其由與子路聞之喜子曰由也好勇過我無所取材桴音孚從好並去聲與平聲材與裁同古字借用桴筏也筏房越反馬融曰編竹木大者曰栰小曰桴程子曰浮海之歎傷天下之無賢君也子路勇於義故謂其能從已皆假設之言耳子路以為實然而喜夫子之與已故夫子美其勇而譏其不能裁度待洛反事理以適於義也孟武伯問子路仁乎子曰不知也子路之於仁盖日月至焉者或在或亡不能必其有無故以不知告之又問子曰由也千乗之國可使治其賦也不知其仁也賦兵也古者以田賦出兵故謂兵為賦周禮九夫為井四井為邑四邑為丘四丘為甸甸六十四井出車一乗甸即十里為成成則兼旁加三十六井甸止言正賦六十四井也旁加之夫止治溝洫疆界不與出兵之數春秋傳所謂悉索所白反敝賦是也左傳襄公八年悉索敝賦以討于蔡三十一年悉索敝賦以來㑹時事言子路之才可見者如此仁則不能知也求也何如子曰求也千室之邑百乗之家可使為之宰也不知其仁也千室大邑古者四井為邑凡三十二家千室之邑盖積而計之也百乗卿大夫之家古注云鄭注大學百乗之家有采地一同百里之地也司馬法成方十里出革車一乘則百里之國聞方計之其地百成出車百乗也宰邑長上聲家臣之通號赤也何如子曰赤也束帶立於朝可使與賔客言也不知其仁也赤孔子弟子姓公西字子華魯人可使與賔客言周禮有大行人小行人之職掌賔客之禮儀及朝覲聘問之事大曰賔小曰客為君臣之别子謂子貢曰女與回也孰愈愈勝也對曰賜也何敢望回回也聞一以知十賜也聞一以知二一數之始十數之終二者一之對也顔子明睿余例反所照即始而見終子貢推測而知因此而識彼無所不說告往知來是其騐矣子曰弗如也吾與女弗如也與許也胡氏曰子貢方人夫子既語音御以不暇又問其與回孰愈以觀其自知之如何聞一知十上知去聲之資生知之亞也聞一知二中人以上之資學而知之之才也子貢平日以已方回見其不可企丘氏去智二反及故喻之如此夫子以其自知之明而又不難於自屈故既然之又重去聲許之此其所以終聞性與天道不特聞一知二而已也宰予晝寢子曰朽木不可雕也糞土之牆不可杇也於予與何誅朽許乆反杇音汙與平聲下同晝寢謂當晝而寐朽腐也雕刻畫也杇鏝莫官反也言其志氣昬惰教無所施也與語辭誅責也言不足責乃所以深責之子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行於予與改是行去聲宰予能言而行不逮故孔子自言於予之事而改此失亦以重去聲警之也胡氏曰子曰疑衍文不然則非一日之言也范氏曰君子之於學惟日孜孜斃毘祭反而後已惟恐其不及也宰予晝寐自棄孰甚焉故子責之胡氏曰宰予不能以志帥入聲氣居然而倦是宴安之氣勝儆戒之志惰也古之聖賢未嘗不以懈居隘反惰荒寜為懼勤勵不息自彊此孔子所以深責宰予也聽言觀行聖人不待是而後能亦非縁此而盡疑學者特因此立教以警羣弟子使謹於言而敏於行耳子曰吾未見剛者或對曰申棖子曰棖也慾焉得剛焉於虔反剛堅彊不屈之意最人所難能者故夫子歎其未見申棖弟子姓名魯人金氏曰史記家語有申姓無棖名豈棖三千之徒與慾多嗜時利反慾也多嗜慾則不得為剛矣程子曰人有慾則無剛剛則不屈於慾謝氏曰剛與慾正相反能勝物之謂剛故常伸於萬物之上為物揜之謂慾故常屈於萬物之下自古有志者少無志者多冝夫子之未見也棖之慾不可知其為人得非悻悻下頂反自好去聲者乎故或者疑以為剛然不知此其所以為慾耳子貢曰我不欲人之加諸我也吾亦欲無加諸人子曰賜也非爾所及也子貢言我所不欲人加於我之事我亦不欲以此加之於人此仁者之事不待勉强上聲故夫子以為非子貢所及程子曰我不欲人之加諸我吾亦欲無加諸人仁也施諸己而不願亦勿施於人恕也恕則子貢或能勉之仁則非所及矣愚謂無者自然而然勿者禁止之謂此所以為仁恕之别子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也文章徳之見賢徧反下同乎外者威儀文辭皆是也性者人所受之天理天道者天理自然之本體其實一理也言夫子之文章日見乎外固學者所共聞至於性與天道則夫子罕言之而學者有不得聞者盖聖門教不躐等子貢至是始得聞之而歎其美也程子曰此子貢聞夫子之至論而歎美之言也子路有聞未之能行唯恐有聞前所聞者既未及行故恐復扶又反有所聞而行之不給也范氏曰子路聞善勇於必行門人自以為弗及也故著之若子路可謂能用其勇矣子貢問曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文也好去聲孔文子衛大夫名圉音語凡人性敏者多不好學位高者多恥下問故諡法有以勤學好問為文者盖亦人所難也孔圉得諡為文以此而已蘇氏曰孔文子使太叔疾出其妻而妻去聲之疾通於初妻之娣大計反文子怒將攻之訪於仲尼仲尼不對命駕而行疾奔宋文子使疾弟遺室孔姞渠乙反左哀公十一年冬衛太叔疾出奔宋初疾娶于宋子朝其娣嬖子朝出孔文子使疾出其妻而妻之疾使侍人誘其初妻之娣寘於犂而為之一宫如二妻文子怒欲攻之仲尼止之遂奪其妻或滛于外州外州人奪之軒以獻恥是二者故出衛人立其弟遺使室孔姞孔文子之将攻太叔也訪於仲尼仲尼曰胡簋之事則嘗學之矣甲兵之事未之聞也退命駕而行其為人如此而諡曰文此子貢之所以疑而問也孔子不沒其善言能如此亦足以為文矣非經天緯地之文也史記諡法解惟周公旦太公望嗣王業建功于牧野終将葬乃制諡遂叙諡法諡者行之迹號者功之表車服者位之章也是以大行受大名細行受細名行出於己名出於人經緯天地文道徳博聞文勤學好問文慈恵愛民文愍民恵禮文賜民爵位文子謂子産有君子之道四焉其行已也恭其事上也敬其養民也恵其使民也義子産鄭大夫公孫僑音喬史記索隐子産鄭戍公少子也按春秋世譜乃公子發字子國之子以其出於公族故氏公孫恭謙遜也敬謹恪克各反也恵愛利也使民義如都鄙有章上下有服田有封洫怱域反廬井有伍之類左傳襄公三十年鄭子皮授子産政子産使都鄙有章上下有服田有封洫廬井有伍杜註國都及邉鄙車服尊卑各有分部金氏曰朱子謂有章程條法按都鄙如大都三國之一中五之一小九之一又師都建旗縣鄙建旐當時鄭國多是強族其分食都鄙必有侈僣故子産限之使城郭車旗章服各有尊卑也上下有服者謂使貴賤衣冠各有等差不得踰侈當時鄭國衣冠踰制者藏而不敢服故有取我衣冠而赭之之誚田有封洫者封疆溝洫此井田水陸界限當時井田制壊漸有開阡陌相攸越兼并之意故子産修正之一時使民力為之所以有作封洫之譏有取我田疇而伍之之謗廬井有伍者廬田閒民舎井九夫為井所謂夫三為屋屋三為井伍盖五家為伍使之相親相愛鄉田同井使之相友相助而其中間有罪則相及慶賞相共呉氏曰數去聲下同其事而責之者其所善者多也臧文仲不仁者三不知去聲者三是也左文三年秋八月丁卯大事于太廟躋僖公逆祀也仲尼曰臧文仲不仁者三不知者三下展禽廢六闗妾織蒲三不仁也作虚器縱逆祀祀爰居三不知也數其事而稱之者猶有所未至也子産有君子之道四焉是也今或以一言盖一人一事盖一時皆非也子曰晏平仲善與人交久而敬之晏平仲齊大夫名嬰史記索隐考嬰諡平字仲事齊靈荘景之世程子曰人交久則敬衰久而能敬所以為善子曰臧文仲居蔡山節藻梲何如其知也梲章恱反知去聲臧文仲魯大夫臧孫氏名辰魯孝公生僖伯彄字子臧辰其曽孫諡文荘文之閒為大夫居猶藏也蔡大龜也元龜出蔡地因名節柱頭斗栱音拱也藻水草名梲梁上短柱也爾雅梁上楹謂之梲盖為藏龜之室而刻山於節畫俗作畫藻於梲也當時以文仲為知孔子言其不務民義而謟瀆鬼神如此安得為知春秋傳所謂作虚器即此事也箋見上章張子曰名載字子厚號横渠先生長安人山節藻梲為藏龜之室祀爰居之義同歸於不知冝矣國語魯語海鳥曰爰居止於魯東門之外三日臧文仲使國人祭之子張問曰令尹子文三仕為令尹無喜色三己之無慍色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁知如字焉於䖍反令尹官名楚上卿執政者也子文姓鬭名榖奴口反於音烏菟音徒左宣四年初若敖娶於􅳡生鬬伯比若敖卒從其母畜於􅳡淫於䢵子之女生子文馬䢵夫人使棄諸夢中虎乳之䢵子田見之懼而歸夫人以告遂使収之楚人謂乳穀謂虎於菟故命之曰鬬榖於菟實為令尹子文其為人也喜怒不形物我無閒去聲知有其國而不知有其身其忠盛矣故子張疑其仁然其所以三仕三已而告新令尹者未知其皆出於天理而無人欲之私也是以夫子但許其忠而未許其仁也崔子弑齊君陳文子有馬十乗棄而違之至於他邦則曰猶吾大夫崔子也違之之一邦則又曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁乗去聲崔子齊大夫名杼直吕反齊君荘公名光春秋襄公二十五年夏五月乙亥齊崔抒弑其君光陳文子亦齊大夫名須無十乗四十匹也金氏曰四馬共駕一車因以四匹為乗古者車馬出於田賦毎甸出車一乘則十乗乃十甸之地其采邑之大可知違去也文子潔身去亂可謂清矣然未知其心果見義理之當然而能脱然無所累乎抑不得已於利害之私而猶未免於怨悔也故夫子特許其清而不許其仁愚聞之師曰當去聲下同理而無私心則仁矣今以是而觀二子之事雖其制行去聲之髙若不可及然皆未有以見其必當於理而真無私心也子張未識仁體而恱於苟難荀子不苟篇曰君子行不貴苟難唯其當之為貴遂以小者信其大者夫子之不許也冝哉讀者於此更以上章不知其仁後篇仁則吾不知之語并與三仁夷齊之事觀之則彼此交盡而仁之為義可識矣今以他書考之子文之相去聲楚所謀者無非僣王猾户八反夏之事左荘三十年楚殺令尹子元以鬬榖於菟為令尹僖公二十三年楚成得臣伐鄭取焦夷子文以為功使子玉為令尹子文為令尹凡二十八年杜氏曰按荘公三十年楚成王立九年矣僖公二十三年即成王之三十六年也楚自武王三十七年僣稱王魯桓公之八年也武王五十一年卒子文王立文王十三年卒于堵敖立堵敖五年卒弟成王立僖公元年楚成王之十四年也楚伐鄭鄭即齊故也五年楚鬬穀於菟滅弦六年楚子圍許許男面縳衘璧乃釋之十二年楚人滅黄十五年楚人伐隨二十年隨以漢東諸侯叛楚楚鬬榖於菟帥師伐隨取成而還二十一年宋人為鹿上之盟以求諸侯於楚楚人許之諸侯㑹宋公于㿻楚執宋公以伐宋己而釋之二十二年楚人伐宋宋公及楚人戰于泓宋師敗績公傷股明年宋襄公死二十三年楚師伐陳討其貳於宋也此僣王猾夏之事也文子之仕齊既失正君討賊之義又不數歳而復扶又反反於齊焉左襄二十七年宋向戌欲弭諸侯之兵以為名如晉告趙孟晉人許之如楚楚亦許之如齊齊人難之陳文子曰晉楚許之我焉得已且人曰弭兵而我弗許則固擕吾民矣将焉用之齊人許之杜氏曰按襄公二十五年崔杼弑齊君是時陳文子出奔二十六年不見經二十七年文子有弭兵之說則文子自出奔復反於齊凡二年則其不仁亦可見矣季文子三思而後行子聞之曰再斯可矣三去聲季文子魯大夫名行父音甫每事必三思而後行若使去聲下同晉而求遭喪之禮以行亦其一事也左傳文公六年季文子将聘于晉使求遭喪之禮以行杜註聞晉侯病故也既而晉襄公果卒斯語辭程子曰為惡之人未嘗知有思有思則為善矣然至於再則已審三則私意起而反惑矣故夫子譏之愚按季文子慮事如此可謂詳審而冝無過舉矣而宣公篡初患反立文子乃不能討反為去聲之使齊而納賂焉豈非程子所謂私意起而反惑之驗歟左文十八年二月公薨文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲襄仲欲立之見于齊侯而請之齊侯新立而欲親魯許之冬十月仲殺惡及視宣公元年夏季文子如齊納賂以請㑹㑹于平州以定公位是以君子務窮理而貴果斷都玩反不徒多思之為尚子曰寗武子邦有道則知邦無道則愚其知可及也其愚不可及也知去聲寗武子衛大夫名俞按春秋傳武子仕衛當文公成公之時文公有道而武子無事可見此其知之可及也杜氏曰按左僖二十五年衛文公卒子成公立僖二十六年即衛成公元年也經稱公㑹衛寗速盟于向速寗荘子也則荘子嘗逮事成公矣至僖二十八年傳稱寗武子與衛人盟于宛濮武子速之子即成公即位之三年也以此考之寗荘子當死于成公二年左右而後子俞為大夫則武子未嘗事文公集註云然未知何據成公無道至於失國而武子周旋其間盡心竭力不避艱險凡其所處上聲皆智巧之士所深避而不肯為者而能卒保其身以濟其君此其愚之不可及也左僖二十八年初晉侯将伐曹假道于衛衛弗許晉伐衛衛侯請盟晉人弗許衛侯欲與楚國人不欲故出其君以說于晉衛侯出居襄牛及晉敗楚師於城濮衛侯懼遂適陳使元咺奉叔武以受盟于踐土或訴元咺於衛侯曰立叔武矣其子角從公使殺之咺不廢命奉夷叔以入守六月晉人復衛侯寗武子與衛人盟于宛濮衛侯先期入叔武将沐聞君至喜捉髪走出前驅射而殺之元咺愬于晉冬衛侯與元咺訟寗武子為輔鍼荘子為坐士榮為大士衛侯不勝殺士榮刖鍼莊子謂寗俞忠而免之執衛侯歸之于京師寘諸深室寗子職納索饘焉元咺歸于衛立公子瑕僖三十年夏晉侯使醫衍酖衛侯寗俞貨醫使薄其酖魯為之請納玉於王與晉侯皆十瑴秋乃釋衛侯程子曰邦無道能沈俗作沉非晦以免患故曰不可及也亦有不當愚者比干是也子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之與平聲斐音匪此孔子周流四方道不行而思歸之歎也吾黨小子指門人之在魯者狂簡志大而略於事也斐文貌成章言其文理成就有可觀者裁割正也夫子初心欲行其道於天下至是而知其終不用也於是始欲成就後學以𫝊道於來世又不得中行之士而思其次以為狂士志意髙逺猶或可與進於道也但恐其過中失正而或䧟於異端耳故欲歸而裁之也子曰伯夷叔齊不念舊惡怨是用希伯夷叔齊孤竹君之二子史記列傳索隐孤竹君是殷湯所封相傳至夷齊之父姓墨胎氏名初字子朝伯夷名允字公信叔齊名智字公逹夷齊其諡也地理志云孤竹城在遼西令支縣金氏曰史記載夷齊名若字出春秋少陽篇古無此名字之例乃緯書附㑹耳孟子稱其不立於惡人之朝音潮不與惡人言與鄉人立其冠不正望望然去之若将凂焉其介如此冝若無所容矣然其所惡烏路反之人能改即止故人亦不甚怨之也程子曰不念舊惡此清者之量去聲又曰二子之心非夫子孰能知之子曰孰謂微生髙直或乞醯焉乞諸其鄰而與之醯呼西反微生姓髙名魯人史記髙帝紀尾生孝己之行顔師古注即微生髙也又荘子注亦然素有直名者醯醋也人來乞時其家無有故乞諸鄰家以與之夫子言此譏其曲意徇物掠力灼反美市恩不得為直也左昭二十四年已惡而掠美為昬諸本掠音亮程子曰微生髙所枉雖小害直為大范氏曰是曰是非曰非有謂有無謂無曰直聖人觀人於其一介之取予通作與而千駟萬鍾從可知焉故以微事斷之所以教人不可不謹也子曰巧言令色足恭左丘明恥之丘亦恥之匿怨而友其人左丘明恥之丘亦恥之足将樹反足過也程子曰左丘明古之聞人也鄧名世考氏姓書謂此入盖左丘姓而明名傳春秋者乃左氏也謝氏曰二者之可恥有甚於穿窬也左丘明恥之其所養可知矣夫子自言丘亦恥之盖竊比老彭之意又以深戒學者使察乎此而立心以直也顔淵季路侍子曰盍各言爾志盍何不也子路曰願車馬衣輕裘與朋友共敝之而無憾衣去聲衣服之也裘皮服敝壞也憾恨也顔淵曰願無伐善無施勞伐誇也善謂有能施亦張大之意勞謂有功易曰勞而不伐是也見繫辭或曰勞勞事也勞事非己所欲故亦不以施之於人亦通子路曰願聞子之志子曰老者安之朋友信之少者懷之老者養之以安朋友與之以信少去聲者懷之以恩一說安之安我也信之信我也懷之懷我也亦通程子曰夫子安仁顔淵不違仁子路求仁又曰子路顔淵孔子之志皆與物共者也但有小大之差楚冝反爾又曰子路勇於義者觀其志豈可以勢利拘之哉亞於浴沂者也顔子不自私己故無伐善知同於人故無施勞其志可謂大矣然未免於有意也至於夫子則如天地之化工付與萬物而已不勞焉此聖人之所為也今夫羈居宜反靮音的以御馬而不制牛人皆知羈靮之作在乎人而不知羈靮之生由於馬聖人之化亦猶是也先觀二子之言後觀聖人之言分明天地氣象凡看論語非但於理㑹文字須要識得聖賢氣象子曰已矣乎吾未見能見其過而内自訟者也已矣乎者恐其終不得見而歎之也内自訟者口不言而心自咎也人有過而能自知者鮮上聲下同矣知過而能内自訟者為尤鮮能内自訟則其悔悟深切而能改必矣夫子自恐終不得見而歎之其警學者深矣子曰十室之邑必有忠信如丘者焉不如丘之好學也焉如字屬上句好去聲十室小邑也忠信如聖人生質之美者也夫子生知而未嘗不好學故言此以勉人言美質易去聲得至道難聞學之至則可以為聖人不學則不免為鄉人而已可不勉哉雍也第六凡二十八章篇内第十四章以前大意與前篇同子曰雍也可使南面南面者人君聽治之位言仲弓寛洪簡重有人君之度也仲弓問子桑伯子子曰可也簡子桑伯子魯人胡氏以為疑即荘周所稱子桑戸者是也見荘子大宗師篇子桑户與孟子反子琴張三人為友仲弓以夫子許已南面故問伯子如何可者僅可而有所未盡之辭簡者不煩之謂仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃大簡乎大音泰言自處以敬則中有主而自治嚴如是而行簡以臨民則事不煩而民不擾所以為可若先自處以簡則中無主而自治踈矣而所行又簡豈不失之太簡而無法度之可守乎家語記伯子不衣冠而處夫子譏其欲同人道於牛馬劉向說苑修文篇孔子見子桑伯子子桑伯子不衣冠而處弟子曰夫子何為見此人乎曰其質美而無文吾欲說而文之孔子去子桑伯子門人不說曰何為見孔子乎曰其質美而文繁吾欲說而去其文故曰文質修者謂之君子有質而無文謂之易野子桑伯子易野欲同人道於牛馬故仲弓曰太簡按家語無其文集註誤也而欲同人道於牛馬一句亦非夫子所譏然則伯子盖太簡者而仲弓疑夫子之過許與子曰雍之言然仲弓盖未喻夫子可字之義而其所言之理有黙契焉者故夫子然之程子曰子桑伯子之簡雖可取而未盡善故夫子云可也仲弓因言内主於敬而簡則為要直内存乎簡而簡則為踈略可謂得其㫖矣又曰居敬則心中無物故所行自簡居簡則先有心於簡而多一簡字矣故曰太簡哀公問弟子孰為好學孔子對曰有顔回者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也好去聲亡與無同遷移也貳復扶又反下同也怒於甲者不移於乙過於前者不復於後顔子克己之功至於如此可謂真好學矣短命者顔子三十二而卒也家語顔子少孔子三十歳年二十九而髪白三十二而蚤死既云今也則亡又言未聞好學者盖深惜之又以見真好學者之難得也程子曰顔子之怒在物不在已故不遷有不善未嘗不知知之未嘗復行不貳過也又曰喜怒在事則理之當喜怒者也不在血氣則不遷若舜之誅四凶也可怒在彼已何與音預焉如鑑之照物妍媸在彼隨物應之而已何遷之有又曰如顔子地位豈有不善所謂不善只是微有差失纔差失便能知之纔知之便更不萌作張子曰慊口簟反於已者不使萌於再或曰此下乃伊川十八歳時在太學怍顔子所好何學論也胡安定瑗字翼之為國子監直講出題試諸生得伊川此論大驚異召處以學職詩書六藝七十子非不習而通也史記傳受業身通者七十有七人注孔子家語亦有七十七人唯文翁孔廟圖作七十二人而夫子獨稱顔子為好學顔子之所好果何學歟程子曰學以至乎聖人之道也學之道奈何曰天地儲精得五行之秀者為人其本也真而静其未發也五性具焉曰仁義禮智信形既生矣外物觸其形而動於中矣其中動而七情出焉曰喜怒哀懼愛惡去聲欲情既熾昌志反而益蕩其性鑿矣故覺者約其情使合於中正其心養其性而已然必先明諸心知所往然後力行以求至焉若顔子之非禮勿視聽言動不遷怒貳過者則其好之篤而學之得其道也然其未至於聖人者守之也非化之也假之以年則不日而化矣今人乃謂聖本生知非學可至而所以為學者不過記誦文辭之閒其亦異乎顔子之學矣子華使於齊冉子為其母請粟子曰與之釡請益曰與之庾冉子與之粟五秉使為並去聲子華公西赤也使為去聲孔子使也釡六斗四升庾十六斗秉十六斛周禮臬氏為量量之為鬴容六斗四升鬴深尺内方外圜象天包地外鬴釜同又按儀禮歸賔饔餼篇十斗曰斛十六斗曰籔十六籔曰秉則五秉今八十石也子曰赤之適齊也乗肥馬衣輕裘吾聞之也君子周急不繼富衣去聲乗肥馬衣輕裘言其富也急窮迫也周者補不足繼者續有餘原思為之宰與之粟九百辭原思孔子弟子名憲宋人孔子為魯司宼時以思為宰粟宰之禄也九百不言其量去聲不可考子曰毋以與爾鄰里鄉黨乎毋禁止辭五家為鄰二十五家為里萬二千五百家為鄉五百家為黨周禮地官遂人則以五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為遂而大司徒之職則五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉愚按大司徒掌建邦土地之圖與其人民之數此郊内之制也遂人掌邦之野以土地之圖經田野造縣鄙形體之法此郊外之制也鄭司農云田野之居其比伍之名與國中異制故亦異其名言常禄不當辭有餘自可推之以周貧乏盖鄰里鄉黨有相周之義程子曰夫子之使如字子華子華之為去聲下為之同夫子使去聲義也而冉有乃為之請聖人寛容不欲直拒人故與之少所以示不當與也請益而與之亦少所以示不當益也求未逹而自與之多則已過矣故夫子非之盖赤苟至乏則夫子必自周之不待請矣原思為宰則有常禄思辭其多故又教以分諸鄰里之貧者盖亦莫非義也張子曰於斯二者可見聖人之用財矣子謂仲弓曰犂牛之子騂且角雖欲勿用山川其舍諸犂利之反騂息營反舍上聲犂雜文騂赤色周人尚赤牲用騂見記檀弓角角周正中去聲犧牲也月令仲秋命宰祝循行犧牲視全具量大小視長短䟽云純色曰犧體完曰全視長短者王制云祭天地之牛角繭栗宗廟之牛角握賔客之牛角尺周正者即長短全具之義中犧牲者中程度也用用以祭也山川山川之神也言人雖不用神必不舎也仲弓父賤而行去聲惡此語本䟽文家語亦言其生於不肖之父故夫子以此譬之言父之惡不能廢其子之善如仲弓之賢自當見用於世也然此論仲弓云爾非與仲弓言也范氏曰以瞽叟為父而有舜以鯀為父而有禹古之聖賢不係於世類尚矣子能改父之過變惡以為美則可謂孝矣子曰回也其心三月不違仁其餘則日月至焉而已矣三月言其久仁者心之徳心不違仁者無私欲而有其徳也曰月至焉者或日一至焉或月一至焉能造其域而不能久也程子曰三月天道小變之節言其久也過此則聖人矣不違仁只是無纎毫私欲少有私欲便是不仁尹氏曰此顔子於聖人未逹一閒者也閒平聲此語本楊子問神篇顔淵亦潛心於仲尼矣未逹一閒爾若聖人則渾然無閒斷閒去聲斷徒玩反矣張子曰始學之要當知三月不違與日月至焉内外賔主之辨使心意勉勉循循而不能已過此幾平聲非在我者季康子問仲由可使從政也與子曰由也果於從政乎何有曰賜也可使從政也與曰賜也逹於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有從政謂為大夫果有决斷都玩反逹通事理藝多才能程子曰季康子問三子之才可以從政乎夫子答以各有所長非惟三子人各有所長能取其長皆可用也季氏使閔子騫為費宰閔子騫曰善為我辭焉如有復我者則吾必在汶上矣費音秘為去聲復扶又反汶音問閔子騫孔子弟子名損魯人費季氏邑汶水名在齊南魯北竟與境同上閔子不欲臣季氏令平聲使去聲者善為已辭言若再來召我則當去之齊程子曰仲尼之門能不仕大夫之家者閔子曽子數人而已謝氏曰學者能少知内外之分皆可以樂音洛道而忘人之勢况閔子得聖人為之依歸彼其視季氏不義之富貴不啻犬彘又從而臣之豈其心哉在聖人則有不然者盖居亂邦見惡人在聖人則可自聖人以下剛則必取禍柔則必取辱閔子豈不能早見而豫待之乎如由也不得其死求也為季氏附益夫音扶豈其本心哉盖既無先見之知去聲又無克亂之才故也然則閔子其賢乎伯牛有疾子問之自牖執其手曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也夫音扶伯牛孔子弟子姓冉名耕魯人有疾先儒以為癩音賴也淮南子精神篇子夏失明伯牛為厲厲即癩也牖南牖也禮病者居北牖下君視之則遷於南牖下使君得以南面視已喪大記疾病外内皆掃君大夫徹縣士去琴瑟寝東首於北牖下䟽曰病者惟恒在北牖下若君來視之時則暫時移向南牖下東首令君得南面而視之北牖之牖或為墉時伯牛家以此禮尊孔子孔子不敢當故不入其室而自牖執其手盖與之永訣也命謂天命言此人不應平聲有此疾而今乃有之是乃天之所命也然則非其不能謹疾而有以致之亦可見矣侯氏曰名仲良字師聖河東人伯牛以徳行去聲稱亞於顔閔故其将死也孔子尤痛惜之子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也食音嗣樂音洛簞竹器食飯也瓢瓠音互也顔子之貧如此而處上聲之泰然不以害其樂故夫子再言賢哉回也以深歎美之程子曰顔子之樂非樂簞瓢陋巷也不以貧窶郡羽反累其心而改其所樂也故夫子稱其賢又曰簞瓢陋巷非可樂盖自有其樂爾其字當玩味自有深意又曰昔受學於周茂叔每令平聲尋仲尼顔子樂處所樂何事愚按程子之言引而不發盖欲學者深思而自得之今亦不敢妄為之說學者但當從事於博文約禮之誨以至於欲罷不能而竭其才則庶乎有以得之矣冉求曰非不說子之道力不足也子曰力不足者中道而廢今女畫說音恱女音汝力不足者欲進而不能畫者能進而不欲謂之畫者如畫地以自限也胡氏曰夫子稱顔回不改其樂冉求聞之故有是言然使求說夫子之道誠如口之說芻豢音患則必将盡力以求之何患力之不足哉畫而不進則日退而已矣此冉求之所以局於藝也子謂子夏曰女為君子儒無為小人儒儒學者之稱程子曰君子儒為去聲下同已小人儒為人謝氏曰君子小人之分義與利之間而已然所謂利者豈必殖貨財之謂以私滅公適已自便凡可以害天理者皆利也子夏文學雖有餘然意其逺者大者或昧焉故夫子語音御之以此子游為武成宰子曰女得人焉爾乎曰有澹臺滅明者行不由徑非公事未嘗至於偃之室也女音汝澹徒甘反武城魯下邑澹臺姓滅明名字子羽徑路之小而捷者公事如飲射讀法之類胡氏曰飲謂鄉飲酒周禮鄉大夫賔賢能飲國中賢者能者州長習射黨正蜡祭皆行鄉飲酒禮射謂鄉射周禮鄉大夫以五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞州長春秋以禮㑹民皆行鄉射禮讀法則州長於正月之吉黨正於四時孟月吉日族師於吉月閭胥於既比皆行讀法禮以是知為邑宰者亦然也箋飲射讀法胡氏固詳之矣又按羣書百考云州長毎以正月正嵗及春秋祭社屬民讀教法一年凡四黨正於四時孟月朔及春秋祭禜及正嵗屬民讀法一年凡七族師毎月朔及春秋禜酺屬民讀法一年凡十四是州長四讀黨正七讀族師十四讀一年之閒凡二十五讀法不由徑則動必以正而無見小欲速之意可知非公事不見邑宰則其有以自守而無枉已徇人之私可見矣楊氏曰為政以人才為先故孔子以得人為問如滅明者觀其二事之小而其正大之情可見矣後世有不由徑者人必以為迂不至其室人必以為簡非孔氏之徒其孰能知而取之愚謂持身以滅明為法則無苟賤之羞取人以子游為法則無邪媚之惑子曰孟之反不伐奔而殿將入門䇿其馬曰非敢後也馬不進也孟之反魯大夫名側左傳稱孟子側胡氏曰反即荘周所稱孟子反者是也箋見篇首伐誇功也奔敗走也軍後曰殿丁綀反䇿鞕也戰敗而還音旋以後為功反奔而殿故以此言自揜與掩同其功也事在哀公十一年左哀十一年齊國書帥師伐我孟孺子洩帥右師冉求帥左師師及齊師戰于郊右師奔齊人從之孟之側後入以為殿抽矢䇿其馬曰馬不進也謝氏曰人能操平聲無欲上人之心則人欲日消天理日明而凡可以矜已誇人者皆無足道矣然不知學者欲上人之心無時而忘也若孟之反可以為法矣子曰不有祝鮀之佞而有宋朝之美難乎免於今之世矣鮀徒河反祝宗廟之官鮀衛大夫字子魚有口才朝宋公子有美色言衰世好去聲諛恱色非此難免盖傷之也子曰誰能出不由户何莫由斯道也言人不能出不由户何故乃不由此道邪怪而歎之之辭洪氏曰人知出必由戸而不知行必由道非道逺人人自逺爾子曰質勝文則野文勝質則史文質彬彬然後君子野野人言鄙略也史掌文書多聞習事而誠或不足也彬彬猶班班物相雜而適均之貌言學者當損有餘補不足至於成徳則不期然而然矣楊氏曰文質不可以相勝然質之勝文猶之甘可以受和去聲白可以受采也文勝而至於滅質則其本亡矣雖有文将安施乎然則與其史也寜野子曰人之生也直罔之生也幸而免程子曰生理本直罔不直也而亦生者幸而免耳子曰知之者不如好之者好之者不如樂之者好去聲樂音洛尹氏曰知之者知有此道也好之者好而未得也樂之者有所得而樂之也張敬夫曰譬之五榖周禮夏官職方氏河南曰豫州其穀冝五種黍稷菽麥稻詳見五榖不分箋知者知其可食者也好者食而嗜之者也樂者嗜之而飽者也知而不能好則是知之未至也好之而未及於樂則是好之未至也此古之學者所以自彊而不息者歟子曰中人以上可以語上也中人以下不可以語上也以上之上上聲語去聲語告也言教人者當隨其高下而告語之則其言易去聲入而無躐等之弊也張敬夫曰聖人之道精粗雖無二致但其施教則必因其材而篤焉盖中人以下之質驟而語之太髙非惟不能以入且将妄意躐等而有不切於身之弊亦終於下而已矣故就其所及而語之是乃所以使之切問近思而漸進於髙逺也樊遲問知子曰務民之義敬鬼神而逺之可謂知矣問仁曰仁者先難而後獲可謂仁矣知逺皆去聲民亦人也獲謂得也専用力於人道之所宜而不惑於鬼神之不可知知者之事也先其事之所難而後其效之所得仁者之心也此必因樊遲之失而告之程子曰人多信鬼神惑也而不信者又不能敬能敬能逺可謂知矣又曰先難克己也以所難為先而不計所獲仁也吕氏曰當務為急不求所難知力行所知不憚所難為子曰知者樂水仁者樂山知者動仁者静知者樂仁者壽知去聲樂上二字並五教反下一字音洛樂喜好去聲也知者逹於事理而周流無滯有似於水故樂水仁者安於義理而厚重不遷有似於山故樂山動静以體言樂壽以效言也動而不括故樂動而不括出易繫辭下註括結閡也動而無結閡之患也閡五代反與礙同静而有常故壽程子曰非體仁知之深者不能如此形容之子曰齊一雙至於魯魯一變至於道孔子之時齊俗急功利喜夸詐乃霸政之餘習魯則重禮教崇信義猶有先王之遺風焉但人亡政息不能無廢墜耳道則先王之道也言二國之政俗有美惡故其變而之道有難易程子曰夫子之時齊彊魯弱孰不以為齊勝魯也然魯猶存周公之法制齊由桓公之霸為從簡尚功之治去聲太公之遺法變易盡矣閔元年齊仲孫湫謂桓公曰魯猶秉周禮哀十一年季孫欲用田賦使冉有訪諸仲尼仲尼曰且子季孫欲行而法則周公之典在昭二年晉韓宣子適魯見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王此所謂猶存周公之法制也國語管仲為政制國為二十一都注云此非周制不三卒伍不修甲兵作内政而寄軍令則可速得志於天下注云内政國政也此所謂從簡也桓公令官長期而書伐盖期年報功此所謂尚功者也大抵從簡尚功之意備見齊語故一變乃能至魯魯則修舉廢墜而已一變則至於先王之道也愚謂二國之俗惟夫子為能變之而不得試然因其言以考之則其施為緩急之序亦略可見矣子曰觚不觚觚哉觚哉觚音孤觚稜也或曰酒器禮特牲禮用二爵二觚四觶一角一散馬融曰一升曰爵二升曰觚或曰木簡見於漢急就章顔師古曰學書之牘或以記事削木為之其形或六靣或八靣皆可書孔子歎即此也皆器之有稜者也不觚者盖當時失其制而不為稜也觚哉觚哉言不得為觚也程子曰觚而失其形制則非觚也舉一器而天下之物莫不皆然故君而失其君之道則為不君臣而失其臣之職則為虚位范氏曰人而不仁則非人國而不治去聲則不國矣宰我問曰仁者雖告之曰井有仁焉其從之也子曰何為其然也君子可逝也不可陷也可欺也不可罔也劉聘君名勉之字致中號草堂建安人文公婦翁曰有仁之仁當作人今從之從謂隨之於井而救之也宰我信道不篤而憂為仁之䧟害故有此問逝謂使之往救䧟謂䧟之於井欺謂誑古況反之以理之所有罔謂昧之以理之所無盖身在井上乃可以救井中之人若從之於井則不復扶又反能救之矣此理甚明人所易去聲曉仁者雖切於救人而不私其身然不應平聲如此之愚也子曰君子博學於文約之以禮亦可以弗畔矣夫夫音扶約要去聲也畔背音佩也君子學欲其博故於文無不考守欲其要故其動必以禮如此則可以不背於道矣程子曰博學於文而不約之以禮必至於汗漫博學矣又能守禮而由於規矩則亦可以不畔道矣子見南子子路不說夫子矢之曰予所否者天厭之天厭之說音恱否力九反南子宋女子姓衛靈公之夫人有淫行去聲孔子至衛南子請見孔子辭謝不得已而見之史記世家孔子至衛南子使人謂孔子曰四方之君子不辱欲與寡君為兄弟者必見寡小君寡小君願見孔子辭謝不得已而見之夫人在絺帷中孔子入門北面稽首夫人自帷中見之禮答焉再拜環珮玉聲璆然孔子曰吾鄉為弗見見之禮答焉子路不恱以下云云盖古者仕於其國有見其小君之禮或問見其小君禮歟朱子曰是於禮無所見穀梁子以為大夫不見其夫人而何休獨以為夫人至大夫皆郊迎執贄不知何所考也然記云陽侯殺繆侯而竊其夫人故大饗廢夫人之禮則大夫見夫人之禮疑亦久矣不行而靈公南子特舉之耳又士相見禮大夫始見于君執贄夫人尊與君同亦當有禮相見杜云大夫始見用羔鴈見夫人亦當然而子路以夫子見此淫亂之人為辱故不恱矢誓也所誓辭也如云所不與崔慶者之類左襄二十五年齊崔杼殺荘公立景公而相之慶封為左相盟國人於大宫曰所不與崔慶者晏子仰天歎曰嬰所不唯忠於君利杜稷是與有如上帝乃歃否謂不合於禮不由其道也厭棄絶也聖人道大徳全無可不可其見惡人固謂在我有可見之禮則彼之不善我何與音預焉然此豈子路所能測哉故重平聲言以誓之欲其姑信此而深思以得之也子曰中庸之為徳也其至矣乎民鮮久矣鮮上聲中者無過不及之名也庸平常也至極也鮮少也言民少此徳今已久矣程子曰不偏之謂中不易之謂庸中者天下之正道庸者天下之定理自世教衰民不興於行去聲少有此徳久矣子貢曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸施去聲博廣也仁以理言通乎上下聖以地言則造七到反其極之名也乎者疑而未定之辭病心有所不足也言此何止於仁必也聖人能之乎則雖堯舜之聖其心猶有所不足於此也以是求仁愈難而愈逺矣夫仁者已欲立而立人已欲逹而逹人夫音扶以已及人仁者之心也於此觀之可以見天理之周流而無閒去聲矣状仁之體莫切於此能近取譬可謂仁之方也已譬喻也方術也近取諸身以已所欲譬之他人知其所欲亦猶是也然後推其所欲以及於人則恕之事而仁之術也於此免焉則有以勝其人欲之私而全其天理之公矣程子曰醫書以手足痿痺為不仁痿於危反痺音畀此言最善名状仁者以天地萬物為一體莫非已也認得為如字已何所不至若不屬已自與已不相干如手足之不仁氣已不貫皆不屬己故博施濟衆乃聖人之功用仁至難言故止曰已欲立而立人已欲逹而逹人能近取譬可謂仁之方也已欲令平聲如是觀仁可以得仁之體又曰論語言堯舜其猶病諸者二夫音扶博施者豈非聖人之所欲然必五十乃衣去聲下同帛七十乃食肉聖人之心非不欲少去聲者亦衣帛食肉也顧其養有所不贍時豔反爾贍足也此病其施之不博也濟衆者豈非聖人之所欲然治不過九州聖人非不欲四海之外亦兼濟也顧其治有所不及爾此病其濟之不衆也推之以求修已以安百姓則為病可知苟以吾治去聲已足則便不是聖人吕氏曰子貢有志於仁徒事髙逺未知其方孔子教以於已取之庶近而可入是乃為仁之方雖博施濟衆亦由此進論語纂箋卷三
