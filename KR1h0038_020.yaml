body:
  text: 欽定四庫全書孟子纂箋卷六元詹道傳撰滕文公下凡十章陳代曰不見諸侯宜若小然今一見之大則以王小則以霸且志曰枉尺而直尋宜若可為也王去聲陳代孟子弟子也小謂小節也枉屈也直伸也八尺曰尋枉尺直尋猶屈已一見諸侯而可以致王霸所屈者小所伸者大也孟子曰昔齊景公田招虞人以旌不至將殺之志士不忘在溝壑勇士不忘喪其元孔子奚取焉取非其招不往也如不待其招而往何哉喪去聲田獵也虞人守苑囿之吏也周禮地官之屬若山虞若林衡川衡澤虞之職掌山林川澤田獵之政令田獵則山虞植虞旗澤虞植虞旌以屬禽招大夫以旌招虞人以皮冠元首也志士固窮常念死無棺椁棄溝壑而不恨勇士輕生常念戰鬭而死喪其首而不顧也此二句乃孔子歎美虞人之言事見左昭二十四年夫音扶虞人招之不以其物尚守死而不往況君子豈可不待其招而自往見之耶此以上是掌反告之以不可往見之意且夫枉尺而直尋者以利言也如以利則枉尋直尺而利亦可為與夫音扶與平聲此以下正其所稱枉尺直尋之非夫所謂枉小而所伸者大則為之者計其利耳一有計利之心則雖枉多伸少而有利亦將為之邪甚言其不可也昔者趙簡子使王良與嬖奚乘終日而不獲一禽嬖奚反命曰天下之賤工也或以告王良良曰請復之彊而後可一朝而獲十禽嬖奚反命曰天下之良工也簡子曰我使掌與女乘謂王良良不可曰吾為之範我馳驅終日不獲一為之詭遇一朝而獲十詩云不失其馳舍矢如破我不貫與小人乘請辭乘去聲彊上聲女音汝為去聲舍上聲趙簡子晉大夫趙鞅於兩反也王良善御者也嬖奚簡子幸臣與之乘為之御也復扶又反之再乘也彊而後可嬖奚不肯彊之而後肯也一朝自晨至食時也掌專主也範法度也詭遇不正而與禽遇也言奚不善射以法馳驅則不獲廢法詭遇而後中去聲下同也趙岐注法度之御應禮之射正殺之禽不能得一橫而射之曰詭遇非禮之射則能獲十五御逐禽左是也饒氏曰射者是驅禽獸來迎而射之此禽當中來則可以正射若來得不正則或當左或當右以射之御者自有法度射者不遇迎而射之則不中非關御者事詭遇是詭道以遇禽獸射者不能迎而射之而御者以詭遇則其中非射者之能乃御者之力也詩小雅車攻之篇言御者不失其馳驅之法而射者發矢皆中而力今嬖奚不能也貫慣同習也御者且羞與射者比比而得禽獸雖若丘陵弗為也如枉道而從彼何也且子過矣枉已者未有能直人者也比必二反比阿黨也若丘陵言多也或曰居今之世出處上聲去就不必一一中節欲其一一中節則道不得行矣楊氏曰何其不自重也枉己其能直人乎古之人寧道之不行而不輕其去就是以孔孟雖在春秋戰國之時而進必以正以至終不得行而死也使不恤其去就而可以行道孔孟當先為之矣孔孟豈不欲道之行哉景春曰公孫衍張儀豈不誠大丈夫哉一怒而諸侯懼安居而天下熄景春人姓名公孫衍張儀皆魏人金氏曰衍即犀首也怒則說音稅諸侯使相攻伐故諸侯懼也孟子曰是焉得為大丈夫乎子未學禮乎丈夫之冠也父命之女子之嫁也母命之往送之門戒之曰往之女家必敬必戒無違夫子以順為正者妾婦之道也焉於䖍反冠去聲女家之女音汝加冠如字於首曰冠去聲女家夫家也婦人內夫家以嫁為歸也夫子夫也女子從人以順為正道也蓋言二子阿諛苟容竊取權勢乃妾婦順從之道耳非丈夫之事也居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道富貴不能淫貧賤不能移威武不能屈此之謂大丈夫廣居仁也正位禮也大道義也與民由之推其所得於人也獨行其道守其所得於己也淫蕩其心也移變其節也屈挫其志也何叔京名鎬昭武人曽受學於朱子曰戰國之時聖賢道否部鄙反天下不復扶又友見其德業之盛但見姦巧之徒得志橫行氣焰以念反可畏遂以為大丈夫不知由君子觀之是乃妾婦之道耳何足道哉周霄問曰古之君子仕乎孟子曰仕傳曰孔子三月無君則皇皇如也出疆必載質公明儀曰古之人三月無君則弔傳直戀反質與贄同下同周霄魏人無君謂不得仕而事君也皇皇如有求而弗得之意記檀弓顔丁善居喪始死皇皇焉如有求而弗得出疆謂失位而去國也質所執以見人者如士則執雉也周禮大宗伯以禽作六摯以等諸侯孤執皮帛卿執羔大夫執鴈士執雉庶人執鶩音木工商執雞出疆載之者將以見所適國之君而事之也三月無君則弔不以急乎周霄問也以已通太也後章放上聲此曰士之失位也猶諸侯之失國家也禮曰諸侯耕助以供粢盛夫人蠶繅以為衣服犧牲不成粢盛不潔衣服不備不敢以祭惟士無田則亦不祭牲殺器皿衣服不備不敢以祭則不敢以宴亦不足弔乎盛音成繅素刀反皿武永反禮曰引禮曰至先王先公大略禮記祭義之文諸侯為藉秦昔反百畝冕而青紘音宏躬秉耒以耕而庶人助以終畝收而藏之御廩以供宗廟之粢盛按國語天子為藉千畝諸侯為藉百畝王耕一墢班三之賈逵注班次也謂卿大夫各三其上也王一墢公三墢卿九墢大夫二十七墢天子三推公五推卿諸侯九推穀梁傳桓十四年天子親耕以供粢盛王后親蠶以供祭服甸粟而內三宫三宫米而藏之御廩注甸甸師掌田之官也三宫三夫人也宗廟之禮君親割夫人親春使世婦蠶于公桑蠶室奉繭古典反以示于君遂獻于夫人夫人副褘音暉受之繅三盆手遂布于三宫世婦使繅以為黼黻音斧弗文章而服以祀先王先公周禮春官天子有六宫九嬪二十七世婦諸侯半之祭儀云古者天子諸侯必有公桑蠶室近川而為之季春朔旦君皮辨素積卜三宫之夫人世婦之吉者使入蠶于蠶室奉種浴于川桑于公桑及卒蠶事奉繭以示于君遂獻于夫人夫人服祭服受之為此繭欲為祭服也副之為言覆也若今之步搖首著副身著褘衣然副褘王后之服而云夫人記者容指三王之後歟三盆手者三淹也淹去聲凡繅每淹大總而手振之以出緒也考工記曰青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五采備謂之繡服既成君服以祀先王先公祭義互言天子諸侯也又曰士有田則祭無田則薦此王制之文注云有田者既祭又薦新祭以首時薦以仲月黍稷曰粢在器曰盛牲殺牲必特殺也皿眉永反所以覆敷救反器者出疆必載質何也周霄問也曰士之仕也猶農夫之耕也農夫豈為出疆舍其耒耜哉曰晉國亦仕國也未嘗聞仕如此其急仕如此其急也君子之難仕何也曰丈夫生而願為之有室女子生而願為之有家父母之心人皆有之不待父母之命媒妁之言鑽穴隙相窺踰牆相從則父母國人皆賤之古之人未嘗不欲仕也又惡不由其道不由其道而往者與鑽穴隙之類也為去聲舍上聲妁音酌隙去逆反惡去聲晉國解見首篇仕國謂君子游宦之國霄意以孟子不見諸侯為難仕故先問古之君子仕否然後言此以風去聲切之也男以女為室女以男為家妁亦媒也言為父母者非不願其男女之有室家而亦惡其不由道蓋君子雖不潔身以亂倫而亦不狥利而忘義也彭更問曰後車數十乘從者數百人以傳食於諸侯不以泰乎孟子曰非其道則一簞食不可受於人如其道則舜受堯之天下不以為泰子以為泰乎更平聲乘從皆去聲傳直戀反簞音丹食音嗣彭更孟子弟子也泰侈也曰否士無事而食不可也言不以舜為泰但謂今之士無功而食人之食則不可也曰子不通功易事以羡補不足則農有餘粟女有餘布子如通之則梓匠輪輿皆得食於子於此有人焉入則孝出則悌守先王之道以待後之學者而不得食於子子何尊梓匠輪輿而輕為仁義者哉羡延面反通功易事謂通人之功而交易其事羡餘也有餘言無所貿音茂易而積於無用也梓人匠人木工也輪人輿人車工也周禮冬官梓人為筍簴為飲器為侯鵠匠人掌建國營國為溝洫此梓匠之異也輪人為輪為蓋輿人為車此輪輿之不同也曰梓匠輪輿其志將以求食也君子之為道也其志亦將以求食與曰子何以其志為哉其有功於子可食而食之矣且子食志乎食功乎曰食志與平聲可食而食食志食功之食皆音嗣下同孟子言自我而言固不求食自彼而言凡有功者則當食音嗣之曰有人於此毁瓦畫墁其志將以求食也則子食之乎曰否曰然則子非食志也食功也墁武安反子食之食亦音嗣墁謨官反牆壁之飾也毁瓦畫墁言無功而有害也既曰食功則以士為無事而食者真尊梓匠輪輿而輕為仁義者矣萬章問曰宋小國也今將行王政齊楚惡而伐之則如之何惡去聲萬章孟子弟子宋王偃嘗滅滕伐薛敗齊楚魏之兵欲霸天下疑即此時也通鑑周赦王二十九年宋起兵滅滕伐薛東敗齊取五城南敗楚取地三百里西敗魏軍欲霸之亟成故射天笞地以示威服鬼神天下謂之桀宋齊湣王伐之王偃走死孟子曰湯居亳與葛為鄰葛伯放而不祀湯使人問之曰何為不祀曰無以供犧牲也湯使遺之牛羊葛伯食之又不以祀湯又使人問之曰何為不祀曰無以供粢盛也湯使亳衆往為之耕老弱饋食葛伯帥其民要其有酒食黍稻者奪之不授者殺之有童子以黍肉餉殺而奪之書曰葛伯仇餉此之謂也遺唯季反盛音成往為之為去聲饋食酒食之食音嗣要平聲餉式亮反葛國名伯爵也古注夏諸侯嬴姓之國放而不祀放縱無道不祀先祖也亳衆湯之民其民葛民也授與也餉亦饋也書商書仲虺許偉反之誥也仇餉言與餉者為仇也為其殺是童子而征之四海之內皆曰非富天下也為匹夫匹婦復讎也為去聲非富天下言湯之心非以天下為富而欲得之也湯始征自葛載十一征而無敵於天下東面而征西夷怨南面而征北狄怨曰奚為後我民之望之若大旱之望雨也歸市者弗止藝者不變誅其君弔其民如時雨降民大悅書曰徯我后后來其無罰載亦始也十一征所征十一國也餘巳見前篇有攸不為臣東征綏厥士女匪厥𤣥黃紹我周王見休惟臣附于大邑周其君子實𤣥黃于匪以迎其君子其小人簞食壺漿以迎其小人救民於水火之中取其殘而已矣食音嗣按周書武成篇載武王之言孟子約其文如此然其辭時與今書文不類今姑依此文解之有所不為臣謂助紂為惡而不為周臣者匪與篚同𤣥黃幣也疏禮公之孤執𤣥附庸之君執黃紹繼也猶言事也言其士女以匪盛音成𤣥黃之幣迎武王而事之也疏禮圖云篚以竹為之長三尺廣一尺深六寸足高三寸上有蓋商人而曰我周王猶商書所謂我后也休美也言武王能順天休命而事之者皆見休也臣附歸服也孟子又釋其意言商人聞周師之來各以其類相迎者以武王能救民於水火之中取其殘民者誅之而不為暴虐耳君子謂在位之人小人謂細民也太誓曰我武惟揚侵于之疆則取于殘殺伐用張于湯有光太誓周書也今書文亦小異言武王威武奮揚侵彼紂之疆界取其殘賊而殺伐之功因以張大比於湯之伐桀又有光焉引此以證上文取其殘之義不行王政云爾苟行王政四海之內皆舉首而望之欲以為君齊楚雖大何畏焉宋實不能行王政後果為齊所滅王偃走死尹氏曰為國者能自治而得民心則天下皆將歸往之恨其征伐之不蚤也尚何强國之足畏哉苟不自治而以彊弱之勢言之是可畏而已矣孟子謂戴不勝曰子欲子之王之善與我明告子有楚大夫於此欲其子之齊語也則使齊人傅諸使楚人傅諸曰使齊人傅之曰一齊人傅之衆楚人咻之雖日撻而求其齊也不可得矣引而置之莊嶽之間數年雖日撻而求其楚亦不可得矣與平聲咻音休戴不勝宋臣也齊語齊人語也傅教也咻歡音歡也齊齊語也莊嶽齊街里名也楚楚語也此先設譬以曉之也子謂薛居州善士也使之居於王所在於王所者長幼卑尊皆薛居州也王誰與為不善在王所者長幼卑尊皆非薛居州也王誰與為善一薛居州獨如宋王何長上聲居州亦宋臣言小人衆而君子獨無以成正君之功公孫丑問曰不見諸侯何義孟子曰古者不為臣不見不為臣謂未仕於其國者也此不見諸侯之義也段干木踰垣而辟之泄柳閉門而不內是皆巳甚迫斯可以見矣辟去聲內與納同段干木魏文侯時人通鑑文侯以卜子夏田子方段干木為師泄栁魯繆音目公時人泄栁即子柳見後篇文侯繆公欲見此二人而二人不肯見之蓋未為臣也已甚過甚也迫謂求見之切也陽貨欲見孔子而惡無禮大夫有賜於士不得受於其家則往拜其門陽貨瞰孔子之亡也而饋孔子蒸豚孔子亦瞰其亡也而往拜之當是時陽貨先豈得不見欲見之見音現惡去聲瞰音勘此又引孔子之事以明可見之節也徒見孔子欲召孔子來見己也惡無禮畏人以己為無禮也受於其家對使去聲人拜受於家也其門大夫之門也瞰窺也陽貨於魯為大夫孔子為士故以此物及其不在而饋之欲其來拜而見之也先謂先來加禮也曾子曰脅肩諂笑病于夏畦子路曰未同而言觀其色赧赧然非由之所知也由是觀之則君子之所養可知已矣脅虛業反赧奴簡反脅肩竦音悚體諂笑强上聲下同笑皆小人側媚之態也病勞也夏畦夏月治畦之人也言為此者其勞過於夏畦之人也未同而言與人未合而强與之言也赧赧慙而面赤之貌由子路名言非巳所知甚惡去聲之之辭也孟子言由此二言觀之則二子之所養可知必不肯不俟其禮之至而輒往見之也此章言聖人禮義之中正過之者傷於迫切而不洪不及者淪於汚音烏賤而可恥戴盈之曰什一去關市之征今兹未能請輕之以待來年然後已何如去上聲盈之亦宋大夫也什一井田之法也關市之征商賈音古之稅也巳止也孟子曰今有人日攘其鄰之雞者或告之曰是非君子之道曰請損之月攘一雞以待來年然後巳攘如羊反攘物自來而取之也損減也如知其非義斯速巳矣何待來年知義理之不可而不能速改與月攘一雞何以異哉公都子曰外人皆稱夫子好辨敢問何也孟子曰豫豈好辨哉豫不得已也天下之生久矣一治一亂好去聲下同治去聲生謂生民也一治一亂氣化盛衰人事得失反覆相尋理之常也當堯之時水逆行汜濫於中國蛇龍居之民無所定下者為巢上者為營窟書曰洚水警余洚水者洪水也洚音降又胡貢胡工二反水逆行下流壅塞故水倒流而旁溢也下下地上髙地也營窟穴處上聲也書虞書大禹謨也洚水洚胡貢反洞無涯之水也警戒也此一亂也使禹治之禹掘地而注之海驅蛇龍而放之菹水由地中行江淮河漢是也險阻既逺鳥獸之害人者消然後人得平土而居之菹側魚反掘地掘去上聲壅音擁塞也菹澤生草者也地中兩涯之間也險阻謂水之汜溢也逺去也消除也此一治也堯舜既沒聖人之道衰暴君代作壞宫室以為汙池民無所安息棄田以為園囿使民不得衣食邪說暴行又作園囿汙池沛澤多而禽獸至及紂之身天下又大亂壞音怪行去聲下同沛蒲內反暴君謂夏太康孔甲履癸商武乙之類也宫室民居也沛草木之所生也澤水所鍾也自堯舜沒至此治亂非一及紂而又一大亂也周公相武王誅紂伐奄三年討其君驅飛廉於海隅而戮之滅國者五十驅虎豹犀象而逺之天下大悅書曰丕顯哉文王謨丕承哉武王烈佑啓我後人咸以正無缺相去聲奄平聲奄東方之國助紂為虐者也飛廉紂幸臣也疏飛廉乃顓頊之苖裔善走其子惡來有力俱以材力事紂武王伐紂并殺之五十國比白紂黨虐民者也書周書君牙之篇丕大也顯明也謨謀也承繼也烈光也佑助也啓開也缺壞也此一治也世衰道微邪說暴行有作臣弒其君者有之子弒其父者有之有作之有讀為又古字通用此周室東遷之後又一亂也孔子懼作春秋春秋天子之事也是故孔子曰知我者其惟春秋乎罪我者其惟春秋乎胡氏名安國字康侯建安人曰仲尼作春秋以寓王法厚冝改作惇字典庸禮命德討罪其大要皆天子之事也知孔子者謂此書之作遏人欲於橫流存天理於既滅為後世慮至深逺也罪孔子者以謂無其位而託二百四十二年南面之權使亂臣賊子禁其欲而不得肆則戚矣愚謂孔子作春秋以討亂賊則致治之法垂於萬世是亦一治也聖王不作諸侯放恣處士橫議楊朱墨翟之言盈天下天下之言不歸楊則歸墨楊氏為我是無君也墨氏兼愛是無父也無父無君是禽獸也公明儀曰庖有肥肉廏有肥馬民有飢色野有餓莩此率獸而食人也楊墨之道不息孔子之道不著是邪說誣民充塞仁義也仁義充塞則率獸食人人將相食橫為皆去聲莩皮表反楊朱但知愛身而不復扶又反知有致身之義故無君墨子愛無差等而視其至親無異衆人故無父無父無君則人道滅絶是亦禽獸而已公明儀之言義見首篇充塞仁義謂邪說遍滿妨於仁義也孟子引儀之言以明楊墨道行則人皆無父無君以陷於禽獸而大亂將起是亦率獸食人而人又相食也此又一亂也吾為此懼間先聖之道距楊墨放淫辭邪說者不得作作於其心害於其事作於其事害於其政聖人復起不易吾言矣為去聲復扶又反間衛也放驅而逺去聲之也作起也事所行政大體也孟子雖不得志於時然楊墨之害自是滅息而君臣父子之道賴以不墜是亦一治也程子曰楊墨之害甚於申韓佛老之害甚於楊墨蓋楊氏為去聲我疑於義墨氏兼愛疑於仁申韓則淺陋易去聲見史記申韓傳申不害故鄭之賤臣學本於黃老而主刑名著書二篇號曰申子韓非者韓之諸公子也喜刑名法術之學而其歸本於黃老與李斯俱事荀卿斯自以為不如非故孟子止闢楊墨為其惑世之甚也佛氏之言近理又非楊墨之比所以為害尤甚昔者禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子成春狄而亂臣賊子懼抑止也兼并去聲之也總結上文也詩云戎狄是膺荆舒是懲則莫我敢承無父無君是周公所膺也說見上篇承當也我亦欲正人心息邪說距詖行放淫辭以承三聖者豈好辨哉豫不得已也行好皆去聲詖淫解見前篇辭者說之詳也承繼也三聖禹周公孔子也蓋邪說橫流壞音怪人心術甚於洪水猛獸之災慘於夷狄篡弒之禍故孟子深懼而力救之再言豈好辨哉豫不得已也所以深致意焉然非知道之君子孰能真知其所以不得已之故哉能言距楊墨者聖人之徒也言苟有能為此距楊墨之說者則其所趨正矣雖未必知道是亦聖人之徒也孟子既答公都子之問而意有未盡故復扶又反言此蓋邪說害正人人得而攻之不必聖賢如春秋之法亂臣賊子人人得而誅之不必士師也聖人救世立法之意其切如此若以此意推之則不能攻討而又唱為不必攻討之說者其為邪詖之徒亂賊之黨可知矣尹氏曰學者於是非之原毫釐有差則害流於生民禍及於後世故孟子辨邪說如是之嚴自以為承三聖之功也當是時方且以好辨目之是以常人之心而度待洛反聖賢之心也匡章曰陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見也井上有李螬食實者過半矣匍匐往將食之三咽然後耳有聞目有見於音烏下於陵同螬音曹咽音宴匡章陳仲子皆齊人亷有分辨不苟取也於陵地名螬蠐音齊螬蟲也匍匐言無力不能行也咽吞也孟子曰於齊國之士吾必以仲子為巨擘焉雖然仲子惡能亷充仲子之操則蚓而後可者也擘薄厄反惡平聲蚓音引巨擘大指也言齊人中有仲子如衆小指中有大指也尤推而滿之也操所守也蚓丘蚓也言仲子未得為亷也必若滿其所守之志則惟丘蚓之無求於世然後可以為亷耳夫蚓上食槁壤下飲黃泉仲子所居之室伯夷之所築與抑亦盜跖之所築與所食之粟伯夷之所樹與抑亦盜跖之所樹與是未可知也夫音扶與平聲槁壤乾音干土也黃泉濁水也抑發語辭也言蚓無求於人而自足而仲子未免居室食粟若所從來或有非義則是未能如蚓之亷也曰是何傷哉彼身織屨妻辟纑以易之也辟音壁纑音盧辟績也纑練麻也曰仲子齊之世家也兄戴蓋祿萬鍾以兄之祿為不義之祿而不食也以兄之室為不義之室而不居也辟兄離母處於於陵他日歸則有饋其兄生鵝者巳頻顣曰惡用是鶂鶂者為哉他日其母殺是鵝也與之食之其兄自外至曰是鶂鶂之肉也出而哇之蓋音閣辟音避頻與顰同顣與蹙同子六反惡平聲鶂魚乙反哇音蛙世家世卿之家兄名戴食采音菜於蓋其入萬鍾也歸自於陵歸也已仲子也鶂鶂鵝聲也頻顣而言以其兄受饋為不義也哇吐之也以母則不食以妻則食之以兄之室則弗居以於陵則居之是尚為能充其類也乎若仲子者蚓而後充其操者也言仲子以母之食兄之室為不義而不食不居其操去聲守如此至於妻所易之粟於陵所居之室既未必伯夷之所為則亦不義之類耳今仲子於此則不食不居於彼則食之居之豈為能充滿其操守之類者乎必其無求自足如丘蚓然乃為能滿其志而得為亷耳然豈人之所可為哉范氏曰天之所生地之所養無人為大三句出禮記祭義人之所以為大者以其有人倫也仲子避兄離母無親戚君臣上下是無人倫也豈有無人倫而可以為廉哉孟子纂箋卷六
