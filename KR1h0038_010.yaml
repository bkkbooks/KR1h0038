body:
  text: 欽定四庫全書論語纂箋卷六元詹道傳撰先進第十一此篇多評弟子賢否凡二十五章胡氏曰此篇記閔子騫言行去聲者四而其一直稱閔子疑閔氏門人所記也子曰先進於禮樂野人也後進於禮樂君子也先進後進猶言前輩後輩野人謂郊外之民國外曰郊郊外曰野郊有逺郊近郊四郊之分周禮縣師掌郊里之地注郊在國之外載師及司勳職遠郊近郊之征役注五十里為近郊百里為遠郊小司徒及閭師遂士掌四郊注四郊皆去國百里司馬法云畿內千里百里為郊聘禮注云上公五十里侯伯三十里子男十里近郊各半之郊外之地皆稱野君子謂賢士大夫也程子曰先進於禮樂文質得宜今反謂之質朴而以為野人後進之於禮樂文過其質今反謂之彬彬而以為君子蓋周末文勝故時人之言如此不自知其過於文也如用之則吾從先進用之謂用禮樂孔子既述時人之言又自言其如此蓋欲損過以就中也子曰從我於陳蔡者皆不及門也從去聲孔子嘗厄於陳蔡之間史記哀四年孔子在陳蔡之間楚使人聘孔子孔子將往陳蔡大夫諫曰孔子賢者久留陳蔡用事於楚則陳蔡危矣於是發徒役圍孔子於野不得行絶糧七日乃使子貢至楚楚昭王興師迎之弟子多從之者此時皆不在門故孔子思之蓋不忘其相如字從於患難去聲之中也德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏弟子因孔子之言記此十人而并目其所長分為四科孔子教人各因其材於此可見後漢鄭𤣥傳仲厄之門教以四科邢昺疏夫子門徒三千達者七十有二而此四科唯舉其翹楚者耳集注本此程子曰四科乃從夫子於陳蔡者爾門人之賢者固不止此曽子傳道而不與音預焉故知十哲世俗論也唐開元八年國子司業李瓘奏四科弟子宜參配享制曰顔生等十哲宜為坐像悉令從祀此十哲之論所從始也子曰回也非助我者也於吾言無所不說說音恱助我若子夏之起豫因疑問而有以相長去聲也顔子於聖人之言默識心通無所疑問故夫子云然其辭若有憾焉其實乃深喜之胡氏曰夫子之於回豈真以助我望之蓋聖人之謙德又以深贊顔氏云爾子曰孝哉閔子騫人不閒於其父母昆弟之言閒去聲胡氏曰父母兄弟稱其孝友人皆信之無異辭者蓋其孝友之實有以積於中而著於外故夫子歎而美之朱子或問曰韓詩外傳子騫早喪母父娶後妻生二子惡子騫衣以蘆花父察知之欲逐後妻子騫啓曰母在一子寒母去三子單父善之而止母改悔遂成慈母此其事實也夫子於弟子未嘗稱字或集語者之誤南容三復白圭孔子以其兄之子妻之三妻並去聲詩大雅抑之篇曰白圭之玷丁忝丁念二反尚可磨也斯言之玷不可為也南容一日三復此言事見家語家語弟子行篇云獨居思仁公言思義其於詩也則一日三復白圭之玷是宫縚之行也孔子信其能仁以為異士蓋深有意於謹言也此邦有道所以不廢邦無道所以免禍故孔子以兄子妻之范氏曰言者行去聲下同之表行者言之實未有易去聲其言而能謹於行者南容欲謹其言如此則必能謹其行矣季康子問弟子孰為好學孔子對曰有顔回者好學不幸短命死矣今也則亡范氏曰哀公康子問同而對有詳略者臣之告君不可不盡若康子者必待其能問乃告之此教誨之道也顔淵死顔路請子之車以為之椁顔路淵之父名無繇音由少去聲孔子六嵗孔子始教而受學焉見家語椁外棺也請為椁欲賣車以買椁也子曰才不才亦各言其子也鯉也死有棺而無椁吾不徒行以為之椁以吾從大夫之後不可徒行也鯉孔子之子伯魚也先孔子如字卒家語孔子三嵗而父叔梁紇卒葬於防至十九娶于宋开官氏一嵗而生伯魚魚之生也魯昭公以鯉魚賜孔子榮君之貺故因以名鯉年五十先孔子卒言鯉之才雖不及顔淵然已與顔路以父視之則皆子也孔子時已致仕尚從大夫之列言後謙辭胡氏曰孔子遇舊館人之喪嘗脫驂以賻音附之矣禮檀弓篇孔子之衛遇舊館人之喪入而哭之哀使子貢說驂而賻之今乃不許顔路之請何邪俗作耶葬可以無椁驂可以脫而復扶又反求大夫不可以徒行命車不可以與人而鬻余六反諸市也記禮云大夫賜命車王制曰命服命車不粥於市且為去聲所識窮乏者得我而勉强上聲以副其意豈誠心與直道哉或者以為君子行禮視吾之有無而已夫平聲君子之用財視義之可否豈獨視有無而已哉金氏曰考其時則顔淵之死且葬適當厄陳蔡之後自反陳之餘此正夫子之窮也夫喪事稱家之有無夫子既以此處其子安得不以此處顔淵乎夫子遇舊館人之喪嘗脫驂以致賻矣而不能為顔子之椁彼一時此一時貧富不同也胡氏之說雖善然不考於事而其流少恩矣顔淵死子曰噫天喪豫天喪豫噫傷痛聲悼道無傳若天喪已也顔淵死子哭之慟從者曰子慟矣從去聲慟哀過也曰有慟乎哀傷之至不自知也非夫人之為慟而誰為夫音扶為去聲夫人謂顔淵言其死可惜哭之宜慟非他人之比也胡氏曰痛惜之至施當其可皆性情之正也顔淵死門人欲厚葬之子曰不可喪具稱去聲家之有無見禮記檀弓篇貧而厚葬不循禮也故夫子止之門人厚葬之蓋顔路聽之子曰回也視豫猶父也豫不得視猶子也非我也夫二三子也歎不得如葬鯉之得宜以責門人也季路問事鬼神子曰未能事人焉能事鬼敢問死曰未知生焉知死焉於䖍反問事鬼神蓋求所以奉祭祀之意而死者人之所必有不可不知皆切問也然非誠敬足以事人則必不能事神非原始而知所以生則必不能反終而知所以死易繫辭曰原始反終故知死生之說蓋幽明始終初無二理但學之有序不可躐等故夫子告之如此程子曰晝夜者死生之道也知生之道則知死之道盡事人之道則盡事鬼之道死生人鬼一而二二而一者也或言夫子不告子路不知此乃所以深告之也閔子侍側誾誾如也子路行行如也冉有子貢侃侃如也子樂誾侃音義見前篇行胡浪反樂音洛行行剛强之貌子樂者樂得英才而教育之若由也不得其死然尹氏曰子路剛强有不得其死之理故因以戒之其後子路卒死於衛孔悝音恢之難去聲左哀十五年衛孔圉取太子蒯瞶之姊太子自戚入適伯姬氏既食孔伯姬杖戈而先太子與五人介輿豭從之迫孔悝於厠强盟之遂劫以登臺欒寧聞亂使告季子召穫奉衛侯輒來奔季子將入遇子羔將出曰門已閉矣季子曰吾姑至焉子羔曰弗及不踐其難季子曰食焉不辟其難子羔遂出子路入及門有使者出乃入曰太子焉用孔悝雖殺之必或繼之且曰太子無勇若燔臺半必舍孔叔太子聞之懼下石乞盂黶敵子路以戈擊之斷纓子路曰君子死冠不免結纓而死孔悝乃文子子伯姬所生子路時為孔悝邑宰洪氏曰漢書引此句上有曰字班固幽通賦注論語稱閔子云云子樂曰若由也不得其死然或云上文樂字即曰字之誤魯人為長府長府藏去聲名藏如字貨財曰府為蓋改作之閔子騫曰仍舊貫如之何何必改作仍因也貫事也王氏曰名安石字介甫臨川人改作勞民傷財在於得已則不如仍舊貫之善子曰夫人不言言必有中夫音扶中去聲言不妄發發必當去聲理惟有德者能之子曰由之瑟奚為於丘之門程子曰言其聲之不和與已不同也家語云子路鼓瑟有北鄙殺伐之聲家語辨樂解子路鼓琴孔子聞之謂冉有曰甚矣由之不才也夫先王之制音也奏中聲以為節流入於南不入於北南者生育之鄉北者殺伐之城舜彈南風之詩其興也勃然殷紂好為北鄙之音其亡也忽然又見說苑蓋其氣質剛勇而不足於中和故其發於聲者如此門人不敬子路子曰由也升堂矣未入於室也門人以夫子之言遂不敬子路故夫子釋之升堂入室喻入道之次第言子路之學已造七到反乎正大髙明之域特未深入精微之奧耳未可以一事之失而遽忽之也子貢問師與商也孰賢子曰師也過商也不及子張才髙意廣而好去聲為苟難故常過中子夏篤信謹守而規模狹隘故常不及曰然則師愈與與平聲愈猶勝也子曰過猶不及道以中庸為至賢知去聲之過難若勝於愚不肖之不及然其失中則一也尹氏曰中庸之為德也其至矣乎夫音扶過與不及均也差之毫釐繆以千里二句出禮記故聖人之教抑其過引其不及歸於中道而已季氏富於周公而求也為之聚斂而附益之為去聲周公以王室至親有大功位冢宰其富宜矣季氏以諸侯之卿而富過之非攘奪其君刻剝其民何以得此冉求為季氏宰又為去聲之急賦稅以益其富左哀十一年季孫欲以田賦使冉有訪諸仲尼仲尼曰若不度禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉弗聽明年終用田賦冉有聚斂蓋即田賦之事也子曰非吾徒也小子鳴鼓而攻之可也非吾徒絶之也小子鳴鼓而攻之使門人聲其罪以責之也聖人之惡去聲黨惡而害民也如此然師嚴而友親故已音矣絶之而猶使門人正之又見其愛人之無巳也范氏曰冉有以政事之才施於季氏故為不善至於如此由其心術不明不能反求諸身而以仕為急故也柴也愚柴孔子弟子姓髙字子羔衛人愚者知去聲不足而厚有餘家語記其足不履影啓蟄不殺方長上聲不折執親之喪泣血三年未嘗見賢遍反齒避難去聲而行不徑不竇可以見其為人矣家語弟子行篇髙柴自見孔子出入於户未嘗越履往來過之足不履影啓蟄不殺方長不折執親之喪泣血三年未嘗見齒是髙柴之行也致思篇蒯聵之亂季羔逃之走郭門守門者曰彼有缺季羔曰君子不喻又曰彼有竇季羔曰君子不隧又曰於此有室季羔乃入焉參也魯魯鈍也程子曰參也竟以魯得之又曰曽子之學誠篤而已聖門學者聰明才辨不為不多而卒𫝊其道乃質魯之人爾故學以誠實為貴也尹氏曰曽子之才魯故其學也確克角反所以能深造七到反乎道也師也辟辟婢亦反辟便平聲辟也謂習於容止少誠實也由也唁唁五旦反唁粗俗也𫝊去聲稱唁者謂俗論也楊氏曰四者性之偏語音御之使知自勵也吳氏曰此章之首脫子曰二字或疑下章子曰當在此章之首而通為一章子曰回也其庶乎屢空庶近也言近道也屢空數音朔至空匱也不以貧窶郡羽反動心而求富故屢至於空匱也言其近道又能安貧也賜不受命而貨殖焉億則屢中中去聲命謂天命貨殖貨財生殖也億意度音鐸也言子貢不如顔子之安貧樂音洛下同道然其才識之明亦能料事而多中也程子曰子貢之貨殖非若後人之豐財但此心未忘耳然此亦子貢少去聲時事至聞性與天道則不為此矣范氏曰屢空者簞食瓢飲屢絶而不改其樂也天下之物豈有可動其中者哉貧富在天而子貢以貨殖為心則是不能安受天命矣其言而多中者億而已非窮理樂天者也夫子嘗曰賜不幸言而中是使賜多言也左定十五年邾隱公來朝子貢觀焉邾子執玉髙其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度心已亡矣嘉事不體何以能久髙仰驕也卑俯替也驕近亂替近疾君為主其先亡乎夏五月壬申公薨仲尼曰賜不幸言而中是使賜多言者也聖人之不貴言也如是子張問善人之道子曰不踐迹亦不入於室善人質美而未學者也程子曰踐迹如言循塗守轍善人雖不必踐舊迹而自不為惡然亦不能入聖人之室也張子曰善人欲仁而未志於學者也欲仁故雖不踐成法亦不蹈於惡有諸己也由不學故無自而入聖人之室也子曰論篤是與君子者乎色莊者乎與如字言但以其言論篤實而與之則未知其為君子者乎為色莊者乎言不可以言貌取人也子路問聞斯行諸子曰有父兄在如之何其聞斯行之冉有問聞斯行諸子曰聞斯行之公西華曰由也問聞斯行諸子曰有父兄在求也問聞斯行諸子曰聞斯行之赤也惑敢問子曰求也退故進之由也兼人故退之兼人謂勝人也張敬夫曰聞義固當勇為然有父兄在則有不可得而専者若不稟命而行則反傷於義矣子路有聞未之能行唯恐有聞則於所當為不患其不能為矣特患為之之意或過而於所當稟命者有闕耳若冉求之資稟失之弱不患其不稟命也患其於所當為者逡巡畏縮而為之不勇耳聖人一進之一退之所以約之於義理之中而使之無過不及之患也子畏於匡顔淵後子曰吾以女為死矣曰子在回何敢死女音汝後謂相失在後何敢死謂不赴鬭而必死也胡氏曰先王之制民生於三事之如一惟其所在則致死焉國語晉語欒共子曰民生於三事之如一父生之師教之君食之非父不生非食不長非教不知生之族也故一事之唯其所在則致死焉况顔淵之於孔子恩義兼盡又非他人之為師弟子者而已邪一本邪作即屬下句夫子不幸而遇難去聲回必捐生以赴之矣捐生以赴之幸而不死則必上告天子下告方伯請討以復讐不但已也夫子而在則回何為而不愛其死以犯匡人之鋒乎季子然問仲由冉求可謂大臣與與平聲子然季氏子弟自多其家得臣二子故問之子曰吾以子為異之問曽由與求之問異非常也曽猶乃也輕二子以抑季然也所謂大臣者以道事君不可則止以道事君者不從君之欲不可則止者必行已之志今由與求也可謂具臣矣具臣謂備臣數而已曰然則從之者與與平聲意二子既非大臣則從季氏之所為而已子曰弒父與君亦不從也言二子雖不足於大臣之道然君臣之義則聞之熟矣弒逆大故必不從之蓋深許二子以死難去聲不可奪之節而又以隂折季氏不臣之心也尹氏曰季氏専權僣竊二子仕其家而不能正也知其不可而不能止也可謂具臣矣是時季氏已有無君之心故自多其得人意其可使從已也故曰弒父與君亦不從也其庶乎二子可免矣子路使子羔為費宰子路為季氏宰而舉之也子曰賊夫人之子夫音扶下同賊害也言子羔質美而未學遽使治民適以害之子路曰有民人焉有社稷焉何必讀書然後為學言治民事神皆所以為學子曰是故惡夫佞者惡去聲治民事神固學者事然必學之已成然後可仕以行其學若初未嘗學而使之即仕以為學其不至於慢神而虐民者幾希矣子路之言非其本意但理屈詞窮而取辦於口以禦人耳故夫子不斥其非而特惡其佞也范氏曰古者學而後入政未聞以政學者也左襄公三十一年鄭子皮欲使尹何為邑曰使夫往而學焉子産曰不可僑聞之學而後入政未聞以政學者也蓋道之本在於修身而後及於治人其說具於方冊讀而知之然後能行何可以不讀書也子路乃欲使子羔以政為學失先後本末之序矣不知其過而以口給禦人故夫子惡其佞也子路曽晳冉有公西華侍坐坐才臥反晳曽參父名㸃子曰以吾一日長乎爾毋吾以也長上聲言我雖年少上聲長於女汝同然女勿以我長而難言蓋誘之盡言以觀其志而聖人和氣謙德於此亦可見矣居則曰不吾知也如或知爾則何以哉言女平居則言人不知我如或有人知女則女將何以為用也子路率爾而對曰千乘之國攝乎大國之間加之以師旅因之以饑饉由也為之比及三年可使有勇且知方也夫子哂之乘去聲饑音機饉音僅比必二反下同哂詩忍反率爾輕遽之貌攝管束也二千五百人為師五百人為旅因仍也穀不熟曰饑萊不熟曰饉出爾雅方向也謂向義也民向義則能親其上死其長上聲矣哂微笑也求爾何如對曰方六七十如五六十求也為之比及三年可使足民如其禮樂以俟君子求爾何如孔子問也下放倣同此方六七十里小國也如猶或也五六十里則又小矣王制四海之內九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十又孟子公侯皆方百里伯七十子男五十足富足也俟君子言非已所能冉有謙退又以子路見哂故其辭益遜赤爾何如對曰非曰能之願學焉宗廟之事如㑹同端章甫願為小相焉相去聲公西華志於禮樂之事嫌以君子自居故將言已志而先為遜辭言未能而願學也宗廟之事謂祭祀諸侯時見形甸反曰㑹衆眺音眺曰同周禮春官大宗伯春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰㑹殷見曰同注此六禮者以諸侯見王為文六服之內四方以時分來或朝春或宗夏或覲秋或遇冬更遞而遍時見者無常期諸侯有不順服者王將有征討之事則既朝覲王為壇於國外合諸侯而命事焉春秋傳曰有事而㑹不協而盟是也殷猶衆也十二嵗王如不巡守則六服盡朝朝禮既畢王亦為壇合諸侯以命政焉所命之政如王巡守殷見四方四時分來終嵗則遍時聘曰問殷眺曰視注時聘亦無常期天子有事乃聘之焉竟外之臣既非朝嵗不敢瀆為小禮殷眺謂一服朝之嵗以朝者少諸侯乃使卿以大禮衆聘焉五服朝在元年七年十一年端𤣥端服章甫禮冠輔氏曰禮有𤣥端而冕若玉藻天子龍衮以祭𤣥端朝日諸侯𤣥端以祭是已有𤣥端而冠若朝𤣥端夕深衣是已有𤣥端而章甫如此章端章甫是已有𤣥端而委貌若晏平仲端委立于虎門是已鄭云端取其正謂士之衣袂皆二尺二寸而屬幅廣袤等也然則𤣥端之服古者君臣皆得服之章甫緇布冠也郊特牲云夏曰毋追音牟堆商曰章甫周曰委貌其制相比皆以漆布為之蓋三代常服行道之冠也相贊君之禮者周禮司儀出接賔曰擯入贊禮曰相言小亦謙辭㸃爾何如鼓瑟希鏗爾舍瑟而作對曰異乎三子者之撰子曰何傷乎亦各言其志也曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然嘆曰吾與㸃也鏗苦耕反舍上聲撰士免反莫冠並去聲沂魚依反雩音于四子侍坐以齒為序則㸃當次對以方鼓瑟故孔子先問求赤而後及㸃也史記仲尼弟子傳仲由少孔子九歲曾㸃與子參皆侍孔子按史記家語載曾參小孔子四十六嵗則曾㸃必少孔子十餘嵗合居子路之次冉有仲弓之族也少孔子二十九嵗公西華少孔子四十二嵗希閒去聲歇也作起也撰具也春服單夾音夾之衣單夾二義單是單衣夾是夾衣此時則衣無絮浴盥音管濯也今上已袚音拂除是也或問浴之為盥濯袚除曰漢志三月上已袚除官民潔於東流水上而蔡雍引此為證是也韓愈李翶疑裸身川浴之非禮而改浴為沿不察此耳沂水名在魯城南地志以為有溫泉焉理或然也風乘涼也舞雩祭天禱雨之處有壇墠音善樹木也月令有司大雩凡雩天子主上帝諸侯主星辰山川故謂祭天雩大旱之祭也舞雩者巫覡歌舞以求神也後篇舞雩下古注包曰舞雩之處有壇墠樹木疏封土為壇除地為墠曽㸃之學蓋有以見夫音扶人欲盡處天理流行隨處充滿無少缺闕故其動靜之際從七容反容如此而其言志則又不過即其所居之位樂音洛其日用之常初無舍上聲已為去聲人之意而其胸次悠然直與天地萬物上下同流各得其所之妙隱然自見形甸反於言外視三子之規規於事為之末者其氣象不侔矣故夫子歎息而深許之而門人記其本末獨加詳焉蓋亦有以識此矣三子者出曽晳後曽晳曰夫三子者之言何如子曰亦各言其志也已矣夫音扶曰夫子何哂由也㸃以子路之志乃所優為而夫子哂之故請其說曰為國以禮其言不讓是故哂之夫子蓋許其能特哂其不遜唯求則非邦也與安見方六七十如五六十而非邦也者與平聲下同曽㸃以冉求亦欲為國而不見哂故微問之而夫子之答無貶悲檢反詞蓋亦許之唯赤則非邦也與宗廟㑹同非諸侯而何赤也為之小孰能為之大此亦曽晳問而夫子答也孰能為之大言無能出其右者亦許之之詞程子曰古之學者優柔厭飫有先後之序如子路冉有公西赤言志如此夫子許之亦以此許之即所對孟武伯問子路冉有公西華者自是實事後之學者好去聲髙如人游心千里之外然自身却只在此又曰孔子與㸃蓋與聖人之志同便是堯舜氣象也誠異三子者之撰特行去聲有不掩焉耳此所謂狂也子路等所見者小子路只為去聲不達為國以禮道理是以哂之若達却便是這氣象也又曰三子皆欲得國而治之故夫子不取曽㸃狂者也未必能為聖人之事而能知夫子之志故曰浴乎沂風乎舞雩詠而歸言樂音洛而得其所也孔子之志在於老者安之朋友信之少去聲者懷之使萬物莫不遂其性曽㸃知之故夫子喟然嘆曰吾與㸃也又曰曽㸃漆雕開已見大意顔淵第十二凡二十四章顔淵問仁子曰克己復禮為仁一日克已復禮天下歸仁焉為仁由已而由人乎哉仁者本心之全德克勝也楊子問神篇勝己之私之謂克己謂身之私欲也復反也禮者天理之節文也為仁者所以全其心之德也蓋心之全德莫非天理而亦不能不壞於人欲故為仁者必有以勝私欲而復於禮則事皆天理而本心之德復扶又反全於我矣歸猶與也又言一日克己復禮則天下之人皆與其仁極言其效之甚速而至大也又言為仁由己而非他人所能預又見其機之在我而無難也日日克之不以為難則私欲淨盡天理流行而仁不可勝平聲用矣程子曰非理處便是私意既是私意如何得仁須是克盡己私皆歸於禮方始是仁又曰克己復禮則事事皆仁故曰天下歸仁謝氏曰克己須從性偏難克處克將去顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣目條件也顔淵聞夫子之言則於天理人欲之際已判然矣故不復扶又反有所疑問而直請其條目也非禮者已之私也勿者禁止之辭通志六書略勿者州里之旗故語録引說文勿字似旗腳此旗一麾三軍盡退是人心之所以為主而勝私復禮之機也私勝則動容周旋無不中去聲禮而日用之閒莫非天理之流行矣事如事事之事史記曹參傳卿大夫已下吏及賔客見參不事事請事斯語顔子默識其理又自知其力有以勝平聲之故直以為己任而不疑也程子曰顔淵問克己復禮之目子曰非禮勿視非禮勿聽非禮勿言非禮勿動四者身之用也由乎中而應乎外制於外所以養其中也顔淵事斯語所以進於聖人後之學聖人者冝服膺而勿失也因針以自警其視針曰心兮本虛應物無迹操平聲之有要視為之則蔽交於前其中則遷制之於外以安其內克己復禮久而誠矣其聽針曰人有秉彞本乎天性知誘物化遂亡其正卓彼先覺知止有定間邪存誠非禮勿聽其言針曰人心之動因言以宣發禁躁音竈妄內斯靜専矧是樞機興戎出好去聲吉凶榮辱惟其所召傷易去聲則誕傷煩則支已肆物忤五故反出悖來違非法不道欽哉訓辭其動針曰哲人知幾平聲下同誠之於思志士勵行去聲守之於為順理則裕從如字欲惟危造七到反次克念戰兢自持習與性成聖賢同歸愚按此章問答乃𫝊授心法切要之言非至明不能察其幾非至健不能致其決故惟顔子得聞之而凡學者亦不可以不勉也程子之針發明親切學者尤宜深玩仲弓問仁子曰出門如見大賔使民如承大祭已所不欲勿使於人在邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣敬以持己恕以及物則私意無所容而心德全矣內外無怨亦以其效言之使以自考也程子曰孔子言仁只說出門如見大賔使民如承大祭看其氣象便須心廣體胖動容周旋中去聲禮唯謹獨便是守之之法或問出門使民之時如此可也未出門使民之時如之何曰此儼若思時也有諸中而後見形甸反於外觀其出門使民之時其敬如此則前乎此者敬可知矣非因出門使民然後有此敬也愚按克己復禮乾道也主敬行恕坤道也顔冉之學其髙下淺深於此可見然學者誠能從事於敬恕之閒而有得焉亦將無已之可克矣司馬牛問仁司馬牛孔子弟子名犂向式亮反魋徒回反之弟宋人子曰仁者其言也訒認忍也難也仁者心存而不放故其言若有所忍而不易去聲發蓋其德之一端也夫子以牛多言而躁故告之以此使其於此而謹之則所以為仁之方不外是矣曰其言也訒斯謂之仁矣乎子曰為之難言之得無訒乎牛意仁道至大不但如夫子之所言故夫子又告之以此蓋心常存故事不苟事不苟故其言自有不得而易去聲者非强上聲閉之而不出也楊氏曰觀此及下章再問之語牛之易其言可知程子曰雖為去聲司馬牛多言故及此然聖人之言亦止此為是愚謂牛之為人如此若不告之以其病之所切而泛以為仁之大槩語音御之則以彼之躁必不能深思以去上聲其病而終無自以入德矣故其告之如此蓋聖人之言雖有髙下大小之不同然其切於學者之身而皆為入德之要則又初不異也讀者其致思焉司馬牛問君子子曰君子不憂不懼向魋作亂牛常憂懼故夫子告之以此哀十四年宋景公患桓魋將討之未及魋先謀之公知之遂攻魋其弟牛致其邑與圭而適齊陳成子使為次卿向魋亦奔齊牛又致其邑適吳吳人惡之而反卒於魯郭門曰不憂不懼斯謂之君子矣乎子曰內省不疚夫何憂何懼夫音扶牛之再問猶前章之意故復扶又反告之以此疚病也言由其平日所為無愧於心故能內省悉井反不疚而自無憂懼未可遽以為易去聲而忽之也朝氏曰不憂不懼由乎德全而無疵故無入而不自得非實有憂懼而强上聲排遣之也司馬牛憂曰人皆有兄弟我獨亡牛有兄弟而云然者憂其為亂而將死也子夏曰商聞之矣蓋聞之夫子死生有命富貴在天命稟於有生之初非今所能移天莫之為而為非我所能必但當順受而已君子敬而無失與人恭而有禮四海之內皆兄弟也君子何患乎無兄弟也既安於命又當修其在已者故又言苟能持己以敬而不閒去聲斷徒玩反接人以恭而有節文則天下之人皆愛敬之如兄弟矣蓋子夏欲以寬牛之憂故為是不得已之辭讀者不以辭害意可也胡氏曰子夏四海皆兄弟之言特以廣司馬牛之意意圎而語滯者也唯聖人則無此病矣且子夏知此而以哭子喪去聲明禮記檀弓篇子夏喪其子而喪其明則以蔽於愛而昧於禮是以不能踐其言爾子張問明子曰浸潤之譛膚受之訴不行焉可謂明也已矣浸潤之譛膚受之訴不行焉可謂逺也已矣譛莊䕃反訴蘇路反浸潤如水之浸灌滋潤漸將廉反漬而不驟也譛毁人之行去聲也膚受謂肌膚所受利害切身如易所謂剝床以膚切近災者也易剝之六四剝床以膚象曰切近災也訴訴已之寃也毁人者漸漬而不驟則聽者不覺其入而信之深矣訴寃者急迫而切身則聽者不及致詳而發之暴矣二者難察而能察之則可見其心之明而不蔽於近矣此亦必因子張之失而告之故其辭繁而不殺所界反以致丁寧之意云楊氏曰驟而語之與利害不切於身者不行焉有不待明者能之也故浸潤之譛膚受之訴不行然後謂之明而又謂之逺逺則明之至也書曰視逺惟明子貢問政子曰足食足兵民信之矣言倉廩實而武備修然後教化行而民信於我不離叛也子貢曰必不得已而去於斯三者何先曰去兵去上聲下同言食足而信孚則無兵而守固矣子貢曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立民無食必死然死者人之所必不免無信則雖生而無以自立不若死之為安故寧死而不失信於民使民亦寧死而不失信於我也程子曰孔門弟子善問直窮到底如此章者非子貢不能問非聖人不能答也愚謂以人情而言則兵食足而後吾之信可以孚於民以民德而言則信本人之所固有非兵食所得而先也是以為政者當身率其民而以死守之不以危急而可棄也棘子成曰君子質而已矣何以文為棘子成衛大夫疾時人文勝故為此言子貢曰惜乎夫子之說君子也駟不及舌言子成之言乃君子之意然言出於舌則駟馬不能追之又借其失言也文猶質也質猶文也虎豹之鞟猶犬羊之鞟鞟其郭反鞟皮去上聲下同毛者也言文質等耳不可相無若必盡去其文而獨存其質則君子小人無以辨矣夫音扶棘子成矯當時之弊固失之過而子貢矯子成之弊又無本末輕重之差胥失之矣哀公問於有若曰年饑用不足如之何稱有若者君臣之詞用謂國用公意蓋欲加賦以足用也有若對曰盍徹乎徹通也均也周制一夫受田百畝而與同溝共井之人通力合作計畝均收大率民得其九公取其一故謂之徹箋見孟子魯自宣公稅畝又逐畝什取其一則為什而取二矣春秋宣公十五年初稅畝左傳初稅畝非禮也穀生不過藉以豐財也故有若請但専行徹法欲公節用以厚民也曰二吾猶不足如之何其徹也二即所謂什二也公以有若不喻其㫖故言此以示加賦之意對曰百姓足君孰與不足百姓不足君孰與足民富則君不至獨貧民貧則君不能獨富有若深言君民一體之意以止公之厚斂去聲下同為人上者所宜深念也楊氏曰仁政必自經界始經界正而後井地均穀祿平而軍國之須皆量是以為出焉故一徹而百度舉矣上下寧憂不足乎以二猶不足而教之徹疑若迂矣然什一天下之中正多則桀寡則貉二語見揚子法言本孟子白圭曰章不可改也後世不究其本而唯末之圖故征斂無藝周禮匠人九夫為井鄭注諸侯専一國之政為其貪暴稅民無藝賈公彥疏藝謂準法費出無經而上下困矣又惡平聲知盍徹之當務而不為迂乎子張問崇德辨惑子曰主忠信徙義崇德也主忠信則本立徙義則日新愛之欲其生惡之欲其死既欲其生又欲其死是惑也惡去聲愛惡人之常情也然人之生死有命非可得而欲也以愛惡而欲其生死則惑矣既欲其生又欲其死則惑之甚也誠不以富亦祗以異此詩小雅我行其野之詞也舊說夫子引之以明欲其生死者不能使之生死如此詩所言不足以致富而適足以取異也程子曰此錯簡當在第十六篇齊景公有馬千駟之上因此下文亦有齊景公字而誤也楊氏曰堂堂乎張也難與並為仁矣則非誠善補過不蔽於私者故告之如此齊景公問政於孔子齊景公名杵臼魯昭公末年孔子適齊史記世家季平子得罪魯昭公昭公率師擊平子平子與孟氏叔孫氏三家共攻昭公昭公師敗奔於齊齊處昭公于乾侯魯亂孔子適齊為髙昭子家臣以通乎景公孔子對曰君君臣臣父父子子此人道之大經政事之根本也是時景公失政而大夫陳氏厚施去聲於國左昭二年晉少姜卒齊侯使晏嬰請繼室於晉既成昏晏子受禮叔向從之宴叔向曰齊其何如晏子曰此季世也吾弗知齊其為陳氏矣公棄其民而歸於陳氏齊舊四量豆區烏侯反釡鍾四升為豆各自其四以登於釡釜十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量收之山木如市弗加於山魚鹽蜃蛤弗加於海民參其力二入於公而衣食其一公聚朽蠧而三老凍餒國之諸市屨賤踊貴民人痛疾而或燠之於值反休虛位反其愛之如父母而歸之如流水欲無獲民將焉避之景公又多內嬖而不立太子左哀五年齊燕姬生子不成而死諸子鬻姒之子荼嬖諸大夫恐其為太子也言於公曰君之齒長矣未有太子若之何公曰二三子間音間於憂虞則有疾疢亦姑謀樂何憂於無君公疾使國惠子髙昭子立荼置羣公子於萊秋景公卒冬公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔六年八月陳僖子使召公子陽生而立之是為悼公公使朱毛遷孺子荼於駘殺之其君臣父子之間皆失其道故夫子告之以此公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸景公善孔子之言而不能用其後果以繼嗣不定啓陳氏弒君篡國之禍史記田敬仲世家五世孫田釐子乞事齊景公為大夫其收賦稅於民以小斗受之其粟豫民以大斗行隂德於民而景公弗禁由此田氏得齊衆心宗族益强景公太子死後有寵姬曰芮子生子荼景公病命其相國惠子髙昭子以荼為太子公卒兩相立荼是為晏孺子而田乞不恱以兵入公室攻昭子殺之惠子奔莒屢孺子奔魯田乞使人迎陽生於魯遂立陽生於田乞之家是為悼公田乞為相専齊政四年卒子恆立是為成子其後鮑牧弒悼公齊人共立其子壬是為簡公未幾田氏之徒弒簡公於徐州弟平公驁立田恆為相言於平公曰德施人之所欲君其行之刑罰人之所惡臣請行之行之五年齊國之政皆歸於田恆於是盡誅鮑晏及公族之强者而割齊自安平以東至琅琊自為封邑封邑大於平公之所食恆卒子襄子盤立卒子莊子白立卒子太公和立和遷齊康公於海上食一城以奉其先祀康公之十九年田和立為齊侯列於周室紀元年楊氏曰君之所以君臣之所以臣父之所以父子之所以子是必有道矣景公知善夫子之言而不知反求其所以然蓋恱而不繹者齊之所以卒於亂也子曰片言可以折獄者其由也與折之舌反與平聲片言半言折斷丁亂反也子路忠信明決故言出而人信服之不待其辭之畢也子路無宿諾宿留也猶宿怨之宿急於踐言不留其諾也記者因夫子之言而記此以見形甸反子路之所以取信於人者由其養之有素也尹氏曰小邾射音亦以句繹音溝亦奔魯曰使季路要平聲我吾無盟矣千乘去聲之國不信其盟而信子路之一言其見信於人可知矣左哀十四年小邾射以句繹來奔曰使季路要我吾無盟矣使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之一言子何辱焉對曰魯有事於小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能一言而折獄者信在言前人自信之故也不留諾所以全其信也子曰聽訟吾猶人也必也使無訟乎范氏曰聽訟者治其末塞其流也正其本清其源則無訟矣楊氏曰子路片言可以折獄而不知以禮遜為國則未能使民無訟者也故又記孔子之言以見聖人不以聽訟為難而以使民無訟為貴子張問政子曰居之無倦行之以忠居謂存諸心無倦則始終如一行謂發於事以忠則表裏如一程子曰子張少仁無誠心愛民則必倦而不盡心故告之以此子曰博學於文約之以禮亦可以弗畔矣夫重出子曰君子成人之美不成人之惡小人反是成者誘掖奬勸以成其事也君子小人所存既有厚薄之殊而其所好去聲又有善惡之異故其用心不同如此季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正范氏曰未有已不正而能正人者胡氏曰魯自中葉政由大夫家臣效尤據邑背音佩叛自季武子始専國政厯悼平桓子凡四世為家臣陽虎所執不正甚矣故孔子以是告之欲康子以正自克而改三家之故惜乎康子之溺於利欲而不能也季康子患盜問於孔子孔子對曰苟子之不欲雖賞之不竊言子不貪欲則雖賞民使之為盜民亦知恥而不竊胡氏曰季氏竊柄康子奪嫡民之為盜固其所也盍亦反其本邪孔子以不欲啓之其㫖深矣奪嫡事見春秋傳左哀三年季孫有疾命正常曰我死南孺子之子男也則以告而立之女也則肥也可季孫卒康子即位既葬康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退公使共劉視之則或殺之矣季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃焉於䖍反為政者民所視效何以殺為欲善則民善矣上一作尚加也偃仆音赴也尹氏曰殺之為言豈為人上之語哉以身教者從以言教者訟二句見後漢書第五倫傳而況於殺乎子張問士何如斯可謂之達矣達者德孚於人而行無不得之謂子曰何哉爾所謂達者子張務外夫子蓋已知其發問之意故反詰喫吉反之將以發其病而藥之也子張對曰在邦必聞在家必聞言名譽著聞也子曰是聞也非達也聞與達相似而不同乃誠僞之所以分學者不可不審也故夫子既明辨之下文又詳言之夫達也者質直而好義察言而觀色慮以下人在邦必達在家必達夫音扶下同好下皆去聲內主忠信而所行合宜審於接物而卑以自牧皆自修於內不求人知之事然德修於已而人信之則所行自無窒音質礙矣夫聞也者色取仁而行違居之不疑在邦必聞在家必聞行去聲善其顔色以取於仁而行實背音佩之又自以為是而無所忌憚此不務實而専務求名者故虛譽雖隆而實德則病矣程子曰學者須是務實不要近名有意近名大本已失更學何事為去聲下同名而學則是僞也今之學者大抵為名為名與為利雖清濁不同然其利心則一也尹氏曰子張之學病在乎不務實故孔子告之皆篤實之事充乎內而發乎外者也當時門人親受聖人之教而差失有如此者況後世乎樊遲從逰於舞雩之下曰敢問崇德修慝辨惑慝吐得反胡氏曰慝之字從心從匿蓋惡之匿於心者六書屬㑹意修者治平聲而去上聲之子曰善哉問善其切於為去聲已先事後得非崇德與攻其惡無攻人之惡非修慝與一朝之忿忘其身以反其親非惑與與平聲先事後得猶言先難後獲也為所當為而不計其功則德日積而不自知矣専於治已而不責人則已之惡無所匿矣知一朝之忿為甚微而禍及其親為甚大則有以辨惑而懲其忿矣樊遲粗亦作粗作粗鄙近利故告之以此三者皆所以救其失也范氏曰先事後得上義而下利也人惟有利欲之心故德不崇惟不自省悉井反已過而知人之過故慝不修感物而易去聲動者莫如忿忘其身以及其親惑之甚者也惑之甚者必起於細微能辨之於蚤則不至於大惑矣故懲忿所以辨惑也樊遲問仁子曰愛人問知子曰知人上知字去聲下同愛人仁之施知人知去聲下文知也知者言知仁知並同之務樊遲未達曽氏曰名幾字吉甫河南人遲之意蓋以愛欲其周而知有所擇故疑二者之相悖音佩耳子曰舉直錯諸枉能使枉者直舉直錯倉故反枉者知也使枉者直則仁矣如此則二者不唯不相悖而反相為用矣樊遲退見子夏曰鄉也吾見於夫子而問知子曰舉直錯諸枉能使枉者直何謂也鄉去聲見於之見賢遍反遲以夫子之言専為知者之事又未達所以能使枉者直之理子夏曰富哉言乎歎其所包者廣不止言知舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣選息戀反陶音遙逺如字伊尹湯之相去聲也不仁者逺言人皆化而為仁不見有不仁者若其逺去爾所謂使枉者直也子夏蓋有以知夫子之兼仁知而言矣程子曰聖人之語因人而變化雖若有淺近者而其包含無所不盡觀於此章可見矣非若他人之言語近則遺逺語逺則不知近也尹氏曰學者之問也不獨欲聞其說又必欲知其方不獨欲知其方又必欲為其事如樊遲之問仁知也夫子告之盡矣樊遲未達故又問焉而猶未知其何以為之也及退而問諸子夏然後有以知之使其未喻則必將復扶又反問矣既問於師又辨於友當時學者之務實也如是子貢問友子曰忠告而善道之不可則止無自辱焉告工毒反道去聲友所以輔仁故盡其心以告之善其說以道之然以義合者也故不可則止若以數音朔而見疏則自辱矣曽子曰君子以文㑹友以友輔仁講學以㑹友則道益明取善以輔仁則德日進論語纂箋卷六
