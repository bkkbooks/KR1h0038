body:
  text: 欽定四庫全書孟子纂箋卷十元詹道傳撰萬章下凡九章孟子曰伯夷目不視惡色耳不聽惡聲非其君不事非其民不使治則進亂則退橫政之所出橫民之所止不忍居也思與鄉人處如以朝衣朝冠坐於塗炭也當紂之時居北海之濵以待天下之清也故聞伯夷之風者頑夫亷懦夫有立志治去聲下同橫去聲朝音潮橫謂不循法度頑者無知覺亷者有分辨懦柔弱也餘並見前篇伊尹曰何事非君何使非民治亦進亂亦進曰天之生斯民也使先知覺後知使先覺覺後覺豫天民之先覺者也豫將以此道覺此民也思天下之民匹夫匹婦有不與被堯舜之澤者若已推而內之溝中其自任以天下之重也與音預何事非君言所事即君何使非民言所使即民無不可事之君無不可使之民也餘見前篇柳下惠不羞汙君不辭小官進不隱賢必以其道遺佚而不怨厄窮而不憫與鄉人處由由然不忍去也爾為爾我為我雖袒裼裸裎於我側爾焉能凂我哉故聞柳下惠之風者鄙夫寬薄夫敦鄙狹陋也敦厚也餘見前篇孔子之去齊接淅而行去魯曰遲遲吾行也去父母國之道也可以速而速可以久而久可以處而處可以仕而仕孔子也淅先歷反接猶承也淅漬疾智反米水也漬米將炊而欲去之速故以手承水取米而行不及炊也舉此一端以見形甸反其久速仕止各當如字下同其可也或曰孔子去魯不稅與脫同冕而行豈得為遲楊氏曰孔子欲去之意久矣不欲苟去故遲遲其行也膰肉不至則得以微罪行矣故不稅冕而行非速也孟子曰伯夷聖之清者也伊尹聖之任者也柳下惠聖之和者也孔子聖之時者也張子曰無所雜者清之極無所異者和之極勉而清非聖人之清勉而和非聖人之和所謂聖者不勉不思而至焉者也孔氏曰任者以天下為己責也愚謂孔子仕止久速各當其可蓋兼三子之所以聖者而時出之非如三子之可以一德名也或疑伊尹出處上聲合乎孔子而不得為聖之時何也程子曰終是任底意思在孔子之謂集大成集大成也者金聲而玉振之也金聲也者始條理也玉振之也者終條理也始條理者智之事也終條理者聖之事也此言孔子集三聖之事而為一大聖之事猶作樂者集衆音之小成而為一大成也成者樂之一終書所謂簫韶九成是也見虞書益稷篇金鍾屬聲宣也如聲罪致討之聲玉磬也振收也如振河海而不泄私列反之振始始之也終終之也條理猶言脈絡指衆音而言也智者知之所及聖者德之所就也蓋樂有八音金石絲竹匏土革木若獨奏一音則其一音自為始終而為一小成猶三子之所知偏於一而其所就亦偏於一也八音之中金石為重故特為衆音之綱紀又金始震而玉終詘渠勿反然也記聘儀叩之其聲清越以長其終詘然樂也注詘然絶止之貌故並奏八音則於其未作而先擊鎛伯各反鍾以宣其聲俟其既闋苦穴反而後擊特磬以收其韻宣以始之收以終之二者之間脈絡通貫無所不備則合衆小成而為一大成猶孔子之知無不盡而德無不全也金聲玉振始終條理疑古樂經之言故兒研兮反寬云惟天子建中和之極兼總條貫金聲而玉振之亦此意也武帝元鼎五年得寶鼎上問封禪儀寬論及此按語録云是時未有孟子之書必古曲中有此語然孟子之書出於文帝而董仲舒亦嘗辨孟子性善之說況兒寬又在後乃未詳語録之意智譬則巧也聖譬則力也由射於百步之外也其至爾力也其中非爾力也中去聲此復扶又反以射之巧力發明智聖二字之義見孔子巧力俱全而聖智兼備三子則力有餘而巧不足是以一節雖至於聖而智不足以及乎時中也此章言三子之行去聲各極其一偏孔子之道兼全於衆理所以偏者由其蔽於始是以缺於終所以全者由其知之至是以行之盡三子猶春夏秋冬之各一其時孔子則太和元氣之流行於四時也北宫錡問曰周室班爵祿也如之何錡魚綺反北宫姓錡名衛人班列也孟子曰其詳不可得聞也諸侯惡其害己也而皆去其籍然而軻也嘗聞其略也惡去聲去上聲當時諸侯兼并僭竊故惡周制妨害己之所為也按周禮司徒之職闕司祿一官三禮辨云孟子曰周室班爵祿之制諸侯惡其害己而皆去其籍此其證也天子一位公一位侯一位伯一位子男同一位凡五等也君一位卿一位大夫一位上士一位中士一位下士一位凡六等此班爵之制也五等通於天下六等施於國中天子之制地方千里公侯皆方百里伯七十里子男五十里凡四等不能五十里不逹於天子附於諸侯曰附庸此以下班祿之制也不能猶不足也小國之地不足五十里者不能自逹於天子因大國以姓名通謂之附庸若春秋邾儀父音甫之䫫是也春秋隱元年三月公及邾儀父盟于蔑缺春秋缺附庸凡缺等字者方三十里名缺天子之卿受地視侯大夫受地視伯元士受地視子男視比也徐氏曰王畿之內亦制都鄙受地也元士上士也大國地方百里君十卿祿卿祿四大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也十十倍之也四四倍之也倍加一倍也徐氏曰大國君田三萬二千畝其入可食音嗣下可食並同二千八百八十人卿田三千二百畝可食二百八十八人大夫田八百畝可食七十二人上士田四百畝可食三十六人中士田二百畝可食十八人下士與庶人在官者田百畝可食九人至五人庶人在官府史胥徒也周禮天官冢宰注府治藏史掌書胥徒民服徭役者若今衛士愚按君以下所食之祿皆助法之公田藉農夫之力以耕而收其租士之無田與庶人在官者則但受祿於官如田之入而已次國地方七十里君十卿祿卿祿三大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也三謂三倍之也徐氏曰次國君田二萬四千畝可食二千一百六十人卿田二千四百畝可食二百十六人小國地方五十里君十卿祿卿祿二大夫大夫倍上士上士倍中士中士倍下士下士與庶人在官者同祿祿足以代其耕也二即倍也徐氏曰小國君田一萬六千畝可食千四百四十人卿田一千六百畝可食百四十四人箋曰集注三說皆本王制所食人數則皆上農夫食九人之數王制疏云以史記云上地畝一鍾鍾六斛四斗百畝百鍾則六百四十斛案周禮廪人云中歲人食三釜一釜六斗四升其九人之內老幼相通不皆人食三釜故食九人也大國地方百里者開方法為方十里者百為田當九百萬畝案漢書班固曰地方一里為井井十為通通十為成成十為終終十為同開方法計之蓋地方一里為井為田九百畝井十為通通計積一十里為田九千畝通十為成方十里積百里為田九萬畝成十為終方三十一里大半里積千里也為田九十萬畝終十為同方百里積萬里為田九十億畝即九百萬畝也是所謂提封萬井也封者井之界提者總提封內之大數也萬井之中除山林陵麓溝洫城郭宫室塗邑三分去一計三千三百三十三井井之三之一外除三百萬畝實有田六千六百六十六井井之三之二每井九百畝計六百萬畝整除公田每井百畝計六十六萬六千六百六十六畝此是助法公田內每井再除二十畝為八家廬舍該除一十三萬三千三百三十四畝外公私通收五百八十六萬六千六百六十六畝畝之三之二私田收五百三十三萬三千三百三十三畝公田收五十三萬三千三百三十三畝畝之三之一君祿賦田三萬二千畝大國三卿每卿各賦三千二百畝計九千六百畝大國大夫五人各賦田八百畝計四千畝上士九人各賦田四百畝共計三千六百畝中士九人各賦田二百畝共計一千八百畝下士九人各賦田一百畝共計九百畝已上通賦五萬一千九百畝尚餘四十八萬一千四百三十三畝畝之三之一以供國家調度喪祭賔客等費餘則以備凶荒不測之用所謂國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國矣每畝所收可食之數再考任土地箋次國地方七十里者以開方計之為方十里者四十有九為方一里者四千九百為田四百四十一萬畝三分去一計為井一千六百三十三井井之三之一為田計一百四十七萬畝外實有為井三千二百六十六井井之三之二為田計二百九十四萬畝除公田每井百畝計三萬六千六百六十六畝畝之三之二公田內每井再除二十畝為八家廬舍該除六萬五千三百三十三畝畝之三之一公私通實收二百八十七萬四千六百六十六畝畝之三之二私田收二百六十一萬三千三百三十三畝畝之三之一公田收二十六萬一千三百三十三畝畝之三之一君祿賦田二萬四千畝卿田三大夫祿者大夫之田人八百畝三大夫祿則計二千四百畝大夫倍上士者上士缺百畝倍之則八百畝上士倍中士缺倍之則為缺百畝中士倍下士則缺則二百畝下士與庶人同祿則其缺制缺侯之下士祿農夫祿足以代其耕缺制缺三卿下大夫五人上士二十七人古缺士缺數國皆缺十七人各三分之上九中九下九也次國三卿卿二千四百畝三卿計七千二百畝下大夫五人人八百畝五人計四千畝上士田人四百畝上士九人則計田三千六百畝中士九人賦田二百畝共計一千八百畝下士九人人賦田百畝九人計九百畝已上自君田以下總賦田四萬一千五百畝尚餘二十一萬九千八百三十三畝畝之三之一小國地方五十里者開方計之為方十里者二十有五方一里者二千五百為田二百二十五萬畝三分去一計為井八百三十三井井之三之一為田七千五百畝實有為井一千六百六十六井井之三之二為田一百五十萬畝除公田每井百畝計一十六萬六千六百六十六畝畝之三之二公田內每井再除二十畝為八家廬舍該除三萬三千三百三十三畝畝之三之一公私通實收一百四十六萬六千六百六十六畝畝之三之二私田收一百三十三萬三千三百三十三畝畝之三之一公田收一十三萬三千三百三十三畝畝之三之一君祿賦田一萬六千畝卿祿倍大夫者大夫人賦田八百畝倍之則為一千六百畝大夫倍上士者上士人賦田四百畝倍之則為八百畝上士倍中士者中士人賦田二百畝倍之則為四百畝中士倍下士者下士田人賦一百畝倍之則為二百畝下士與庶人在官者同祿則人賦一百畝也王制云小國二卿下大夫五人上士二十七人各三分之上九中九下九也小國二卿每卿之田一千六百畝二卿則賦田三千二百畝下夫夫五人人賦田八百畝五人則賦田四千畝上士九人人賦田四百畝九人則計田三千六百畝中士九人人賦田二百畝九人則賦田一千八百畝下士九人人賦田百畝九人則計九百畝已上自君祿以下總賦田二萬九千五百畝尚餘一十萬三千八百三十三畝畝之三之一也耕者之所獲一夫百畝百畝之糞上農夫食九人上次食八人中食七人中次食六人下食五人庶人在官者其祿以是為差食音嗣獲得也一夫一婦佃田百畝加之以糞糞多而力勤者為上農其所收可供九人其次用力不齊故有此五等庶人在官者其受祿不同亦有此五等也愚案此章之說與周禮王制不同蓋不可考闕之可也缺地方五百里諸侯缺百里諸缺百里諸缺方百里而孟子缺公侯缺子男五十里小司徒云上地家七人下地家六人缺子言上地上農夫食九人上次食八人中食七人中次食六人此與周禮不同也王制言公侯伯子男凡五等而孟子以天子一位公一位侯一位伯一位子男同一位為五等王制言諸侯之上大夫卿下大夫上士中士下士凡五等而孟子則自君一位至下士一位凡六等王制主於分田制祿而孟子主於制地分祿王制言天子之三公田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸而孟子則言天子之卿受地視侯大夫視伯元士視子男此與王制不同也王制注云此地殷所因夏爵三等之制語録亦非之矣或以周禮兼附庸晦翁亦謂此皆强說先生嘗疑左氏所記當時官號職名已詳而未嘗及府史胥徒則周禮蓋亦草定之本未及行者又案王制疏云鄭答臨碩云王制復在孟子後盧植云漢文令博士諸生所作集注所謂其事蓋不可一二追復信矣程子曰孟子之時去先王未逺載籍未經秦火然而班爵祿之制已不聞其詳今之禮書皆掇拾於煨烏回反燼徐刃反之餘而多出於漢儒一時之傅音附㑹奈何欲盡信而句為之解乎然則其事固不可一二追復矣萬章問曰敢問友孟子曰不挾長不挾貴不挾兄弟而友友也者友其德也不可以有挾也挾者兼有而恃之之稱孟獻子百乘之家也有友五人焉樂正裘牧仲其三人則豫忘之矣獻子之與此五人者友也無獻子之家者也此五人者亦有獻子之家則不與之友矣乘去聲下同孟獻子魯之賢大夫仲孫蔑莫結反也張子曰獻子忘其勢五人者忘人之勢不資其勢而利其有然後能忘人之勢若五人者有獻子之家則反為獻子之所賤矣非惟百乘之家為然也雖小國之君亦有之費惠公曰吾於子思則師之矣吾於顔般則友之矣王順長息則事我者也費音祕般音班惠公費邑之君也師所尊也友所敬也事我者所使也非惟小國之君為然也雖大國之君亦有之晉平公之於亥唐也入云則入坐云則生食云則食雖疏食菜羮未嘗不飽蓋不敢不飽也然終於此而已矣弗與共天位也弗與治天職也弗與食天祿也士之尊賢者也非王公之尊賢也疏食之食音嗣平公王公下諸本多無之字疑闕文也亥唐晉賢人也平公造七到反之唐言入公乃入言坐乃坐言食乃食也疏食糲音厲又音賴又郎葛反飯也不敢不飽敬賢者之命也范氏曰位曰天位職曰天職祿曰天祿言天所以待賢人使治天民非人君所得專者也舜尚見帝帝館甥于二室亦饗舜迭為賔主是天子而友匹夫也尚上也舜上而見於帝堯也館舍也禮妻父曰外舅謂我舅者吾謂之甥見爾雅堯以女妻去聲舜故謂之甥二室副宫也堯舍舜於副宫而就饗其食用下敬上謂之貴貴用上敬下謂之尊賢貴貴尊賢其義一也貴貴尊賢皆事之宜者然當時但知貴貴而不知尊賢故孟子曰其義一也此言朋友人倫之一所以輔仁故以天子友匹夫而不為詘曲勿反以匹夫友天子而不為僭此堯舜所以為人倫之至而孟子言必稱之也萬章問曰敢問交際何心也孟子曰恭也際接也交際謂人以禮儀幣帛相交接也曰卻之卻之為不恭何哉曰尊者賜之曰其所取之者義乎不義乎而後受之以是為不恭故弗卻也卻不受而還之也再言之未詳萬章疑交際之間有所卻者人便以為不恭何哉孟子言尊者之賜而心竊計其所以得此物者未知合義與否必其合義然後可受不然則卻之矣所以卻之為不恭也曰請無以辭卻之以心卻之曰其取諸民之不義也而以他辭無受不可乎曰其交也以道其接也以禮斯孔子受之矣萬章以為彼既得之不義則其餽不可受但無以言辭間而卻之直以心度待洛反其不義而託於他辭以卻之如此可否邪交以道如餽贐間戒周其飢餓之類接以禮謂辭命恭敬之節孔子受之如受陽貨蒸豚之類也萬章曰今有禦人於國門之外者其交也以道其餽也以禮斯可受禦與曰不可康誥曰殺越人于貨閔不畏死凡民罔不憝是不待教而誅者也殷受夏周受殷所不辭也於今為烈如之何其受之與平聲憝書作憝徒對反禦止也止人而殺之且奪其貨也國門之外無人之處也萬章以為苟不問其物之所從來而但觀其交接之禮則設有禦人者用其禦得之貨以禮餽我則可受之乎康誥周書篇名越顛越也今書閔作愍無凡民二字憝怨也言殺人而顛越之因取其貨閔然不知畏死凡民無不怨之孟子言此乃不待教戒而當即誅者也如何而可受之乎商受至為烈十四字語意不倫李氏以為此必有斷簡或闕文者近之而愚意其直為衍字耳然不可考姑闕之可也曰今之諸侯取之於民也猶禦也苟善其禮際矣斯君子受之敢問何說也曰子以為有王者作將比今之諸侯而誅之乎其教之不改而後誅之乎夫謂非其有而取之者盜也充類至義之盡也孔子之仕於魯也魯人獵較孔子亦獵較獵較猶可而况受其賜乎比去聲夫音扶較音角比連也言今諸侯之取於民固多不義然有王者起必不連合而盡誅之必教之不改而後誅之則其與禦人之盜不待教而誅者不同矣夫音扶禦人於國門之外與非其有而取之二者固皆不義之類然必禦人乃為真盜其謂非有而取為盜者乃推其類至於義之至精至密之處而極言之耳非便以為真盜也然則今之諸侯雖曰取非其有而豈可遽以同於禦人之盜也哉又引孔子之事以明世俗所尚猶或可從況受其賜何為不可乎獵較未詳趙氏以為田獵相較奪禽獸以祭孔子不違所以小同於俗也張氏以為獵而較音教所獲之多少也二說未知孰是曰然則孔子之仕也非事道與曰事道也事道奚獵較也曰孔子先簿正祭器不以四方之食供簿正曰奚不去也曰為之兆也兆足以行矣而不行而後去是以未嘗有所終三年淹也與平聲此因孔子事而反覆辨論也事道者以行道為事也事道奚獵較也萬章問也先簿正祭器未詳徐氏曰先以簿書正其祭器使有定數而不以四方難繼之物實之夫音扶器有常數實有常品則其本正矣彼獵較者將久而自廢矣未知是否也兆猶卜之兆蓋事之端也孔子所以不去者亦欲小試行道之端以示於人使知吾道之果可行也若其端既可行而人不能遂行之然後不得已而必去之蓋其去雖不輕而亦未嘗不決是以未嘗終三年留於一國也孔子有見行可之仕有際可之仕有公養之仕於季桓子見行可之仕也於衛靈公際可之仕也於衛孝公公養之仕也見行可見其道之可行也際可接遇以禮也公養國君養賢之禮也季桓子魯卿季孫斯也衛靈公衛侯元也孝公春秋史記皆無之疑出公輒也因孔子仕魯而言其仕有此三者故於魯則兆足以行矣而不行然後去而於衛之事則又受其交際問餽而不卻之一驗也尹氏曰不聞孟子之義則自好去聲者為於音烏陵仲子而已聖賢辭受進退惟義所在愚案此章文義多不可曉不必强上聲為之說孟子曰仕非為貧也而有時乎為貧娶妻非為養也而有時乎為養為養並去聲下同仕本為去聲下同行道而亦有家貧親老或道與時違而但為祿仕者如娶妻本為繼嗣而亦有為不能親操倉刀反井臼而欲資其餽養者為貧者辭尊居卑辭富居貧貧富謂祿之厚薄蓋仕不為道已非出處上聲之正故其所居但當如此辭尊居卑辭富居貧惡乎宜乎抱關擊柝惡去聲柝音託柝夜行所擊木也蓋為貧者雖不主於行道而亦不可以苟祿故惟抱關擊柝之吏位卑祿薄其職易稱二字並去聲下同為所宜居也李氏曰道不行矣為貧而仕者此其律令也若不能然則是貪位慕祿而已矣孔子嘗為委吏矣曰㑹計當而已矣嘗為乘田矣曰牛羊茁壯長而已矣委烏僞反㑹工外反當都浪反乘去聲茁阻刮反長上聲此孔子之為貧而仕者也委吏主委積子賜反之吏也乘田主苑囿芻牧之吏也委吏乘田箋見論語序說茁肥貌言以孔子大聖而嘗為賤官不以為辱者所謂為貧而仕官卑祿薄而職易稱也位卑而言髙罪也立乎人之本朝而道不行恥也朝音潮以出位為罪則無行道之責以廢道為恥則非竊祿之官此為貧者之所以必辭尊富而寧處上聲貧賤也尹氏曰言為貧者不可以居尊居尊者必欲以行道萬章曰士之不託諸侯何也孟子曰不敢也諸侯失國而後託於諸侯禮也士之託於諸侯非禮也託寄也謂不仕而食其祿也古者諸侯出奔他國食其廪餼許既反謂之寄公記郊特牲諸侯不臣寓公故古者寓公不繼世注寓寄也如魯昭公為季氏所逐二十五年經書公孫於齊次于陽州齊侯唁公子野井曰自莒疆以西請致千社以待君命此即諸侯出奔他國食其廪餼也士無爵土不得比諸侯不仕而食祿則非禮也萬章曰君餽之粟則受之乎曰受之受之何義也曰君之於氓也固周之周救也視其空去聲乏則周恤與恤同之無常數君待民之禮也曰周之則受賜之則不受何也曰不敢也曰敢問其不敢何也曰抱關擊柝者皆有常職以食於上無常職而賜於上者以為不恭也賜謂豫通作與之祿有常數君所以待臣之禮也曰君餽之則受之不識可常繼乎曰繆公之於子思也亟問亟餽鼎肉子思不悅於卒也摽使者出諸大門之外北面稽首再拜而不受曰今而後知君之犬馬畜伋蓋自是臺無餽也悅賢不能舉又不能養也可謂悅賢乎亟去聲下同摽音杓使去聲亟數音朔也鼎肉熟肉也卒末也摽麾也數以君命來餽當拜受之非養賢之禮故不悅而於其末後復扶又反下同來餽時麾使者出拜而辭之犬馬畜許六反伋言不以人禮待已也臺賤官主使令平聲下同者左昭七年傳王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺人有十等也蓋繆公愧悟自此不復令臺來致餽也舉用也能養者未必能用況又不能養乎曰敢問國君欲養君子何如斯可謂養矣曰以君命將之再拜稽首而受其後廪人繼粟庖人繼肉不以君命將之子思以為鼎肉使已僕僕爾亟拜也非養君子之道也初以君命來餽則當拜受其後有司各以其職繼續所無不以君命來餽不使賢者有亟拜之勞也僕僕煩猥烏侮反貌堯之於舜也使其子九男事之二女女焉百官牛羊倉廪備以養舜於畎畝之中後舉而加諸上位故曰王公之尊賢者也女下字去聲能養能舉悅賢之至也唯堯舜為能盡之而後世之所當法也萬章曰敢問不見諸侯何義也孟子曰在國曰市井之臣在野曰草莽之臣皆謂庶人庶人不傳質為臣不敢見於諸侯禮也質與贄同傳通也質者士執雉庶人執騖音木見檀弓相見以自通者也國內莫非君臣但未仕者與執贄在位之臣不同故不敢見也萬章曰庶人召之役則往役君欲見之召之則不往見之何也曰往役義也往見不義也往役者庶人之職不往見者士之禮且君之欲見之也何為也哉曰為其多聞也為其賢也曰為其多聞也則天子不召師而況諸侯乎為其賢也則吾未聞欲見賢而召之也繆公亟見於子思曰古千乘之國以友士何如子思不悅曰古之人有言曰事之云乎豈曰友之云乎子思之不悅也豈不曰以位則子君也我臣也何敢與君友也以德則子事我者也奚可以與我友千乘之君求與之友而不可得也而況可召與為並去聲亟乘皆去聲召與之與平聲孟子引子思之言而釋之以明不可召之意齊景公田招虞人以旌不至將殺之志士不忘在溝壑勇士不忘喪其元孔子奚取焉取非其招不往也喪息浪反說見前篇曰敢問招虞人何以曰以皮冠庶人以旃士以旗大夫以旌皮冠田獵之冠也事見春秋傳左昭二十年十二月齊侯田於沛招虞人以弓不進公使執之辭曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之然則皮冠者虞人之所有事也故以是招之庶人未仕之臣通帛曰旃士謂已仕者交龍為旗析羽而注於旗干之首曰旌旗旌注本爾雅但彼云因章曰旃注以白帛而不畫因其文章又案周禮春官司常掌九旗之物日月為常交龍為旗通帛為旜雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌以大夫之招招虞人虞人死不敢往以士之招招庶人庶人豈敢往哉況乎以不賢人之招招賢人乎欲見而召之是不賢人之招也以士之招招庶人則不敢往以不賢人之招招賢人則不可往矣欲見賢人而不以其道猶欲其入而閉之門也夫義路也禮門也惟君子能由是路出入是門也詩云周道如砥其直如矢君子所履小人所視夫音扶砥詩作砥之履反詩小雅大東之篇砥與砥同礪音厲石也言其平也矢言其直也視視以為法也引此以證上文能由是路之義萬章曰孔子君命召不俟駕而行然則孔子非與曰孔子嘗仕有官職而以其官召之也與平聲孔子方仕而任職君以其官名召之故不俟駕而行徐氏曰孔子孟子易地則皆然此章言不見諸侯之義最為詳悉更合陳代公孫丑所問者而觀之其說乃盡孟子謂萬章曰一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士言已之善蓋於一鄉然後能盡友一鄉之善士推而至於一國天下皆然隨其髙下以為廣狹也以友天下之善士為未足又尚論古之人頌其詩讀其書不知其人可乎是以論其世也是尚友也尚上同言進而上也頌誦通論其世論其當世行事之迹也言既觀其言則不可以不知其為人之實是以又考其行去聲也夫音扶能友天下之善士其所友衆矣猶以為未足又進而取於古人是能進其取友之道而非止為一世之士矣齊宣王問卿孟子曰王何卿之問也王曰卿不同乎曰不同有貴戚之卿有異姓之卿王曰請問貴戚之卿曰君有大過則諫反覆之而不聼則易位大過謂足以亡其國者易位易君之位更立親戚之賢者蓋與君有親親之恩無可去之義以宗廟為重不忍坐視其亡故不得已而至於此也王勃然變乎色勃然變色貌曰王無異也王問臣臣不敢不以正對孟子言也王色定然後請問異姓之卿曰君有過財諫反覆之而不聽則去君臣義合不合則去此章言大臣之義親踈不同守經行權各有其分去聲貴戚之卿小過非不諫也但必大過而不聽乃可易位異姓之卿大過非不諫也雖小過而不聽已可去矣然三仁貴戚不能行之於紂而霍光異姓乃能行之於昌邑漢元平元年昭帝崩無嗣大將軍霍光立昌邑王賀為皇帝二十七日荒淫無度凡一千二百二十七事光白太后廢昌邑王歸本邑而立宣帝此又委任權力之不同不可以執一論也孟子纂箋卷十
