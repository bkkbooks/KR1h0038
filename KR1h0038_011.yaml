body:
  text: 欽定四庫全書論語纂箋卷七元詹道傳撰子路第十三凡三十章子路問政子曰先之勞之勞如字蘇氏曰凡民之行去聲以身先之則不令而行凡民之事以身勞之則雖勤不怨請益曰無倦無古本作毋吳氏曰勇者喜於有為而不能持久故以此告之程子曰子路問政孔子既告之矣及請益則曰無倦而已未嘗復扶又反有所告姑使之深思也仲弓為季氏宰問政子曰先有司赦小過舉賢才有司衆職也宰兼衆職然事必先之於彼而後考其成功則已不勞而事畢舉矣過失誤也大者於事或有所害不得不懲小者赦之則刑不濫而人心恱矣賢有德者才有能者舉而用之則有司皆得其人而政益修矣曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸焉於虔反舍上聲仲弓慮無以盡知一時之賢才故孔子告之以此程子曰人各親其親然後不獨親其親仲弓曰焉知賢才而舉之子曰舉爾所知爾所不知人其舍諸便見仲弓與聖人用心之大小推此義則一心可以興邦一心可以喪去聲邦只在公私之間爾范氏曰不先有司則君行臣職矣不赦小過則下無全人矣不舉賢才則百職廢矣失此三者不可以為季氏宰况天下乎子路曰衛君待子而為政子將奚先衛君謂出公輒也是時魯哀公之十年孔子自楚反乎衛子曰必也正名乎是時出公不父其父而禰乃禮反其祖父廟曰禰名實紊音問矣故孔子以正名為先謝氏曰正名雖為去聲衛君而言然為政之道皆當以此為先子路曰有是哉子之迂也奚其正迂謂逺於事情言非今日之急務也子曰野哉由也君子於其所不知蓋闕如也野謂鄙俗責其不能闕疑而率爾妄對也名不正則言不順言不順則事不成楊氏曰名不當其實則言不順言不順則無以考實而事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足中去聲范氏曰事得其序之謂禮物得其和之謂樂事不成則無序而不和故禮樂不興禮樂不興則施之政事皆失其道故刑罰不中故君子名之必可言也言之必可行也君子於其言無所苟而已矣程子曰名實相須一事苟則其餘皆苟矣胡氏曰衛世子蒯苦怪反聵五怪反恥其母南子之淫亂欲殺之不果而出奔左定十四年衛侯為夫人南子召宋朝太子蒯聵過宋野野人歌之曰既定爾婁豬求子豬也盍歸吾艾豭艾老也豭壯豖太子羞之謂戲許冝反陽速曰使我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見大子大子三顧違不進夫人見其色啼而走曰蒯聵將殺余公執其手以登臺大子奔宋盡逐其黨靈公欲立公子郢以井反靈公次子郢辭公卒夫人立之又辭乃立蒯聵之子輒以拒蒯聵左哀二年初衛侯遊于郊子南僕公曰余無子對曰郢不足以辱社稷君其改圖衛靈公卒夫人曰命公郢為大子君命也對曰郢異於他子且君沒於吾手若有之郢必聞之且亡人之子輒在乃立輒晉趙鞅納衛大子于戚夫音扶蒯聵欲殺母得罪於父而輒據國以拒父皆無父之人也其不可有國也明矣夫子為政而以正名為先必將具其事之本末告諸天王請于方伯命公子郢而立之則人倫正天理得名正言順而事成矣夫子告之之詳如此而子路終不喻也故事輒不去卒死其難去聲下同徒知食焉不避其難之為義而不知食輒之食為非義也樊遲請學稼子曰吾不如老農請學為圃曰吾不如老圃種五穀曰稼種蔬菜曰圃樊遲出子曰小人哉樊須也小人謂細民孟子所謂小人之事者也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫如是則四方之民襁負其子而至矣焉用稼好去聲夫音扶襁居丈反焉於虔反禮義信大人之事也好義則事合冝情誠實也敬服用情蓋各以其類而應也襁織縷為之以約小兒於背者博物志織縷為之廣八寸長丈二以約小兒於背楊氏曰樊須遊聖人之門而問稼圃志則陋矣辭而闢之可也待其出而後言其非何也蓋於其問也自謂農圃之不如則拒之者至矣須之學疑不及此而不能問不能以三隅反矣故不復扶又反下同及其既出則懼其終不喻也求老農老圃而學焉則其失愈逺矣故復言之使知前所言者意有在也子曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為使去聲專獨也詩本人情該物理可以驗風俗之盛衰見政治去聲之得失其言溫厚和平長於風去聲諭故誦之者必達於政而能言也程子曰窮經將以致用也世之誦詩者果能從政而專對乎然則其所學者章句之末耳此學者之大患也子曰其身正不令而行其身不正雖令不從子曰魯衛之政兄弟也魯周公之後衛康叔之後本兄弟之國魯始祖周公旦文王第四子周公子伯禽封於魯衛始祖康叔封文王少子而是時衰亂政亦相似故孔子歎之子謂衛公子荆善居室始有曰苟合矣少有曰苟完矣富有曰苟美矣公子荆衛大夫苟聊且粗坐五反略之意合聚也完備也言其循序而有節不以欲速盡美纍其心楊氏曰務為全美則纍物而驕吝之心生公子荆皆曰苟而已則不以外物為心其欲易去聲足故也子適衛冉有僕僕御車也子曰庶矣哉庶衆也冉有曰既庶矣又何加焉曰富之庶而不富則民生不遂故制田里薄賦斂去聲以富之曰既富矣又何加焉曰教之富而不教則近於禽獸故必立學校明禮義以教之胡氏曰天生斯民立之司牧而寄以三事然自三代之後能舉此職者百無一二漢之文明唐之太宗亦云庶且富矣西京之教無聞焉明帝尊師重傅臨雍拜老宗戚子弟莫不受學東漢禮儀志明帝永平二年三月上始帥羣臣躬養三老五更于辟雍三老五更皆齋于太學講堂其日乘輿先到辟雍禮殿御坐東廂遣使者安車迎三老五更天子迎於門屏交禮道自阼階三老升自賔階至階天子揖如禮親袒割牲執醬而饋執爵而酳以見禮遇大尊顯故也明帝崇尚儒學自皇太子諸王侯及大臣子弟功臣子孫莫不受經又為外戚樊氏郭氏隂氏馬氏諸子立學於南宫置五經師期門羽林之士悉令通孝經章句唐太宗大召名儒增廣生員唐書儒學傳貞觀六年詔罷周公祠更以孔子為先聖顔氏為先師盡召天下惇師考德以為學官數臨幸觀釋菜命祭酒博士講論經義賜以束帛生能通一經者得署吏廣學舍千二百區諸生員至三千二百自玄武屯營飛騎皆給博士受經教亦至矣然而未知所以教也三代之教天子公卿躬行於上言行去聲政事皆可師法彼二君者其能然乎子曰苟有用我者期月而已可也三年有成期月謂周一歲之月也可者僅辭言綱紀布也有成治去聲功成也尹氏曰孔子歎當時莫能用已也故云然愚按史記此蓋為去聲衛靈公不能用而發史記孔子去陳過蒲會公叔氏以蒲叛止孔子弟子公良孺鬭甚疾蒲人懼出孔子適衛靈公聞孔子來喜郊迎問曰蒲可伐乎對曰可云云公曰善然不伐蒲靈公老怠於政不用孔子孔子喟然嘆曰云云子曰善人為邦百年亦可以勝殘去殺矣誠哉是言也勝平聲去上聲為邦百年言相繼而久也勝殘化殘暴之人使不為惡也去殺謂民化於善可以不用刑殺也蓋古有是言而夫子稱之程子曰漢自髙惠至于文景黎民醇厚幾平聲致刑措庶乎其近之矣尹氏曰勝殘去殺不為惡而已善人之功如是若夫音扶聖人則不待百年其化亦不止此子曰如有王者必世而後仁王者謂聖人受命而興也三十年為一世説文三十年為一世從卅而曳長之仁謂教化浹即業反也程子曰周自文武至于成王而後禮樂興即其效也或問三年必世遲速不同何也程子曰三年有成謂法度紀綱有成而化行也漸將亷反民以仁摩民以義使之浹於肌膚淪於骨髓而禮樂可興所謂仁也此非積久何以能致子曰苟正其身矣於從政乎何有不能正其身如正人何冉子退朝子曰何晏也對曰有政子曰其事也如有政雖不吾以吾其與聞之朝音潮與去聲冉有時為季氏宰朝季氏之私朝也晏晚也政國政事家事以用也禮大夫雖不治事猶得與音預下文當與音同聞國政是時季氏専魯其於國政蓋有不與同列議於公朝而獨與家臣謀於私室者故夫子為不知者而言此必季氏之家事耳若是國政我嘗為大夫雖不見用猶當與聞今既不聞則是非國政也語意與魏徴獻陵之對略相似唐書魏徴傳文德皇后既葬帝即苑中作層觀以望昭陵后陵引徴同升徴熟視曰臣昏眊不能見帝指示之徴曰臣以為陛下望獻陵太宗母陵昭陵則臣固見之矣帝泣為毁觀其所以正名分扶問反抑季氏而教冉有之意深矣定公問一言而可以興邦有諸孔子對曰言不可以若是其幾也幾期也詩曰如幾音機如式見小雅楚茨篇言一言之間未可以如此而必期其效人之言曰為君難為臣不易易去聲當時有此言也如知為君之難也不幾乎一言而興邦乎因此言而知為君之難則必戰戰兢兢臨深履薄而無一事之敢忽然則此言也豈不可以必期於興邦乎為去聲定公言故不及臣也曰一言而喪邦有諸孔子對曰言不可以若是其幾也人之言曰豫無樂乎為君唯其言而莫豫違也喪去聲下同樂音洛言他無所樂惟樂此耳如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎范氏曰如不善而莫之違則忠言不至於耳君日驕而臣日諂丑險反未有不喪邦者也謝氏曰知為君之難則必敬謹以持之惟其言而莫豫違則讒諂面諛之人至矣邦未必遽興喪也而興喪之源分於此然此非識微之君子何足以知之葉公問政音義並見第七篇子曰近者説逺者來説音恱被其澤則説聞其風則來然必近者説而後逺者來也子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成父音甫莒父魯邑名欲事之速成則急遽無序而反不逹見小者之為利則所就者小而所失者大矣程子曰子張問政子曰居之無倦行之以忠子夏問政子曰無欲速無見小利子張常過髙而未仁子夏之病常在近小故各以切已之事告之葉公語孔子曰吾黨有直躬者其父攘羊而子證之語去聲直躬直身而行者有因而盜曰攘孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣為去聲父子相隱天理人情之至也故不求為直而直在其中謝氏曰順理為直父不為子隱子不為父隱於理順邪瞽䏂殺人舜竊負而逃遵海濵而處上聲當是時愛親之心勝其於直不直何暇計哉樊遲問仁子曰居處上聲恭執事敬與人忠雖之夷狄不可棄也恭主容敬主事恭見形甸反於外敬主乎中之夷狄不可棄勉其固守而勿失也程子曰此是徹上徹下語聖人初無二語也充之則睟雖醉反面盎背推而逹之則篤恭而天下平矣胡氏曰樊遲問仁者三此最先先難次之愛人其最後乎子貢問曰何如斯可謂之士矣子曰行已有恥使於四方不辱君命可謂士矣使去聲此其志有所不為而其材足以有為者也子貢能言故以使事告之蓋為使之難不獨貴於能言而已曰敢問其次曰宗族稱孝焉鄉黨稱弟焉弟去聲此本立而材不足者故為其次曰敢問其次曰言必信行必果硜硜然小人哉抑亦可以為次矣行去聲硜苦耕反果必行如字也硜小石之堅確克角反者小人言其識量去聲之淺狹也此其本末皆無足觀然亦不害其為自守也故聖人猶有取焉下此則市井之人不復扶又反可為士矣曰今之從政者何如子曰噫斗筲之人何足算也筲所交反算亦作算悉亂反今之從政者蓋如魯三家之屬噫心不平聲斗量去聲名容十升筲竹器容斗二升斗筲之人言鄙細也算數上聲也子貢之問每下故夫子以是警之程子曰子貢之意蓋欲為皎皎之行去聲聞於人者夫子告之皆篤實自得之事子曰不得中行而與之必也狂狷乎狂者進取狷者有所不為也行道也狂者志極髙而行去聲不掩狷者知未及而守有餘蓋聖人本欲得中道之人而教之然既不可得而徒得謹厚之人則未必能自振拔而有為也故不若得此狂狷之人猶可因其志節而激厲裁抑之以進於道非與其終於此而已也孟子曰孔子豈不欲中道哉不可必得故思其次也如琴張曽晳牧皮者孔子之所謂狂也其志嘐嘐然曰古之人古之人夷考其行而不掩焉者也狂者又不可得欲得不屑不潔之士而與之是狷也是又其次也子曰南人有言曰人而無恆不可以作巫醫善夫恆胡登反夫音扶南人南國之人恆常久也巫所以交鬼神醫所以寄死生故雖賤役而尤不可以無常孔子稱其言而善之不恆其德或承之羞此易恆卦九三爻辭承進也子曰不占而已矣復扶又反加子曰以别必列反易文也其義未詳楊氏曰君子於易苟玩其占平聲則知無常之取羞矣其為無常也蓋亦不占而已矣意亦略通子曰君子和而不同小人同而不和和者無乖戾之心同者有阿比毗至反之意尹氏曰君子尚義故有不同小人尚利安得而和子貢問曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之好惡皆去聲一鄉之人宜有公論矣然其間亦各以類自為好惡也故善者好之而惡如字者不惡則必其有苟合之行去聲惡如字者惡之而善者不好則必其無可好之實子曰君子易事而難説也説之不以道不説也及其使人也器之小人難事而易説也説之雖不以道説也及其使人也求備焉易去聲説音悅器之謂隨其材器而使之也君子之心公而恕小人之心私而刻天理人欲之間每相反而已矣子曰君子泰而不驕小人驕而不泰君子循理故安舒而不矜肆小人逞欲故反是子曰剛毅木訥近仁程子曰木者質朴訥者遲鈍四者質之近乎仁者也楊氏曰剛毅則不屈於物欲木訥則不至於外馳故近仁子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡胡氏曰切切懇到也偲偲詳勉也怡怡和悅也皆子路所不足故告之又恐其混於所施則兄弟有賊恩之禍朋友有善柔之損故又别必列反而言之子曰善人教民七年亦可以即戎矣教民者教之孝弟去聲忠信之行去聲務農講武之法國語三時務農一時講武即就也戎兵也民知親其上死其長上聲故可以即戎程子曰七年云者聖人度待洛反其時可矣如云期月三年百年一世大國五年小國七年之類皆當思其作為如何乃有益子曰以不教民戰是謂棄之以用也言用不教之民以戰必有敗亡之禍是棄其民也憲問第十四胡氏曰此篇疑原憲所記凡四十七章憲問恥子曰邦有道穀邦無道穀恥也憲原思名穀祿也邦有道不能有為邦無道不能獨善而但知食祿皆可恥也憲之狷介其於邦無道穀之可恥固知之矣至於邦有道穀之可恥則未必知也故夫子因其問而并言之以廣其志使知所以自勉而進於有為也克伐怨欲不行焉可以為仁矣此亦原憲以其所能而問也克好去聲勝伐自矜怨忿恨欲貪欲子曰可以為難矣仁則吾不知也有是四者而能制之使不得行可謂難矣仁則天理渾然自無四者之纍不行不足以言之也程子曰人而無克伐怨欲惟仁者能之有之而能制其情使不行斯亦難能也謂之仁則未也此聖人開示之深惜乎憲之不能再問也或曰四者不行固不得為仁矣然亦豈非所謂克己之事求仁之方乎曰克去上聲下同已私以復乎禮則私欲不留而天理之本然者得矣若但制而不行則是未有拔去病根之意而容其潛藏隱伏於胸中也豈克己求仁之謂哉學者察於二者之間則其所以求仁之功益親切而無滲所禁反漏矣子曰士而懷居不足以為士矣居謂意所便安處也子曰邦有道危言危行邦無道危行言孫行孫並去聲危髙峻也孫卑順也尹氏曰君子之持身不可變也至於言則有時而不敢盡以避禍也然則為國者使士言孫豈不殆哉子曰有德者必有言有言者不必有德仁者必有勇勇者不必有仁有德者和順積中英華發外樂記德者性之端也樂者德之華也云云和順積中英華發外唯樂不可以為偽能言者或便平聲佞口給而已仁者心無私纍見義必為勇者或血氣之強而已尹氏曰有德者必有言徒能言者未必有德也仁者志必勇徒能勇者未必有仁也南宫適問於孔子曰羿善射奡蕩舟俱不得其死然禹稷躬稼而有天下夫子不答南宫適出子曰君子哉若人尚德哉若人適古活反羿音詣奡五報反蕩土浪反金氏曰俗連然字句者非若由也不得其死然於未死之前期詞也則已死之後斷詞也然字喚起下文便見尚德之意南宫適即南容也羿有窮之君善射滅夏后相去聲而篡其位其臣寒浞士角反又殺羿而代之奡春秋傳作澆五弔反浞之子也力能陸地行舟後為夏后少去聲康所誅帝王世紀寒浞殺羿因羿之室生奡及豷奡多力能陸地行舟使奡帥師滅斟尋殺夏帝相左襄四年魏絳曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不修民事而淫于原獸用寒浞以為相浞行媚於內而施賂於外愚弄其民而虞羿於田樹之詐慝以取其國家羿歸自田家衆殺而烹之靡奔有鬲氏靡夏之臣浞因羿室生澆及豷音戲恃其才慝詐偽而不德於民使澆用師滅斟灌及斟尋氏靡自有鬲氏收二國之燼以滅浞而立少康少康滅澆后杼滅豷有窮遂亡禹平水土暨稷播種身親稼穡之事禹受舜禪時戰反而有天下稷之後至周武王亦有天下后稷名棄生於薑嫄舜封於邰别姓姬氏傳國至文王凡十六世適之意蓋以羿奡比當世之有權力者而以禹稷比孔子也故孔子不答然適之言如此可謂君子之人而有尚德之心矣不可以不與故俟其出而贊美之子曰君子而不仁者有矣夫未有小人而仁者也夫音扶謝氏曰君子志於仁矣然毫忽之間心不在焉則未免為不仁也子曰愛之能勿勞乎忠焉能勿誨乎蘇氏曰愛而勿勞禽犢之愛也忠而勿誨婦寺音蒔之忠也東漢楊彪傳彪子修為操所殺操見彪問曰公何瘦之甚對曰愧無日磾讀作密低先見之明猶懷老牛舐神旨反犢之愛操為之改容愛而知勞之則其為愛也深矣忠而知誨之則其為忠也大矣子曰為命禆諶草創之世叔討論之行人子羽修飾之東里子産潤色之禆婢之反諶時林反禆諶以下四人皆鄭大夫草略也創造也謂造為草稿也世叔遊吉也春秋傳作子太叔討尋究也論平聲講議也行人掌使去聲之官子羽公孫揮也修飾謂增損之東里地名子産所居也潤色謂加以文采也鄭國之為辭命必更平聲此四賢之手而成詳審精密各盡所長是以應對諸侯鮮上聲有敗事左襄三十一年子産之從政也擇能而使之馮簡子能斷大事子大叔美秀而文公孫揮能知四國之為而辨於其大夫之族姓班位貴賤能否而又善為辭令禆諶能謀鄭國將有諸侯之事子産乃問四國之為於子羽且使多為辭令與禆諶乘以適野使謀可否而告馮簡子使斷之事成乃授子大叔使行之以應對賔客是以鮮有敗事孔子言此蓋善之也或問子産子曰惠人也子産之政不専於寬然其心則一以愛人為主故孔子以為惠人蓋舉其重而言也左傳昭公二十年鄭子産有疾謂子大叔曰我死子必為政唯有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之則多死焉故寬難疾數月而卒大叔為政不忍猛而寬鄭國多盜取人於萑苻之澤萑苻音丸蒲澤名也大叔悔之曰吾蚤從夫子不及此興徒兵以攻萑苻之盜盡殺之問子西曰彼哉彼哉子西楚公子申能遜楚國立昭王而改紀其政亦賢大夫也左昭公二十六年楚平王卒令尹子常欲立子西子西平王之長庶子曰太子壬弱壬昭王也子西長而好善子西怒曰國有外援不可瀆也王有適嗣不可亂也敗親速讐亂嗣不祥我受其名賂吾以天下吾滋不從也楚國何為必殺令尹懼乃立昭王定公六年吳敗楚師楚國大惕懼亡令尹子西喜曰乃今可為矣於是遷都於婼音若而改紀其政以定楚國然不能革其僭王之號昭王欲用孔子又沮在吕反止之史記孔子厄於陳蔡昭王興師迎孔子將以書社七百里封孔子令尹子西曰文王武王百里之國卒王天下今孔丘據土壤賢子弟為佐非楚之福也乃止索隱曰古者二十五家為里里有社書其社之人名於籍蓋以七百書社之人封孔子也其後卒召白公以致禍亂見大學或問則其為人可知矣彼哉者外之之詞問管仲曰人也奪伯氏駢邑三百飯疏食沒齒無怨言人也猶言此人也伯氏齊大夫駢邑地名齒年也蓋桓公奪伯氏之邑以與管仲伯氏自知己罪而心服管仲之功故窮約以終身而無怨言荀卿所謂與之書社三百而富人莫之敢拒者即此事也荀子仲尼篇立為仲父而貴戚莫之敢妬也與髙國之位而本朝之臣莫之敢惡也與之書社三百而富人莫之敢距也或問管仲子産孰優曰管仲之德不勝其才子産之才不勝其德然於聖人之學則概乎其未有聞也子曰貧而無怨難富而無驕易易去聲處上聲下同貧難處富易人之常情然人當勉其難而不可忽其易也子曰孟公綽為趙魏老則優不可以為滕薛大夫公綽魯大夫趙魏晉卿之家老家臣之長上聲大家勢重而無諸侯之事家老望尊而無官守之責優有餘也滕薛二國名大夫任國政者滕薛國小政繁大夫位髙責重然則公綽蓋亷靜寡欲而短於才者也楊氏曰知之弗豫枉其才而用之則為棄人矣此君子所以患不知人也言此則孔子之用人可知矣子路問成人子曰若臧武仲之知公綽之不欲卞莊子之勇冉求之藝文之以禮樂亦可以為成人矣知去聲成人猶言全人武仲魯大夫名紇下沒反莊子魯卞邑大夫劉向新序曰莊子養母戰而三北及母死齊伐魯莊子赴鬭三獲甲首以獻曰此塞三北遂赴齊師殺十人而死又荀子大略篇齊人欲伐魯忌卞莊子不敢過卞注莊子魯卞邑大夫言兼此四子之長則知足以窮理亷足以養心勇足以力行藝足以泛應而又節之以禮和之以樂使德成於內而文見形甸反乎外則材全德備渾上聲然不見如字一善成名之迹中正和樂音洛粹然無復扶又反偏倚駁雜之蔽而其為人也亦成矣然亦之為言非其至者蓋就子路之所可及而語音御之也若論其至則非聖人之盡人道不足以語如字此曰今之成人者何必然見利思義見危授命久要平聲不忘平生之言亦可以為成人矣復扶又反下同加曰字者既答而復言也授命言不愛其生持以與人也久要舊約也平生平日也有是忠信之實則雖其才知去聲禮樂有所未備亦可以為成人之次也程子曰知之明信之篤行之果天下之逹德也若孔子所謂成人亦不出此三者武仲知也公綽仁也卞莊子勇也冉求藝也須是合此四人之能文之以禮樂亦可以為成人矣然而論其大成則不止於此若今之成人有忠信而不及於禮樂則又其次者也又曰臧武仲之知非正也若文之以禮樂則無不正矣又曰語成人之名非聖人孰能之孟子曰唯聖人然後可以踐形如此方可以稱去聲成人之名胡氏曰今之成人以下乃子路之言蓋不復聞斯行之之勇而有終身誦之之固矣未詳是否子問公叔文子於公明賈曰信乎夫子不言不笑不取乎公叔文子衛大夫公孫枝也公明姓賈名亦衛人文子為人其詳不可知然必亷靜之士故當時以三者稱之公明賈對曰以告者過也夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取子曰其然豈其然乎厭者苦其多而惡去聲之之辭事適其可則人不厭而不覺其有是矣是以稱之或過而以為不言不笑不取也然此言也非禮義充溢於中得時措之宜者不能文子雖賢疑未及此但君子與人為善不欲正言其非也故曰其然豈其然乎蓋疑之也子曰臧武仲以防求為後於魯雖曰不要君吾不信也要平聲防地名武仲所封邑也要有挾而求也武仲得罪奔邾自邾如防使請立後而避邑以示若不得請則將據邑以叛是要君也左襄二十三年傳季武子無適子公鉏長而愛悼子訪於臧紇臧紇為立之以公鉏為馬正愠而不出孟莊子之子長曰孺次曰羯其御豐點欲立羯謂公鉏曰苟立羯請讐臧氏及孟孫卒公鉏立羯秩奔邾孟氏閉門告於季孫曰臧氏將為亂不使我葬季孫命攻臧氏臧紇斬鹿門之關出奔邾後如防使來告曰紇非能害也知不足也非敢私請苟守先祀無廢二勳敢不避邑乃立臧為臧紇致防而奔齊范氏曰要君者無上孝經語罪之大者也武仲之邑受之於君得罪出奔則立後在君非己所得專也而據邑以請由其好知並去聲而不好學也楊氏曰武仲卑辭請後其迹非要君者而意實要之夫子之言亦春秋誅意之法也子曰晉文公譎而不正齊桓公正而不譎譎古穴反晉文公名重平聲耳齊桓公名小白譎詭也二公皆諸侯盟主攘夷狄以尊周室者也雖其以力假仁心皆不正然桓公伐楚仗義執言不由詭道猶為彼善於此左僖四年齊侯以諸侯之師伐楚曰爾貢包茅不入王祭不共無以縮酒寡人是徴昭王南征而不復寡人是問文公則伐衛以致楚而隂謀以取勝其譎甚矣左僖二十七年楚子及諸侯圍宋宋如晉告急狐偃曰楚始得曹而新昏於衛若伐曹衛楚必救之則齊宋免矣前年楚申叔戌榖以逼齊二十八年晉侯侵曹伐衛衛人出其君以説于晉晉侯入曹執曹伯分曹衛之田以畀宋人楚子玉使宛春告於晉師曰請復衛侯而封曹臣亦釋宋之圍先軫曰不許楚言是棄宋也救而棄之謂諸侯何不如私許復曹衛以攜之執宛春以怒楚既戰而後圖之乃拘宛春於衛且私許復曹衛曹衛告絶於楚子玉怒從晉師欒枝使輿曳柴而偽遁楚師馳之原軫以中軍公族橫擊之楚師敗績二君他事亦多類此故夫子言此以發其隱子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎糾居黝反召音邵按春秋傳齊襄公無道鮑叔牙奉公子小白奔莒音舉及無知弒襄公管夷吾召忽奉公子糾奔魯魯人納之未克而小白入是為桓公使魯殺子糾而請管召召忽死之管仲請囚鮑叔牙言於桓公以為相去聲左莊八年齊連稱管至父弒襄公而立公孫無知初襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒亂作管夷吾召忽奉公子糾來奔九年雍廩殺無知公伐齊納子糾桓公自莒先入鮑叔帥師來言曰子糾親也請君討之管召仇也請受而甘心焉乃殺子糾于生竇召忽死之管仲請囚鮑叔受之及堂阜而稅他活反之歸而以告曰管夷吾治於髙傒音奚使相可也公從之子路疑管仲忘君事讎忍心害理不得為仁也子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁九春秋傳作糾督也古字通用左僖二十六年齊伐我公使展喜犒師曰昔周公太公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府太師職之桓公是以糾合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也不以兵車言不假威力也如其仁言誰如其仁者又再言以深許之蓋管仲雖未得為仁人而其利澤及人則有仁之功矣子貢曰管仲非仁者與桓公殺公子糾不能死又相之與平聲相去聲子貢意不死猶可相之則已甚矣子曰管仲相桓公霸諸侯一匡天下民到于今受其賜微管仲吾其被髮左衽矣被皮寄反衽而審反霸與伯同長上聲也匡正也尊周室攘夷狄皆所以正天下也微無也衽衣襟也被髮左衽夷狄之俗也豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也諒小信也經縊一計反也莫之知人不知也後漢書引此文莫字上有人字後漢應邵獻帝時奏議曰昔召忽親死子糾之難而孔子曰經於溝瀆人莫之知程子曰桓公兄也子糾弟也按荀子仲尼篇齊桓公殺兄而爭國其後司馬遷杜元凱皆以子糾為兄獨漢書淮南厲王傳厲王上書不遜文帝令薄昭與書云周公誅管叔霍叔放蔡叔以安周齊桓殺其弟以返國韋昭注子糾兄也言弟者諱也程子斷以子糾為弟者雖有薄昭之言可證亦以春秋書法斷之經書小白係之以齊明其當有國而長矣仲私於所事輔之以爭國非義也桓公殺之雖過而糾之死實當去聲仲始與之同謀遂與之同死可也知輔之爭為不義將自免以圖後功亦可也故聖人不責其死而稱其功若使桓弟而糾兄管仲所輔者正桓奪其國而殺之則管仲之與桓不可同世之讐也若計其後功而與其事桓聖人之言無乃害義之甚啓萬世反覆不忠之亂乎如唐之王圭魏徴不死建成之難去聲而從太宗可謂害於義矣後雖有功何足贖哉唐書王圭傳建成為皇太子授中書舍人遷中允禮遇良厚太子與秦王世民有隙帝責圭不能輔導流嶲州太子已誅太宗召為諫議大夫魏徴傳太子引為洗馬徴見秦王功髙隂勸太子蚤為計太子敗王責謂曰爾鬩吾兄弟奈何答曰太子早從徴言不死今日之禍王器其直無恨意即位拜諫議大夫愚謂管仲有功而無罪故聖人獨稱其功王魏先有罪而後有功則不以相掩可也公叔文子之臣大夫僎與文子同升諸公僎士免反臣家臣公公朝音潮謂薦之與已同進為公朝之臣也子聞之曰可以為文矣文者順理而成章之謂諡法亦有所謂錫民爵位曰文者箋見第五篇洪氏曰家臣之賤而引之使與已並有三善焉知人一也忘已二也事君三也子言衛靈公之無道也康子曰夫如是奚而不喪夫音扶喪去聲下同喪失位也孔子曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪仲叔圉即孔文子也三人皆衛臣雖未必賢而其才可用靈公用之又各當去聲其才尹氏曰衛靈公之無道宜喪也而能用此三人猶足以保其國而况有道之君能用天下之賢才者乎詩曰無競維人四方其訓之詩大雅抑之篇子曰其言之不怍則為之也難大言不慚則無必為之志而不自度音鐸其能否矣欲踐其言豈不難哉陳成子弒簡公成子齊大夫名恆胡登反簡公齊君名壬事在春秋哀公十四年左傳齊簡公之在魯也闞止有寵焉及即位使為政陳成子憚之五月成子殺闞止執公于舒州弒之孔丘三日齊而請伐齊三公曰魯為齊弱久矣子之伐之將若之何對曰陳恆弒其君民之不與者半以魯之衆如齊之半可克也公曰子告季孫孔子辭退而告人曰以吾從大夫之後也故不敢不言孔子沐浴而朝告於哀公曰陳恆弒其君請討之朝音潮是時孔子致仕居魯沐浴齊側皆反戒以告君重其事而不敢忽也臣弒其君人倫之大變天理所不容人人得而誅之况鄰國乎故夫子雖已告老而猶請哀公討之公曰告夫三子夫音扶下告夫同三子三家也時政在三家哀公不得自専故使孔子告之孔子曰以吾從大夫之後不敢不告也君曰告夫三子者孔子出而自言如此意謂弒君之賊法所必討大夫謀國義所當告君乃不能自命三子而使我告之邪之三子告不可孔子曰以吾從大夫之後不敢不告也以君命往告而三子魯之強臣素有無君之心實與陳氏聲勢相倚故沮在吕反其謀而夫子復扶又反下同以此應之其所以警之者深矣程子曰左氏記孔子之言曰陳恆弒其君民之不豫與同者半以魯之衆加齊之半可克也此非孔子之言誠若此言是以力不以義也若孔子之志必將正名其罪上告天子下告方伯而率與國以討之至於所以勝齊者孔子之餘事也豈計魯人之衆寡哉當是時天下之亂極矣因是足以正之周室其復興乎魯之君臣終不從之可勝平聲惜哉胡氏曰春秋之法弒君之賊人得而討之仲尼此舉先發後聞可也子路問事君子曰勿欺也而犯之犯謂犯顔諫爭去聲范氏曰犯非子路之所難也而以不欺為難故夫子告以先勿欺而後犯也子曰君子上逹小人下逹君子循天理故日進乎髙明小人徇人欲故日究乎汙音烏下子曰古之學者為已今之學者為人為去聲程子曰為己欲得之於己也為人欲見知於人也程子曰古之學者為已其終至於成物今之學者為人其終至於喪已愚按聖賢論學者用心得失之際其説多矣然未有如此言之切而要者於此明辨而日省悉井反之則庶乎其不昧於所從矣蘧伯玉使人於孔子使去聲下同蘧伯玉衛大夫名瑗于眷反孔子居衛嘗主於其家史記孔子自陳適衛衛不能用將西見趙簡子至於河間簡子殺竇鳴犢及舜華乃反乎衛入蘧伯玉家既而反魯故伯玉使人來也孔子與之坐而問焉曰夫子何為對曰夫子欲寡其過而未能也使者出子曰使乎使乎與之坐敬其主以及其使也夫子指伯玉也言其但欲寡過而猶未能則其省身克己常若不及之意可見矣使者之言愈自卑約而其主之賢益彰亦可謂深知君子之心而善於詞令者矣故夫子再言使乎以重直用反美之按莊周稱伯玉行年五十而知四十九年之非又曰伯玉行年六十而六十化淮南子曰蘧伯玉行年五十而知四十九年非莊子則陽篇蘧伯玉行年六十而六十化未嘗不始於是之而卒詘之以非也蓋其進德之功老而不倦是以踐履篤實光輝宣著不惟使者知之而夫子亦信之也子曰不在其位不謀其政重出曽子曰君子思不出其位此艮卦之象辭也易艮卦大象傳辭曰兼山艮君子以思不出其位曽子蓋嘗稱之記者因上章之語而類記之也范氏曰物各止其所而天下之理得矣故君子所思不出其位而君臣上下大小皆得其職也子曰君子恥其言而過其行行去聲恥者不敢盡之意過者欲有餘之辭子曰君子道者三我無能焉仁者不憂知者不惑勇者不懼知去聲自責以勉人也子貢曰夫子自道也道言也自道猶云謙辭尹氏曰成德以仁為先進學以知為先故夫子之言其序有不同者以此子貢方人子曰賜也賢乎哉夫我則不暇夫音扶方比也乎哉疑辭比方人物而較其短長雖亦窮理之事然専務為此則心馳於外而所以自治者疏矣故褒之而疑其辭復扶又反自貶以深抑之謝氏曰聖人責人辭不迫切而意已獨至如此子曰不患人之不已知患其不能也凡章指同而文不異者一言而重平聲出也文小異者屢言而各出也此章凡四見而文皆有異學而篇不患人之不已知患不知人也里仁篇不患莫已知求為可知也衛靈公篇君子病無能焉不病人之不已知也與此章為四則聖人於此一事蓋屢言之其丁寧之意亦可見矣子曰不逆詐不億不信抑亦先覺者是賢乎逆未至而迎之也億未見而意之也詐謂人欺已不信謂人疑已抑反語辭言雖不逆不億而於人之情偽自然先覺乃為賢也楊氏曰君子一於誠而已然未有誠而不明者故雖不逆詐不億不信而常先覺也若夫不逆不億而卒為小人所罔焉斯亦不足觀也已微生畝謂孔子曰丘何為是栖栖者與無乃為佞乎與平聲微生姓畝名也畝名呼夫子而辭甚倨居御反蓋有齒德而隱者栖栖依依也為佞言其務為口給以悅人也孔子曰非敢為佞也疾固也疾惡去聲也固執一而不通也聖人之於逹尊禮恭而言直如此其警之亦深矣子曰驥不稱其力稱其德也驥善馬之名德謂調良也尹氏曰驥雖有力其稱在德人有才而無德則亦奚足尚哉或曰以德報怨何如或人所稱今見老子書德謂恩惠也老子道德經恩始章曰大小多少報怨以德圖難於其易為大於其細子曰何以報德言於其所怨既以德報之矣則人之有德於我者又將何以報之乎以直報怨以德報德於其所怨者愛憎取舍上聲一以至公而無私所謂直也於其所德者則必以德報之不可忘也或人之言可謂厚矣然以聖人之言觀之則見其出於有意之私而怨德之報皆不得其平也必如夫子之言然後二者之報各得其所然怨有不讎而德無不報則又未嘗不厚也此章之言明白簡約而其指意曲折反復芳服反如造化之簡易易並去聲知而微妙無窮學者所宜詳玩也子曰莫我知也夫夫音扶夫子自歎以發子貢之問也子貢曰何為其莫知子也子曰不怨天不尤人下學而上逹知我者其天乎不得於天而不怨天不合於人而不尤人但知下學而自然上逹此但自言其反已自修循序漸進耳無以甚異於人而致其知也然深味其語意則見其中自有人不及知而天獨知之之妙蓋在孔門唯子貢之智幾平聲足以及此故特語音御以發之惜乎其猶有所未逹也程子曰不怨天不尤人在理當如此又曰下學上逹意在言表又曰學者須守下學上逹之語乃學之要蓋凡下學人事便是上逹天理然習而不察則亦不能以上逹矣公伯寮訴子路於季孫子服景伯以告曰夫子固有惑志於公伯寮吾力猶能肆諸市朝朝音潮公伯寮魯人子服氏景諡伯字魯大夫子服何也夫子指季孫言其有疑於寮之言也肆陳尸也周禮注有罪既殺陳其尸曰肆言欲誅寮子曰道之將行也與命也道之將廢也與命也公伯寮其如命何與平聲謝氏曰雖寮之訴行亦命也其實寮無如之何愚謂言此以曉景伯安子路而警伯寮耳聖人於利害之際則不待決於命而後泰然也子曰賢者辟世辟去聲天下無道而隱若伯夷太公是也其次辟地去亂國適治去聲邦其次辟色禮貌衰而去其次辟言有違言而後去也程子曰四者雖以大小次第言之然非有優劣也所遇不同耳子曰作者七人矣李氏曰作起也言起而隱去者今七人矣不可知其誰何必求其人以實之則鑿矣子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而為之者與與平聲石門地名晨門掌晨啓門蓋賢人隱於抱關者也自從也問其何所從來也胡氏曰晨門知世之不可而不為故以是譏孔子然不知聖人之視天下無不可為之時也子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎荷去聲磬樂器荷擔也按韻書負荷之荷在上聲下可反又去聲蕢草器也此荷蕢者亦隱士也聖人之心未嘗忘天下此人聞其磬聲而知之則亦非常人矣既而曰鄙哉硜硜乎莫已知也斯已而已矣深則厲淺則揭硜苦耕反莫己之已音紀餘音以揭起例反硜硜石聲亦専確之意以衣涉水曰厲攝衣涉水曰揭二語見爾雅釋水文孫炎曰揭衣褰裳也衣涉濡禪也此兩句衛風匏有苦葉之詩也譏孔子人不知己而不止不能適淺深之冝子曰果哉末之難矣果哉歎其果於忘世也末無也聖人心同天地視天下猶一家中國猶一人不能一日忘也故聞荷蕢之言而歎其果於忘世且言人之出處若但如此則亦無所難矣子張曰書云髙宗諒隂三年不言何謂也髙宗商王武丁也諒隂天子居喪之名未詳其義蔡氏模曰喪服四制諒暗三年鄭注云諒古作梁楣謂之梁暗讀如鶉䳺之䳺暗謂廬也即倚廬之廬儀禮翦屏柱楣鄭氏注柱楣所謂梁暗是也書云王宅憂諒隂言居喪於梁暗也模按諒隂之義先人得於先師晚年面命者如此子曰何必髙宗古之人皆然君薨百官總已以聽於冢宰三年言君薨則諸侯亦然總己謂總攝己職冢宰大音泰宰也百官聽於冢宰故君得以三年不言也胡氏曰位有貴賤而生於父母無以異者故三年之喪自天子逹子張非疑此也殆以為人君三年不言則臣下無所稟令禍亂或由以起也孔子告以聽於冢宰則禍亂非所憂矣子曰上好禮則民易使也好易皆去聲謝氏曰禮逹而分去聲定此句出禮運故民易使子路問君子子曰修已以敬曰如斯而已乎曰修已以安人曰如斯而已乎曰修己以安百姓修己以安百姓堯舜其猶病諸修己以敬夫子之言至矣盡矣而子路少之故再以其充積之盛自然及物者告之無他道也人者對己而言百姓則盡乎人矣堯舜猶病言不可以有加於此以抑子路使反求諸近也蓋聖人之心無窮世雖極治去聲下同然豈能必知四海之內果無一物不得其所哉故堯舜猶以安百姓為病若曰吾治己足則非所以為聖人矣程子曰君子修己以安百姓篤恭而天下平唯上下一於恭敬則天地自位萬物自育氣無不和而四靈畢至矣記禮運四靈以為畜許六反故飲食有由也何謂四靈麟鳳龜龍謂之四靈此體信逹順之道禮運云先王能修禮以逹義體信以逹順故此順之實也聰明睿知皆由是出以此事天饗帝原壤夷俟子曰幼而不孫弟長而無述焉老而不死是為賊以杖叩其脛孫弟並去聲長上聲叩音口脛其定反原壤孔子之故人母死而歌記檀弓下孔子之故人曰原壤其母死孔子助之沐椁原壤登木曰久矣豫之不託於音也歌曰貍首之班然執女手之卷然夫子為弗聞也者而過之蓋老氏之流自放於禮法之外者夷蹲踞音存據也俟待也言見孔子來而蹲踞以待之也古注夷蹲踞蹲即坐也禮揖人必違其位今原壤聞孔子來乃伸兩足箕踞以待述猶稱也賊者害人之名以其自幼至老無一善狀而久生於世徒足以敗常亂俗則是賊而已矣脛按韻書形定反集注云其定反音小異足骨也孔子既責之而因以所曳之杖微擊其脛若使勿蹲踞然闕黨童子將命或問之曰益者與與平聲闕黨黨名童子未冠去聲者之稱將命謂傳賔主之言或人疑此童子學有進益故孔子使之傳命以寵異之也子曰吾見其居於位也見其與先生並行也非求益者也欲速成者也禮童子當隅坐隨行記檀弓曾子疾童子隅坐而執燭又王制父之齒隨行孔子言吾見此童子不循此禮非能求益但欲速成爾故使之給使令平聲之役觀長上聲少去聲之序習揖遜之容蓋所以抑而教之非寵而異之也論語纂箋卷七
