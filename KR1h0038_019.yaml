body:
  text: 欽定四庫全書孟子纂箋卷五元詹道傳撰滕文公上凡五章滕文公為世子將之楚過宋而見孟子世子太子也孟子道性善言必稱堯舜道言也性者人所稟於天以生之理也渾然至善未嘗有惡人與堯舜初無少異但衆人汩音骨於私欲而失之堯舜則無私欲之蔽而能充其性爾故孟子與世子言毎道性善而必稱堯舜以實之欲其知仁義不假外求聖人可學而至而不懈居隘反於用力也門人不能悉記其辭而撮其大㫖如此程子曰性即理也天下之理原其所自未有不善喜怒哀樂音洛未發何嘗不善發而中去聲下同節即無往而不善發不中節然後為不善故凡言善惡皆先善而後惡言吉凶皆先吉而後凶言是非皆先是而後非世子自楚反復見孟子孟子曰世子疑吾言乎夫道一而已矣復扶又反夫音扶時人不知性之本善而以聖賢為不可企及故世子於孟子之言不能無疑而復來求見蓋恐别有卑近易去聲行之說也孟子知之故但告之如此以明古今聖愚本同一性前言已盡無復扶又反有他說也成覸謂齊景公曰彼丈夫也我丈夫也吾何畏彼哉顔淵曰舜何人也予何人也有為者亦若是公明儀曰文王我師也周公豈欺我哉覸古莧反成覸人姓名彼謂聖賢也有為者亦若是言人能有為則皆如舜也公明姓儀名魯賢人也檀弓上子張之喪公明儀為志焉即此也文王我師也蓋周公之言公明儀亦以文王為必可師故誦周公之言而歎其不我欺也孟子既告世子以道無二致而復扶又反下同引此三言以明之欲世子篤信力行以師聖賢不當復求他說也今滕絶長補短將五十里也猶可以為善國書曰若藥不瞑眩厥疾不瘳瞑莫甸反眩音縣絶猶截也書商書說音恱命篇瞑眩憒古對反亂言滕國雖小猶足為治去聲但恐安於卑近不能自克則不足以去上聲惡而為善也愚按孟子之言性善始見形甸反於此而詳具於告子之篇然黙識如字而旁通之則七篇之中無非此理其所以擴前聖之未發而有功於聖人之門程子之言信矣滕定公薨世子謂然友曰昔者孟子嘗與我言於宋於心終不忘今也不幸至於大故吾欲使子問於孟子然後行事定公文公父也然友世子之傅也大故大喪也事謂喪禮然友之鄒問於孟子孟子曰不亦善乎親喪固所自盡也曽子曰生事之以禮死葬之以禮祭之以禮可謂孝矣諸侯之禮吾未之學也雖然吾嘗聞之矣三年之喪齊疏之服飦粥之食自天子達於庶人三代共之齊音資疏所居反飦諸延反當時諸侯莫能行古喪禮而文公獨能以此為問故孟子善之又言父母之喪固人子之心所自盡者蓋悲哀之情痛疾之意非自外至宜乎文公於此有所不能自己也但所引曽子之言本孔子告樊遲者豈曽子嘗誦之以告其門人歟三年之喪者子生三年然後免於父母之懐故父母之喪必以三年也齊衣下縫也不緝七入反曰斬衰音催下同緝之曰齊衰疏麤也麤布也飦糜也喪禮三日始食粥既葬乃疏食音嗣見喪大記此古今貴賤通行之禮也然友反命定為三年之喪父兄百官皆不欲曰吾宗國魯先君莫之行吾先君亦莫之行也至於子之身而反之不可且志曰喪祭從先祖曰吾有所受之也父兄同姓老臣也滕與魯俱文王之後文王之子周公旦其子伯禽封於魯文王子錯叔繡武王庶弟封於滕侯爵而魯祖周公為長上聲兄弟宗之故滕謂魯為宗國也然謂二國不行三年之喪者乃其後世之失非周公之法本然也志記也引志之言而釋其意以為所以如此者蓋為去聲上世以來有所傳受雖或不同不可改也然志所言本謂先王之世舊俗所傳禮文小異而可以通行者耳不謂後世失禮之甚者也謂然友曰吾他日未嘗學問好馳馬試劍今也父兄百官不我足也恐其不能盡於大事子為我問孟子然友復之鄒問孟子孟子曰然不可以他求者也孔子曰君薨聴於冢宰歠粥面深墨即位而哭百官有司莫敢不哀先之也上有好者下必有甚焉者矣君子之德風也小人之德草也草尚之風必偃是在世子好為皆去聲復扶又反歠川恱反不我足謂不以我滿足其意也然者然其不我足之言不可他求者言當責之於己冢宰六卿之長上聲也周禮六官天官為冢宰地官為司徒春官為宗伯夏官為司馬秋官為司冦冬官為司空司者以其各主一官也宗伯不言司者以祭祀非人所主天官冢宰以其總御衆官猶天道統理萬物歠飲也深墨甚黒色也即就也尚加也論語作上古字通也偃伏也孟子言但在世子自盡其哀而已然友反命世子曰然是誠在我五月居廬未有命戒百官族人可謂曰知及至葬四方來觀之顔色之戚哭泣之哀弔者大恱諸侯五月而葬記雜記士三月而葬是月卒哭大夫三月而葬五月而卒哭諸侯五月而葬七月而卒哭又左隠元年天子七月而葬同軌畢至言同軌以别四夷之國諸侯五月同盟至大夫三月同位至士踰月外姻至未葬居倚廬於中門之外記喪服大記父母之喪居倚廬不塗君為廬宫之大夫士檀之既葬柱楣塗廬不於顯者疏云此君大夫士居廬之禮謂於中門外東牆下倚木為廬因以草夾障不以泥塗之既葬情殺故柱楣稍舉以納日光又以泥塗以辟風寒若廬外之顯處則不塗也既葬則君大夫士皆宫之宫謂圍障之也袒露也蓋未葬則倚木為廬故云未葬居倚廬既葬而柱楣塗廬不得謂之倚廬矣問喪云成壙而歸不敢入處室居於倚廬哀親之在外也寢苫枕塊哀親之在草土也既虞剪屏柱楣寢有蓆既練舍於外寢凡初喪居廬堊室子為父臣為君各依親疎貴賤之序又按唐大厯中有楊垂撰喪服圖云設廬次於東廊下無廊於牆下北上凡起廬先以一木横於牆下去牆五尺卧於地為楣即立五椽於上斜倚東墉上以草苫蓋之其南北面亦以草屏之向北開户一孝一廬門簾以縗布廬形如偏屋其間容半席廬間施苫塊其廬南為堊室以墼壘三面上至屋如於牆下即亦如偏屋以瓦覆之西向户室施薦木枕室南為大功幕次中施蒲席次南為小功緦麻次施牀並西户如諸侯始起廬門外便有小屏餘則否為父與母同為繼母慈母居堊室如繼母有子即隨子居廬為妻準母其堊室及幕次不必毎人致之共處可也婦人次於西廊下居喪不言故未有命令教戒也可謂曰知疑有闕誤或曰皆謂世子之知禮也林氏曰孟子之時喪禮既壊然三年之喪惻隠之心痛疾之意出於人心之所固有者初未嘗亡也惟其溺於流俗之弊是以喪去聲其良心而不自知耳文公見孟子而聞性善堯舜之說則固有以啓發其良心矣是以至此而哀痛之誠心發焉及其父兄百官皆不欲行則亦反躬自責悼其前行去聲之不足以取信而不敢有非其父兄百官之心雖其資質有過人者而學問之力亦不可誣也及其斷丁亂反然行之而逺近見聞無不恱服則以人心之所同然者自我發之而彼之心恱誠服亦有所不期然而然者人性之善豈不信哉滕文公問為國文公以禮聘孟子故孟子至滕而文公問之孟子曰民事不可緩也詩云晝爾于茅宵爾索綯亟其乗屋其始播百穀綯音陶亟紀力反民事謂農事詩豳風七月之篇于往取也綯絞古巧反也亟急也乗升也播布也言農事至重人君不可以為緩而忽之故引詩言治屋之急如此者蓋以來春將復扶又反始播百穀而不暇為此也民之為道也有恒産者有恒心無恒産者無恒心苟無恒心放辟邪侈無不為已及陷乎罪然後從而刑之是罔民也焉有仁人在位罔民而可為也音義並見前篇是故賢君必恭儉禮下取於民有制恭則能以禮接下儉則能取民有制陽虎曰為富不仁矣為仁不富矣陽虎陽貨魯季氏家臣也天理人欲不容並立虎之言此恐為仁之害於富也孟子引之恐為富之害於仁也君子小人毎相反而已矣左定九年陽虎奔齊鮑文子曰陽虎親富而不親仁君焉用之夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也徹者徹也助者藉也徹敕列反藉子夜反此以下乃言制民常産與其取之之制也夏時一夫受田五十畝而毎夫計其五畝之入以為貢商人始為井田之制以六百三十畝之地畫為九區區七十畝中為公田其外八家各授一區但借其力以助耕公田而不復扶又反稅其私田周時一夫受田百畝鄉遂用貢法十夫有溝都鄙用助法八家同井鄉遂之地在國中周禮遂人所職是也都鄙之地在野外周禮匠人所職是也大司徒之職令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓是一萬二千五百家為鄉也遂人掌六遂猶司徒之六鄉也遂人以土地之圖經田野造縣鄙形體之法五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為遂朱子所謂以五起數者亦是一萬二千五百家為遂也皆有地域溝樹之此所謂鄉遂也遂人治野夫間有遂遂廣深各二尺遂上有徑可容牛馬十夫有溝則千畝之田也溝之深廣倍遂溝上有畛可容大車百夫有洫則萬畝之田也洫倍溝洫上有涂可容乗車一軌千夫有澮則十萬畝之田也澮廣二尋深二仞澮上有道可容二軌萬夫有川則百萬畝之田也川所以受溝洫澮之水川上有路可容三軌以達於畿畿亦遂之境也毎百夫之田為一經界十夫之田同一遂百夫之遂凡十而皆直溝有九而皆横百夫之田萬畝外其洫直千夫之田十萬畝外其澮横此鄉遂之大略也小司徒乃經土田而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都朱子所謂以四起數者此乃造都鄙采邑制井田異於鄉遂重立國毎丘之地縱横各三溝四丘之田為一甸十字中為四洫冬官考工記匠人為溝洫九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮鄭注云此畿内采地之制采地制井田異於鄉遂故匠人以一井至一同言之則以開方之法而言遂人以一夫至萬夫言之則以車運厲而言也奉新隂炤云鄉遂在近郊逺郊之間平原壙野可畫為萬夫之井故有溝洫途路都鄙謂甸稍縣都包山林陵麓在内難用溝洫整齊分畫但逐處畫為井田耕則通力而作収則計畝而分故謂之徹其實皆什一者貢法固以十分扶問反下同之一為常數惟助法乃是九一而商制不可考周制則公田百畝中以二十畝為廬舍一夫所耕公田實計十畝通私田百畝為十一分而取其一蓋又輕於十一矣前漢食貨志理民之道地著為本故必建步立畮正其經界六尺為步步百為畮畮百為夫夫三為屋屋三為井井方一里是為九夫八家共之各受私田百畮公田十畮是為八百八十畮餘二十畮以為廬舍出入相友守望相助疾病相救民是以和睦而教化齊同力役生産可得而平也民受田上田夫百畮中田夫二百畮下田夫三百畮嵗耕種者為不易上田休一嵗者為一易中田休二嵗者為再易下田三嵗更耕之自爰其處農民户人已受田其家衆男為餘夫亦以口受田如比士工商家受田五口乃當農夫一人此謂平土可以為法者也若山林藪澤原陵淳鹵之地各以肥磽多少為差民年二十受田六十歸田在野曰廬在邑曰里竊料商制亦當似此而以十四畝為廬舍一夫實耕公田七畝是亦不過十一也徹通也均也藉借也龍子曰治地莫善於助莫不善於貢貢者校數嵗之中以為常樂嵗粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉為民父母使民盻盻然將終嵗勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑惡在其為民父母也樂音洛盻五禮反從目從兮或音普莧反者非養去聲惡平聲龍子古賢人狼戾猶狼籍言多也糞㙲於用反也盈滿也盻禮韻胡計吾計二反謂陸音五禮反誤恨視也勤動勞苦也稱舉也貸他代反借也取物於人而出息以償之也益之以足取盈之數也稚幼子也夫世禄滕固行之矣夫音扶孟子嘗言文王治岐耕者九一仕者世禄二者王政之本也今世禄滕已行之惟助法未行故取於民者無制耳蓋世禄者授之土田使之食其公田之入實與助法相為表裏所以使君子野人各有定業而上下相安者也故下文遂言助法詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也雨于付反詩小雅大田之篇雨降雨也言願天雨於公田而遂及私田先公而後私也當時助法盡廢典籍不存惟有此詩可見周亦用助故引之也設為庠序學校以教之庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也人倫明於上小民親於下庠以養老為義校以教民為義序以習射為義皆鄉學也學國學也共之無異名也倫序也父子有親君臣有義夫婦有别長幼有序朋友有信此人之大倫也庠序學校皆以明此而已有王者起必來取法是為王者師也滕國褊俾淺反小雖行仁政未必能興王業然為王者師則雖不有天下而其澤亦足以及天下矣聖賢至公無我之心於此可見詩云周雖舊邦其命維新文王之謂也子力行之亦以新子之國詩大雅文王之篇言周雖后稷以來舊為諸侯其受天命而有天下則自文王始也子指文公諸侯未踰年之稱也左僖九年傳凡在喪王曰小童公侯曰子文十八年公薨既葬公子惡死經書冬十月子卒胡氏曰諸侯在喪稱子繼世不忍當也既葬不名終人子之事也踰年稱君緣臣民之心也使畢戰問井地孟子曰子之君將行仁政選擇而使子子必勉之夫仁政必自經界始經界不正井地不均穀禄不平是故暴君汙吏必慢其經界經界既正分田制禄可坐而定也夫音扶畢戰滕臣文公因孟子之言而使畢戰主為井地之事故又使之來問其詳也井地即井田也經界謂治地分田經畫其溝塗封植之界也此法不修則田無定分去聲而豪强得以兼并故井地有不均賦無定法而貪暴得以多取故穀禄有不平此欲行仁政者之所以必從此始而暴君汙吏則必欲慢而廢之也有以正之則分田制禄可不勞而定矣夫滕壤地褊小將為君子焉將為野人焉無君子莫治野人無野人莫養君子夫音扶養去聲言滕地雖小然其間亦必有為君子而仕者亦必有為野人而耕者是以分田制禄之法不可偏廢也金氏曰滕截長補短將五十里則是除山川林麓之類以田計也以開方法計之則五十里為田二千五百井二萬二千五百夫請野九一而助國中什一使自賦此分田制禄之常法所以治野人使養君子也野郊外都鄙之地也九一而助為公田而行助法也國中郊門之内鄉遂之地也田不井授但為溝洫使什而自賦其一蓋用貢法也周所謂徹法者蓋如此以此推之當時非惟助法不行其貢亦不止什一矣金氏曰此兩句與周制鄉遂用貢法都鄙用助法合語録國中行鄉遂之法如五家為比五比為閭四閭為族五族為黨五黨為州又如五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍皆五五相連屬所以行不得那九一之法故只得什一使自賦如都鄙却行井牧之法鄉遂之法次第是一家出一人兵且如五家為比比有一箇長了井牧之法次第是三十家方出得士十人徒十人卿以下必有圭田圭田五十畝此世禄常制之外又有圭田所以厚君子也圭潔也所以奉祭祀也見王制圭田無征疏不言世禄者滕已行之但此未備耳餘夫二十五畝程子曰一夫上父母下妻子以五口八口為率受田百畝如有弟是餘夫也年十六别受田二十五畝周禮匠人疏一家一人受田其餘老小尚有餘力者受二十五畝半於圭田此又不專指弟是餘夫也俟其壯而有室然後更受百畝之田愚按此百畝常制之外又有餘夫之田以厚野人也死徙無出鄉鄉田同井出入相友守望相助疾病相扶持則百姓親睦死謂葬也徙謂徙其居也同井者八家也友猶伴也守望防冦盜也方里而井井九百畝其中為公田八家皆私百畝同養公田公事畢然後敢治私事所以别野人也養去聲别彼列反此詳言井田形體之制乃周之助法也公田以為君子之禄而私田野人之所受先公後私所以别君子野人之分去聲也不言君子據野人而言省文耳上言野及國中二法此獨詳於治野者國中貢法當世己行但取之過於什一爾此其大略也若夫潤澤之則在君與子矣夫音扶井地之法諸侯皆去上聲其籍此特其大略而已潤澤謂因時制宜使合於人情宜於土俗而不失乎先王之意也吕氏曰子張子慨然有意三代之治論治人先務未始不以經界為急講求法制粲然備具要平聲之可以行於今如有用我者舉而措之耳嘗曰仁政必自經界始貧富不均教養無法雖欲言治皆苟而已世之病難行者未始不以亟奪富人之田為辭然兹法之行恱之者衆苟處上聲之有術期以數年不刑一人而可復所病者特上之未行耳乃言曰縱不能行之天下猶可驗之一鄉方與學者議古之法買田一方畫為數井上不失公家之賦役退以其私正經界分宅里立斂去聲法廣儲蓄興學校成禮俗救菑與災同恤患厚本抑末足以推先王之遺法明當今之可行有志未就而卒愚按喪禮經界兩章見孟子之學識其大者是以雖當禮法廢壊之後制度節文不可復扶又反考而能因略以致詳推舊而為新不屑屑於既往之迹而能合乎先王之意真可謂命世亞聖之才矣有為神農之言者許行自楚之滕踵門而告文公曰逺方之人聞君行仁政願受一㕓而為氓文公與之處其徒數十人皆衣褐捆屨織席以為食衣去聲捆音閫神農炎帝神農氏始為耒耜教民稼穡者也為其言者史遷所謂農家者流也金氏曰太史公六家指要無農家至班固藝文志分九流始有農家者流此集註未及改許姓行名也踵門足至門也仁政上章所言井地之法也㕓民所居也氓野人之稱褐毛布賤者之服也捆扣音口㧻竹角反之欲其堅也以為食賣以供食也程子曰許行所謂神農之言乃後世稱述上古之事失其義理者耳猶隂陽醫方稱黄帝之說也金氏曰黄帝使大撓作甲子始迎日推策故隂陽家說時日吉凶多推言黄帝醫家亦本黄帝岐伯設為問答之辭傳述古語雜以附㑹然比之諸家號為精深輔氏曰使真有神農黄帝之說傳於世孔孟豈不稱述陳良之徒陳相與其弟辛負耒耜而自宋之滕曰聞君行聖人之政是亦聖人也願為聖人氓陳良楚之儒者耜所以起土耒其柄也陳相見許行而大恱盡棄其學而學焉陳相見孟子道許行之言曰滕君則誠賢君也雖然未聞道也賢者與民並耕而食饔飱而治今也滕有倉廩府庫則是厲民而以自養也惡得賢饔音雍飱音孫惡平聲饔飱熟食也朝曰饔夕曰飱言當自炊爨七亂反以為食而兼治民事也厲病也許行此言蓋欲隂壊音怪孟子分别必列反君子野人之法孟子曰許子必種粟而後食乎曰然許子必織布而後衣乎曰否許子衣褐許子冠乎曰冠曰奚冠曰冠素曰自織之與曰否以粟易之曰許子奚為不自織曰害於耕曰許子以釡甑爨以鐵耕乎曰然自為之與曰否以粟易之衣去聲與平聲釡所以煮甑所以炊爨然火也鐵耜屬也此語八反皆孟子問而陳相對也以粟易械器者不為厲陶冶陶冶亦以其械器易粟者豈為厲農夫哉且許子何不為陶冶舍皆取諸其宫中而用之何為紛紛然與百工交易何許子之不憚煩曰百工之事固不可耕且為也舍去聲此孟子言而陳相對也械下戒反器釡甑之屬也陶為甑者冬官考工記塼埴之工陶旊賈公彦疏陶人為瓦器甑甗之屬旊人為瓦簋有虞氏尚陶器貴質故也旊音甫又音倣冶為釡鐵者舍止也或讀屬音燭上句舍謂作陶冶之處也然則治天下獨可耕且為與有大人之事有小人之事且一人之身而百工之所為備如必自為而後用之是率天下而路也故曰或勞心或勞力勞心者治人勞力者治於人治於人者食人治人者食於人天下之通義也與平聲食音嗣此以下皆孟子言也路謂奔走道路無時休息也治於人者見治於人也食人者出賦稅以給公上也食於人者見食於人也此四句皆古語而孟子引之也君子無小人則飢小人無君子則亂以此相易如字正猶農夫陶冶以粟與械器相易乃所以相濟而非所以相病也治天下者豈必耕且為哉當堯之時天下猶未平洪水横流氾濫於天下草木暢茂禽獸繁殖五穀不登禽獸偪人獸蹄鳥跡之道交於中國堯獨憂之舉舜而敷治焉舜使益掌火益烈山澤而焚之禽獸逃匿禹疏九河瀹濟漯而注諸海決汝漢排淮泗而注之江然後中國可得而食也當是時也禹八年於外三過其門而不入雖欲耕得乎瀹音藥濟子禮反漯他合反天下猶未平者洪荒之世生民之害多矣聖人迭興漸次除治至此尚未盡平也洪大也横流不由其道而散溢妄行也氾濫横流之貌暢茂長上聲盛也繁殖衆多也五穀稻黍稷麥菽也登成熟也道路也獸蹄鳥跡交於中國言禽獸多也敷布也益舜臣名烈熾也禽獸逃匿然後禹得施治水之功疏通也分也九河曰徒駭曰太史曰馬頰曰覆釡曰胡蘇曰簡曰潔曰鉤盤曰鬲音隔津按蔡氏書傳云爾雅九河一曰徒駭二曰太史三曰馬頰四曰覆釡五曰胡蘇六曰簡潔七曰鉤盤八曰鬲津其一則河之經流也先儒不知河之經流遂分簡潔為二然則朱子亦因郭璞註而誤也瀹亦疏通之意濟漯二水名決排皆去上聲其壅塞也汝漢淮泗亦皆水名也據禹貢及今水路惟漢水入江耳汝泗則入淮而淮自入海此謂四水皆入于江記者之誤也考之春秋晉嘗通吳而㑹之皆由陸而至其後夫差欲圖伯中原而患水道不通至哀九年始城䢴溝通射陽湖西北以入于淮江始有通淮之道矣孟子誤以為禹蓋因此也金氏曰當是疏九河瀹濟漯排淮江而注之海決汝泗而注之淮決漢而注之江后稷教民稼穡樹藝五穀五穀熟而民人育人之有道也飽食煖衣逸居而無教則近於禽獸聖人有憂之使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信放勲曰勞之來之匡之直之輔之翼之使自得之又從而振德之聖人之憂民如此而暇耕乎契音薛别彼列反長放昏上聲勞來去聲言水土平然後得以教稼穡疏說文種曰稼斂曰穡衣食足然後得以施教化后稷官名棄為之稷乃五穀之長故以稷為農官之稱后者有爵土之號如畢命稱周公君陳畢公為三后是也稷名棄者其母有邰氏出野履巨人跡而孕及生以為不祥而棄之故以棄名見詩大雅生民篇然言教民則亦非並耕矣樹亦種也藝殖也契亦舜臣名也司徒官名也人之有道言其皆有秉彝之性也然無教則亦放逸怠惰而失之故聖人設官而教以人倫亦因其固有者而道去聲之耳書曰天敘五典勅我五典五惇哉書臯陶謨篇此之謂也放勲本史臣賛堯之辭孟子因以為堯號也德猶惠也堯言勞如字者勞之來如字者來之邪者正之枉者直之輔以立之翼以行之使自得其性矣又從而提撕警覺以加惠焉不使其放逸怠惰而或失之蓋命契之辭也堯以不得舜為己憂舜以不得禹臯陶為己憂夫以百畝之不易為己憂者農夫也夫音扶易去聲易治也堯舜之憂民非事事而憂之也急先務而已所以憂民者其大如此則不惟不暇耕而亦不必耕矣分人以財謂之惠教人以善謂之忠為天下得人者謂之仁是故以天下與人易為天下得人難為易並去聲分人以財小惠而已教人以善雖有愛民之實然其所及亦有限而難久惟若堯之得舜舜之得禹臯陶乃所謂為天下得人者而其恩惠廣大教化無窮矣此所以為仁也孔子曰大哉堯之為君惟天為大惟堯則之蕩蕩乎民無能名焉君哉舜也巍巍乎有天下而不與焉堯舜之治天下豈無所用其心哉亦不用於耕耳與去聲則法也論語注則猶準也當以為正蕩蕩廣大之貌君哉言盡君道也巍巍髙大之貌不與猶言不相關言其不以位為樂音洛也吾聞用夏變夷者未聞變於夷者也陳良楚産也恱周公仲尼之道北學於中國北方之學者未能或之先也彼所謂豪傑之士也子之兄弟事之數十年師死而遂倍之此以下責陳相倍音佩師而學許行也夏諸夏禮義之教也變夷變化蠻夷之人也變於夷反見變化於蠻夷之人也産生也陳良生於楚在中國之南故北遊而學於中國也先過也豪傑才德出衆之稱言其能自拔於流俗也倍與背同言陳良用夏變夷陳相變於夷也昔者孔子没三年之外門人治任將歸入揖於子貢相嚮而哭皆失聲然後歸子貢反築室於場獨居三年然後歸他日子夏子張子游以有若似聖人欲以所事孔子事之彊曽子曽子曰不可江漢以濯之秋陽以暴之皜皜乎不可尚已任平聲彊上聲暴蒲木反皜音杲三年古者為去聲師心喪三年若喪父而無服也記檀弓上事師無犯無隠左右就養無方服勤至死心喪三年又云孔子之喪門人疑所服子貢曰昔者夫子之喪顔淵若喪子而無服喪子路亦然請喪夫子若喪父而無服任擔都濫反也場冢上之壇場也古本注疏云史記孔子葬魯城北泗上皇覽曰孔子冢去城一里冢營百畝南北廣十步東西十三步髙一丈二尺冢前以瓴甓為祠壇大六尺與地平本無祠堂冢塋中樹以百數皆異種魯人世世無能名其樹者孔子弟子異國人各持其方樹來種之塋中不生荆棘及刺人草有若似聖人蓋其言行去聲氣象有似之者如檀弓所記子游謂有子之言似夫子之類是也所事孔子所以事夫子之禮也江漢水多言濯之潔也秋日燥烈言暴之乾音干也皜皜潔白貌尚加也言夫子道德明著光輝潔白非有若所能彷妃兩反彿弗也或曰此三語者孟子賛美曽子之辭也今也南蠻鴃舌之人非先王之道子倍子之師而學之亦異於曽子矣鴃亦作鵙古役反鴃博勞也惡聲之鳥南蠻之聲似之指許行也吾聞出於幽谷遷于喬木者未聞下喬木而入於幽谷者小雅伐木之詩云伐木丁丁中耕反鳥鳴嚶嚶音鶯出自幽谷遷于喬木魯頌曰戎狄是膺荆舒是懲周公方且膺之子是之學亦為不善變矣魯頌閟宫之篇也膺擊也荆楚本號也舒國名近楚者也懲艾音乂也按今此詩為僖公之頌而孟子以周公言之亦斷上聲章取義也從許子之道則市賈不貳國中無偽雖使五尺之童適市莫之或欺布帛長短同則賈相若麻縷絲絮輕重同則賈相若五穀多寡同則賈相若屨大小同則賈相若賈音價下同陳相又言許子之道如此蓋神農始為市井故許行又託於神農而有是說也五尺之童言幼小無知也許行欲使市中所粥余六反之物皆不論精粗美惡但以長短輕重多寡大小為價也曰夫物之不齊物之情也或相倍蓰或相什伯或相千萬子比而同之是亂天下也巨屨小屨同賈人豈為之哉從許子之道相率而為偽者也惡能治國家夫音扶蓰音師又山綺反比必二反惡平聲倍一倍也蓰五倍也什伯千萬皆倍數也比次也孟子言物之不齊乃其自然之理其有精粗猶其有大小也若大屨小屨同價則人豈肯為其大者哉今不論精粗使之同價是使天下之人皆不肯為其精者而競為濫惡之物以相欺耳墨者夷之因徐辟而求見孟子孟子曰吾固願見今吾尚病病愈我且往見夷子不來辟音壁又音闢墨者治墨翟之道者夷姓之名徐辟孟子弟子孟子稱疾疑亦託辭以觀其意之誠否他日又求見孟子孟子曰吾今則可以見矣不直則道不見我且直之吾聞夷子墨者墨之治喪也以薄為其道也夷子思以易天下豈以為非是而不貴也然而夷子葬其親厚則是以所賤事親也不見之見音現又求見則其意已誠矣故因徐辟以質之如此直盡言以相正也莊子曰墨子生不歌死無服桐棺三寸而無椁莊子天下篇古之喪禮貴賤有儀上下有等天子棺椁七重諸侯五重大夫三重士再重今墨子獨生不歌死不服桐棺三寸而無椁以為法式是墨之治喪以薄為道也易天下謂移易天下之風俗也夷子學於墨氏而不從其教其心必有所不安者故孟子因以詰克乙反之徐子以告夷子夷子曰儒者之道古之人若保赤子此言何謂也之則以為愛無差等施由親始徐子以告孟子孟子曰夫夷子信以為人之親其兄之子為若親其鄰之赤子乎彼有取爾也赤子匍匐將入井非赤子之罪也且天之生物也使之一本而夷子二本故也夫音扶下同匍音蒲匐蒲北反若保赤子周書康誥篇文此儒者之言也夷子引之蓋欲援音爰儒而入於墨以拒孟子之非己又曰愛無差等施由親始則推吐灰反墨而附於儒以釋已所以厚葬其親之意皆所謂遁辭也孟子言人之愛其兄子與鄰之子本有差等書之取譬本為去聲小民無知而犯法如赤子無知而入井耳且人物之生必各本於父母而無二乃自然之理若天使之然也故其愛由此立而推以及人自有差等今如夷子之言則是視其父母本無異於路人但其施之之序姑自此始耳非二本而何哉然於先後之間猶知所擇則又本心之明有終不得而息者此其所以卒能受命而自覺其非也蓋上世嘗有不葬其親者其親死則舉而委之於壑他日過之狐狸食之蠅蚋姑嘬之其顙有泚睨而不視夫泚也非為人泚中心達於面目蓋歸反蘽梩而掩之掩之誠是也則孝子仁人之掩其親亦必有道矣蚋音汭嘬楚怪反泚七禮反睨音詣為去聲蘽力追反梩力知反因夷子厚葬其親而言此以深明一本之意上世謂太古也委棄也壑山水所趨也蚋蛟屬姑語助聲或曰螻音婁蛄音姑也嘬攅徂官反共食之也顙額也泚泚然汗出之貌睨邪視也視正視也不能不視而又不忍正視哀痛迫切不能為心之甚也非為人泚言非為他人見之而然也所謂一本者於此見之尤為親切蓋惟至親故如此在他人則雖有不忍之心而其哀痛迫切不至若此之甚矣反覆也蘽土籠平聲箋見論語功虧一簣下也梩土轝音預也於是歸而掩覆敷救反其親之尸此葬埋之禮所由起也此掩其親者若所當然則孝子仁人所以掩其親者必有其道而不以薄為貴矣徐子以告夷子夷子憮然為間曰命之矣憮音武間如字憮然茫然自失之貌為間者有頃之間也命猶教也言孟子已教我矣蓋因其本心之明以攻其所學之蔽是以吾之言易去聲入而彼之惑易解也孟子纂箋巻五
