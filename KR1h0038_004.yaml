body:
  text: 欽定四庫全書中庸纂箋卷二元詹道傳撰或問名篇之義程子専以不偏為言吕氏専以無過不及為説二者固不同矣子乃合而言之何也曰中一名而有二義程子固言之矣今以其説推之不偏不倚云者程子所謂在中之義未𤼵之前無所偏倚之名也無過不及者程子所謂中之道也見形甸反諸行去聲事各得其中之名也盖不偏不倚猶立而不近四旁心之體地之中也無過不及猶行而不先不後理之當去聲事之中也故於未𤼵之大本則取不偏不倚之名於己𤼵而時中則取無過不及之義語固各有當也然方其未𤼵雖未有無過不及之可名而所以為無過不及之本體實在於是及其𤼵而得中也雖其所主不能不偏於一事然其所以無過不及者是乃無偏倚者之所為而於一事之中亦未嘗有所偏倚也故程子又曰言和則中在其中言中則含喜怒哀樂在其中而吕氏亦云當其未𤼵此心至虛無所偏倚故謂之中以此心而應萬物之變無往而非中矣是則二義雖殊而實相為體用此愚於名篇之義所以不得取此而遺彼也曰庸字之義程子以不易言之而子以為平常何也曰惟其平常故可常而不可易若驚世駭俗之事則可暫而不得為常矣二説雖殊其致一也但謂之不易則必要平聲於乆而後見不若謂之平常則直驗於今之無所詭古委反異而其常乆而不可易者可兼舉也况中庸之云上與髙明為對而下與無忌憚者相反其曰庸徳之行庸言之謹又以見形甸反夫音扶雖細㣲而不敢忽則其名篇之義以不易而為言者又孰若平常之為切乎曰然則所謂平常將不為淺近苟且之云乎曰不然也所謂平常亦曰事理之當然而無所詭異云爾是固非有甚髙難行之事而亦豈同流合汙音烏之謂哉既曰當然則自君臣父子日用之常推而至於堯舜之禪時戰反授湯武之放伐其變無窮亦無適而非平常矣曰此篇首章先明中和之義次章乃及中庸之説至其名篇乃不曰中和而曰中庸者何哉曰中和之中其義雖精而中庸之中實兼體用且其所謂庸者又有平常之意焉則比之中和其所該者尤廣而於一篇大指精粗本末無所不盡此其所以不曰中和而曰中庸也曰張子之言如何曰其曰須句句理㑹使其言互相𤼵明者真讀書之要法不但可施於此篇也曰吕氏為己為人之説如何曰為人者程子以為欲見知於人者是也吕氏以志於功名言之而謂今之學者未及乎此則是以為人為及物之事而渉獵徼幸以求濟其私者又下此一等也殊不知夫子所謂為人者正指此下等人爾若曰未能成己而遽欲成物此特可坐以不能知所先後之罪原其設心猶愛而公視彼欲求人知以濟一己之私而後學者不可同日語矣至其所謂立喜怒哀樂未𤼵之中以為之本使學者擇善而固執之者亦曰欲使學者務先存養以為窮理之地耳而語之未瑩烏定反乃似聖人强上聲立此中以為大本使人以是為準而取中焉則中者豈聖人之所强立而未𤼵之際亦豈容學者有所擇取於其間哉但其全章大㫖則有以切中去聲今時學者之病覽者誠能三去聲復而致思焉亦可以感悟而興起矣或問天命之謂性率性之謂道修道之謂教何也曰此先明性道教之所以名以見形甸反其本皆出乎天而實不外於我也天命之謂性言天之所以命乎人者是則人之所以為性也盖天之所以賦與萬物而不能自已者命也吾之得乎是命以生而莫非全體者性也故以命言之則曰元亨利貞而四時五行庶類萬化莫不由是而出以性言之則曰仁義禮智而四端五典萬物萬事之理無不統於其間盖在天在人雖有性命之分而其理則未嘗不一在人在物雖有氣禀之異而其理則未嘗不同此吾之性所以純粹至善而非若荀揚韓子之所云也荀揚韓子論性詳見孟子告子篇集注率性之謂道言循其所得乎天以生者則事事物物莫不自然各有當行之路是則所謂道也盖天命之性仁義禮智而已循其仁之性則自父子之親以至於仁民愛物皆道也循其義之性則自君臣之分扶問反以至於敬長上聲尊賢亦道也循其禮之性則恭敬辭讓之節文皆道也循其智之性則是非邪正之分别亦道也盖所謂性者無一理之不具故所謂道者不待外求而無所不備所謂性者無一物之不得故所謂道者不假人為而無所不周雖鳥獸草木之生僅得形氣之偏而不能有以通貫乎全體然其知覺運動榮悴開落亦皆循其性而各有自然之理焉至於虎狼之父子蜂蟻之君臣豺牀皆反獺他逹反之報本雎七余反鳩之有别則其形氣之所偏又反有以存其義理之所得莊子天運篇商太宰蕩問仁於莊子莊子曰虎狼仁也曰何謂也莊子曰父子相親何為不仁化書曰蜂有君禮也螻蟻之有君也一拳之宫與衆處之一塊之臺與衆臨之一粒之食與衆蓄之一蟲之肉與衆咂之一罪無疑與衆戮之禮季月令季秋之月豺乃祭獸戮禽孟春之月魚上冰獺祭魚詩傳云雎鳩水鳥今江淮間有之生有定偶而不相亂偶常並逰而不相狎故毛傳以為摰而有别摰字與至通言其情意深至也尤可以見天命之本然初無間去聲隔而所謂道者亦未嘗不在是也是豈有待於人為而亦豈人之所得為哉修道之謂教言聖人因是道而品節之以立法垂訓於天下是則所謂教也盖天命之性率性之道皆理之自然而人物之所同得者也人雖得其形氣之正然其清濁厚薄之稟亦有不能不異者是以賢知去聲者或失之過愚不肖者或不能及而得於此者亦或不能無失於彼是以私意人欲或生其間而於所謂性者不免有所昬蔽錯雜而無以全其所受之正性有不全則於所謂道者因亦有所乖戾舛尺淺反逆而無以適乎所行之宜惟聖人之心清明純粹天理渾然無所虧闕故能因其道之所在而為之品節防範以立教於天下使夫音扶過不及者有以取中焉盖有以辨其親疎之殺所戒反而使之各盡其情則仁之為教立矣有以别彼列反其貴賤之等而使之各盡其分扶問反則義之為教行矣為之制度文為使之有以守而不失則禮之為教得矣為之開導禁止使之有以别而不差則知去聲之為教明矣夫如是是以人無知愚事無大小皆得有所持循據守以去上聲其人欲之私而復乎天理之正推而至於天下之物則亦順其所欲違其所惡去聲因其材質之宜以致其用制其取用之節以遂其生皆有政事之施焉此則聖人所以財成天地之道而致其彌縫輔賛之功然亦未始外乎人之所受乎天者而强上聲為之也子思以是三言著於篇首雖曰姑以釋夫三者之名義然學者能因其所指而反身以驗之則其所知豈獨名義之間而已哉盖有得乎天命之説則知天之所以與我者無一理之不備而釋氏之所謂空者非性矣有以得乎率性之説則知我之所得乎天者無一物之不該而老氏所謂無者非道矣有以得乎修道之説則知聖人之所以教我者莫非因其所固有而去上聲其所本無背其所至難而從其所甚易去聲而凡世儒之訓詁詞章管商之權謀功利老佛之清浄寂滅與夫百家衆技之支離偏曲皆非所以為教矣由是以往因其所固有之不可昧者而益致其學問思辨之功因其所甚易之不能已者而益致其持守推行之力則夫天命之性率性之道豈不昭然日用之間而修道之教又將由我而後立矣曰率性修道之説不同孰為是邪曰程子之論率性正就私意人欲未萌之處指其自然𤼵見形甸反下同各有條理者而言以見道之所以得名非指修為而言也吕氏良心之𤼵以下至安能致是一節亦甚精宻但謂人雖受天地之中以生而梏於形體又為私意小知去聲所撓故與天地不相似而𤼵不中去聲節必有以不失其所受乎天者然後為道則所謂道者又在修為之後而反由教以得之非復扶又反子思程子所指人欲未萌自然𤼵見之意矣游氏所謂無容私焉則道在我楊氏所謂率之而已者似亦皆有吕氏之病也至於修道則程子養之以福修而求復如字之云却似未合子思本文之意獨其一條所謂循此修之各得其分扶問反而引舜事以通結之者為得其㫖故其門人亦多祖之但所引舜事或非論語本文之意耳吕氏所謂先王制禮逹之天下傳之後世者得之但其本説率性之道處已失其指而於此又推本之以為率性而行雖已中節而所稟不能無過不及若能心誠求之自然不中不逺但欲逹之天下𫝊之後世所以又當修道而立教焉則為太繁複音福而失本文之意耳改本又以時位不同為言似亦不親切也曰楊氏所論王氏之失如何曰王氏之言固為多病然此所云天使我有是者猶曰上帝降衷云爾豈真以為有或使之者哉其曰在天為命在人為性則程子亦云而楊氏又自言之盖無悖於理者今乃指為王氏之失不惟似同浴而譏裸魯果反裎音呈亦近於意有不平而反為至公之累矣且以率性之道為順性命之理文意亦不相似若游氏以遁天倍音佩情為非性則又不若楊氏人欲非性之云也曰然則吕游楊侯四子之説孰優曰此非後學之所敢言也但以程子之言論之則於吕稱其深潛縝止忍反密於游稱其頴悟温厚謂楊不及游而亦毎稱其頴悟謂侯生之言但可隔壁聽今且熟復其言究覈下革反其意而以此語證之則其髙下淺深亦可見矣過此以往則非後學所敢言也或問既曰道也者不可須㬰離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞矣而又曰莫見乎隠莫顯乎㣲故君子慎其獨也何也曰此因論率性之道以明由教而入者其始當如此盖兩事也其先言道不可離而君子必戒謹恐懼乎其所不睹不聞者所以言道之無所不在無時不然學者當無須㬰豪忽之不謹而周防之以全其本然之體也又言莫見乎隠莫顯乎㣲而君子必慎其獨者所以言隠㣲之間人所不見而己獨知之則其事之纎悉無不顯著又有甚於他人之知者學者尤當隨其念之方萌而致察焉以謹其善惡之幾平聲也盖所謂道者率性而已性無不有故道無不在大而父子君臣小而動静食息不假人力之為而莫不各有當然不易之理所謂道也是乃天下人物之所共由充塞先則反天地貫徹古今而取諸至近則常不外乎吾之一心循之則治失之則亂盖無須㬰之頃可得而暫離也若其可以暫合暫離而於事無所損益則是人力私智之所為者而非率性之謂矣聖人之所修以為教者因其不可離者而品節之也君子之所由以為學者因其不可離者而持守之也是以日用之間須㬰之頃持守工夫一有不至則所謂不可離者雖未嘗不在我而人欲間去聲之則亦判然二物而不相管矣是則雖曰有人之形而其違禽獸也何逺哉是以君子戒慎乎其目之所不及見恐懼乎其耳之所不及聞瞭然心目之間常若見其不可離者而不敢有須㬰之間去聲以流於人欲之私而䧟於禽獸之域若書之言防怨而曰不見是圖禮之言事親而曰聽於無聲視於無形五子之歌云一人三失怨豈在明不見是圖曲禮云凡為人子者居不主奥坐不中席云云聽於無聲視於無形盖不待其徴於色𤼵於聲然後有以用其力也夫音扶既已如此矣則又以謂道固無所不在而幽隠之間乃他人之所不見而已所獨見道固無時不然而細㣲之事乃他人之所不聞而已所獨聞是皆常情所忽以為可以欺天罔人而不必謹者而不知吾心之靈皎如日月既已知之則其豪髮之間無所潛遁又有甚於他人之知矣又况既有是心藏伏之乆則其見形甸反於聲音容貎之間𤼵於行事施為之實必有暴著而不可揜者又不止於念慮之差而已也是以君子既戒懼乎耳目之所不及則此心常明不為物蔽而於此尤不敢不致其謹焉必使其幾㣲之際無一豪人欲之萌而純乎義理之𤼵則下學之功盡善全美而無須㬰之間去聲矣二者相須皆反躬為去聲已遏人欲存天理之實事盖體道之功莫有先於此者亦莫有切於此者故子思於此首以為言以見君子之學必由此而入也曰諸家之説皆以戒慎不睹恐懼不聞即為謹獨之意子乃分之以為兩事無乃破碎支離之甚耶曰既言道不可離則是無適而不在矣而又言莫見乎隠莫顯乎㣲則是要切之處尤在於隠㣲也既言戒謹不睹恐懼不聞則是無處而不謹矣又言謹獨則是其所謹者尤在於獨也是固不容於不異矣若其同為一事則其為言又何必若是之重平聲複邪且此書卒章潛雖伏矣不愧屋漏亦兩言之正與此相首尾但諸家皆不之察獨程子嘗有不愧屋漏與謹獨是持養氣象之言其於二者之間特加與字是固已分為兩事而當時聽者有未察耳曰子又安知不睹不聞之不為獨乎曰其所不睹不聞者己之所不睹不聞也故上言道不可離而下言君子自其平常之處無所不用其戒懼而極言之以至於此也獨者人之所不睹不聞也故上言莫見乎隠莫顯乎㣲而下言君子之所謹者尤在於此幽隠之地也是其語勢自相倡和去聲各有血脉理甚分明如曰是兩條者皆為謹獨之意則是持守之功無所施於平常之處而専在幽隠之間也且雖免於破碎之譏而其繁複偏滯而無所當去聲亦甚矣曰程子所謂隠㣲之際若與吕氏改本及㳺楊氏不同而子一之何邪曰以理言之則三家不若程子之盡以心言之則程子不若三家之密是固若有不同者矣然必有是理然後有是心有是心而後有是理則亦初無異指也合而言之亦何不可之有哉曰他説如何曰吕氏舊本所論道不可離者得之但専以過不及為離道則似未盡耳其論天地之間性與天道一節最其用意深處然經文所指不睹不聞隠㣲之間者乃欲使人戒懼乎此而不使人欲之私得以萌動於其間耳非欲使人虚空其心反觀於此以求見夫音扶所謂中者而遂執之以為應事之準則也吕氏既失其指而所引用不得於言必有事焉參前倚衡之語亦非論孟本文之意至謂隠㣲之間有昭昭而不可欺感之而能應者則固心之謂矣而又曰正惟虚心以求則庶乎見之是又别以一心而求此一心見此一心也豈不誤之甚哉若楊氏無適非道之云則善矣然其言似亦有所未盡盖衣食作息視聽舉履皆物也其所以如此之義理準則乃道也若曰所謂道者不外乎物而人在天地之間不能違物而獨立是以無適而不有義理之準則不可頃刻去之而不由則是中庸之㫖也若便指物以為道而曰人不能頃刻而離此百姓特日用而不知耳則是不惟昧於形而上下之别必列反而墮於釋氏作用是性之失且使學者誤謂道無不在雖欲離之而不可得吾既知之則雖猖音昌狂妄行亦無適而不為道則其為害將有不可勝平聲言者不但文義之失而已也曰吕氏之書今有二本子之所謂舊本則無疑矣所謂改本則陳忠肅公所謂程氏明道夫子之言而為之序者子於石氏集解雖嘗辨之而論者猶或以為非程夫子不能及也奈何曰是則愚嘗聞之劉李二先生矣舊本者吕氏太學講堂之初本也改本者其後所修之别本也陳公之序盖為傳者所誤而失之及其兄孫幾平聲叟具以所聞告之然後自覺其非則其書已行而不及改矣近見胡仁仲所記侯師聖語亦與此合盖幾叟之師楊氏實與吕氏同出程門師聖則程子之内弟而劉李之於幾叟仁仲之於師聖又皆親見而親聞之是豈胷臆私見口舌浮辨所得而奪哉若更以其言考之則二書詳畧雖或不同然其語意實相表裏如人之形貎昔腴音㬰今瘠音夕而其部位神采初不異也豈可不察而遽謂之兩人哉又况改本厭前之詳而有意於畧故其詞雖約而未免反有刻露峭急之病至於詞義之間失其本指則未能改於其舊者尚多有之挍音教之明道平日之言平易去聲從七容反容而自然精切者又不翅通作啻施智反碔砆音武夫之與美玉也於此而猶不辨焉則其於道之淺深固不問而可知矣或問喜怒哀樂之未𤼵謂之中至萬物育焉何也曰此推本天命之性以明由教而入者其始之所𤼵端終之所至極皆不外於吾心也盖天命之性萬理具焉喜怒哀樂各有攸當去聲方其未𤼵渾然在中無所偏倚故謂之中及其𤼵而皆得其當無所乖戾故謂之和謂之中者所以狀性之徳道之體也以其天地萬物之理無所不該故曰天下之大本謂之和者所以著情之正道之用也以其古今人物之所共由故曰天下之逹道盖天命之性純粹至善而具於人心者其體用之全本皆如此不以聖愚而有加損也然静而不知所以存之則天理昧而大本有所不立矣動而不知所以節之則人欲肆而逹道有所不行矣惟君子自其不睹不聞之前而所以戒謹恐懼者愈嚴愈敬以至於無一豪之偏倚而守之常不失焉則為有以致其中而大本之立日以益固矣尤於隠㣲幽獨之際而所以謹其善惡之幾平聲者愈精愈密以至於無一豪之差謬靡㓜反而行之每不違焉則為有以致其和而逹道之行日以益廣矣致者用力推致而極其至之謂致焉而極其至至於静而無一息之不中則吾心正而天地之心亦正故隂陽動静各止其所而天地於此乎位矣動而無一事之不和則吾氣順而天地之氣亦順故充塞無間去聲驩與歡通欣交通而萬物於此乎育矣此萬化之本原一心之妙用聖神之能事學問之極功固有非始學所當議者然射者之的行者之歸亦學者立志之初所當知也故此章雖為一篇開巻之首然子思之言亦必至此而後己焉其指深矣曰然則中和果二物乎曰觀其一體一用之名則安得不二察其一體一用之實則此為彼體彼為此用如耳目之能視聽視聽之由耳目初非有二物也曰天地位萬物育諸家皆以其理言子獨以其事論然則自古衰亂之世所以病乎中和者多矣天地之位萬物之育豈以是而失其常邪曰三辰失行䟽云昭十七年有星孛於大辰公羊云大辰者何大火也伐為大辰北辰亦為大辰是三大辰也又記鄉飲酒云紀之以日月參之以三光注三光三大辰也山崩川竭國語周幽王二年西周三川竭岐山崩伯陽父曰夫國必依山川山崩川竭亡之徴也則不必天翻地覆然後為不位矣兵亂凶荒胎殰卵殈則不必人消物盡然後為不育矣樂記曰胎生者不殰而卵生者不殈凡若此者豈非不中不和之所致而又安可誣哉今以事言者固以為有是理而後有是事彼以理言者亦非以為無是事而徒有是理也但其言之不備有以啓後學之疑不若直以事言而理在其中之為盡耳曰然則當其不位不育之時豈無聖賢生於其世而其所以致夫音扶中和者乃不能有以救其一二何邪曰善惡感通之理亦及其力之所至而止耳彼逹而在上者既曰有以病之則夫災異之變又豈窮而在下者所能救也哉但能致中和於一身則天下雖亂而吾身之天地萬物不害為安泰其不能者天下雖治去聲而吾身之天地萬物不害為乖錯其間一家一國莫不皆然此又不可不知耳曰二者之為實事可也而分中和以屬焉將不又為破碎之甚邪曰世固未有能致中而不足於和者亦未有能致和而不本於中者也未有天地己位而萬物不育者亦未有天地不位而萬物自育者也特據其效而推本其所以然則各有所從來而不可紊耳曰子思之言中和如此而周子之言則曰中者和也中去聲節也天下之逹道也周子通書中語乃舉中而合之於和然則又將何以為天下之大本也邪曰子思之所謂中以未𤼵而言也周子之所謂中以時中而言也愚於篇首已辨之矣學者涵泳而别筆列反識之見其並行而不相悖焉可也曰程吕問答如何曰考之文集則是其書盖不完矣然程子初謂凡言心者皆指己𤼵而言而後書乃自以為未當去聲向非吕氏問之之審而不完之中又失此書則此言之未當學者何自而知之乎以此又知聖賢之言固有𤼵端而未竟者學者尤當虚心悉意以審其歸未可執其一言而遽以為定也其説中字因過不及而立名又以併指時中之中而與在中之義少異盖未𤼵之時在中之義謂之無所偏倚則可謂之無過不及則方此之時未有中節不中節之可言也無過不及之名亦何自而立乎又其下文皆以不偏不倚為言則此語者亦或未得為定論也吕氏又引允執厥中以明未𤼵之㫖則程子之説書也固謂允執厥中所以行之盖其所謂中者乃指時中之中而非未𤼵之中也吕氏又謂求之喜怒哀樂未𤼵之時則程子所以答蘇季明之問又已有既思即是已𤼵之説矣凡此皆其決不以吕説為然者獨不知其於此何故畧無所辨學者亦當詳之未可見其不辨而遽以為是也曰然則程子卒以赤子之心為已𤼵何也曰衆人之心莫不有未𤼵之時亦莫不有已𤼵之時不以老稚賢愚而有别筆列反也但孟子所指赤子之心純一無偽者乃因其𤼵而後可見若未𤼵則純一無偽又不足以名之而亦非獨赤子之心為然矣是以程子雖改夫音扶心皆已𤼵之一言而赤子之心為已𤼵則不可得而改也曰程子明鏡止水之云固以聖人之心為異乎赤子之心矣然則此其為未𤼵者邪曰聖人之心未𤼵則為水鏡之體既𤼵則為水鏡之用亦非獨指未𤼵而言也曰諸説如何曰程子備矣但其答蘇季明之後章記録多失本真答問不相對值如耳無聞目無見之答以下文若無事時須見須聞之説參之其誤必矣盖未𤼵之時但為未有喜怒哀樂之偏耳若其目之有見耳之有聞則當愈益精明而不可亂豈若心不在焉而遂廢耳目之用哉其言静時既有知覺豈可言静而引復以見天地之心為説亦不可曉盖當至静之時但有能知覺者而未有所知覺也故以為静中有物則可而便以纔思即是已𤼵為比則未可以為坤卦純隂而不為無陽則可而便以復之一陽已動為比則未可也所謂無時不中者所謂善觀者却於已𤼵之際觀之者則語雖要切而其文意亦不能無斷續至於動上求静之云則問者又轉而之他矣其答動字静字之問答敬何以用功之問答思慮不定之問以至若無事時須見須聞之説則皆精當去聲但其曰當祭祀時無所見聞則古人之制祭服而設旒纊杜佑通典云黄帝作冕垂旒目不視邪也充纊示不聽讒言也黈纊者黄色緜為之雖曰欲其不得廣視雜聽而致其精一然非以是為真足以全蔽其聰明使之一無見聞也若曰履之有絇以為行戒周禮天官屨人注屨有絇有繶有純者飾也絇謂之拘繩著舄屨之頭以為行戒尊之有禁以為酒戒周禮春官司尊彛之職掌六尊六彛皆有舟尊皆有罍注舟尊下臺若今時承槃舟滿則覆所以戒沈湎也然初未嘗以是而遂不行不飲也若使當際之時真為旒纊所塞先則反遂為聾瞽則是禮容樂節皆不能知亦將何以致其誠意交於鬼神哉程子之言泱不如是之過也至其答過而不留之問則又有若不相值而可疑者大抵此條最多謬誤盖聽他人之問而從旁竊記非惟未了答者之意而亦未悉問者之情是以致此亂道而誤人耳然而猶幸其間紕篇夷反漏顯然尚可尋繹音亦以别筆列反其偽獨㣲言之湮音因没者遂不復𫝊為可惜耳吕氏此章之説尤多可疑如引屢空貨殖及心為甚者其於彼此盖兩失之其曰由空而後見夫音扶中是又前章虚心以求之説也其不䧟而入浮屠者幾希矣盖其病根正在欲於未𤼵之前求見夫所謂中者而執之是以屢言之而病愈甚殊不知經文所謂致中和者亦曰當其未𤼵此心至虚如鏡之明如水之止則但當敬以存之而不使其小有偏倚至於事物之來此心𤼵見賢遍反喜怒哀樂各有攸當去聲則又當敬以察之而不使其小有差忒他得反而已未有如是之説也且曰未𤼵之前則宜其不待箸陟略反意推求而瞭音了然心目之間矣一有求之之心則是便為已𤼵固己不得而見之况欲從而執之則其為偏倚亦甚矣又何中之可得乎且夫未𤼵已𤼵日用之問固有自然之機不假人力方其未𤼵本自寂然固無所事於執及其當𤼵則又當即事即物隨感而應亦安得塊苦怪苦潰二反然不動而執此未𤼵之中邪此為義理之根本於此有差則無所不差矣此吕氏之説所以條理紊音問亂援引乖剌而不勝其可疑也程子譏之以為不識大本豈不信哉楊氏所謂未𤼵之時以心驗之則中之義自見執而勿失無人欲之私焉則𤼵必中節矣又曰須於未𤼵之際能體所謂中其曰驗之體之執之則亦吕氏之失也其曰其慟音洞其喜中固自若疑與程子所云言和則中在其中者相似然細推之則程子之意正謂喜怒哀樂已𤼵之處見得未𤼵之理𤼵見在此一事一物之中各無偏倚過不及之差乃時中之中而非渾然在中之中也若楊氏之云中固自若而又引莊周出怒不怒之言以明之莊子庚桑楚篇云敬之而不喜侮之而不怒者惟同乎天地者為然出怒不怒則怒出於不怒矣出為無為則為出於無為矣則是以為聖人方當喜怒哀樂之時其心漠然同於木石而姑外示如此之形凡所云為皆不復出於中心之誠矣大抵楊氏之言多雜於佛老故其失類如此其曰當論其中去聲否不當論其有無則至論也或問此其稱仲尼曰何也曰首章夫子之意而子思言之故此以下又引夫子之言以證之也曰孫可以字其祖乎曰古者生無爵死無諡神至反正作諡二句出禮記郊特牲篇則子孫之於祖考亦名之而已矣周人冠去聲則字而尊其名死則諡而諱其名則固已彌文矣然未有諱其字者也故儀禮饋食之祝詞曰適爾皇祖伯某父音甫乃直以字而面命之況孔子爵不應平聲諡而子孫又不得稱其字以别筆列反之則將謂之何哉若曰孔子則外之之辭而又孔姓之通稱若曰夫子則又當時衆人相呼之通號也不曰仲尼而何以哉曰君子所以中庸小人之所以反之者何也曰中庸者無過不及而平常之理盖天命人心之正也惟君子為能知其在我而戒謹恐懼以無失其當然故能隨時而得中小人則不知有此而無所忌憚故其心每反乎此而不中不常也曰小人之中庸王肅程子悉加反字盖疊上文之語然諸説皆謂小人實反中庸而不自知其為非乃敢自以為中庸而居之不疑如漢之胡廣唐之吕温柳宗元者則其所謂中庸是乃所以為無忌憚也如此則不煩増字而理亦通矣胡廣字伯始位至太傅性温厚謹素常遜言恭色逹練事體明解朝章雖無謇直之風屢有補闕之益故京師諺曰萬事不理問伯始天下中庸有胡公吕温字和叔一字化光從陸質治春秋貞元末擢進士第後進戸部員外郎藻翰精富一時推尚性險躁謫詭好利妄言宰相李吉甫陰事憲宗貶均州再貶道州後徙衡州柳宗元字子厚少精敏絶倫為文章卓偉精緻一時推仰第進士博學宏詞科授校書郎後遭貶柳州刺史曰小人之情狀固有若此者矣但以文藝考之則恐未然盖論一篇之通體則此章乃引夫子所言之首章且當畧舉大端以分别筆列反君子小人之趨向未當遽及此意之隠㣲也若論一章之語脉則上文方言君子中庸而小人反之其下且當平解兩句之義以盡其意不應偏解上句而不解下句又遽别生他説也故疑王肅所𫝊之本為得其正而未必肅之所増程子從之亦不為無所據而臆決也諸説皆從鄭本雖非本文之意然所以𤼵明小人之情狀則亦曲盡其妙而足以警乎鄉原亂徳之姦矣今存吕氏以備觀考他不能盡録也或問民鮮能乆或以為民鮮能乆於中庸之徳而以下文不能朞月守者證之何如曰不然此章方承上章小人反中庸之意而泛論之未遽及夫音扶不能乆也下章自能擇中庸者言之乃可責其不能乆耳兩章各是𤼵明一義不當遽以彼而證此也且論語無能字而所謂矣者又已然之辭故程子釋之以為民鮮有此中庸之徳則其與不能朞月守者不同文意益明白矣曰此書非一時之言也章之先後又安得有次序乎曰言之固無序矣子思取之而著於此則其次第行音杭列決有意謂不應雜置而錯陳之也故凡此書之例皆文斷而意屬音燭下同讀者先因其文之所斷以求本章之説徐次其意之所屬以考相承之序則有以各盡其一章之意而不失夫音扶全篇之㫖矣然程子亦有乆行之説則疑出於其門人之所記盖不能無差繆與謬同音而自世教衰之一條乃論語解而程子之手筆也諸家之説固皆不察乎此然吕氏所謂厭常喜新質薄氣弱者則有以切中去聲學者不能固守之病讀者合諸朞月之章而自省悉井反焉則亦足以有警矣侯氏所謂民不識中故鮮能乆若識得中則手動足履無非中者則其踈闊又益甚矣如曰若識得中則手動足履皆有自然之中而不可離則庶幾耳或問此其言道之不行不明何也曰此亦承上章民鮮能乆矣之意也曰知去聲愚之過不及宜若道之所以不明也賢不肖之過不及宜若道之所以不行也今其互言之何也曰測度待洛反深㣲揣楚委反摩事變能知君子之所不必知者知去聲者之過乎中也昬昧蹇淺不能知君子之所當知者愚者之不及乎中也知去聲之過者既惟知是務而以道為不足行愚者又不知所以行也此道之所以不行也刻意尚行去聲驚世駭俗能行君子之所不必行者賢者之過乎中也卑汚音烏苟賤不能行君子之所當行者不肖者之不及乎中也賢之過者既惟行是務而以道為不足知不肖者又不求所以知也此道之所以不明也然道之所謂中者是乃天命人心之正當然不易之理固不外乎人生日用之間特行而不著習而不察是以不知其至而失之耳故曰人莫不飲食也鮮能知味也知味之正則必嗜時利反之而不厭矣知道之中則必守之而不失矣或問此其稱舜之大知去聲何也曰此亦承上章之意言如舜之知而不過則道之所以行也盖不自恃其聰明而樂音洛取諸人者如此則非知者之過矣又能執兩端而用其中則非愚者之不及矣此舜之知所以為大而非他人之所及也兩端之説吕楊為優程子以為執持過不及之兩端使民不得行則恐非文意矣盖當衆論不同之際未知其孰為過孰為不及而孰為中也故必兼總衆説以執其不同之極處而求其義理之至當去聲然後有以知夫音扶無過不及之在此而在所當行若其未然則又安能先識彼兩端者之為過不及而不可行哉或問七章之説曰此以上句起下句如詩之興虚應反耳或以二句各為一事言之則失之也或問此其稱囘之賢何也曰承上章不能朞月守者而言如囘之賢而不過則道之所以明也盖能擇乎中庸則無賢者之過矣服膺不失則非不肖者之不及矣然則兹賢也乃其所以為知去聲也歟曰諸説如何曰程子所引屢空張子所引未見其止皆非論語之本意惟吕氏之論顔子有曰隨其所至盡其所得據而守之則拳拳服膺而不敢失勉而進之則既竭吾才而不敢緩此所以恍惚前後而不可為象求見聖人之止欲罷而不能也此數言者乃為親切確克角反實而足以見其深潛縝止忍反密之意學者所宜諷誦而服行也但求見聖人之止一句文義亦末安耳侯氏曰中庸豈可擇擇則二矣其務為過髙而不顧經文義理之實也亦甚矣哉或問中庸不可能何也曰此亦承上章之意以三者之難明中庸之尤難也盖三者之事亦知仁勇之屬而人之所難然皆必取於行而無擇於義且或出於氣質之偏事勢之迫未必從七恭反容而中節也若曰中庸則雖無難知難行之事然天理渾然無過不及苟一豪之私意有所未盡則雖欲擇而守之而擬議之間忽已墮於過與不及之偏而不自知矣此其所以雖若甚易去聲而實不可能也故程子以克己最難言之其㫖深矣游氏以舜為絶學無為而楊氏亦謂有能斯有為之者其違道逺矣循天下固然之理而行其所無事焉夫音扶何能之有則皆佛老之餘緒而楊氏下章所論不知不能為道逺人之意亦非儒者之言也二公學於程氏之門號稱髙弟而其言乃如此殊不可曉也已或問此其記子路之問强何也曰亦承上章之意以明擇中庸而守之非强不能而所謂强者又非世俗之所謂强也盖强者力有以勝人之名也凡人和而無節則必至於流中立而無依則必至於倚國有道而富貴或不能不改其平素國無道而貧賤或不能乆處上聲乎窮約非持守之力有以勝人者其孰能及之故此四者汝子路之所當强也南方之强不及强者也北方之强過乎强者也四者之强强之中也子路好勇故聖人之言所以長上聲其善而救其失者類如此曰和與物同故疑於流而以不流為强中立本無所依又何疑於倚而以不倚為强哉曰中立固無所依也然凡物之情惟强者為能無所依而獨立弱而無所依則其不傾側而偃仆音赴者幾希矣此中立之所以疑於必倚而不倚之所以為强也曰諸説如何曰大意則皆得之惟以矯為矯揉之矯以南方之强為矯哉之强與顔子之强以抑而强者為子路之强與北方之强者為未然耳或問十一章素隠之説曰吕氏從鄭注以素為愫音素固有未安惟其舊説有謂無徳而隠為素隠者於義畧通又以遯世不見知之語反之似亦有據但素字之義與後章素其位之素不應頓異則又若有可疑者獨漢書藝文志劉歆虚今反論神仙家流引此而以素為索顔氏又釋之以為求索隠暗之事箋見章句則二字之義既明而與下文行怪二字語勢亦相類其説近是盖當時所傳本猶未誤至鄭氏時乃失之耳游氏所謂離人而立於獨與夫未免有念之云皆非儒者之語也或問十二章之説曰道之用廣而其體則㣲宻而不可見所謂費而隠也即其近而言之男女居室人道之常雖愚不肖亦能知而行之極其逺而言之則天下之大事物之多聖人亦容有不盡知盡能者也然非獨聖人有所不知不能也天能生覆敷救反而不能形載地能形載而不能生覆至於氣化流行則隂陽寒暑吉凶災祥不能盡得其正者尤多此所以雖以天地之大而人猶有憾也夫音扶自夫婦之愚不肖所能知行至於聖人天地之所不能盡道盖無所不在也故君子之語道也其大至於聖人天地所不能盡而道無不包則天下莫能載矣其小至於愚夫愚婦之所能知能行而道無不體則天下莫能破矣道之在天下其用之廣如此可謂費矣而其所用之體則不離去聲乎此而有非視聽之所及者此所以為費而隠也子思之言至此極矣然猶以為不足以盡其意也故又引詩以明之曰鳶飛戾天魚躍于淵所以言道之體用上下昭著而無所不在也造端乎夫婦極其近小而言也察乎天地極其逺大而言也盖夫婦之際隠㣲之間尤見道之不可離處知其造端乎此則其所以戒謹恐懼之實無不至矣易首乾坤而重咸恒胡登反詩首闗雎而戒淫泆書記釐陵之反降禮謹大昬記哀公問篇注大昬國君娶妻禮也皆此意也曰諸説如何曰程子至矣張子以聖人為夷惠之徒既已失之又曰君子之道逹諸天故聖人有所不知夫婦之智淆音肴諸物故聖人有所不與去聲則又析其不知不能而兩之皆不可曉也已曰諸家皆以夫婦之能知能行者為道之費聖人之所不知不能而天地有憾者為道之隠其於文義協矣若從程子之説則使章内専言費而不及隠恐其有未安也曰謂不知不能為隠似矣若天地有憾鳶飛魚躍察乎天地而欲亦謂之隠則恐未然且隠之為言正以其非言語指陳之可及耳故獨舉費而隠常黙具乎其中若於費外别有隠而可言則已不得為隠矣程子之云又何疑邪曰然則程子所謂鳶飛魚躍子思喫緊為人處緊居忍反為去聲與必有事焉而勿正心之意同活潑潑地者何也曰道之流行𤼵見於天地之間無所不在在上則鳶之飛而戾於天者此也在下則魚之躍而出於淵者此也其在人則日用之間人倫之際夫婦之所知所能而聖人之所不知不能者亦此也此其流行𤼵見於上下之間者可謂著矣子思於此指而言之惟欲學者於此黙而識之則為有以洞見道體之妙而無疑而程子以為子思喫𦂳為人處者正以示人之意為莫切於此也其曰與必有事焉而勿正心之意同活潑潑地則又以明道之體用流行𤼵見充塞天地亘居鄧反古亘今雖未嘗有一豪之空去聲闕一息之間斷然其在人而見賢遍反諸日用之間者則初不外乎此心故必此心之存而後有以自覺也必有事焉而勿正心活潑潑地亦曰此心之存而全體呈露妙用顯行無所滯礙牛代反云爾非必仰而視乎鳶之飛俯而觀乎魚之躍然後可以得之也抑孟子此言固為精宻然但為去聲學者集義氣而𤼵耳至於程子借以為言則又以𤼵明學者洞見道體之妙非但如孟子之意而已也盖此一言雖若二事然其實則必有事焉半詞之間已盡其意善用力者苟能於此超然黙㑹則道體之妙已躍如矣何待下句而後足於言邪聖賢特恐學者用力之過而反為所累故更以下句解之欲其雖有所事而不為所累耳非謂必有事焉之外又當别設此念以為正心之防也曰然則其所謂活潑潑地者毋乃釋氏之遺意邪曰此但俚音里俗之常談釋氏盖嘗言之而吾亦言之耳彼故不得而専之也况吾之所言雖與彼同而所形容實與彼異若出於吾之所謂則夫音扶道之體用固無不在然鳶而必戾於天魚而必躍於淵是君君臣臣父父子子各止其所而不可亂也若如釋氏之云則鳶可以躍淵而魚可以戾天矣是安可同日而語哉且子思以夫婦言之所以明人事之至近而天理在焉釋氏則舉此而絶之矣又安可同年而語哉曰吕氏以下如何曰吕氏分此以上論中以下論庸又謂費則常道隠則至道恐皆未安謝氏既曰非是極其上下而言矣又曰非指鳶魚而言盖曰子思之引此詩姑借二物以明道體無所不在之實非以是為窮其上下之極而形其無所不包之量去聲也又非以是二物専為形其無所不在之體而欲學者之必觀乎此也此其𤼵明程子之意盖有非一時同門之士所得聞者而又别以夫子與㸃之意明之則其為説益以精矣但所謂察見天理者恐非本文之訓而於程子之意亦未免小失之耳游氏之説其不可曉者尤多如以良知良能之所自出為道之費則良知良能者不得為道而在道之外矣又以不可知不可能者為道之隠則所謂道者乃無用之長去聲物而人亦無所頼於道矣所引天地明察似於彼此文意兩皆失之至於所謂七聖皆迷之地則莊生邪遁荒唐之語尤非所以論中庸也莊子徐無鬼篇黄帝將見大隗乎其茨之山方明為御昌寓驂乘張若謵朋前馬昆闖滑稽後車至於襄城之野七聖皆迷無所問途楊氏以大而化之非智力所及為聖人不知不能以祁寒暑雨雖天地不能易其節為道之不可能而人所以有憾於天地則於文義既有所不通而又曰人雖有憾而道固自若則其失愈逺矣其曰非體物而不遺者其孰能察之其用體字察字又皆非經文之正意也大扺此章若從諸家以聖人不知不能為隠則其為説之弊必至於此而後已嘗試循其説而體驗之若有以使人神識飛揚眩音縣瞀茂務二音迷惑而無所底止底音㫖子思之意其不出此也必矣惟侯氏不知不能之説最為明白但所引聖而不可知者孟子本謂人所不能測耳非此文之意也其他又有大不可曉者亦不足深論也或問十三章之説子以為以人治人為以彼人之道還治彼人善矣又謂責其所能知能行而引張子之説以實之則無乃流於姑息之論而所謂人之道者不得為道之全也邪曰上章固言之矣夫婦之所能知能行者道也聖人之所不知不能而天地猶有憾者亦道也然自人而言則夫婦之所能知能行者人之所切於身而不可須㬰離者也至於天地聖人所不能及則其求之當有漸次而或非日用之所急矣然則責人而先其切於身之不可離者後其有漸而不急者是乃行逺自邇升髙自卑之序使其由是而不已焉則人道之全亦將可以馴致今必以是為姑息而遽欲盡道以責於人吾見其失先後之序違緩急之宜人之受責者將至於有所不堪而道之無窮則終非一人一日之所能盡也是亦兩失之而已焉爾曰子臣弟友之絶句何也曰夫子之意盖曰我之所責乎子之事己者如此而反求乎己之所以事父則未能如此也所責乎臣之事己者如此而反求乎己之所以事君則未能如此也所責乎弟之事己者如此而反求乎己之所以事兄則未能如此也所責乎朋友之施己者如此而反求乎己之所以先施於彼者則未能如此也於是以其所以責彼者自責於庸言庸行之間盖不待求之於他而吾之所以自修之則具於此矣今或不得其讀音豆而以父君兄友四字為絶句則於文意有所不通而其義亦何所當去聲哉曰諸説如何曰諸家説論語者多引此章以明一以貫之之義説此章者又引論語以釋違道不逺之意一矛莫侯反一盾食尹反終不相謀而牽合不置學者盖深病之及深考乎程子之言有所謂動以天者然後知二者之為忠恕其迹雖同而所以為忠恕者其心實異非其知徳之深知言之至其孰能判然如此而無疑哉然盡已推己乃忠恕之所以名而正為此章違道不逺之事若動以天而一以貫之則不待盡已而至誠者自無息不待推己而萬物已各得其所矣曽子之言盖指其不可名之妙而借其可名之粗以明之學者黙識於言意之表則亦足以互相𤼵明而不害其為同也餘説雖多大㮣放上聲此推此意以觀之則其為得失自可見矣違道不逺如齊師違穀七里之違非背音佩而去之之謂愚固己言之矣諸説於此多所未合則不察文義而强上聲為之説之過也夫音扶齊師違榖七里而榖人不知則非昔已在榖而今始去之也盖曰自此而去以至於榖纔七里耳孟子所云夜氣不足以存則其違禽獸不逺矣非謂昔本禽獸而今始違之也亦曰自此而去以入於禽獸不逺耳蓋所謂道者當然之理而已根於人心而見賢遍反諸行去聲事不待勉而能也然惟盡己之心而推以及人可以得其當然之實而施無不當去聲不然則求之愈逺而愈不近矣此所以自是忠恕而往以至於道獨為不逺其曰違者非背而去之之謂也程子又謂事上之道莫若忠待下之道莫若恕此則不可曉者若姑以所重言之則似亦不為無理若究其極則忠之與恕初不相離去聲程子所謂要除一箇除不得而謝氏以為猶形影者意可見矣今析為二事而兩用之則是果有無恕之忠無忠之恕而所以事上接下者皆出於强上聲為而不由乎中矣豈忠恕之謂哉是於程子他説殊不相似意其記録之或誤不然則一時有為去聲言之而非正為忠恕𤼵也張子二説皆深得之但虚者仁之原忠恕與仁俱生之語若未瑩縈定反耳吕氏改本太畧不盡經意舊本乃推張子之言而詳實有味但柯猶在外以下為未盡善若易之曰所謂則者猶在所執之柯而不在所伐之柯故執柯者必有睨視之勞而猶以為逺也若夫以人治人則異於是蓋衆人之道止在衆人之身若以其所及知者責其知以其所能行者責其行人改即止不厚望焉則不必睨視之勞而所以治之之則不逺於彼而得之矣忠者誠有是心而不自欺也恕者推待己之心以及人也推其誠心以及於人則其所以愛人之道不逺於我而得之矣至於事父事君事兄交友皆以所求乎人者責乎己之所未能則其所以治己之道亦不逺於心而得之矣夫四者固皆衆人之所能而聖人乃自謂未能者亦曰未能如其所以責人者耳此見聖人之心純亦不已而道之體用其大天下莫能載其小天下莫能破舜之所以盡事親之道必至乎瞽瞍底豫者蓋為去聲此也如此然後屬音燭乎庸者常道之云則庶乎其無病矣且其曰有餘而盡之則道難繼而不行又不若游氏所引恥躬不逮為得其文意也謝氏侯氏所論去聲論語之忠恕獨得程子之意但程子所謂天地之不恕亦曰天地之化生生不窮特以氣機闔戸臘反闢毗亦反有通有塞故當其通也天地變化草木蕃音煩則有似於恕當其塞也天地閉而賢人隠則有似於不恕耳其曰不恕非若人之閉於私欲而實有忮支義反害之心也謝氏推明其説乃謂天地之有不恕乃因人而然則其説有未究者蓋若以為人不致中則天地有時而不位人不致和則萬物有時而不育是謂天地之氣因人之不恕而有似於不恕則可若曰天地因人之不恕而實有不恕之心則是彼為人者既以忮心失恕而自絶於天矣為天地者反效其所為以自己其於音烏穆之命也豈不誤哉游氏之説其病尤多至謂道無物我之間去聲而忠恕將以至於忘己忘物則為己違道而猶未逺也是則老莊之遺意而逺人甚矣豈中庸之㫖哉楊氏又謂以人為道則與道二而逺於道故戒人不可以為道如執柯以伐柯則與柯二故睨而視之猶以為逺則其違經背理又有甚焉使經而曰人而為道則逺人故君子不可以為道則其説信矣今經文如此而其説乃如彼既於文義有所不通而推其意又將使道為無用之物人無入道之門而聖人之教人以為道者反為誤人而有害於道是安有此理哉既又曰自道言之則不可為自求仁言之則忠恕者莫近焉則已自知其有所不通而復為是説以救之然終亦矛盾而無所合是皆流於異端之説不但豪釐陵之反之差而已也侯氏固多踈闊其引顔子樂音洛道之説愚於論語已辨之矣至於四者未能之説獨以為若止謂恕己以及人則是聖人將使天下皆無父子君臣矣此則諸家皆所不及蓋近世果有不得其讀音豆而輒為之説曰此君子以一己之難克而知天下皆可恕之人也嗚呼此非所謂將使天下皆無父子君臣者乎侯氏之言於是乎驗矣或問十四章之説曰此章文義無可疑者而張子所謂當知無天下國家皆非之理者尤為切至吕氏説雖不免時有小失然其大體則皆平正慤克角反實而有餘味也游氏説亦條暢而存亡得喪去聲窮通好醜之説尤善但楊氏以反身而誠為不願乎外則本文之意初未及此而詭遇得禽亦非行險徼幸之謂也侯氏所辨常總黙識自得之説甚當去聲近世佛者妄以吾言傅音義與附同著其説而指意乖剌郎葛反如此類者多矣甚可笑也但侯氏所以自為説者却有未善若曰識者知其理之如此而已得者無所不足於吾心而已則豈不明白真實而足以服其心乎或問十五章之説曰章首二句承上章而言道雖無所不在而其進之則有序也其下引詩與夫子之言乃指一事以明之非以二句之義為止於此也諸説惟吕氏為詳實然亦不察此而反以章首二言𤼵明引詩之意則失之矣或問鬼神之説其詳奈何曰鬼神之義孔子所以告宰予者見於祭義之篇其説已詳而鄭氏釋之亦已明矣其以口鼻之嘘吸者為魂耳目之精明者為魄蓋指血氣之類以明之程子張子更以隂陽造化為説則其意又廣而天地萬物之屈伸往來皆在其中矣蓋陽魂為神隂魄為鬼是以其在人也隂陽合則魄凝魂聚而有生隂陽判則魂升為神魄降為鬼易大𫝊去聲所謂精氣為物逰魂為變故知鬼神之情狀者正以明此而書所謂徂業胡反落者亦以其升降為言耳若又以其往來者言之則來者方伸而為神往者既屈而為鬼蓋二氣之分實一氣之運故陽主伸隂主屈而錯綜子宋反以言亦各得其義焉學者熟玩而精察之如謝氏所謂做題目入思議者則庶乎有以識之矣曰諸説如何曰吕氏推本張子之説尤為詳備但改本有所屈者不亡一句乃形潰反原之意張子他書亦有是説而程子數音朔辨其非東見録中所謂不必以既反之氣復為方伸之氣者其類可考也謝氏説則善矣但歸根之云似亦㣲有反原之累耳游楊之説皆有不可曉者惟妙萬物而無不在一語近是而以其他語考之不知其於是理之實果何如也侯氏曰鬼神形而下者非誠也鬼神之徳則誠也按經文本賛鬼神之徳之盛如下文所云而結之曰誠之不可揜如此則是以為鬼神之徳所以盛者蓋以其誠耳非以誠自為一物而别為鬼神之徳也今侯氏乃析鬼神與其徳為二物而以形而上下言之乍讀如可喜者而細以經文事理求之則失之逺矣程子所謂只好隔壁聽者其謂此類也夫曰子之以幹事明體物何也曰天下之物莫非鬼神之所為也故鬼神為物之體而物無不待是而有者然曰為物之體則物先乎氣必曰體物然後見其氣先乎物而言順耳幹猶木之有幹必先有此而後枝葉有所附而生焉貞之幹事亦猶是也或問十七章之説曰程子張子吕氏之説備矣楊氏所辨孔子不受命之意則亦程子所謂非常理者盡之而侯氏所推以謂舜得其常而孔子不得其常者尤明白也至於顔跖夀夭之不齊則亦不得其常而已史記伯夷傳七十子之徒仲尼獨薦顔淵為好學然囘也屢空糟糠不厭而卒早夭天之報施善人其何如哉盗跖日殺不辜肝人之肉暴戾恣睢聚黨數千人横行天下竟以夀終是遵何徳哉楊氏乃忘其所以論孔子之意而更援老聃他談反之言以為顔子雖夭而不亡者存則反為衍廷面反説而非吾儒之所宜言矣且其所謂不亡者果何物哉若曰天命之性則是古今聖愚公共之物而非顔子所能専若曰氣散而其精神魂魄猶有存者則是物而不化之意猶有滯於冥漠之間尤非所以語顔子也侯氏所謂孔子不得其常者善矣然又以為天於孔子固已培之則不免有自相矛盾處蓋徳為聖人者固孔子之所以為栽者也至於禄也位也夀也則天之所當以培乎孔子者而以適丁氣數之衰是以雖欲培之而有所不能及爾是亦所謂不得其常者何假復為異説以汩音骨之哉或問十八章十九章之説曰吕氏楊氏之説於禮之節文度數詳矣其間有不同者讀者詳之可也游氏引泰誓武成以為文王未嘗稱王之證深有補於名教然歐陽蘇氏之書亦已有是説矣郊禘吕游不同然合而觀之亦表裏之説也曰昭穆之昭世讀為韶今從本字可也曰昭之為言明也以其南面而向明也其讀為韶先儒以為晉避諱而改之晉避司馬昭諱然禮書亦有作佋與韶同音字者則假借而通用耳曰其為向明何也曰此不可以空言曉也今且假設諸侯之廟以明之蓋周禮建國之神位左宗廟則五廟皆在公宫之東南矣其制則孫毓余六反以為外為都宫太祖在北二昭二穆以次而南是也蓋太祖之廟始封之君居之昭之北廟二世之君居之穆之北廟三世之君居之昭之南廟四世之君居之穆之南廟五世之君居之廟皆南向各有門堂寢室而牆宇四周焉太祖之廟百世不遷自餘四廟則六世之後毎一易世而一遷其遷之也新主祔於其班之南廟南廟之主遷於北廟北廟親盡則遷其主於太廟之西夾室而謂之祧音挑凡廟主在本廟之室中皆東向及其祫于太廟之室中則惟太祖東向自如而為最尊之位羣昭之入乎此者皆列於北牖下而南向羣穆之入乎此者皆列於南牖下而北向南向者取其向明故謂之昭北向者取其深逺故謂之穆蓋羣廟之列則左為昭而右為穆祫祭之位祫音洽則北為昭而南為穆也曰六世之後二世之主既祧則三世為昭而四世為穆五世為昭而六世為穆乎曰不然也昭常為昭穆常為穆禮家之説有明文矣蓋二世祧則四世遷昭之北廟六世祔音附昭之南廟矣三世祧則五世遷穆之北廟七世祔穆之南廟矣昭者祔則穆者不遷穆者祔則昭者不動此所以祔必以班尸必以孫而子孫之列亦以為序禮記祭統篇云夫祭之道孫為王父尸所使為尸者於祭者子行也父北面而事之所以明子事父之道也若武王謂文王為穆考成王稱武王為昭考則自其始祔而已然而春秋傳去聲以管蔡郕音成霍為文之昭邘音于晉應平聲韓為武之穆見左僖二十四年則雖其既逺而猶不易也豈其交錯彼此若是之紛紛哉曰廟之始立也二世昭而三世穆四世昭而五世穆則固當以左為尊而右為卑矣今乃三世穆而四世昭五世穆而六世昭是則右反為尊而左反為卑矣而可乎曰不然也宗廟之制但以左右為昭穆而不以昭穆為尊卑故五廟同為都宫則昭常在左穆常在右而外有以不失其序一世自為一廟則昭不見穆穆不見昭而内有以各全其尊必大祫而㑹於一室然後序其尊卑之次則凡已毁未毁之主又畢陳而無所易惟四時之祫不陳毁廟之主則髙祖有時而在穆其禮未有考焉意或如此則髙之上無昭而特設位於祖之西禰乃禮反之下無穆而特設位於曽之東也與羊諸反曰然則毁廟云者何也曰春秋傳曰壊音怪廟之道易檐余亷反可也改塗可也説者以為將納新主示有所加耳非盡徹而悉去上聲之也所引春秋傳見穀粱文二年曰然則天子之廟其制若何曰唐之文祖虞之神宗商之七世三宗其詳今不可考書舜典云受終于文祖大禹謨云受命于神宗商書咸有一徳云七世之廟可以觀徳三宗謂太甲廟號太宗太戊號中宗武丁號髙宗是也獨周制猶有可言然而漢儒之記又已有不同矣謂后稷始封文武受命而王去聲故三廟不毁與親廟四而七者諸儒之説也謂三昭三穆與太祖之廟而七文武為宗不在數中者劉歆虚今反之説也雖其數之不同然其位置遷次宜亦與諸侯之廟無甚異者但如諸儒之説則武王初有天下之時后稷為太祖而組音祖紺古暗反居昭之北廟太王居穆之北廟王季居昭之南廟文王居穆之南廟猶為五廟而已至成王時則組紺祧王季遷而武王祔至康王時則太王祧文王遷而成王祔至昭王時則王季祧武王遷而康王祔自此以上上聲亦皆且為五廟而祧者藏於太祖之廟至穆王時則文王親盡當祧而以有功當宗故别立一廟於西北而謂之文世室於是成王遷昭王祔而為六廟矣至共音恭王時則武王親盡當祧而亦以有功當宗故别立一廟於東北謂之武世室於是康王遷穆王祔而為七廟矣文世室武世室見禮明堂位自是之後則穆之祧者藏於文世室昭之祧者藏於武世室而不復藏於太廟矣如劉歆之説則周自武王克商即増立二廟於二昭二穆之上以祀髙圉音語亞圉如前遞遷至於懿王而始立文世室於三穆之上至孝王時始立武世室於三昭之上此為少不同耳曰然則諸儒與劉歆之説孰為是曰前代説者多是劉歆愚亦意其或然也曰祖功宗徳之説尚矣而程子獨以為如此則是為子孫者得擇其先祖而祭之也子亦嘗考之乎曰商之三宗周之世室見賢遍反於經典皆有明文而功徳有無之實天下後世自有公論若必以此為嫌則秦政之惡去聲夫音扶子議父臣議君而除諡法者不為過矣史記始皇紀二十六年制曰朕聞太古有號死而以行為諡如此則子議父臣議君也甚無謂朕弗取焉其除諡法且程子晚年嘗論本朝音潮廟制亦謂太祖太宗皆當為百世不遷之廟以此而推則知前説若非記者之誤則或出於一時之言而未必其終身之定論也曰然則大夫士之制奈何曰大夫三廟則視諸侯而殺色界反下同其二然其太祖昭穆之位猶諸侯也適音的士二廟則視大夫而殺其一官師一廟則視大夫而殺其二然其門堂寢室之備猶大夫也曰廟之為數降殺以兩而其制不降何也曰降也天子之山節藻梲複音福廟重平聲檐與簷同諸侯固有所不得為者矣諸侯之黝於九反堊音惡斲竹角反礱大夫有不得為者矣大夫之倉楹音盈斲桷音角士又不得為矣曷為而不降哉記明堂位山節藻梲複廟重檐刮楹逹鄉夫子之廟飾也又穀梁莊二十四年云禮天子諸侯黝堊大夫倉士黈註士黈者士則以黄飾之也丹桓宫楹刻桷非禮也禮天子之桷斲之礱之加密石焉諸侯之桷斲之礱之大夫斲之士斲本刻桷非正也獨門堂寢室之合然後可名於宫則其制有不得而殺耳蓋由命士以上上聲父子皆異宫生也異宫而死不得異廟則有不得盡其事生事存之心者是以不得而降也曰然則後世公私之廟皆為同堂異室而以西為上者何也曰由漢明帝始也夫音扶漢之為禮畧矣然其始也諸帝之廟皆自營之各為一處雖其都宫之制昭穆之位不復如古然猶不失其獨専一廟之尊也至於明帝不知禮義之正而務為抑損之私遺詔藏主於光烈皇后更平聲衣别室而其臣子不敢有加焉魏晉循之遂不能革而先王宗廟之禮始盡廢矣魏明帝青龍四年髙堂隆上疏云今圜丘方澤南北郊明堂社稷神位未定宗廟之制未為禮晉武泰始二年春正月丁亥即用魏廟祭征西府君以下漢征西將軍司馬鈞并景帝七室降及近世諸侯無國大夫無邑則雖同堂異室之制猶不能備獨天子之尊可以無所不致顧乃梏姑沃反於漢明非禮之禮而不得以致其備物之孝蓋其别為一室則深廣之度或不足以陳鼎俎而其合為一廟則所以尊其太祖者既䙝而不嚴所以事其親廟者又厭於甲反而不尊是皆無以盡其事生事存之心而當世宗廟之禮亦為虛文矣宗廟之禮既為虚文而事生事存之心有終不能以自己者於是原廟之儀不得不盛然亦至於我朝音潮下同而後都宫别殿前門後寢始畧如古者宗廟之制是其沿襲音習之變不惟窮鄉賤士有不得聞而自南渡之後故都淪没權宜草創無復舊章則雖朝廷之上禮官愽士老師宿儒亦莫有能知其原者幸而或有一二知經學古之人乃能私議而竊歎之然於前世則徒知譏孝惠之飾非責叔孫通之舞禮而於孝明之亂命與其臣子之苟從則未有正其罪者前漢叔孫通傳孝惠即位乃謂通曰先帝園陵寢廟羣臣莫習徙通為奉常定宗廟儀法又稍定漢諸儀法皆通所論著也惠帝為東朝長樂宫及間往數蹕煩民作複道方築武庫南通奏事因請問曰陛下何自築複道髙寢衣冠月出遊髙廟子孫奈何乗宗廟道上行哉惠帝懼曰急壊之通曰人主無過舉今已作百姓皆知之矣願陛下為原廟渭北衣冠月出遊之益廣宗廟大孝之本上乃詔有司立原廟後漢明帝紀十八年秋八月壬子帝崩於東宫前殿年四十八遺詔無起寢廟藏主於光烈皇后更衣别室掃地而祭杆水脯糒而已過百日惟四時設奠置吏卒數人供給洒掃勿開修道敢有所興作者以擅議宗廟法從事前書曰擅議宗廟者弃市於今之世則又徒知論其惑異端狥流俗之為陋而不知本其事生事存之心有不得伸於宗廟者是以不能不自致於此也抑嘗觀於陸佃之議而知神祖之嘗有意於此然而考於史籍則未見其有紀焉若曰未及營表故不得書則後日之秉史筆者即前日承詔討論之臣也所宜深探遺㫖特書總序以昭示來世而畧無一詞以及之豈天未欲使斯人者復見二帝三王制作之盛故尼女一反其事而嗇音色正作其𫝊邪嗚呼惜哉然陸氏所定昭穆之次又與前説不同而張琥之議庶幾近之讀者更詳考之則當知所擇矣或問二十章蒲盧之説何以廢舊説而從沈氏也曰蒲盧之為果臝魯果反果臝細腰蜂也他無所考且於上下文義亦不甚通惟沈氏之説乃與地道敏樹之云者相應故不得而不從耳曰沈説固為善矣然夏小正十月𤣥雉入于淮為蜃時忍反大蛤也而其𫝊去聲曰蜃者蒲盧也則似亦以蒲盧為變化之意而舊說未為無所據也曰此亦彼書之𫝊文耳其他蓋多穿鑒不足據信疑亦出於後世迂儒之筆或反取諸此而附合之決非孔子所見夏時之本文也且又以蜃為蒲盧則不應二物而一名若以蒲盧為變化則又不必解為果臝矣况此等瑣碎既非大義所繫又無明文可證則姑闕之其亦可也何必詳考而深辨之邪曰逹道逹徳有三知三行之不同而其至則一何也曰此氣質之異而性則同也生而知者生而神靈不待教而於此無不知也安而行者安於義理不待習而於此無所咈音佛也此人之氣禀清明賦質純粹天理渾然無所虧喪去聲者也學而知者有所不知則學以知之雖非生知而不待困也利而行者真知其利而必行之雖有未安而不待勉也此得清之多而未能無蔽得粹之多而未能無雜天理小失而能亟反之者也困而知者生而不明學而未逹困心衡與横同慮而後知之者也勉强而行者不獲所安未知其利勉力强矯而行之者也此則昬蔽駮音剥雜天理幾平聲亡乆而後能反之者也此三等者其氣質之禀亦不同矣然其性之本則善而已故及其知之而成功也則其所知所至無少異焉亦復其初而已矣曰張子吕楊侯氏皆以生知安行為仁學知利行為知去聲困知勉行為勇其説善矣子之不從何也曰安行可以為仁矣然生而知之則知之大而非仁之屬也利行可以為知矣然學而知之則知之次而非知之大也且上文三者之目固有次序而篇首諸章以舜明知以囘明仁以子路明勇其語知也不卑矣夫音扶豈專以學知利行者為足以當之乎故今以其分去聲而言則三知為智三行為仁所以勉而不息至於知之成功之一為勇以其等而言則以生知安行者主於知而為智學知利行者主於行而為仁困知勉行者主於强而為勇又通三近而言則又以三知為智三行為仁而三近為勇之次則亦庶乎其曲盡也歟曰九經之説奈何曰不一其内則無以制其外不齊其外則無以養其内静而不存則無以立其本動而不察則無以勝其私故齊明盛服非禮不動則内外交養而動静不違所以為修身之要也信讒邪則任賢不専徇貨色則好去聲賢不篤賈捐之所謂後宫盛色則賢者隠㣲佞人用事則諍臣杜口見前漢賈捐之傳蓋持衡之勢此重則彼輕理固然矣故去讒逺色賤貨而一於貴徳所以為勸賢之道也親之欲其貴愛之欲其富兄弟婚姻欲其無相逺故尊位重禄同其好惡所以為勸親親之道也大臣不親細事則以道事君者得以自盡故官屬衆盛足任使令平聲所以為勸大臣之道也盡其誠而恤其私則士無仰事俯育之累而樂音洛趨事功故忠信重禄所以為勸士之道也人情莫不欲逸亦莫不欲富故時使薄斂所以為勸百姓之道也日省月試以程其能既稟稱事以償其勞則不信度作淫巧者無所容惰者勉而能者勸矣為平聲之授節以送其往待以委去聲積子賜反以迎其來因能授任以嘉其善不强上聲其所不欲以矜其不能則天下之旅皆恱而願出於其塗矣無後者續之己滅者封之治其亂使上下相安持其危使大小相恤朝聘有節而不勞其力貢賜有度而不匱求位反其財則天下諸侯皆竭其忠力以蕃方煩反亦作藩衛王室而無倍畔之心矣凡此九經其事不同然總其實不出乎修身尊賢親親三者而已敬大臣體羣臣則自尊賢之等而推之也子庶民來百工柔逺人懐諸侯則自親親之殺而推之也至於所以尊賢而親親則又豈無所自而推之哉亦曰修身之至然後有以各當去聲其理而無所悖耳曰親親而不言任之以事者何也曰此親親尊賢並行不悖之道也苟以親親之故不問賢否而輕屬音燭任之不幸而或不勝平聲焉治之則傷恩不治則廢法是以富之貴之親之厚之而不曰任之以事是乃所以親愛而保全之也若親而賢則自當置之大臣之位而尊之敬之矣豈但富貴之而已哉觀於管蔡監古衘反商而周公不免於有過及其致辟毗亦反之後則惟康叔聃他談反季相與夾輔王室而五叔者有土而無官焉書蔡仲之命篇云乃致辟管叔于商左定四年武王之母弟八人周公為太宰康叔為司冦聃季為司空五叔無官豈尚年哉五叔謂管叔鮮蔡叔度成叔武霍叔處毛叔聃也則聖人之意亦可見矣曰子謂信任大臣而無以間去聲之故臨事而不眩使大臣而賢也則可其或不幸而有趙髙朱异音異虞世基李林甫之徒焉趙髙秦始皇時人二世時官至丞相恃思専恣以私怨殺人指鹿為馬殺二世望夷宫子嬰殺之朱异字彦和梁武帝時官至中領軍貪財冒賄欺罔視聽蔑弄朝權輕作威福死贈尚書左僕射虞世基字茂世隋煬帝朝官至金紫光禄大夫參掌朝政鬻官賣獄賄賂公行宇文化及弑逆世基亦見害李林甫唐𤣥宗朝官至中書令封晉國公性隂宻忍誅殺排搆大臣蕩覆天下固寵市權蔽欺天子耳目死贈太尉揚州大都督則鄒陽所謂偏聽生姦獨任成亂范睢許規反所謂妬都故反賢嫉音疾能御下蔽上以成其私而主不覺悟者見史記鄒陽及范雎傳亦安得而不慮邪曰不然也彼其所以至此正坐不知九經之義而然耳使其明於此義而能以修身為本則固視明聽聰而不可欺以賢否矣能以尊賢為先則其所置以為大臣者必不雜以如是之人矣不幸而或失之則亦亟求其人以易之而已豈有知其必能為姦以敗國顧猶置之大臣之位使之姑以奉行文書為職業而又恃小臣之察以防之哉夫音扶勞於求賢而逸於得人任則不疑而疑則不任此古之聖君賢相去聲所以誠意交孚兩盡其道而有以共成正大光明之業也如其不然吾恐上之所以猜倉才反防畏備者愈宻而其為眩愈甚下之所以欺罔蒙蔽者愈巧而其為害愈深不幸而臣之姦遂則其禍固有不可勝平聲言者幸而主之威勝則夫所謂偏聽獨任御下蔽上之姦將不在於大臣而移於左右其為國家之禍尤有不可勝言者矣嗚呼危哉曰子以何言柔逺人之為無忘賓旅也曰以其列於懐諸侯之上也舊説以為蕃方煩反國之諸侯則以逺先近而非其序書言柔逺能邇而又言蠻夷率服則所謂柔逺亦不止謂服四夷也況愚所謂授節委積者比毗至反長上聲遺維季反人懐方氏之官掌之於經有明文邪曰楊氏之説有虛器之云者二而其指意所出若有不同者焉何也曰固也是其前段主於誠意故以為有法度而無誠意則法度為虚器正言以𤼵之也其後段主於格物故以為若但知誠意而不知治天下國家之道則是直以先王之典章文物為虚器而不之講反語以詰喫吉反之也此其不同審矣但其下文所引明道先生之言則又若主於誠意而與前段相應其於本段上文之意則雖亦可以宛轉而説合之然終不免於迂囘而難通也豈記者之誤邪然楊氏他書首尾相衡與横同決亦多有類此者殊不可曉也曰所謂前定何也曰先立乎誠也先立乎誠則言有物而不躓音致矣事有實而不困矣行有常而不疚矣道有本而不窮矣諸説惟游氏誠定之云得其要張子以精義入神為言是則所謂明善者也曰在下獲上明善誠身之説奈何曰夫音扶在下位而不獲乎上則無以安其位而行其志故民不可治然欲獲乎上又不可以諛音臾説音悦取容也其道在信乎友而已蓋不信乎友則志行去聲不孚而名譽不聞故上不見知然欲信乎友又不可以便平聲佞苟合也其道在悦乎親而已蓋不悦乎親則所厚者薄而無所不薄故友不見信然欲順乎親又不可以阿意曲從也其道在誠乎身而已蓋反身不誠則外有事親之禮而内無愛敬之實故親不見悦然欲誠乎身又不可以襲取强上聲為也其道在明乎善而已蓋不能格物致知以真知至善之所在則好去聲善必不能如好好色惡去聲惡必不能如惡惡臭雖欲勉焉以誠其身而身不可得而誠矣此必然之理也故夫子言此而其下文即以天道人道擇善固執者繼之蓋擇善所以明善固執所以誠身擇之之明則大學所謂物格而知至也執之之固則大學所謂意誠而心正身修也知至則反諸身者將無一豪之不實意誠心正而身修則順親信反獲上治民將無所施而不利而逹道逹徳九經凡事亦一以貫之而無遺矣曰諸説如何曰此章之説雖多然亦無大得失惟楊氏反身之説為未安耳蓋反身而誠者物格知至而反之於身則所明之善無不實有如前所謂如惡惡臭如好好色者而其所行自無内外隠顯之殊耳若知有未至則反之而不誠者多矣安得直謂但能反求諸身則不待求之於外而萬物之理皆備於我而無不誠哉況格物之功正在即事即物而各求其理今乃反欲離去事物而専務求之於身尤非大學之本意矣曰誠之為義其詳可得而聞乎曰難言也姑以其名義言之則真實無妄之云也若事理之得此名則亦隨其所指之大小而皆有取乎真實無妄之意耳蓋以自然之理言之則天地之間惟天理為至實而無妄故天理得誠之名若所謂天地之道鬼神之徳是也以徳言之則有生之類惟聖人之心為至實而無妄故聖人得誠之名若所謂不勉而中去聲不思而得者是也至於隨事而言則一念之實亦誠也一言之實亦誠也一行去聲之實亦誠也是以大小雖有不同然其義之所歸則未始不在於實也曰然則天理聖人之所以若是其實者何也曰一則純二則雜純則誠雜則妄此常物之大情也夫音扶天之所以為天也沖漠無朕直忍反而萬理兼該無所不具然其為體則一而已矣未始有物以雜之也是以無聲無臭無思無為而一元之氣春秋冬夏晝夜昬明百千萬年未嘗有一息之繆靡㓜反天下之物洪纎巨細飛潛動植亦莫不各得其性命之正以生而未嘗有一毫之差此天理之所以為實而不妄者也若夫人物之生性命之正固亦莫非天理之實但以氣質之偏口鼻耳目四肢之好去聲得以蔽之而私欲生焉是以當其惻隠之𤼵而忮去義反害雜之則所以為仁者有不實矣當其羞惡去聲之發而貪昩雜之則所以為義者有不實矣此常人之心所以雖欲勉于為善而内外隠顯常不免於二致其甚致於詐偽欺罔而卒墮於小人之歸則以其二者雜之故也惟聖人氣質清純渾然天理初無人欲之私以病之是以仁則表裏皆仁而無一豪之不仁義則表裏皆義而無一豪之不義其為徳也固舉天下之善而無一事之或遺而其為善也又極天下之實而無一豪之不滿此其所以不勉不思從七容反容中去聲道而動容周旋莫不中禮也曰然則常人未免於私欲而無以實其徳者奈何曰聖人固己言之亦曰擇善而固執之耳夫於天下之事皆有以知其如是為善而不能不為知其如是為惡而不能不去上聲則其為善去惡之心固己篤矣於是而又加以固執之功雖其不睹不聞之間亦必戒謹恐懼而不敢懈居隘反則凡所謂私欲者出而無所施於外入而無所藏於中自將消磨泯弭盡反滅不得以為吾之病而吾之徳又何患於不實哉是則所謂誠之者也曰然則大學論小人之隂惡陽善而以誠於中者目之何也曰若是者自其天理之大體觀之則其為善也誠虚矣自其人欲之私分扶問反觀之則其為惡也何實如之而安得不謂之誠哉但非天理真實無妄之本然則其誠也適所以虛其本然之善而反為不誠耳曰諸説如何曰周子至矣其上章以天道言其下章以人道言愚於通書之説亦既畧言之矣程子無妄之云至矣其他説亦各有所𤼵明讀者深玩而黙識焉則諸家之是非得失不能出乎此矣曰學問思辨亦有序乎曰學之博然後有以備事物之理故能參伍之以得所疑而有問問之審然後有以盡師友之情故能反復芳服反之以𤼵其端而可思思之謹則精而不雜故能有所自得而可以施其辨辨之明則斷都喚反而不差故能無所疑惑而可以見於行行之篤則凡所學問思辨而得之者又皆必踐其實而不為空言矣此五者之序也曰吕氏之説之詳不亦善乎曰吕氏此章最為詳實然深考之則亦未免乎有病蓋君子之於天下必欲無一理之不通無一事之不能故不可以不學而其學不可以不博及其積累魯水反而貫通焉然後有以深造七到反手約而一以貫之非其博學之初已有造約之心而姑從事於博以為之地也至於學而不能無疑則不可以不問而其問也或粗畧而不審則其疑不能盡決而與不問無以異矣故其問之不可以不審若曰成心亡而後可進則是疑之説也非疑而問問而審之説也學也問也得於外者也若専恃此而不反之心以驗其實則察之不精信之不篤而守之不固矣故必思索山客反以精之然後心與理熟而彼此為一然使其思也或太多而不専則亦泛濫而無益或太深而不止則又過苦而有傷皆非思之善也故其思也又必貴於能謹非獨為反之於身知其為何事何物而已也其餘則皆得之而所論變化氣質者尤有功也曰何以言誠為此篇之樞紐也曰誠者實而已矣天命云者實理之原也性其在物之實體道其當然之實用而教也者又因其體用之實而品節之也不可離者此理之實也隠之見㣲之顯實之存亡而不可揜者也戒謹恐懼而謹其獨焉所以實乎此理之實也中和云者所以狀此實理之體用也天地位萬物育則所以極此實理之功效也中庸云者實理之適可而平常者也過與不及不見實理而妄行者也費而隠者言實理之用廣而體㣲也鳶飛魚躍流動充滿夫音扶豈無實而有是哉道不逺人以下至於大舜文武周公之事孔子之言皆實理應用之當然而鬼神之不可揜則又其𤼵見之所以然也聖人於此固以其無一豪之不實而至於此之盛其示人也亦欲其必以其實而無一豪之偽也蓋自然而實者天也必期於實者人而天也誠明以下累章之意皆所以反復乎此而語其所以至於正大經而立大本參天地而賛化育則亦真實無妄之極功也卒章尚絅之云又本其務實之初心而言也内省者謹獨克已之功不愧屋漏者戒謹恐懼而無已可克之事皆所以實乎此之序也時靡有争變也百辟刑之化也無聲無臭又極乎天命之性實理之原而言也蓋此篇大指専以𤼵明實理之本然欲人之實此理而無妄故其言雖多而其樞紐不越乎誠之一言也嗚呼深哉或問誠明之説曰程子諸説皆學者所𫝊録其以内外道行為誠明似不親切惟先明諸心一條以知語明以行語誠為得其訓乃顔子好去聲學論中語而程子之手筆也亦可以見彼記録者之不能無失矣張子蓋以性教分為學之兩塗而不以論聖賢之品第故有由誠至明之語程子之辨雖己得之然未究其立言本意之所以失也其曰誠即明也恐亦不能無誤吕氏性教二字得之而於誠字以至簡至易去聲行其所無事為説則似未得其本㫖也且於性教皆以至於實然不易之地為言則至於云者非所以言性之之事而不易云者亦非所以申實然之説也然其過於游楊則逺矣或問至誠盡性諸説如何曰程子以盡已之忠盡物之信為盡其性蓋因其事而極言之非正解此文之意令不得而録也其論賛天地之化育而曰不可以賛助言論窮理盡性以至於命而曰只窮理便是至於命則亦若有可疑者蓋嘗竊論之天下之理未嘗不一而語其分扶問及則未嘗不殊此自然之勢也蓋人生天地之間稟天地之氣其體即天地之體其心即天地之心以理而言是豈有二物哉故凡天下之事雖若人之所為而其所以為之者莫非天地之所為也又况聖人純於義理而無人欲之私則其所以代天而理物者乃以天地之心而賛天地之化尤不見其有彼此之間去聲也若以其分言之則天之所為固非人之所及而人之所為又有天地之所不及者其事固不同也但分殊之狀人莫不知而理之一致多或未察故程子之言𤼵明理一之意多而及於分殊者少蓋抑揚之勢不得不然然亦不無小失其平矣惟其所謂只是一理而天人所為各自有分乃為全備而不偏而讀者亦莫之省悉井反也至於窮理至命盡人盡物之説則程張之論雖有不同然亦以此而推之則其説初亦未嘗甚異也蓋以理言之則精粗本末初無二致固不容有漸次當如程子之論若以其事而言則其親疎逺近淺深先後又不容於無别筆列反當如張子之言也吕游楊説皆善而吕尤確克角反實楊氏萬物皆備云者又前章格物誠身之意然於此論之則反求於身又有所不足言也胥失之矣或問致曲之説曰又性雖同而氣稟或異自其性而言之則人自孩提聖人之質悉已完具以其氣而言之則惟聖人為能舉其全體而無所不盡上章所言至誠盡性是也若其次則善端所𤼵隨其所稟之厚薄或仁或義或孝或弟而不能同矣自非各因其𤼵見之偏一一推之以至乎其極使其薄者厚而異者同則不能有以貫通乎全體而復其初即此章所謂致曲而孟子所謂擴充其四端者是也程子之言大意如此但其所論不詳且以由基之射為説故有疑於専務推致其氣質之所偏厚而無隨事用力悉有衆善之意又以形為參前倚衡所立卓爾之意則亦若以為己之所自見而無與音預於人也豈其記者之畧而失之與羊諸反至於明動變化之説則無以易矣若張子之説以明為兼照動為徙義變為通變化為無滯則皆以其進乎内者言之失其㫖矣蓋進徳之序由中逹外乃理之自然如上章之説亦自己而人自人而物各有次序不應専於内而遺其外也且夫進乎内之節目亦安得如是之繁促哉游氏説亦得之但説致曲二字不同非本意耳楊氏既以光輝𤼵外為明矣而又引明則誠矣則似以明為通明之明既以鶴鳴子和去聲為動矣而又曰化非學問篤行所及則似以化為大而化之之化此其文意不相承續且於明動之間本文之外别生無物不誠一節以就至誠動物之意尤不可曉今固不能盡録然亦不可不辨也或問至誠如神之説曰吕氏得之矣其論動乎四體為威儀之則者尤為確實游氏心合於氣氣合於神之云非儒者之言也且心無形而氣有物若之何而反以是為妙哉程子用便近二之論蓋因異端之説如蜀山人董五經之徒亦有能前知者故就之而論其優劣非以其不用而不知者為真可貴而賢於至誠之前知也至誠前知乃因其事理朕直忍反兆之已形而得之如所謂不逆詐不億不信而常先覺者非有術數推驗之煩意想測度待洛反之私也亦何害其為一哉或問二十五章之説曰自成自道如程子説乃與下文相應游楊皆以無待而然論之其説雖髙然於此為無所當去聲且又老莊之遺意也誠者物之終始不誠無物之義亦惟程子之言為至當然其言太畧故讀者或不能曉請得而推言之蓋誠之為言實而已矣然此篇之言有以理之實而言者如曰誠不可揜之類是也有以心之實而言者如曰反身不誠之類是也讀者各隨真文意之所指而尋之則其義各得矣所謂誠者物之終始不誠無物者以理言之則天地之理至實而無一息之妄故自古至今無一物之不實而一物之中自始至終皆實理之所為也以心言之則聖人之心亦至實而無一息之妄故從生至死無一事之不實而一事之中自始至終皆實心之所為也此所謂誠者物之終始者然也苟未至於聖人而其本心之實者猶未免於間斷間去聲斷徒玩反則自其實有是心之初以至未有間斷之前所為無不實者及其間斷則自其間斷之後以至未相接續之前凡所云為皆無實之可言雖有其事亦無以異於無有矣如曰三月不違則三月之間所為皆實而三月之後未免於無實蓋不違之終始即其事之終始也日月至焉則至此之時所為皆實而去此之後未免於無實蓋至焉之終始即其物之終始也是則所謂不誠無物者然也以是言之則在天者本無不實之理故凡物之生於理者必有是理方有是物未有無其理而徒有不實之物者也在人者或有不實之心故凡物之出於心者必有是心之實乃有是物之實未有無其心之實而能有其物之實者也程子所謂徹頭徹尾者蓋如此其餘諸説大抵皆知誠之在天為實理而不知其在人為實心是以為説太髙而往往至於交互差錯以失經文之本意正猶知愛之不足以盡仁而凡言仁者遂至於無字之可訓其亦誤矣吕氏所論子貢子思所言之異亦善而猶有未盡者蓋子貢之言主於知子思之言主於行故各就其所重而有實主之分亦不但為成徳入徳之殊而已也楊氏説物之終始直以天行二字為解蓋本於易終則有始天行也之説假借依託無所𤼵明楊氏之言蓋多類此最説經之大病也又謂誠則有形而有物不誠則輟陟劣反而無物亦未安誠之有物蓋不待形而有不誠之無物亦不待其輟而後無也其曰由四時之運已則成物之功廢蓋亦輟而後無之意而又直以天無不實之理喻夫音扶人有不實之心其取譬也亦不親切矣彼四時之運夫豈有時而已者哉或問二十六章之説曰此章之説最為繁雜如游楊無息不息之辨恐未然若如其言則不息則乆以下至何地位然後為無息邪游氏又以得一形容不二之意亦假借之類也字雖宻而意則踈矣吕氏所謂不已其命不已其徳意雖無爽而語亦有病蓋天道聖人之所以不息皆實理之自然雖欲已之而不可得今曰不已其命不已其徳則是有意於不已而非所以明聖人天道之自然矣又以積天之昭昭以至於無窮譬夫音扶人之充其良心以至於與天地合徳意則甚善而此章所謂至誠無息以至於博厚髙明乃聖人乆於其道而天下化成之事其所積而成者乃其氣象功效之謂若鄭氏所謂至誠之德著於四方者是已非謂在已之徳亦待積而後成也故章末引文王之詩以證之夫豈積累漸次之謂哉若如吕氏之説則是因無息然後至於誠由不已然後純於天道也失其㫖矣揚氏動以天故無息之語甚善其曰天地之道聖人之徳無二致焉顧方論聖人之事而又曰天地之道可一言而盡蓋未覺其語之更平聲端耳至謂天之所以為天文王之所以為文皆原於不己則亦猶吕氏之失也大抵聖賢之言内外精粗各有攸當去聲而無非極致近世諸儒乃或不察乎此而於其外者皆欲引而納之於内於其粗者皆欲推而致之於精若致曲之明動變化此章之博厚髙明蓋不勝平聲其煩碎穿鑿而於其本指失之愈逺學者不可以不察也或問二十七章之説曰程張備矣張子所論逐句為義一條甚為切於文義故吕氏因之然須更以游楊二説足之則其義始備耳游氏分别筆列反至道至徳為得之惟優優大哉之説為未善而以無方無體離去聲形去智為極髙明之意又以人徳地徳天徳為徳性廣大髙明之分則其失愈逺矣楊氏之説亦不可曉蓋道者自然之路徳者人之所得故禮者道體之節文必其人之有徳然後乃能行之也今乃以禮為徳而欲以疑夫音扶道則既誤矣而又曰道非禮則蕩而無止禮非道則梏於儀章器數之末而有所不行則是所謂道者乃為虛無恍惚元無準則之物所謂徳者又不足以凝道而反有所待於道也其諸老氏之言乎誤益甚矣温故知新敦厚崇禮諸説但以二句相對明其不可偏廢大意固然然細分之則温故然後有以知新而温故又不可不知新敦厚然後有以崇禮而敦厚又不可不崇禮此則諸説之所遺也大抵此五句承章首道體大小而言故一句之内皆具大小二意如徳性也廣大也髙明也故也厚也道之大也問學也精㣲也中庸也新也禮也道之小也尊之道之致之盡之極之道之温之知之敦之崇之所以修是徳而凝是道也以其於道之大小無所不體故居上居下在治去聲在亂無所不宜此又一章之通㫖也或問子思之時周室衰㣲禮樂失官制度不行於天下乆矣其曰同軌同文何邪曰當是之時周室雖衰而人猶以為天下之共主諸侯雖有不臣之心然方彼此争雄不能相尚下及六國之未亡猶未有能更平聲姓改物而定天下於一者也則周之文軌孰得而變之哉曰周之車軌書文何以能若是其必同也曰古之有天下者必改正朔易服色殊徽號以新天下之耳目而一其心志若三代之異尚其見於書𫝊去聲者詳矣軌者車之轍迹也周人尚輿而制作之法領於冬官周禮冬官有虞氏上陶夏后氏上匠殷人上梓周人上輿故一器而百工聚焉者車為多其輿之廣六尺六寸故其轍迹之在地者相距之間廣狹如一無有逺邇莫不齊同凡為車者必合乎此而後可以行乎方内而無不通不合乎此則不惟有司得以討之而其行於道路自將偏倚杌音兀陧倪結反而跬大委反歩不前亦不待禁而自不為矣古語所謂閉門造車出門合轍蓋言其法之同而春秋傳所謂同軌畢至者則以言其四海之内政令所及者無不來也文者書之㸃畫形象也周禮司徒教民道藝而書居其一又有外史掌逹書名於四方而大行人之法則又每九歳而一諭焉其制度之詳如此是以雖其末流海内分裂而猶不得變也周禮地官大司徒以鄉三物教萬民而賔興之三曰六藝禮樂射御書數春官外史掌書外令掌四方之志掌三皇五帝之書掌逹書名於四方若以書使去聲於四方則書其令大行人王之所以撫邦國諸侯者嵗徧存三嵗徧規五嵗徧省七嵗屬象胥諭言語協辭命九歳屬瞽史諭書名必至於秦滅六國而其號令法制有以同於天下然後車以六只為度史記始皇紀始皇因齊人奏上鄒衍著五徳之運以周得火徳秦代周從所不勝水六數服色皆上黒數以六為紀輿六尺乘六馬書以小篆𨽻書為法按書斷云周宣王時太史史籕作大篆與古文小異後人名籕文秦丞相李斯増損大篆異同而為小篆𨽻書者下邳人程邈所作也邈得罪雲陽獄中覃思十年益小篆方圖而為𨽻書三千卷奏之始皇用以為𨽻人佐書故曰𨽻書而周制始改爾孰謂子思之時而遽然哉或問二十九章之説曰三重諸説不同雖程子亦因鄭注然於文義皆不通帷吕氏一説為得之耳至於上下焉者則吕氏亦失之惜乎其不因上句以推之而為是矛盾食允反也曰然則上焉者以時言下焉者以位言宜不得為一説且又安知下焉者之不為霸者事邪曰以王天下者而言則位不可以復上矣以霸者之事而言則其善又不足稱也亦何疑哉曰此章文義多近似而若可以相易者其有辨乎曰有三王以迹言者也故曰不謬言與其已行者無所差也天地以道言者也故曰不悖言與其自然者無所拂也鬼神無形而難知故曰無疑謂幽有以驗乎明也後聖未至而難料故曰不惑謂逺有以驗乎近也動舉一身兼行與言而言之也道者人所共由兼法與則而言之也法謂法度人之所當守也則謂準則人之所取正也逺者悦其徳之廣被故企而慕之近者習其行去聲之有常故乆而安之也或問小徳大徳之説曰以天地言之則髙下㪚殊者小徳之川流於音烏穆不己者大徳之敦化以聖人言之則物各付物者小徳之川流純亦不已者大徳之敦化以此推之可見諸説之得失矣曰子之所謂兼内外該本末而言者何也曰是不可以一事言也姑以夫子已行之迹言之則由其書之有得夏時賛周易也由其行去聲之有不時不食也迅雷風烈必變也以至於仕止乆速之皆當其可也而其所以律天時之意可見矣得夏時出記禮運箋見論語八佾篇由其書之有序禹貢述職方也由其行之有居魯而逢掖音亦也居宋而章甫也以至於用舍上聲行藏之所遇而安也而其襲水土之意可見矣述職方以除九丘見尚書序職方即周禮職方氏也記儒行篇孔子曰丘少居魯衣逢掖之衣長居宋冠章甫之冠逢掖即深衣也章甫商之冠名若因是以推之則古先聖王之所以迎日推筴與䇿同頒朔授民史記黄帝本紀云迎日推䇿注䇿數也迎數之也日月朔望未來而推之故曰迎日頒朔見論語第三篇告朔注而其大至於禪善去聲授放伐各以其時者皆律天時之事也其所以體國經野方設居方周禮惟王建國辨方正位體國經野注體猶分也經謂為之里數亡虞書序云帝釐下土方設居方言帝舜理四方諸侯隨方别其居方之法也而其廣至於昆蟲草木各遂其性者皆襲水土之事也使夫子而得邦家也則亦何慊口㸃反於是哉或問至聖至誠之説曰楊氏以聰明睿知為君徳者得之而未盡其寛裕以下則失之蓋聰明睿知者生知安行而首出庶物之資也容執敬别則仁義禮智之事也經綸以下諸家之説亦或得其文義但不知經綸之為致和立本之為致中知化之為窮理以至於命且上於至誠者無所繋下於焉有所倚者無所屬音燭則為不得其綱領耳游氏以上章為言至聖之徳下章為言至誠之道者得之其説自徳者其用以下皆善或問卒章之説曰承上三章既言聖人之徳而極其盛矣子思懼夫音扶學者求之於髙逺𤣥妙之域輕自大而反失之也故反於其至近者而言之以示入徳之方欲學者先知用心於内不求人知然後可以謹獨誠身而馴致乎其極也君子篤恭而天下平而其所以平者無聲臭之可尋此至誠盛徳自然之效而中庸之極功也故以是而終篇焉蓋以一篇而論之則天命之性率性之道修道之教與夫天地之所以位萬物之所以育者於此可見其實徳以此章論之則所謂淡而不厭簡而文温而理知逺之近知風之自知㣲之顯者於此可見其成功皆非空言也然其所以入乎此者則無他焉亦曰反身以謹獨而已矣故首章以𤼵其意此章又申明而極言之其㫖深哉其曰不顯亦充尚絅之心以至其極耳與詩之訓義不同蓋亦假借而言若大學敬止之例也諸説如何曰程子至矣吕氏既失其章㫖又不得其綱領條貫而於文義尤多未當去聲如此章上文聖誠之極致而反之以本乎下學之初心遂推言之以至其極而後已也而以為皆言徳成反本之事則既失其章㫖矣此章凡八引詩自衣錦尚絅以至不顯維徳凡五條始學成徳踈密淺深之序也自不大聲色以至無聲無臭凡三條皆所以賛夫不顯之徳也今以不顯維徳通前三義而并言之又以後三條者亦通為進徳工夫淺深次第則又失其條理矣至以知風之自為知見聞動作皆由心出以知㣲之顯為知心之精㣲明逹暴著以不動而敬不言而信為人敬信之以貨色親長上聲逹諸天下為篤恭而天下平以徳為誠之之事而猶有聲色至於無聲無臭然後誠一於天則又文義之未當者然也然近世説者乃有深取其知風之自之説而以為非程夫子不能言者蓋習於佛氏作用是性之談而不察乎了翁序文之誤耳學之不講其陋至此亦可憐也游氏所謂無藏於中無交於物泊然純素獨與神明居所謂離人而立於獨者皆非儒者之言不失足於人不失色於人不失口於人則又審於接物之事而非簡之謂也其論三知未免牽合之病其論徳輶如毛以下則其失與吕氏同楊氏知風之自與吕氏舊本之説畧同而其取證又皆太逺要去聲當參取吕氏改本去上聲其所謂見聞者而益以言語之得失動作之是非皆知其有所從來而不可不謹則庶乎其可耳以徳輶如毛為有徳而未化則又吕游之失也侯氏説多踈闊惟以此章為再叙入徳成徳之序者獨為得之也中庸纂箋卷二
