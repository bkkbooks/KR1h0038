body:
  text: 欽定四庫全書孟子纂箋卷三元詹道𫝊撰公孫丑上凡九章公孫丑問曰夫子當路於齊管仲晏子之功可復許乎復扶又反公孫丑孟子弟子齊人也當路居要地也管仲齊大夫名夷吾相去聲桓公霸諸侯許猶期也孟子未嘗得政丑蓋設辭以問也孟子曰子誠齊人也知管仲晏子而已矣齊人但知其國有二子而已不復扶又反知有聖賢之事或問乎曽西曰吾子與子路孰賢曽西蹴然曰吾先子之所畏也曰然則吾子與管仲孰賢曽西艴然不悅曰爾何曽比豫於管仲管仲得君如彼其専也行乎國政如彼其久也功烈如彼其卑也爾何曽比豫於是蹴子六反艴音拂又音勃曽並音增孟子引曽西與或人問答如此曽西曽子之孫蹴不安貌先子曽子也艴怒色也曽之言則也烈猶光也桓公獨任管仲四十餘年左莊九年經書齊小白入於齊鮑叔言於桓公曰管夷吾治於髙傒使相可也管仲自魯歸齊此為相之始至僖十七年管仲卒其年桓公亦卒管仲始終相齊共四十二年是專且久也管仲不知王道而行霸術故言功烈之卑也楊氏曰孔子言子路之才曰千乘之國可使治其賦也使其見形甸反於施為如是而已其於九合諸侯一正天下固有所不逮也然則曾西推尊子路如此而羞比管仲者何哉譬之御者子路則範我馳驅而不獲者也管仲之功詭遇而獲禽耳曽西仲尼之徒也故不道管仲之事曰管仲曽西之所不為也而子為我願之乎子為之為去聲曰孟子言之也願望也曰管仲以其君霸晏子以其君顯管仲晏子猶不足為與與平聲顯顯名也曰以齊王由反手也王去聲由猶通反手言易去聲也陸梭山云孟子勸齊以王蓋民為貴社稷次之君為輕象山再三歎曰曠古以來無此議論曰若是則弟子之惑滋甚且以文王之德百年而後崩猶未洽於天下武王周公繼之然後大行今言王若易然則文王不足法與易去聲下同與平聲滋益也文王九十七而崩言百年舉成數也按禮記文王世子篇云文王九十七而終文王三分天下才有其二武王克商乃有天下周公相去聲成王制禮作樂然後教化大行曰文王何可當也由湯至於武丁賢聖之君六七作天下歸殷久矣久則難變也武丁朝諸侯有天下猶運之掌也紂之去武丁未久也其故家遺俗流風善政猶有存者又有微子微仲王子比干箕子膠鬲皆賢人也相與輔相之故久而後失之也尺地莫非其有也一民莫非其臣也然而文王由方百里起是以難也朝音潮鬲音隔又音歷輔相之相去聲猶方之猶與由通當猶敵也商自成湯至於武丁中間太甲太戊祖乙盤庚皆賢聖之君作起也自武丁至紂凡九世按史記湯太子早卒次弟外丙即位二年卒弟仲壬即位四年卒伊尹立太甲湯適孫也稱為太宗次沃丁次太庚次小甲次雍已次太戊號中宗次仲丁次外壬次河豐甲次祖乙次祖辛次沃甲次祖丁次南庚次陽甲次盤庚次小辛次小乙次武丁即髙宗也自武丁傳之祖庚次祖甲次廪辛次庚丁次武乙次太丁次帝乙至紂九世故家舊臣之家也齊人有言曰雖有知慧不如乘勢雖有鎡基不如待時今時則易然也知音智鎡音兹鎡基田器也釋名大鋤也時謂耕種之時夏后殷周之盛地未有過千里者也而齊有其地矣雞鳴狗吠相聞而逹乎四境而齊有其民矣地不改辟矣民不改聚矣行仁政而王莫之能禦也辟與闢同此言其勢之易去聲下同也三代盛時王畿音祈不過千里按王制四海之內九州州方千里而王畿居其一是亦井田之制也今齊已有之異於文王之百里又雞犬之聲相聞自國都以至於四境言民居稠密也且王者之不作未有疏於此時者也民之憔悴於虐政未有甚於此時者也飢者易為食渴者易為飲此言其時之易也自文武至此七百餘年箋注謂自文武至此者乃孟子及齊宣王時而周則烈王顯王也歷年圗周自武王元年己卯至赧王五十九年乙巳凡三十六主合八百六十七年今集注自文王始則書稱九年大統未集此在武王之前武王在位七年成王四十七年康王二十六年昭王五十一年穆王五十五年共王十二年懿王二十五年孝王十五年夷王十六年厲王三十七年宣王四十一年幽王十一年共三百五十八年平王五十一年此大略四百年在春秋前也平王四十九年始入春秋凡三年桓王二十三年莊王十五年僖王五年惠王二十五年襄王三十三年項王六年匡王六年定王二十一年簡王十四年靈王二十七年景王二十五年敬王四十三年春秋終於敬王之四十年凡二百四十二年在春秋中也春秋之後敬王猶有四年元王八年貞定王二十八年哀王三月考王十五年威烈王十四年安王二十六年烈王七年由文武至此共七百四十四年矣其後顯王四十八慎靚王七年赧王五十九年而為秦詳考歷代自文王至赧王凡八百五十八年異於商之賢聖繼作民苦虐政之甚異於紂之猶有善政易為飲食言飢渴之甚不待甘美也孔子曰德之流行速於置郵而傳命郵音尤置驛也郵馹音日也如漢五里一置左傳楚子乘馹㑹師所以傳命也孟子引孔子之言如此當今之時萬乘之國行仁政民之悅之猶解倒懸也故事半古之人功必倍之惟此時為然乘去聲倒懸諭困苦也所施之事半於古人而功倍於古人由時勢易而德行速也公孫丒問曰夫子加齊之卿相得行道焉雖由此霸王不異矣如此則動心否乎孟子曰否我四十不動心相去聲此承上章又設問孟子若得位而行道則雖由此而成霸王之業亦不足怪任大責重如此亦有所恐懼疑惑而動其心乎四十彊仕君子道明德立之時孔子四十而不惑亦不動心之謂曰若是則夫子過孟賁逺矣曰是不難告子先我不動心賁音奔孟賁勇士通鑑秦武王好力士任鄙烏獲孟說皆至大官說即賁也劉向說苑孟賁水行不避蛟龍陸行不避豺狼發怒吐氣聲音動天許慎注淮南子孟賁衛人也告子名不害孟賁血氣之勇丒蓋借之以贊孟子不動心之難孟子言告子未為知道乃能先我不動心則此亦未足為難也曰不動心有道乎曰有程子曰心有主則能不動矣叢說孟賁以力為主而不動心北宮以必勝為主而不動心孟舍以無懼萬主而不動心曽子以理直為主而不動心孟子以知言養氣為主而不動心北宫黝之養勇也不膚撓不目逃思以一毫挫於人若撻之於市朝不受於褐寬博亦不受於萬乘之君視刺萬乘之君若刺褐夫無嚴諸侯惡聲至必反之黝伊糾反撓奴效反朝音潮乘去聲北宫姓黝名膚撓肌膚被刺而撓屈也目逃目被刺而轉睛逃避也挫猶辱也褐毛布以毳織布寬博寬大之衣賤者之服也不受者不受其挫也刺殺也嚴畏憚也言無可畏憚之諸侯也黝蓋刺客之流以必勝為主而不動心者也孟施舍之所養勇也曰視不勝猶勝也量敵而後進慮勝而後㑹是畏三軍者也舍豈能為必勝哉能無懼而已矣舍去聲下同孟姓施發語聲舍名也會合戰也舍自言其戰雖不勝亦無所懼若量敵慮勝而後進戰則是無勇而畏三軍矣舍蓋力戰之士以無懼為主而不動心者也孟施舍似曽子北宫黝似子夏夫二子之勇未知其孰賢然而孟施舍守約也夫音扶黝務敵人舍專守己子夏篤信聖人曽子反求諸已故二子之與曽子子夏雖非等倫然論其氣象則各有所似賢猶勝也約要也言論二子之勇則未知誰勝論其所守則舍比於黝為得其要也昔者曽子謂子襄曰子好勇乎吾嘗聞大勇於夫子矣自反而不縮雖褐寬博吾不惴焉自反而縮雖千萬人吾往矣好去聲惴之瑞反此言曽子之勇也子襄曽子弟子也夫子孔子也縮直也檀弓曰古者冠縮縫今也衡縫又曰棺束縮二衡三衡與橫同惴恐懼之也往往而敵之也孟施舍之守氣又不如曽子之守約也言孟施舍雖似曽子然其所守乃一身之氣又不如曽子之反身循理所守尤得其要也孟子之不動心其原蓋出於此下文詳之曰敢問夫子之不動心與告子之不動心可得聞與告子曰不得於言勿求於心不得於心勿求於氣不得於心勿求於氣可不得於言勿求於心不可夫志氣之帥也氣體之充也夫志至焉氣次焉故曰持其志無暴其氣聞與之與平聲夫志之夫音扶此一節公孫丑之問孟子誦告子之言又斷丁亂反下同以已意而告之也告子謂於言有所不逹則當舍上聲置其言而不必反求其理於心於心有所不安則當力制其心而不必更求其助於氣此所以固守其心而不動之速也孟子既誦其言而斷之曰彼謂不得於心而勿求諸氣者急於本而緩其末猶之可也謂不得於言而不求諸心則既失於外而遂遺其內其不可也必矣然凡曰可者亦僅可而有所未盡之辭耳若論其極則志固心之所之而為氣之將去聲帥然氣亦人之所以充滿於身而為志之卒徒者也故志固為至極而氣即次之人固當敬守其志然亦不可不致養其氣蓋其內外本末交相培養此則孟子之心所以未嘗必其不動而自然不動之大略也既曰志至焉氣次焉又曰持其志無暴其氣者何也曰志一則動氣氣一則動志也今夫蹶者趨者是氣也而反動其心夫音扶公孫丑見孟子言志至而氣次故問如此則専持其志可矣又言無暴其氣何也一專一也蹶姑衛反又音厥顛躓音至也趨走也孟子言志之所向専一則氣固從之然氣之所在專一則志亦反為之動如人之顛躓趨走則氣專在是而反動其心焉所以既持其志而又必無暴其氣也程子曰志動氣者什九氣動志者什一敢問夫子惡乎長曰我知言我善養吾浩然之氣惡平聲公孫丑復扶又反問孟子之不動心所以異於告子如此者有何所長而能然而孟子又詳告之以其故也知言者盡心知性於凡天下之言無不有以究極其理而識其是非得失之所以然也浩然盛大流行之貌氣即所謂體之充者本自浩然失養故餒惟孟子為善養之以復其初也蓋惟知言則有以明夫音扶下同道義而於天下之事無所疑食氣則有以配夫道義而於天下之事無所懼此其所以當大任而不動心也告子之學與此正相反其不動心殆亦冥然無覺悍然不顧而已爾敢問何謂浩然之氣曰難言也孟子先言知言而丑先問養氣者承上文方論志氣而言也難言者蓋其心所獨得而無形聲之驗有未易去聲以言語形容者故程子曰觀此一言則孟子之實有是氣可知矣其為氣也至大至剛以直養而無害則塞乎天地之間至大初無限量至剛不可屈撓女巧女教二反蓋天地之正氣而人得以生者其體段本如是也惟其自反而縮則得其所養而又無所作為以害之則其本體不虧而充塞無間去聲矣程子曰天人一也更不分别必列反浩然之氣乃吾氣也養而無害則塞乎天地一為私意所蔽則欿音坎然而餒知其小也謝氏曰浩然之氣須於心得其正時誠取又曰浩然是無虧缺時其為氣也配義與道無是餒也餒奴罪反配者合而有助之意義者人心之裁制道者天理之自然餒飢乏而氣不充體也言人能養成此氣則其氣合乎道義而為之助使其行之勇決無所疑憚若無此氣則其一時所為雖未必不出於道義然其體有所不充則亦不免於疑懼而不足以有為矣是集義所生者非義襲而取之也行有不慊於心則餒矣我故曰告子未嘗知義以其外之也慊口簟反又口劫反集義猶言積善蓋欲事事皆合於義也襲掩取也如齊侯襲莒音舉之襲左襄二十三年齊莊公伐晋遂襲莒注輕行掩其不備曰襲華月杞梁死命在此時言氣雖可以配乎道義而其養之之始乃由事皆合義自反常直是以無所愧怍而此氣自然發生於中非由只行一事偶合於義便可掩襲於外而得之也按朱子格言云非義當一讀蓋非義則是襲而取之者若三字連讀則不成文理今按集注與此不合謾記於此慊快也足也言所行一有不合於義而自反不直則不足於心而其體有所不充矣然則義豈在外哉王文憲曰二餒字不同無是餒也無是氣則道義餒行有不慊則餒無是道義則氣餒蓋二者相資讑其用則道義非氣無以行論其體則氣非道義無以生告子不知此理乃曰仁內義外而不復扶又反以義為事則必不能集義以生浩然之氣矣上文不得於言勿求於心即外義之夜詳見告子上篇必有事焉而勿正心勿忘勿助長也無若宋人然宋人有閔其苗之不長而揠之者芒芒然歸謂其人曰今日病矣豫助苗長矣其子趨而往視之苗則槁矣天下之不助苗長者寡矣以為無益而舍之者不耘苗者也助之長者揠苗者也非徒無益而又害之長上聲揠烏八反舍上聲必有事焉而勿正趙氏程子以七字為句近世或并下文心字讀之者亦通必有事焉有所事也如有事於顓臾之有事正預期也春秋傳曰戰不正勝是也公羊傳僖二十六年云云師出不正反戰不正勝也注不正者不期也如作正心義亦同比與大學之所謂正心者語意自不同也此言養氣者必以集義為事而勿預期其效其或未充則但當勿忘其所有事而不可作為以助其長乃集義養氣之節度也閔憂也揠拔也芒芒無知之貌其人家人也病疲倦也舍之而不耘者忘其所有事揠而助之長者正之不得而妄有作為者也然不耘則失養而已揠則反以害之無是二者則氣得其養而無所害矣如告子不能集義而欲彊上聲制其心則必不能免於正助之病其於所謂浩然者蓋不惟不善養而又反害之矣何謂知言曰詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮生於其心害於其政發於其政害於其事聖人復起必從吾言矣詖皮寄反復扶又反此公孫丑復扶又反問而孟子答之也詖偏陂卑義反也淫放蕩也邪邪僻也遁逃避也四者相因言之病也蔽遮隔也陷沈俗作沉非溺也離叛去也窮困屈也四者亦相因則心之失也人之有言皆出於心其心明乎正理而無蔽然後其言平正通達而無病苟為不然則必有是四者之病矣即其言之病而知其心之失又知其害於政事之決然而不可易者如此非心通於道而無疑於天下之理其孰能之彼告子者不得於言而不肯求之於心至為義外之說則自不免於四者之病其何以知天下之言而無所疑哉程子曰心通乎道然後能辨是非如持權衡以較音教輕重孟子所謂知言是也又曰孟子知言正如人在堂上方能辨堂下人曲直若猶未免雜於堂下衆人之中則不能辨決矣宰我子貢善為說辭冉牛閔子顔淵善言德行孔子兼之曰我於辭命則不能也然則夫子既聖矣乎行去聲說如字此一節林氏以為皆公孫丑之問是也林氏名之竒字少頴三山人說辭言語也德行得於心而見形甸反於行事者也三子善言德行者身有之故言之親切而有味也公孫丑言數子各有所長而孔子兼之然猶自謂不能於辭命今孟子乃自謂我能知言又善養氣則是兼言語德行而有之然則豈不既聖矣乎此夫子指孟子也程子曰孔子自謂不能於辭命者欲使學者務本而已曰惡是何言也昔者子貢問於孔子曰夫子聖矣乎孔子曰聖則吾不能我學不厭而教不倦也子貢曰學不厭智也教不倦仁也仁且知夫子既聖矣夫聖孔子不居是何言也惡平聲夫聖之夫音扶惡驚歎辭也昔者以下孟子不敢當丑之言而引孔子子貢問答之辭以告之也此夫子指孔子也學不厭者智之所以自明教不倦者仁之所以及物再言是何言也以深拒之昔者竊聞之子夏子游子張皆有聖人之一體冉牛閔子顔淵則具體而微敢問所安此一節林氏亦以為皆公孫丑之問是也一體猶一肢也具體而微謂有其全體但未廣大耳安處上聲下同也公孫丑復扶又反問孟子既不敢比孔子則於此數子欲何所處也曰姑舍是舍聲孟子言且置是者不欲以數子所至者自處也曰伯夷伊尹何如曰不同道非其君不事非其民不使治則進亂則退伯夷也何事非君何使非民治亦進亂亦進伊尹也可以仕則仕可以止則止可以久則久可以速則速孔子也皆古聖人也吾未能有行焉乃所願則學孔子也治去聲伯夷孤竹君之長上聲子兄弟遜國避紂隱居聞文王之德而歸之及武王伐紂去而餓死箋見論語第七篇伊尹有莘之處上聲士箋見後篇湯聘而用之使之就桀桀不能用復歸於湯如是者五乃相湯而伐桀也三聖人事詳見此篇之末及萬章下篇伯夷伊尹於孔子若是班乎曰否自有生民以來未有孔子也班齊等之貌公孫丑問而孟子答之以不同也曰然則有同與曰有得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下皆不為也是則同與平聲朝音潮有言有同也以百里而王去聲天下德之盛也行一不義殺一不辜而得天下有所不為心之正也聖人之所以為聖人其根本節目之大者惟在於此於此不同則亦不足以為聖人矣曰敢問其所以異曰宰我子貢有若智足以知聖人汙不至阿其所好汙音蛙好去聲汙下也三子智足以知夫子之道假使汙下必不阿私所好而空譽平聲之明其言之可信也宰我曰以豫觀於夫子賢於堯舜逺矣程子曰語聖則不異事功則有異夫子賢於堯舜語事功也蓋堯舜治天下夫子又推其道以垂教萬世堯舜之道非得孔子則後世亦何所據哉子貢曰見其禮而知其政聞其樂而知其德由百世之後等百世之王莫之能違也自生民以來未有夫子也言大凡見人之禮則可以知其政聞人之樂則可以知其德是以我從百世之後差楚宜反等百世之王無有能遁其情者而見其皆莫若夫子之盛也有若曰豈惟民哉麒麟之於走獸鳳凰之於飛鳥泰山之於丘垤河海之於行潦類也聖人之於民亦類也出於其類拔乎其萃自生民以來未有盛於孔子也垤大結反潦音老麒麟毛蟲之長上聲下同鳳凰羽蟲之長家語執轡第二十五羽蟲三百有六十而鳯為之長毛蟲三百有六十而麟為之長甲蟲三百有六十而龜為之長鱗蟲三百有六十而龍為之長倮蟲三百有六十而人為之長此乾坤之美也垤蟻封也行潦道上無源之水也出髙出也拔特起也萃聚也言自古聖人固皆異於衆人然未有如孔子之尤甚者也程子曰孟子此章擴前聖所未發學者所宜潛心而玩索色柏反也孟子曰以力假仁者霸霸必有大國以德行仁者王王不待大湯以七十里文王以百里力謂土地甲兵之力假仁者本無是心而借其事以為功者也霸若齊桓晉文是也以德行仁則自吾之得於心者推之無適而非仁也以力服人者非心服也力不贍也以德服人者中心悅而誠服也如七十子之服孔子也詩云自西自東自南自北無思不服此之謂也贍時驗反足也詩大雅文王有聲之篇王霸之心誠僞不同故人所以應之者其不同亦如此鄒氏名浩字志完毗陵人曰以力服人者有意於服人而人不敢不服以德服人無意於服人而人不能不服從古以來論王霸者多矣未有若此章之深切而著明者也孟子曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下也惡去聲下同好去聲榮惡辱人之常情然徒惡之而不去去聲其得之之道不能免也如惡之莫如貴德而尊士賢者在位能者在職國家閒暇及是時明其政刑雖大國必畏之矣閒音間此因其惡辱之情而進之以彊上聲仁之事也禮記表記曰畏罪者彊仁謂勉彊行仁也貴德猶尚德也士則指其人而言之賢有德者使之在位則足以正君而善俗能有才者使之在職則足以修政而立事國家閒暇可以有為之時也詳味及字則惟日不足之意可見矣春秋傳曰及猶汲汲也詩云逮天之未隂兩徹彼桑土綢繆牖户今此下民或敢侮豫孔子曰為此詩者其知道乎能治其國家誰敢侮之徹直列反土音杜綢音稠繆武彪反詩豳風鴟處脂反梟吁驕反之篇周公之所作也逮及也徹取也桑土桑根之皮也綢繆音矛纒綿補葺七入反也牖戶巢之通氣出入處也金氏曰今鵲巢每年隨太嵗所向即所謂戶也豫鳥自謂也言我之備患詳密如此今此在下之人或敢有侮豫者乎周公以鳥之為巢如此比君之為國亦當思患而預防之孔子讀而贊之以為知道也按家語孔子謂子路曰豳詩曰殆天之未隂兩云云至誰敢侮之一段皆同孟子引之於此今國家閒暇及是時般樂怠敖是自求禍也言其縱欲偷安亦惟日不足也禍福無不自己求之者結上文之意詩云永言配命自求多福太甲曰天作孽猶可違自作孽不可活此之謂也孽魚列反詩大雅文王之篇永長也言猶念也配合也命天命也此言福之自己求者太甲商書篇名孽禍也違避也活生也書作逭音換金氏曰古皆口傳故字文或不一然古人方言多以四聲通讀逭猶緩也此言禍之自己求者孟子曰尊賢使能俊傑在位則天下之士皆悅而願立於其朝矣朝音潮俊傑才德之異於衆者市門里而不征法而不門里則天下之商皆悅而願藏於其市矣門里市宅也張子曰或賦其市地之門里而不征其稅禮記王制古者公田籍而不稅市門里而不稅關譏而不征疏云市內空地曰廛城內空地曰肆又周禮廛人掌斂市絘布總布門里布之屬絘布音次亦列肆之稅市總布音讒謂無肆立持者之稅門里市者貨賄諸物邸舍之稅所謂列肆之稅邸舍之稅即語䤸云如今人賃鋪面者也或治以市官之法而不賦其門里語䤸古之為市者有司者治之此是市官之法如周禮地官司市平物價治爭訟譏察異服異言之類問此市在何處曰此都邑之市國都如井田樣畫為九區面朝背市左祖右社中一區君之宫室宫室前一區為外朝朝㑹藏庫之屬皆在焉從一區為市市四面有門每日市門開則商賈百物皆入惟民得入公卿大夫士皆不得入入則有罰左右各三區皆民所居外朝一區左則宗廟右則社稷此國君都邑規模之大概也蓋逐末者多則門里以抑之少則不必廛也關譏而不征則天下之旅皆悅而願出於其路矣解見前篇耕者助而不稅則天下之農皆悅而願耕於其野矣但使出力以助耕公田而不稅其私田也廛無夫里之布則天下之民皆悅而願為之氓矣氓音盲周禮宅不毛者有里布民無職事者出夫家之征鄭氏謂宅不種桑麻者罰之使出一里二十五家之布民無常業者罰之使出一夫百畝之稅一家力役之征也周禮地官載師職凡宅不毛者有里布田不耕者出屋粟民無職事者出夫家之征注鄭司農云宅不毛者謂不樹桑麻者也里布者布參印書也廣二寸長二尺以為幣貿易物詩云抱布貿絲抱此市也或曰布泉鄭𤣥曰宅不毛者罰以一里二十五家之泉空田者罰以三家之稅粟以共吉凶二服及喪器也民雖有閒無職事者猶出夫稅家稅也夫稅者百畝之稅家稅者出士徒車輦給繇役王文憲曰夫征者百畝之稅即粟米之征也家征者今徭役即力役之征也里布者五畝之稅即布縷之征也今戰國時一切取之市宅之民已賦其㕓又令平聲出此夫里之布非先王之法也氓民也信能行此五者則鄰國之民仰之若父母矣率其子弟攻其父母自生民以來未有能濟者也如此則無敵於天下無敵於天下者天吏也然而不王者未之有也吕氏曰奉行天命謂之天吏廢興存亡惟天所命不敢不從若湯武是也此章言能行王政則冦戎為父子不行王政則赤子為仇讐孟子曰人皆有不忍人之心天地以生物為心而所生之物因各得夫音扶天地生物之心以為心所以人皆有不忍人之心也先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之掌上言衆人雖有不忍人之心然物欲害之存焉者寡故不能察識而推之政事之間惟聖人全體此心隨感而應故其所行無非不忍人之政也所以謂人皆有不忍人之心者今人乍見孺子將入於井皆有怵惕惻隱之心非所以內交於孺子之父母也非所以要譽於鄉黨朋友也非惡其聲而然也怵音黜內讀為納要平聲惡去聲下同乍猶忽也怵惕驚動貌惻傷之切也隱痛之深也此即所謂不忍人之心也內結要求聲名也言乍見之時便有此心隨見而發非由此三者而然也程子曰滿腔苦江反體骼也子是惻隱之心謝氏曰人須是識其真心方乍見孺子入井之時其心怵惕乃真心也非思而得非勉而中去聲天理之自然也內交要譽惡其聲而然即人欲之私矣由是觀之無惻隱之心非人也無羞惡之心非人也無辭讓之心非人也無是非之心非人也惡去聲下同羞恥己之不善也惡憎人之不善也辭解使去已也讓推吐雷反以與人也是知其善而以為是也非知其惡而以為非也人之所以為心不外乎是四者故因論惻隱而悉數上聲之言人若無此則不得謂之人所以明其必有也惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也惻隱羞惡辭讓是非情也仁義禮智性也心統性情者也端緒音序也因其情之發而性之本然可得而見猶有物在中而緒見形甸反於外也人之有是四端也猶其有四體也有是四端而自謂不能者自賊者也謂其君不能者賊其君者也四體四肢人之所必有者也自謂不能者物欲蔽之耳凡有四端於我者知皆擴而充之矣若火之始然泉之始達苟能充之足以保四海苟不充之不足以事父母擴音廓擴推廣之意充滿也四端在我隨處發見形甸反知皆即此推廣而充滿其本然之量去聲則其日新又新將有不能自己者矣能由此而遂充之則四海雖逺亦吾度內無難保者不能充之則雖事之至近而不能矣此章所論人之性情心之體用本然全具而各有條理如此學者於此反求默識而擴充之則天之所以與我者可以無不盡矣程子曰人皆有是心惟君子為能擴而充之不能然者皆自棄也然其充與不充亦在我而已矣又曰四端不言信者既有誠心為四端則信在其中矣愚按四端之信猶五行之土無定位無成名無專氣而水火金木無不待是以生者故土於四行無不在於四時則寄王去聲焉白虎通云土所以王四季者何木非土不生火非土不榮金非土不成水非土不髙扶微助衰歷成其道故五行更生亦由土金氏曰四行皆生於土者試反諸身腎屬水心屬火肝屬木肺屬金脾屬土然脾受飲食而四藏皆食於脾其理亦猶是也孟子曰矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人巫匠亦然故術不可不慎也函甲也惻隱之心人皆有之是矢人之心本非不如函人之仁也巫者為去聲人祈祝利人之生匠者作為棺槨利人之死孔子曰里仁為美擇不處仁焉得智夫仁天之尊爵也人之安宅也莫之禦而不仁是不智也焉於䖍反夫音扶里有仁厚之俗者猶以為美人擇所以自處上聲而不於仁安得為智乎此孔子之言也仁義禮智皆天所與之良貴而仁者天地生物之心得之最先而兼統四者所謂元者善之長上聲也故曰尊爵在人則為本心全體之德有天理自然之安無人欲陷溺之危人當常在其中而不可須臾離去聲者也故曰安宅此又孟子釋孔子之意以為仁道之大如此而自不為之豈非不智之甚乎不仁不智無禮無義人役也人役而恥為役由弓人而恥為弓矢人而恥為矢也由與猶同以不仁故不智不智故不知禮義之所在如恥之莫如為仁此亦因人愧恥之心而引之使志於仁也不言智禮義者仁該全體能為仁則三者在其中矣仁者如射射者正已而後發發而不中不怨勝己者反求諸己而已矣中去聲為仁由已而由人乎哉記射義射者人之道也求正諸已正己而後發發而不中則不怨勝己者反求諸己而已矣孟子蓋本此孟子曰子路人告之以有過則喜喜其得聞而改之其勇於自修如此周子曰仲由喜聞過今名無窮焉今人有過不喜人規如護疾而忌醫寧滅其身而無悟也噫程子曰子路人告之以有過則喜亦可謂百世之師矣禹聞善言則拜書曰禹拜昌言蓋不待有過而能屈己以受天下之善也大舜有大焉善與人同舍己從人樂取於人以為善舍上聲樂音洛言舜之所為又有大於禹與子路者善與人同公天下之善而不為私也己未善則無所係吝而舍以從人人有善則不待勉強上聲而取之於己此善與人同之目也自耕稼陶漁以至為帝無非取於人者舜之側微耕於歷山陶於河濵漁於雷澤史記五帝紀舜耕歷山歷山之人皆讓畔居陶河濵河濱之器不苦窳病也一年所居成聚二年成邑三年成都厯山在河東雷澤夏兖州今屬濟隂河濱濟隂定陶西南取諸人以為善是與人為善者也故君子莫大乎與人為善與猶許也助也取彼之善而為之於我則彼益勸於為善矣是我助其為善也能使天下之人皆勸於為善君子之善孰大於此此章言聖賢樂音洛善之誠初無彼此之閒去聲故其在人者有以裕於己在己者有以及於人孟子曰伯夷非其君不事非其友不友不立於惡人之朝不與惡人言立於惡人之朝與惡人言如以朝衣朝冠坐於塗炭推惡惡之心思與鄉人立其冠不正望望然去之若將凂焉是故諸侯雖有善其辭命而至者不受也不受也者是亦不屑就己朝音潮惡惡上去聲下如字凂莫罪反塗泥也趙岐注炭墨也鄉人鄉里之常人也望望去而不顧之貌凂汚去聲也屑趙氏曰潔也說文曰動作切切也不屑就言不以就之為潔而切切於是也已語助辭柳下惠不羞汙君不卑小官進不隱賢必以其道遺佚而不怨厄窮而不憫故曰爾為爾我為我雖袒裼裸裎於我側爾焉能凂我哉故由由然與之偕而不自失焉援而止之而止援而止之而止者是亦不屑去已佚音逸袒音但裼音錫裸魯果反裎音程焉能之焉於虔反柳下惠魯大夫展禽居柳下而諡惠也箋見論語第十五篇不隱賢不枉道也遺佚放棄也厄困也憫憂也爾為爾至焉能凂我哉惠之言也袒裼露臂也裸䄇露身也由由自得之貌偕並處上聲也不自失不失其正也援音爰而止之而止者言欲去而可留也孟子曰伯夷隘柳下惠不恭隘與不恭君子不由也隘狹窄側格反也不恭簡慢也夷惠之行去聲固皆造七到反乎至極之地然既有所偏則不能無弊故不可由也孟子纂箋卷三
