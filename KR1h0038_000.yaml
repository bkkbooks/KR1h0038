body:
  text: 欽定四庫全書經部八四書纂箋四書類提要臣等謹案四書纂箋二十八卷元臨川詹道傳撰此書略仿陸德明經典釋文之例取朱子章句或問集注正其音讀考其名物度數間釋朱子所引之成語如真積力久出荀子勸學篇孝子愛日出揚子孝至篇皆為證其出處胡一中嘗稱其羽翼朱子良不誣也其所援引亦間有抵牾如瑚璉之注朱子本因包咸之文道傳既引明堂位夏后氏之四璉殷之六瑚辨其異同而復謂夏曰瑚商曰璉本於爾雅釋器今考爾雅初無其文則道傳杜撰附會也又此書於朱子所引諸儒皆詳其名字里居而孟子盡心章引陳氏厭于嫡母之説實陳耆卿孟子記蒙中語耆卿字夀老臨海人見葉適水心集此獨失載亦未免于疏漏然大致皆有根柢猶元儒之務實學者視蹈襲空言之流過之逺矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
