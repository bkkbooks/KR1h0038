body:
  text: 欽定四庫全書孟子纂箋卷八元詹道傳撰離婁下凡三十三章孟子曰舜生於諸馮遷於負夏卒於鳴條東夷之人也諸馮負夏鳴條皆地名在東方夷服之地文王生於岐周卒於畢郢西夷之人也岐周岐山下周舊邑近畎夷畢郢在豐鎬胡老反今有文王墓地之相去也千有餘里世之相後也千有餘嵗得志行乎中國若合符節得志行乎中國謂舜為天子文王為方伯得行其道於天下也符節以玉為之篆刻文字而中分之彼此各藏其半有故則左右相合以為信也周禮六節守邦國者用玉節守都鄙者用角節凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也門關用符節貨賄用璽節道路用旌節語録云古者符節多以玉為之如牙璋以起軍旅又有竹符又有英簜符漢有銅虎符竹使符銅虎以起兵竹使郡守用之凡符節右留君所左以與其人有故則君以其右合其左以為信也曲禮曰獻粟者執右契右者取物之劵如徵兵取物徴召皆以右取之也若合符節言其同也先聖後聖其揆一也揆度音鐸下同也其揆一者言度之而其道無不同也范氏曰言聖人之生雖有先後逺近之不同然其道則一也子産聽鄭國之政以其乘輿濟人於溱洧乘去聲溱音臻洧榮美反子産鄭大夫公孫僑音喬也溱洧二水名也子産見人有徒涉此水者以其所乘平聲之車載而渡之孟子曰惠而不知為政惠謂私恩小利政則有公平正大之體綱紀法度之施焉歲十一月徒杠成十二月輿梁成民未病涉也杠音江杠方橋也徒杠可通徒行者梁亦橋也輿梁可通車輿者周十一月夏九月也周十二月夏十月也夏令曰十月成梁見春秋外傳蓋農功已畢可用民力又時將寒沍音互水有橋梁則民不患於徒涉亦王政之一事也君子平其政行辟人可也焉得人人而濟之辟與闢同焉於虔反辟辟除也如周禮閽音昏人為去聲之辟之辟周禮天官閽人掌王宫之中門之禁凡內外命夫命婦出入則為之辟言能平其政則出行之際辟除行人使之辟已亦不為過況國中之水當涉者衆豈能悉以乘輿濟之哉故為政者每人而恱之日亦不足矣言每人皆欲致私恩以恱其意則人多日少亦不足於用矣諸葛武侯嘗言治世以大德不以小惠金氏曰葛氏本出諸縣後徙琅琊其地自有葛氏故自諸而遷者稱諸葛以别之諸葛亮字孔明官至丞相封武鄉侯諡忠武續漢書曰亮為相十四年才兩赦或言其惜赦者亮曰云云得孟子之意矣孟子告齊宣王曰君之視臣如手足則臣視君如腹心君之視臣如犬馬則臣視君如國人君之視臣如土芥則臣視君如寇讎孔氏曰宣王之遇臣下恩禮衰薄至於昔者所進今日不知其亡則其於羣臣可謂邈莫角反然無敬矣故孟子告之以此手足腹心相待一體恩義之至也如犬馬則輕賤之然猶有豢音患養之恩焉國人猶言路人言無怨無德也土芥則踐踏之而已矣斬艾音乂之而已矣其賤惡去聲之又甚矣寇讎之報不亦宜乎王曰禮為舊君有服何如斯可為服矣為去聲下為之同儀禮曰以道去君而未絶者服齊音咨衰音催三月按儀禮喪服篇傳曰大夫為舊君何以服齊衰三月也大夫去君歸其宗廟故服齊衰三月言與民同也何大夫之謂乎言其以道去君而猶未絶也注謂三諫不從待放於郊未絶者言爵祿尚有列於朝出入有詔於國凡畿內之民服齊衰三月又按子夏傳云臣為君方喪三年王疑孟子之言太甚故以此禮為問曰諫行言聽膏澤下於民有故而去則君使人導之出疆又先於其所往去三年不反然後收其田里此之謂三有禮焉如此則為之服矣導之出疆防剽匹妙反掠音略也先於其所往稱道其賢欲其收用之也三年而後收其田祿里居前此猶望其歸也今也為臣諫則不行言則不聽膏澤不下於民有故而去則君搏執之又極之於其所往去之日遂收其田里此之謂寇讎寇讎何服之有極窮也窮之於其所往之國如晉錮音固欒盈也左襄二十十年欒桓子娶於范宣子生懷子范鞅以其亡也怨欒氏桓子卒欒祁與其老州賔通懷子患之祁懼其討也訴諸宣子曰盈將為亂范鞅為之徴宣子使城著而遂逐之秋欒盈出奔楚冬會於商任錮欒氏也潘興嗣字延之豫章人號清逸嘗從濓溪逰曰孟子告齊王之言猶孔子對定公之意也而其言有迹不若孔子之渾然也蓋聖賢之别必列反如此陳定宇曰孟子亦是述記檀弓篇子思答魯穆公問禮為舊君反服之意楊氏曰君臣以義合者也故孟子為去聲齊王深言報施詩智反之道使知為君者不可不以禮遇其臣耳若君子之自處上聲下同則豈處其薄乎孟子曰王庶幾改之豫日望之君子之言蓋如此孟子曰無罪而殺士則大夫可以去無罪而戮民則士可以徙言君子當見幾平聲而作禍已迫則不能去矣孟子曰君仁莫不仁君義莫不義張氏曰此章重平聲出然上篇主言人臣當以正君為急此章直戒人君義亦小異耳孟子曰非禮之禮非義之義大人弗為察理不精故有二者之蔽大人則隨事而順理因時而處上聲宜豈為是哉孟子曰中也養不中才也養不才故人樂有賢父兄也如中也棄不中才也棄不才則賢不肖之相去其間不能以寸樂音洛無過不及之謂中足以有為之謂才養謂涵育薰陶俟其自化也賢謂中而才者也樂有賢父兄者樂其終能成已也為父兄者若以子弟之不賢遂遽絶之而不能教則吾亦過中而不才矣其相去之間能幾何哉孟子曰人有不為也而後可以有為程子曰有不為知所擇也惟能有不為是以可以有為無所不為者安能有所為邪孟子曰言人之不善當如後患何此亦有為去聲而言孟子曰仲尼不為己甚者已猶太也楊氏曰言聖人所為本分去聲之外不加毫末非孟子真知孔子不能以是稱之孟子曰大人者言不必信行不必果惟義所在行去聲必猶期也大人言行不先期於信果但義之所在則必從之卒亦未嘗不信果也尹氏曰主於義則信果在其中矣主於信果則未必合義王勉曰若不合於義而不信不果則妄人爾孟子曰大人者不失其赤子之心者也大人之心通達萬變赤子之心則純一無偽而已然大人之所以為大人正以其不為物誘而有以全其純一無偽之本然是以擴而充之則無所不知無所不能而極其大也孟子曰養生者不足以當大事惟送死可以當大事養去聲事生固當愛敬然亦人道之常耳至於送死則人道之大變孝子之事親舍上聲是無以用其力矣故尤以為大事而必誠必信不使少有後日之悔也記檀弓上子思曰喪三日而殯凡附於身者必誠必信勿之有悔焉耳矣三月而葬凡附於棺者必誠必信勿之有悔焉耳矣孟子曰君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逢其原故君子欲其自得之也造七到反造詣也深造之者進而不已之意道則其進為之方也資猶藉也左右身之兩旁言至近而非一處也逢猶值也原本也水之來處也言君子務於深造而必以其道者欲其有所持循以俟夫音扶默識如字心通自然而得之於已也自得於已則所以處上聲之者安固而不搖處之安固則所藉者深逺而無盡所藉者深則日用之間取之至近無所往而不值其所資之本也程子曰學不言而自得者乃自得也有安排布置者皆非自得也然必潛心積慮優遊厭飫於其間然後可以有得若急迫求之則是私己而已終不足以得之也孟子曰博學而詳説之將以反説約也言所以博學於文而詳説其理者非欲以誇多而鬬靡也此句出韓文送陳秀才形序欲其融會貫通有以反而説到至約之地耳蓋承上章之意而言學非欲其徒博而亦不可以徑約也孟子曰以善服人者未有能服人者也以善養人然後能服天下天下不心服而王者未之有也王去聲服人者欲以取勝於人養人者欲其同歸於善蓋心之公私小異而人之向背音佩頓殊學者於此不可以不審也孟子曰言無實不祥不祥之實蔽賢者當之或曰天下之言無有實不祥者惟蔽賢為不祥之實或曰言而無實者不祥故蔽賢為不祥之實二説不同未知孰是或有闕文焉徐子曰仲尼亟稱於水曰水哉水哉何取於水也亟去吏反亟數音朔也水哉水哉歎美之辭古疏徐子即徐辟孟子曰原泉混混不舍晝夜盈科而後進放乎四海有本者如是是之取爾舍放皆去聲舍合讀如字詳見論語子在川上章原泉有原之水也混混湧出之貌不舍晝夜言常出不竭也盈滿也科坎也言其進以漸也放至也言水有原本不已而漸進以至於海如人有實行去聲則亦不已而漸進以至於極也苟為無本七八月之間兩集溝澮皆盈其涸也可立而待也故聲聞過情君子恥之澮古外反涸下各反聞去聲集聚也澮田間水道也涸乾音干也如人無實行而暴得虛譽不能長久也聲聞名譽也情實也恥者恥其無實而將不繼也林氏曰徐子之為人必有躐等干譽之病故孟子以是答之鄒氏曰孔子之稱水其旨微矣孟子獨取此者自徐子之所急者言之也孔子嘗以聞達告子張矣達者有本之謂也聞則無本之謂也然則學者其可以不務本乎孟子曰人之所以異於禽獸者幾希庶民去之君子存之幾希少也庶衆也人物之生同得天地之理以為性同得天地之氣以為形其不同者獨人於其間得形氣之正而能有以全其性為少異耳雖曰少異然人物之所以分實在於此衆人不知此而去之則名雖為人而實無以異於禽獸君子知此而存之是以戰兢惕他歷反厲而卒能有以全其所受之正也舜明於庶物察於人倫由仁義行非行仁義也物事物也明則有以識其理也人倫説見前篇察則有以盡其理之詳也物理固非度外而人倫尤切於身故其知之有詳略之異在舜則皆生而知之也由仁義行非行仁義則仁義已根於心而所行皆從此出非以仁義為美而後勉強上聲行之所謂安而行之也此則聖人之事不待存之而無不存矣尹氏曰存之者君子也存者聖大也君子所存存天理也由仁義行存者能之孟子曰禹惡旨酒而好善言惡好皆去聲戰國䇿曰儀狄作酒禹飲而甘之曰後世必有以酒亡其國者遂疏平聲儀狄而絶旨酒事見魏卷二書曰禹拜昌言見大禹謨湯執中立賢無方執謂守而不失中者無過不及之名方猶類也立賢無方惟賢則立之於位不問其類也文王視民如傷望道而未之見而讀為如古字通用民已安矣而視之猶若有傷道已至矣而望之猶若未見或問以而為如亦有據乎曰詩云垂帶而厲鄭箋而亦如也此以而為如也春秋星隕如雨左氏曰與雨偕也此以如為而也則其混讀而互用之久矣金氏曰詩中用而字結語者皆是如字之意聖人之愛民深而求道切如此不自滿足終日乾乾之心也武王不泄邇不忘逺泄狎也邇者人所易去聲下同狎而不泄與褻同逺者人所易忘而不忘德之盛仁之至也周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦三王禹也湯也文武也四事上四條之事也時異勢殊故其事或有所不合思而得之則其理初不異矣坐以待旦急於行也此承上章言舜因歷敘羣聖以繼之而各舉其一事以見形甸反其憂勤惕厲之意蓋天理之所以常存而人心之所以不死也程子曰孟子所稱各因其一事而言非謂武王不能執中立賢湯却泄邇忘逺也人謂各舉其盛亦非也聖人亦無不盛孟子曰王者之迹熄而詩亡詩亡然後春秋作王者之迹熄謂平王東遷而政教號令不及於天下也詩亡謂黍離降為國風而雅亡也詩王黍離譜申侯與犬戎攻宗周殺幽王於戲晉文侯鄭武公迎太子宜臼於申而立之是為平王以亂故徙居東都王城於是王室之尊與諸侯無異其詩不能復雅故貶之謂之王國之變風春秋魯史記之名孔子因而筆削之始於魯隱公之元年實平王之四十九年也晉之乘楚之檮杌魯之春秋一也乘去聲檮音逃杌音兀乘義未詳趙氏以為興於田賦乘馬之事或曰取記載當時行事而名之也檮杌惡獸名古者因以為凶人之號神異經西方荒中有獸焉其狀如虎而犬毛長二尺人靣虎足豬口牙尾長一丈八尺攪亂荒中名曰檮杌左文二十年傳顓頊氏有不才子天下謂之檮杌此固以為凶人之號也取記惡垂戒之義也春秋者記事者必表年以首事年有四時故錯舉以為所記之名也必表年以下出晉杜預左傳序文古者列國皆有史官掌記時事此三者皆其所記册書之名也其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣春秋之時五霸迭興而桓文為盛史史官也竊取者謙辭也公羊傳去聲作其辭則丘有罪焉爾意亦如此蓋言斷丁亂反之在已所謂筆則筆削則削遊夏不能贊一辭者也公羊傳昭十二年春秋之信史也其序則齊桓晉文其會則主會者為之也其辭則丘有罪焉爾史記孔子世家孔子在位聽訟文辭有可與人共者弗獨有也至於為春秋筆則筆削則削子夏之徒不能贊一辭尹氏曰言孔子作春秋亦以史之文載當時之事也而其義則定天下之邪正為百王之大法此又承上章歷敘羣聖因以孔子之事繼之而孔子之事莫大於春秋故特言之孟子曰君子之澤五世而斬小人之澤五世而斬澤猶言流風餘韻也父子相繼為一世三十年亦為一世斬絶也大約君子小人之澤五世而絶也楊氏曰四世而緦音思服之窮也五世袒音但免音問殺所介反同姓也六世親屬竭矣此記大傳全文本疏云上自髙祖下至已兄弟同承高祖之後為族兄弟為親兄弟期一從兄弟大功再從兄弟小功三從兄弟緦麻共四世緦服盡也五世則袒免而無正服減殺同姓六世則不服袒免惟同姓而已故親屬竭袒身去飾也袒免者肉袒而著免免狀如冠而廣一寸冠至尊不可居肉袒之體故為免以代之又檀弓免焉注以布廣一寸從項上而前交於額上又郤向後繞於髻禮朋友在他邦無主人乃袒免若朋友在家則弔服加麻加麻者素辨上加緦之環絰然則袒免亦朋友之服也服窮則遺澤寖微故五世而斬豫未得為孔子徒也豫私淑諸人也私猶竊也淑善也李氏以為方言是也人謂子思之徒也自孔子卒至孟子遊梁時方百四十餘年而孟子已老然則孟子之生去孔子未百年也箋見篇末故孟子言豫雖未得親受業於孔子之門然聖人之澤尚存猶有能傳其學者故我得聞孔子之道於人而私竊以善其身蓋推尊孔子而自謙之辭也此又承上三章歷敘舜禹至於周孔而以是終之其辭雖謙然其所以自任之重亦有不得而辭者矣孟子曰可以取可以無取取傷亷可以與可以無與與傷惠可以死可以無死死傷勇先言可以者略見而自許之辭也後言可以無者深察而自疑之辭也過取固害於亷然過與亦反害其惠過死亦反害其勇蓋過猶不及之意也林氏曰公西華受五秉之粟是傷亷也冉子與之是傷惠也子路之死於衛是傷勇也逄蒙學射於羿盡羿之道思天下惟羿為愈已於是殺羿孟子曰是亦羿有罪焉公明儀曰冝若無罪焉曰薄乎云爾惡得無罪逄薄江反惡平聲羿有窮后羿也逄蒙羿之家衆也羿善射篡初患反夏自立後為家衆所殺左襄四年云羿將歸自田家衆殺而烹之以食其子子不忍食死於窮愈猶勝也薄言其罪差楚宜反薄耳鄭人使子濯孺子侵衛衛使庾公之斯追之子濯孺子曰今日我疾作不可以執弓吾死矣夫問其僕曰追我者誰也其僕曰庾公之斯也曰吾生矣其僕曰庾公之斯衛之善射者也夫子曰吾生何謂也曰庾公之斯學射於尹公之他尹公之他學射於我夫尹公之他端人也其取友必端矣庾公之斯至曰夫子何為不執弓曰今日我疾作不可以執弓曰小人學射於尹公之他尹公之他學射於夫子我不忍以夫子之道反害夫子雖然今日之事君事也我不敢廢抽矢扣輪去其金發乘矢而後反他徒何反矣夫夫尹之夫並音扶去上聲乘去聲之語助也僕御也尹公他亦衛人也端正也孺子以尹公正人知其取友必正故度音鐸庾公必不害己小人庾公自稱也金鏃作木反也扣輪出鏃令平聲不害人乃以射也乘矢四矢也孟子言使羿如子濯孺子得尹公他而教之則必無逄蒙之禍然夷羿篡弒之賊蒙乃逆儔庾斯雖全私恩亦廢公義其事皆無足論者孟子蓋特以取友而言耳古疏云左襄十四年云尹公他學射於庾公差庾公差學射於公孫丁孫文子使二子追衛獻公公孫丁御公庾公差曰射為背師不射為戮射為禮乎射兩鈎而還尹公他曰子為師我則逺矣乃反之公孫丁授公轡而射之貫臂孟子之言與此不同是二説必有取一焉孟子曰西子蒙不潔則人皆掩鼻而過之西子美婦人即西施也吳王夫差破越越人選美女西施以獻請退軍吳王得西施為築姑蘇臺高三十丈遊宴其上及吳亡范蠡擕西子扁舟泛五湖蒙猶冒也不潔汙穢之物也掩鼻惡去聲其臭也雖有惡人齊戒沐浴則可以祀上帝齊側皆反惡人醜貌者也尹氏曰此章戒人之喪去聲善而勉人以自新也孟子曰天下之言性也則故而已矣故者以利為本性者人物所得以生之理也故者其已然之迹若所謂天下之故者也易繫辭寂然不動感而遂通天下之故利猶順也語其自然之勢也言事物之理雖若無形而難知然其發見形甸反之已然則必有迹而易去聲見如字故天下之言性者但言其故而理自明猶所謂善言天者必有驗於人也漢書董仲舒䇿曰蓋聞善言天者必有徴於人天道無形而難知人事有迹而易見然其所謂故者又必本其自然之勢如人之善水之下非有所矯揉人久反造作而然者也若人之為惡水之在山則非自然之故矣所惡於智者為其鑿也如智者若禹之行水也則無惡於智矣禹之行水也行其所無事也如智者亦行其所無事則智亦大矣惡為皆去聲天下之理本皆利順小智之人務為穿鑿所以失之禹之行水則因其自然之勢而導之未嘗以私智穿鑿而有所事是以水得其潤下去聲之性而不為害也天之高也星辰之逺也苟求其故千嵗之日至可坐而致也天雖高星辰雖逺然求其已然之迹則其運有常雖千歲之久其日至之度可坐而得況於事物之近若因其故而求之豈有不得其理者而何以穿鑿為哉必言日至者造歷者以上古十一月甲子朔夜半冬至為歷元也史記歷書漢武帝詔太史改顓頊歷作大初歷起五行建氣物分數以子日當冬至則隂陽離合之道行焉十一月甲子朔旦冬至已詹其更以七年為太初元年注云案律歷志以前歷上元至太初四年一千六百一十七歲至元封七年復得十一月甲子朔旦冬至也又云日得甲子夜半朔旦冬至索隱曰以建子為正故以夜半為朔其至與朔同故云夜半朔旦冬至也若以建寅為正則以平旦為朔此治歷之本也程子曰此章専為去聲智而發愚謂事物之理莫非自然順而循之則為大智若用小智而鑿以自私則害於性而反為不智程子之言可謂深得此章之旨矣公行子有子之喪右師往弔入門有進而與右師言者有就右師之位而與右師言者公行子齊大夫右師王歡也疏云古者天子之卿尊者謂之太師卑者謂之少師諸侯之卿尊者謂之左師卑者謂之右師孟子不與右師言右師不悅曰諸君子皆與歡言孟子獨不與歡言是簡歡也簡略也孟子聞之曰禮朝廷不歷位而相與言不踰階而相揖也我欲行禮子敖以我為簡不亦異乎朝音潮是時齊卿大夫以君命弔各有位次若周禮凡有爵者之喪禮則職喪涖音利其禁令序其事故云朝廷也周禮春官宗伯職喪掌諸侯及卿大夫士凡有爵者之喪以國之喪禮涖其禁令序其事歷更平聲涉也位他人之位也右師未就位而進與之言則右師歷己之位矣右師已就位而就與之言則己歷右師之位矣孟子右師之位又不同階孟子不敢失此禮故不與右師言也孟子曰君子所以異於人者以其存心也君子以仁存心以禮存心以仁禮存心言以是存於心而不忘也仁者愛人有禮者敬人此仁禮之施愛人者人恆愛之敬人者人恆敬之此仁禮之驗有人於此其待我以橫逆則君子必自反也我必不仁也必無禮也此物奚宜至哉橫去聲下同橫逆謂強暴不順理也物事也其自反而仁矣自反而有禮矣其橫逆由是也君子必自反也我必不忠由與猶同下放此忠者盡已之謂我必不忠恐所以愛敬人者有所不盡其心也自反而忠矣其橫逆由是也君子曰此亦妄人也已矣如此則與禽獸奚擇哉於禽獸又何難焉難去聲奚擇何異也又何難焉言不足與之校音教也是故君子有終身之憂無一朝之患也乃若所憂則有之舜人也我亦人也舜為法於天下可傳於後世我由未免為鄉人也是則可憂也憂之如何如舜而已矣若夫君子所患則亡矣非仁無為也非禮無行也如有一朝之患則君子不患矣夫音扶鄉人鄉里之常人也君子存心不苟故無後憂禹稷當平世三過其門而不入孔子賢之事見前篇古疏云三過其門則主乎禹兼稷言之何也曰如論語言躬稼主於稷亦兼禹言之是帶説來顔子當亂世居於陋巷一簞食一瓢飲人不堪其憂顔子不改其樂孔子賢之食音嗣樂音洛孟子曰禹稷顔回同道聖賢之道進則救民退則修己其心一而已矣禹思天下有溺者由己溺之也稷思天下有飢者由己飢之也是以如是其急也由與猶同禹稷身任其職故以為己責而救之急也禹稷顔子易地則皆然聖賢之心無所偏倚隨感而應各盡其道故使禹稷居顔子之地則亦能樂顔子之樂使顔子居禹稷之任亦能憂禹稷之憂也今有同室之人鬬者救之雖被髮纓冠而救之可也不暇束髮而結纓往救言急也以喻禹稷鄉鄰有鬬者被髮纓冠而往救之則惑也雖閉戶可也喻顔子也此章言聖賢心無不同事則所遭或異然處上聲之各當其理是乃所以為同也尹氏曰當其可之謂時前聖後聖其心一也故所遇皆盡善公都子曰匡章通國皆稱不孝焉夫子與之逰又從而禮貌之敢問何也匡章齊人通國盡一國之人也禮貌敬之也孟子曰世俗所謂不孝者五惰其四支不顧父母之養一不孝也博奕好飲酒不顧父母之養二不孝也好貨財私妻子不顧父母之養三不孝也從耳目之欲以為父母戮四不孝也好勇鬭狠以危父母五不孝也章子有一於是乎好養從皆去聲狠胡懇反戮羞辱也狠忿戾也夫章子子父責善而不相遇也遇合也相責以善而不相合故為父所逐也責善朋友之道也父子責善賊恩之大者賊害也朋友當相責以善父子行之則害天性之恩也夫章子豈不欲有夫妻子母之屬哉為得罪於父不得近出妻屏子終身不養焉其設心以為不若是是則罪之大者是則章子已矣夫章之夫音扶為去聲屏必井反養去聲言章子非不欲身有夫妻之配子有子母之屬但為身不得近於父故不敢受妻子之養以自責罰其心以為不如此則其罪益大也此章之旨於衆所惡去聲而必察焉可以見聖賢至公至仁之心矣楊氏曰章子之行去聲孟子非取之也特哀其志而不與之絶耳曽子居武城有越寇或曰寇至盍去諸曰無寓人於我室毁傷其薪木寇退則曰修我牆屋我將反寇退曽子反左右曰待先生如此其忠且敬也寇至則先去以為民望寇退則反殆於不可沈猶行曰是非汝所知也昔沈猶有負芻之禍從先生者七十人未有與焉與去聲武城魯邑名盍何不也左右曽子之門人也忠敬言武城之大夫事曽子忠誠恭敬也為民望言使民望而效之沈猶行弟子姓名也言曽子嘗舍於沈猶氏時有負芻者作亂來攻沈猶氏曽子率其弟子去之不與其難去聲言師賔不與臣同子思居於衛有齊寇或曰寇至盍去諸子思曰如伋去君誰與守言所以不去之意如此孟子曰曽子子思同道曽子師也父兄也子思臣也微也曽子子思易地則皆然微猶賤也尹氏曰或逺上聲害或死難去聲其事不同者所處上聲之地不同也君子之心不繫於利害惟其是而已故易地則皆能為之孔氏曰古之聖賢言行去聲不同事業亦異而其道未始不同也學者知此則因所遇而應之若權衡之稱物低昻屢變而不害其為同也儲子曰王使人瞷夫子果有以異於人乎孟子曰何以異於人哉堯舜與人同耳瞷古莧反儲子齊人也瞷竊視也聖人亦人耳豈有異於人哉齊人有一妻一妾而處室者其良人出則必饜酒肉而後反其妻問所與飲食者則盡富貴也其妻告其妾曰良人出則必饜酒肉而後反問其與飲食者盡富貴也而未嘗有顯者來吾將瞷良人之所之也蚤起施從良人之所之遍國中無與立談者卒之東郭墦間之祭者乞其餘不足又顧而之他此其為饜足之道也其妻歸告其妾曰良人者所仰望而終身也今若此與其妾訕其良人而相泣於中庭而良人未之知也施施從外來驕其妻妾施音迤又音異墦音燔施施如字章首當有孟子曰字闕文也良人夫也饜飽也顯者富貴人也施邪施而行不使良人知也墦冢也顧望也訕怨詈力智反也施施喜悅自得之貌由君子觀之則人之所以求富貴利達者其妻妾不羞也而不相泣者幾希矣孟子言自君子而觀今之求富貴者皆若此人耳使其妻妾見之不羞而泣者少矣言可羞之甚也趙氏曰言今之求富貴者皆以枉曲之道昏夜乞哀以求之而以驕人於白日與斯人何以異哉孟子纂箋卷八
