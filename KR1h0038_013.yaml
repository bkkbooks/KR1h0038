body:
  text: 欽定四庫全書論語纂箋卷九元詹道傳撰陽貨第十七凡二十六章陽貨欲見孔子孔子不見歸孔子豚孔子時其亡也而往拜之遇諸塗歸如字一作饋陽貨季氏家臣名虎嘗囚季桓子而專國政定五年季平子卒既葬陽虎囚季桓子六年虎盟公及三桓於周社七年齊人歸鄆陽關虎居之以為政欲今平聲孔子來見已而孔子不往貨以禮大夫有賜於士不得受於其家則往拜其門故瞰苦濫反孔子之亡而歸之豚欲令孔子來拜而見之也謂孔子曰來豫與爾言曰懷其寶而迷其邦可謂仁乎曰不可好從事而亟失時可謂知乎曰不可日月逝矣嵗不我與孔子曰諾吾將仕矣好亟知並去聲懷寶迷邦謂懷藏道德不救國之迷亂亟數音朔也失時謂不及事幾平聲之㑹將者且然而未必之辭貨語皆譏孔子而諷使速仕孔子固未嘗如此而亦非不欲仕也但不仕於貨耳故直據理答之不復扶又反與辨若不諭其意者蓋陽貨之欲見孔子雖其善意然不過欲使助已為亂耳故孔子不見者義也其往拜者禮也必時其亡而往者欲其稱去聲也遇諸塗而不避者不終絶也隨問而對者理之直也對而不辨者言之遜去聲而亦無所詘與屈同也揚氏曰揚雄謂孔子於陽貨也敬所不敬為去聲詘身以信與伸同道非知孔子者揚子法言五百篇或問聖人有詘乎曰仲尼於南子所不欲見也於陽虎所不欲敬也見所不見敬所不敬不詘如何或曰衛靈公問陳則何以不詘曰詘身將以信道也如詘道而信身雖天下不可為也蓋道外無身身外無道身詘矣而可以信道吾未之信如字也子曰性相近也習相逺也此所謂性兼氣質而言者也氣質之性固有美惡之不同矣然以其初而言則皆不甚相逺也但習於善則善習於惡則惡於是始相逺耳程子曰此言氣質之性非言性之本也若言其本則性即是理理無不善孟子之言性善是也何相近之有哉子曰唯上知與下愚不移知去聲此承上章而言人之氣質相近之中又有美惡一定而非習之所能移者程子曰人性本善有不可移者何也語其性則皆善也語其才則有下愚之不移所謂下愚有二焉自暴自棄也人苟以善自治則無不可移雖昏愚之至皆可漸子廉反磨而進也惟自暴者拒之以不信自棄者絶之以不為雖聖人與居不能化而入也仲尼之所謂下愚也然其質非必昏且愚也往往强戾而才力有過人者商辛是也史記帝乙之子辛即帝紂資辨捷疾聞見甚敏材力過人手格猛獸聖人以其自絶於善謂之下愚然考其歸則誠愚也或曰此與上章當合為一子曰二字蓋衍延面反文耳子之武城聞弦歌之聲弦琴瑟也時子遊為武城宰以禮樂為教故邑人皆弦歌也夫子莞爾而笑曰割雞焉用牛刀莞華版反焉於䖍反莞爾小笑貌蓋喜之也因言其治小邑何必用此大道也子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也易去聲君子小人以位言之子游所稱蓋夫子之常言言君子小人皆不可以不學故武城雖小亦必教以禮樂子曰二三子偃之言是也前言戲之耳嘉子游之篤信又以解門人之惑也夫治有大小而其治之必用禮樂則其為道一也但衆人多不能用而子游獨行之故夫子驟聞而深喜之因反其言以戲之而子游以正對故復扶又反是其言而自實其戲也公山弗擾以費畔召子欲往弗擾季氏宰與陽虎共執桓子據邑以叛與畔同箋見第十六篇金氏曰定五年弗擾為費宰與陽虎共執桓子虎敗出奔弗擾據邑以叛至十二年仲由為季氏宰將墮三都季氏將墮費公山不狃叔孫輒率費人以襲魯國人敗諸姑蔑二子奔齊子路不說曰末之也已何必公山氏之之也說音恱末無也言道既不行無所往矣何必公山氏之往乎子曰夫召我者而豈徒哉如有用我者吾其為東周乎夫音扶豈徒哉言必用我也為東周言興周道於東方程子曰聖人以天下無不可為之事亦無不可改過之人故欲往然而終不往者知其必不能改故也子張問仁於孔子孔子曰能行五者於天下為仁矣請問之曰恭寬信敏惠恭則不侮寬則得衆信則人任焉敏則有功惠則足以使人行是五者則心存而理得矣於天下言無適而不然猶所謂雖之夷狄不可棄者五者之目蓋因子張所不足而言耳任倚仗也又言其效如此張敬夫曰能行此五者於天下則其心公平而周遍可知矣然恭其本與李氏曰此章與六言六蔽五美四惡之類皆與前後文體大不相似佛肸召子欲往佛音弼肸許密反佛肸晉大夫趙氏之中牟宰也中牟在相州蕩隂縣史記弗肸為中牟宰趙簡子攻范中行氏伐中牟佛肸叛子路曰昔者由也聞諸夫子曰親於其身為不善者君子不入也佛肸以中牟畔子之往也如之何子路恐佛肸之浼音每夫子故問此以止夫子之行親猶自也不入不入其黨也子曰然有是言也不曰堅乎磨而不磷不曰白乎涅而不緇磷力刃反涅乃結反磷薄也涅染皂物齊氏曰涅水中黑土今江東皂泥言人之不善不能浼已楊氏曰磨不磷涅不緇而後無可無不可堅白不足而欲自試於磨涅其不磷緇也者幾希吾豈匏瓜也哉焉能繫而不食焉於䖍反匏瓠音互也匏瓜繫於一處而不能飲食人則不如是也張敬夫曰子路昔者之所聞君子守身之常法夫子今日之所言聖人體道之大權也然夫子於公山佛肸之召皆欲往者以天下無不可變之人無不可為之事也其卒不往者知其人之終不可變而事之終不可為耳一則生物之仁一則知人之智也子曰由也女聞六言六蔽矣乎對曰未也女音汝下同蔽遮掩也居吾語女語去聲禮君子問更平聲端則起而對出記曲禮故夫子諭子路使還坐而告之好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂好知並去聲六言皆美德然徒好之而不學以明其理則各有所蔽愚若可陷可罔之類蕩謂窮髙極廣而無所止賊謂傷害於物勇者則之發剛者勇之體狂躁率也范氏曰子路勇於為善其失之者未能好學以明之也故告之以此曰勇曰剛曰信曰直又皆所以救其偏也子曰小子何莫學夫詩夫音扶小子弟子也詩可以興感發志意可以觀考見得失可以羣和而不流可以怨怨而不怒邇之事父逺之事君人倫之道詩無不備二者舉重而言多識於鳥獸草木之名其緒餘又足以資多識學詩之法此章盡之讀是經者所冝盡心也子謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正牆面而立也與女音汝與平聲為猶學也周南召實照反南詩首篇名所言皆修身齊家之事正牆面而立言即其至近之地而一物無所見一步不可行子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉敬而將之以玉帛則為禮和而發之以鐘鼓則為樂遺其本而專事其末則豈禮樂之謂哉程子曰禮只是一箇序樂只是一箇和只此兩字含蓄多少義理天下無一物無禮樂且如置此兩椅一不正便是無序無序便乖乖便不和又如盜賊至為不道然亦有禮樂蓋必有總屬必相聽順乃能為盜不然則叛亂無統不能一日相聚而為盜也禮樂無處無之學者要須識得子曰色厲而內荏譬諸小人其猶穿窬之盜也與荏而審反與平聲厲威嚴也荏柔弱也小人細民也穿穿壁窬踰牆言其無實盜名而常畏人知也子曰鄉原德之賊也鄉者鄙俗之意原與願同荀子原慤注讀作願是也荀子正論篇上端誠則下原慤矣鄉原鄉人之願者也蓋其同流合汙以媚於世故在鄉人之中獨以願稱夫子以其似德非德而反亂乎德故以為德之賊而深惡烏故反之詳見孟子末篇子曰道聽而塗說德之棄也雖聞善言不為己有是自棄其德也王氏曰君子多識音志前言往行去聲以畜勑六反其德此易大畜卦大象傳辭道聽塗說則棄之矣子曰鄙夫可與事君也與哉與平聲鄙夫庸惡陋劣之稱其未得之也患得之既得之患失之何氏曰患得之謂患不能得之苟患失之無所不至矣小則吮徂兖反癰䑛神紙反以舌取物也痔直理反大則弒父與君皆生於患失而已莊子列御寇篇秦王有病召醫破癰潰痤者得車一乘痤徂和反䑛痔者得車五乘所治愈下得車愈多胡氏曰許昌靳居覲反裁之有言曰金氏曰胡文定因靳裁之聞程子之學士之品大槩有三志於道德者功名不足以纍其心志於功名者富貴不足以纍其心志於富貴而已者則亦無所不至矣志於富貴即孔子所謂鄙夫也子曰古者民有三疾今也或是之亡也亡與無通氣失其平則為疾故氣禀之偏者亦謂之疾昔所謂疾今亦亡之傷俗之益偷也古之狂也肆今之狂也蕩古之矜也廉今之矜也忿戾古之愚也直今之愚也詐而已矣狂者志願太髙肆謂不拘小節蕩則踰大間矣矜者持守太嚴廉謂稜角峭與峭同厲忿戾則至於爭矣愚者暗昧不明直謂徑行自遂詐則挾私妄作矣范氏曰末世滋僞豈惟賢者不如古哉民性之蔽亦與古人異矣子曰巧言令色鮮矣仁重出子曰惡紫之奪朱也惡鄭聲之亂雅樂也惡利口之覆邦家者惡去聲覆芳服反朱正色紫閒去聲色雅正也利口捷給覆傾敗也范氏曰天下之理正而勝者常少不正而勝者常多聖人所以惡之也利口之人以是為非以非為是以賢為不肖以不肖為賢人君苟恱而信之則國家之覆也不難矣子曰豫欲無言學者多以言語觀聖人而不察其天理流行之實有不待言而著者是以徒得其言而不得其所以言故夫子發此以警之子貢曰子如不言則小子何述焉子貢正以言語觀聖人者故疑而問之子曰天何言哉四時行焉百物生焉天何言哉四時行百物生莫非天理發見形甸反流行之實不待言而可見如字聖人一動一靜莫非妙道精義之發亦天而已豈待言而顯哉此亦開示子貢之切惜乎其終不喻也程子曰孔子之道譬如日星之明猶患門人未能盡曉故曰豫欲無言若顔子則便默識如字其他則未免疑問故曰小子何述又曰天何言哉四時行焉百物生焉則可謂至明白矣愚按此與前篇無隱之意相發學者詳之孺悲欲見孔子孔子辭以疾將命者出户取瑟而歌使之聞之孺悲魯人嘗學士喪禮於孔子記雜記恤由之喪魯哀公使孺悲之孔子學士喪禮士喪禮於是乎書當是時必有以得罪者故辭以疾而又使知其非疾以警教之也程子曰此孟子所謂不屑之教誨所以深教之也宰我問三年之喪期已久矣期音朞下同期周年也君子三年不為禮禮必壞三年不為樂樂必崩恐居喪不習而崩壞也舊穀既沒新榖既升鑽燧改火期可已矣鑽徂官反沒盡也升登也燧取火之木也改火春取榆柳之火夏取棗杏之火夏季取桑柘之火秋取柞楢音柞由之火冬取槐檀之火亦一年而周也周禮夏官司爟古喚反掌行火之政令四時變國火以救時疾也行猶用也變猶易也鄒子曰春取榆柳之火夏取棗杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火已止也言期年則天運一周時物皆變喪至此可止也尹氏曰短喪之說下愚且恥言之宰我親學聖人之門而以是為問者有所疑於心而不敢强上聲焉爾子曰食夫稻衣夫錦於女安乎曰安夫音扶下同衣去聲女音汝下同禮父母之喪既殯食粥粗衰音催既葬疏平聲食音嗣水飲受以成布期音基而小祥始食菜果練冠縓取絹反緣去聲要平聲絰音迭不除無食稻衣錦之理夫子欲宰我反求諸心自得其所以不忍者故問之以此而宰我不察也記閒傳父母之喪既殯食粥朝一溢米莫一溢水齊衰之喪疏食水飲不食菜果大功之喪不食醯醬小功緦麻不飲醴酒父母之喪既虞卒哭疏食水飲不食菜果期而小祥食菜果又期而大祥食醯醬中月而禫禫而飲醴酒始飲酒者先飲醴酒始食肉者乾肉注云二十兩為一鎰通志云稻有粳糯之種古人謂糯為稻本草所謂稻米者今之糯米女安則為之夫君子之居喪食㫖不甘聞樂不樂居處不安故不為也今女安則為之樂上如字下音洛此夫子之言也㫖亦甘也初言女安則為之絶之之辭又發其不忍之端以警其不察而再言女安則為之以深責之宰我出子曰豫之不仁也子生三年然後免於父母之懷夫三年之喪天下之通喪也豫也有三年之愛於其父母乎宰我既出夫子懼其真以為可安而遂行之故深探他覃反其本而斥之言由其不仁故愛親之薄如此也懷抱也又言君子所以不忍於親而喪必三年之故使之聞之或能反求而終得其本心也范氏曰喪雖止於三年然賢者之情則無窮也特以聖人為之中制而不敢過故必俯而就之非以三年之喪為足以報其親也所謂三年然後免於父母之懷特以責宰我之無恩欲其有以跂其至反而及之耳記三年問君子三年之喪二十五月而畢若駟之過隙然而遂之是無窮也故先王為之中制檀弓子思曰先王之制禮過之者俯而就之不至焉者跂而及之故君子執親之喪水漿不入口者三日杖而後能起子曰飽食終日無所用心難矣哉不有博奕者乎為之猶賢乎已博局戲也奕圍棊也博說文作簙局戲也六著十二棊也古烏曹作簙說文奕從二十言竦兩手而執之圍棊謂之奕已止也李氏曰聖人非教人博奕也所以甚言無所用心之不可爾子路曰君子尚勇乎子曰君子義以為上君子有勇而無義為亂小人有勇而無義為盜尚上之也君子為亂小人為盜皆以位而言者也尹氏曰義以為尚則其為勇也大矣子路好去聲勇故夫子以此救其失也胡氏曰疑此子路初見孔子時問答也子貢曰君子亦有惡乎子曰有惡惡稱人之惡者惡居下流而訕上者惡勇而無禮者惡果敢而窒者惡去聲下同唯惡者之惡如字訕所赧反訕謗毁也窒不通也稱人惡則無仁厚之意下訕上則無忠敬之心勇無禮則為亂果而窒則妄作故夫子惡之曰賜也亦有惡乎惡徼以為知者惡不孫以為勇者惡訐以為直者徼古堯反知孫並去聲訐居謁反惡徼以下子貢之言也徼伺音笥察也訐謂攻發人之隂私楊氏曰仁者無不愛則君子疑若無惡矣子貢之有是心也故問焉以質其是非侯氏曰聖賢之所惡如此所謂惟仁者能惡人也子曰唯女子與小人為難養也近之則不孫逺之則怨近孫逺並去聲此小人亦謂僕𨽻下人也君子之於臣妾莊以涖之慈以畜許六反之則無二者之患矣子曰年四十而見惡焉其終也已惡去聲四十成德之時見惡於人則止於此而已勉人及時遷善改過也蘇氏曰此亦有為去聲下同而言不知其為誰也微子第十八此篇多記聖賢之出處上聲凡十一章微子去之箕子為之奴比干諫而死微箕二國名子爵也微子紂庶兄笡子比干紂諸父微子見紂無道去之以存宗祀箕子比干皆諫紂殺比干囚箕子以為奴箕子因佯音羊狂而受辱史記宋世家微子者殷帝乙之首子而紂之庶兄也紂既立不明淫亂於政微子數諫不聽度終不可諫遂亡箕子者紂親戚也紂淫泆箕子諫不聼乃被髮佯狂而為奴王子比干者亦紂之親戚也見箕子諫不聼而為奴則曰君有過而不以死爭則百姓何牽乃直言諫紂紂怒曰吾閒聖人心有七竅遂殺比干刳視其心微子曰父有過三諫不聽則隨而號之人臣三諫不聽則其義可以去矣遂行武王伐紂克殷微子乃持其祭器造軍門於是武王乃釋徵子復其位如故孔子曰殷有三仁焉三人之行去聲不同而同出於至誠惻怛當葛反之意故不咈乎愛之理而有以全其心之德也楊氏曰此三人者各得其本心故同謂之仁柳下惠為士師三黜人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦三去聲焉於䖍反士師獄官舜命臯陶汝作士士之名始見於刑官周禮秋官司寇之屬有士師之職刑官曰士其長曰師故士師之下有鄉士遂士縣士方士訝士皆掌獄詞者黜退也柳下惠三黜不去而其辭氣雍容如此可謂和矣然其不能枉道之意則有確乎其不可拔者是則所謂必以其道而不自失焉者也胡氏曰此必有孔子斷丁亂反之之言而亡之矣齊景公待孔子曰若季氏則吾不能以季孟之閒待之曰吾老矣不能用也孔子行魯三卿季氏最貴孟氏為下卿孔子去之事見世家史記世家魯昭公為季平子所逐處乾侯魯亂孔子適齊為髙昭子家臣通乎景公將以尼溪之田封孔子晏嬰不可而止他日景公止孔子曰奉子以季氏吾不能以季孟之閒待之齊大夫欲害孔子孔子聞之景公曰吾老矣弗能用也孔子遂行反乎魯然此言必非面語音御孔子蓋自以告其臣而孔子聞之爾程子曰季氏强臣君待之之禮極隆然非所以待孔子也以季孟之閒待之則禮亦至矣然復扶又反曰吾老矣不能用也故孔子去之蓋不繫待之輕重特以不用而去爾齊人歸女樂季桓子受之三日不朝孔子行歸如字或作饋朝音潮季桓子魯大夫名斯按史記定公十四年孔子為魯司寇攝行相去聲事齊人懼歸女樂以沮在吕反之史記世家定公以孔子為中都宰一年四方皆則之由中都宰為司空由司空為大司寇定公十四年由大司寇攝行相事於是誅魯大夫亂政者少正卯與聞國政三月魯國大治齊人聞而懼曰孔子為政必霸霸則吾地近焉我為之先并矣盍致地焉犂鉏曰請先嘗沮之沮之不可則致地庸遲乎於是選齊國中女子好者八十人皆衣文衣而舞康樂文馬三十駟遺魯君陳女樂文馬於魯城南門外季桓子卒受齊女樂三日不聽政郊又不致膰俎於大夫孔子遂行又見孟子告子下集注尹氏曰受女樂而怠於政事如此其簡賢棄禮不足與有為可知矣夫子所以行也所謂見幾平聲而作不俟終日者與此引易繫辭之語范氏曰此篇記仁賢之出處上聲而折中以聖人之行去聲所以明中庸之道也楚狂接輿歌而過孔子曰鳯兮鳯兮何德之衰往者不可諫來者猶可追已而已而今之從政者殆而接輿楚人佯狂避世邢氏曰接輿姓陸名通昭王時佯狂不仕時人謂之楚狂夫子時將適楚故接輿歌而過其車前也鳯有道則見形甸反無道則隱接輿以比孔子而譏其不能隱為德衰也來者可追言及今尚可隱去已止也而語助辭殆危也接輿蓋知尊夫子而趨去聲不同者也孔子下欲與之言趨而辟之不得與之言辟去聲孔子下車蓋欲告之以出處上聲之意接輿自以為是故不欲聞而辟之也長沮桀溺耦而耕孔子過之使子路問津焉沮七余反溺乃立反二人隱者耦並耕也新定顧氏曰古未用牛耕易只言服牛乘馬引重致逺最可考者古人於蠟祭迎貓迎虎凡有功於田者無不報祭獨不及牛可見古未知以牛耕自漢以來方有賣刀買犢之說時孔子自楚反乎蔡史記魯哀公三年孔子年六十矣明年孔子自陳遷于蔡明年自蔡如葉葉公問政問孔子於子路遂去葉反乎蔡長沮桀溺耦而耕孔子使子路問津焉津濟渡處長沮曰夫執輿者為誰子路曰為孔丘曰是魯孔丘與曰是也曰是知津矣夫音扶與平聲執輿執轡在車也蓋本子路御而執轡今下問津故夫子代之也知津言數音朔周流自知津處問於桀溺桀溺曰子為誰曰為仲由曰是魯孔丘之徒與對曰然曰滔滔者天下皆是也而誰以易之且而與其從辟人之士也豈若從辟世之士哉耰而不輟徒與之與平聲滔吐刀反辟去聲耰音憂滔滔流而不反之意以猶與也言天下皆亂將誰與變易之而汝也辟人謂孔子辟世桀溺自謂耰覆敷救反種上聲也亦不告以津處子路行以告夫子憮然曰鳥獸不可與同羣吾非斯人之徒與而誰與天下有道丘不與易也憮音武與如字憮然猶悵然惜其不喻已意也言所當與同羣者斯人而已豈可絶人逃世以為潔哉天下若已平治去聲則我無用變易之正為去聲天下無道故欲以道易之耳程子曰聖人不敢有忘天下之心故其言如此也張子曰聖人之仁不以無道必天下而棄之也子路從而後遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤五穀不分孰為夫子植其杖而藝蓧徒弔反植音值丈人亦隱者蓧竹器分辨也五穀不分猶言不辨菽麥爾左成十八年晉使荀罃士魴逆周子于京師而立之生十四年矣周子有兄無慧不能辨菽麥故不可立傅杏溪九穀考云黍今穄也稷今鮮粟也稻今晚禾也梁今糯粟也豆今黑豆也小豆今菉豆也麻今油麻也苽音孤周官太宰釋云雕胡也王氏曰有言五殼者以五行所屬而言有言九穀者以三農所生而言有言百穀者號其多而言責其不事農業而從師逺遊也植立之也藝去上聲草也子路拱而立知其隱者敬之也止子路宿殺雞為黍而食之見其二子焉明日子路行以告子曰隱者也使子路反見之至則行矣食音嗣見賢遍反孔子使子路反見之蓋欲告之以君臣之義而丈人意子路必將復扶又反來故先去之以滅其跡亦接輿之意也子路曰不仕無義長幼之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行已知之矣長上聲子路述夫子之意如此蓋丈人之接子路甚倨居御反而子路益恭文人因見其二子焉則於長幼之節固知其不可廢矣故因其所明以曉之倫序也人之大倫有五父子有親君臣有義夫婦有别長幼有序朋友有信是也仕所以行君臣之義故雖知道之不行而不可廢然謂之義則事之可否身之去就亦自有不可苟者是以雖不潔身以亂倫亦非志義以徇祿也福州有國初時寫本路下有反子二字以此為子路反而夫子言之也未知是否朱子嘗為福之同安簿意必自見此寫本也范氏曰隱者為髙故往而不返仕者為通故溺而不止不與鳥獸同羣則決性命之情以叨音叨富貴莊子駢拇篇不仁之人決性命之情而叨富貴決破壞也貪財曰叨此二者皆惑也是以依乎中庸者為難惟聖人不廢君臣之義而必以其正所以或出或處上聲而終不離去聲於道也逸民伯夷叔齊虞仲夷逸朱張柳下惠少連少去聲下同逸遺逸民者無位之稱虞仲即仲雍與泰伯同竄荆蠻者夷逸朱張不見經傳注疏引王弼云朱張字子弓荀卿以比孔子今云不見經傳何與少連東夷人子曰不降其志不辱其身伯夷叔齊與與平聲謂柳下惠少連降志辱身矣言中倫行中慮其斯而已矣中去聲下同柳下惠事見上倫義理之次第也慮思慮也中慮言有意義合人心少連事不可考然記稱其善居喪三日不怠三月不解居隘反朞悲哀三年憂見記雜記下篇則行之中慮亦可見矣謂虞仲夷逸隱居放言身中清廢中權仲雍居吳斷音短髮文身祼力果反以為飾左襄七年子貢謂吳太宰嚭曰泰伯端委以治周禮仲雍嗣之斷髮文身羸以為飾豈禮也哉有由然也隱居獨善合乎道之清放言自廢合乎道之權我則異於是無可無不可孟子曰孔子可以仕則仕可以止則止可以久則久可以速則速所謂無可無不可也謝氏曰七人隱遁不汙則同其立心造行去聲則異伯夷叔齊天子不得臣諸侯不得友蓋已遁世離去聲羣矣下聖人一等此其最髙與柳下惠少連雖降志而不枉已雖辱身而不求合其心有不屑也故言能中倫行能中慮虞仲夷逸隱居放言則言不合先王之法者多矣然清而不汙也權而適宜也與方外之士害義傷教而亂大倫者殊科是以均謂之逸民方外二字本莊子遊方之外謂出乎禮法之外者尹氏曰七人各守其一節而孔子則無可無不可所以常適其可而異於逸民之徒也揚雄曰觀乎聖人則見賢人是以孟子語夷惠亦必以孔子斷丁亂反之大師摯適齊大音泰大師魯樂官之長上聲摯其名也亞飯干適楚三飯繚適蔡四飯缺適秦飯扶晚反繚音了亞飯以下以樂侑食之官周禮春官大司樂王大食三侑皆令奏鍾鼓疏以樂勸食是每日之常食也皆有樂而不用鍾鼓若朔及月半則天子諸侯皆大食加牲體樂奏鍾鼓又薛氏云按論語每飯異樂異工蓋常食則一工之侑而已若大食三侑皆令奏鍾鼓此終食之侑而樂工皆備也朱子曰白虎通曰王者平旦食晝食脯食暮食凡四飯諸侯三飯大夫再飯故魯之師官自亞飯以下蓋三飯也干繚缺皆名也鼓方叔入於河鼓擊鼓者方叔名河河內播鼗武入於漢鼗徒刀反播搖也鼗小鼓兩旁有耳持其柄而搖之則旁耳還自擊武名也漢漢中少師陽擊磬襄入於海少去聲少師樂官之佐陽襄二人名襄即孔子所從學琴者海海島也史記世家孔子學鼓琴師襄子十日不進師襄子曰可以益矣孔子曰丘已習其曲矣未得其數也有閒曰已習其數可以益矣孔子曰丘未得其志也有閒曰己習其志可以益矣孔子曰丘末得其為人也有閒曰有所穆然深思焉有所怡然髙望而逺志焉曰丘得其為人黯然而黑頎然而長眼如望羊如王四國非文王其誰能為此也師襄子避席再拜曰師蓋云文王操也此記賢人之隱遁以附前章然未必夫子之言也末章放上聲此張子曰周衰樂廢夫子自衛反魯一嘗治之其後伶音靈人賤工識樂之正及魯益衰三桓僭妄自大師以下皆知散之四方逾河蹈海以去亂聖人俄頃之助功化如此如有用我期月而可豈虛語哉周公謂魯公曰君子不施其親不使大臣怨乎不以故舊無大故則不棄也無求備於一人施陸氏本作弛詩紙反福本同魯公周公子伯禽也弛遺棄也以用也大臣非其人則去上聲之在其位則不可不用大故謂惡逆李氏曰四者皆君子之事忠厚之至也胡氏曰此伯禽受封之國周公訓戒之辭魯人傳誦久而不忘也其或夫子嘗與門弟子言之歟周有八士伯達伯適仲突仲忽叔夜叔夏季隨季騧騧鳥爪反或曰成王時人鄭𤣥說或曰宣王時人劉向說蓋一母四乳而生八子也然不可考矣張子曰記善人之多也愚按此篇孔子於三仁逸民師摯八士既皆稱贊而品列之於接輿沮溺丈人又每有惓惓音權接引之意皆衰世之志也其所感者深矣在陳之歎蓋亦如此三仁則無閒去聲然矣其餘數君子者亦皆一世之髙士若使得聞聖人之道以裁其所過而勉其所不及則其所立豈止於此而已哉論語纂箋卷九
