body:
  text: 欽定四庫全書論語纂箋卷五元詹道傳撰子罕第九凡三十章子罕言利與命與仁罕少也程子曰計利則害義命之理微仁之道大皆夫子所罕言也達巷黨人曰大哉孔子博學而無所成名達巷黨名其人姓名不傳董仲舒傳孟康注云項槖子聞之謂門弟子曰吾何執執御乎執射乎吾執御矣執專執也射御皆一藝而御為人僕所執尤卑言欲使我何所執以成名乎然則吾將執御矣聞人譽平聲已承之以謙也尹氏曰聖人道全而德備不可以偏長目之也達巷黨人見孔子之大意其所學者博而惜其不以一善得名於世蓋慕聖人而不知者也故孔子曰欲使我何所執而得為名乎然則吾將執御矣子曰麻冕禮也今也純儉吾從衆麻冕緇莊持反布冠也純絲也儉謂省約緇布冠以三十升布為之升八十縷隴主反則其經二千四百縷矣細密難成不如用絲之省約胡氏曰禮朝服十五升冠倍之鄭注八十縷為升升字當為登登成也饒氏曰前漢書食貨志周布幅廣二尺二寸程子言古尺當今五寸五分弱如此則二尺二寸只是今一尺二寸爾却用二千四百縷為經是一寸布用二百經也其細密難成可知又木鍾集云一眼􅱍用兩縷今按冕者天子至大夫之祭服冠者自天子至庶人之常服也玉藻始冠緇布冠自諸侯達玄冠朱組纓天子之冠也居冠屬武自天子下達有事然後緌則知冠者自天子至庶人之常服也冕如周禮辨師掌王之五冕司服所云則天子至大夫之祭服也書稱康王卿士邦君太保太史太宗皆麻冕蔡氏云以三十升麻為之是也當時夫子猶為大夫故得用麻冕今以緇布冠名之蓋因孔注云冕緇布冠也冠者首服之名冕者冠之别號而誤耳故三禮圖云語曰麻冕禮也蓋以布衣版上玄下黃取天地之色白虎通云麻冕者何周宗廟之冠也此可證其義拜下禮也今拜乎上泰也雖違衆吾從下臣與君行禮當拜於堂下君辭之乃升成拜泰驕慢也燕禮君燕卿大夫禮也公坐取大夫所酳觶興以酬賓降西階下再拜稽首公命小臣辭賓升成拜鄭注升成拜復再拜稽首也又覲禮天子賜侯氏以車服侯氏拜賜禮亦如之程子曰君子處上聲世事之無害於義者從俗可也害於義則不可從也子絶四毋意毋必毋固毋我絶無之盡者毋史記作無是也意私意也必期必也固執滯也我私己也四者相為終始起於意遂於必留於固而成於我也蓋意必常在事前固我常在事後至於我又生意則物欲牽引循環不窮矣程子曰此毋字非禁止之辭聖人絶此四者何用禁止張子曰四者有一焉則與天地不相似楊氏曰非知去聲足以知聖人詳視而默識如字之不足以記此子畏於匡畏者有戒心之謂匡地名史記云陽虎曽暴於匡夫子貌似陽虎故匡人圍之史記孔子去衛將適陳過匡顔刻為僕以其䇿指之曰昔吾入此由彼缺也僕人聞之以為魯之陽虎虎嘗暴匡人孔子狀類陽虎拘焉五日乃解又按左定六年陽虎侵鄭取匡獻其俘於晉此暴匡之證也然史記注匡宋邑曰文王既沒文不在兹乎道之顯者謂之文蓋禮樂制度之謂不曰道而曰文亦謙辭也兹此也孔子自謂天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何喪與皆去聲馬氏曰文王既沒故孔子自謂後死者言天若欲喪此文則必不使我得與於此文今我既得與於此文則是天未欲喪此文也天既未欲喪此文則匡人其奈我何言必不能違天害己也大宰問於子貢曰夫子聖者與何其多能也大音泰與平聲孔氏曰大宰官名或吳或宋未可知也與者疑辭大宰蓋以多能為聖也諸侯稱太宰皆僭也鄭云吳太宰以子貢曽與吳嚭言洪氏稱宋太宰者以列子仲尼第四云商太宰見孔子曰丘聖者歟之問也子貢曰固天縱之將聖又多能也縱猶肆也言不為限量去聲也將殆也謙若不敢知之辭聖無不通多能乃其餘事故言又以兼之子聞之曰大宰知我乎吾少也賤故多能鄙事君子多乎哉不多也言由少賤故多能而所能者鄙事爾非以聖而無不通也且多能非所以率人故又言君子不必多能以曉之牢曰子云吾不試故藝牢孔子弟子姓琴字子開一字子張衛人試用也言由不為世用故得以習於藝而通之吳氏曰弟子記夫子此言之時子牢因言昔之所聞有如此者其意相近故并記之子曰吾有知乎哉無知也有鄙夫問於我空空如也我叩其兩端而竭焉叩音口孔子謙言已無知識但其告人雖於至愚不敢不盡耳吾我二字就已而言則曰吾因人而言則曰我如此章及大宰知我乎吾少也賤如有用我者吾其為東周此類皆不可不辨叩發動也兩端猶言兩頭言終始本末上下精粗無所不盡程子曰聖人之教人俯就之若此猶恐衆人以為高逺而不親也聖人之道必降而自卑不如此則人不親賢人之言則引而自高不如此則道不尊觀於孔子孟子可見矣尹氏曰聖人之言上下兼盡即其近衆人皆可與音預知極其至則雖聖人亦無以加焉是之謂兩端如答樊遲之問仁智兩端竭盡無餘藴矣若夫音扶語上而遺下語理而遺物則豈聖人之言哉子曰鳳鳥不至河不出圖吾已矣夫夫音扶鳳靈鳥舜時來儀文王時鳴於岐山河圖河中龍馬負圖伏羲時出國語周惠王十五年內史過曰周之興也鸑鷟鳴於岐山注鳳之别名顧野王符瑞圖曰昔伏羲氏之王天下也龍馬出河遂則其文以畫八卦謂之河圖皆聖王之瑞也已止也張子曰鳳至圖出文明之祥伏羲舜文之瑞不至則夫子之文章知其已矣子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨齊音咨衰七雷反少去聲齊衰喪服冕冠也衣上服裳下服冕而衣裳貴者之盛服也瞽無目者作起也趨疾行也或曰少當作坐范氏曰聖人之心哀有喪尊有爵矜不成人其作與趨蓋有不期然而然者尹氏曰此聖人之誠心內外一者也顔淵喟然歎曰仰之彌高鑽之彌堅瞻之在前忽焉在後喟苦位反鑽祖官反喟歎聲仰彌高不可及鑽彌堅不可入在前在後恍惚不可為象此顔淵深知夫子之道無窮盡無方體而歎之也夫子循循然善誘人博我以文約我以禮循循有次序貌誘引進也博文約禮教之序也言夫子道雖高妙而教人有序也侯氏曰博我以文致知格物也約我以禮克己復禮也程子曰此顔子稱聖人最切當去聲處聖人教人唯此二事而已欲罷不能既竭吾才如有所立卓爾雖欲從之末由也已卓立貌末無也此顔子自言其學之所至也蓋悅之深而力之盡所見益親而又無所用其力也吳氏曰所謂卓爾亦在乎日用行事之間非所謂窈伊小反冥昏默者程子曰到此地位工夫尤難直是峻絶又大段著力不得楊氏曰自可欲之謂善充而至於大力行之積也大而化之則非力行所及矣此顔子所以未達一間如字也程子曰此顔子所以為深知孔子而善學之者也胡氏曰無上事而喟然歎此顔子學既有得故述其先難之故後得之由而歸功於聖人也高堅前後語道體也仰鑽瞻忽未領其要也惟夫子循循善誘先博我以文使我知古今達事變然後約我以禮使我尊所聞行所知如行者之赴家食者之求飽是以欲罷而不能盡心盡力不少休廢然後見夫子所立之卓然雖欲從之末由也已是蓋不怠所從必求至乎卓立之地也抑斯歎也其在請事斯語之後三月不違之時乎子疾病子路使門人為臣夫子時已去位無家臣子路欲以家臣治其喪其意實尊聖人而未知所以尊也病間曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎間如字病間少差楚懈反下同也病時不知既差乃知其事故言我之不當有家臣人皆知之不可欺也而為有臣則是欺天而已人而欺天莫大之罪引以自歸其責子路深矣且豫與其死於臣之手也無寧死於二三子之手乎且豫縱不得大葬豫死於道路乎無寧寧也大葬謂君臣禮葬死於道路謂棄而不葬又曉之以不必然之故范氏曰曽子將死起而易簀音責曰吾得正而斃音敝焉斯己矣見記檀弓篇子路欲尊夫子而不知無臣之不可為有臣是以陷於行詐罪至欺天君子之於言動雖微不可不謹夫子深懲子路所以警學者也楊氏曰非知至而意誠則用智自私不知行其所無事往往自陷於行詐欺天而莫之知也其子路之謂乎子貢曰有美玉於斯韞櫝而藏諸求善賈而沽諸子曰沽之哉沽之哉我待賈者也韞紆粉反櫝徒木反賈音嫁韞藏也櫝匱也沽賣也叢説沽去聲訓賣若平聲則訓買於此義不相當子貢以孔子有道不仕故設此二端以問也孔子言固當賣之但當待賈而不當求之耳范氏曰君子未嘗不欲仕也又惡去聲不由其道士之待禮猶玉之待賈也若伊尹之耕於野伯夷太公之居於海濱世無成湯文王則終焉而已必不枉道以從人衒音眩玉而求售音夀也子欲居九夷東方之夷有九種上聲後漢東夷傳夷有九種曰畎夷于夷方夷黃夷白夷赤夷玄夷風夷陽夷又玄莬樂浪高驪蒲飾鳬吏索豕東屠倭人天鄙為九種欲居之者亦乘桴浮海之意或曰陋如之何子曰君子居之何陋之有君子所居則化何陋之有子曰吾自衛反魯然後樂正雅頌各得其所魯哀公十一年冬孔子自衛反魯是時周禮在魯然詩樂亦頗殘闕失次孔子周流四方參互考訂以知其説晚知道終不行故歸而正之子曰出則事公卿入則事父兄喪事不敢不勉不為酒困何有於我哉説見第七篇然此則其事愈卑而意愈切矣子在川上曰逝者如斯夫不舍晝夜夫音扶楚辭舍上聲辨證騷經忍而不能舍也洪氏注引顔師古曰舍止息也屋舍次舍皆此義論語不舍晝夜謂曉夕不息耳今人或音捨者非是按辨證文公著於慶元己未三月明年庚申四月公易簀矣集注舍上聲者舊音讀如赦者定説也天地之化往者過來者續無一息之停乃道體之本然也然其可指而易去聲見者莫如川流故於此發以示人欲學者時時省悉井反察而無毫髮之間去聲斷徒玩反也程子曰此道體也天運而不已日往則月來寒往則暑來水流而不息物生而不窮皆與道為體運乎晝夜未嘗已也是以君子法之自強不息及其至也純亦不已焉又曰自漢以來儒者皆不識此義此見聖人之心純亦不已也純亦不已乃天德也有天德便可語王道其要只在謹獨愚按自此至終篇皆勉人進學不已之辭子曰吾未見好德如好色者也好去聲謝氏曰好去聲好色惡去聲惡臭誠也好德如好色斯誠好德矣然民鮮上聲能之史記孔子居衛靈公與夫人同車使孔子為次乘去聲招搖市過之孔子醜之故有是言子曰譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾往也簣求位反覆芳服反簣土籠也籠平聲韻注舉土器書曰為山九仞功虧一簣見旅􅋙篇夫子之言蓋出於此言山成而但少一簣其止者吾自止耳平地而方覆一簣其進者吾自往耳蓋學者自強不息則積少成多中道而止則前功盡棄其止其往皆在我而不在人也子曰語之而不惰者其回也與語去聲與平聲惰懈居隘反怠也范氏曰顔子聞夫子之言而心解力行造七到反次顛沛未嘗違之如萬物得時雨之潤發榮滋長上聲何有於惰此羣弟子所不及也子謂顔淵曰惜乎吾見其進也未見其止也進止二字説見上章顔子既死而孔子惜之言其方進而未已也子曰苗而不秀者有矣夫秀而不實者有矣夫夫音扶穀之始生曰苗吐華曰秀成穀曰實蓋學而不至於成有如此者是以君子貴自勉也子曰後生可畏焉知來者之不如今也四十五十而無聞焉斯亦不足畏也已孔子言後生年富力強足以積學而有待其勢可畏安知其將來不如我之今日乎然或不能自勉至於老而無聞則不足畏矣言此以警人使及時勉學也曽子曰五十而不以善聞則不聞矣蓋述此意大戴禮修身篇曽子曰年三十四十之間而無藝則無藝矣五十而不以善聞則不聞矣七十而未壞雖有後過亦可以免矣尹氏曰少去聲下同而不勉老而無聞則亦已矣自少而進者安知其不至於極乎是可畏也子曰法語語陸音魚魚據反之言能無從乎改之為貴巽與之言能無説乎繹之為貴説而不繹從而不改吾末如之何也已矣法語者正言之也巽言者婉而導之也繹尋其緒也法言人所敬憚故必從然不改則面從而已巽言無所乖忤五故反故必説音悅下同然不繹則又不足以知其微意之所在也楊氏曰法言若孟子論行王政之類是也巽言若其論好去聲下同貨好色之類是也語之而不達拒之而不受猶之可也其或喻焉則尚庶幾平聲其能改繹矣從且説矣而不改繹焉則是終不改繹也已聖人其如之何哉子曰主忠信毋友不如己者過則勿憚改重平聲出而逸其半子曰三軍可奪帥也匹夫不可奪志也侯氏曰三軍之勇在人匹夫之志在己故帥可奪而志不可奪如可奪則亦不足謂之志矣子曰衣敝緼袍與衣狐貉者立而不恥者其由也與衣去聲緼紆粉反貉胡各反與平聲敝壞也緼枲想里反著展呂反也袍衣有著者也蓋衣之賤者禮韻貯字亦作著通作禇作緒以綿裝衣之謂熊氏曰緼枲著出記玉藻云纊為繭緼為袍鄭云衣有著之稱纊今之新綿緼今之纊及舊絮疏好者為綿惡者為絮語録云袍謂夾衣冇綿在胎底趙氏曰枲著則雜用枲麻以著袍也如今麻苧筋纇可置之夾襖中者狐貉以狐貉之皮為裘衣之貴者子路之志如此則能不以貧富動其心而可以進於道矣故夫子稱之不忮不求何用不臧忮之豉反忮害也求貪也臧善也言能不忮不求則何為不善乎此衛風雄雉之詩孔子引之以美子路也呂氏曰貧與富交強者必忮弱者必求子路終身誦之子曰是道也何足以臧終身誦之則自喜其能而不復扶又反下同求進於道矣故夫子復言此以警之謝氏曰恥惡衣惡食學者之大病善心不存蓋由於此子路之志如此其過人逺矣然以衆人而能此則可以為善矣子路之賢宜不止此而終身誦之則非所以進於日新也故激而進之子曰嵗寒然後知松柏之後雕也字當作凋范氏曰小人之在治去聲世或與君子無異惟臨利害遇事變然後君子之所守可見也謝氏曰士窮見節義世亂識忠臣欲學者必周于德子曰知者不惑仁者不憂勇者不懼明足以燭理故不惑理足以勝私故不憂氣足以配道義故不懼此學之序也子曰可與共學未可與適道可與適道未可與立可與立未可與權可與者言其可與共為此事也程子曰可與共學知所以求之也可與適道知所往也可與立者篤志固執而不變也權稱去聲錘也所以稱如字物而知輕重者也可與權謂能權輕重使合義也楊氏曰知為去聲已則可與共學矣學足以明善然後可與適道信道篤然後可與立知時措之宜然後可與權洪氏曰易九卦終於巽以行權易繫辭履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權權者聖人之大用未能立而言權猶人未能立而欲行鮮不仆矣程子曰漢儒以反經合道為權故有權變權術之論皆非也權只是經也自漢以下無人識權字公羊傳桓公十一年宋人執祭仲何賢乎祭仲以為知權也權者反於經然後有善者也韓康伯注繫辭云權反經而合道必合乎巽順而後可以行權也愚按先儒誤以此章連下文偏其反而為一章故有反經合道之説程子非之是矣然以孟子嫂溺援平聲之以手之義推之則權與經亦當有辨唐棣之華偏其反而豈不爾思室是逺而棣大計反唐棣郁李也偏晉書作翩然則反亦當與翻同言華之搖動也而語助也此逸詩也於六義屬興去聲上兩句無意義但以起下兩句之辭耳其所謂爾亦不知其何所指也子曰未之思也夫何逺之有夫音扶夫子借其言而反之蓋前篇仁逺乎哉之意程子曰聖人未嘗言易去聲以驕人之志亦未嘗言難以阻人之進但曰未之思也夫何逺之有此言極有涵蓄意思去聲深逺鄉黨第十楊氏曰聖人之所謂道者不離去聲乎日用之間也故夫子之平日一動一靜門人皆審視而詳記之尹氏曰甚矣孔門諸子之嗜學也於聖人之容色言動無不謹書而備録之以貽後世今讀其書即其事宛然如聖人之在目也雖然聖人豈拘拘而為之者哉蓋盛德之至動容周旋自中去聲乎禮耳學者欲潛心於聖人宜於此求焉舊説凡一章今分為十七節孔子於鄉黨恂恂如也似不能言者恂相倫反恂恂信實之貌似不能言者謙卑遜順不以賢知去聲先去聲人也鄉黨父兄宗族之所在故孔子居之其容貌辭氣如此其在宗廟朝廷便便言唯謹爾朝直遙反下同便旁連反便便辨也宗廟禮法之所在朝廷政事之所出言不可以不明辨故必詳問而極言之但謹而不放爾此一節記孔子在鄉黨宗廟朝廷言貌之不同朝與下大夫言侃侃如也與上大夫言誾誾如也侃苦旦反誾魚巾反此君未視朝時也王制諸侯上大夫卿下大夫五人胡氏曰王制上大夫卿又云大國三卿下大夫五人今合此二節以為上大夫下大夫之别也上大夫曰卿大夫次國小國並下大夫五人又曰夫子初仕為中都宰由宰為司空又為大司寇皆上大夫也則上大夫其同列也下大夫在已下者許氏説文後漢許慎字叔重著説文侃侃剛直也誾誾和悅而諍也君在踧踖如也與與如也踧子六反踖子亦反與平聲或如字君在視朝也踧踖恭敬不寧之貌與與威儀中適之貌張子曰與與不忘向君也亦通此一節記孔子在朝廷事上接下之不同也君召使擯色勃如也足躩如也擯必刃反躩驅若反擯主國之君所使出接賓者周禮司儀掌九儀之賓客擯相之禮出接賓曰擯入贊禮曰相儀禮卿為上擯大夫為承擯士為紹擯勃變色貌躩盤辟音璧與躄同貌皆敬君命故也揖所與立左右手衣前後襜如也襜赤占反所與立謂同為擯者也擯用命數之半如上公九命則用五人以次傳命周禮春官大宗伯以九儀之命正邦國之位一命受職再命受服三命受位四命受器五命受則六命賜官七命賜國八命作牧九命作伯饒氏曰按周禮行人上公九介侯伯七介子男五介各隨其命數賓次於大門之外主人使擯者出而請事卿為上擯大夫為承擯士為紹擯主國之君公則擯者五人侯伯四人子男三人各用其命數之強半下於賓以示謙也若其傳命之制賓立於庫門之外即大門直闑西北面介者以次立於西北東面每介相去三丈六尺主君出接立於庫門之外直闑西南面擯者以次立於君之東南西面每擯相去亦三丈六尺末擯與末介相對東西亦相去三丈六尺主君命上擯請問來故蓋雖知其來朝不敢自許其朝已恐其或為他事而來所以示謙也上擯受君命而傳之承擯迤邐傳至末擯末擯傳至末介末介以次繼傳上至于賓賓命上介復命復以次傳之擯而達于主君然後主君進而迎賓以入揖左人則左其手揖右人則右其手襜整貌趨進翼如也疾趨而進張拱端好如鳥舒翼賓退必復命曰賓不顧矣紓音舒君敬也此一節記孔子為去聲君擯相去聲之容入公門鞠躬如也如不容鞠躬曲身也公門高大而若不容敬之至也立不中門行不履閾閾于逼反中門中於門也謂當棖除庚反闑倪結反之間君出入處也閾門限也禮士大夫出入君門由闑右不踐閾見記曲禮謝氏曰立中門則當尊行履閾則不恪饒氏曰中間有闑兩旁有棖棖是大門兩旁之木如今壁尺相似闑是中間兩扉相合之處又有一木常設而不動東西兩扉各有中君出入則皆由左出則以東扉為左入則以西扉為左士大夫出入君門則皆由右出以闑西為右入以闑東為右然雖由右亦不敢正當棖闑之中但挨闑旁而行蓋避君出入處也過位色勃如也足躩如也其言似不足者位君之虛位謂門屏音丙之間人君寧仲吕反立之處所謂寧也禮記曲禮下天子當依上聲而立諸侯北面而見天子曰覲天子當寧而立諸公東面諸侯西面曰朝注依狀如屏風以絳為質高八尺東西當户牖之間繡為斧文也亦曰斧依爾雅曰門屏之間謂之寧君雖不在過之必敬不敢以虛位而慢之也言似不足不敢肆也攝齊升堂鞠躬如也屏氣似不息者齊音咨攝摳驅侯反也齊衣下縫也縫房用反禮將升堂兩手摳衣使去地尺曲禮兩手摳衣去齊尺恐躡尼輒反之而傾跌音迭失容也屏音丙藏也息鼻息出入者也近至尊氣容肅也三字出玉藻注云似不息出降一等逞顔色怡怡如也沒階趨翼如也復其位踧踖如也陸氏曰趨下本無進字俗本有之誤也等階之級也逞放也漸逺所尊舒氣解顔怡怡和悅也沒階下盡階也趨走就位也復位踧踖敬之餘也此一節記孔子在朝之容執圭鞠躬如也如不勝上上如字如揖下如授勃如戰色足蹜蹜如有循勝平聲蹜色六反圭諸侯命圭聘問鄰國則使大夫執以通信周禮冬官考工記命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之注子守榖璧男守蒲璧不言之者闕耳禮郊特牲云大夫執圭而使所以申信也又聘義還圭璋疏賓將去君使卿就賓館還其聘圭故聘禮云君使卿皮辨還玉于館是也如不勝執主器執輕如不克出記曲禮下敬謹之至也上如揖下如授謂執圭平衡手與心齊高不過揖卑不過授也戰色戰而色懼也蹜蹜舉足促狹也如有循記所謂舉前曳踵之隴反禮玉藻執龜玉舉前曳踵蹜蹜如也言行不離去聲地如緣物也享禮有容色享獻也既聘而享用圭璧有庭實語録皮幣輿馬皆陳於庭故曰庭實記曰庭實旅百奉之以玉帛此之用圭璧即玉帛之玉與上文執圭不相妨圭乃命圭也有容色和也儀禮曰發氣滿容私覿愈愈如也私覿以私禮見也愈愈則又和矣此一節記孔子為去聲君聘於鄰國之禮也朝氏曰孔子定公九年仕魯至十三年適齊其間絶無朝音潮聘往來之事疑使擯執圭兩條但孔子嘗言其禮當如此爾饒氏曰按史記定公十四年孔子因齊饋女樂而去魯適衛無十三年適齊事不知朝氏何據而云以上數節必夫子朝見擯聘時弟子隨所見而記之君子不以紺緅飾紺古暗反緅側由反君子謂孔子紺深青揚赤色齊側皆反服也緅絳色三年之喪以飾練服也考工記五入為緅鄭注染纁者三入而成又再染以黑則為緅如爵頭色也再染以黑則為緇矣緅非絳色集注因古注而誤饒氏曰檀弓練衣縓緣古注誤以縓為緅飾領緣俞絹反也紅紫不以為褻服紅紫間去聲色不正且近於婦人女子之服也褻服私居服也言此則不以為朝音潮祭之服可知當暑袗絺綌必表而出之袗單也葛之精者曰絺粗者曰綌表而出之謂先著陟略反裏衣表絺綌而出之於外欲其不見體也詩所謂蒙彼皺側救反絺是也詩傳蒙覆也皺絺絺之蹙蹙者蒙謂加絺綌於褻衣之上所謂表而出之也見鄘風君子偕老篇緇衣羔裘素衣麑裘黃衣狐裘麑妍奚反緇黑色羔裘用黑羊皮麑鹿子色白狐色黃衣以裼先的反裘欲其相稱去聲玉藻羔裘緇衣以裼之褻裘長短右袂長欲其溫短右袂所以便作事必有寢衣長一身有半長去聲齊側皆反主於敬不可解衣而寢又不可著陟略反明衣而寢故别有寢衣其半蓋以覆敷救反足程子曰此錯簡當在齊必有明衣布之下愚謂如此則此條與明衣變食既得以類相從而褻裘狐貉亦得以類相從矣狐貉之厚以居狐貉毛深溫厚私居取其適體去喪無所不佩去上聲君子無故玉不去如字身觽音攜礪之屬亦皆佩也蔡氏曰按玉藻云古之君子必佩玉右徵角左宫羽凡帶必有佩玉唯喪則否佩玉有衝牙君子無故玉不去身君子於王比德焉孔子佩象環五寸而綦組綬此是明去喪則佩但曰無所不佩則又不止於玉爾又按內則子事父母左右佩用左佩紛帨刀礪小觽金燧右佩玦捍管遰大觽木燧非帷裳必殺之殺去聲朝音潮祭之服裳用正幅如帷要與腰同有襞音璧積而旁無殺所戒反縫房用反其餘若深衣要半下齊倍要齊音咨則無襞積而有殺縫矣饒氏曰要半下取深衣篇要縫半下之語齊倍要取玉藻篇縫齊倍要之語陳定宇曰深衣之裳以布六幅斜裁為十二幅三分之一皆在上三分之二皆在下羔裘玄冠不以弔喪主素吉主玄弔必變服所以哀死吉月必朝服而朝吉月月朔也孔子在魯致仕時如此此一節記孔子衣服之制蘇氏曰此孔氏遺書雜記曲禮非特孔子事也齊必有明衣布齊側皆反齊必沐浴浴竟即著陟略反明衣所以明潔其體也以布為之此下脫前章寢衣一簡齊必變食居必遷坐變食謂不飲酒不茹葷六字見莊子遷坐易常處也此一節記孔子謹齊之事楊氏曰齊所以交神故致潔變常以盡敬食不厭精膾不厭細食音嗣食飯也精鑿也鑿通作糳即各反糲米一斛舂米九斗牛羊與魚之腥聶而切之為膾出禮記少儀篇注云聶之為言䐑也先藿葉切之復報切之則成膾郊特牲疏云先䐑而犬臠切之而後報切之聶少儀音之涉反一音泥涉切䐑少儀音直輒反郊特牲注聶本作攝又作䐑皆之涉反食精則能養人膾粗則能害人不厭言以是為善非謂必欲如是也食饐而餲魚餒而肉敗不食色惡不食臭惡不食色飪不食不時不食食饐之食音嗣饐於冀反餲烏邁反飪而甚反饐飯傷熱濕也餲味變也魚爛曰餒肉腐曰敗二句爾雅文韻釋云魚腐自內而出曰餒肉腐自外而入曰敗色惡臭惡未敗而色臭變也飪烹調生熟之節也不時五穀不成果實未熟之類禮王制五榖不時果實未熟不粥於市此數者皆足以傷人故不食割不正不食不得其醬不食割肉不方正者不食造七到反次不離去聲於正也漢陸續之母切肉未嘗不方斷音短蔥以寸為度蓋其質美與此暗合也後漢陸續傳明帝時楚王英謀反連及太守尹興續時為興掾坐就獄續被掠考肌肉消爛終無異辭母逺至京師無緣與續相間但作饋食付門卒進之續雖見考苦毒而辭色慷慨朱嘗易容唯對食悲泣不能自勝使者怪而問故曰母來不得相見故泣耳問何以知之曰母截肉未嘗不方斷蔥以寸為度是以知之使者詢續母果來隂嘉之上書言狀帝即赦興等事還里禁錮終身食肉用醬各有所宜不得則不食惡去聲其不備也禮記內則濡豚包苦實蓼濡雞醢醬實蓼濡魚卵醬實蓼卵鄭氏讀為鯤鯤魚子也以魚子為醬濡鱉醢醬實蓼魚膾芥醬麋腥醢醬此二者無害於人但不以嗜味而苟食耳肉雖多不使勝食氣唯酒無量不及亂食音嗣量去聲食如字以穀為主故不使肉勝食氣酒以為去聲人合歡樂記曰酒食者所以合歡也故不為量但以醉為節而不及亂耳程子曰不及亂者非唯不使亂志雖血氣亦不可使亂但浹洽而已可也沽酒市脯不食沽市皆買也恐不精潔或傷人也與不嘗康子之藥同意不撤薑食薑通神明去上聲穢惡故不撤本草云薑味辛微溫久服去臭氣通神明不多食適可而止無貪心也祭於公不宿肉祭肉不出三日出三日不食之矣助祭於公所得胙肉歸即頒賜不俟經宿者不留神惠也家之祭肉則不過三日皆以分賜蓋過三日則肉必敗而人不食之是褻鬼神之餘也但比君所賜胙可少緩耳食不語寢不言答述曰語自言曰言范氏曰聖人存心不他當食而食當寢而寢言語非其時也楊氏曰肺為氣主而聲出焉寢食則氣窒而不通語言恐傷之也素問五臟生成篇諸脈者皆屬於目諸髓者皆屬於腦諸筋者皆屬於節諸血者皆屬於心諸氣者皆屬於肺亦通雖疏食菜羮瓜祭必齊如也食音嗣陸氏曰魯論瓜作必古人飲食每種上聲各出少許置之豆間之地以祭先代始為飲食之人不忘本也語録古人祭酒於地桀食豆間有板盛之卒食徹去齊嚴敬貌孔子雖薄物必祭其祭必敬聖人之誠也此一節記孔子飲食之節謝氏曰聖人飲食如此非極口腹之欲蓋養氣體不以傷生當如此然聖人之所不食窮口腹者或反食之欲心勝而不暇擇也席不正不坐謝氏曰聖人心安於正故於位之不正者雖小不處上聲鄉人飲酒杖者出斯出矣杖者老人也六十杖於鄉禮王制五十杖於家六十杖於鄉七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從未出不敢先既出不敢後鄉人儺朝服而立於阼階儺乃多反儺所以逐疫周禮方相氏掌之夏官方相氏掌蒙熊皮黃金四目玄衣朱裳執戈揚盾帥百𨽻而時儺以索室驅疫阼階東階也儺雖古禮而近於戲亦必朝服而臨之者郊特牲注朝服祭服也無所不用其誠敬也或曰恐其驚先祖五祀之神欲其依已而安也此一節記孔子居鄉之事問人於他邦再拜而送之拜送使去聲者如親見之敬也康子饋藥拜而受之曰丘未達不敢嘗范氏曰凡賜食必嘗以拜藥未達則不敢嘗受而不飲則虛人之賜故告之如此然則可飲而飲不可飲而不飲皆在其中矣楊氏曰大夫有賜拜而受之禮也未達不敢嘗謹疾也必告之直也此一節記孔子與人交之誠意廏焚子退朝曰傷人乎不問馬非不愛馬然恐傷人之意多故未暇問蓋貴人賤畜許又反理當如此叢説廏養馬之間也周禮凡牧馬之數四馬為乘三馬為早三皂為繫六繫為廏一廏二百一十六馬牧馬之人曰圉良馬則匹一人駑馬則麗一人良馬則乘有圉師皂有趣馬繫有馭夫廏有僕夫駑馬則六麗一師六師一趣馬六趣馬一馭夫天子十二間馬六種五良一駑諸侯六間三良三駑此章為邦國之間總計良駑一千二百八十八馬總一千二百七十三人故廏焚夫子問人而不問馬又按大夫四間一良三駑則八百六十四馬掌牧者六百八十三人然大國之卿四大夫祿其田不過三千二百畝上農夫可食二百八十八人而已凡祭祀服御賓客皆仰於此不知何以給之陳文子有馬十乘已謂其富不知何以有許多馬觀此則國中亦未必有許多馬君賜食必正席先嘗之君賜腥必熟而薦之君賜生必畜之畜許六反食恐或餕音俊餘故不以薦曲禮曰餕餘不祭正席先嘗如對君也言先嘗則餘當以頒賜矣腥生肉熟而薦之祖考榮君賜也畜之者仁君之惠無故不敢殺也侍食於君君祭先飯飯扶晚反周禮王日一舉膳夫授祭品嘗食王乃食見天官膳夫鄭注云王日一舉者殺牲盛饌曰舉授祭授王以祭禮飲食必祭示有所先品嘗食者每物皆嘗之導尊者也故侍食者君祭則已不祭而先飯若為去聲君嘗食然不敢當客禮也疾君視之東首加朝服拖紳首去聲拖徒我反東首以受生氣也病卧不能著陟略反衣束帶又不可以褻服見君故加朝服於身又引大帶於上也君命召不俟駕行矣急趨君命行出而駕車隨之此一節記孔子事君之禮入太廟每事問重出朋友死無所歸曰於我殯朋友以義合死無所歸不得不殯朋友之饋雖車馬非祭肉不拜朋友有通財之義故雖車馬之重不拜祭肉則拜者敬其祖考同於己親也此一節記孔子交朋友之義寢不尸居不容尸謂偃卧似死人也居居家容容儀范氏曰寢不尸非惡其類於死也惰慢之氣不設於身體雖舒布其四體而亦未嘗肆耳居不容非惰也但不若奉祭祀見賓客而已申申夭夭是也見齊衰者雖狎必變見冕者與瞽者雖褻必以貌狎謂素親狎褻謂燕見貌謂禮貌餘見前篇凶服者式之式負版者式車前橫木有所敬則俯而憑之負版持邦國圖籍者式此二者哀有喪重民數也人惟萬物之靈出尚書而王者之所天也前漢書酈食其曰王者以民為天民以食為天故周禮獻民數於王王拜受之況其下者敢不敬乎周禮秋官司民掌登萬民之數自生齒以上皆書於版男八月女七月而生齒版今户籍也嵗登下其死生及三年大比以萬民之數詔司寇司寇獻其數于王王拜受之登于天府有盛饌必變色而作敬主人之禮非以其饌也迅雷風烈必變迅疾也烈猛也必變者所以敬天之怒記曰若有疫風迅雷甚雨則必變雖夜必興衣服冠而坐見玉藻篇此一節記孔子容貌之變升車必正立執綏綏挽以上上聲車之索也范氏曰正立執綏則心體無不正而誠意肅恭矣蓋君子莊敬無所不在升車則見形甸反於此也車中不內顧不疾言不親指內顧回視也禮曰顧不過轂見曲禮三者皆失容且惑人此一節記孔子升車之容色斯舉矣翔而後集言鳥見人之顔色不善則飛去回翔審視而後下止人之見幾平聲而作審擇所處上聲亦當如此然此上下必有闕文矣曰山梁雌雉時哉時哉子路共之三嗅而作共九用反又居勇反嗅許又反邢氏曰名昺濟隂人作論語疏梁橋也時哉言雉之飲啄得其時子路不達以為時物而共具之共九用反孔子不食三嗅其氣而起朝氏曰石經嗅作戛石經箋見大學或問謂雉鳴也劉聘君曰嗅當作臭古閴反閴苦璧反張兩翅也見爾雅爾雅釋獸須屬獸曰釁又曰嬌魚曰須鳥曰臭愚按如後兩説則共字當為拱執之義然此必有闕文不可強上聲為之説姑記所聞以俟知者論語纂箋卷五
