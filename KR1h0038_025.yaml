body:
  text: 欽定四庫全書孟子纂箋卷十一元詹道傳撰告子上凡二十章告子曰性猶把柳也義猶杯棬也以人性為仁義猶以把栁為杯棬杯音杯棬丘圓反性者人生所稟之天理也把栁匱居旅反栁杯棬屈木所為若巵匜音移之屬告子言人性本無仁義必待矯揉人九反而後成如荀子性惡之説也荀子性惡篇人之性惡其善者偽也又曰孟子曰今人之性善將皆失其性故也此篇反覆辨孟子云孟子曰子能順把柳之性而以為杯棬乎將戕賊把栁而後以為杯棬也如將戕賊把栁而以為杯棬則亦將戕賊人以為仁義與率天下之人而禍仁義者必子之言夫戕音牆與平聲夫音扶言如此則天下之人皆以仁義為害性而不肯為是因子之言而為仁義之禍也告子曰性猶湍水也決諸東方則東流決諸西方則西流人性之無分於善不善也猶水之無分於東西也湍他端反湍波流瀠音螢回之貌也告子因前説而小變之近於楊子善惡混之説楊子修身篇人之性也善惡混修其善則為善人修其惡則為惡人氣也者所適善惡之馬歟愚謂氣也者所適善惡之馬一句即如告子認氣為性而司馬公云孟子以為人性善其不善者外物誘之也荀子以為人性惡其善者聖人之教也是皆得其一偏而遺其本夫性者人之所受於天以生者也善與惡必兼有之猶隂之與陽也是故雖聖人不能無惡雖愚人不能無善善至多惡至少為聖人惡至多善至少為愚人善惡相半為中人用詳著其説庶可合而觀之孟子曰水信無分於東西無分於上下乎人性之善也猶水之就下也人無有不善水無有不下言水誠不分東西矣然豈不分上下乎性即天理未有不善者也今夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉其勢則然也人之可使為不善其性亦猶是也夫音扶搏補各反搏擊也躍跳也顙額也水之過額在山皆不就下也然其本性未嘗不就下但為搏激所使而逆其性耳此章言性本善故順之而無不善本無惡故反之而後為惡非本無定體而可以無所不為也告子曰生之謂性生指人物之所以知覺運動者而言告子論性前後四章語雖不同然其大指不外乎此與近世佛氏所謂作用是性者略相似語録禪家説如何是佛曰見性成佛如何是性曰作用是性蓋謂目之視耳之聽手之執捉足之運奔皆性也只説得個形而下者孟子曰生之謂性也猶白之謂白與曰然白羽之白也猶白雪之白白雪之白猶白玉之白與曰然與平聲下同白之謂白猶言凡物之白者同謂之白更無差初加楚冝二反别必列反也白羽以下孟子再問而告子曰然則是謂凡有生者同是一性矣然則犬之性猶牛之性牛之性猶人之性與孟子又言若果如此則犬牛與人皆有知覺皆能運動其性皆無以異矣於是告子自知其説之非而不能對也愚按性者人之所得於天之理也生者人之所得於天之氣也性形而上者也氣形而下者也易大傳曰形而上者謂之道形而下者謂之器人物之生莫不有是性亦莫不有是氣然以氣言之則知覺運動人與物若不異也以理言之則仁義禮智之稟豈物之所得而全哉此人之性所以無不善而為萬物之靈也告子不知性之為理而以所謂氣者當之是以把柳湍水之喻食色無善無不善之説縱將容反橫繆靡幼反戾紛紜舛尺免反錯而此章之誤乃其本根所以然者蓋徒知知覺運動之蠢然者人與物同而不知仁義禮智之粹然者人與物異也孟子以是折之其義精矣告子曰食色性也仁內也非外也義外也非內也告子以人之知覺運動者為性故言人之甘食悅色者即其性故仁愛之心生於內而事物之冝由乎外學者但當用力於仁而不必求合於義也孟子曰何以謂仁內義外也曰彼長而我長之非有長於我也猶彼白而我白之從其白於外也故謂之外也長上聲下同我長之我以彼為長也我白之我以彼為白也曰異於白馬之白也無以異於白人之白也不識長馬之長也無以異於長人之長與且謂長者義乎長之者義乎與平聲下同張氏曰上異於二字冝衍李氏曰或有闕文焉愚按白馬白人所謂彼白而我白之也長馬長人所謂彼長而我長之也白馬白人不異而長馬長人不同是乃所謂義也義不在彼之長而在我長之之心則義之非外明矣曰吾弟則愛之秦人之弟則不愛也是以我為悅者也故謂之內長楚人之長亦長吾之長是以長為悅者也故謂之外也言愛主於我故仁在內敬主於長故義在外曰耆秦人之炙無以異於耆吾炙夫物則亦有然者也然則耆炙亦有外與耆音嗜同夫音扶言長之耆之皆出於心也林氏曰告子以食色為性故因其所明者而通之自篇首至此四章告子之辨屢屈而屢變其説以求勝卒不聞其能自反而有所疑也此正其所謂不得於言勿求於心者所以卒於鹵音魯莽莫補莫厚母黨三反而不得其正也孟季子問公都子曰何以謂義內也孟季子疑孟仲子之弟也蓋聞孟子之言而未達故私論之曰行吾敬故謂之內也所敬之人雖在外然知其當敬而行吾心之敬以敬之則不在外也鄉人長於伯兄一嵗則誰敬曰敬兄酌則誰先曰先酌鄉人所敬在此所長在彼果在外非由內也長上聲伯長也酌酌酒也此皆季子問公都子答而季子又言如此則敬長之心果不由中出也公都子不能答以告孟子孟子曰敬叔父乎敬弟乎彼將曰敬叔父曰弟為尸則誰敬彼將曰敬弟子曰惡在其敬叔父也彼將曰在位故也子亦曰在位故也庸敬在兄斯須之敬在鄉人惡平聲尸祭祀所主以象神雖子弟為之然敬之當如祖考也在位弟在尸位鄉人在賓客之位也庸常也斯須暫時也言因時制宜皆由中出也季子聞之曰敬叔父則敬敬弟則敬果在外非由內也公都子曰冬日則飲湯夏日則飲水然則飲食亦在外也此亦上章耆炙之義范氏曰二章問答大指略同皆反覆譬喻以曉當世使明仁義之在內則知人之性善而皆可以為堯舜矣公都子曰告子曰性無善無不善也此亦生之謂性食色性也之意近世蘇氏胡氏之説蓋如此定字曰蘇東坡論性謂自堯舜以來至孔子不得已而曰中曰一未嘗分善惡言也自孟子道性善而一與中支矣胡文定公論性謂性不可以善言才説善時便與惡對非本然之性矣孟子道性善只是贊歎之辭説好個性如佛言善哉善哉五峯論性云凡人之生粹然天地之心道義全具無適無莫不可以善惡辨不可以是非分或曰性可以為善可以為不善是故文武興則民好善幽厲興則民好暴好去聲此即湍水之説也或曰有性善有性不善是故以堯為君而有象以瞽瞍為父而有舜以紂為兄之子且以為君而有微子啓王子比干韓子性有三品之説蓋如此諱子原性篇性之品有上中下三上焉者善焉而已矣中焉者可導而上下也下焉者惡焉而已矣按此文則微子比干皆紂之叔父而書稱微子為商王元子疑此或有誤字今曰性善然則彼皆非與孟子曰乃若其情則可以為善矣乃所謂善也與平聲乃若發語辭情者性之動也人之情本但可以為善而不可以為惡則性之本善可知矣若夫為不善非才之罪也夫音扶才猶材質人之能也人有是性則有是才性既善則才亦善人之為不善乃物欲陷溺而然非其才之罪也惻隱之心人皆有之羞惡之心人皆有之恭敬之心人皆有之是非之心人皆有之惻隱之心仁也羞惡之心義也恭敬之心禮也是非之心智也仁義禮智非由外鑠我也我固有之也弗思耳矣故曰求則得之舍則失之或相倍蓗而無算者不能盡其才者也鑠式灼反惡去聲舍上聲蓰音師恭者敬之發於外者也敬者恭之主於中者也鑠以火銷金之名自外以至內也算數也言四者之心人所固有但人自不思而求之耳所以善惡相去之逺由不思不求而不能擴充以盡其才也前篇言是四者為仁義禮智之端而此不言端者彼欲其擴而充之此直因用以著其本體故言有不同耳詩曰天生蒸民有物有則民之秉夷好是懿德孔子曰為此詩者其知道乎故有物必有則民之秉夷也故好是懿德好去聲詩大雅蒸民之篇蒸詩作蒸衆也物事也則法也夷詩作彛常也懿美也有物必有法如有耳目則有聰明之德有父子則有慈孝之心是民所秉執之常性也故人之情無不好此懿德者以此觀之則人性之善可見而公都子所問之三説皆不辨而自明矣程子曰性即理也理則堯舜至於塗人一也才稟於氣氣有清濁稟其清者為賢稟其濁者為愚學而知之則氣無清濁皆可至於善而復性之本湯武身之是也孔子所言下愚不移者則自暴自棄之人也又曰論性不論氣不備論氣不論性不明二之則不是張子曰形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉愚按程子此説才字與孟子本文小異蓋孟子專指其發於性者言之故以為才無不善程子兼指其稟於氣者言之則人之才固有昏明強弱之不同矣張子所謂氣質之性是也二説雖殊各有所當去聲然以事理考之程子為密蓋氣質所稟雖有不善而不害性之本善性雖本善而不可以無省悉井反察矯揉人九反之功學者所當深玩也孟子曰富嵗子弟多賴凶嵗子弟多暴非天之降才爾殊也其所以陷溺其心者然也富嵗豐年也賴藉慈夜反也豐年衣食饒足故有所顧藉而為善凶年衣食不足故有以陷溺其心而為暴今夫楚麥播種而耰之其地同樹之時又同浡然而生至於日至之時皆熟矣雖有不同則地有肥磽雨露之養人事之不齊也夫音扶牟音牟耰音憂磽苦交反牟大麥也耰覆敷救反種上聲也日至之時謂當成熟之期也磽瘠音夕薄也故凡同類者舉相似也何獨至於人而疑之聖人與我同類者聖人亦人耳其性之善無不同也故龍子曰不知足而為屨我知其不為蕢也屨之相似天下之足同也蕢音匱蕢草器也不知人足之大小而為之屨雖未必適中然必似足形不至成蕢也口之於味有同耆也易牙先得我口之所耆者也如使口之於味也其性與人殊若犬馬之與我不同類也則天下何耆皆從易牙之於味也至於味天下期於易牙是天下之口相似也耆音嗜下同易牙古之知味者齊桓公臣能辨淄澠二水味言易牙所調之味則天下皆以為美也惟耳亦然至於聲天下期於師曠是天下之耳相似也師曠能審音者也言師曠所和之音則天下皆以為美也惟目亦然至於子都天下莫不知其姣也不知子都之姣者無目者也姣古卯反子都古之美人也姣好也疏山有扶蘇詩不見子都乃見狂且故曰口之於味也有同耆焉耳之於聲也有同聽焉目之於色也有同美焉至於心獨無所同然乎心之所同然者何也謂理也義也聖人先得我心之所同然耳故理義之悅我心猶芻豢之悅我口然猶可也草食曰芻牛羊是也榖食曰豢音患二句本爾雅犬豕是也程子曰在物為理處上聲物為義體用之謂也孟子言人心無不悅理義者但聖人則先知先覺乎此耳非有以異於人也程子又曰理義之悅我心猶芻豢之悅我口此語親切有味須實體察得理義之悅心真猶芻豢之悅口始得孟子曰牛山之木嘗美矣以其郊於大國也斧斤伐之可以為美乎是其日夜之所息雨露之所潤非無萌蘖之生焉牛羊又從而牧之是以若彼濯濯也人見其濯濯也以為未嘗有材焉此豈山之性也哉蘖五割反牛山齊之東南山也邑外謂之郊言牛山之木前此固嘗美矣今為大國之郊伐之者衆故失其美耳息生長上聲下同也日夜之所息謂氣化流行未嘗間去聲斷徒玩反故日夜之間凡物皆有所生長也萌芽也蘖芽之旁出者也濯濯光潔之貌材材木也言山木雖伐猶有萌蘖而牛羊又從而害之是以至於光潔而無草木也雖存乎人者豈無仁義之心哉其所以放其良心者亦猶斧斤之於木也旦旦而伐之可以為美乎其日夜之所息平旦之氣其好惡與人相近也者幾希則其旦晝之所為有梏亡之矣梏之反覆則其夜氣不足以存夜氣不足以存則其違禽獸不逺矣人見其禽獸也而以為未嘗有才焉者是豈人之情也哉好惡並去聲梏工毒反良心者本然之善心即所謂仁義之心也平旦之氣謂未與物接之時清明之氣也好惡與人相近言得人心之所同然也幾希不多也梏械下戒反也反覆展轉也言人之良心雖已放失然其日夜之間亦必有所生長故平旦未與物接其氣清明之際良心猶必有發見形甸反下同者但其發見至微而旦晝所為之不善又已隨而梏亡之如山木既伐猶有萌蘖而牛羊又牧之也晝之所為既有以害其夜之所息夜之所息又不能勝其晝之所為是以展轉相害至於夜氣之生日以寖音浸薄而不足以存其仁義之良心則平旦之氣亦不能清而所好惡遂與人逺矣故苟得其養無物不長苟失其養無物不消長上聲山木人心其理一也孔子曰操則存舍則亡出入無時莫知其鄉惟心之謂與舍音捨與平聲孔子言心操之則在此捨之則失去其出入無定時亦無定處如此孟子引之以明心之神明不測得失之易去聲而保守之難不可頃刻失其養學者當無時而不用其力使神清氣定常如平旦之時則此心常存無適而非仁義矣程子曰心豈有出入亦以操舍而言耳操之之道敬以直內而已愚聞之師曰人理義之心未嘗無唯持守之即在爾若於旦晝之間不至梏亡則夜氣愈清夜氣清則平旦未與物接之時湛然虛明氣象自可見矣孟子發此夜氣之説於學者極有力冝熟玩而深省悉井反之也孟子曰無或乎王之不智也或與惑同疑怪也王疑指齊王雖有天下易生之物也一日暴之十日寒之未有能生者也吾見亦罕矣吾退而寒之者至矣吾如有萌焉何哉易去聲暴步卜反見音現暴溫之也我見王之時少猶一日暴之也我退則諂諛雜進之日多是十日寒之也雖有萌蘖之生我亦安能如之何哉今夫奕之為數小數也不專心致志則不得也奕秋通國之善奕者也使奕秋誨二人奕其一人專心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣為是其智弗若與曰非然也夫音扶繳音灼射食亦反為是之為去聲若與之與平聲奕圍棊也數技也致極也奕秋善奕者名秋也繳以繩繫矢而射也程子為講官言於上曰元祐經筵奏劄人主一日之間接賢士大夫之時多親宦官宫妾之時少則可以涵養氣質而薰陶德性時不能用識者恨之范氏曰人君之心惟在所養君子養之以善則智小人養之以惡則愚然賢人易去聲下同踈小人易親是以寡不能勝衆正不能勝邪自古國家治去聲日常少而亂日常多蓋以此也孟子曰魚我所欲也熊掌亦我所欲也二者不可得兼舍魚而取熊掌者也生亦我所欲也義亦我所欲也二者不可得兼舍生而取義者也舍上聲魚與熊掌皆美味而熊掌尤美也生亦我所欲所欲有甚於生者故不為苟得也死亦我所惡所惡有甚於死者故患有所不辟也惡辟皆去聲下同釋所以舍生取義之意得得生也欲生惡死者雖衆人利害之常情而欲惡有甚於生死者乃秉彛義理之良心是以欲生而不為苟得惡死而有所不避也如使人之所欲莫甚於生則凡可以得生者何不用也使人之所惡莫甚於死者則凡可以辟患者何不為也設使人無秉彞之良心而但有利害之私情則凡可以偷生免死者皆將不顧禮義而為之矣由是則生而有不用也由是則可以辟患而有不為也由其必有秉彞之良心是以其能舍生取義如此是故所欲有甚於生者所惡有甚於死者非獨賢者有是心也人皆有之賢者能勿喪耳喪去聲羞惡之心人皆有之但衆人汩音骨於利欲而忘之惟賢者能存之而不喪耳一簞食一豆羹得之則生弗得則死呼爾而與之行道之人弗受蹴爾而與之乞人不屑也食音嗣呼呼故反蹴子六反豆木器也呼咄當沒反啐七內反之貌行道之人路中凡人也蹴踐踏也乞人丐乞之人也不屑不以為潔也言雖欲食之急而猶惡無禮有寧死而不食者是其羞惡之本心欲惡有甚於生死者人皆有之也萬鍾則不辨禮義而受之萬鍾於我何加焉為宫室之美妻妾之奉所識窮乏者得我與為去聲與平聲萬鍾於我何加言於我身無所增益也所識窮乏者得我謂所知識之窮乏者感我之惠也上言人皆有羞惡之心此言衆人所以喪之由此三者蓋理義之心雖曰固有而物欲之蔽亦人所易昏也鄉為身死而不受今為宫室之美為之鄉為身死而不受今為妻妾之奉為之鄉為身死而不受今為所識窮乏者得我而為之是亦不可以已乎此之謂失其本心鄉為並去聲為之之為並平聲言三者身外之物其得失比生死為甚輕鄉為身死猶不肯受呼蹴之食今乃為此三者而受無禮義之萬鍾是豈不可以止乎本心謂羞惡之心此章言羞惡之心人所固有或能決死生於危迫之際而不免計豐約於宴安之時是以君子不可頃刻而不省悉井反察於斯焉孟子曰仁人心也義人路也仁者心之德程子所謂心如榖種上聲仁則其生之性是也然但謂之仁則人不知其切於已故反而名之曰人心則可以見其為此身酬酢音昨萬變之主而不可須臾失矣義者行事之宜謂之人路則可以見其為出入往來必由之道而不可須臾舍上聲矣舍其路而不由放其心而不知求哀哉舍上聲哀哉二字最宜詳味令平聲人惕然有深省悉井反處人有雞犬放則知求之有放心而不知求程子曰心至重雞犬至輕雞犬放則知求之心放則不知求豈愛其至輕而忘其至重哉弗思而已矣愚謂上兼言仁義而此下專論求放心者能求放心則不違於仁而義在其中矣學問之道無他求其放心而已矣學問之事固非一端然其道則在於求其考心而已蓋能如是則志氣清明義理昭著而可以上達不然則昏昧放逸雖曰從事於學而終不能有所發明矣故程子曰聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去下學而上達也此乃孟子開示切要之言程子又發明之曲盡其指學者宜服膺而勿失也孟子曰今有無名之指屈而不信非疾痛害事也如有能信之者則不逺秦楚之路為指之不若人也信與伸同為去聲無名指手之第四指也指不若人則知惡之心不若人則不知惡此之謂不知類也惡去聲不知類言其不知輕重之等也孟子曰拱把之桐梓人苟欲生之皆知所以養之者至於身而不知所以養之者豈愛身不若桐梓哉弗思甚也拱兩手所圍也把一手所握也桐梓二木名孟子曰人之於身也兼所愛兼所愛則兼所養也無尺寸之膚不愛焉則無尺寸之膚不養也所以考其善不善者豈有他哉於已取之而已矣人之一身固當兼養然欲考其所養之善否者惟在反之於身以審其輕重而已矣體有貴賤有小大無以小害大無以賤害貴養其小者為小人養其大者為大人賤而小者口腹也貴而大者心志也今有場師舍其梧檟養其樲棘則為賤場師焉舍上聲檟音價樲音二場師治場圃者梧桐也檟梓也皆美材也樲棘小棗非美材也養其一指而失其肩背而不知也則為狼疾人也狼善顧疾則不能故以為失肩背之喻飲食之人則人賤之矣為其養小以失大也為去聲飲食之人專養口腹者也飲食之人無有失也則口腹豈適為尺寸之膚哉此言若使專養口腹而能不失其大體則口腹之養軀命所關不但為尺寸之膚而已但養小之人無不失其大者故口腹雖所當養而終不可以小害大賤害貴也公都子問曰鈞是人也或為大人或為小人何也孟子曰從其大體為大人從其小體為小人鈞同也從隨也大體心也小體耳目之類也曰鈞是人也或從其大體或從其小體何也曰耳目之官不思而蔽於物物交物則引之而已矣心之官則思思則得之不思則不得也此天之所與我者先立乎其大者則其小者不能奪也此為大人而已矣官之為言司也耳司聽目司視各有所職而不能思是以蔽於外物既不能思而蔽於外物則亦一物而已又以外物交於此物其引之而去不難矣心則能思而以思為職凡事物之來心得其職則得其理而物不能蔽失其職則不得其理而物來蔽之此三者皆天之所以與我者而心為大若能有以立之則事無不思而耳目之欲不能奪之矣此所以為大人也然此天之此舊本多作比而趙注亦以比方釋之今本既多作此而注亦作此乃未詳孰是但作比字於義為短故且從今本云范浚字茂明婺州人心針曰茫茫堪輿俯仰無垠音銀人於其間眇然有身是身之微太倉稊杜兮反米參為三才曰惟心耳往古來今孰無此心心為形役乃獸乃禽惟口耳目手足動靜投間去聲抵隙乞逆反為厥心病一心之微衆欲攻之其與存者嗚呼幾希君子存誠克念克敬天君泰然百體從令孟子曰有天爵者有人爵者仁義忠信樂善不倦此天爵也公卿大夫此人爵也樂音洛天爵者德義可尊自然之貴也古之人修其天爵而人爵從之修其天爵以為吾分之所當然者耳人爵從之蓋不待求之而自至也今之人修其天爵以要人爵既得人爵而棄其天爵則惑之甚者也終亦必亡而已矣要平聲要求也修天爵以要人爵其心固已惑矣得人爵而棄天爵則其惑又甚焉終必并其所得之人爵而亡之也孟子曰欲貴者人之同心也人人有貴於己者弗思耳貴於己者謂天爵也人之所貴者非良貴也趙孟之所貴趙孟能賤之人之所貴謂人以爵位加已而後貴也良者本然之善也叢説天爵亦是天命則義理之命故思則得之人爵乃氣數之命各有分定求之無益趙孟晉卿也能以爵祿與人而使之貴則亦能奪之而使之賤矣若良貴則人安得而賤之哉詩云既醉以酒既飽以德言飽乎仁義也所以不願人之膏粱之味也令聞廣譽施於身所以不願人之文繡也聞去聲詩大雅既醉之篇飽充足也願欲也膏肥肉粱美榖令善也聞亦譽也文繡衣之美者也仁義充足而聞譽彰著皆所謂良貴也尹氏曰言在我者重則外物輕孟子曰仁之勝不仁也猶水勝火今之為仁者猶以一杯水救一車薪之火也不熄則謂之水不勝火此又與於不仁之甚者也與猶助也仁之能勝不仁必然之理也但為之不力則無以勝不仁而人遂以為真不能勝是我之所為有以深助於不仁者也亦終必亡而已矣言此人之心亦且自怠於為仁終必并與其所為而亡之趙氏曰言為仁不至而不反諸己也孟子曰五榖者種之美者也苟為不熟不如荑稗夫仁亦在乎熟之而已矣荑音蹄稗蒲賣反夫音扶荑稗草之似榖者其實亦可食然不能如五榖之美也但五榖不熟則反不如荑稗之熟猶為仁而不熟則反不如為他道之有成是以為仁必貴乎熟而不可徒恃其種上聲之美又不可以仁之難熟而甘為他道之有成也尹氏曰日新而不已則熟孟子曰羿之教人射必志於彀學者亦必志於彀彀古候反羿善射者也志猶期也彀弓滿也滿而後發射之法也學謂學射大匠誨人必以規矩學者亦必以規矩大匠工師也規矩匠之法也此章言事必有法然後可成師舍上聲下同是則無以教弟子舍是則無以學曲藝且然況聖人之道乎孟子纂箋卷十一
