body:
  text: 欽定四庫全書論語纂箋卷一元詹道𫝊撰學而第一此為書之首篇故所記多務本之意乃入道之門積德之基學者之先務也凡十六章子曰學而時習之不亦說乎說悅同學之為言效也人性皆善而覺有先後後覺者必效先覺之所為乃可以明善而復其初也習鳥數音朔下同飛也學之不已如鳥數飛也說文習字從羽從白於六書屬諧聲謂形聲合也又月令鷹乃學習說喜意也既學而又時時習之則所學者熟而中心喜說其進自不能已矣程子曰習重平聲習也時復扶又反思繹浹洽於中則說也又曰學者將以行之也時習之則所學者在我故說謝氏名良佐字顯道上蔡人曰時習者無時而不習坐如尸坐時習也立如齊莊皆反立時習也坐如尸立如齊出記曲禮如尸注曰視貌正如齊注曰磬且聽謂祭祀時古者祭必有尸祭男用男尸祭女則女尸皆服卒者之上服不用賤者祭成喪者必有尸尸必用孫孫幼則使人抱之無孫則取同姓成喪者謂成人有子孫如祭神祭山川皆有尸有朋自遠方來不亦樂乎樂音洛朋同類也自逺方來則近者可知程子曰以善及人而信從者衆故可樂又曰說在心樂主發散在外人不知而不慍不亦君子乎慍紆問反慍含怒意君子成德之名尹氏曰尹氏名焞字彥明河南人程門髙弟學在已知不知在人何慍之有程子曰雖樂於及人不見是而無悶乃所謂君子不見是而無悶出易乾文言愚謂及人而樂者順而易去聲不知而不慍者逆而難故惟成德者能之然德之所以成亦曰學之正習之熟說之深而不已焉耳程子曰樂由說而後得非樂不足以語君子有子曰其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也弟好皆去聲鮮上聲下同有子孔子弟子名若魯人善事父母為孝善事兄長上聲為弟犯上謂干犯在上之人鮮少也作亂則為悖逆爭鬬之事矣此言人能孝弟則其心和順少好犯上必不好作亂也君子務本本立而道生孝弟也者其為仁之本與與平聲務專力也本猶根也仁者愛之理心之德也為仁猶曰行仁與者疑辭謙退不敢質言也言君子凡事專用力於根本根本既立則其道自生若上文所謂孝弟乃是為仁之本學者務此則仁道自此而生也程子曰孝弟順德也故不好犯上豈復扶又反有逆理亂常之事德有本本立則其道充大孝弟行於家而後仁愛及於物所謂親親而仁民也故為仁以孝弟為本論性則以仁為孝弟之本或問孝弟為仁之本此是由孝弟可以至仁否曰非也謂行仁自孝弟始孝弟是仁之一事謂之行仁之本則可謂是仁之本則不可蓋仁是性也孝弟是用也性中只有箇仁義禮智四者而已曷嘗有孝弟來然仁主於愛愛莫大於愛親故曰孝弟也者其為仁之本與子曰巧言令色鮮矣仁巧好令善也好其言善其色致飾於外務以悅人則人欲肆而本心之德亡矣聖人辭不迫切専言鮮則絶無可知學者所當深戒也程子曰知巧言令色之非仁則知仁矣曽子曰吾曰三省吾身為人謀而不忠乎與朋友交而不信乎𫝊不習乎省悉井反為去聲𫝊平聲曽子孔子弟子名參字子輿南武城人盡己之謂忠以實之謂信𫝊謂受之於師習謂熟之於已曽子以此三者日省其身有則改之無則加勉其自治誠切如此可謂得為學之本矣而三者之序則又以忠信為𫝊習之本也尹氏曰曽子守約故動必求諸身謝氏曰諸子之學皆出於聖人其後愈逺而愈失其真獨曽子之學専用心於內故𫝊之無弊觀於子思孟子可見矣箋義謝說大意本韓愈送王秀才序詞惜乎其嘉言善行去聲不盡𫝊於世也其幸存而未湣彌盡反者學者其可不盡心乎子曰道千乘之國敬事而信節用而愛人使民以時道乘並去聲道治也千乘諸侯之國其地可出兵車千乘者也按朱子云車乘之說疑馬氏為可據馬說八百家出車一乘包氏說八十家出車一乘一乘甲士三人步卒七十二人牛馬兵甲芻糧具焉恐非八十家所能給也馬融千乘之說依周禮諸公方五百里諸侯方四百里為說箋見孟子首章包云古者地方里為井十井為乘百里之國適千乘也蓋依王制孟子大國地方百里之說而𫝊杏溪百考是之敬者主一無適之謂敬事而信者敬其事而信於民也時謂農隙乞逆反之時左𫝊農隙杜注謂各隨時事之閒也言治國之要在此五者亦務本之意也程子曰此言至淺然當時諸侯果能此亦足以治平聲其國矣聖人言雖至近上下皆通此三言者若推其極堯舜之治去聲亦不過此若常人之言近則淺近而已矣楊氏曰楊氏名時字中立號龜山延平人程門髙弟上不敬則下慢不信則下疑下慢而疑事不立矣敬事而信以身先之也易曰節以制度不傷財不害民節卦彖傳文蓋侈用則傷財傷財必至於害民故愛民必先於節用然使之不以其時則力本者不獲自盡雖有愛人之心而人不被其澤矣然此特論其所存而已未及為政也苟無是心則雖有政不行焉胡氏曰凡此數者又皆以敬為主愚謂五者反復芳服反亦作覆相因各有次第讀者宜細推之子曰弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文弟子之弟上聲則弟之弟去聲謹者行去聲之有常也信者言之有實也泛廣也衆謂衆人親近也仁謂仁者餘力猶言暇日以用也文謂詩書六藝之文程子曰為弟子之職力有餘則學文不修其職而先文非為去聲已之學也尹氏曰德行本也文藝末也窮其本末知所先後可以入德矣洪氏曰洪民名興祖字慶善丹陽人未有餘力而學文則文滅其質有餘力而不學文則質勝而野愚謂力行而不學文則無以考聖賢之成法識事理之當然而所行或出於私意非但失之於野而已子夏曰賢賢易色事父母能竭其力事君能致其身與朋友交言而有信雖曰未學吾必謂之學矣子夏孔子弟子姓卜名商衛人賢人之賢而易其好去聲下同色之心好善有誠也致猶委也委致其身謂不有其身也四者皆人倫之大者而行之必盡其誠學求如是而已故子夏言有能如是之人苟非生質之美必其務學之至雖或以為未嘗為學我必謂之已學也游氏曰游氏名酢字定夫建安人程門髙弟三代之學皆所以明人倫也能是四者則於人倫厚矣學之為道何以加此子夏以文學名而其言如此則古人之所謂學者可知矣故學而一篇大抵皆在於務本吳氏曰吳氏名棫字才老建安人子夏之言其意善矣然詞氣之閒抑揚太過其流之弊將或至於廢學必若上章夫子之言然後為無弊也子曰君子不重則不威學則不固重厚重威威嚴固堅固也輕乎外者必不能堅乎內故不厚重則無威嚴而所學亦不堅固也主忠信人不忠信則事皆無實為惡則易去聲為善則難故學者必以是為主焉程子曰人道唯在忠信不誠則無物且出入無時莫知其鄉者人心也若無忠信豈復扶又反有物乎無友不如己者無毋通禁止辭也友所以輔仁不如己則無益而有損過則勿憚改勿亦禁止之辭憚畏難也自治不勇則惡日長上聲故有過則當速改不可畏難而苟安也程子曰學問之道無他也知其不善則速改以從善而已程子曰君子自修之道當如是也游氏曰君子之道以威重為質而學以成之學之道必以忠信為主而以勝己者輔之然或吝於改過則終無以入德而賢者亦未必樂音洛告以善道故以過勿憚改終焉曽子曰慎終追逺民德歸厚矣慎終者喪盡其禮追逺者祭盡其誠民德歸厚謂下民化之其德亦歸於厚蓋終者人之所易去聲下同忽也而能謹之逺者人之所易忘也而能追之厚之道也故以此自為則已之德厚下民化之則其德亦歸於厚也子禽問於子貢曰夫子至於是邦也必聞其政求之與抑與之與之與之與平聲下同子禽姓陳名亢音岡陳人子貢姓端木名賜衛人皆孔子弟子或曰亢子貢弟子未知孰是家語亢在孔子弟子中史記七十二子傳却無之抑反語辭子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求之與溫和厚也良易去聲下同直也恭莊敬也儉節制也讓謙遜也五者夫子之盛德光輝接於人者也其諸語辭也人他人也言夫子未嘗求之但其德容如是故時君敬信自以其政就而問之耳非若他人必求之而後得也聖人過化存神之妙未易窺測然即此而觀則其德盛禮恭而不願乎外亦可見矣學者所當潛心而勉學也謝氏曰學者觀於聖人威儀之間亦可以進德矣若子貢亦可謂善觀聖人矣亦可謂善言德行矣今去聖人千五百年紫陽格言文公於藏書閣下上書云周敬王四十一年壬戌孔子卒至宋慶元三年丁巳一千六百七十六年以此五者想見其形容尚能使人興起而况於親炙之者乎張敬夫曰敬夫名栻號南軒廣漢人夫子至是邦必聞其政而未有能委國而授之以政者蓋見聖人之儀刑而樂音洛告之者秉彛好去聲德之良心也而私欲害之是以終不能用耳子曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣行去聲父在子不得自専而志則可知父沒然後其行可見故觀此足以知其人之善惡然又必能三年無改於父之道乃見其孝不然則所行如字雖善亦不得為孝矣尹氏曰如其道雖終身無改可也如其非道何待三年然則三年無改者孝子之心有所不忍故也游氏曰三年無改亦謂在所當改而可以未改者耳有子曰禮之用和為貴先王之道斯為美小大由之禮者天理之節文人事之儀則也和者從七容反容不迫之意蓋禮之為體雖嚴然皆出於自然之理故其為用必從容而不迫乃為可貴先王之道此其所以為美而小事大事無不由之也有所不行知和而和不以禮節之亦不可行也承上文而言如此而復扶又反下同有所不行者以其徒知和之為貴而一於和不復以禮節之則亦非復禮之本然矣所以流蕩忘返而亦不可行也程子曰禮勝則離故禮之用和為貴先王之道以斯為美而小大由之樂勝則流故有所不行者知和而和不以禮節之亦不可行禮勝則離樂勝則流二句出樂記范氏曰范氏名祖禹字淳夫成都人程門髙弟凡禮之體主於敬而其用則以和為貴敬者禮之所以立也和者樂之所由生也若有子可謂逹禮樂之本矣愚謂嚴而泰和而節此理之自然禮之全體也毫釐有差則失其中正而各倚於一偏其不可行均矣有子曰信近於義言可復也恭近於禮逺恥辱也因不失其親亦可宗也近逺皆去聲信約信也義者事之冝也復踐言也恭致敬也禮節文也因猶依也宗有主也言約信而合其冝則言必可踐矣致恭而中去聲其節則能逺恥辱矣所依者不失其可親之人則亦可以宗而主之矣此言人之言行去聲交際皆當謹之於始而慮其所終不然則因仍苟且之閒將有不勝平聲其自失之悔者矣子曰君子食無求飽居無求安敏於事而慎於言就有道而正焉可謂好學也已好去聲不求安飽者志有在而不暇及也敏於事者勉其所不足慎於言者不敢盡其所有餘也然猶不敢自是而必就有道之人以正其是非則可謂好學矣凡言道者皆謂事物當然之理人之所共由者也尹氏曰君子之學能是四者可謂篤志力行者矣然不取正於有道未免有差如楊墨學仁義而差者也其流至於無父無君謂之好學可乎史記墨翟宋大夫善守禦為篩用索隱云墨子書有文子問於墨子云云文子子夏弟子也如此則墨氏在七十子之後楊朱見於莊列二書老子弟子也與梁惠王同時洪容齊隨筆云墨翟有書其敝見於孔叢子楊朱無書其病見於列子子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也樂音洛好去聲諂卑屈也驕矜肆也常人溺於貧富之中而不知所以自守故必有二者之病無諂無驕則知自守矣而未能超乎貧富之外也凡曰可者僅可而有所未盡之辭也樂則心廣體胖而忘其貧好禮則安處上聲善樂亦音洛循理字出董仲舒䇿亦不自知其富矣子貢貨殖音實蓋先貧後富而嘗用力於自守者家語子貢家富纍千金好販與時轉貨注云買賤賣貴以殖其貨又史記貨殖傳云七十二子之徒賜最為饒益所至國君無不與之分庭抗禮故以此為問而夫子答之如此蓋許其所已能而勉其所未至也子貢曰詩云如切如磋如琢如磨其斯之謂與磋七多反與平聲詩衛風淇澳於六反之篇言治骨角者既切之而復扶又反下同磋之治玉石者既琢之而復磨之治之已精而益求其精也子貢自以無諂無驕為至矣聞夫子之言又知義理之無窮雖有得焉而未可遽自足也故引是詩以明之子曰賜也始可與言詩已矣告諸往而知來者往者其所已言者來者其所未言者愚按此章問答其淺深髙下固不待辨說而明矣然不切則磋無所施不琢則磨無所措故學者雖不可安於小成而不求造七到反道之極致亦不可騖音務於虗逺而不察切已之實病也子曰不患人之不己知患不知人也尹氏曰君子求在我者故不患人之不已知不知人則是非邪正或不能辨故以為患也為政第二凡二十四章子曰為政以德譬如北辰居其所而衆星共之共音拱亦作拱政之為言正也所以正人之不正也德之為言得也行道而有得於心也北辰北極天之樞也爾雅北極謂之北辰郭璞曰北極天之中以正四時吕不韋春秋曰極與天俱遊而天樞不移居其所不動也共向也言衆星四面旋繞而歸向之也為政以德則無為而天下歸之其象如此程子曰為政以德然後無為范氏曰為政以德則不動而化不言而信無為而成所守者至簡而能御煩所處上聲者至靜而能制動所務者至寡而能服衆子曰詩三百一言以蔽之曰思無邪詩三百十一篇言三百者舉大數也蔽猶蓋也思無邪魯頌駉古螢反篇之辭凡詩之言善者可以感發人之善心惡者可以懲創人之逸志其用歸於使人得其情性之正而已然其言微婉且或各因一事而發求其直指全體則未有若此之明且盡者故夫子言詩三百篇而惟此一言足以盡蓋其義其示人之意亦深切矣程子曰思無邪者誠也范氏曰學者必務知要知要則能守約守約則足以盡博矣經禮三百曲禮三千亦可以一言以蔽之曰毋不敬經禮三百曲禮三千見禮器毋不敬見曲禮子曰道之以政齊之以刑民免而無恥道音導下同道猶引導謂先之也政謂法制禁令也齊所以一之也道之而不從者有刑以一之也免而無恥謂苟免刑罰而無所羞愧蓋雖不敢為惡而為惡之心未嘗亡也道之以德齊之以禮有恥且格禮謂制度品節也格至也言躬行以率之則民固有所觀感而興起矣而其淺深厚薄之不一者又有禮以一之則民恥於不善而又有以至於善也一說格正也書曰格其非心愚謂政者為治之具刑者輔治之法德禮則所以出治之本而德又禮之本也此其相為終始雖不可以偏廢然政刑能使民逺去聲罪而已德禮之效則有以使民日遷善而不自知故治民者不可徒恃其末又當深探其本也子曰吾十有五而志于學古者十五而入大學心之所之謂之志心之所之說文中語此所謂學即大學之道也志乎此則念念在此而為之不厭矣三十而立有以自立則守之固而無所事志矣四十而不惑於事物之所當然皆無所疑則知之明而無所事守矣五十而知天命天命即天道之流行而賦於物者乃事物所以當然之故也知此則知極其精而不惑又不足言矣六十而耳順聲入心通無所違逆知之之至不思而得也七十而從心所欲不踰矩從如字從隨也矩法度之器所以為方者也隨其心之所欲而自不過於法度安而行之不勉而中去聲也程子曰孔子生而知者也言亦由學而至所以勉進後人也立能自立於斯道也不惑則無所疑矣知天命窮理盡性也耳順所聞皆通也從心所欲不踰矩則不勉而中矣又曰孔子自言其進德之序如此者聖人未必然但為去聲學者立法使之盈科而後進成章而後達耳胡氏曰聖人之教亦多術然其要使人不失其本心而已欲得此心者惟志乎聖人所示之學循其序而進焉至於一疵不存萬理明盡之後則其日用之閒本心瑩縈定反然隨所意欲莫非至理蓋心即體欲即用體即道用即義聲為律而身為度矣此六字出史記夏紀又曰聖人言此一以示學者當優游涵泳不可躐等而進一以示學者當日就月將不可半塗而廢也愚謂聖人生知安行固無積纍魯水反之漸然其心未嘗自謂巳至此也是其日用之閒必有獨覺其進而人不及知者故因其近似以自名欲學者以是為則而自勉非心實自聖而姑為是退託也後凡言謙辭之屬意皆放上聲此孟懿子問孝子曰無違孟懿子魯大夫仲孫氏名何忌仲孫謂之孟者禮疏古者適長謂之伯庶長謂之孟桓公適子莊公為君而大夫不敢祖諸侯仲孫於三家為庶長三家所宗謂之孟無違謂不背音佩於理樊遲御子告之曰孟孫問孝於我我對曰無違樊遲孔子弟子名須魯人御為去聲孔子御車也孟孫即仲孫也夫子以懿子未逹而不能問恐其失指而以從親之令為孝故語音御樊遲以發之樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮生事葬祭事親之始終具矣禮即理之節文也人之事親自始至終一於禮而不苟其尊親也至矣是時三家僭禮按檀弓三家視桓楹三臣猶設撥是葬之僭禮也三家以雍徹是祭之僭禮也故夫子以是警之然語意渾然又若不専為去聲三家發者所以為聖人之言也胡氏曰人之欲孝其親心雖無窮而分去聲則有限得為而不為與不得為而為之均於不孝所謂以禮者為其所得為者而已矣孟武伯問孝子曰父母唯其疾之憂武伯懿子之子名彘音滯言父母愛子之心無所不至唯恐其有疾病常以為憂也人子體此而以父母之心為心則凡所以守其身者自不容於不謹矣豈不可以為孝乎舊說人子能使父母不以其陷於不義為憂而獨以其疾為憂乃可謂孝亦通子游問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎養去聲别彼列反子游孔子弟子姓言名偃吳人養謂飲食供奉也犬馬待人而食亦若養然言人畜許六反犬馬皆能有以養之若能養其親而敬不至則與養犬馬者何異甚言不敬之罪所以深警之也胡氏曰世俗事親能養足矣狎恩恃愛而不知其漸流於不敬則非小失也子游聖門髙弟未必至此聖人直恐其愛踰於敬故以是深警發之也子夏問孝子曰色難有事弟子服其勞有酒食先生饌曽是以為孝乎食音嗣饌士眷反曾音增色難謂事親之際惟色為難也食飯也先生父兄也饌飲食並如字之也曽猶嘗也蓋孝子之有深愛者必有和氣有和氣者必有愈色有愈色者必有婉容此三句出禮記祭義故事親之際惟色為難耳服勞奉養去聲未足為孝也舊說承順父母之色為難亦通程子曰告懿子告衆人者也對武伯者以其人多可憂之事子游能養而或失於敬子夏能直義而或少溫潤之色各因其材之髙下與其所失而告之故不同也子曰吾與回言終日不違如愚退而省其私亦足以發回也不愚回孔子弟子姓顔字子淵魯人不違者意不相背音佩有聽受而無問難去聲也私謂燕居獨處上聲非進見請問之時發謂發明所言之理愚聞之師曰朱子之師姓李氏名侗字願中號延平先生顔子深潛純粹其於聖人體假已具其聞夫子之言默識心融觸處洞然自有條理故終日言但見其不違如愚人而已及退省悉井反其私則見其日用動靜語默之間皆足以發明夫子之道坦然由之而無疑然後知其不愚也子曰視其所以以為也為善者為君子為惡者為小人觀其所由觀比視為詳矣由從也事雖為善而意之所從來者有未善焉則亦不得為君子矣或曰由行也謂所以行其所為者也察其所安察則又加詳矣安所樂音洛下同也所由雖善而心之所樂者不在於是則亦僞耳豈能久而不變哉人焉廋哉人焉廋哉焉於䖍反廋所留反焉何也廋匿也重平聲言以深明之程子曰在己者能知言窮理則能以此察人如聖人也子曰溫故而知新可以為師矣溫尋繹也故者舊所聞新者今所得言學能時習舊聞而每有新得則所學在我而其應不窮故可以為人師若夫音扶記問之學則無得於心而所知有限故學記譏其不足以為人師正與此意互相發也子曰君子不器器者各適其用而不能相通成德之士體無不具故用無不周非特為一才一藝而已子貢問君子子曰先行其言而後從之周氏曰周氏名孚先字伯忱毗陵人先行其言者行之於未言之前而後從之者言之於既行之後范氏曰子貢之患非言之艱而行之艱故告之以此子曰君子周而不比小人比而不周周普遍也比遍黨也皆與人親厚之意但周公而比私爾君子小人所為不同如隂陽晝夜每每相反然究其所以分則在公私之際毫釐正作氂十毫也之差耳故聖人於周比和同驕泰之屬常對舉而互言之欲學者察乎兩間而審其取舍上聲之幾平聲也子曰學而不思則罔思而不學則殆不求諸心故昏而無得不習其事故危而不安程子曰博學審問慎思明辨篤行五者廢其一非學也子曰攻乎異端斯害也已范氏曰攻専治也故治木石金玉之工曰攻周禮考工記有攻木之工攻金之工異端非聖人之道而别為一端如楊墨是也其率天下至於無父無君専治而欲精之為害甚矣程子曰佛氏之言比之楊墨尤為近理所以其害尤甚學者當如淫聲美色以逺去聲之不爾則駸駸音侵然入於其中矣子曰由誨女知之乎知之為知之不知為不知是知也女音汝由孔子弟子姓仲字子路魯之卞人子路好去聲勇蓋有强上聲其所不知以為知者故夫子告之曰我教女以知之之道乎但所知者則以為知所不知者則以為不知如此則雖或不能盡知而無自欺之蔽亦不害其為知矣况由此而求之又有可知之理乎子張學干祿子張孔子弟子姓顓孫名師陳人干求也祿仕者之奉符用反也子曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔言寡尤行寡悔祿在其中矣行寡之行去聲吕氏曰吕氏名大臨字與叔藍田人疑者所未信殆者所未安程子曰尤罪自外至者也悔理自內出者也愚謂多聞見者學之博闕疑殆者擇之精慎言行去聲者守之約凡言在其中者皆不求而自至之辭言此以救子張之失而進之也程子曰修天爵則人爵至君子言行能謹得祿之道也子張學干祿故告之以此使定其心而不為利祿動若顔閔則無此問矣或疑如此亦有不得祿者孔子蓋曰耕也綏在其中惟理可為者為之而已矣哀公問曰何為則民服孔子對曰舉直錯錯倉故反諸枉則民服舉枉錯諸直則民不服哀公魯君名蔣子兩反凡君問皆稱孔子對曰者尊君也錯捨置也諸衆也程子曰舉錯得義則人心服謝氏曰好去聲直而惡去聲枉天下之至情也順之則服逆之則去必然之理也然或無道以照之則以直為枉以枉為直者多矣是以君子大居敬而貴窮理也季康子問使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠舉善而教不能則勸季康子魯大夫季孫氏名肥莊謂容貌端嚴也臨民以莊則民敬於己孝於親慈於衆則民忠於己善者舉之而不能者教之則民有所勸而樂音洛於為善張敬夫曰此皆在我所當為非為去聲欲使民敬忠以勸而為之也然能如是則其應蓋有不期然而然者矣或謂孔子曰子奚不為政定公初年孔子不仕故或人疑其不為政也子曰書云孝乎惟孝友于兄弟施於有政是亦為政奚其為為政書周書君陳篇書云孝乎者言書之言孝如此也善兄弟曰友書言君陳能孝於親友於兄弟又能推廣此心以為一家之政孔子引之言如此則是亦為政矣何必居位乃為為政乎蓋孔子之不仕有難以語音御或人者故託此以告之要平聲之至理亦不外是子曰人而無信不知其可也大車無輗小車無軏其何以行之哉輗五兮反軏音月大車謂平地任載音壬在之車毛詩小戎注平地任載者為大車則軫深八尺兵車則軫深四尺四寸故曰小戎周禮考工記兵車之輪六尺有六寸田車之輪六尺有三寸乘車之輪六尺有六寸注云此以馬之大小為節田車田獵之車乘車玉路金路象路也輗轅端橫木縳軛音厄以駕牛者小車謂田車兵車乘去聲車軏轅端上曲鉤衡以駕馬者車無此二者則不可以行人而無信亦猶是也子張問十世可知也陸氏曰陸氏名元朗字德明唐蘇州人也一作乎王者易姓受命為一世子張問自此以後十世之事可前知乎子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也馬氏曰馬氏名融東漢扶風人所因謂三綱五常真西山云三綱五常之名始見於白虎通所損益謂文質三統愚按三綱謂君為臣綱父為子綱夫為妻綱五常謂仁義禮智信文質謂夏尚忠商尚質周尚文此三句出董仲舒䇿三統謂夏正建寅為人統商正建丑為地統周正建子為天統檀弓孔疏夏尚黑殷尚白周尚赤此之謂三統建子為正者天之陽氣始生為物所得陽氣微動故為天統丑為正者物已吐牙唯在地中含養故為地統寅為正者以其物出地當須人功故為人統三綱五常禮之大體三代相繼皆因之而不能變其所損益不過文章制度小過不及之間而其已然之迹今皆可見則自今以往或有繼周而王去聲者雖百世之逺所因所革亦不過此豈但十世而已乎聖人所以知來者蓋如此非若後世䜟楚禁反緯術數之學也昔春秋雜取神怪卜筮童謡而無䜟語至史記秦始皇三十一年盧生入海還因奏録圖書曰亡秦者胡也及陳涉起事乃丹書帛曰陳勝王置魚腹中以惑衆自後假託文書者有矣如漢之眭洪推說災異甘忠可詐造天官等書皆是也王莽光武之時尤盛漢末夏賀良等作六經孝經緯書往往假託附㑹姦妄不經遭符秦元魏李唐屢加焚禁而書遂絶術數則如漢之京房唐之袁天綗李淳風占算之類是也胡氏曰子張之問蓋欲知來而聖人言其既往者以明之也夫音扶自修身以至於為天下不可一日而無禮天叙天秩人所共由禮之本也商不能改乎夏周不能改乎商所謂天地之常經也若乃制度文為或太過則當損或不足則當益益之損之與時冝之而所因者不壞是古今之通義也因往推來雖百世之逺不過如此而已矣子曰非其鬼而祭之諂也非其鬼謂非其所當祭之鬼諂求媚也見義不為無勇也知而不為是無勇也論語纂箋卷一
