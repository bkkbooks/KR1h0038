body:
  text: 欽定四庫全書大學纂箋卷一元詹道𫝊撰子程子曰大程子諱顥字伯淳號明道先生小程子諱頣字正叔號伊川先生集註初以大程子小程子為别次稱伯子叔子最後以其學同通稱程子去子者有德之稱猶今稱先生然子程子倣公羊𫝊子沈子之例也大學孔氏之遺書以其書放失闕畧故謂之遺書詳朱子所序程氏遺書大略皆此意而初學入德之門也於今可見古人為學次第者獨賴此篇之存而論孟次之學者必由是而學焉則庶乎其不差矣大學之道在明明德在親民在止於至善程子曰親當作新大學者大人之學也明明之也明德者人之所得乎天而虛靈不昧以具衆理而應萬事者也但為氣禀所拘人欲所蔽則有時而昬然其本體之明則有未嘗息者故學者當因其所𤼵而遂明之以復其初也新者革其舊之謂也言既自明其明德又當推以及人使之亦有以去上聲其舊染之汚音烏也止者必至於是而不遷之意至善則事理當然之極也言明明德新民皆當止於至善之地而不遷蓋必其有以盡夫音扶天理之極而無一毫人欲之私也此三者大學之綱領也知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得止者所當止之地即至善之所在也知之則志有定向靜謂心不妄動安謂所處上聲下同而安慮謂處事精詳得謂得其所止物有本末事有終始知所先後則近道矣明德為本新民為末知止為始能得為終本始所先末終所後此結上文兩節之意古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物治平聲後倣此明明德於天下者使天下之人皆有以明其明德也心者身之所主也誠實也意者心之所𤼵也實其心之所發欲其必自慊而無自欺也致推極也知猶識也推極吾之知識欲其所知無不盡也格至也物猶事也窮至事物之理欲其極處無不到也此八者大學之條目也物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而后天下平治去聲後倣此物格者物理之極處無不到也知至者吾心之所知無不盡也知既盡則意可得而實矣意既實則心可得而正矣修身以上上聲明明德之事也齊家以下新民之事也物格知至則知所止矣意誠以下則皆得所止之序也自天子以至於庶人壹是皆以修身為本壹是一切也正心以上皆所以修身也齊家以下則舉此而錯音措之耳四字出祭義其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也本謂身也所厚謂家也此兩節結上文兩節之意右經一章蓋孔子之言而曾子述之其𫝊去聲下同十章則曾子之意而門人記之也舊本頗有錯簡今因程子所定而更考經文别為序次如左凡𫝊文雜引經𫝊若無統紀然文理接續血脈貫通深淺始終至為精密熟讀詳味久當見之今不盡釋也康誥曰克明德康誥周書克能也康誥本文云克明德慎罰此只取上三字下文引太甲顧諟天之明命亦去先王字皆引經之活法太甲曰顧諟天之明命大讀作泰諟古是字太甲商書顧謂常目在之也諟猶此也或曰審也天之明命即天之所以與我而我之所以為德者也常目在之則無時不明矣帝典曰克明峻德峻書作俊帝典堯典虞書峻大也皆自明也結所引書皆言自明已德之意右𫝊之首章釋明明德此通下三章至止於信舊本誤在沒世不忘之下湯之盤銘曰茍日新日日新又日新盤沐浴之盤也新定邵氏曰日日盥頮人所同也日日沐浴恐未必然内則篇記子事父母不過五日燂湯請浴三日具沐而已斯銘也其殆刻之盥頮之盤歟銘名其器以自警之辭也盤銘惟見於此名者書之名即此九字之名也如苟字從艹從句則書也喚為苟字則名也苟誠也論語苟至於仁苟亦訓誠湯以人之洗濯其心以去上聲下同惡如沐浴其身以去垢故銘其盤言誠能一日有以滌其舊染之汚而自新則當因其已新者而日日新之又日新之不可略有間去聲斷徒玩反也康誥曰作新民鼔之舞之之謂作易繫辭鼔之舞之以盡神摘此四字言振起其自新之民也詩曰周雖舊邦其命維新詩大雅文王之篇言周國雖舊至於文王能新其德以及於民而始受天命也是故君子無所不用其極自新新民皆欲止於至善也右𫝊之二章釋新民詩云邦畿千里惟民所止詩商頌𤣥鳥之篇邦畿王者之都也畿方千里王者所自治王制云四海之内九州州方千里而畿居其一也止居也言物各有所當止之處也詩云緡蠻黄鳥止于丘隅子曰於止知其所止可以人而不如鳥乎緡詩作緜詩小雅緡蠻之篇緡蠻鳥聲丘隅岑鋤林反蔚紆弗反之處子曰以下孔子說詩之辭言人當知所當止之處也詩云穆穆文王於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信於緝之於音烏詩文王之篇穆穆深逺之意於歎美辭緝繼續也熙光明也敬止言其無不敬而安所止也引此而言聖人之止無非至善五者乃其目之大者也學者於此究其精微之藴委粉於問二反而又推類以盡其餘則於天下之事皆有以知其所止而無疑矣詩云瞻彼淇澳菉竹猗猗有斐君子如切如磋如琢如磨瑟兮僴兮赫兮喧兮有斐君子終不可諠兮如切如磋者道學也如琢如磨者自修也瑟兮僴兮者恂慄也赫兮喧兮者威儀也有斐君子終不可諠兮者道盛德至善民之不能忘也澳於六反菉詩作緑猗叶韻音阿僴下版反喧詩作咺諠詩作諼並況晩反恂鄭氏讀作峻詩衞風淇澳之篇淇水名澳隈烏回反也猗猗美盛貌興去聲也斐文貌切以刀鋸居御反琢以椎直追反鑿皆裁物使成形質也磋以鑢音慮鐋他浪反磨以沙石皆治物使其滑澤也治骨角者既切而復扶又反下同磋之治玉石者既琢而復磨之皆言其治之有緒而益致其精也瑟嚴密之貌僴武毅之貌赫喧宣著盛大之貌諠忘也道言也學謂講習討論之事自修者省星上聲察克治之功恂慄戰懼也威可畏也儀可象也引詩而釋之疑非𫝊所釋爾雅訓釋篇已載其文而無者字以明明明德者之止於至善道學自修言其所以得之之由恂慄威儀言其德容表裏之盛卒乃指其實而歎美之也詩云於戲前王不忘君子賢其賢而親其親小人樂其樂而利其利此以没世不忘也於戲音烏呼樂音洛詩周頌烈文之篇於戲歎辭前王謂文武也君子謂其後賢後王小人謂後民也此言前王所以新民者止於至善能使天下後世無一物不得其所所以既沒世而人思慕之愈久而不忘也此兩節詠歎淫泆其味深長當熟玩之詠歎之淫泆之本樂記語右𫝊之三章釋止於至善此章内自引淇澳詩以下舊本誤在誠意章下子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本猶人不異於人也情實也引夫子之言而言聖人能使無實之人不敢盡其虛誕之辭蓋我之明德既明自然有以畏服民之心志故訟不待聽而自無也觀於此言可以知本末之先後矣右𫝊之四章釋本末此章舊本誤在止於信下此謂知本程子曰衍與羨同延面反文也此謂知之至也此句之上别有闕文此特其結語耳右𫝊之五章蓋釋格物致知之義而今亡矣此章舊本通下章誤在經文之下間如字嘗竊取程子之意以補之曰所謂致知在格物者言欲致吾之知在即物而窮其理也葢人心之靈莫不有知而天下之物莫不有理惟於理有未窮故其知有不盡也是以大學始教必使學者即凡天下之物莫不因其已知之理而益窮之以求至乎其極至於用力之久而一旦豁然貫通焉則衆物之表裏精粗無不到而吾心之全體大用無不明矣此謂物格此謂知之至也所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙故君子必慎其獨也好惡上字皆去聲謙讀為慊苦刼反誠其意者自修之首也毋者禁止之辭自欺云者知為善以去上聲下同惡而心之所𤼵有未實也謙快也足也獨者人所不知而已所獨知之地也言欲自修者知為善以去其惡則當實用其力而禁止其自欺使其惡惡則如惡惡臭好善則如好好色皆務決去而求必得之以自快足於已不可徒茍且以徇外而為去聲人也然其實與不實蓋有他人所不及知而已獨知之者故必謹之於此以審其幾平聲焉小人閒居為不善無所不至見君子而后厭然揜其不善而著其善人之視己如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也閒音閑厭鄭氏讀為黶於簡反閒居獨處去聲也厭然消沮上聲閉藏之貌此言小人隂為不善而陽欲揜之則是非不知善之當為與惡之當去上聲也但不能實用其力以至此耳然欲揜其惡而卒不可揜欲詐為善而卒不可詐則亦何益之有哉此君子所以重去聲以為戒而必謹其獨也曾子曰十目所視十手所指其嚴乎引此以明上文之意言雖幽獨之中而其善惡之不可揜如此可畏之甚也富潤屋德潤身心廣體胖故君子必誠其意胖步丹反胖安舒也言富則能潤屋矣德則能潤身矣故心無愧怍則廣大寛平而體常舒泰德之潤身者然也蓋善之實於中而形於外者如此故又言此以結之右𫝊之六章釋誠意經曰欲誠其意先致其知又曰知至而后意誠蓋心體之明有所未盡則其所發必有不能實用其力而苟焉以自欺者然或已明而不謹乎此則其所明又非已有而無以為進德之基故此章之指必承上章而通考之然後有以見其用力之始終其序不可亂而功不可闕如此云所謂修身在正其心者身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正忿弗粉反懥勑值反好樂並去聲程子曰身有之身當作心忿懥廣韻玉篇並陟利反怒也蓋是四者皆心之用而人所不能無者然一有之而不能察則欲動情勝而其用之所行或不能不失其正矣心不在焉視而不見聽而不聞食而不知其味心有不存則無以檢其身是以君子必察乎此而敬以直之然後此心常存而身無不修也此謂修身在正其心右𫝊之七章釋正心修身此亦承上章以起下章蓋意誠則真無惡而實有善矣所以能存是心以檢其身然或伹知誠意而不能密察此心之存否則又無以直内而修身也自此以下並以舊文為正所謂齊其家在修其身者人之其所親愛而辟焉之其所賤惡而辟焉之其所畏敬而辟焉之其所哀矜而辟焉之其所敖惰而辟焉故好而知其惡惡而知其美者天下鮮矣辟讀為僻惡而之惡敖好並去聲鮮上聲人謂衆人之猶於也辟猶偏也五者在人本有當然之則然常人之情惟其所向而不加察焉則必陷於一偏而身不修矣故諺有之曰人莫知其子之惡莫知其苗之碩諺音彦碩叶韻時若反諺俗語也溺愛者不明貪得者無厭平聲是則偏之為害而家之所以不齊也此謂身不修不可以齊其家右𫝊之八章釋修身齊家所謂治國必先齊其家者其家不可敎而能敎人者無之故君子不出家而成敎於國孝者所以事君也弟者所以事長也慈者所以使衆也弟去聲長上聲身修則家可敎矣孝弟慈所以修身而教於家者也然而國之所以事君事長使衆之道不外乎此此所以家齊於上而敎成於下也康誥曰如保赤子心誠求之雖不中不逺矣未有學養子而后嫁者也中去聲此引書而釋之又明立敎之本不假强上聲為在識其端而推廣之耳一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨事一人定國僨音奮一人謂君也機發動所由也僨覆敗也左隱三年鄭伯之車僨於濟此言敎成於國之效堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之其所令反其所好而民不從是故君子有諸已而后求諸人無諸已而后非諸人所藏乎身不恕而能喻諸人者未之有也好去聲此又承上文一人定國而言有善於已然後可以責人之善無惡於已然後可以正人之惡皆推已以及人所謂恕也不如是則所令反其所好而民不從矣喻曉也故治國在齊其家通結上文詩云桃之夭夭其葉蓁蓁之子于歸宜其家人宜其家人而后可以敎國人夭平聲蓁音臻詩周南桃夭之篇夭夭少去聲好貌蓁蓁美盛貌興去聲也之子猶言是子此指女子之嫁者而言也婦人謂嫁曰歸宜猶善也詩云宜兄宜弟宜兄宜弟而后可以敎國人詩小雅蓼音六蕭篇詩云其儀不忒正是四國其為父子兄弟足法而后民法之也詩曹風鳲音尸鳩篇忒差也此謂治國在齊其家此三引詩皆以詠歎上文之事而又結之如此其味深長最宜潛玩右𫝊之九章釋齊家治國所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而民不倍是以君子有絜矩之道也長上聲弟去聲倍與背同絜胡結反老老所謂老吾老也興謂有所感𤼵而興起也孤者幼而無父之稱絜度待洛反下同也矩所以為方也言此三者上行下效捷疾業反於影響所謂家齊而國治也亦可以見人心之所同而不可使有一夫之不獲矣是以君子必當因其所同推以度物使彼我之閒各得分去聲願則上下四旁均齊方正而天下平矣所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂絜矩之道惡先並去聲此覆解上文絜矩二字之義如不欲上之無禮於我則必以此度下之心而亦不敢以此無禮使之不欲下之不忠於我則必以此度上之心而亦不敢以此不忠事之至於前後左右無不皆然則身之所處上聲上下四旁長短廣狹彼此如一而無不方矣彼同有是心而興起焉者又豈有一夫之不獲哉所操平聲者約而所及者廣此平天下之要道也故章内之意皆自此而推之詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母樂音洛只音紙好惡並去聲下並同詩小雅南山有臺之篇只語助辭言能絜矩而以民心為已心則是愛民如子而民愛之如父母矣詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不慎辟則為天下僇矣節讀為截辟讀為僻僇與戮同詩小雅節南山之篇節截然髙大貌師尹周太師尹氏也按詩傳尹氏葢吉甫之後周大夫家父作此詩以譏王之用尹氏也具俱也辟偏也言在上者人所瞻仰不可不謹若不能絜矩而好惡徇於一已之偏則身弑國亡為天下之大戮矣詩云殷之未喪師克配上帝儀監于殷峻命不易道得衆則得國失衆則失國喪去聲儀詩作宜峻詩作駿易去聲詩文王篇師衆也配對也配上帝言其為天下君而對乎上帝也監視也峻大也不易言難保也道言也引詩而言此以結上文兩節之意有天下者能存此心而不失則所以絜矩而與民同欲者自不能已矣是故君子先慎乎徳有德此有人有人此有土有土此有財有財此有用先謹乎德承上文不可不謹而言德即所謂明德有人謂得衆有土謂得國有國則不患無財用矣德者本也財者末也本上文而言外本内末爭民施奪人君以德為外以財為内則是爭鬭其民而施之以刼奪之敎也蓋財者人之所同欲不能絜矩而欲専之則民亦起而爭奪矣是故財聚則民散財散則民聚外本内末故財聚爭民施奪故民散反是則有德而有人矣是故言悖而出者亦悖而入貨悖而入者亦悖而出悖逆也此以言之出入明貨之出入也自先謹乎德以下至此又因財貨以明能絜矩與不能者之得失也康誥曰惟命不于常道善則得之不善則失之矣道言也因上文引文王詩之意而申言之其丁寧反覆之意益深切矣楚書曰楚國無以為寶惟善以為寶楚書楚語言不寶金玉而寶善人也國語楚語王孫圉聘於晉趙簡子問曰楚之白珩猶在乎其為寳也㡬何矣曰楚之所寳者曰觀射父能作訓辭以行事於諸侯使無以寡君為口寶又有左史倚相能通訓典以敘百物以朝夕獻善敗于寡君使無忘先王之業若諸侯之好幣具而導之以訓辭寡君其可以免罪於諸侯而國民保焉此楚國之寳也若夫白珩先王之玩也何寶之焉舅犯曰亡人無以為寶仁親以為寶舅犯晉文公舅狐偃字子犯亡人文公時為公子出亡在外也仁愛也事見檀弓禮記檀弓篇晉獻公之喪秦穆公使人弔公子重耳且曰寡人聞之亡國恒於斯得國恒於斯雖吾子儼然在憂服之中喪亦不可久也時亦不可失也以告舅犯舅犯曰孺子其辭焉喪人無寶仁親以為寶父死之謂何又因以為利而天下其孰能說之孺子其辭焉此兩節又明不外本而内末之意秦誓曰若有一个臣斷斷兮無他技其心休休焉其如有容焉人之有技若已有之人之彦聖其心好之不啻若自其口出寔能容之以能保我子孫黎民尚亦有利哉人之有技媢疾以惡之人之彦聖而違之俾不通寔不能容以不能保我子孫黎民亦曰殆哉个古賀反書作介㫁丁亂反媢音冐秦誓周書春秋傳僖三十三年秦穆公襲鄭晉襄公率師敗諸殽歸而作秦誓斷斷誠一之貌彦美士也聖通明也尚庶㡬平聲也媢忌也違拂戾也殆危也唯仁人放流之迸諸四夷不與同中國此謂唯仁人為能愛人能惡人迸讀為屏古字通用迸猶逐也言有此媢疾之人妨賢而病國則仁人必深惡而痛絶之以其至公無私故能得好惡之正如此也見賢而不能舉舉而不能先命也見不善而不能退退而不能逺過也逺去聲命鄭氏云當作慢程子云當作怠未詳孰是若此者知所愛惡矣而未能盡愛惡之道蓋君子而未仁者也好人之所惡惡人之所好是謂拂人之性菑必逮夫身菑古災字夫音扶拂逆也好善而惡惡人之性也至於拂人之性則不仁之甚者也自秦誓至此又皆以申言好惡公私之極以明上文所引南山有臺節南山之意是故君子有大道必忠信以得之驕泰以失之君子以位言之道謂居其位而修己治人之術𤼵已自盡為忠循物無違謂信驕者矜髙泰者侈肆此因上所引文王康誥之意而言章内三言得失而語益加切蓋至此而天理存亡之㡬平聲決矣生財有大道生之者衆食之者寡為之者疾用之者舒則財恒足矣恒胡登反吕氏名大臨字與叔藍田人曰國無遊民則生者衆矣朝音潮無幸位則食者寡矣不奪農時則為之疾矣量入為出則用之舒矣愚按此因有土有財而言以明足國之道在乎務本而節用非必外本内末而後財可聚也自此以至終篇皆一意也仁者以財𤼵身不仁者以身𤼵財𤼵猶起也仁者散財以得民不仁者亡身以殖丞職反貨未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也上好仁以愛其下則下好義以忠其上所以事必有終而府庫之財無悖出之患也孟獻子曰畜馬乗不察於雞豚伐冰之家不畜牛羊百乗之家不畜聚斂之臣與其有聚斂之臣寧有盜臣此謂國不以利為利以義為利也畜許六反乘斂並去聲孟獻子魯之賢大夫仲孫蔑也仲孫慶父之曾孫事成公襄公畜馬乘士初試為大夫者也伐冰之家卿大夫以上上聲喪祭用冰者也孔氏疏曰按書傳士飾車駢馬詩云四牡騑騑大夫以上乃得乘四馬今下云伐冰之家是卿大夫今别云畜馬乘故知士初試為大夫者也左昭四年大夫命婦喪浴用冰喪大記云士不用冰故知卿大夫也士若恩賜亦得用之但非其常故士喪禮賜冰則夷槃可也伐鑿取也周制仲春以後喪祭用冰秋涼則止金氏曰伐冰斬冰也然斬冰有國之事若卿大夫則受冰之家非斬冰也豈卿大夫之家喪祭則取冰於公故謂之伐與周禮天官凌人掌冰正歳十有二月令斬冰三其凌春始治鑑凡内外饔之膳羞鑑焉凡酒漿之酒醴亦如之祭祀共冰鑑賔客共冰大喪共夷槃冰凌冰室也鑑瓦盆之屬以盛冰置食物酒醴于中防餒敗也夷盤者實冰盤中置尸牀之下以寒尸也百乗之家有采地者也采音菜箋見論語千乗注君子寧亡己之財而不忍傷民之力故寧有盜臣而不畜聚斂之臣此謂以下釋獻子之言也長國家而務財用者必自小人矣彼為善之小人之使為國家菑害並至雖有善者亦無如之何矣此謂國不以利為利以義為利也長上聲彼為善之此句上下疑有闕文誤字自由也言由小人導之也此一節深明以利為利之害而重平聲言以結之其丁寧之意切矣右𫝊之十章釋治國平天下此章之義務在與民同好惡而不専其利皆推廣絜矩之意也能如是則親賢樂利各得其所而天下平矣凡𫝊十章前四章統論綱領㫖趣音娶後六章細論條目工夫其第五章乃明善之要第六章乃誠身之本在初學尤為當務之急讀者不可以其近而忽之也大學纂箋卷一
