body:
  text: 欽定四庫全書論語纂箋卷四元詹道傳撰述而第七此篇多記聖人謙己誨人之辭及其容貌行事之實凡三十七章子曰述而不作信而好古竊比於我老彭好去聲述傳舊而已作則創始也故作非聖人不能而述則賢者可及竊比尊之之辭我親之之辭老彭商賢大夫見大戴禮史記儒林傳戴徳事漢宣帝為信都大傅戴聖為九江太守趙宋韓元吉叙小戴云盖自漢興得先儒禮書凡二百四篇戴徳删之為八十五篇謂之大戴禮戴聖又删徳之書為四十九篇謂之小戴禮今立之學官者小戴書也戴禮虞徳篇夫子有昔商老彭之語包氏註云商賢大夫盖信古而𫝊述者也孔子删詩書定禮樂賛周易修春秋皆𫝊先王之舊而未嘗有所作也故其自言如此盖不惟不敢當作者之聖而亦不敢顯然自附於古之賢人盖其徳愈盛而心愈下不自知其辭之謙也然當是時作者略備夫子盖集羣聖之大成而折衷之其事雖述而功則倍於作矣此又不可不知也子曰黙而識之學而不厭誨人不倦何有於我哉識音志又如字識記也黙識謂不言而存諸心也一說識知也不言而心解也前說近是何有於我言何者能有於我也三者已非聖人之極至而猶不敢當則謙而又謙之辭也子曰徳之不修學之不講聞義不能徙不善不能改是吾憂也尹氏曰徳必修而後成學必講而後明見善能徙改過不吝此四者日新之要也苟未能之聖人猶憂况學者乎子之燕居申申如也夭夭如也燕居閒音閑暇無事之時楊氏曰申申其容舒也夭夭其色愉也程子曰此弟子善形容聖人處也為去聲申申字說不盡故更著陟略反作着非夭夭字今人燕居之時不怠惰放肆必太嚴厲嚴厲時著此四字不得怠惰放肆時亦著此四字不得惟聖人便自有中和之氣子曰甚失吾衰也乆矣吾不復夢見周公復扶又反孔子盛時志欲行周公之道故夢寐之閒如或見之至其老而不能行也則無復扶又反不同是心而亦無復是夢矣故因此而自數其衰之甚也程子曰孔子盛時寤寐常存行周公之道及其老也則志慮衰而不可以有為矣盖存道者心無老少去聲之異而行道者身老則衰也子曰志於道志者心之所之之謂道則人倫日用之間所當行者是也知此而心必之焉則所適者正而無他岐之惑矣據於徳據者執守之意徳則行道而有得於心者也得之於心而守之不失則終始惟一而有日新之功矣依於仁依者不違之謂仁則私欲盡去而心徳之全也工夫至此而無終食之違則存養之熟無適而非天理之流行矣游於藝游者玩物適情之謂藝則禮樂之文射御書數之法皆至理所寓而日用之不可闕者也朝夕游焉以博其義理之趣去聲則應務有餘而心亦無所放矣此章言人之為學當如是也盖學莫先於立志志道則心存於正而不他據徳則道得於心而不失依仁則徳性常用而物欲不行游藝則小物不遺而動息有養學者於此有以不失其先後之序輕重之倫焉則本末兼該内外交養日用之間無少閒去聲隙乞逆反而涵泳從七容反容忽不自知其入於聖賢之域矣子曰自行束脩以上吾未嘗無誨焉脩脯也十脡他鼎反為束儀禮脯一脡長尺有二寸禮記少儀壷酒束脩疏云束脩十脡脯也又周禮膳夫肉脩注疏加薑桂調治者謂之脩不加薑桂以鹽乾之謂之脯古者相見必執贄以為禮束脩至其薄者禮曲禮下凡摯與贄同天子鬯諸候圭卿羔大夫鴈士雉庶人之摯匹鄭音木匹即鶩也童子委摯而退不與成人為禮也野外軍中無摯以纓拾矢可也纓馬繁纓也拾射韝也婦人之摯椇榛脯脩棗栗胡氏曰在禮無以束脩為贄惟記檀弓曰束脩之問不出境少儀曰其以乘壺酒束脩一犬穀梁傳曰束脩之間不行境中則是亦有以此為禮不但婦人用脯脩為贄也然比羔鴈為薄故云至薄盖人之有生同具此理故聖人之於人無不欲其入於善但不知來學則無往教之禮故苟以禮來則無不有以教之也子曰不憤不啓不悱不發舉一隅不以三隅反則不復也憤房粉反悱芳匪反復扶又反憤者心求通而未得之意悱者口欲言而未能之貌啓謂開其意發謂逹其辭物之有四隅者舉一可知其三反者還以相證之義復再告也上章已言聖人誨人不倦之意因并去聲記此欲學者勉於用力以為受教之地也程子曰憤悱誠意之見賢徧反於色辭者也待其誠至而後告之既告之又必待其自得乃復告爾又曰不待憤悱而發則知之不能堅固待其憤悱而後發則沛然矣子食於有喪者之側未嘗飽也臨喪哀不能甘也子於是日哭則不歌哭謂弔哭一日之内餘哀未忘自不能歌也謝氏曰學者於此二者可見聖人情性之正也能識聖人之情性然後可以學道子謂顔淵曰用之則行舎之則藏惟我與爾有是夫舎上聲夫音扶尹氏曰用舎無與音預於已行藏安於所遇命不足道也顔子幾平聲於聖人故亦能之子路曰子行三軍則誰與萬二千五百人為軍大國三軍周禮夏官司馬凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍將皆命卿尚書牧誓疏天子六軍出自六鄉大司徒凡起徒役母過家一人故一鄉有萬二千五百家出一軍子路見孔子獨美顔淵自負其勇意夫子若行三軍必與己同子曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也馮皮氷反好去聲暴虎徒搏馮河徒渉此八字爾雅訓釋文又小旻之詩曰不敢暴虎不敢馮河盖古有是語懼謂敬其事成謂成其謀言此皆以抑其勇而教之然行師之要實不外此子路盖不知也謝氏曰聖人於行藏之間無意無必其行非貪位其藏非獨善也若有欲心則不用而求行舎之而不藏矣是以惟顔子為可以與音預於此子路雖非有欲心者然未能無固必也至以行三軍為問則其論益卑矣夫子之言盖因其失而救之夫音扶不謀無成不懼必敗小事尚然而况於行三軍乎子曰富而可求也雖執鞭之士吾亦為之如不可求從吾所好好去聲執鞭賤者之事設言富若可求則雖身為賤役以求之亦所不辭然有命焉非求之可得也則安於義理而已矣何必徒取辱哉蘇氏曰聖人未嘗有意於求富也豈問其可不可哉為此語者特以明其决不可求爾楊氏曰君子非惡富貴而不求以其在天無可求之道也子之所慎齊戰疾齊側皆反齊之為言齊如字下同也将祭而齊其思慮之不齊者以交於神明也禮祭統及時将祭君子乃齊齊之為言齊也齊不齊以致齊者也誠之至與不至神之享與不享皆决於此戰則衆之死生國之存亡繫焉疾又吾身之所以死生存亡者皆不可以不謹也尹氏曰夫子無所不謹弟子記其大者耳子在齊聞韶三月不知肉味曰不圖為樂之至於斯也史記三月上有學之二字史云三家共攻昭公公居乾侯魯亂孔子適齊為高昭子家臣以通乎景公與齊大師語樂聞韶音學之三月不知肉味不知肉味盖心一於是而不及乎他也曰不意舜之作樂至於如此之美則其有以極其情文之備而不覺其歎息之深也盖非聖人不足以及此范氏曰韶盡美又盡善樂之無以加此也故學之三月不知肉味而歎美之如此誠之至感之深也冉有曰夫子為衛君乎子貢曰諾吾将問之為去聲為猶助也衛君出公輒也靈公逐其世子蒯苦怪反聵五怪反公薨而國人立蒯聵之子輒於是晉納蒯聵而輒拒之箋見十三篇衛君下時孔子居衛衛人以蒯聵得罪於父而輒嫡孫當立故冉有疑而問之諾應辭也入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也伯夷叔齊孤竹君之二子其父将死遺命立叔齊父卒叔齊遜伯夷伯夷曰父命也遂逃去叔齊亦不立而逃之國人立其中子其後武王伐紂夷齊扣馬而諫武王滅商夷齊恥食周粟去隐于首陽山遂餓而死史記武王載木主號為文王東伐紂伯夷叔齊扣馬而諫曰父死不葬爰及干戈可謂孝乎以臣弑君可謂仁乎左右欲兵之太公曰此義人也扶而去之武王已平殷亂天下宗周而伯夷叔齊恥之義不食周粟隐于首陽山即雷首山之陽在河中府河東縣采薇而食之遂餓而死怨猶悔也君子居是邦不非其大夫况其君乎荀子子道篇子路問曰魯大夫練而狀禮邪練小祥也孔子曰吾不知也子路出謂子貢曰吾以夫子為無所不知夫子徒有所不知由問魯大夫練而牀禮邪夫子曰吾不知也子貢曰吾将為汝問之問曰練而牀禮邪孔子曰非禮也子貢出謂子路曰夫子無所不知汝問非也禮居是邑不非其大夫故子貢不斥衛君而以夷齊為問夫子告之如此則其不為衛君可知矣盖伯夷以父命為尊叔齊以天倫為重其遜國也皆求所以合乎天理之正而即乎人心之安既而各得其志焉則視棄其國猶敝蹝所爾反爾何怨之有若衛輒之據國拒父而唯恐失之其不可同年而語明矣程子曰伯夷叔齊遜國而逃諫伐而餓終無怨悔夫子以為賢故知其不與輒也子曰飯疏食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲飯扶晩反食音嗣枕去聲樂音洛飯食之也疏食麤飯也聖人之心渾然天理雖處困極而樂亦無不在焉其視不義之富貴如浮雲之無有漠然無所動於其中也程子曰非樂疏食飲水也雖疏食飲水不能改其樂也不義之富貴視之輕如浮雲然又曰須知所樂者何事子曰加我數年五十以樂易可以無大過矣劉聘君見元城劉忠定公名安世字器之大名府元城人自言嘗讀他論金氏曰舊來經書無印本太學博士兼立諸家之本學者所在傳寫自五代唐明宗長興以來國子監始有版本然與開元本已微有不同開元本明皇所定有司所寫已與古文不同自來民間傳寫本猶有存者故劉忠定公尚得見他論加作假五十作卒盖加假聲相近而誤讀卒與五十字相似而誤分也愚按此章之言史記作假我數年若見我於易則彬彬矣加正作假而無五十字盖是時孔子年已幾七十矣五十字誤無疑也史記世家孔子自楚反衛年六十三乃魯哀公之六年也自衛反魯則哀公十一年孔子年已六十八矣註云學易時年已幾七十者此也又案世家云夫子晚而喜易作十翼謂上下彖上下象上下繫文言序卦說卦雜卦也讀易而韋編三絶曰假我數年若是則我於易彬彬矣金氏曰五十字當是吾字之誤學易則明乎吉凶消長之理進退存亡之道故可以無大過盖聖人深見易道之無窮而言此以教人使知其不可不學而又不可以易而學也子所雅言詩書執禮皆雅言也雅常也執守也詩以理情性書以道政事禮以謹節文皆切於日用之實故常言之禮獨言執者以人所執守而言非徒誦說而已也程子曰孔子雅素之言止於如此若性與天道則有不可得而聞者要在黙而識音式之也謝氏曰此因學易之語而類記之葉公問孔子於子路子路子路不對葉舒渉反葉公楚葉縣尹沈諸梁字子高僭稱公也葉公不知孔子必有非所問而問者故子路不對抑亦以聖人之徳實有未易去聲名言者與音余子曰女奚不曰其為人也發憤忘食樂以忘憂不知老之将至云爾未得則發憤而忘食已得則樂之而忘憂以是二者俛焉日有孳孳音兹而不知年數之不足但自言其好學之篤耳禮表記小雅曰髙山仰止景行行止子曰詩之好仁如此鄉道而行中道而廢忘身之老也不知年數之不足也俛焉日有孳孳斃而後己然深味之則見其全體至極純亦不己之妙有非聖人不能及者盖凡夫子之自言類如此學者宜致思焉子曰我非生而知之者好古敏以求之者也好去聲生而知之者氣質清明義理昭著不待學而知也敏速也謂汲汲也尹氏曰孔子以生知之聖每云好學者非惟勉人也盖生而可知者義理爾若夫音扶禮樂名物古今事變亦必待學而後有以驗其實也子不語怪力亂神怪異勇力悖音佩亂之事非理之正固聖人所不語鬼神造化之迹雖非不正然非窮理之至有未易去聲明者故亦不輕以語人也謝氏曰聖人語常而不語怪語徳而不語力語治去聲而不語亂語人而不語神子曰三人行必有我師焉擇其善者而從之其不善者而改之三人同行其一我也彼二人者一善一惡則我從其善而改其惡焉是二人者皆我師也尹氏曰見賢思齊見不賢而内自省則善惡皆我之師進善其有窮乎子曰天生徳於予桓魋其如予何魋徒雷反桓魋宋司馬向式亮反魋也出於桓公故又稱桓氏宋世譜桓公子向氏向羅上距五世向羅子曰巢曰魋曰頎曰子車曰牛即司馬牛也魋欲害孔子孔子言天既賦我以如是之徳則桓魋其奈我何言必不能違天害已朱子或問史記孔子適宋與弟子習禮大樹之下魋伐其樹孔子去之弟子曰可以速矣子曰天生徳於予桓魋其如予何遂之鄭疑遭伐樹遂微服去之弟子欲其速行而以此語之也聖人雖知其不能害己然避患未嘗不深避患雖深而處之未嘗不閒睱所謂並行而不悖也子曰二三子以我為隠乎吾無隠乎爾吾無行而不與二三子者是丘也諸弟子以夫子之通高深不可幾平聲及故疑其有隐而不知聖人作止語黙無非教也故夫子以此言曉之與猶示也程子曰聖人之道猶天然門弟子親灸而冀及之然後知其高且逺也使誠以為不可及則趨向之心不幾於怠乎故聖人之教常俯而就之如此非獨使資質庸下者勉思企及而才氣高邁者亦不敢躐易去聲而進也吕氏曰聖人體道無隐與天象昭然莫非至教常以示人而人自不察子以四教文行忠信行去聲程子曰教人以學文修行而存忠信也忠信本也子曰聖人吾不得而見之矣得見君子者斯可矣聖人神明不測之號君子才徳出衆之名子曰善人吾不得而見之矣得見有恒者斯可矣恒胡登反子曰字疑衍文恒常久之意張子曰有恒者不二其心善人者志於仁而無惡亡而為有虚而為盈約而為泰難乎有恒矣亡讀為無三者皆虚夸之事凡若此者必不能守其常也張敬夫曰聖人君子以學言善人有恒者以質言愚謂有恒者之與聖人高下固懸絶矣然未有不自有恒而能至於聖者也故章末申言有恒之義其示人入徳之門可謂深切而著明矣子釣而不綱弋不射宿射食亦反綱以大繩屬音燭網絶流而漁者也弋以生絲繫矢而射也韻書繳射曰弋故孟子繳而射之集註亦云以繩繫矢繳韻弋箭著之以罥禽足謂之矰繳也宿宿鳥洪氏曰孔子少去聲貧賤為養並去聲與祭或不得已而釣弋如獵較音角是也見孟子然盡物取之出其不意亦不為也此可見仁人之本心矣待物如此待人可知小者如此大者可知子曰盖有不知而作之者我無是也多聞擇其善者而從之多見而識之知之次也識音志不知而作不知其理而妄作也孔子自言未嘗妄作盖亦謙辭然亦可見其無所不知也識記也所從不可不擇記則善惡皆當存之以備參考如此者雖未能實知其理亦可以次於知之者也互鄉難與言童子見門人惑見賢徧反互鄉鄉名其人習於不善難與言善惑者疑夫子不當見之也子曰與其進也不與其退也唯何甚人潔已以進與其潔也不保其往也疑此章有錯簡人潔至往也十四字當在與其進也之前潔修治也與許也往前日也言人潔已而來但許其能自潔耳固不能保其前日所為之善惡也但許其進而來見耳非許其既退而為不善也盖不追其既往不逆其將來以是心至斯受之耳唯字上下疑又有闕文大抵亦不為己甚之意程子曰聖人待物之洪如此子曰仁逺乎哉我欲仁斯仁至矣仁者心之徳非在外也放而不求故有以為逺者反而求之則即此而在矣夫音扶豈逺哉程子曰為仁由已欲之則至何逺之有陳司敗問昭公知禮乎孔子曰知禮陳國名司敗官名即司宼也左傳註陳楚名司寇為司敗程氏職書未見陳之司敗若楚之司敗見於文十年宣四年昭公魯君名稠音疇習於威儀之節當時以為知禮左昭五年公如晉自郊勞至於贈賄無失禮晉候謂女叔齊曰魯侯不亦善於禮乎對曰云云是儀也不可謂禮屑屑焉習儀以亟言善於禮不亦逺乎故司敗以為問而孔子答之如此孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君取於呉為同姓謂之呉孟子君而知禮孰不知禮取七住反巫馬姓期字孔子弟子名施魯人司敗揖而進之也相助匿非曰黨禮不取同姓而魯與呉皆姫姓謂之呉孟子者諱之使若宋女子姓者然禮坊記取妻不取同姓以厚别也故買妾不知其姓則卜之以此防民魯春秋猶去夫人之姓曰呉其死曰孟子卒叢說古者婦人皆以其姓在下而以孟仲之次加之如春秋所書仲子伯姬孟姜之類是也春秋之時同姓之國雖多昬姻之道皆不通呉之祖太伯為太王長子魯之祖周公為太王之孫昭公娶同姓與禽獸何異却諱而字之曰孟子巫馬期以告子曰丘也幸苟有過人必知之孔子不可自謂諱君之惡又不可以取同姓為知禮故受以為過而不辭呉氏曰魯盖夫子父母之國昭公魯之先君也司敗又未嘗顯言其事而遽以知禮為問其對之宜如此也及司敗以為有黨而夫子受以為過盖夫子之盛徳無所不可也然其受以為過也亦不正言其所以過初若不知孟子之事者可以為萬世之法矣子與人歌而善必使反之而後和之和去聲反復音覆也必使復歌者欲得其詳而取其善也而後和之者喜得其詳而與其善也此見聖人氣象從七容反容誠意懇至而其謙遜審宻不掩人善又如此盖一事之微而衆善之集有不可勝既者焉讀者冝詳味之子曰文莫吾猶人也躬行君子則吾未之有得莫疑辭猶人言不能過人而尚可以及人未之有得則全未有得皆自謙之辭而足以見言行去聲之難易去聲緩急欲人之勉其實也謝氏曰文雖聖人無不與人同故不遜能躬行君子斯可以入聖故不居猶言君子道者三我無能焉子曰若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣公西華曰正惟弟子不能學也此亦夫子之謙辭也聖者大而化之仁則心徳之全而人道之備也為之謂為仁聖之道誨人亦謂此以教人也然不厭不倦非己有之則不能所以弟子不能學也晁音潮氏曰名說之字以道清豊人當時有稱夫子聖且仁者以故夫子辭之苟辭之而已焉則無以進天下之材率天下之善将使聖與仁為虚器而人終莫能至矣故孔子雖不居仁聖而必以為之不厭誨人不倦自處去聲也可謂云爾已矣者無他之辭也公西華仰而歎之其亦深知夫子之意矣子疾病子路請禱子曰有諸子路對曰有之誅曰禱爾于上下神祗子曰丘之禱久矣誄力軓反禱謂禱於鬼神有諸問有此理否誄者哀死而述其行去聲下素行同之辭也毛晃韻讄字註與誄同古者卿大夫殁則君命有司累其功徳有文以哀之曰讄周禮小史掌讀誄是也此引古人誄辭以明疾病有祈禱之事非以誄為禱也上下謂天地天曰神地曰祗禱者誨過遷善以祈神之佑也無其理則不必禱既曰有之則聖人未嘗有過無善可遷其素行固已合於神明故曰丘之禱久矣又士喪禮疾病行禱五祀出儀禮第十三篇註云謂門戸竈行中霤盡孝子之情五祀博言之士二祀曰門曰行盖臣子廹切之至情有不能自已者初不請於病者而後禱也故孔子之於子路不直拒之而但告以無所事禱之意子曰奢則不孫儉則固與其不孫也寜固孫去聲孫順也固陋也奢儉俱失中而奢之害大晁氏曰不得已而救時之弊也子曰君子坦蕩蕩小人長戚戚坦平也蕩蕩寛廣貌程子曰君子循理故常舒泰小人役於物故多憂戚程子曰君子坦蕩蕩心廣體胖子温而厲威而不猛㳟而安厲嚴肅也人之徳性本無不備而氣質所賦鮮上聲有不偏惟聖人全體渾然隂陽合徳故其中和之氣見賢徧反於容貌之間者如此門人熟察而詳記之亦可見其用心之宻矣抑非知去聲足以知聖人而善言徳行去聲者不能記故程子以為曽子之言學者所冝反復方服反而玩心也泰伯第八凡二十一章子曰泰伯其可謂至徳也已矣三以天下讓民無得而稱焉泰伯周大音泰王之長上聲下同子至徳謂徳之至極無以復扶又反加者也三讓謂固遜也或問古人辭讓以三為節一辭為禮辭再辭為固辭三辭為終辭記鄉飲酒云月者三日則成魄三月則成時是以禮有三讓無得而稱其遜隐微無迹可見也盖大王三子長泰伯次仲雍次季厯大王之時商道寖衰而周日彊大季厯又生子昌有聖徳大王因有翦商之志而泰伯不從大王遂欲𫝊位季厯以及昌泰伯知之即與仲雍逃之荆蠻於是大王乃立季厯𫝊國至昌而三分天下有其二是為文王文王崩子發立遂克商而有天下是為武王呉越春秋古公三子長曰太伯次曰仲雍一名虞仲少曰季厯季厯娶大任生子昌古公知昌聖欲傳國以及昌曰興王業者其在昌乎太伯仲雍望風知指古公病二人託名採藥於衡山遂之荆蠻斷髪文身為夷狄之服示不可用古公卒太伯仲雍歸赴喪畢還荆蠻國民君事之自號為勾吳吳言勾者夷之發聲史記呉世家太伯之奔荆蠻自號句呉荆蠻歸之千餘家立為呉太伯卒無子弟仲雍立至四世孫周章立武王克商求太伯仲雍之後時章已君呉因而封之夫音扶以泰伯之徳當商周之際固足以朝諸侯有天下矣乃棄不取而又泯其迹焉則其徳之至極為如何哉盖其心即夷齊扣馬之心而事之難處上聲有甚焉者宜夫子之歎息而賛美之也泰伯不從事見春秋傳左傳僖公五年宫之竒曰泰伯虞仲大王之昭也泰伯不從是以不嗣子曰㳟而無禮則勞慎而無禮則葸勇而無禮則亂直而無禮則絞葸絲里反絞古卯反葸畏懼貌絞急切也無禮則無節文故有四者之弊君子篤於親則民興於仁故舊不遺則民不偷君子謂在上之人也興起也偷薄也張子曰人道知所先後則㳟不勞慎不葸勇不亂直不絞民化而徳厚矣呉氏曰君子以下當自為一章乃曽子之言也愚按比一節與上文不相蒙而與首篇謹終追逺之意相類呉說近是曽子有疾召門弟子曰啓予足啓予手詩云戰戰兢兢如臨深淵如履薄氷而今而後吾知免夫小子夫音扶啓開也曽子平日以為身體受於父母不敢毁傷故於此使弟子開其衾而視之詩小旻之篇戰戰恐懼兢兢戒謹臨淵恐墜履氷恐䧟也曽子以其所保之全示門人而言其所以保之之難如此至於将死而後知其得免於毁傷也小子門人也語畢而又呼之以知反覆方服反丁寧之意其警之也深矣程子曰君子曰終小人曰死見記檀弓乃子張将死之言君子保其身以沒為去聲下聲是同終其事也故曽子以全歸為免矣尹氏曰父母全而生之子全而歸之曽子臨終而啓手足為是故也非有得於道能如是乎記祭義樂正子春曰吾聞諸曽子曽子聞諸夫子曰父母全而生之子全而歸之可謂孝矣不虧其體不辱其親可謂全矣范氏曰身體猶不可虧也况虧其行去聲以辱其親乎曽子有疾孟敬子問之孟敬子魯大夫仲孫氏名捷問之者問其疾也曽子言曰鳥之将死其鳴也哀人之将死其言也然言自言也鳥畏死故鳴哀人窮反本故言善此曽子之謙辭欲敬子知其所言之善而識音志之也君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣籩豆之事則有司存逺近皆去聲貴猶重也容貌舉一身而言暴粗厲也慢放肆也信實也正顔色而近信則非色莊也辭言語氣聲氣也鄙凡陋也倍與背同倍背並音佩謂背理也籩竹豆豆木豆三禮圖説籩盛棗栗脩脯糗餌之屬豆盛菹醢之屬言道雖無所不在然君子所重者在此三事而已是皆修身之要為政之本學者所當操平聲存省悉井反察而不可有造七到反次顛沛之違者也若夫音扶籩豆之事器數之未道之全體固無不該然其分扶問反則有司之守而非君子之所重矣程子曰動容貌舉一身而言也周旋中去聲禮暴慢斯逺矣正顔色則不妄斯近信矣出辭氣正由中出斯逺鄙倍三者正身而不外求故曰籩豆之事則有司存尹氏曰養於中則見賢徧反於外曽子盖以脩已為為政之本若乃器用事物之細則有司存焉曽子曰以能問於不能以多問於寡有若無實若虚犯而不校昔者吾友嘗從事於斯矣校音教計校也友馬氏以為顔淵是也顔子之心惟知義理之無窮不見物我之有間去聲故能如此謝氏曰不知有餘在已不足在人不必得為在己失為在人非幾平聲於無我者不能也曽子曰可以託六尺之孤可以寄百里之命臨大節而不可奪也君子人與君子人也與平聲其才可以輔幼君鄭𤣥注年十五已下何晏曰鄭知六尺為十五者以周禮卿大夫職云國中自七尺以及六十野自六尺以及六十有五以其國中七尺為二十對六十野之六尺對六十五相校差五年差一尺而知也又韓氏外傳國中二十行役則七尺者二十也其升降皆五年則六尺者十五也攝國政其節至於死生之際而不可奪可謂君子矣與疑辭也决辭設為問答所以深著其必然也程子曰節操如是可謂君子矣曽子曰士不可以不𢎞毅任重而道逺𢎞寛廣也毅魚既反強忍也非𢎞不能勝平聲下同其重非毅無以致其逺仁以為己任不亦重乎死而後己不亦逺乎仁者人心之全徳而必欲以身體而力行之可謂重矣一息尚存此志不容少懈居隘反可謂逺矣程子曰𢎞而不毅則無規矩而難立毅而不𢎞則隘陋而無以居之又曰𢎞大剛毅然後能勝重任而逺到子曰興於詩興起也詩本性情有邪有正其為言既易去聲下同知而吟詠之間抑揚反覆其感人又易入故學者之初所以興起其好去聲善惡惡之心而不能自已者必於此而得之立於禮禮以㳟敬辭遜為本而有節文度數之詳可以固人肌膚之㑹筋骸音斤諧之束出記禮運故學者之中所以能卓然自立而不為事物之所摇奪者必於此而得之成於樂樂有五聲十二律更平聲唱迭和去聲以為歌舞八音之節前漢志聲宫商角徵羽也晉志土音宫其數八十一為聲之始屬土者以其最濁君之象也火音徵三分宫去一以生其數五十四屬火者以其徵清事之象也金音商三分徵益一以生其數七十二屬金者以其濁次宫臣之象也水音羽三分商去一以生其數四十八屬水者以其最清物之象也木音角三分羽益一以生其數六十四屬木者以其清濁中民之象也凡聲尊卑取象五行數多者濁數少者清大不過宫細不過羽漢志律有十二陽律為律隂律為吕律以統氣類物曰黄鍾太蔟姑洗蕤賔夷則無射吕以旅陽宣氣曰林鍾南吕應鍾大吕夾鍾中吕皆曰律陽統隂也叢說詳註意即禮運五聲六律十二管還相為宫是也語録云謂如黄鍾為宫大蔟為商姑洗為角林鍾為徴南吕為羽還至無射為宫便是黄鍾為商大蔟為角仲吕為徵林鍾為羽盖五音十二律皆上下相生聲始於宫律始於黄鍾宫即黄鍾也其法皆三分去一益一上下隔八相生宫之數八十一三分去一下生徴為五十四徵三分益一上生商為七十二商三分去一下生羽為四十八羽三分益一上生角為六十四而五聲備矣黄鍾之管九寸三分去一下生林鍾林鍾三分益一上生太蔟太蔟下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生㽔賔㽔賔下生大吕大吕上生夷則夷則下生夾鍾夾鍾上生無射無射下生中吕而終焉前所謂黄鍾為宫至南吕為羽五節是從宫商角徵羽順數其實於黄鍾生林鍾太蔟南吕姑洗依前五聲次第生去也第二無射為宫至林鍾為羽亦然所謂更唱是十二律皆可為宫所謂迭和十二律皆可為徵商羽角相繼和去金氏曰黄鍾為律元三分損一下生吕吕三分益一上生律是為十二律語錄云毎聲分為十二等此即禮運疏十二宫各有五聲共六十律也又國語有七聲者乃益以變宫變徵乃樂之和而聲相連接處兼前共八十四調歌者樂章之音調作樂則以人聲為貴也舞者以樂音之輕重疾徐為舞節以象其形容也八音白虎通曰金石絲竹匏土革木也金大鍾編鍾石玉磬特磬編磬也絲琴瑟也竹簫管也匏笙也土塤也革鼔鼗鼙也木柷敔也謂以十二律叶五聲而押詩歌以入八音之器為樂也可以養人之性情而蕩滌其邪穢消融其查滓壯里反故學者之終所以至於義精仁熟而自和順於道徳者必於此而得之是學之成也按内則十歳學幼儀十三學樂誦詩二十而後學禮則此三者非小學𫝊授之次乃大學終身所得之難易去斚下同先後淺深也程子曰天下之英才不為少矣特以道學不明故不得有所成就夫音扶古人之詩如今之歌曲雖閭里童稚皆習聞之而知其說故能興起今雖老師宿儒尚不能曉其義况學者乎是不得興於詩也古人自洒掃並去聲應對以至冠去聲昬喪祭莫不有禮今皆廢壞是以人倫不明治家無法是不得立於禮也古人之樂聲音所以養其耳采色所以養其目歌詠所以養其性情舞蹈所以養其血脈今皆無之是不得成於學也是以古之成材也易今之成材也難子曰民可使由之不可使知之民可使之由於是理之當然而不能使之知其所以然也程子曰聖人設教非不欲人家喻而户曉也然不能使之知但能使之由之爾若曰聖人不使民知則是後世朝四暮三之術也豈聖人之心乎列子云宋有狙公者愛狙養之成羣将限其食先誑之曰與若芧朝三而暮四足乎衆狙皆起而怒俄而曰與若芧朝四而暮三足乎衆狙皆伏而喜物之以能鄙相籠皆猶此也釋文狙獼猴狙公養狙官芧橡子三四三升四升也又見荘子齊物篇子曰好勇疾貧亂也人而不仁疾之已甚亂也好去聲好勇而不安分去聲則必作亂惡不仁之人而使之無所容則必致亂二者之心善惡雖殊然其生亂則一也子曰如有周公之才之美使驕且吝其餘不足觀也已才美謂智能技藝之美驕矜夸吝鄙嗇也程子曰此甚言驕吝之不可也盖有周公之徳則自無驕吝若但有周公之才而驕吝焉亦不足觀矣又曰驕氣盈吝氣歉苦忝反愚謂驕吝雖有盈歉之殊然其勢常相因盖驕者吝之枝葉吝者驕之本根故嘗騐之天下之人未有驕而不吝吝而不驕者也子曰三年學不至於榖不易得也易去聲榖禄也至疑當作志為學之久而不求禄如此之人不易得也楊氏曰雖子張之賢猶以干禄為問况其下者乎然則三年學而不至於榖冝不易得也子曰篤信好學守死善道好去聲篤厚而力也不篤信則不能好學然篤信而不好學則所信或非其正不守死則不能以善其道然守死而不足以善其道則亦徒死而已盖守死者篤信之效善道者好學之功危邦不入亂邦不居天下有道則見無道則隐見賢徧反君子見危授命則仕危邦者無可去之義在外則不入可也亂邦未危而刑政紀剛紊音問矣故潔其身而去之天下舉一世而言無道則隐其身而不見賢徧反也此惟篤信好學守死善道者能之邦有道貧且賤焉恥也邦無道富且貴焉恥也世治去聲而無可行之道世亂而無能守之節碌碌音禄庸人不足以為士矣可恥之甚也晁氏曰有學有守而去就之義潔出處之分明然後為君子之全徳也子曰不在其位不謀其政程子曰不在其位則不任其事也若君大夫問而告者則有矣子曰師摯之始關雎之亂洋洋乎盈耳哉摯音至雎七余反師摯魯樂師名摯也亂樂之卒章也史記曰闗雎之亂以為風始詩之正風正雅周公所定樂歌之辭也按儀禮鄉飲酒禮工鼔瑟而歌鹿鳴四牡皇皇者華然後笙入堂下磬南北靣立樂南陔白華華黍又閒歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀乃合樂周南闗雎葛覃卷耳召南鵲巢采蘋采蘩合樂者謂堂上有歌瑟堂下有笙磬合奏此詩也邦國燕禮則不歌笙閒之後即合鄉樂周南召南闗雎鵲巢以下六詩鄉射禮則不歌不笙不閒惟合此六詩而已盖以二南者夫婦之道生民之本王化之端此六篇者其教化之原也故用之鄉人用之邦國必以此而合樂焉此所謂亂也兹非樂之卒章乎而所謂闗雎之亂以為風始者闗雎為國風之始也洋洋美盛意孔子自衛反魯而正樂適師摯在官之初故學之美盛如此子曰狂而不直侗而不愿悾悾而不信吾不知之矣侗音通悾音空侗無知貌愿謹厚也悾悾無能貌吾不知之者甚絶之之辭亦不屑之教誨也蘇氏曰天之生物氣質不齊其中材以下有是徳則有是病有是病必有是徳故馬之蹄齧二字出周禮校人註蹄大計反齧倪結反者必善走其不善者必馴有是病而無是徳則天下之棄才也子曰學如不及猶恐失之言人之為學既如有所不及矣而其心猶竦然惟恐其或失之警學者當如是也程子曰學如不及猶恐失之不得放過才說姑待明日便不可也子曰巍巍乎舜禹之有天下也而不與焉與去聲巍巍高大之貌不與猶言不相闗言其不以位為樂也子曰大哉堯之為君也巍巍乎唯天為大唯堯則之蕩蕩乎民無能名焉唯猶獨也則猶準也蕩蕩廣逺之稱也言物之高大莫有過於天者而獨堯之徳能與之準故其徳之廣逺亦如天之不可以言語形容也巍巍乎其有成功也煥乎其有文章成功事業也煥光明之貌文章禮樂法度也堯之徳不可名其可見者此爾尹氏曰天道之大無為而成唯堯則之以治天下故民無得而名焉所可名者其功業文章巍然煥然而已舜有臣五人而天下治治去聲五人禹稷契私列反臯陶音遥伯益邢昺疏稷契皆帝嚳子臯陶字廷堅顓頊之子伯益皐陶子武王曰予有亂臣十人書泰誓之辭馬氏曰亂治也十人謂周公旦召實照反公奭施隻反太公望畢公榮公太顛閎夭於沼反散上聲冝生南宫适其一人謂文母此馬融說文徳之母文王妃太姒也從文王諡劉侍讀以為子無臣母之義盖邑姜也左昭元年當武王邑姜方震太叔註邑姜武王后太公女姜姓又見昭十年註九人治外邑姜治内或曰亂本作乿古治字也孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已稱孔子者上係武王君臣之際記者謹之才難盖古語而孔子然之也才者徳之用也唐虞堯舜有天下之號際交㑹之閒言周室人才之多惟唐虞之際乃盛於此降自夏商皆不能及然猶但有此數人爾是才之難得也三分天下有其二以服事殷周之徳其可謂至徳也已矣春秋傳曰文王率商之畔國以事紂見襄四年盖天下歸文王者六洲荆梁雍去聲豫徐揚也惟青兖冀尚屬紂耳范氏曰文王之徳足以代商天與之人歸之乃不取而服事焉叢說禹貢五服服内地所封諸侯朝貢皆有時各依服數以事天子所以為至徳也孔子因武王之言而及文王之徳且與泰伯皆以至徳稱之其指微矣或曰冝斷音短三分以下别以孔子曰起之而自為一章子曰禹吾無閒然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫禹吾無閒然矣閒去聲菲音匪黻音弗洫呼域反閒罅虚訝反隙也謂指其罅隙而非議之也菲薄也致孝鬼神謂享祀豐潔衣服常服黻蔽膝也以韋為之語録韋熟皮也祭服謂之黻朝服謂之鞸何晏註曰黻其色皆赤尊卑以深淺為異天子純朱諸侯黄朱大夫赤冕冠也冕冠上板前低後高因俛以得名周禮司服云王之吉服祀旻天上帝則服大裘而冕祀五帝亦如之亨先王則衮冕亨先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕禹之黻冕則五冕皆是也皆祭服也溝洫田間水道以正疆界備旱療音老者也箋見孟子滕文公上或豐或儉各適其冝所以無罅隙之可議也故再言以深美之楊氏曰薄於自奉而所勤者民之事所致飾者宗廟朝音潮廷之禮所謂有天下而不與音預也夫音扶何閒然之有論語纂箋卷四
