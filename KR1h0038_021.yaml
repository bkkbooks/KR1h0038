body:
  text: 欽定四庫全書孟子纂箋卷七元詹道傳撰離婁上凡二十八章孟子曰離婁之明公輸子之巧不以規矩不能成方員師曠之聰不以六律不能正五音堯舜之道不以仁政不能平治天下離婁古之明目者趙岐注黃帝時人莊子黃帝亡其𤣥珠使離朱索之即離婁也公輸子名班魯之巧人也淮南子云楚王令公輸作雲梯之械設以攻宋墨子曰令公輸設攻臣請守之是公輸即魯班也或云魯昭公子規所以為員之器也矩所以為方之器也師曠晉之樂師知音者也六律截竹為筒音同隂陽各六以節五音之上下黃鍾大音泰蔟姑洗先上聲蕤儒追反賓夷則無射音亦為陽大吕夾鍾仲吕林鍾南吕應鍾為隂也前漢律歷志十二律黃帝之所作也黃帝使伶倫自大夏之西昆侖之隂取竹之解谷生其竅厚均者斷兩節間而吹之以為黃鍾之宫制十二筒以聽鳳之鳴其雄鳴為六雌鳴亦六比黃鍾之宫而皆可以生之是為律本律十有二陽六為律隂六為吕律以統氣類物一曰黃鍾二曰大蔟三曰姑洗四曰蕤賓五曰夷則六曰亡射吕以旅陽宣氣一曰林鍾二曰南吕三曰應鍾四曰大吕五曰夾鍾六曰仲吕有三統之義焉又箋見論語第八篇下五音同五音宫商角徴展里反羽也范氏曰此言治天下不可無法度仁政者治天下之法度也今有仁心仁聞而民不被其澤不可法於後世者不行先王之道也聞去聲仁心愛人之心也仁聞者有愛人之聲聞於人也先王之道仁政是也范氏曰齊宣王不忍一牛之死以羊易之可謂有仁心梁武帝終日一食蔬素宗廟以麵為犧牲斷都玩反死刑必為去聲之涕泣天下知其慈仁可謂有仁聞通鑑梁武帝天監十六年四月詔以宗廟用牲牢有纍冥道宜皆以麵為之於是朝野喧譁以為宗廟去牲乃是不復血食帝竟不從八座乃議以大脯代一元大武十月詔以宗廟猶用脯修更議代之於是以大餅代大脯其餘盡用蔬果自天監中用釋氏法長齊斷魚肉日止一食惟菜羮糲飯而已大同十一年上專精佛戒每斷重罪則終日不恱或謀反逆事覺亦泣而宥由是王侯益橫盜賊白晝殺人上深知其弊而溺於慈愛而不能禁也然而宣王之時齊國不治去聲武帝之末江南大亂梁都建康故曰江南梁太清元年東魏太傅侯景以十三州內附上以景為大將軍封河南王太清二年景反於壽陽圍臺城太清三年景入建康縱兵大掠乘輿服御宫人皆盡上為景所制五月丙辰遂殂其故何哉有仁心仁聞而不行先王之道故也故曰徒善不足以為政徒法不能以自行徒猶空也有其心無其政是謂徒善有其政無其心是謂徒法程子嘗言為政須要有綱紀文章謹權審量去聲讀法平價皆不可闕而又曰必有關雎麟趾之意然後可以行周官之法度正謂此也詩云不愆不忘率由舊章遵先王之法而過者未之有也詩大雅假詩傳讀作嘉樂音洛之篇愆過也率循也章典法也所行不過差不遺忘者以其循用舊典故也聖人既竭目力焉繼之以規矩準繩以為方員平直不可勝用也既竭耳力焉繼之以六律正五音不可勝用也既竭心思焉繼之以不忍人之政而仁覆天下矣勝平聲準所以為平繩所以為直覆敷救反被去聲也此言古之聖人既竭耳目心思之力然猶以為未足以遍天下及後世故制為法度以繼續之則其用不窮而仁之所被者廣矣故曰為高必因丘陵為下必因川澤為政不因先王之道可謂智乎丘陵本高川澤本下為高下者因之則用力少而成功多矣二句乃禮器之言所以有故曰二字鄒氏曰自章首至此論以仁心仁聞行先王之道是以惟仁者宜在高位不仁而在高位是播其惡於衆也仁者有仁心仁聞而能擴而充之以行先王之道者也播惡於衆謂貽患於下也上無道揆也下無法守也朝不信道工不信度君子犯義小人犯刑國之所存者幸也朝音潮此言不仁而在高位之禍也道義理也揆度音鐸下度量之度同也法制度也道揆謂以義理度量事物而制其宜法守謂以法度自守工官也度即法也君子小人以位而言也由上無道揆故下無法守無道揆則朝不信道而君子犯義無法守則工不信度而小人犯刑有此六者其國必亡其不亡者僥幸而已故曰城郭不完兵甲不多非國之災也田野不闢貨財不聚非國之害也上無禮下無學賊民興喪無日矣辟與闢同喪去聲上不知禮則無以教民下不知學則易去聲與為亂鄒氏曰自是以惟仁者至此所以責其君詩曰天之方蹶無然泄泄蹶居衛反泄弋制反詩大雅板之篇蹶顛覆之意泄泄怠緩恱從之貌言天欲顛覆周室羣臣無得泄泄然不急救正之泄泄猶沓沓也沓徒合反沓沓即泄泄之意蓋孟子時人語如此事君無義進退無禮言則非先王之道者猶沓沓也非詆典禮反毁也故曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊范氏曰人臣以難事責於君使其君為堯舜之君者尊君之大也開陳善道以禁閉君之邪心唯恐其君或陷於有過之地者敬君之至也謂其君不能行善道而不以告者賊害其君之甚也鄒氏曰自詩云天之方蹶至此所以責其臣鄒氏曰此章言為治者當有仁心仁聞以行先王之政而君臣又當各任其責也孟子曰規矩方員之至也聖人人倫之至也至極也人倫說見前篇規矩盡所以為方員之理猶聖人盡所以為人之道欲為君盡君道欲為臣盡臣道二者皆法堯舜而已矣不以舜之所以事堯事君不敬其君者也不以堯之所以治民治民賊其民者也法堯舜以盡君臣之道猶用規矩以盡方員之極此孟子所以道性善而稱堯舜也孔子曰道二仁與不仁而已矣法堯舜則盡君臣之道而仁矣不法堯舜則慢君賊民而不仁矣二端之外更無他道出乎此則入乎彼矣可不謹哉暴其民甚則身弒國亡不甚則身危國削名之曰幽厲雖孝子慈孫百世不能改也幽暗厲虐皆惡諡也按汲冢周書諡法解惟周公旦太公望開嗣王業建功於牧野終將葬乃制諡諡者行之迹也諡法壅遏不通幽蚤孤有位幽謂即位而卒者動祭亂常幽殺戮無辜厲苟得其實則雖有孝子慈孫愛其祖考之甚者亦不得廢公義而改之言不仁之禍必至於此可懼之甚也詩云殷鑒不逺在夏后之世此之謂也詩大雅蕩之篇言商紂之所當鑒者近在夏桀之世而孟子引之又欲後人以幽厲為鑒也孟子曰三代之得天下也以仁其失天下也以不仁三代謂夏商周也禹湯文武以仁得之桀紂幽厲以不仁失之國之所以廢興存亡者亦然國謂諸侯之國天子不仁不保四海諸侯不仁不保社稷卿大夫不仁不保宗廟士庶人不仁不保四體言必死亡今惡死亡而樂不仁是猶惡醉而強酒惡去聲樂音洛强上聲此承上章之意而推言之也孟子曰愛人不親反其仁治人不治反其智禮人不答反其敬治人之治平聲不治之治去聲我愛人而人不親我則反求諸已恐我之仁未至也智敬放上聲此行有不得者皆反求諸已其身正而天下歸之不得謂不得其所欲如不親不治不答是也反求諸已謂反其仁反其智反其敬也如此則其自治益詳而身無不正矣天下歸之極言其效也詩云永言配命自求多福解見前篇亦承上章而言孟子曰人有恆言皆曰天下國家天下之本在國國之本在家家之本在身恆胡登反恆常也雖常言之而未必知其言之有序也故推言之而又以家本於身也此亦承上章而推言之大學所謂自天子至於庶人一是皆以修身為本為去聲是故也孟子曰為政不難不得罪於巨室巨室之所慕一國慕之一國之所慕天下慕之故沛然德教溢乎四海巨室世臣大家也得罪謂身不正而取怨怒也麥丘邑人祝齊桓公曰願主君無得罪於羣臣百姓意蓋如此出劉向新序雜事篇慕向也心恱誠服之謂也沛然盛大流行之貌溢充滿也蓋巨室之心難以力服而國人素所取信今既恱服則國人皆服而吾德教之所施可以無逺而不至矣此亦承上章而言蓋君子不患人心之不服而患吾身之不修吾身既修則人心之難服者先服而無一人之不服矣林氏曰戰國之世諸侯失德巨室擅權為患甚矣然或者不修其本而遽欲勝之則未必能勝而適以取禍故孟子推本而言惟務修德以服其心彼既恱服則吾之德教無所留磔牛代反可以及乎天下矣裴度所謂韓洪本名𢎞在宋避諱以洪字代之輿疾討賊承宗斂手削地非朝音潮廷之力能制其死命特以處上聲置得宜能服其心故爾政此類也通鑑唐憲宗元和四年成德節度使王士真薨其子承宗自立為留後上欲討之裴垍諫而止上密問諸學士曰今欲用王承宗為留後割其德棣二州更為一鎮以離其勢何如李絳曰德棣𨽻成德己久一旦割之恐承宗怨望得以為辭若因弔祭使至彼自以其意喻之令上表削地無令知出陛下意乃遣京兆尹袁武宣慰承宗受詔甚恭請獻德棣二州以明懇款元和十年加韓𢎞守司徒𢎞鎮宣武十餘年不入朝貢以兵力自負朝廷亦以不忠純待之十二年以韓𢎞為都統與裴度同討蔡十三年𢎞自將擊李師道圍曹州裴度上疏論皇甫鎛姦邪苛刻因論及此云云孟子曰天下有道小德役大德小賢役大賢天下無道小役大弱役强斯二者天也順天者存逆天者亡有道之世人皆修德而位必稱去聲其德之大小天下無道人不修德則但以力相役而已天者理勢之當然也齊景公曰既不能令又不受命是絶物也涕出而女於吳女去聲引此以言小役大弱役強之事也令出令以使人也受命聽命於人也物猶人也女以女如字與人也吳蠻夷之國也景公羞與為昏而畏其强故涕泣而以女與之吳都即今平江府浙西之地地理志平江舊有齊門按吳越春秋齊女質吳吳為太子聘之女少思齊而病闔閭為女起望齊門令女遊其上孟子所云即此也又按春秋傳襄二十四年晉平公亦嫁女於吳同姓也齊侯以女為媵此又可恥矣今也小國師大國而恥受命焉是猶弟子而恥受命於先師也言小國不修德以自強其般音盤樂音洛怠敖去聲皆若效大國之所為者而獨恥受其教命不可得也如恥之莫若師文王師文王大國五年小國七年必為政於天下矣此因其愧恥之心而勉以修德也文王之政布在方策舉而行之所謂師文王也五年七年以其所乘之勢不同為差楚宜反蓋天下雖無道然修德之至則道自我行而大國反為吾役矣程子曰五年七年聖人度待落反其時則可矣然凡此類學者皆當思其作為如何乃有益耳詩云商之孫子其麗不億上帝既命侯於周服侯服于周天命靡常殷士膚敏祼將于京孔子曰仁不可為衆也夫國君好仁天下無敵祼音灌夫音扶好去聲詩大雅文王之篇孟子引此詩及孔子之言以言文王之事麗數也十萬曰億侯維也助語辭商士商孫子之臣也詩傳云諸侯之大夫入天子之國曰某士則殷士者商孫子之臣屬也膚大也敏達也祼宗廟之祭以鬱紆勿反鬯丑亮反之酒灌地而降神也按周禮有秬鬯有鬱鬯以秬米為酒名秬鬯將祭則築鬱金香草煮之以和鬯酒名鬱鬯灌乃用之取其芳香旁達以降神鬯者以其調鬯也將助也言商之孫子衆多其數不但十萬而已上帝既命周以天下則凡此商之孫子皆臣服于周矣所以然者以天命不常歸於有德故也是以商士之膚大而敏達者皆執祼獻之禮助王祭事于周之京師也孔子因讀此詩而言有仁者則雖有十萬之衆不能當之故國君好仁則必無敵於天下也不可為衆猶所謂難為兄難為弟云爾通鑑漢桓帝時穎川陳實長子元方名紀次子季方名湛紀湛之子嘗問二父優劣於其祖太丘曰元方難為兄季方難為弟今也欲無敵於天下而不以仁是猶執熱而不以濯也詩云誰能執熱逝不以濯恥受命於大國是欲無敵於天下也乃師大國而不師文王是不以仁也詩大雅桑柔之篇逝語辭也言誰能執持熱物而不以水自濯其手乎此章言不能自强則聽天所命修德行仁則天命在我孟子曰不仁者可與言哉安其危而利其菑樂其所以亡者不仁而可與言則何亡國敗家之有菑與災同樂音洛矣其危利其菑者不知其為危菑而反以為安利也所以亡者謂荒淫暴虐所以致亡之道也不仁之人私欲固蔽失其本心故其顛倒錯亂至於如此所以不可告以忠言而卒至於敗亡也有孺子歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足浪音郎滄浪水名漢水東為滄浪之水見禹貢後魏酈道元云武當縣北四十里有洲曰滄浪洲水曰滄浪水是也纓冠系也孔子曰小子聽之清斯濯纓濁斯濯足矣自取之也言水之清濁有以自取之也聖人聲入心通無非至理此類可見夫人必自侮然後人侮之家必自毁而後人毁之國必自伐而後人伐之夫音扶所謂自取之者太甲曰天作孽猶可違自作孽不可活此之謂也解見前篇此章言心存則有以審夫音扶得失之幾平聲不存則無以辨於存亡之著禍福之來皆其自取孟子曰桀紂之失天下也失其民也失其民者失其心也得天下有道得其民斯得天下矣得其民有道得其心斯得民矣得其心有道所欲與之聚之所惡勿施爾也惡去聲民之所欲皆為去聲致之如聚斂然驗反力民之所惡則勿施於民鼂音潮錯倉故反所謂人情莫不欲壽三王生之而不傷人情莫不欲富三王厚之而不困人情莫不欲安三王扶之而不危人情莫不欲逸三王節其力而不盡此漢文十五年對賢良策語此類之謂也民之歸仁也猶水之就下獸之走壙也走音奏壙廣野也言民之所以歸乎此以其所欲之在乎此也故為淵驅魚者獺也為叢驅爵者鸇也為湯武驅民者桀與紂也為去聲驅與驅同獺音闥爵與雀同鸇諸延反淵深水也獺食魚者也叢茂林也鸇食雀者也言民之所以去此以其所欲在彼而所畏在此也今天下之君有好仁者則諸侯皆為之驅矣雖欲無王不可得已好為王皆去聲今之欲王者猶七年之病求三年之艾也苟為不畜終身不得苟不志於仁終身憂辱以陷於死亡王去聲艾草名所以灸者乾音干久益善夫音扶病已深而欲求乾久之艾固難卒倉沒反辦然自今畜之六敕反則猶或可及不然則病日益深死日益迫而艾終不可得矣詩云其何能淑載胥及溺此之謂也詩大雅桑柔之篇淑善也載則也胥相也言今之所為其何能善則相引以陷於亂亡而已孟子曰自暴者不可與有言也自棄者不可與有為也言非禮義謂之自暴也吾身不能居仁由義謂之自棄也暴猶害也非猶毁也自害其身者不知禮義之為美而非毁之雖與之言必不見信也自棄其身者猶知仁義之為美但溺於怠惰自謂必不能行與之有為必不能勉也程子曰人苟以善自治則無不可移者雖昏愚之至皆可漸子亷反磨而進也惟自暴者拒之以不信自棄者絶之以不為雖聖人與居不能化而入也此所謂下愚之不移也仁人之安宅也義人之正路也仁宅己見前篇義者宜也乃天理之當行無人欲之邪曲故曰正路曠安宅而弗居舍正路而不由哀哉舍上聲曠空也由行也此章言道本固有而人自絶之是可哀也此聖賢之深戒學者所當猛省悉井反也孟子曰道在爾而求諸逺事在易而求諸難人人親其親長其長而天下平邇爾古字通用易去聲長上聲親長在人為甚邇親之長之在人為甚易而道初不外是也舍上聲此而他求則逺且難而反失之但人人各親其親各長其長則天下自平矣孟子曰居下位而不獲於上民不可得而治也獲於上有道不信於友弗獲於上矣信於友有道事親弗恱弗信於友矣恱親有道反身不誠不恱於親矣誠身有道不明乎善不誠其身矣獲於上得其上之信任也誠實也反身不誠反求諸身而其所以為善之心有不實也不明乎善不能即事窮理無以真知善之所在也游氏曰欲誠其意先致其知不明乎善不誠其身矣學至於誠身則安往而不致其極哉以內則順乎親以外則信乎友以上則可以得君以下則可以得民矣是故誠者天之道也思誠者人之道也誠者理之在我者皆實而無僞天道之本然也思誠者欲此理之在我者皆實而無僞人道之當然也至誠而不動者未之有也不誠未有能動者也至極也楊氏曰動便是驗處若獲乎上信乎友恱於親之類是也此章述中庸孔子之言見思誠為修身之本而明善又為思誠之本乃子思所聞於曽子而孟子所受乎子思者亦與大學相表裏學者宜潛心焉孟子曰伯夷辟紂居北海之濱聞文王作興曰盍歸乎來吾聞西伯善養老者太公辟紂居東海之濱聞文王作興曰盍歸乎來吾聞西伯善養老者辟去聲作興皆起也盍何不也西伯即文王也紂命為西方諸侯之長上聲得專征伐故稱西伯太公姜姓吕氏名尚史記齊世家太公吕尚者東海人其先祖嘗為四嶽佐禹平水土甚有功虞夏之際封於吕姓姜氏尚其苗裔也本姓姜氏從其封姓故曰吕尚西伯出獵遇於渭之陽曰自吾先君太公望子久矣故號之曰太公望文王發政必先鰥寡孤獨庶人之老皆無凍餒故伯夷太公來就其養非求仕也二老者天下之大老也而歸之是天下之父歸之也天下之父歸之其子焉往焉於䖍反二老伯夷太公也大老言非常人之老者天下之父言齒德皆尊如衆父然既得其心則天下之心不能外矣蕭何所謂養民致賢以圖天下者其意暗與此合通鑑漢高帝元年項羽立沛公為漢王王巴蜀漢中都南鄭而分關中王秦降將章邯等三人以距漢路漢王怒欲攻羽蕭何諌曰雖王漢中之惡不猶愈於死乎能詘於一人之下而伸於萬乘之上者湯武是也臣願大王王漢中養其民以致賢人收用巴蜀還定三秦天下可圖也但其意則有公私之辨學者又不可不察也諸侯有行文王之政者七年之內必為政於天下矣七年以小國而言也大國五年在其中矣孟子曰求也為季氏宰無能改於其德而賦粟倍他日孔子曰求非我徒也小子鳴鼓而攻之可也求孔子弟子冉求季氏魯卿宰家臣賦猶取也取民之粟倍於他日也小子弟子也鳴鼓而攻之聲其罪而責之也由此觀之君不行仁政而富之皆棄於孔子者也況於為之强戰爭地以戰殺人盈野爭城以戰殺人盈城此所謂率土地而食人肉罪不容於死為去聲林氏曰富其君者奪民之財耳而夫子猶惡去聲之況為去聲土地之故而殺人使其肝腦塗地則是率土地而食人之肉其罪之大雖至於死猶不足以容之也故善戰者服上刑連諸侯者次之辟草萊任土地者次之辟與闢同善戰如孫臏音牝吳起之徒按史記孫臏與龎涓俱學兵法涓仕魏為將軍自以能不及臏乃召之至以法斷其兩足而黥之使終身廢棄齊使者至魏竊載以歸威王以為軍師魏遣龎涓伐韓齊以孫臏救之以計殺龎涓於馬陵又史記吳起衛人好用兵嘗學於曽子既逺遊母死不歸曽子薄之與起絶魏文侯用為將嘗曰將三軍使士卒樂死敵國不敢謀連結諸侯如蘇秦張儀之類史記蘇秦洛陽人張儀魏人俱事鬼谷先生學從橫之術游說七國蘇秦為從約長并相六國張儀相秦主橫主橫者皆欲諸侯割地以事秦主從者連諸侯以攻秦辟開墾口本反也任土地謂分土授民使任耕稼之責如李悝枯回反盡地力商鞅以兩切開阡陌之類也前漢食貨志戰國時李悝為魏文侯作盡地力之教以為地方百里提封九萬頃除山澤邑居參分去一為田六百萬畝治勤謹則畝益三升注與之三升也當言三斗不勤則損亦如之方百里之增減輒為粟百八十萬石矣又曰糴甚貴傷民甚賤傷農善為國者使民無傷而農益勸今一夫挾五口治田百畝歲收畝一石半為粟百五十石除什一之稅十五石餘百三十五石食人月一石半五人終嵗為粟九十石餘有四十五石石三十為錢千三百五十除社閭嘗新春秋之祠用錢三百餘千五十衣人率用錢三百五人終嵗用千五百不足四百五十不幸疾病死喪之費及上賦斂又未與此此農夫所以常困有不勸耕之心而令糴至於甚貴者也善平糴者必謹觀嵗上中下熟大熟則上糴三而舍一中熟則糴二下熟則糴一小饑則發小熟之所藏中饑則發中熟之所藏上饑則發上熟之所藏雖遇饑饉水旱糴不貴而民不散通鑑周顯王十九年秦商鞅并諸小鄉聚集為一縣縣置令丞廢井田開阡陌更為賦稅法行之注路南北曰阡東西曰陌孟子曰存乎人者莫良於眸子眸子不能掩其惡胸中正則眸子瞭焉胸中不正則眸子眊焉眸音牟瞭音了眊音耄良善也眸子目瞳子也瞭明也眊者蒙蒙目不明之貌蓋人與物接之時其人在目故胸中正則神精而明不正則神散而昏聽其言也觀其眸子人焉廋哉焉於䖍反廋音搜廋匿也言亦心之所發故并此以觀則人之邪正不可匿矣然言猶可以僞為眸子則有不容僞者孟子曰恭者不侮人儉者不奪人侮奪人之君惟恐不順焉惡得為恭儉恭儉豈可以聲音笑貌為哉惡平聲惟恐不順言恐人之不順己聲音笑貌僞為於外也淳于髠曰男女授受不親禮與孟子曰禮也曰嫂溺則援之以手乎曰嫂溺不援是豺狼也男女授受不親禮也嫂溺援之以手者權也與平聲援音爰淳于姓髠名齊之辨士史記滑稽傳云齊之贅壻也長不滿七尺滑稽多辨數使諸侯未嘗屈辱授與也受取也古禮男女不親授受以逺去聲别必列反也記內則男不言內女不言外非祭非喪不相授器其相授則女授以篚其無篚則皆坐奠之而後取之援救之也權稱去聲錘直垂反也稱平聲物輕重而往來以取中者也權而得中是乃禮也曰今天下溺矣夫子之不援何也言今天下大亂民遭陷溺亦當從權以援之不可守先王之正道也曰天下溺援之以道嫂溺援之以手子欲手援天下乎言天下溺惟道可以救與救同之非若嫂溺可手援也今子欲援天下乃欲使我枉道求合則先失其所以援之之具矣是欲使我以手援天下乎此章言直已守道所以濟時枉道徇人徒為失已公孫丑曰君子之不教子何也不親教也孟子曰勢不行也教者必以正以正不行繼之以怒繼之以怒則反夷矣夫子教我以正夫子未出於正也則是父子相夷也父子相夷則惡矣夷傷也教子者本為去聲愛其子也繼之以怒則反傷其子矣父既傷其子子之心又責其父曰夫子教我以正道而夫子之身未必自行正道則是子又傷其父也古者易子而教之易子而教所以全父子之恩而亦不失其為教父子之閒不責善責善則離離則不祥莫大焉責善朋友之道也王氏曰父有爭去聲下同子何也所謂爭者非責善也當不義則爭之而已矣父之於子也如何曰當不義則亦戒之而已矣孟子曰事孰為大事親為大守孰為大守身為大不失其身而能事其親者吾聞之矣失其身而能事其親者吾未之聞也守身持守其身使不陷於不義也一失其身則虧體辱親雖日用三牲之養去聲禮牛羊豕為三牲即太牢是也亦不足以為孝矣孰不為事事親事之本也孰不為守守身守之本也事親孝則忠可移於君順可移於長上聲身正則家齊國治去聲而天下平曽子養曽晳必有酒肉將徹必請所與問有餘必曰有曽晳死曽元養曽子必有酒肉將徹不請所與問有餘曰亡矣將以復進也此所謂養口體者也若曽子則可謂養志也養去聲復扶又反此承上文事親言之曽晳名㸃曽子父也曽元曽子子也曽子養其父每食必有酒肉食畢將徹去必請於父曰此餘者與誰或父問此物尚有餘否必曰有恐親意更欲與人也曽元不請所與雖有言無其意將以復進於親不欲其與人也此但能養父母之口體而已曽子則能承順父母之志而不忍傷之也事親若曽子者可也言當如曽子之養志不可如曽元但養口體程子曰子之身所能為者皆所當為無過分去聲之事也故事親若曽子可謂至矣而孟子止曰可也豈以曽子之孝為有餘哉孟子曰人不足與適也政不足閒也惟大人人為能格君心之非君仁莫不仁君義莫不義君正莫不正一正君而國定矣適音謫閒去聲趙氏曰適過也古注與詩室人交遍適我之適同閒非也格正也徐氏名度字孝節睢陽人曰格者物之所取正也書曰格其非心周書冏命篇愚謂閒字上亦當有與字言人君用人之非不足過謫與謫同行政之失不足非閒惟有大人之德則能格君心之不正以歸於正而國無不治去聲下同矣大人者大德之人正已而物正者也程氏曰天下之治亂繫乎人君之仁與不仁耳心之非即害於政不待乎發之於外也昔者孟子三見齊王而不言事門人疑之孟子曰我先攻其邪心見荀子大略篇心既正而後天下之事可從而理也夫音扶政事之失用人之非知去聲者能更平聲下同之直者能諫之然非心存焉則事事而更之後復扶又反下同有其事將不勝平聲下同其更矣人人而去上聲下同之後復用其人將不勝其去矣是以輔相去聲之職必在乎格君心之非然後無所不正而欲格君心之非者非有大人之德則亦莫之能也孟子曰有不虞之譽有求全之毁虞度待洛反也吕氏曰行去聲不足以致譽而偶得譽是謂不虞之譽求免於毁而反致毁是謂求全之毁言毁譽之言未必皆實修已者不可以是遽為憂喜觀人者不可以是輕為進退孟子曰人之易其言也無責耳矣易去聲人之所以輕易其言者以其未遭失言之責故耳蓋常人之情無所懲於前則無所警於後非以為君子之學必俟有責而後不敢易其言也然此豈亦有為去聲而言之與孟子曰人之患在好為人師好去聲王勉曰學問有餘人資於己不得已而應之可也若好為人師則自足而不復扶又反有進矣此人之大患也樂正子從於子敖之齊子敖音傲王歡字樂正子見孟子孟子曰子亦來見我乎曰先生何為出此言也曰子來幾日矣曰昔者曰昔者則我出此言也不亦宜乎曰舍館未定曰子聞之也舍館定然後求見長者乎長上聲昔者前日也館客舍也王歡孟子所不與言者則其人可知矣樂正子乃從之行其失身之罪大矣又不蚤見長者則其罪又有甚者焉故孟子姑以此責之曰克有罪陳氏曰樂正子固不能無罪矣然其勇於受責如此非好去聲善而篤信之其能若是乎世有強辨飾非聞諫愈甚者又樂正子之罪人也孟子謂樂正子曰子之從於子敖來徒餔啜也我不意子學古之道而以餔啜也餔博孤反啜昌恱反徒但也餔食也啜飲也言其不擇所從但求食耳此乃正其罪而切責之孟子曰不孝有三無後為大趙氏曰於禮有不孝者三事謂阿意曲從陷親不義一也家貧親老不為祿仕二也不娶無子絶先祖祀三也三者之中無後為大輔氏曰此必見於古傳記趙岐時其書尚存故引之今則不復存矣舜不告而娶為無後也君子以為猶告也為無之為去聲舜告焉則不得娶而終於無後矣告者禮也不告者權也猶告言與告同也蓋權而得中則不離去聲於正矣范氏曰天下之道有正有權正者萬世之常權者一時之用常道人皆可守權非體道者不能用也蓋權出於不得已者也若父非瞽瞍子非大舜而欲不告而娶則天下之罪人也孟子曰仁之實事親是也義之實從兄是也仁主於愛而愛莫切於事親義主於敬而敬莫先於從兄故仁義之道其用至廣而其實不越於事親從兄之閒蓋良心之發最為切近而精實者有子以孝弟為為仁之本其意亦猶此也智之實知斯二者弗去是也禮之實節文斯二者是也樂之實樂斯二者樂則生矣生則惡可已也惡可已則不知足之蹈之手之舞之樂斯樂則之樂音洛惡平聲斯二者指事親從兄而言知而弗去則見之明而守之固矣節文謂品節文章樂則生矣謂和順從七容反容無所勉強上聲事親從兄之意油然自生如草木之有生意也既有生意則其暢茂條達自有不可遏者所謂惡可已也其又盛則至於手舞足蹈而不自知矣此章言事親從兄良心真切天下之道皆原於此然必知之明而守之固然後節之密而樂之深也孟子曰天下大恱而將歸已視天下恱而歸已猶草芥也惟舜為然不得乎親不可以為人不順乎親不可以為子言舜視天下之歸已如草芥而惟欲得其親而順之也得者曲為承順以得其心之恱而已順則有以諭之於道心與之一而未始有違尤人所難也為人蓋泛言之為子則愈密矣舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下化瞽瞍底豫而天下之為父子者定此之謂大孝瞽瞍舜父名底致也豫恱樂音洛也瞽瞍至頑嘗欲殺舜至是而底豫焉書所謂不格姦亦允若是也書舜典瞽子父頑母嚚象傲克諧以孝蒸蒸又不格姦大禹謨祗載見瞽瞍夔夔齊栗瞽瞍亦允若蓋舜至此而有以順乎親矣是以天下之為子者知天下無不可事之親顧吾所以事之者未若舜耳於是莫不勉而為孝至於其親亦底豫焉則天下之為父者亦莫不慈所謂化也子孝父慈各止其所而無不安其位之意所謂定也為法於天下可傳於後世非止一身一家之孝而已此所以為大孝也李氏曰名侗字願中延平人曰舜之所以能使瞽瞍底豫者盡事親之道共音恭為子職不見父母之非而已昔羅仲素語此云只為去聲天下無不是底父母了翁聞而善之曰唯如此而後天下之為父子者定彼臣弒其君子弒其父者常始於見其有不是處耳仲素名從彥豫章人後居延平了翁姓陳名瓘字瑩中延平人孟子纂箋卷七
