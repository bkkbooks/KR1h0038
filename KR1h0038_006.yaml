body:
  text: 欽定四庫全書論語纂箋卷二元詹道𫝊撰八佾第三凡二十六章通前篇末二章皆論禮樂之事孔子謂季氏八佾舞於庭是可忍也孰不可忍也佾音逸季氏魯大夫季孫氏也佾舞列也天子八諸侯六大夫四士二毎佾人數如其佾數或曰毎佾八人未詳孰是左隐公五年九月考仲子之宫將萬焉公問羽數於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之杜注人如佾數然䟽引服䖍曰天子八八諸侯六八大夫四八士二八等殺甚明鄭伯納晉悼公其樂二八晉侯賞魏絳以一八之樂此其證也季氏以大夫而僭用天子之禮樂孔子言其此事尚忍為之則何事不可忍為或曰忍容忍也蓋深疾之之辭范氏曰樂舞之數自上而下降殺色界反以兩而已故兩之閒不可以毫髪僭差也孔子為政先正禮樂則季氏之罪不容誅矣謝氏曰君子於其所不當為不敢須㬰處上聲不忍故也而季氏忍此矣則雖弑父與君亦何所憚而不為乎三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂徹直列反相去聲三家魯大夫孟孫叔孫季孫之家也雍周頌篇名徹祭畢而收其俎也天子宗廟之祭則歌雍以徹是時三家僭而用之相助也辟公諸侯也穆穆深逺之意天子之容也此雍詩之辭孔子引之言三家之堂非有此事亦何取於此義而歌之乎譏其無知妄作以取僭竊之罪程子曰周公之功固大矣皆臣子之分去聲所當為魯安得獨用天子禮樂哉成王之賜伯禽之受皆非也禮記明堂位篇成王以周公有大勲勞於天下命魯公世世祀周公以天子之禮樂祭統云成王康王追念周公之所以勲勞者而欲尊魯故賜之以重祭外祭則郊社是也内祭則大嘗禘是也夫大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也馮氏曰吕不韋春秋記周自平王從魯恵之請以周公有大勲勞於天下命世世祀周公以天子之禮樂皮弁素積而舞大夏此八佾之舞也其後羣公之廟習而用之故子家駒謂昭公曰朱干玉戚以舞大武八佾以舞大夏此天子之禮也則魯以諸侯僭用天子之樂久矣大夫不得祖諸侯公廟之設於私家非禮也由三桓始也唯三家皆祖桓公而立廟故得以習用魯廟之禮樂而僭天子矣其因襲之弊遂使季氏僭八佾三家僭雍徹故仲尼譏之子曰人而不仁如禮何人而不仁如樂何游氏曰人而不仁則人心亡矣其如禮樂何哉言雖欲用之而禮樂不為之用也程子曰仁者天下之正理失正理則無序而不和李氏曰李氏名郁字光祖昭武人禮樂待人而後行苟非其人則雖玉帛交錯鐘鼓鏗丘耕反鏘千羊反亦將如之何哉然記者序此於八佾雍徹之後疑其為去聲僭禮樂者發也林放問禮之本林放魯人史記弟子傳不載禮殿圖有之見世之為禮者専事繁文而疑其本之不在是也故以為問子曰大哉問孔子以時方逐末而放獨有志於本故大其問蓋得其本則禮之全體無不在其中矣禮與其奢也寧儉喪與其易也寧戚易去聲易治也孟子曰易其田疇在喪禮則節文習熟而無哀痛慘怛當葛反之實者也戚則一於哀而文不足耳禮貴得中奢易則過於文儉戚則不及而質二者皆未合禮然凡物之理必先有質而後有文則質乃禮之本也范氏曰夫音扶祭與其敬不足而禮有餘也不若禮不足而敬有餘也喪與其哀不足而禮有餘也不若禮不足而哀有餘也語出禮記檀弓上禮失之奢喪失之易皆不能反本而隨其末故也禮奢而備不若儉而不備之愈也喪易而文不若戚而不文之愈也儉者物之質戚者心之誠故為禮之本楊氏曰禮始諸飲食故汙鳥𤓰反尊而抔蒲侯反飲為之簠簋音甫軌籩豆罍音雷爵之飾所以文之也則其本儉而巳記禮運篇云夫禮之初始諸飲食其燔黍捭豚汙尊而抔飲蕢桴而土鼓猶若可以致敬於鬼神注云古未有釡甑釋米捭肉加於燒石之上而食之耳汙尊鑿地為尊也抔飲手掬之也蕢讀為􅤓謂摶土為桴也土鼓築土為鼓也喪不可以徑情而直行如字為之衰音催麻哭音勇之數所以節之也則其本戚而已記檀弓下禮有微情者有以故興物者有直情而徑行者戎狄之道也周衰世方以文滅質而林放獨能問禮之本故夫子大之而告之以此子曰夷狄之有君不如諸夏之亡也吳氏曰亡古無字通用程子曰夷狄且有君長上聲不如諸夏之潛亂反無上下之分去聲也尹氏曰孔子傷時之亂而歎之也無非實無也雖有之不能盡其道爾季氏旅於泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曽謂泰山不如林放乎女音汝與平聲旅祭名泰山山名在魯地禮諸侯祭封内山川季氏祭之僭也記王制天子祭天地諸侯祭社稷大夫祭五祀天子祭天下名山大川五嶽視三公四凟視諸侯祭名山大川之在其地者冉有孔子弟子名求魯人時為季氏宰救謂救其陷於僭竊之罪嗚呼歎辭言神不享非禮欲季氏知其無益而自止又進林放以厲冉有也范氏曰冉有從季氏夫子豈不知其不可告也然而聖人不輕絶人盡己之心安知冉有之不能救季氏之不可諌也既不能正則羙林放以明泰山之不可誣是亦教誨之道也子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子飲去聲揖讓而升者大射之禮耦進三揖而後升堂也下而飲謂射畢揖降以俟衆耦皆降勝者乃揖不勝者升取觶音置立飲也按射之名有三大射賓射燕射侯之名亦有三皮侯采侯獸侯大射者王將有郊廟之事以射擇諸侯羣臣與邦國所貢之士諸侯則擇其臣大夫擇邑宰家臣其容節比於禮樂而多中者得與於祭否者不與故君子必習於射也其射以皮侯天子三侯虎侯豹侯熊侯各以其皮飾於侯之側而畫以五采雲氣而又各以其皮為鵠綴之中央似鳥之棲故謂之棲鵠虎侯王所自射凡六耦餘二侯諸侯與卿大夫士所射王射畢徹虎侯次諸侯次卿大夫若畿外諸侯則大侯糝侯豻侯大侯即熊侯也非畿内諸侯之比故加大以别之然止三耦畿内諸侯則但有熊侯豹侯而有四耦各一伸一屈畿外三侯逺尊得伸三耦則屈畿内二侯近尊則屈四耦則伸熊侯諸侯所自射豹侯卿大夫以下所射卿大夫大射麋侯君臣共射焉凡用虎熊豹麋之皮示服猛討迷之義惟士卑無臣故祭不得射也凡耦各服所宜服袒決遂而立堂下阼階東南隅西面射時耦同出次西面揖旋轉當阼階北面揖至階下北面揖然後升堂南面當序而立於物以射樂作射者欲其容體比於禮其節比於樂各發四矢以較勝負降如升射之儀復位而俟衆耦升射亦然畢司射命設豐於西楹勝者子弟洗觶酌酒奠於豐上勝者乃揖不勝者升堂勝者祖決遂執張弓不勝者襲脱決遂郤左手右加弛弓於其上如前三揖至階勝者先升堂少右不勝者至豐北面坐取觶立飲卒觶坐奠於豐上與揖不勝者先降凡飲酒賓主勸酬必拜以送爵今不勝者自飲而無送爵勸飮之意以是為罰言君子恭遜不與人爭惟於射而後有爭然其爭也雍容揖遜乃如此則其爭也君子而非若小人之爭矣子夏問曰巧笑倩兮羙目盼兮素以為絢兮何謂也倩七練反盼普莧反絢呼縣反此逸詩也倩好口輔也盼目黒白分也素粉地畫俗作畵之質也絢采色畫之飾也言人有此倩盼之羙質而又加以華采之飾如有素地而加采色也子夏疑其反謂以素為飾故問之子曰繪事後素繪胡對反繪事繪畫之事也後素後於素也考工記曰繪畫之事後素功周禮冬官考工記畫繢之事青與赤謂之文赤與白謂之章白與黒謂之黼黒與青謂之黻五采備謂之繡凡畫繢之事後素功謂先以粉地為質而後施五采猶人有羙質然後可加文飾曰禮後乎子曰起予者商也始可與言詩已矣禮必以忠信為質猶繪事必以粉素為先起猶發也起予言能起發我之志意謝氏曰子貢因論學而知詩子夏因論詩而知學故皆可與言詩楊氏曰甘受和去聲白受采忠信之人可以學禮苟無其質禮不虛行此繪事後素之説也記禮器曰甘受和白受采忠信之人可以學禮苟無忠信之人則禮不虚道道猶行也引此以解此章方可通不然禮後乎一句何以知忠信當先白受采可證繪事後素而忠信可學禮可解禮後乎其註首云禮必以忠信為質亦本禮器孔子曰繪事後素而子夏曰禮後乎可謂能繼其志矣學記曰善教者使人繼其志非得之言意之表者能之乎商賜可與言詩者以此若夫音扶玩心於章句之末則其為詩也固而已矣孟子曰固哉髙叟之為詩也所謂起予則亦相長上聲之義也學記曰教學相長也子曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也文獻不足故也足則吾能徴之矣把夏之後宋殷之後史記把世家東樓公者夏后禹之苗裔也武王封之杞把國名東樓公諡號也又宋世家微子開者殷帝乙之長子而紂之庶兄也武王封之宋微子名啓云開者避漢景帝諱徴知陵反證也文典籍也獻賢也言二代之禮我能言之而二國不足取以為證以其文獻不足故也文獻若足則我能取之以證吾言矣宋自微子至戴公凡十君其間禮樂廢壊正考父為孔子七世祖得商頌十二篇於周之太師至夫子删詩時僅存五篇可見典籍不足徴矣左禧二十七年把桓公朝用夷禮故經書子以貶之又可見賢者之不足徴子曰禘自旣灌而往者吾不欲觀之矣禘大計反趙伯循曰伯循名匡唐河東人禘王者之大祭也王者旣立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之也禮記大傳禮不王不禘王者禘其祖之所自出以其祖配之又喪服小記篇亦云成王以周公有大勲勞賜魯重祭見雍徹下故得禘於周公之廟以文王為所出之帝而周公配之然非禮矣灌者方祭之始用鬱紆勿反鬯丑亮反之酒灌地以降神也魯之君臣當此之時誠意未散猶有可觀自此以後則浸以懈居隘反怠而無足觀矣蓋魯祭非禮孔子本不欲觀至此而失禮之中又失禮焉故發此歎也謝氏曰夫子嘗曰我欲觀夏道是故之把而不足徴也我欲觀商道是故之宋而不足徴也又曰我觀周道幽厲傷之吾舍上聲魯何適矣魯之郊禘非禮也周公其衰矣以上並禮運文考之把宋已如彼考之當今又如此孔子所以深歎也或問禘之説子曰不知也知其説者之於天下也其如示諸斯乎指其掌先王報本追逺之意莫深於禘非仁孝誠敬之至不足以與去聲此非或人之所及也而不王不禘之法又魯之所當諱者故以不知答之示與視同指其掌弟子記夫子言此而自指其掌言其明且易去聲也蓋知禘之說則理無不明誠無不格而治天下不難矣聖人於此豈真有所不知也哉祭如在祭神如神在程子曰祭祭先祖也祭神祭外神也祭先主於孝祭神主於敬愚謂此門人記孔子祭祀之誠意子曰吾不與祭如不祭又記孔子之言以明之言已當祭之時或有故不得與而使他人攝之則不得致其如在之誠故雖已祭而此心缺然如未嘗祭也范氏曰君子之祭七日戒三日齊莊皆反必見所祭者誠之至也禮記坊記七日戒三日齊承一人焉以為尸金華應氏云齊戒一旬之内示精神匝乎十干之一周三與七皆陽剛而非隂雜又祭義致齊於内散齊於外齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者祭之日入室僾然必有見乎其位周還出戸肅然必有聞乎其容聲出户而聽愾然必有聞乎其歎息之聲是故郊則天神格廟則人鬼享皆由已以致之也有其誠則有其神無其誠則無其神可不謹乎吾不與祭如不祭誠為實禮為虚也王孫賈問曰與其媚於奥寧媚於竈何謂也王孫賈衛大夫媚親順也室西南隅為奥竈者五祀之一夏所祭也禮記月令孟春之月其祀戸孟夏祀竈中央祀中霤孟秋祀門孟冬祀行王制大夫以上皆祭五祀又祭法云天子祭七祀曰司命中霤國門國行泰厲户竈諸侯祭五祀曰司命中霤國門國行公厲大夫三祀曰族厲門行適士二祀曰門行士庶人一祀或户或竈泰厲古帝王無後者公厲古諸侯無後者族厲古大夫無後者祭法所云蓋周制也凡祭五祀皆先設主而祭於其所然後迎尸而祭於奥略如祭宗廟之儀如祀竈則設主於竈陘音刑祭畢而更設饌於奥以迎尸也故時俗之語因以奥有常尊而非祭之主竈雖卑賤而當時用事喻自結於君不如阿附權臣也賈衛之權臣故以此諷孔子子曰不然獲罪於天無所禱也天即理也其尊無對非奥竈之可比也逆理則獲罪於天矣豈媚於奥竈所能禱而免乎言但當順理非特不當媚竈亦不可媚於奥也謝氏曰聖人之言遜而不迫使王孫賈而知此意不為無益使其不知亦非所以取禍子曰周監於二代郁郁乎文哉吾從周郁於六反監視也二代夏商也言其視二代之禮而損益之郁郁文盛貌尹氏曰三代之禮至周大備夫子羙其文而從之子入大廟毎事問或曰孰謂鄹人之子知禮乎入大廟每事問子聞之曰是禮也大音泰鄹側留反大廟魯周公廟公羊傳文十三年周公稱大廟魯公稱世室羣公稱宫此蓋孔子始仕之時入而助祭也鄹魯邑名孔子父叔梁紇下沒反嘗為其邑大夫孔子自少去聲以知禮聞故或人因此而譏之孔子言是禮者敬謹之至乃所以為禮也尹氏曰禮者敬而已矣雖知亦問謹之至也其為敬莫大於此謂之不知禮者豈足以知孔子哉子曰射不主皮為力不同科古之道也為去聲射不主皮鄉射禮文為力不同科孔子解禮之意如此也皮革也布侯而棲革於其中以為的所謂鵠音谷也侯以布鵠以革天子三侯虎熊豹皆以其名之皮飾之又用其皮綴之中央為射之的故曰棲皮曰鵠考工記曰梓人為侯廣與崇方參分其廣而鵠居一焉蓋方制其皮以為鵠鵠小鳥而難中以中之為儁故謂的為鵠科等也古者射以觀徳禮記射義曰射者所以觀盛徳也但主於中去聲下同而不主於貫革蓋以人之力有强弱不同等也記曰武王克商散軍郊射而貫革之射息正謂此也樂記註散軍則不廢農事郊射則不忘武備射宫在郊故曰郊射貫革者射穿甲革所以主皮也又古禮中又有主皮之射庶人為之於冬田獵分禽時用之無侯張獸皮而射勝者又射不勝者降又有貫革之射於軍旅用之懸甲鎧而射習軍容也與此章不同一是禮射一是武射周衰禮廢列國兵爭復尚貫革故孔子歎之楊氏曰中可以學而能力不可以强上聲而至聖人言古之道所以正今之失子貢欲去告朔之餼羊去起吕反告古篤反餼許氣反告朔之禮古者天子常以季冬頒來嵗十二月之朔于諸侯諸侯受而藏之祖廟月朔則以特羊告廟請而行之本周禮春官太史下鄭注又玉藻䟽天子聽朔以特牛諸侯以特羊餼生牲也魯自文公始不視朔文六年閏月不告朔猶朝廟非禮也十六年夏五月公四不視朔公羊曰公有疾也自是公無疾亦不視朔而有司猶供此羊故子貢欲去之子曰賜也爾愛其羊我愛其禮愛猶惜也子貢蓋惜其無實而妄費然禮雖廢羊存猶得以識音志之而可復焉若併去其羊則此禮遂亡矣孔子所以惜之楊氏曰告朔諸侯所以稟命於君親禮之大者魯不視朔矣然羊存則告朔之名未湣而其實因可舉此夫子所以惜之也子曰事君盡禮人以為諂也黄氏名祖舜字繼道三山人曰孔子於事君之禮非有所加也如是而後盡爾時人不能反以為諂故孔子言之以明禮之當然也程子曰聖人事君盡禮當時以為諂若他人言之必曰我事君盡禮小人以為諂而孔子之言止於如此聖人道大徳宏此亦可見定公問君使臣臣事君如之何孔子對曰君使臣以禮臣事君以忠定公魯君名宋二者皆理之當然各欲自盡而已吕氏曰使臣不患其不忠患禮之不至事君不患其無禮患忠之不足尹氏曰君臣以義合者也故君使臣以禮則臣事君以忠子曰關雎樂而不淫哀而不傷樂音洛關雎周南國風詩之首篇也淫者樂之過而失其正者也傷者哀之過而害於和者也關雎之詩言后妃之徳宜配君子求之未得則不能無寤寐反側之憂求而得之則宜其有琴瑟鐘鼓之樂蓋其憂雖深而不害於和其樂雖盛而不失其正故夫子稱之如此欲學者玩其辭審其音而有以識其性情之正也哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗曰使民戰栗宰我孔子弟子名予魯人三代之社不同者古者立社各樹其土之所宜木以為主也唐孔氏曰夏都安邑宜松商都亳宜柏周都豐鎬宜栗金氏曰自唐以來社始用石為主具見唐書張齊傳戰栗恐懼貎宰我又言周所以用栗之意如此豈以古者戮人於社故附㑹其説與音余甘誓曰用命賞于祖弗用命戮于社蓋古者建國左祖右社左陽右隂主殺軍行以帛書社主以行弗用命戮之於社子聞之曰成事不説遂事不諌旣往不咎遂事謂事雖未成而勢不能已者孔子以宰我所對非立社之本意又啓時君殺伐之心而其言已出不可復扶又反救故厯言此以深責之欲使謹其後也尹氏曰古者各以所宜木名其社非取義其木也宰我不知而妄對故夫子責之子曰管仲之器小哉管仲齊大夫名夷吾相去聲桓公霜諸侯器小言其不知聖賢大學之道故局量去聲褊淺規模卑狹不能正身修徳以致主於王道或曰管仲儉乎曰管氏有三歸官事不攝焉得儉焉於䖍反或人蓋疑器小之為儉三歸臺名事見説苑或問説苑言管仲築三歸之臺韓非曰桓公使管仲有三歸之家舊説謂嫁曰歸三歸云者管仲一娶三姓而備九女如諸侯之制也劉向説苑善説篇齊桓公立仲父致大夫曰善吾者入門而右不善吾者入門而左有中門而立者桓公問焉對曰管子之知可與謀天下其强可與取天下君恃其信乎内政委焉外事斷焉驅民而歸之是亦可奪也桓公曰善乃謂管仲政則卒歸於子矣政之所不及唯子是匡管仲故築三歸之臺以自傷於民仲一娶三姓而備九女故築三歸之臺觀以處之是自傷於民力也攝兼也家臣不能具官一人常兼數事管仲不然皆言其侈然則管仲知禮乎曰邦君樹塞門管氏亦樹寒門邦君為兩君之好有反坫管氏亦有反坫管氏而知禮孰不知禮好去聲坫丁念反或人又疑不儉為知禮屏音丙謂之樹此句出爾雅注云小牆當門也塞猶蔽也設屏於門以蔽内外也禮天子外屏諸侯内屏大夫以簾士以帷好謂好㑹坫在兩楹之間獻酬飲畢則反爵於其上此皆諸侯之禮而管仲僭之不知禮也古注圖説坫以木為之髙八寸足髙二寸漆赤中箋坫形外方而中小圓愚謂孔子譏管仲之器小其㫖深矣或人不知而疑其儉故斥其奢以明其非儉或又疑其知禮故又斥其僭以明其不知禮蓋雖不復扶又反下同明言小器之所以然而其所以小者於此亦可見矣故程子曰奢而犯禮其器之小可知蓋器大則自知禮而無此失矣此言當深味也蘇氏曰蘇氏名軾字子瞻號東坡眉山人自修身正家以及於國則其本深其及者逺是謂大器揚雄所謂大器猶規矩準繩先自治而後治人者是也揚子先知篇或曰齊得夷吾而霸仲尼曰小器請問大器曰大器其猶規矩準繩乎先自治而後治人之謂大器管仲三歸反坫桓公内嬖六人而霸天下其本固已淺矣管仲死桓公薨天下不復宗齊左僖十七年齊侯之夫人三王姬徐嬴蔡姬皆無子齊侯好内多内寵内嬖如夫人者六人長衛姬生武孟少衛姬生恵公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生公子雍楊氏曰夫子大管仲之功而小其器蓋非王佐之才雖能合諸侯正天下其器不足稱也道學不明而王霸之略混為一途故聞管仲之器小則疑其為儉以不儉告之則又疑其知禮蓋世方以詭遇為功而不知為去聲之範則不悟其小宜矣子語魯大師樂曰樂其可知也始作翕如也從之純如也皦如也繹如也以成語去聲大音泰從音縱語告也大師樂官名時音樂廢缺故孔子教之翕合也從放也純和也皦明也繹相續不絶也成樂之一終也謝氏曰五音六律不具不足以為樂翕如言其合也五音合矣清濁髙下如五味之相濟而後和本左昭二十年晏子語故曰純如合而和矣欲其無相奪倫故曰皦如然豈宫自宫而商自商乎不相反而相連如貫珠可也本樂記師乙語故曰繹如也以成儀封人請見曰君子之至於斯也吾未嘗不得見也從者見之出曰二三子何患於喪乎天下之無道也乆矣天將以夫子為木鐸請見見之之見賢徧反從喪皆去聲儀衛邑封人掌封疆之官蓋賢而隐於下位者也君子謂當時賢者至此皆得見之自言其平日不見絶於賢者而求以自通也見之謂通使得見喪謂失位去國禮曰喪欲速貧是也出禮記檀弓意夫子失魯司冦去魯歴聘時木鐸金口木舌施政教時所振以警衆者也明堂位言振木鐸于朝禮有金鐸木鐸言亂極當治去聲天必將使夫子得位設教不乆失位也封人一見夫子而遽以是稱之其所得於觀感之間者深矣或曰木鐸所以徇于道路書𦙍征篇毎嵗孟春遒人以木鐸徇于路言天使夫子失位周流四方以行其教如木鐸之徇于道路也子謂韶盡羙矣又盡善也謂武盡羙矣未盡善也韶舜樂武武王樂語録韶武今皆不可考但書稱徳惟善政至勸之以九歌此便是作韶樂之本所謂九徳之歌九韶之舞是也武王之武看樂記便見盖是象伐紂之事所謂南者自南而北伐紂也氣象便不恁地和韶樂只是和而已羙者聲容之盛善者美之實也舜紹堯致治去聲武王代紂救民其功一也故其樂皆盡美然舜之徳性之也又以揖遜而有天下武王之徳反之也又以征誅而得天下故其實有不同者程子曰成湯放桀惟有慚徳見書仲虺之告武王亦然故未盡善堯舜湯武其揆一也征伐非其所欲所遇之時然爾禮器堯授舜舜授禹湯放桀武王伐紂時也子曰居上不寛為禮不敬臨喪不哀吾何以觀之哉居上主於愛人故以寛為本為禮以敬為本臨喪以哀為本既無其本則以何者而觀其所行之得失哉里仁第四凡二十六章子曰里仁為羙擇不處仁焉得知處上聲焉於䖍反知去聲里有仁厚之俗為羙擇里而不居於是焉則失其是非之本心而不得為知矣子曰不仁者不可以久處約不可以長處樂仁者安仁知者利仁樂音洛知去聲約窮困也利猶貪也蓋深知篤好去聲而必欲得之也不仁之人失其本心久約必濫久樂必淫惟仁者則安其仁而無適不然知者則利於仁而不易所守蓋雖深淺之不同然皆非外物所能奪矣謝氏曰仁者心無内外逺近精粗之間非有所存而自不亡非有所理而自不亂如目視而耳聽手持而足行也知者謂之有所見則可謂之有所得則未可有所存斯不亡有所理斯不亂未能無意也安仁則一利仁則二安仁者非顔閔以上上聲去聖人為不逺不知此味也諸子雖有卓越之才謂之見道不惑則可然未免於利之也子曰惟仁者能好人能惡人好惡皆去聲惟之為言獨也蓋無私心然後好惡當去聲於理程子所謂得其公正是也游氏曰好善而惡惡如字天下之同情然人毎失其正者心有所繫而不能自克也惟仁者無私心所以能好惡也子曰苟志於仁矣無惡也惡如字苟誠也志者心之所之也其心誠在於仁則必無為惡之事矣楊氏曰苟志於仁未必無過舉也然而為惡則無矣子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也惡去聲去如字下同不以其道得之謂不當得而得之然於富貴則不處於貧賤則不去君子之審富貴而安貧賤也如此君子去仁惡乎成名惡平聲言君子所以為尹子以其仁也若貪富貴而厭貧賤則是自離去聲其仁而無君子之實矣何所成其名乎君子無終食之間違仁造次必於是顛沛必於是造七到反沛音貝終食者一飯之頃造次急遽苟且之時顛沛傾覆流離之際蓋君子之不去乎仁如此不但富貴貧賤取舍上聲下同之閒而已也言君子為仁自富貴貧賤取舍之閒以至於終食造次顛沛之頃無時無處而不用其力也然取舍之分去聲明然後存養之功密存養之功密則其取舍之分益明矣子曰我未見好仁者惡不仁者好仁者無以尚之惡不仁者其為仁矣不使不仁者加乎其身好惡皆去聲夫子自言未見好仁者惡不仁者蓋好仁者真知仁之可好故天下之物無以加之惡不仁者真知不仁之可惡故其所以為仁者必能絶去不仁之事而不使少有及於其身此皆成徳之事故難得而見之也有能一日用其力於仁矣乎我未見力不足者言好仁惡不仁者雖不可見然或有人果能一旦奮然用力於仁則我又未見其力有不足者蓋為仁在己欲之則是而志之所至氣必至焉故仁雖難能而至之亦易去聲下同也蓋有之矣我未之見也蓋疑辭有之謂有用力而力不足者蓋人之氣質不同故疑亦容或有此昬弱之甚欲進而不能者但我偶未之見耳蓋不敢終以為易而又歎人之莫肯用力於仁也此章言仁之成徳雖難其人然學者苟能實用其力則亦無不可至之理但用力而不至者今亦未見其人焉此夫子所以反覆而歎息之也子曰人之過也各於其黨觀過斯知仁矣黨類也程子曰人之過也各於其類君子常失於厚小人常失於薄君子過於愛小人過於忍尹氏曰於此觀之則人之仁不仁可知矣吳氏曰後漢吳祐謂掾俞絹反以親故受汙辱之名所謂觀過知仁是也後漢書吳祐順帝時遷膠東侯相祐政唯仁簡以身率物吏人懐而不欺嗇夫孫性私賦民錢市衣以進其父父得而怒曰有君如是何忍欺促歸伏罪性慚懼詣閣持衣自首祐屏左右問其故性具談父言祐曰掾以親故受汙穢之名所謂觀過斯知仁矣使歸謝父還以衣遺之愚按此亦但言人雖有過猶可即此而知其厚薄非謂必俟其有過而後賢否可知也子曰朝聞道夕死可矣道者事物當然之理苟得聞之則生順死安無復扶又反遺恨矣朝夕所以甚言其時之近程子曰言人不可以不知道苟得聞道雖死可也又曰皆實理也人知而信者為難死生亦大矣非誠有所得豈以夕死為可乎子曰士志於道而恥惡衣惡食者未足與議也心欲求道而以口體之奉不若人為恥其識趣七住反向也之卑陋甚矣何足與議於道哉程子曰志於道而心役乎外何足與議也子曰君子之於天下也無適也無莫也義之與比適丁歴反比必二反適専主也春秋傳去聲曰吾誰適從是也左僖五年晉侯使士蔿為二公子築蒲與屈士蔿退而賦曰狐裘龎茸一國三公吾誰適從莫不肯也比從也謝氏曰適可也莫不可也無可無不可苟無道以主之不幾平聲於猖音昌狂自恣乎莊子山木篇不知義之所適不知禮之所將猖狂妄行乃蹈乎大方以為猖狂妄行從心所欲皆合乎道集註乃反其説此佛老之學所以自謂心無所住而能應變而卒得罪於聖人也聖人之學不然於無可無不可之間有義存焉然則君子之心果有所倚乎子曰君子懐徳小人懐土君子懐刑小人懐恵懐思念也懐徳謂存其固有之善懐土謂溺其所處上聲之安懐刑謂畏法懐恵謂貪利君子小人趣向不同公私之閒而已矣尹氏曰樂音洛善惡烏路反不善所以為君子苟安務得所以為小人子曰放於利而行多怨放上聲孔氏曰孔氏名安國西漢人放依也多怨謂多取怨程子曰欲利於己必害於人故多怨子曰能以禮讓為國乎何有不能以禮讓為國如禮何讓者禮之實也何有言不難也言有禮之實以為國則何難之有不然則其禮文雖具亦且無如之何矣而況於為國乎子曰不患無位患所以立不患莫已知求為可知也所以立謂所以立乎其位者可知謂可以見知之實程子曰君子求其在己者而已矣子曰參乎吾道一以貫之曽子曰唯參所金反唯上聲參乎者呼曽子之名而告之貫通也唯者應之速而無疑者也聖人之心渾然一理而泛應曲當去聲用各不同曽子於其用處蓋已隨事精察而力行之但未知其體之一爾夫子知其真積力久荀子勤學篇真積力久則入將有所得是以呼而告之曽子果能黙契其指即應之速而無疑也子出門人問曰何謂也曽子曰夫子之道忠恕而已矣盡己之謂忠推己之謂恕而已矣者竭盡而無餘之辭也夫子之一理渾然而泛應曲當譬則天地之至誠無息而萬物各得其所也自此之外固無餘法而亦無待於推矣曽子有見於此而難言之故借學者盡己推己之目以著明之欲人之易去聲曉也蓋至誠無息者道之體也萬殊之所以一本也萬物各得其所者道之用也一本之所以萬殊也以此觀之一以貫之之實可見矣或曰中心為忠如心為恕金氏曰此周禮疏文當考於義亦通程子曰以己及物仁也推己及物恕也違道不逺是也忠恕一以貫之忠者天道恕者人道忠者無妄恕者所以行乎忠也忠者體恕者用大本達道也此與違道不逺異者動以天爾又曰維天之命於音烏穆不己見詩周頌維天之命篇忠也乾道變化各正性命見易乾卦文言恕也又曰聖人教人各因其才吾道一以貫之惟曽子為能逹此孔子所以告之也曽子告門人曰夫子之道忠恕而已矣亦猶夫子之告曽子也中庸所謂忠恕違道不逺斯乃下學上達之義子曰君子喻於義小人喻於利喻猶曉也義者天理之所宜利者人情之所欲程子曰君子之於義猶小人之於利也惟其深喻是以篤好去聲楊氏曰君子有舍上聲生而取義者以利言之則人之所欲無甚於生所惡去聲無甚於死孰肯舍生而取義哉其所喻者義而已不知利之為利故也小人反是子曰見賢思齊焉見不賢而内自省也省悉井反思齊者冀已亦有是善内自省者恐已亦有是惡胡氏曰見人之善惡不同而無不反諸身者則不徒羡人而甘自棄不徒責人而忘自責矣子曰事父母幾諫見志不從又敬不違勞而不怨此章與内則之言相表裏朱子全引内則之文以解此章幾微也微諫所謂父母有過下氣怡色柔聲以諫也見志不從又敬不違所謂諫若不入起敬起孝悦則復扶又反諫也勞而不怨所謂與其得罪於鄉黨州閭寧孰與熟同古熟字未從火後來方加諫父母怒不悦而撻他達反之流血不敢疾怨起敬起孝也子曰父母在不逺遊遊必有方逺遊則去親逺而為日久定省悉井反曠而音問疎不惟己之思親不置亦恐親之念我不忘也遊必有方如己告云之東則不敢更適西欲親必知己之所在而無憂召己則必至而無失也范氏曰子能以父母之心為心則孝矣子曰三年無改於父之道可謂孝矣胡氏曰已見首篇此蓋複音福出而逸其半也子曰父母之年不可不知也一則以喜一則以懼知猶記憶也常知父母之年則旣喜其夀又懼其衰而於愛日之誠自有不能已者楊子孝至篇曰事父母自知不足者其舜乎不可得而久者事親之謂也孝子愛日孝子養親惟日不足子曰古者言之不出恥躬之不逮也言古者以見今之不然逮及也行去聲不及言可恥之甚古者所以不出其言為去聲此故也范氏曰君子之於言也不得已而後出之非言之難而行之難也人惟其不行也是以輕言之言之如其所行行之如其所言則出諸其口必不易去聲矣子曰以約失之者鮮矣鮮上聲謝氏曰不侈昌者反然以自放之謂約尹氏曰凡事約則鮮失非止謂儉約也子曰君子欲訥於言而敏於行行去聲謝氏曰放言易去聲故欲訥力行難故欲敏胡氏曰自吾道一貫至此十章疑皆曽子門人所記也子曰徳不孤必有鄰鄰猶親也徳不孤立必以類應故有徳者必有其類從之如居之有鄰也子游曰事君數斯辱矣朋友數斯疏矣數色角反程子曰數煩數也胡氏曰事君諌不行則當去導友善不納則當止至於煩瀆則言者輕聽者厭矣是以求榮而反辱求親而反疏也范氏曰君臣朋友皆以義合故其事同也論語纂箋卷二
