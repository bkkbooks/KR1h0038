body:
  text: 欽定四庫全書孟子纂箋卷九元詹道傳撰萬章上凡九章萬章問曰舜往于田號泣于旻天何為其號泣也孟子曰怨慕也號平聲舜往于田耕歷山時也仁覆敷救反閔下謂之旻天號泣于旻天呼天而泣也事見虞書大禹謨篇書曰帝初于歷山往于田日號泣于旻天于父母怨慕怨己之不得其親而思慕也萬章曰父母愛之喜而不忘父母惡之勞而不怨然則舜怨乎曰長息問於公明髙曰舜往于田則吾既得聞命矣號泣于旻天于父母則吾不知也公明髙曰是非爾所知也夫公明髙以孝子之心為不若是恝我竭力耕田共為子職而已矣父母之不我愛於我何哉惡平聲夫音扶恝苦八反共平聲長息公明髙弟子公明髙曾子弟子箋此語本趙岐注不知何所據于父母亦書辭言呼父母而泣也恝無愁之貌於我何哉自責不知己有何罪耳非怨父母也楊氏曰非孟子深知舜之心不能為此言蓋舜惟恐不順於父母未嘗自以為孝也若自以為孝則非孝矣帝使其子九男二女百官牛羊倉廪備以事舜於畎畝之中天下之士多就之者帝將胥天下而遷之焉為不順於父母如窮人無所歸為去聲帝堯也史記云二女妻去聲之以觀其內九男事之以觀其外趙岐注九子事舜以為師丹朱外八庶未聞猶晉獻公之子九人五人以事見於春秋餘四子亦未聞也史記五帝紀舜年二十以孝聞三十而帝堯問可用者四嶽咸薦虞舜曰可於是堯乃以二女妻舜以觀其內使九男與處以觀其外舜居溈汭內行彌謹堯二女不敢以貴驕事舜親戚甚有婦道堯九男皆益篤又言一年所居成聚廣雅云聚居也音慈喻反漢書音義云小於鄉曰聚二年成邑三年成都周禮郊野法九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都又按莊子徐無鬼篇舜有鱣行三徙成都至鄧之墟十五萬家是天下之士就之也胥相視也遷之移以與之也如窮人之無所歸言其怨慕迫切之甚也天下之士悅之人之所欲也而不足以解憂好色人之所欲妻帝之二女而不足以解憂富人之所欲富有天下而不足以解憂貴人之所欲貴為天子而不足以解憂人悅之好色富貴無足以解憂者惟順於父母可以解憂孟子推舜之心如此以解上文之意極天下之欲不足以解憂而惟順於父母可以解憂孟子真知舜之心哉人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君則熱中大孝終身慕父母五十而慕者豫於大舜見之矣少好皆去聲言常人之情因物有遷惟聖人為能不失其本心也艾美好也楚辭戰國策所謂幼艾義與此同楚辭九歌大司命篇慫長劍兮擁幼艾蓀獨宜兮為民正戰國策趙孝成王篇公子魏牟過趙趙王迎之顧反至坐前有尺帛且令工人以為冠工見客來也因避趙王曰願聞所以為天下魏牟曰王能重王之國若此尺帛則國大治矣趙王不悅曰寡人豈敢輕國若此魏牟曰請為王說之王有此尺帛何不令前郎中以為冠王曰郎中不知為冠魏牟曰為冠而敗之奚虧於王之國而王必待工而後乃使之今為天下之工或非也社稷為虛器先王不血食而王不以豫工乃與幼艾不得失意也熱中躁急心熱也言五十者舜攝政時年五十也五十而慕則其終身慕可知矣此章言舜不以得衆人之所欲為已樂音洛而以不順乎親之心為己憂非聖人之盡性其孰能之萬章問曰詩云娶妻如之何必告父母信斯言也宜莫如舜舜之不告而娶何也孟子曰告則不得娶男女居室人之大倫也如告則廢人之大倫以懟父母是以不告也懟直䫫反詩齊國風南山之篇也信誠也誠如此詩之言也懟讎怨也舜父頑母嚚音銀常欲害舜告則不聽其娶是廢人之大倫以讎怨於父母也萬章曰舜之不告而娶則吾既得聞命矣帝之妻舜而不告何也曰帝亦知告焉則不得妻也妻去聲以女為人妻如字曰妻去聲下同程子曰堯妻舜而不告者以君治之而已如今之官府治民之私者亦多萬章曰父母使舜完廩捐階瞽瞍焚廪使浚井出從而掩之象曰謨蓋都君咸我績牛羊父母倉廩父母干戈朕琴朕弤朕二嫂使治朕棲象往入舜宫舜在牀琴象曰鬱陶思君爾忸怩舜曰惟兹臣庶汝其于豫治不識舜不知象之將殺已與曰奚而不知也象憂亦憂象喜亦喜弤都禮反忸女六反怩音尼與平聲完治也捐去上聲也階梯也掩蓋也按史記曰使舜上時掌反塗廪瞽瞍從下縱火焚廪舜乃以兩笠自捍音汗而下去得不死後又使舜穿井舜穿井為匿空旁出舜既入深瞽瞍與象共下土實井舜從匿空中出去即其事也箋空音孔括地志云舜井在媯州臨武縣西城中其西又有一井耆舊傳云並舜井也帝王世紀云河東有舜井未詳列女傳二女教舜上廪曰鵲女衣裳鳥工往教舜穿井曰去汝裳衣龍工往故謂鳥工龍裳救井廪之難象舜異母弟也謨謀也蓋蓋井也舜所居三年成都故謂之都君咸皆也績功也舜既入井象不知舜已出欲以殺舜為己功也干盾樹尹反也戈㦸也周禮掌五兵五楯鄭云五楯干魯之屬禮圖云戈今之勾戟又云今之三鋒㦸缺內長四寸半胡長六寸以其與戈相䫫故云戈㦸也琴舜所彈五弦琴也弤雕丁聊反弓也通鑑外紀云舜彈五弦之琴歌南風之詩雕弓漆赤弓尚書彤弓是也象欲以舜之牛羊倉廪與父母而自取此物也二嫂堯二女也棲牀也象欲使為己妻也象往舜宫欲分取所有見舜生在牀彈琴蓋既出即潛歸其宫也鬱陶思之甚而氣不得伸也象言己思君之甚故來見爾忸怩慚色也臣庶謂其百官也象素僧舜不至其宫故舜見其來而喜使之治其臣庶也孟子言舜非不知其將殺己但見其憂則憂見其喜則喜兄弟之情自有所不能已耳萬章所言其有無不可知然舜之心則孟子有以知之矣他亦不足辨也程子曰象憂亦憂象喜亦喜人情天理於是為至曰然則舜僞喜者與曰否昔者有饋生魚於鄭子産子産使校人畜之池校人烹之反命曰始舍之圉圉焉少則洋洋焉攸然而逝子産曰得其所哉得其所哉校人出曰孰謂子産智豫既烹而食之曰得其所哉得其所哉故君子可欺以其方難罔以非其道彼以愛兄之道來故誠信而喜之奚僞焉與平聲校音效又音教畜許六反校人主池沼小吏也圉圉困而未紓音舒之貌洋洋則稍縱矣攸然而逝者自得而逺去也方亦道也罔蒙蔽也欺以其方謂誑古况反之以理之所有罔以非其道謂昧之以理之所無象以愛兄之道來所謂欺之以其方也舜本不知其僞故實喜之何僞之有此章又言舜遭人倫之變而不失天理之常也萬章問曰象日以殺舜為事立為天子則放之何也孟子曰封之也或曰放焉放猶置也置之於此使不得去也萬章疑舜何不誅之孟子言舜實封之而或者誤以為放也萬章曰舜流共工于幽州放歡兜于崇山殺三苗于三危殛鯀于羽山四罪而天下咸服誅不仁也象至不仁封之有庳有庳之人奚罪焉仁人固如是乎在他人則誅之在弟則封之曰仁人之於弟也不藏怒焉不宿怨焉親愛之而已矣親之欲其貴也愛之欲其富也封之有庳富貴之也身為天子弟為匹夫可謂親愛之乎庳音鼻流徙也共音恭工官名歡兜人名二人比毗至反周相與為黨如書堯咨疇若豫采歡兜舉共工可見為黨三苗國名負固不服殺殺其君也殛誅也鯀禹父名方命圯部鄙反族治水無功見書堯典皆不仁之人也幽州崇山三危羽山有庳皆地名也趙氏曰幽州北裔之地舜分冀北為幽州崇山南裔之山在今澧州慈利縣三危西裔之地禹貢在雍州或以為燉煌未詳羽山東裔之山在今海州朐山縣或曰今道州鼻亭即有庳之地也漢書顔師古注云有庳在零陵今鼻亭是也未知是否萬章疑舜不當封象使彼有庳之民無罪而遭象之虐非仁人之心也藏怒謂藏匿其怒宿怨謂留蓄其怨敢問或曰放者何謂也曰象不得有為於其國天子使吏治其國而納其貢稅焉故謂之放豈得暴彼民哉雖然欲常常而見之故源源而來不及貢以政接於有庳此之謂也孟子言象雖封為有庳之君然不得治其國天子使吏代之治而納其所收之貢稅於象有似於放故或者以為放也蓋象至不仁處上聲之如此則既不失吾親愛之心而彼亦不得虐有庳之民也源源若水之相繼也來謂來朝音潮下同覲也不及貢以政接於有庳謂不待及諸侯朝貢之期而以政事接見有庳之君蓋古書之辭而孟子引以證源源而來之意見形甸反其親愛之無已如此也吳氏曰言聖人不以公義廢私恩亦不以私恩害公義舜之於象仁之至義之盡也咸丘蒙問曰語云盛德之士君不得而臣父不得而子舜南面而立堯帥諸侯北面而朝之瞽瞍亦北面而朝之舜見瞽瞍其容有蹙孔子曰於斯時也天下殆哉岌岌乎不識此語誠然乎哉孟子曰否此非君子之言齊東野人之語也堯老而舜攝也堯典曰二十有八載放勳乃徂落百姓如喪考妣三年四海遏密八音孔子曰天無二日民無二王舜既為天子矣又帥天下諸侯以為堯三年喪是二天子矣朝音潮岌魚及反喪如字咸丘蒙孟子弟子也語者古語也蹙顰蹙不自安也岌岌不安貌也言人倫乖亂天下將危也齊東齊國之東鄙也孟子言堯但老不治事而舜攝天子之事耳堯在時舜未嘗即天子位堯何由北面而朝乎又引書及孔子之言以明之堯典虞書篇名今此文乃見形甸反於舜典蓋古書二篇或合為一耳言舜攝位二十八年而堯死也徂升也落降也人死則魂升而魄降故古者謂死為徂落遏止也密靜也八音金石絲竹匏蒲交反土革木樂器之音也箋見論語第八篇咸丘蒙曰舜之不臣堯則吾既得聞命矣詩云普天之下莫非王土率土之濵莫非王臣而舜既為天子矣敢問瞽瞍之非臣如何曰是詩也非是之謂也勞於王事而不得養父母也曰此莫非王事我獨賢勞也故說詩者不以文害辭不以辭害志以意逆志是為得之如以辭而已矣雲漢之詩曰周餘黎民靡有孑遺信斯言也是周無遺民也不臣堯不以堯為臣使北面而朝也詩小雅北山之篇也普遍也率循也此詩今毛氏序云役使不均已勞於王事而不得養去聲其父母焉其詩下文亦云大夫不均我從事獨賢乃作詩者自言天下皆王臣何為獨使我以賢才而勞苦乎非謂天子可臣其父也文字也辭語也逆迎也雲漢大雅篇名也孑獨立之貌遺脫也言說詩之法不可以一字而害一句之義不可以一句而害設辭之志當以己意迎取作者之志乃可得之若但以其辭而已則如雲漢所言是周之民真無遺種上聲矣惟以意逆之則知作詩者之志在於憂旱而非真無遺民也孝子之至莫大乎尊親尊親之至莫大乎以天下養為天子父尊之至也以天下養養之至也詩曰永言孝思孝思維則此之謂也養去聲言瞽瞍既為天子之父則當享天下之養此舜之所以為尊親養親之至也豈有使之北面而朝之理乎詩大雅下武之篇言人能長言孝思而不忘則可以為天下法則也書曰祇載見瞽瞍䕫䕫齊栗瞽瞍亦允若是為父不得而子也見音現齊側皆反書大禹謨篇也祇敬也載事也䕫䕫齊栗敬謹恐懼之貌允信也若順也言舜敬事瞽瞍往而見之敬謹如此瞽瞍亦信而順之也孟子引此而言瞽瞍不能以不善及其子而反見化於其子則是所謂父不得而子者而非如咸丘蒙之說也萬章曰堯以天下與舜有諸孟子曰否天子不能以天下與人天下者天下之天下非一人之私有故也然則舜有天下也孰與之曰天與之萬章問而孟子答也天與之者諄諄然命之乎諄之淳反萬章問也諄諄詳語之貌曰否天不言以行與事示之而已矣行去聲下同行如字之於身謂之行措諸天下謂之事言但因舜之行事而示以與之之意耳曰以行與事示之者如之何曰天子能薦人於天不能使天與之天下諸侯能薦人於天子不能使天子與之諸侯大夫能薦人於諸侯不能使諸侯與之大夫昔者堯薦舜於天而天受之暴之於民而民受之故曰天不言以行與事示之而已矣暴步卜反下同暴顯也言下能薦人於上不能令力呈反上必用之舜為天人所受是因舜之行與事而示之以與之之意也曰敢問薦之於天而天受之暴之於民而民受之如何曰使之主祭而百神享之是天受之使之主事而事治百姓安之是民受之也天與之人與之故曰天子不能以天下與人治去聲舜相堯二十有八載非人之所能為也天也堯崩三年之喪畢舜避堯之子於南河之南天下諸侯朝覲者不之堯之子而之舜訟獄者不之堯之子而之舜謳歌者不謳歌堯之子而謳歌舜故曰天也夫然後之中國踐天子位焉而居堯之宫逼堯之子是篡也非天與也相去聲朝音潮夫音扶南河在冀州之南其南即豫州也訟獄謂獄不決而訟之也太誓曰天視自我民視天聽自我民聽此之謂也自從也天無形其視聽皆從於民之視聽民之歸舜如此則天與之可知矣萬章問曰人有言至於禹而德衰不傳於賢而傳於子有諸孟子曰否不然也天與賢則與賢天與子則與子昔者舜薦禹於天十有七年舜崩三年之喪畢禹避舜之子於陽城天下之民從之若堯崩之後不從堯之子而從舜也禹薦益於天七年禹崩三年之喪畢益避禹之子於箕山之陰朝覲訟獄者不之益而之啓曰吾君之子也謳歌者不謳歌益而謳歌啓曰吾君之子也朝音潮陽城箕山之隂皆嵩山下深谷中可藏處啓禹之子也楊氏曰此語孟子必有所受然不可考矣但云天與賢則與賢天與子則與子可以見堯舜禹之心皆無一毫私意也丹朱之不肖舜之子亦不肖舜之相堯禹之相舜也歷年多施澤於民久啓賢能敬承繼禹之道益之相禹也歷年少施澤於民未久舜禹益相去久逺其子之賢不肖皆天也非人之所能為也莫之為而為者天也莫之致而至者命也之相之相去聲相去之相如字堯舜之子皆不肖而舜禹之為相久此堯舜之子所以不有天下而舜禹有天下也禹之子賢而益相不久此啓所以有天下而益不有天下也然此皆非人力所為而自為非人力所致而自至者蓋以理言之謂之天自人言之謂之命其實則一而已匹夫而有天下者德必若舜禹而又有天子薦之者故仲尼不有天下孟子因禹益之事歷舉此下兩條以推明之言仲尼之德雖無愧於舜禹而無天子薦之者故不有天下繼世以有天下天之所廢必若桀紂者也故益伊尹周公不有天下繼世而有天下者其先世皆有大功德於民故必有大惡如桀紂則天乃廢之如啓及太甲成王雖不及益伊尹周公之賢聖但能嗣守先業則天亦不廢之故益伊尹周公雖有舜禹之德而亦不有天下伊尹相湯以王於天下湯崩太丁未立外丙二年仲壬四年太甲顛覆湯之典刑伊尹放之於桐三年太甲悔過自怨自艾於桐處仁遷義三年以聽伊尹之訓已也復歸於亳相王皆去聲艾音乂此承上文言伊尹不有天下之事趙氏曰太丁湯之太子未立而死外丙立二年仲壬立四年皆太丁弟也太甲太丁子也程子曰古人謂嵗為年湯崩時外丙方二歲仲壬方四歲惟太甲差初加反長上聲故立之也二說未知孰是顛覆壞亂也典刑常法也桐湯墓所在艾治也說文云芟師銜反草也蓋斬絶自新之意亳商所都也周公之不有天下猶益之於夏伊尹之於殷也此復扶又反言周公所以不有天下之意孔子曰唐虞禪夏后殷周繼其義一也禪音擅禪授也或禪或繼皆天命也聖人豈有私意於其間哉尹氏曰孔子曰唐虞禪夏后殷周繼其義一也孟子曰天與賢則與賢天與子則與子知前聖之心者無如孔子繼孔子者孟子而已矣萬章問曰人有言伊尹以割烹要湯有諸要平聲要求也案史記伊尹欲行道以致君而無由乃為有莘氏之媵以證反臣負鼎俎以滋味說音稅湯致於王道蓋戰國時有為此說者孟子曰否不然伊尹耕於有莘之野而樂堯舜之道焉非其義也非其道也祿之以天下弗顧也繫馬千駟弗視也非其義也非其道也一介不以與人一介不以取諸人樂音洛莘國名莘國即今同州郃陽縣樂堯舜之道者誦其詩讀其書而欣慕愛樂之也駟四匹也介與草芥之芥同言其辭受取與無大無細一以道義而不苟也湯使人以幣聘之囂囂然曰我何以湯之聘幣為哉我豈若處畎畝之中由是以樂堯舜之道哉囂五髙反又戶驕反囂囂無欲自得之貌湯三使往聘之既而幡然改曰與我處畎畝之中由是以樂堯舜之道吾豈若使是君為堯舜之君哉吾豈若使是民為堯舜之民哉吾豈若於吾身親見之哉幡然變動之貌於吾身親見之言於我之身親見其道之行不徒誦說向慕之而已也天之生此民也使先知覺後知使先覺覺後覺也豫天民之先覺者也豫將以斯道覺斯民也非豫覺之而誰也此亦伊尹之言也知謂識其事之所當然覺謂悟其理之所以然覺後知後覺如呼寐者而使之寤也言天使者天理當然若使之也程子曰豫天民之先覺謂我乃天生此民中盡得民道而先覺者也既為先覺之民豈可不覺其未覺者及彼之覺亦非分我所有以豫通作與之也皆彼自有此理我但能覺之而已思天下之民匹夫匹婦有不被堯舜之澤者若已推而內之溝中其自任以天下之重如此故就湯而說之以伐夏救民推吐回反內音納說音稅書曰昔先正保衡作我先王曰豫弗克俾厥后為堯舜其心愧恥若撻于市一夫不獲則曰時豫之辜見說命下孟子之言蓋取諸此是時夏桀無道暴虐其民故欲使湯伐夏以救之徐氏曰伊尹樂堯舜之道堯舜揖遜而伊尹說湯以伐夏者時之不同義則一也吾未聞枉己而正人者也况辱己以正天下者乎聖人之行不同也或逺或近或去或不去歸潔其身而已矣行去聲辱己甚於枉己正天下難於正人若伊尹以割烹要湯辱己甚矣何以正天下乎逺謂隱遁與遁同也近謂仕近君也言聖人之行雖不必同然其要如字歸在潔其身而已伊尹豈肯以割烹要湯哉吾聞其以堯舜之道要湯未聞以割烹也林氏曰以堯舜之道要湯者非實以是要之也道在此而湯之聘自來耳猶子貢言夫子之求之異乎人之求之也愚謂此語亦猶前章所論父不得而子之意伊訓曰天誅造攻自牧宫朕載自亳伊訓商書篇名孟子引以證伐夏救民之事也今書牧宫作鳴條造載皆始也伊尹言始攻桀無道由我始其事於亳也萬章問曰或謂孔子於衛主癰疽於齊主侍人瘠環有諸乎孟子曰否不然也好事者為之也癰於容反疽七余反好去聲主謂舍於其家以之為主人也癰疽瘍音羊醫也周禮天官下瘍醫注瘍瘡癰也侍人奄與閹同人也瘠姓環名皆時君所近狎之人也好事謂喜造言生事之人也於衛主顔讎由彌子之妻與子路之妻兄弟也彌子謂子路曰孔子主我衛卿可得也子路以告孔子曰有命孔子進以禮退以義得之不得曰有命而主癰疽與侍人瘠環是無義無命也讎如字又音犫顔讎由衛之賢大夫也史記作顔濁鄒孔子世家孔子嘗適衛主於子路妻兄顔濁鄒家據此則不但濁鄒之名異言子路妻兄亦異矣彌子衛靈公幸臣彌子瑕也見史韓非傳徐氏曰禮主於辭遜故進以禮義主於斷丁亂反制故退以義難進而易去聲退者也在我者有禮義而已得之不得則有命存焉孔子不悅於魯衛遭宋桓司馬將要而殺之微服而過宋是時孔子當厄主司城貞子為陳侯周臣要平聲不悅不樂音洛居其國也桓司馬宋大夫向式亮反魋也司城貞子亦宋大夫之賢者也宋以武公諱改司空為司城陳侯名周按史記孔子為魯司寇齊人餽女樂以閒去聲之孔子遂行適衛月餘去衛適宋司馬魋欲殺孔子孔子去至陳主於司城貞子孟子言孔子雖當厄難去聲然猶擇所主況在齊衛無事之時豈有主癰疽侍人之事乎吾聞觀近臣以其所為主觀逺臣以其所主若孔子主癰疽與侍人瘠環何以為孔子近臣在朝音潮之臣逺臣逺方來仕者君子小人各從其䫫故觀其所為主與其所主者而其人可知萬章問曰或曰百里奚自鬻於秦養牲者五羊之皮食牛以要秦穆公信乎孟子曰否不然好事者為之也食音嗣好去聲下同百里奚虞之賢臣人言其自賣於秦養牲者之家得五羊之皮而為去聲之食牛因以干秦穆公也百里奚虞人也晉人以垂棘之璧與屈産之乘假道於虞以伐虢宫之竒諫百里奚不諫屈求勿反乘去聲虞虢皆國名垂棘之璧垂棘之地所出之璧也屈産之乘屈地所生之良馬也乘四匹也晉欲伐虢道經於虞故以此物借道其實欲并去聲取虞宫之竒亦虞之賢臣諫虞公令力呈反勿許虞公不用遂為晉所滅百里奚知其不可諫故不諫而去之秦左僖二年晉使荀息以屈産之乘與垂棘之璧假道於虞以伐虢虞公許之宫之竒諫不聽五年晉侯復假道於虞以伐虢宫之竒諫曰虢虞之表也虢亡虞必從之晉不可啓寇不可玩一之為甚其可再乎諺所謂輔車相依唇亡齒寒者其虞虢之謂也弗聽宫之竒以其族行十二月晉滅虢館於虞遂襲虞滅之知虞公之不可諫而去之秦年已七十矣曽不知以食牛干秦穆公之為汙也可謂智乎不可諫而不諫可謂不智乎知虞公之將亡而先去之不可謂不智也時舉於秦知穆公之可與有行也而相之可謂不智乎相秦而顯其君於天下可傳於後世不賢而能之乎自鬻以成其君鄉黨自好者不為而謂賢者為之乎相去聲自好自愛其身之人也孟子言百里奚之智如此必知食牛以干主之為汙其賢又如此必不肯自鬻以成其君也然此事當孟子時已無所據孟子直以事理反覆推之而知其必不然耳范氏曰古之聖賢未遇之時鄙賤之事不恥為之如百里奚為去聲人養牛無足怪也惟是人君不致敬盡禮則不可得而見豈有先自汙辱以要其君哉莊周曰百里奚爵祿不入於心故飯扶晚反牛而牛肥使穆公忘其賤而與之政亦可謂知百里奚矣見莊子田子方篇伊尹百里奚之事皆聖賢出處上聲之大節故孟子不得不辨尹氏曰當時好事者之論大率䫫此蓋以其不正之心度待洛反聖賢也孟子纂箋卷九
