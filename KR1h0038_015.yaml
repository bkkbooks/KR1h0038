body:
  text: 欽定四庫全書孟子纂箋卷一元詹道傳撰梁惠王上凡七章孟子見梁惠王梁惠王魏侯罃於耕反也都大梁按魏初都安邑在漢河東郡安邑縣至惠王徙大梁在漢陳留郡浚儀縣魏地有少梁故以大梁别之僣稱王諡曰惠史記惠王三十五年卑禮厚弊以招賢者而孟軻至梁見史記魏世家按通鑑惠王三十五年乃周顯王三十三年乙酉也王曰叟不逺千里而來亦將有以利吾國乎叟長上聲老之稱王所謂利蓋富國強兵之類孟子對曰王何必曰利亦有仁義而已矣仁者心之德愛之理義者心之制事之宜也此二句乃一章之大指下文乃詳言之後多放與倣同此王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣萬乘之國弒其君者必千乘之家千乘之國弒其君者必百乘之家萬取千焉千取百焉不為不多矣苟為後義而先利不奪不饜乘去聲饜於豔反此言求利之害以明上文何必曰利之意也征取也上取乎下下取乎上故曰交征國危謂將有弒奪之禍乘車數也萬乘之國者天子畿音祈內地方千里出車萬乘千乘之家者天子之公卿采音菜地方百里出車千乘也千乘之國諸侯之國百乘之家諸侯之大夫也前漢刑法志殷周立司馬之官設六軍之衆司馬掌邦政軍旅屬馬萬二千五百人為軍王則六軍也因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有稅有賦稅以足食賦以足兵四井為邑四邑為丘丘十六井也有戎馬一匹牛三頭四丘為甸甸六十四井也有戎馬四匹兵車一乘牛十二頭甲士三人卒七十二人干戈備具是謂乘馬之法一井八家一甸六十四井計田五百七十六頃五百一十二家出士卒共七十五人則殷周之制不及七家給一兵也又兵車一乘有牛馬共十六計三十二家又出一馬或牛也一同百里提封萬井提舉也舉四封之內除山川沈斥城池邑居園囿術路三千六百井定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者也采官也因官食地故曰采地是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者也是謂千乘之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘故稱萬乘之主戎馬車徒干戈素具又按班固之説一同百里三分去一之外六千四百井之內又有正賦旁加正賦出賦稅旁加主治溝洫假如十里為成積百里中一甸六十四井正賦也餘三十六井則旁加萊田甸夫兼受之凡出車一乘則有兩車一正一副一曰輕車又名馳車用馬四匹甲士三人在車上左主射右主刺中主執轡御馬步卒七十二人隨之前拒二十四人左角二十四人右角二十四人共七十五人二曰重車又名革車牛十二頭炊家子十人固守衣裝五人廏養五人樵汲五人共二十五人皆所以佐兵車者兵車以戰大車以載輜重兩車總百人此説本孔氏尚書疏弒下殺上也饜足也言巨之於君每十分扶問反下同而取其一分亦已多矣叢説萬乘之國則千乘之家千乘之國則百乘之家此以君十卿祿大概言之也若又以義為後而以利為先則不弒其君而盡奪之其心未肯以為足也未有仁而遺其親者也未有義而後其君者也此言仁義未嘗不利以明上文亦有仁義而已之意也遺猶棄也後不急也言仁者必愛其親義者必急其君故人君躬行仁義而無求利之心則其下化之自親戴於己也王亦曰仁義而已矣何必曰利重平聲言之以結上文兩節之意此章言仁義根於人心之固有天理之公也利心生於物我之相形人欲之私也循天理則不求利而自無不利徇人欲則求利未得而害己隨之所謂毫釐之差千里之謬靡幼反此孟子之書所以造端託始之深意學者所宜深察而明辨也太史公曰余讀孟子書至梁惠王問何以利吾國未嘗不廢書而歎也曰嗟乎利誠亂之始也夫子罕言利常防其源也故曰放上聲於利而行多怨自天子以至於庶人好去聲利之弊何以異哉司馬談為太史令子遷尊其父故謂之公遷繼其職仍稱太史公西漢龍門人程子曰君子未嘗不欲利但專以利為心則有害惟仁義則不求利而未嘗不利也當是之時天下之人惟利是求而不復扶又反知有仁義故孟子言仁義而不言利所以拔本塞先則反源四字出左傳而救其弊此聖賢之心也孟子見梁惠王王立於沼上顧鴻鴈麋鹿曰賢者亦樂此乎樂音洛篇內同沼池也鴻鴈之大者麋鹿之大者孟子對曰賢者而後樂此不賢者雖有此不樂也此一章之大指詩云經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王在靈囿麀鹿攸伏麀鹿濯濯白鳥鶴鶴王在靈沼於牣魚躍文王以民力為臺為沼而民歡樂之謂其臺曰靈臺謂其沼曰靈沼樂其有麋鹿魚龞古之人與民偕樂故能樂也亟音棘麀音憂鶴詩作蒿户角反於音烏牣音刃叢説禽名之鶴音涸在鐸韻鶴鶴之鶴音學在覺韻此引詩而釋之以明賢者而後樂此之意詩大雅靈臺之篇經量度待洛反也靈臺文王臺名也詩傳國之有臺所以望氛祲察災祥時觀遊節勞佚也謂之靈者言其倐然而成如神靈所謂也營謀為也攻治也不日不終日也亟速也言文王戒以勿亟也子來如子來趨父事也靈囿靈沼臺下有囿囿中有沼也麀牝婢忍反鹿也伏安其所不驚動也濯濯肥澤貌鶴鶴潔白貌於歎美辭物滿也孟子言文王雖用民力而民反歡樂之既加以美名而又樂其所有蓋由文王能愛其民故民樂其樂而文王亦得以享其樂也湯誓曰時日害喪豫及女偕亡民欲與之偕亡雖有臺池鳥獸豈能獨樂哉害音曷喪去聲女音汝此引書而釋之以明不賢者雖有此不樂之意也湯誓商書篇名時是也日指夏桀害何也桀嘗自言吾有天下如天之有日日亡吾乃亡耳裴網注引尚書大傳曰桀云天之有日猶吾之有民日有亡哉日亡則吾亦亡矣又見韓詩外傳適彼樂土注民怨其虐故因其自言而目之曰此日何時亡乎若亡則我寧與之俱亡蓋欲其亡之甚也盂子引此以明君獨樂而不恤其民則民怨之而不能保其樂也梁惠王曰寡人之於國也盡心焉耳矣河內凶則移其民於河東移其粟於河內河東凶亦然察鄰國之政無如寡人之用心者鄰國之民不加少寡人之民不加多何也寡入諸侯自稱言寡德之人也河內河東皆魏地凶歲不熟也移民以就食移粟以給其老稚之不能移者孟子對曰王好戰請以戰喻填然鼓之兵刃既接棄甲曳兵而走或百步而後止或五十步而後止以五十步笑百步則何如曰不可直不百步耳是亦走也曰王如知此則無望民之多於鄰國也好去聲填音田填鼓音也兵以鼓進以金退左哀十一年陳書曰此行也吾聞鼓而已不聞金矣杜注鼓以進軍金以退軍直猶但也言此以譬鄰國不恤其民惠王能行小惠然皆不能行王道以養其民不可以此而笑彼也楊氏曰移民移粟荒政之所不廢也然不能行先王之道而徒以是為盡心焉則末矣不違農時榖不可勝食也數罟不入汙池魚鱉不可勝食也斧斤以時入山林材木不可勝用也榖與魚鱉不可勝食材木不可勝用是使民養生喪死無憾也養生喪死無憾王道之始也勝音升數音促罟音古汙音烏農時謂春耕夏耘秋收之時凡有興作不違此時至冬乃後之也不可勝食言多也數密也罟網也汙窊烏瓜反下之地水所聚也古者網罟必用四寸之目魚不滿尺市不得粥余六反人不得食詩魚麗于罶注庶人不數罟罟必四寸然後入澤梁魚不滿尺市不得粥考孟子注疏無其文惟王制云禽獸魚鱉不中殺不粥於市山林川澤與民共之而有厲禁周禮地官山虞掌山林之政令物為之厲而為之守禁凡林衡川衡澤虞之職皆為之厲禁而守之鄭注物為之厲者每物有藩界也禁者為守者設禁令也又注厲遮迾守之迾音例愚謂厲亦訓嚴當是嚴其蕃界也草木零落然後斧斤入焉禮記王制獺祭魚然後漁人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林此皆為治去聲之初法制未備且因天地自然之利而撙祖本反節愛養之事也然飲食宫室所以養生祭祀棺槨所以送死皆民所急而不可無者今皆有以資之則人無所恨矣王道以得民心為本故以此為王道之始五畝之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣百畝之田勿奪其時數口之家可以無飢矣謹庠序之教申之以孝悌之義頒白者不負戴於道路矣七十者衣帛食肉黎民不飢不寒然而不王者未之有也衣去聲畜許六反數去聲凡有天下者人稱之曰王則平聲據其身臨天下而言曰王則去聲後皆倣此五畝之宅一夫所受二畝半在田二畝半在邑田中不得有木恐妨五榖故於牆下植桑以供蠶事五十始衰非帛不暖未五十者不得衣也畜養也時謂孕字之時如孟春犧牲毋用牝之類也記月令孟春命祀山林川澤犧牲毋用牝七十非肉不飽未七十者不得食也百畝之田亦一夫所受趙氏曰古以百步為畝今以二百四十步為畝古百畝當今之四十一畝二畝半當今一畝十步金氏曰尺有數等周尺以人中指中節為寸以中人為度一尺約當今浙尺八寸則百畝全無多地疑中指節為度止用之衣服針炙耳當别有地尺也至此則經界正井地均無不受田之家矣庠序皆學名也申重去聲也丁寧反覆之意善事父母為孝善事兄長上聲下同為悌頒與斑同老人頭半白黑者也負任在背戴任在首夫音扶民衣食不足則不暇治禮義而飽暖無教則又近於禽獸故既富而教以孝悌則人知愛親敬長而代其勞不使之負戴於道路矣衣帛食肉但言七十舉重以見輕也黎黑也黎民黑髮之人猶秦言黔其廉反首也史記始皇二十六年更民名曰黔首應劭曰黔亦黎黑也少去聲壯之人雖不得衣帛食肉然亦不至於飢寒也此言盡法制品節之詳極財成輔相去聲之道以左右民易泰卦象曰天地交泰后以財成天地之道輔相天地之宜以左右民左右並去聲如左右手之右本音有是王道之成也金氏曰此皆孟子勸梁惠王行仁義之實事狗彘食人食而不知檢塗有餓莩而不知發人死則曰非我也歲也是何異於刺人而殺之曰非我也兵也王無罪歲斯天下之民至焉莩平表反刺七亦反檢制也莩餓死人也廣韻四紙殍注音圯草木枯落也三十小殍注餓死曰殍亦作莩十虞莩注音敷亦曰餓死皆一義也則莩死者取草木枯落之義也發發倉廩以賑音震通作振貸他代反也歲謂歲之豐凶也惠王不能制民之産又使狗彘得以食人之食則與先王制度品節之意異矣至於民飢而死猶不知發則其所移持民間之粟而已乃以民不加多歸罪於歲凶是知刃之殺人而不知操倉刀反刃者之殺人也不罪歲則必能自反而益修其政天下之民至焉則不但多於鄰國而已程子曰孟子之論王道不過如此可謂實矣又曰孔子之時周室雖微天下猶知尊周之為義故春秋以尊周為本至孟子時七國爭雄天下不復扶又反知有周而生民之塗炭已極當是時諸侯能行王道則可以王去聲矣此孟子所以勸齊梁之君也蓋王者天下之義主也聖賢亦何心哉視天命之改與未改耳梁惠王曰寡人願安承教承上章言願安意以受教孟子對曰殺人以梃與刃有以異乎曰無以異也梃徒頂反梃杖也以刃與政有以異乎曰無以異也孟子又問而王答也曰庖有肥肉廏有肥馬民有飢色野有餓莩此率獸而食人也厚斂力驗反於人以養禽獸而使民飢以死則無異於驅獸以食人矣三禮辨檀弓云馬有豢歲凶則止故公明儀曰廏有肥馬民有飢色為率獸食人獸相食且人惡之為民父母行政不免於率獸而食人惡在其為民父母也惡之之惡去聲惡在之惡平聲君者民之父母也惡在猶言何在也仲尼曰始作俑者其無後乎為其象人而用之也如之何其使斯民飢而死也俑音勇為去聲俑從去聲下同葬木偶人也古之葬者束草為人以為從衛謂之芻靈略似人形而已中古易之以俑則有面目機發而太似人矣故孔子惡去聲下同其不仁而言其必無後也禮記檀弓下塗車芻靈自古有之明器之道也孔子謂為芻靈者善謂為俑者不仁不殆於用人乎哉又按其下疏義云周禮為俑所謂中古即周也考之春秋成二年傳宋文公卒始用人以殉史記秦本紀武公死殉者六十六人至獻公元年方止從死則知武公而下十八君之葬必皆有從死者矣不獨繆公也繆公之葬殉者一百七十七人三良在其中夫子所謂始作俑者之無後又惡其不仁流毒至此豈不信哉孟子言此作俑者但用象人以葬孔子猶惡之況實使民飢而死乎李氏曰為人君者固未嘗有率獸食人之心然徇一已之欲而不恤其民則其流必至於此故以為民父母告之夫音扶父母之於子為去聲之就利避害未嘗頃刻而忘于懷何至視之不如犬馬乎梁惠王曰晉國天下莫強焉叟之所知也及寡人之身東敗於齊長子死焉西喪地於秦七百里南辱於楚寡人恥之願比死者一灑之如之何則可長上聲喪去聲比必二反灑與洗同魏本晉大夫魏斯與韓氏趙氏共分晉地號曰三晉通鑑篇首周威烈王二十三年初命晉大夫魏斯趙籍韓虔為諸侯故惠王猶自謂晉國惠王三十年齊擊魏破其軍虜太子申史記魏世家惠王三十年魏伐趙趙告急于齊宣王用孫子計救趙擊魏魏遂大興師使龎涓將而令太子申為上將軍與齊人戰敗於馬陵齊虜魏太子申殺將軍涓軍遂大敗十七年秦取魏少去聲梁史記魏世家惠王十七年魏與秦戰元里秦取我少梁後魏又數音朔獻地於秦史記商君傳秦孝公使衛鞅將兵伐魏魏使公子卬將而擊之鞅詐襲虜公子卬因攻其軍盡破之魏惠王恐使使割河西之地獻於秦以和而魏遂去安邑徙都大梁又與楚將去聲昭陽戰敗亡其七邑史記楚世家懷王六年楚使柱國昭陽將兵而攻魏破之於襄陵得邑八按史記魏襄王十二年楚敗我襄陵不言邑數楚懷王六年得邑八集注作七邑者恐誤比猶為去聲也言欲為死者雪其恥也孟子對曰地方百里而可以王百里小國也周禮地官諸公之地方五百里諸侯之地方四百里諸伯之地方三百里諸子之地方二百里諸男之地方一百里又畿外九州建國之法見王制然能行仁政則天下之民歸之矣王如施仁政於民省刑罰薄稅斂深耕易耨壯者以暇日修其孝悌忠信入以事其父兄出以事其長上可使制梃以撻秦楚之堅甲利兵矣省所梗反斂易皆去聲耨奴豆反長上聲省刑罰薄稅斂此二者仁政之大目也易治也耨耘也盡已之謂忠以實之謂信君行仁政則民得盡力於農畝而又有暇日以修禮義是以尊君親上而樂音洛下同於效死也彼奪其民時使不得耕耨以養其父母父母凍餓兄弟妻子離散養去聲彼謂敵國也彼陷溺其民王往而征之夫誰與王敵夫音扶陷陷於阱通作穽疾郢才性二反溺溺於水暴虐之意征正也以彼暴虐其民而率吾尊君親上之民往正其罪彼民方怨其上而樂歸於吾則誰與我為敵哉故曰仁者無敵王請勿疑仁者無敵蓋古語也百里可王以此而已恐王疑其迂濶故勉使勿疑也孔氏名文仲字經父臨江人曰惠王之志在於報怨孟子之論在於救民所謂唯天吏則可以伐之蓋孟子之本意孟子見梁襄王襄王惠王子名赫按通鑑慎靚王二年壬寅惠王卒孟子去魏適齊是一見襄王後即去也出語人曰望之不似人君就之而不見所畏焉卒然問曰天下惡乎定吾對曰定于一語去聲卒七沒反惡平聲語告也不似人君不見所畏言其無威儀也左氏傳曰有威而可畏謂之威有儀而可象謂之儀卒然急遽之貌蓋容貌辭氣乃德之符其外如此則其中之所存者可知王問列國分爭天下當何所定孟子對以必合于一然後定也孰能一之王問也對曰不嗜殺人者能一之嗜時利反甘也孰能與之王復扶又反問也與猶歸也對曰天下莫不與也王知夫苗乎七八月之間旱則苗稿矣天油然作雲沛然下雨則苗浡然興之矣其如是孰能禦之今夫天下之人牧未有不嗜殺人者也如有不嗜殺人者則天下之民皆引領而望之矣誠如是也民歸之由水之就下沛然誰能禦之夫音扶浡音勃由當作猶古字借用後多倣此周七八月夏五六月也孟子內並以周月言與春秋左傳同油然雲盛貌沛然雨盛貌浡然興起貌禦禁止也人牧謂牧民之君也領頸也蓋好去聲下同生惡去聲死人心所同故人君不嗜殺人則天下悅而歸之蘇氏名轍字子由東坡之弟曰孟子之言非苟為大而已然不深原其意而詳究其實未有不以為迂者矣豫觀孟子以來自漢髙祖及光武及唐太宗及我太祖皇帝能一天下者四君皆以不嗜殺人致之其餘殺人愈多而天下愈亂秦晉及隋力能合之而好殺不已故或合而復扶又反分或遂以亡國孟子之言豈偶然而已哉齊宣王問曰齊桓晉文之事可得聞乎齊宣王姓田氏名辟音壁強渠良反趙氏曰田氏本陳公子完之後初以陳為氏後改姓田氏至田和始篡齊而有之辟強和之曽孫諸侯僣稱王也齊桓公晉文公皆霸諸侯者孟子對曰仲尼之徒無道桓文之事者是以後世無傳焉臣未之聞也無以則王乎道言也董子曰仲尼之門五尺童子羞稱五伯霸同為去聲其先詐力而後仁義也正此意也董子名仲舒西漢廣川人此語見漢書本傳本出荀子金氏曰謂其所以為霸之謀畫經營也若九合一匡之事孔門固嘗言之矣以已通用無已必欲言之而不止也王去聲謂王天下之道曰德何如則可以王矣曰保民而王莫之能禦也保愛護也曰若寡人者可以保民乎哉曰可曰何由知吾可也曰臣聞之胡齕曰王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰將以釁鐘王曰舍之吾不忍其觳觫若無罪而就死地對曰然則廢釁鐘與曰何可廢也以羊易之不識有諸齕音核釁許刃反舍上聲轂音斛觫音速與平聲胡齕下沒反集注音核乃下革反恐誤齊臣也釁鐘新鑄鐘成而殺牲取血以塗其釁郤乞逆反也趙岐注新鑄殺牲以血塗其釁郤因以祭之曰釁所以厭變怪禦妖釁周禮太祝所掌凡寶鍾寶器皆在所釁觳觫恐懼貌孟子述所聞胡齕之語而問王不知果有此事否曰有之曰是心足以王矣百姓皆以王為愛也臣固知王之不忍也王見牛之觳觫而不忍殺即所謂惻隱之心仁之端也擴而充之則可以保四海矣故孟子指而言之欲王察識於此而擴充之也愛猶吝也王曰然誠有百姓者齊國雖褊小吾何愛一牛即不忍其觳觫若無罪而就死地故以羊易之也言以羊易牛其迹似吝實有如百姓所譏者然我之心不如是也曰王無異於百姓之以王為愛也以小易天彼惡知之王若隱其無罪而就死地則牛羊何擇焉王笑曰是誠何心哉我非愛其財而易之以羊也宜乎百姓之謂我愛也惡平聲異怪也隱痛也擇猶分也言牛羊皆無罪而死何所分别彼列反而以羊易牛乎孟子故設此難去聲欲王反求而得其本心王不能然故卒無以自解於百姓之言也曰無傷也是乃仁術也見牛未見羊也君子之於禽獸也見其生不忍見其死聞其聲不忍食其肉是以君子逺庖廚也逺去聲無傷言雖有百姓之言不為害也術謂法之巧者説文術邑中之道余楚金説文通釋云術方術也謂一方之道此為得制字之本意蓋殺牛既所不忍釁鍾又不可廢於此無以處上聲之則此心雖發而終不得施矣然見牛則此心已發而不可遏未見羊則其理未形而無所妨故以羊易牛則二者得以兩全而無害此所以為仁之術也聲謂將死而哀鳴也蓋人之於禽獸同生而異類故用之以禮而不忍之心施於見聞之所及其所以必逺庖廚者亦以預養是心而廣為仁之術也王説曰詩云他人有心豫忖度之夫子之謂也夫我乃行之反而求之不得吾心夫子言之於我心有戚戚焉此心之所以合於王者何也説音悅忖七本反度待洛反夫我之夫音扶詩小稚巧言之篇戚戚心動貌王因孟子之言而前日之心復扶又反萌乃知此心不從外得然猶未知所以反其本而推之也曰有復於王者曰吾力足以舉百鈞而不足以舉一羽明足以察秋毫之末而不見輿薪則王許之乎曰否今恩足以及禽獸而功不至於百姓者獨何與然則一羽之不舉為不用力焉輿薪之不見為不用明焉百姓之不見保為不用恩焉故王之不王不為也非不能也與平聲為不之為去聲復白也鈞三十斤百鈞至重難舉也羽鳥羽一羽至輕易去聲下同舉也秋毫之末毛至秋而末鋭小而難見也輿薪以車載薪大而易見也許猶可也今恩以下又孟子之言也蓋天地之性人為貴故人之與人又為同類而相親是以惻隱之發則於民切而於物緩推廣仁術則仁民易而愛物難今王此心能及物矣則其保民而王非不能也但自不肯為耳曰不為者與不能者之形何以異曰挾太山以超北海語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也故王之不王非挾太山以超北海之類也王之不王是折枝之類也語去聲為長之為去聲長上聲折之舌反形狀也挾以腋持物也超躍而過也為長者折枝以長者之命折草木之枝言不難也是心固有不待外求擴而充之在我而已何難之有老吾老以及人之老幼吾幼以及人之幼天下可運於掌詩云刑于寡妻至于兄弟以御于家邦言舉斯心加諸彼而巳故推恩足以保四海不推恩無以保妻子古之人所以大過人者無他焉善推其所為而已矣今恩足以及禽獸而功不至於百姓者獨何與與平聲老以老事之也吾老謂我之父兄人之老謂人之父兄幼以幼畜許六反之也吾幼謂我之子弟人之幼謂人之子弟運於掌言易去聲下同也詩大雅思齊莊皆反之篇刑法也寡妻寡德之妻謙辭也御治也不能推恩則衆叛親離故無以保妻子蓋骨肉之親本同一氣又非但若人之同類而已故古人必由親親推之然後及於仁民又推其餘然後及於愛物皆由近以及逺自易以及難今王反之則必有故矣故復扶又反推本而再問之權然後知輕重度然後知長短物皆然心為甚王請度之度之之度待洛反權稱去聲錘直垂反也度丈尺也權衡規矩繩為五則分寸尺丈引為五度律度量權衡皆用銅而銘之所以齊風俗也度之謂稱量並平聲之也言物之輕重長短人所難齊必以權度度上如字下待洛反下文不度音同之而後可見若心之應物則其輕重長短之難齊而不可不度以本然之權度又有甚於物者今王恩及禽獸而功不至於百姓是其愛物之心重且長而仁民之心輕且短失其當然之序而不自知也故上文既發其端而於此請王度之也抑王興甲兵危士臣構怨於諸侯然後快於心與與平聲抑發語辭士戰士也構結也孟子以王愛民之心所以輕且短者必其以是三者為快也然三事實非人心之所快有甚於殺觳觫之牛者故指以問王欲其以此而度之也王曰否吾何快於是將以求吾所大欲也不快於此者心之正也而必為此者欲誘之也欲之所誘者獨在於是是以其心尚明於他而獨暗於此此其愛民之心所以輕短而功不至於百姓也曰王之所大欲可得聞與王笑而不言曰為肥甘不足於口與輕暖不足於體與抑為采色不足視於目與聲音不足聽於耳與便嬖不足使令於前與王之諸臣皆足以供之而王豈為是哉曰否吾不為是也曰然則王之所大欲可知已欲辟土地朝秦楚蒞中國而撫四夷也以若所為求若所欲猶緣木而求魚也與平聲為肥抑為豈為不為之為皆去聲便令皆平聲辟與闢同朝音潮便嬖近習嬖幸之人也已語助辭辟開廣也朝致其來朝也秦楚皆大國蒞臨也若如此也所為指興兵結怨之事緣木求魚言必不可得王曰若是其甚與曰殆有甚焉緣木求魚雖不得魚無後災以若所為求若所欲盡心力而為之後必有災曰可得聞與曰鄒人與楚人戰則王以為孰勝曰楚人勝曰然則小固不可以敵大寡固不可以敵衆弱固不可以敵強海內之地方千里者九齊集有其一以一服八何以異於鄒敵楚哉蓋亦反其本矣甚與聞與之與平聲殆蓋皆發語辭鄒小國楚大國齊集有其一言集合齊地其方千里是有天下九分扶問反之一也以一服八必不能勝所謂後災也反本説見下文今王發政施仁使天下仕者皆欲立於王之朝耕者皆欲耕於王之野商賈皆欲藏於王之市行旅皆欲出於王之塗天下之欲疾其君者皆欲赴訴於王其若是孰能禦之朝音潮賈音古訴與訴同行貨曰商居貨曰賈發政施仁所以王去聲天下之本也近者悅逺者來則大小強弱非所論矣蓋力求所欲則所欲者反不可得能反其本則所欲者不求而至與首章意同王曰吾惛不能進於是矣願夫子輔吾志明以教我我雖不敏請嘗試之惛與昏同曰無恆産而有恆心者惟士為能若民則無恆産因無恆心苟無恆心放辟邪侈無不為己及陷於罪然後從而刑之是罔民也焉有仁人在位罔民而可為也恆胡登反辟與僻同焉於虔反恆常也産生業也恆産可常生之業也恆心人所常有之善心也士嘗學問知義理故雖無常産而有常心民則不能然也罔猶羅網欺其不見而取之也是故明君制民之産必使仰足以事父母俯足以畜妻子樂歲終身飽凶年免於死亡然後驅而之善故民之從之也輕畜許六反下同輕猶易去聲也此言民有常産而有常心也今也制民之産仰不足以事父母俯不足以畜妻子樂歲終身苦凶年不免於死亡此惟救死而恐不贍奚暇治禮義哉治平聲凡治字為理物之義者平聲為己理之義者去聲後皆倣此贍時念反足也此所謂無常産而無常心者也王欲行之則盍反其本矣盍何不也使民有常産者又發政施仁之本也説見下文五畝之宅樹之以桑五十者可以衣帛矣雞豚狗彘之畜無失其時七十者可以食肉矣百畝之田勿奪其時八口之家可以無飢矣謹庠序之教申之以孝悌之義頒白者不負戴於道路矣老者衣帛食肉黎民不飢不寒然而不王者未之有也音見前篇此言制民之産之法也趙氏趙氏名岐字邠鄉漢京兆長陵人詳見序説中注曰八口之家次上農夫也王制農田百畝百畝之糞上農夫食九人其次食八人其次食六人下農夫食五人此王政之本常生之道故孟子為去聲齊梁之君各陳之也楊氏曰為天下者舉斯心加諸彼而已然雉有仁心仁聞去聲而民不被其澤者不行先王之道故也故以制民之産告之此章言人君當黜霸功行王道而王道之要不過推其不忍之心以行不忍之政而已齊王非無此心而奪其功利之私不能擴充以行仁政雖以孟子反覆曉告精切如此而蔽固已深終不能悟是可歎也孟子纂箋卷一
